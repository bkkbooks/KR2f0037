body:
  text: 十四之一康節邵先生先生名雍字堯夫其先范陽人徙衡漳又徙共城先生年三十來逰于洛葬其親於伊川遂為河南人嘉祐中詔舉遺遁留守王公拱辰以先生應詔授試將作監主簿熙寧初復求逸士御史中丞吕公誨等又以先生為言𥙷頴州團練推官皆三辭不獲而後受命終稱疾不之官十年卒年六十七贈袐書省著作郎元祐中特賜諡先生始學於百原堅苦刻厲冬不爐夏不扇夜不就席者數年衛人賢之先生歎曰昔人尚友於古而吾未嘗及四方遽可已乎於是走吳適楚過齊魯客梁晉久之而歸曰道其在是矣蓋始有定居之意先生少時自雄其材慷慨有大志既學力慕髙逺謂先王之事為可必致及其學益老德益邵玩心髙明觀於天地之運化隂陽之消長以達乎萬物之變然後頽然其順浩然其歸在洛幾三十年始至蓬蓽環堵不蔽風雨躬㸑以養其父母居之𥙿如講學於人未嘗強以語人而就問者日衆鄉里化之逺近尊之士人之道洛者有不之公府而必之先生之廬先生德氣粹然望之可知其賢然不事表襮不設防畛正而不諒通而不汙清明坦夷洞徹中外接人無貴賤親踈之間群居燕飲笑語終日不取甚異於人顧吾所樂如何耳病畏寒暑嘗以春秋時行逰城中士大夫家聽其車音倒屣迎致雖兒童奴隸皆知歡喜尊敬其與人言必依於仁義忠信樂道人之善而未嘗及其惡故賢者恱其德不賢者服其化所以厚風俗成人材者先生之功多矣昔七十子學於仲尼其傳可見者惟曽子所以告子思而子思所以授孟子者耳其餘門人各以其材之所冝者為學雖同尊聖人所因而入者門戶則衆矣况後此千餘嵗師道不立學者莫知其從適獨先生之學為有傳也先生得之於李挺之挺之得之於穆伯長推其源流逺有端緒今穆李之言及其行事槩可見矣而先生淳一不雜汪洋浩大乃其所自得者多矣然而名其學者豈所謂門户之衆各有所因而入者歟語成德者昔難其居若先生之道就所至而論之可謂安且成矣銘曰嗚呼先生志豪力雄闊步長趍凌髙厲空探幽索隱曲暢旁通在古或難先生從容有問有觀以飫以豐天不憖遺哲人之凶鳴皋在南伊流在東有寧一宮先生所終明道先生撰墓志銘先生少事北海李之才挺之挺之聞道於汶陽穆修伯長伯長以上雖有其傳未之見也先生既受其學又遊河汾之曲以至淮海之濵涉河濟汶達於梁宋苟有達者必咨訪以道無常師焉乃退居共城廬於百源之上大覃思於易經夜不設寢日不再食三年而學以大成大名王豫天恱瑰偉博達之士也精於易聞先生之篤志愛而欲教之既與之語三日得所未聞始大驚服卒捨其學而學焉衛人乃知先生之為有道也年三十餘來遊于洛以為洛邑天下之中土達觀四方之士乃定居焉先生清而不激和而不流遇人無貴賤賢不肖一接以誠長者事之少者友之善者與之不善者矜之故洛人久而益尊信之四方之學者與士大夫之過洛者莫不慕其風而造其廬先生之教人必隨其才分之髙下不驟語而強益之或聞其言若不適其意先生亦不屑也故來者多而從者少見之者衆而知之者尚寡及接之久察其所處無不中於理叩其所有愈久而愈新則皆心恱而誠服先生未嘗有求於人或餽之以禮者亦不苟辭洛人為買宅丞相冨公為買園以居之先生年六十始為隱者之服曰病且老矣不復能從事矣隆寒盛暑閉門不出曰非退者之冝也其於書無所不讀諸子百家之學皆得其夲原而釋老技術之說一無所惑其志著皇極經世六十卷晚尤喜為詩平易而造於理有擊壤集二十卷自為之序門人張岫撰行狀邵堯夫先生居洛四十年安貧樂道自云未嘗攢眉所居寢息處為安樂窩自號安樂先生又為甕牖讀書燕居其下旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也中間州府以更法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其乏嘗有詩云斟有淺深存燮理飲無多少繫經綸莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乘小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬公贈以詩曰林間髙閣望已久花外小車猶未來隨意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆歡然如親嘗自言若至大病自不能支其遇小疾得有客對話不自覺疾之去體也學者來從之問經義精深浩博應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也吕氏家孰記元祐中韓康公尹洛為先生請諡于朝太常博士歐陽棐議曰君少篤學有大志久而後知道德之歸且以為學者之患在於好惡先成乎心而挾其私智以求於道則蔽於所好而不得其真故求之至於四方万里之逺天地隂陽屈伸消長之變無所不考而必折衷於聖人雖深於象數先見默識未嘗以自名也其學純一而不雜居之而安行之而成平夷渾大不見圭角蓋其自得深矣故其隱居幾三十年室廬才足以蔽風雨溉園耕稼僅足以給朝夕及出而接物恂恂樂易無貴賤少長一切以誠平居怡然有所甚樂而世莫能窺也常自名其居曰安樂而又以為號蓋古有黔婁者死無以斂而諡曰康以為不苟世之爵祿者其冨貴有餘與君之學未必同而其迹似之矣方朝廷命君以頴州推官嘗辭而不聽君以為辭益堅則名益髙而未必從也既受命而以疾辭於吏部則有司之事耳故迹不近名而終自全其志則其守可謂固矣謹按諡法溫良好樂曰康能固所守曰節伏請諡曰康節按朝以道集叔弼後謂以道曰棐從母王宣徽夫人得疾洛陽先妣夫人亟以棐入洛時先公參大政臨行告戒曰洛中有邵堯夫吾獨不識汝為吾見之棐既至洛求教先生特為棐徐道其立身夲末甚詳出門揖送猶曰足下其無忘鄙野之人於異日棐伏念先生未嘗辱教一言雖欲不忘亦何事邪歸白大人則喜曰幸矣邵堯夫有以處吾兒也其後二十年棐偶入太常為博士次當作先生諡議乃恍然周省先生當時之言落筆若先生之自序無待其家所上文字也康節先生少日遊學先祖母李夫人思之恍惚至倒誦佛書康節亟歸不復出夫人捐館康節特毀甚躬自㸑以養祖父置家蘇門山下康節獨築室于百源之上時李之才挺之東方大儒也權共城縣令一日見康節心相契授以大學康節益自克勵三年不設榻晝夜危坐以思寫周易一部貼屋壁間日誦數十遍聞汾州任先生者有易學又往質之以下並聞見録康節與冨文忠公早相知文忠𥘉入相謂門下士田棐大卿曰為我問邵堯夫可出當以官職起之不即命為先生處士以遂隱居之志田大卿為康節言康節不答以詩謝之曰相招多謝不相遺將為胸中有所施若進豈能禁吏責既間安用更名為願同巢許稱臣日甘老唐虞比屋時滿眼清賢在朝列病夫無以繫安危公終不相忘乃因明堂祫享赦詔天下舉遺逸公意謂河南府必以康節應詔時文潞公尹洛以兩府禮召見康節康節不屈遂以福建黃景應詔文忠不樂至者二十八人各試論一首命官為試銜知縣且奏天下尚有遺材乞令再舉詔從之王拱辰尚書尹洛乃以康節應詔潁川薦常秩皆先除試將作監主簿不理選限知制誥王介甫繳還辭頭曰使邵雍常民一試銜亦不可與果賢者不當止與試銜宜召試然後官之上不納下知制誥祖無擇除去不理選限行辭然康節與常秩皆不起是時冨公已丁憂去位矣熙寧二年詔舉遺逸御史中丞吕誨三司副使吳充龍圗閣學士祖無擇皆薦康節時歐陽公作參知政事素重常秩故潁州亦再以秩應詔康節除袐書省校書郎潁州團練推官辭不許既受命即引疾不起且以詩答鄉人曰平生不作皺眉事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司無用苦開陳常秩以職官起時王介甫方行新法天下紛然以為不便思得山林之士相合常秩賜對盛言新法之便乃除諌官以至待制帝浸薄之介甫主之不忘然亦知其為人矣康節嘉祐中以遺逸命官辭之不從河南尹遣官就第送告勑朝章康節服以謝即褐衣如𥘉至熙寧𥘉再命官三辭又不從再服以謝且曰吾不復仕矣始為隱者之服烏帽縚褐見卿相不易也司馬溫公依禮記作深衣冠簮幅巾紳帶每出朝服乘馬用皮匣貯深衣隨其後入獨樂園則衣之嘗謂康節曰先生可衣此乎康節曰雍為今人當服今時之衣溫公歎其言合理熙寧三年朝廷初行新法所遣使者皆新進少年遇事風生天下騷然州縣始不可為矣康節間居林下門生故舊仕宦四方者皆欲投劾而歸以書問康節康節答曰正賢者所當盡力之時新法固嚴能寬一分則民受一分之賜矣投劾而去何益康節過士友家晝卧見其枕屏畫小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戲蓋熙寧間也陳恬云擊壤集不載熙寧中洛陽以清德為朝廷尊禮者大臣曰冨韓公侍從曰司馬溫公吕申公士大夫位卿監以清德早退者十餘人好學樂善有行義者幾二十人康節隱居謝聘皆相從忠厚之風聞於天下里中後生皆知畏廉耻欲行一事必曰無為不善恐司馬端明邵先生知冨韓公自汝州得請歸洛養疾築第與康節天津隱居相邇公曰自此可時相招矣康節曰雍冬夏不出春秋時間過親舊間公相招未必來不召或自至公謝客戒子曰先生來不以時見康節一日過之公作詩云先生自衛客西畿樂道安間絶世機再命初筵終不起獨甘窮巷寂無依貫穿百代嘗探古吟詠千篇亦造微珍重相知忽相訪醉和風雨夜深歸公常令二青衣蒼頭掖之以行一日與康節㑹後園中因康節論天下事公喜甚不覺獨步下堂康節不為起徐指二蒼頭戲公曰忘却拄杖矣公常苦氣痞康節曰好事到手畏御名不為他人做了鬱鬱何益公笑曰此事未易言也蓋為嘉祐建儲耳公雖剛勇遇事詳審不萬全不發康節因戲之公一日有憂色康節問之公曰先生度弼之憂安在康節曰豈以王安石罷相吕惠卿參知政事惠卿凶暴過安石乎公曰然康節曰公無憂安石惠卿夲以勢利合惠卿安石勢利相敵將自為仇矣不暇害他人也未幾惠卿果叛安石公謂康節曰先生識慮絶人逺矣一日薄暮司馬溫公見康節曰明日僧修顒開堂說法冨公晦叔欲偕往聽之晦叔貪佛巳不可勸冨公果往於理未便光後進不敢言先生曷不止之康節曰恨聞之晚矣明日公果往後康節因見公謂公曰聞上欲用裴晉公禮起公公笑曰先生以謂弼衰病能起否康節曰固也或人言上命公公不起一僧開堂公乃出無乃不可乎公驚曰弼未之思也公以康節年髙勸學修養康節曰不能學人胡走亂走也熙寧癸丑春大名王荀龍字仲賢入洛見康節其議論徑正有過人者康節喜之仲賢魏公客也因出魏公送行詩顔體大書極竒偉康節曰吾少日喜作大字李挺之曰學書妨學道故嘗有詩云憶昔𥘉書大字時學人飲酒與吟詩若非益友推金石四十五年成一非仲賢又誦魏公詩云春去花叢胡蝶亂雨餘𬞞圃桔槹間康節愛之曰怨而不傷婉而成章之言也一日二程先生侍太中公訪康節於天津之廬康節携酒飲月陂上歡甚語其平生學術出處之大致明日明道悵然謂門生周純明曰昨從堯夫先生遊聽其論議振古之豪傑也惜其無所用於世純明曰所言何如明道曰內聖外王之道也是日康節有詩明道和之今各見集中康節居洛凡交遊年長者拜之年等者與之為朋友年少者以子弟待之未嘗少異於人故得人之歡心每嵗春二月出四月天漸熱即止八月出十一月天漸寒即止故有詩云時有四不出大風大雨大暑大寒㑹有四不赴公㑹葬㑹生㑹醵㑹每出人皆倒屣迎致雖兒童奴隸皆知尊奉每到一家子弟家人爭具酒饌問其所欲不復呼姓氏但曰吾家先生至也雖閨門骨肉間事有未决者亦求教康節以至誠為之開諭莫不恱服十餘家如康節所居安樂窩起屋以待其來謂之行窩故康節沒鄉人挽詩有云春風秋月嬉遊處冷落行窩十二家洛陽風俗之美如此康節平居於人事禨祥未嘗輒言治平間與客散步天津橋上聞杜䳌聲慘然不樂客問其故則曰洛陽舊無杜䳌今始至有所主客曰何也康節曰不二年上用南士為相多引南人專務變更天下自此多事矣客曰聞杜䳌何以知此康節曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也春秋書六鷁退飛鸜鵒來巢氣使之也自此南方草木皆可移南方疾病瘴瘧之類北人皆苦之矣至熙寧𥘉其言乃驗伯溫後聞熙州有唐碑一日有家雀數千集其上人惡之曰豈此地將為漢有耶因焚之蓋夷中無此禽也巳而果然因并記之以信先君之說康節謂夲朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患康節宅契司馬溫公户名園契冨韓公户名莊契王郎中户名康節𥘉不改也熙寧十年夏康節感微疾氣日益耗神日益明笑謂司馬溫公曰雍欲觀化一巡如何溫公曰先生未應至此康節笑曰死生亦常事耳張橫渠先生喜論命來問疾因曰先生論命否當推之康節曰若天命則巳知之矣世俗所謂命則不知也橫渠曰先生知天命矣載尚何言程伊川曰先生至此它人無以為力願自主張康節曰平生學道豈不知此然亦無可主張時康節居正寢諸公議後事於外有欲葬近洛城者康節已知呼伯溫入曰諸公欲以近城地葬我不可當從伊川先塋耳七月𥘉四日大書詩一章曰生于太平世長于太平世死于太平丗客問年幾何六十有七歲俯仰天地間浩然獨無愧以是夜五更捐館辨惑云伊川又問從此永訣更有以見告乎先生舉兩手示之伊川曰何謂也先生曰靣前路徑須令寬路窄則自無著身處况能使人行也程氏遺書云伯淳言邵堯夫病革言試與觀化一遭子厚言觀化它人便觀得自家又如何觀得化嘗觀堯夫詩意才做得識道理却於儒術未見所得又云邵堯夫臨終時只是諧謔須臾而去以聖人觀之則亦未是蓋猶有意也比之常人甚懸絶矣他疾甚革頥往祖之因警之曰堯夫平生所學今日無事否他氣微不能答次日見之却有聲如絲髮來大答云你道生薑樹上生我亦只得依你說是時諸公都在廳上議後事他在房間便聞得諸公恐喧他盡出外說話他皆聞得一人云有新報云云堯夫問有甚事曰有某事堯夫曰我將為收却幽州也以它人觀之便以為怪此只是心虛而明故聽得問曰堯夫未病時不如此何也曰此只是病後氣將絶心無念慮不昏便如此又問釋氏亦先知死何也曰只是一箇不動心釋氏平生只學這箇事將這箇做一件大事學者不必學它但燭理明自能之只如邵堯夫事它自如此亦豈嘗學也邵康節居洛陽有商州太守趙郎中者康節與之有舊嘗往從之時章惇子厚作令商州趙厚遇之一日趙請康節與章同㑹章豪俊議論縱橫不知敬康節也語次因及洛中牡丹之盛趙守因謂章曰先生洛人也知花為甚詳康節因言洛人以見根橃而知花之髙下者知花之上也見枝葉而知髙下者知花之次也見菩蕾而知髙下者知花之下也如公所說乃是知花之下也章默然慙服趙因謂章先生學問淵源世之師表公不惜從之學則日有進益矣章因從先生遊欲傳數學先生謂章須十年不仕宦乃可學蓋不之許也童蒙訓邢和叔亦欲從先君學先君略為開其端倪和叔援引古今不已先君曰姑置是此先天學未有許多言語且當虛心滌慮然後可學此和叔留别詩云圯下每慙呼孺子牀前時得拜龐公之句先君和之觀君自比諸葛亮顧我殊非黃石公斷章云出人才業尤須惜御名勿輕為西晉風辨惑又上蔡語録云邪七要學堯夫不肯曰徒長姦雄五之二丞相李文定公公名迪字復古其先趙郡人後家濮州舉進士第一歷通判徐兖州知鄆州為三司鹽鐵副使知制誥以集賢院學士知永興軍徙陜西都轉運使入翰林為學士天禧中拜給事中參知政事仁宗為皇太子命兼賔客拜吏部侍郎同平章事出知鄆州仁宗即位太后預政貶衡州團練副使起知舒州江寧河南府太后崩復入相景祐中出知亳州召還除資政殿大學士降太常卿知密州復拜大學士除彰信軍節度使知天雄軍徙青州以太子太傅致仕薨年七十七李文定公為舉子時從种放明逸先生學將試京師携明逸書見柳開仲塗以文卷為贄與謁俱入久之仲塗出曰讀君之文須沐浴乃敢見因留之門下一日仲塗自出題令文定與其諸子及門下客同賦賦成驚曰君必魁天下為宰相令門下客與諸子拜之曰異日無忘也及文定為宰相仲塗門下客有柳某者文定命長子柬之娶其女不忘仲塗之言也文定所擬賦題不傳如王沂公曾初作有物混成賦識者知其决為宰相蓋所養所學發為言辭者可以觀矣程明道先生為伯溫云聞見録李文定公罷陜西都轉運使還朝是時真宗方議東封西祀修太平事業知秦州曹瑋奏羌人潜謀入冦請大益兵為備上大怒以為瑋虛張虜勢恐愒朝廷以求益兵以迪新自陜西還召見示以瑋奏問其虛實欲斬瑋以戒妄言者文定從容奏曰瑋武人逺在邊鄙不知朝廷事體輒有奏陳不足深罪臣前任陜西觀邊將才略無能出瑋之右者他日必能為國家建功立事若以此加罪臣為陛下惜之上意稍解迪因奏曰瑋良將必不妄言所請之兵亦不可不少副其請臣觀陛下意但不欲從鄭州門出兵耳秦之旁郡兵甚多可發以戍秦臣在陜西籍諸州兵數為小冊常置鞶囊中以自隨今未敢以進上曰趣取之迪取於鞶囊以進上指曰以某州某州兵若干戍秦州卿即傳詔於樞密院發之既而虜果大入冦瑋迎擊大破之遂開山外之地奏到上喜謂迪曰山外之捷卿之功也記聞上將立章獻后迪為翰林學士屢上疏諌以章獻起於寒微不可母天下由是章獻深銜之周懷政之誅上怒甚欲責及太子群臣莫敢言迪為參知政事俟上怒稍息從容奏曰陛下有幾子乃欲為此計上大寤由是獨誅懷正等而東宫不動搖迪之力也記聞公在翰林時仍歲旱蝗國用不給一日歸沐忽傳詔對內東門上出三司所上歲出入財用數問何以濟公曰祖宗初置內藏庫欲復西北故土及以支凶荒今邊無他費陛下用此以佐國用賦斂寬民不勞矣上曰今當出金帛數百萬借三司公曰天子於財無內外願下詔賜三司以顯示德澤何必曰借上恱又言陛下東封時敕所過無伐木除道行宫裁加塗蔇而巳及幸汾亳土木之役過往時幾百倍今旱蝗之災殆天意所以警陛下也上曰卿之言然一二臣誤朕為此真宗晚年不豫嘗對宰相盛怒曰昨夜皇后以下皆云劉氏獨置朕於宫中衆知上眊亂誤言皆不應李迪曰果如是何不以法治之良久上寤曰無是事也章獻在帷下聞之由是惡迪記聞真宗不豫大漸之夕李文定公與宰執以祈禳宿內殿時仁宗幼冲八大王元儼者有威名以問疾留禁中纍日不肯出執政患之無以為計偶翰林司以金盂貯熟水曰王所須也文定取案上墨筆攪水中盡黑令持去王見之大驚意其有毒也即上馬去文定臨事大率類此聞見録真宗既疾甚殆不復知事李迪丁謂同作相內臣雷允恭者嬖臣也自劉后以下皆畏事之謂之進用皆允恭之力嘗傳宣中書欲以林特為樞密副使迪不可曰除兩府須靣奉聖旨翌日爭之上前聲色俱厲謂辭屈俯首鞠躬而已謂既退迪獨留納劄子上皆不能省記而二相皆以郡罷允恭傳宣謂家以中書闕人權留謂發遣謂因直入中書見同列召堂吏諭之索文書閲之來日與諸公同奏事上亦無語衆退獨留及出道過學士院問院吏今日學士誰直曰劉學士筠謂呼筠出口傳聖旨令謂復相可草麻筠曰命相必面得旨果爾今日必有宣召麻乃可為也謂無如之何它日再奏事復少留退過學士院復問誰直曰錢學士惟演謂復以聖旨語之惟演即從命既復相乃逐李公及其黨正人為之一空將草李公責詞時宋宣獻知制誥當直請其罪名謂曰春秋無將漢法不道皆其事也宋不得已從之詞既上謂猶嫌其不切多所改定其言上前爭議曰罹此震驚遂至沉頓謂所定也及謂貶朱崖宋猶掌詞命即為之詞曰無將之戒深著於魯經不道之誅難逃於漢法天下快之龍川志又記聞云真宗不豫冦凖得罪丁謂李迪同為相以其事進呈上命除凖小處知州謂退署其紙尾曰奉聖㫖除逺小處知州迪曰嚮者聖旨無逺字謂曰與君靣奉德音君欲擅改聖㫖以庇凖邪由是二人鬪䦧更相論奏上命翰林學士錢惟演草制罷謂政事惟演遂出迪而留謂外人先聞其事制出無不愕然上亦不復省也又云丁謂與迪同奏事退既下殿謂矯書聖語欲為林特遷官迪不勝忿與謂爭辨引手板欲擊謂謂走獲免因更相論奏詔二人俱罷相迪知鄆州明日謂復留為相迪至鄆半歲真宗晏駕迪貶衡州團練副使謂使侍禁王仲宣押迪如衡州仲宣始至鄆州見通判以下而不見迪迪皇恐以刃自剄人救得免仲宣凌侮迫脅無所不至人往見迪者輒籍其名或饋之食留至臭腐棄捐不與迪客鄧餘怒曰竪子欲殺我公以媚丁謂邪鄧餘不畏死汝殺我公我必殺汝從迪至衡州不離左右仲宣頗憚之迪由是得全至衡州歲餘除祕書監知舒州章獻太后上仙迪時以尚書右丞知河陽召復為相迪自以受不丗之遇盡心輔佐知無不為吕夷簡忌之潛短之於上歲餘罷相出知某州迪謂人曰迪不自量恃聖主之知自以為宋璟而以吕為姚崇而不知其待我乃如是也記聞李文定與吕文靖同作相李公直而踈吕公巧而密李公嘗有所規畫吕公覺非其所能及問人曰李門下誰為謀者對曰李無它客其子柬之慮事過其父也吕公因謂李公公子柬之才可用也當付以事任李公謙不敢當吕公曰進用才能此自夷簡事公勿預知即奏除柬之兩浙提刑李公父子不悟也皆喜受命二公內既不協李公於上前求去上怪問其故李奏曰老疾無堪夷簡公相謾欺具奏所以上召吕靣質之時燕王貴盛嘗為其門僧求官二公共議許之既而吕公遂在告李公書奏與之久之忘其實反謂吕獨私燕邸吕公以案牘奏上李慚懼待罪遂免去其後王沂公久在外意求復用宋宣獻為參知政事甚善吕公為沂公言曰孝先求復相公能容之否吕公許諾宣獻曰孝先於公事契不淺果許則宜善待之不冝如復古也吕公笑然之宣獻曰公已位昭文孝先至以集賢處之可也吕公曰不然吾雖少下之何害遂奏言王曽有意復入上許之吕公復言願以首相處之上不可許以亞相乃使宣獻問其可否沂公無所擇既至吕公專决事不少讓二公又不協王公復於上前求去上問所以對如李公去意固問之乃曰夷簡政事多以賄成臣不能盡記王博文自陳州入知開封府所入三千緡上驚復召吕公靣詰之吕公請付有司治之乃以付御史中丞范諷推治無之王公乃請罪求去蓋吕公族子昌齡以不獲用為怨時有言武臣王博古嘗納賂吕公者昌齡誤以博文告王不審遂奏之上大怒逐王公鄆州吕公亦以節鉞知許州參知政事宋宣獻蔡文忠皆罷去李王二公雖以踈短去位然天下至今以正人許之龍川志
