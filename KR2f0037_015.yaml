body:
  text: 丞相劉忠肅公公名摯字莘老永靜軍東光人嘉祐中登進士甲科歴知冀州南宫縣江陵府觀察推官召試爲館閣校勘擢檢正中書禮房公事監察御史裏行責監衡州鹽倉簽書應天府判官事元豐𥘉爲開封府推官尚書禮部郎中右司郎中衝替起知滑州哲宗即位召爲侍御史元祐元年爲御史中丞拜尚書右丞歴左丞中書門下侍郎六年拜右僕射以觀文殿學士知鄆州徙青州紹聖𥘉落職知黄州再貶光禄卿分司南京蘄州居住四年責鼎州團練副使新州安置薨年六十八王荆公安石𥘉秉政搜擇人才任以不次元公絳數以公爲言荆公一見遂器重焉擢爲中書檢正居月餘黙黙非所好㑹除御史欣然就職歸語家人曰趣裝母爲安居計未及陛對首上䟽論亳州獄起不正小臣意在傾故相冨弼以市進今弼巳責願寛州縣之罪又言程昉開漳河調發猝迫人不堪命趙子幾擅升畿縣等使納役錢縣民日數千人遮訴宰相京師喧然何以示四方張靚王廷老擅増两浙役錢督賦嚴急人情嗟怨此皆欲以羡餘希賞願行顯責明廷夲無聚歛之意門人劉仿王知常撰次行實神宗皇帝銳意求治獎勵臣下公旣對靣賜褒諭因論人物邪正條對移時上意嚮納劉大諌序公文集云神宗靣賜褒諭且問從學王安石耶安石稱郷器識公對曰臣東北人少孤獨學不識安石也因上䟽極論其略曰君子小人之分在義利而已小人非不足用特心之所嚮不在乎義故希賞之志每在事先奉公之心毎在私後陛下有勸農之意今變而爲煩擾陛下有均役之意今倚以爲聚歛其於愛君之心憂國之言者皆無以容於其間今天下有喜於敢爲之論有樂於無事之論彼以爲此流俗此以彼爲亂常畏義者以進取爲可耻嗜利者以守道爲無能臣願陛下虚心平聽御名重好惡前日意以爲是者今更察其非前日意以爲短者今亦用其長稍抑虚譁輕僞志近忘逺幸於苟合之人漸察忠厚御名重難進易退可與有爲之士抑髙舉下品制齊量収合過與不及之俗使㑹於大中之道然後風俗一險阻平施設變化唯陛下號令之而已行實公論率錢助役官自雇人略舉十害是時御史中丞楊公繪亦上䟽論新政并公章下司農寺司農條件詰難劾繪與公險詖欺誕中有向背有㫖分析公奏曰臣有言責采士民之說敷告於陛下是臣之職也今有司駮奏遽令分析是使之較是非争勝負交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章并司農奏宣示百官考定當否如臣言有取幸早施行若稍渉欺罔甘就竄逐奏入不報公謂主上天資英睿孜孜聽納而大臣輔導之非是懷不能已明日復上䟽曰陛下起居言動躬蹈德禮夙夜勵精以親庶政天下未至於安治者誰致之耶陛下注意以望太平而自以太平爲己任得君專政者是也二三年間開闔動揺舉天下無一物得安其所者蓋自青苗之議起而天下始有聚歛之疑青苗之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未艾而助役之事興其間又求水利也又淤田也又省併州縣也其議財則市井屠販之人皆召而登政事堂其征利則下至暦日而官自鬻之推此而徃不可究言至於輕用名器淆混賢否忠厚老成者擯之爲無能俠少獧辯者取之爲可用守道憂國者謂之流俗敗常鑿民者謂之通變凡政府謀議經畫除用進退獨與一掾屬論定然後落筆同列與聞反在其後故奔走乞丐之人其門如市今羗夷之欵未入反側之兵未安三邊創痍流潰未定河北大旱諸路大水民勞財乏縣官減耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也居數日罷御史落館職政府擬竄嶺外上不聽乃貶衡州公奏言上丗葬將陵歲有川患方護諸䘮抵鄆州葬有日伏望寛貸使臣葬畢奔赴貶所有旨聽許行實又聞見録曰楊元素爲中丞與劉摯言助役有十害王荆公使張琥作十難以詰之琥辭不爲曽布曰請爲之仍詰二人向背好惡之情果何所在元素惶恐請白臣愚不知助役之利乃尔當伏妄言之罪摯奮曰爲人臣豈可壓於權勢使人主不知利害之實即復條對布所難者以伸前議且曰臣所向者陛下所背者權臣所好者忠直所惡者邪姦臣今獲罪譴逐固自其分但助役終爲天下之患害願陛下勿忘臣言於是元素出知鄭州摯責監臨琥亦由此忤荆公意坐事落修注公在南都幕府㑹司農寺行新令盡斥賣天下祠廟依坊埸河渡法収浄利南都閼伯廟歲爲錢四十六貫微子廟十二貫公嘆曰一至於此徃見留守張公方平曰獨不能爲朝廷言之耶張公矍然因託公爲奏曰閼伯遷此商丘主祀大火火爲國家盛德所乗歴丗尊爲大祀微子宋始封之君開國此地夲朝受命建號所因又有雙廟者唐張廵許逺孤城死賊能捍大患今若令承買小人規利冗褻瀆慢何所不爲歲収㣲細實損大體欲望詳酌留此三廟以慰邦人崇奉之意神宗即日批曰辱國瀆神此爲甚者速令行下更不施行司農寺官吏令開封府取勘行實哲宗皇帝嗣位宣仁聖烈皇后以祖母共政見連歲水旱西邊未寜百姓勞弊而國有大故當務休息遂散遣京城役夫減皇城司覘者廢物貨埸罷户馬等事皆從中岀又戒勑中外無敢苛刻擾民已而進退大臣選用臺諌擢公爲侍御史公自熈寜以言去位踰十六年乃復任言責閱天下事乆思所以報稱於是上䟽曰昔者周成王㓜冲踐阼師保之臣周公太公其人也仁皇帝盛年嗣服用李維晏殊爲侍讀孫奭馮元爲侍講聽斷之暇召使入侍陛下春秋鼎盛在所資養願選忠信孝悌淳茂老成之人以充勸講進讀之任便殿燕坐時賜延對執經誦說以廣睿智仰副善繼求治之志行實公又言諌官御史貟缺未𥙷監察雖滿六貟專以察治官司公事而不與言責臣請増𥙷臺諌並許言事行實神宗皇帝靈駕發引前一夕山陵使蔡確不入宿公彈劾其罪以聞不報確使回赴内東門朝見訖即日視事公又奏確不引咎自劾乞罷其政事以明典憲無何確上表自陳其略云蓋甞請収拔當丗之耆艾以陪輔王室蠲省有司之煩碎以慰安民心大意謂垂簾以來多所更改皆其建請公以謂使確誠有是事不言於先朝爲不忠之罪於今日爲取容之計誠無是事則欺君莫大於此因上䟽論其惡謂確當去其罪大略有十又論章惇凶悍輕侻無大臣體皆罷其位行實神宗更新學制養士以千數然有司立爲約束過於煩宻人情病焉乆未之改公上䟽謂學校爲育材首善之地教化所從出非行法之所雖群居衆聚帥而齊之不可無法亦有禮義存焉而已先皇帝體道制法超漢軼唐養士之盛比隆三代然而比以太學屢起獄訟有司縁此造爲法禁煩苛愈於治獄條目多於防盗上下疑貳以求苟免甚可恠者博士諸生禁不相見教諭無所施質問無所從月廵所隷之齋而已齋舎旣不一隨經分隷則又易博士兼廵禮齋詩博士兼廵書齋所至備禮請問相與揖諾亦或不交一言而退以防私請以杜賄賂夫學政如此豈先帝所以造士之意哉夫治天下者遇人以君子長者之道則下必有君子長者之行而應乎上若以小人犬彘遇之彼將以小人犬彘自爲而况以此行於學校之間乎願罷諸生不許相見之禁聽其在學徃還即有饋受自依勑律其餘見行科條委夲監長貳與其屬看詳増損著爲定制行實公旣𬒳遇知無不言姦佞刻薄之吏事狀顯著公皆正色彈劾多所貶黜中外肅然時人以比包希仁吕獻可上察其忠義誠信可屬重任未幾遂大用焉劉大諫撰公文集序諌官王覿論胡宗愈除右丞非是䟽奏不巳二聖怒將重責宰相開陳不聽公復進說甚力簾中厲聲曰若有人以門下侍郎爲姦邪甘受之否公頓首謝曰陛下審察毀譽每如此天下幸甚然願朝廷頋大體宗愈進用自有公議必致陛下逐諌官而後進恐宗愈亦非所願文彦博曰劉摯言是願賜聽覽遂免重責改職補外而已行實公與同列奏事因論人才大槩公奏曰人才難得臣甞歴觀士大夫間能否不一性忠實而有才識上也才雖不髙而忠實有守次也有才而難保可借以集事又其次也懷邪觀望隨勢改變此小人終不可用二聖諭曰此言極是卿等常能如此太皇官家何所憂也行實哲宗在講筵一日讀仁宗不避庚戍臨奠張士遜侍讀說曰國朝故事多避國音夲朝角音火也故畏庚辛上頋問執政果當避否公進曰隂陽拘忌之說聖人不取如正月祈榖必用上辛此豈可改也漢章帝以反支日受章奏唐太宗以辰日哭張公謹仁宗不避庚戍日皆陛下所冝取法上深然之行實公在中書一日内降畫可二狀其一裁節宗室冗費其一減定六曹吏額房吏請封送尚書省公曰常時文書録黄過門今封送何也對曰尚書省以吏額事每奏入必徑下夲省巳乆今誤至此公曰中書不知其它當如法令遂作録黄𥘉尚書令史任永壽精悍而猾與三省吏不相能數以姦弊告諸宰執吕丞相大防信任之時户部裁節浮費後省裁定吏額皆踰年未就吕丞相專權很愎盡取其事置吏額房於都省召永壽輩領之未甞謀及同列也永壽見録黄愕曰两省𥘉不與今乃有此即禀丞相命两省各選吏赴局同領其事以是白公公曰中書行録黄法也豈有意與吏爲道地今乃使就都省分功何邪明日吕相䄂藁厲色示公曰勢不可不爾公不欲立異勉應曰諾其後事畢永壽等以勞進官有差於是外議喧然不平臺諌交章論列時公已遷門下每於上前開陳吏額夲末此皆𬒳省者鼔怨言章風聞過實不足深遂吕丞相亦以語客曰使上意曉然者劉門下力也然自此忌公益甚隂謀去之遂引楊畏在言路諌官䟽其姦邪反覆章十餘上竟不能回士大夫趍利者洶洶交訌其事於是朋黨之論起矣公語丞相曰吾曹心知無他然外議如此非朝廷所冝有願少引避丞相曰行亦有請是歲八月一日奏畢少留奏曰臣乆處近列器滿必覆願賜骸骨避賢者路上遣中使召公入對太皇太后諭曰侍郎未可去須官家親政然後可去使者數輩趣入視事公不得已受命頃之吕丞相亦求退不許明年公繼爲丞相不滿歲前日洶洶者在言路詆公竟去位朋黨之論遂不可破集序選后未决簾中諭曰所選百餘家矣皆於隂陽家不合獨一家可用復有二事未安一事女是庶岀二事嫡母悍妬女生三歲而逐其所生母遂鞠於伯氏今以所生爲父母耶所養爲父母耶或對曰女無出繼之理當正其夲生父母似無足疑若庶出則國朝已有明德皇后故事公進曰以春秋傳言之夫婦之子妾婦之子皆合備采擇之數以禮言之則必著外祖官氏者明當用嫡也况明德皇后乃太宗在藩邸時取以爲妃非天子納后故事衆皆助公語上深然之行實公輔政累年剛明重厚逹於治道朝廷頼之及爲相益緫大體務守法度輔佐人主於無過之地其於用人先器識後才藝進擬之際必察其人性行厚薄終不輕授以職任故才名之士或多怨公公知之不恤也取人不問識與不識或多南士有以蕭望之鄭朋事諌公笑而不荅論者謂元祐以來能以人物爲意知所先後而無適莫者公爲之首奏事上前言直事核不爲縁飾多見聽用與同列語公平不欺未甞以私屬人人有所欲多憚公聞之公聞之亦爲盡力然終不以語也精力絶人逺甚一見賔客及聞其語終身不忘事無劇易臨之曉然省吏毎以事試公不以乆近區處如一言皆可復故三省事經公所裁定者後皆遵用莫能改云集序言者論公交通邢恕及章惇子牢籠小人爲異日計公心知爲言者所中不復自明謝曰臣愚闇招致人言願就貶責旣退固請益堅乃罷相以殿學士守鄆給事中朱光庭駮奏謂劉摰忠義自奮朝廷擢之大位一旦以疑而罷天下不見其過遂并罷知亳州𥘉邢恕謫官過京師以書抵公公荅以手簡云爲國自愛以俟休復㑹茹東濟爲排岸官其人數有求而公不與怨甚適見公簡隂録其語以示中丞鄭雍侍御史楊畏二人方論奏公未竟乃解釋其語繳上之曰以俟休復者俟它日太皇太后復辟也又章惇諸子故與公之子游間一到府第相見或隨衆客公亦見之故言者謂公延見納預爲牢籠以兾後福云行實又王彦霖繫年録云延和奏事宻院再上因奏前日臣有短見奏陳不知曽經覽否應曰見臣之區區不爲一劉摯蘇轍爲陛下惜腹心之人腹心之人難得去了一箇無一箇諭曰劉摯垂簾之𥘉㬠有功排斥姦邪言事忠直太皇心裏㬠重它只爲邢恕過京通柬及接見章惇子弟當面問它來它皆言是曽樞宻且道是一箇朝廷怪責厎人却與書東通消息送好心後得不得余曰蔡確發毒便劉摰分付右僕射與也牢籠不得應曰樞宻道厎便是也蔡確便教做宰相也則牢籠不得余曰陛下旣見得却教做宰相也牢籠不得如何尋常一箇東帖可以牢籠願陛下更加體照又諭曰太皇亦不深罪他也爲它垂簾之𥘉有功只爲這件事到了不合余曰此則誠是劉摰少思慮不将來做事却做尋常人情事處來言事官未必皆忠直無心之人臣聞楊畏是吕惠卿靣上人簾中稍前再審再奏之因曰知它用意在甚處但看去除陛下腹心之人便是與姦邪開道路也陛下亦覺近來臺諌官莫太甚不便是臣等當日言蔡確章惇亦不曽如此今劉摰有甚事怎消得恁地逼逐願陛下更加照察且將此事更入思慮公天性髙明不以已長格物旣貴恭儉好禮不改平素淳靜嗜書自㓜至老未甞釋卷家藏書多皆自讎校得善夲或手鈔録孜孜無倦平居不親妾媵家事有無不以經意雖在相府蕭然一室其後南遷不知者謂公不堪其憂親族門人乃知公謫居自奉簡約與在相府無以異也少好禮學講究三禮視諸經尤粹晚好春秋考諸儒異同辨其得失通聖人經意爲多公文章雅健清勁如其爲人辭逹而止不爲長語表章書䟽未甞假手集序公教子孫先行實後文藝每曰士當以器識爲先一號爲文人無足觀矣行實公自青社罷職知黄州又分司徙蘄州語諸子曰上用章丞相吾勢當得罪若章君頋國事不遷怒百姓但責吾曹死無所恨第恐意在報復法令益峻奈天下何憂形於色𥘉無一言及遷謫也嶺表之謫公拜命即日就道惟從一子家人涕泣願侍皆不聽水陸犇馳見星乃止至貶所屏跡不交人事亦無書自隨宴坐静黙家人具饌告之食則食喜怒不形意澹如也公年未五十即屏嗜慾晚歲南遷氣貌安強無衰悴之色集序公居新州數月得㣲疾自謂將終戒飭後事精神不亂安卧而薨公旣殁於嶺外所屬爲公請歸葬於朝不許已而諸子坐廢家屬再徙佗郡而不著罪狀人無知其故者雖公家亦不知也今上登極大赦天下公旣歸葬而文及甫蔡渭皆貶湖外然後人稍知其事起於此𥘉及甫持䘮在洛陽邢恕責永州未赴亦以䘮在懷州數通書有怨望語及甫又以公任中司甞彈罷其左司郎官怨公尤深以書抵恕其略曰改月遂除入朝之計未可必當塗猜怨於鷹揚者益深其徒實繁司馬昭之心路人所知也濟之以粉昆必欲以眇躬爲甘心快意之地可爲寒心大意謂服除必不得京師官當求外𥙷故深詆當路者紹聖初恕以示蔡碩蔡渭渭數上書訟吕丞相及公而下十餘人䧟害其父確謀危宗社引及甫書爲驗朝廷駭之委翰林學士蔡京御史中丞安惇究治焉遂逮及甫就吏而所通初無事證但託以亡父曽說之究治所問司馬昭謂誰及甫對意謂公也問其證據事狀則曰無有但疑其事勢心意如此朝廷照知其妄獄事遂緩㑹公薨聞猶用蔡京奏以不及考驗爲辭但坐諸子而巳時紹聖五年五月四日也其後諸子叙復護䘮還郷里公嗣子跋徑伏闕下上䟽訴其事又持副封詣都堂叩宰相韓忠彦曽布等皆取實封案牘閱視知其謬妄明白具以語跋至建中靖國元年二月二十五有旨文及甫蔡渭所陳顯無實狀巳行貶責紹聖五年五月四日指揮更不施行然後公殁後䜛謗所坐皆得解釋渭今改名懋云集序又行實云究治所問及甫司馬昭謂誰及甫對意謂公也問其證據事狀則曰無有但執政五年而未作相必有怨望疑其事勢心意如此又問粉昆謂誰及甫對粉昆謂王巖叟靣白如粉昆謂梁燾字况之况猶兄也𥘉議者傳聞及甫怨詈之語固知不實然謂爲司馬昭必以呂丞相大防獨當國乆或以爲謗而及甫獄詞乃以指公又粉昆者丗以駙馬都尉爲粉侯故王克臣縁子師約人稱爲粉爹今韓嘉彦尚主必以兄忠彦爲粉昆而及甫乃指巖叟燾蓋及甫元祐末稍被進用吕丞相除爲權侍郎心甚德之而忠彦是時雖罷樞府上眷未衰王梁或貶或死易以陵藉故及甫隂自移其𥘉意委曲遷就獨指公及王梁人皆知其妄朝廷亦覺悟獄事遂緩二之三丞相李文靖公公名沆字太初洺州人太平興國五年擢進士甲科召試除右𥙷闕知制誥淳化二年拜給事中叅知政事四年罷眞宗升儲以爲太子賔客詔東宫待以師傅禮咸平初以中書侍郎平章事景德元年七月薨年五十八乾興初詔配饗眞宗廟庭雍熈中王化基上封自薦太宗謂宰相曰李沆宋湜皆嘉士也即命中書并召試並除右𥙷闕知制誥李沆嘗侍曲宴太宗目送之曰李沆風範端凝眞貴人也俄除叅知政事蒙求趙保吉乆叛朔方危蹙中外咸以爲靈州乃必争之地苟失之則縁邊皆驚上訪於李文靖公公曰繼遷不死靈州非朝廷有也莫若遣使宻召州將使部分軍民空壘而歸則關右之民息肩矣未幾靈州果䧟李文靖公沆爲相王魏公旦方叅預政事時西北隅尚用兵或至旰食魏公嘆曰我軰安能坐致大平得優㳺無事耶文靖曰少有憂勤足爲警戒它日四方寧謐朝廷未必無事其後北狄講和西戎納欵而封岱祠汾蒐講墜典靡有暇日魏公始歎文靖之先識過人逺矣歸田録又涑水記聞曰眞宗旣與契丹和親王文正公問於李文靖公日和親何如文靖曰善則善矣然邊患旣息恐人主漸生侈心耳文正亦未以爲然及眞宗晚年多事廵遊大脩宮觀文正乃潜歎曰李公可謂有先知之明矣又龍川志云眞宗初即位李沆爲相王旦叅知政事沆日取四方水旱盗賊奏之旦以爲細事不足煩上聽沆曰人主少年當使知四方艱難不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此此叅政它日之憂也及旦親見王欽若丁謂等所爲欲諫則業巳同之欲去則上遇之厚不忍去乃歎曰李文靖眞聖人也李沆在相位接賔客常寡言馬亮與沆同年生又與其弟維善語維曰外議以大兄爲無口匏維乗間嘗逹亮語沆曰吾非不知也然今之朝士得升殿言事上封論奏了無壅蔽多下有司皆見之矣若邦國大事北有強虜西有戎遷日旰條議所以備禦之䇿非不詳究薦紳中如李宗諤趙安仁皆時之英秀與之談猶不能啓發吾意自餘通籍之子坐起拜揖尚周章失措即席必自論功最以希寵獎此有何䇿而與之接語哉苟屈意妄言即丗所謂籠罩籠罩之事僕病未能也爲我謝馬君沆常言居重位實無𥙷萬分唯中外所陳利害一切報罷之唯此少以報國爾朝廷防制纎悉備具或徇所陳請施行一事即所傷多矣陸象先曰庸人擾之正此謂也憸人苟一時之進豈念於民耶談苑眞宗初即位李沆爲相帝雅敬沆嘗問治道所冝先沆曰不用浮薄新進喜事之人此最爲先帝問其人曰如梅詢曾致堯等是矣帝深然之故終帝丗數人者皆不進用時梅曾皆以才名自負嘗遣致堯副温仲舒安撫陜西致堯於閤門䟽納仲舒言不足與共事輕銳之黨無不稱快然沆在中書不喜也因用它人副仲舒而罷致堯故自眞宗之丗至仁宗初年多得厚重之士由沆力也龍川别志又東坡志林云眞宗時或薦梅詢可用者上曰李沆甞言其非君子時沆之没蓋二十餘年矣歐陽文忠公甞問蘇子容云宰相没二十年能使人主追信其言以何道子容言獨以無心故耳軾謂陳執中俗吏耳特以至公猶能取信王上况如李公之才識而濟之無心耶先生言眞宗問李文靖曰人皆有宻啓而卿獨無何也對曰臣待罪宰相公事則公言之何用宻啓夫人臣有宻啓者非讒即佞臣常惡之豈可効尤因言祖宗時宰相如此天下安得不治龜山語録李文靖公爲相時眞宗嘗夜遣使持手詔問欲以某氏爲貴妃如何公對使者自引燭焚其詔書附奏曰但道沆以爲不可其議遂寢書曰成王畏相其此之謂乎吕氏家塾記冦萊公始與丁晉公善嘗以丁之才薦於李文靖公屢矣而終未用一日萊公語文靖曰比屢言丁謂之才而相公終不用豈其才不足用邪抑鄙言不足聽邪文靖曰如斯人者才則才矣顧其爲人可使之在人上乎萊公曰如謂者相公終能抑之使在人下乎文靖笑曰它日後悔當思吾言也晚年與冦權寵相軋交互傾奪至有海康之禍始伏文靖之識東軒筆録李文靖公作相常讀論語或問之公曰沆爲宰相如論語中節用而愛人使民以時兩句尚未能行聖人之言終身誦之可也聞見録李丞相沆重厚淳質言無枝葉善屬文識治體好賢樂善爲丞相有長者之譽頗通釋典尤厭榮利丗務罕以嬰心其自奉甚薄所居陋巷㕔事無重門其偪下已甚頽垣壞壁沆不以屑慮堂前藥欄壞妻戒守舎者勿令葺以試沆沆朝夕見之經月終不言妻以語沆沆笑謂其弟維曰豈可以此動吾一念哉家人勸治居第未嘗荅維因語次及之沆曰身食厚禄時有横賜計囊裝亦可以治第但念内典以此丗界爲缺䧟安得圎滿如意自求稱足今市新宅須一年繕完人生朝暮不可保又豈能乆居巢林一枝聊自足耳安事豐屋哉後遇疾沐浴右脅而逝時盛暑停屍七日室中無穢氣亦履行之報也談苑公沉厚寡言内行脩謹識大體居位謹宻不求聲譽所居湫隘處之晏然未嘗問家事退公終日危坐未嘗跛倚性直諒有守駙馬都尉石保吉求爲使相仁宗以問公公曰賞典之行湏有所自保吉因縁戚里無攻戰之勞台席之拜恐騰物論它日再三詢之執議如初遂寢其事及公薨數日乃卒拜焉公在相府動遵詔條不可干以私然人有請求無所辨明旣抑退失望則歸咎焉公亦不介意也故尚書張詠嘗謂人曰吾牓中得人最多謹重有雅望無如李文靖深沉有德鎮服天下無如王公面折庭争素有風采無如冦公當方面寄則詠不敢辭王文正公遺事元城先生論夲朝名相最得大臣體者惟李沆丞相或曰何以明之先生曰李丞相毎謂人曰沆在政府無以𥙷報國家但諸處有人上利害一切不行耳此大似失言然有深意且祖宗之時經變多矣故所立法度極是穩便正如老醫看病極多故用藥不至孟浪殺人且其法度不無小害但其利多耳後人不知遂欲輕改此其害所以紛紛也李丞相毎朝謁奏事畢必以四方水旱盗賊不孝惡逆之事奏聞上爲之變色慘然不恱旣退同列以爲非問丞相曰吾儕當路幸天下無事丞相毎奏以不美之事以拂上意然又皆有司常行不必面奏之事後告巳之公不荅數數如此因謂同列曰人主一日豈可不知憂懼也若不知憂懼則無所不至矣惟此兩事最爲得體在漢之時惟魏丞相能行此兩事以爲古今異制方今務在奉行故事而已奏故事詔書凢二十三事敕掾史案事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡不上相輙奏言之此最爲得宰相大體後之爲宰相者則或不然好逞私智喜變祖宗之法度欺蔽人主惡言天下之災異喜變法度則綱紀亂惡言災異則人主驕此大患也元城先生語録李文靖公爲相治居第於封丘門内聽事前僅容旋馬或言其太隘公笑曰居第當傳子孫此爲宰相聽事誠隘爲太祝奉禮聽事巳寛矣温公訓儉
