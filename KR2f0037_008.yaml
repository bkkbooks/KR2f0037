body:
  text: 十之三中書侍郎傅獻簡公公名堯俞字欽之鄆州須城人未冠登進士第知蔡州新息縣用薦者爲監察御史裏行英宗即位進殿中侍御史遷右司諌同知諌院出知和州神宗𥘉召還丁憂服除直昭文館同判流内銓遷三司塩鐵副使出知江寜府两嵗間凢五易郡遂丐閑局得提舉西京嵩山崇福宫坐事落職奪官監衛州黎陽縣倉草埸哲宗即位召爲祕書少監兼侍講擢給事中吏部侍郎御史中丞遷吏部尚書兼侍讀元祐四年爲中書侍郎在位薨年六十八公𥘉登第時徂徠先生石介毎過公公來甞不在介問曰君少年登科不以游嬉爲娱獨閉門不出何也公對曰性不憙嚻雜非有它也介歎息大竒之旣仕益學問其在洛孟擇其士之賢者皆折節與交相課治經史毎數日一置酒論難間各靣攻其短識者遂知其爲逺器范忠宣公撰墓記公爲御史諌官四年所上百六十餘章多觸忌諱抵權倖名重朝廷而風節凛然聞於天下墓誌兖國公主嫁李御舊名爲内臣梁懷吉張承照所間不相中天子斥二人於外無幾何詔還二人主家而出御舊名衛州公上䟽言逐主壻而還隷臣悖禮爲四方笑且陛下後何以誨諸女乎墓誌皇城司卒宻奏言富人甞殺人有司鞠問無狀願得卒詰所從而内侍主者留不遣公言臣料陛下必不惜此人意恐將不復聞外事耳臣以謂陛下付有司辨其是非而賞罰之則事上聞者皆實乃所以聞外事也今縱之使言不問虚實則貨賄行而是非亂矣雖刺告盈前亦何益哉墓誌仁宗春秋髙未立嗣公上䟽請建宗室之賢以繫天下望及英宗爲皇子有司闕供饋而仁宗未之知也公建言陛下旣以宗社之重建皇嗣冝一切以家人禮使皇子朝夕侍饍左右以通慈孝之誠今禮遇有闕非所以隆親親重國本也於是詔有司供具甚厚墓誌内侍朱晦子頴士以内降監汳口而都水監復薦之公言樞宻院旣不治頴士求内降罪而都水又安知其可任而舉之且汳口嵗興大役責亦甚重今上下相結迭相阿徇其盗陛下名器將不但一汳口而已也後旣罷頴士公又屢請治樞宻都水罪以戒欺罔内侍趙繼寵以董淑妃故越次得勾當天章閣蔡丗寜取内藏庫珠私示内人公皆乞治其罪乆之未聽則又曰忠義之言日切而陛下不亮權倖之交日深而陛下不察自夏至今如朱頴士等已三犯法内侍省法且盡廢矣章各數上每上益切權倖憚焉墓誌時國用乏言利者争獻計冨國公奏曰今度支歳用不足誠不可忽欲救其弊陛下冝躬自儉刻身先天下無奪農時勿害啇旅如是可矣不然徒欲紛更爲之無益聚歛者用則天下治矣墓誌京師大雨踰月郡國多水災公上書請詔百官言事未聽又上書曰陛下不以臣言爲然不過以水災歸之天數而已臣請以政事明之大理誤斷鄭州嚴奕獄巳决輙請對舉覺法官不得首誤法也今審刑大理匿法罔上而乾剛未奮陽明未融亦致異之一端也墓誌英宗𥘉即位有疾皇太后同聽政至是上疾平公上書請天子聽政又再上䟽太后請還政天子未聽乆之頗聞内侍任守忠有惎間語公又上䟽太后曰天下之可信者無大於以天下與人亦無大於受天下於人殿下今日誅竄䜛人則慈孝之聲並隆於天下矣於是太后遂還政而逐守忠等公復奏䟽天子謂皇太后給事左右之人冝頗録其勤勞少加恩惠以上慰母后下安反側且守忠旣去其餘一切不問可也墓誌神宗爲淮陽王公上言王年踰志學尚居中禁臣願俾之出館稍親諸務問安内寢著爲定規然後飲食起居必有常度左右前後皆用正人墓誌遷右司諌每對輙移時或督使言事方是時天子雖躬庶政而猶退託任大臣公言大臣之言非是陛下偶以爲然而行之可也審其非矣從而徇之則人主之柄安在臣願君臣之際是是非非母相靣從揔覽衆議無所適莫則威柄歸陛下矣墓誌甞論事上不從因曰卿何不言蔡襄公對曰若襄有罪陛下何不自朝廷意正典刑責之安用臣等言上曰欲使臺諌言其罪以公議出之公曰若付之公議臣但見蔡襄辦山陵事有功不見其罪臣身爲諌官使臣受旨言事臣不敢龜山語録陜西言近邊熟户頗逃失詔以内侍李若愚等爲陜西四路鈐轄專使招納嵗一入奏事公以謂此安撫經略使職也且若愚等陛下不信其言則如不用言必見從則邊帥之權遂移於四人矣尋罷之墓誌大臣有建言濮安懿王冝稱皇考公曰此於人情禮文皆大謬戾是必邪人有爲爲之即上䟽争其非且願與建議之人廷辦邪正又與侍御史知雜事吕誨等同上十餘䟽言極切至主議者知天下恟恟不可遏遂易考稱親公又言親非父母而何亦不可也夫恩義大端存亡一也先帝旣以陛下爲子當是之時設濮王尚無恙陛下得以父名之乎又因水災上書言簡宗廟則水不潤下今以濮王爲皇考於仁宗之廟簡孰甚焉又陳十事皆當丗要務俄命公與趙瞻使契丹而吕誨吕大防范純仁皆罷復除公侍御史知雜事公還五拜䟽論列益急必求罷去英宗靣留公公言誨等已逐臣義不當止願得罪去因再拜辭上愕然曰是果不可留也不得巳出公知和州墓誌公在英宗時最𬒳眷遇甞雪中賜對公自東廡升上傾身東向以待毎奏事退常目送之故言多見聽甞曰卿最知朕一日奏事殿中上曰多士盈廷孰忠孰邪公曰大忠大佞固不可移中人之性繫上所化上敬納其言墓誌熈寜三年王安石新用事方變法令公以母䘮服除至京師安石素善公謂公曰舉朝紛紛今幸公來巳議以待制諌院奉還矣公謝曰恩甚厚但恐與公所謂新法者相妨耳且爲言新法之不善者安石大怒乃以爲直昭文館權同判流内銓行狀傅堯俞權塩鐵副使堯俞𥘉除服入都未見介甫介甫屢召之旣見語及青苗堯俞以爲不便介甫即不悅自是惡之及此除命介甫以爲資淺且令權發遣曽公以爲堯俞曽任知雜御史資不淺乃正除副使介甫退有宻啓明日勑巳降閤門有旨復収入晚批出與權曽公復争之上曰堯俞知雜不到官且爲人弛慢曽公請弛慢之狀上曰觀其面即見弛慢之狀温公日録出爲河北轉運使未行改知江寜府又改許州數月再除江寜移河陽又移徐州凢再閱嵗徙五郡公自知不爲時所容而持權者欲困公以奔走因請閑局得提舉崇福宫㑹在徐時或告狂人言天文休咎疑爲變公以事未白不受辭後狂人竟伏誅公坐不即捕落職奪官方獄大起所連逮甚衆或至惶懼自殺而公處之自如家人未甞見憂色復起居舎人監衛州黎陽倉草埸郡掾行縣公同邑官出迎拜謁甚恭郡守檄邑官代公治出納公不可曰居其官不可以曠職雖祈寒隆暑必躬坐庾中治事不少懈墓誌哲宗登極除御史中丞即上䟽言陛下使臣拾遺𥙷闕以輔盛徳明善正失以平庶政舉直錯枉以正大臣臣請極其力以死繼之若夫窺人之私擿其細故此非臣之志也願陛下御名終如始則天下幸甚墓誌御史張舜民論事語及大臣罷去公與侍御史王岩叟力争之章七上不報除吏部侍郎不受命求外𥙷乃出知陳州行狀召還復爲中丞㑹蔡確貶新州自宰執侍從以下罷去者凡七八人而御史府爲之一空遣使押公就職公徐進言曰確之罪自絶於天陛下旣屈典刑矣然臣之愚恐雖聖度如天亦或有所未能平者夫事至而應之以無心事徃若未甞經意者此聖人所以養至誠而御遐福也願陛下寛聖心省浮念誠陛下之氣和則上下之氣和而天地之和應矣且確黨之尤者固冝貶逐其餘一切置之以安反側則天下幸甚行狀拜中書侍郎論事率由大公而未甞容心其薦引多得吉人良士及薨太皇太后諭近臣曰傳侍郎清直一節終始不變金玉君子人也嗟惜乆之两宫皆幸其第哭之慟墓誌公性純厚貌重氣和而寡言其遇人不設城府與人語唯恐傷之至當言職論事上前亹亹不窮正直確切無所回隠左右爲懼而公益安徐不見聽終不巳平生自奉養甚約室無媵妾食才脫粟一肉所用服器雖敝敗不易篤於孝友家事付昆弟得任子恩亦先推與之爲守令本於豈弟而能擊姦豪以安良民其在徐前守侵用公使錢公寖爲償之未足而公罷後守反以文移公當償千緡公竭資且假貸償之乆之鈎攷得實公蓋未甞侵用也公卒不辨其容物不校類如此故司馬温公甞歎曰清直勇三徳吾於欽之畏焉洛之君子邵雍曰欽之至清而不耀至直而不激至勇而能温此爲難爾人以雍言爲然墓誌公在上前吐論激切事已則終不復言出爲和州也通判楊洙乗間問曰公以直言斥居此何爲言未甞及御史時事公曰前日言職也豈得巳哉今日爲郡守當宣朝廷羙意而反呫呫追言前日之闕政與誹謗何異行狀十之四徂徠石先生先生名介字守道兖州奉符人進士及第歷鄆州南京推官御史臺辟主簿未至以論赦書不當求五代及諸僞國後罷爲鎮南掌書記侍父逺官爲嘉州判官丁外内艱服除入爲國子監直講擢太子中允直集賢院岀通判濮州未至卒年四十一石守道學士爲舉子時寓學於南都其固窮苦學丗無比者王侍郎瀆聞其勤約因㑹客以盤餐遺之石謝曰甘脆者亦介之願也但日饗之則可若止得一餐則明日何以繼乎朝饗膏梁暮厭粗糲人之常情也介所以不敢當賜便以食還王咨重之倦遊録徂徠石守道常語學者曰古之學者急於求師孔子大聖人也猶學禮於老聃學官於郯子學琴於師襄矧其下者乎後丗恥於求師學者之大蔽也乃爲師說以喻學者是時孫明復先生居太山之陽道純德備深於春秋守道率張洞北靣而師之訪問講解日夕不怠明復行則從升降拜起則執杖屨以侍二人者乆爲魯人所髙因二人而明復之道愈尊於是學者始知有師弟子之禮澠水燕談先生丁父憂垢靣跣足躬耕徂徠山下葬五丗之未葬者七十䘮以易教授于家及爲直講學者從之甚衆太學由此益盛慶曆三年吕夷簡罷相夏竦罷樞宻使而杜衍章得象晏殊賈昌朝范仲淹冨弼韓琦同時執政歐陽脩余靖王素蔡襄並爲諫官先生喜曰此盛事也歌頌吾職其可已乎乃作慶曆聖德詩略曰衆賢之進如茅斯抜大姦之去如距斯脫衆賢謂衍等大姦斥竦也詩且岀泰山先生見之曰子禍始於此矣先生不自安求岀通判濮州澠水燕談云聖德詩云維仲淹弼一夔一卨又曰琦器魁櫑豈視扂楔可屬大事重厚如勃其後冨范爲宋名臣而魏公定䇿兩朝措天下於太山之安人始歎先生之知人先生非隱者其仕甞位於朝矣然魯之人不稱其官而稱其德以爲徂徠魯之望先生魯人之所尊故因其所居山以配其有德之稱曰徂徠先生者魯人之志也先生貌厚而氣完學篤而志大雖在畎畒不忘天下之憂以謂時無不可爲爲之無不至不在其位則行其言吾言用功利施於天下不必出乎已吾言不用雖獲禍咎至死而不悔其遇事發憤作爲文章極陳古今治亂成敗以指切當丗賢愚善惡是是非非無所諱忌丗俗頗駭其言由是謗議喧然而小人尤嫉惡之相與岀力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣歐陽公撰墓誌先生爲文博辯雄偉而憂思深逺其爲言曰學者學爲仁義也惟忠能忘其身惟篤於自信者乃可以力行也以是行於己亦以是教於人所謂堯舜禹湯文武周公孔子孟軻楊雄韓愈氏者未嘗一日不誦於口思與天下之士皆爲周孔之徒以致其君爲堯舜之君民爲堯舜之民亦未嘗一日少忘于心至其違丗驚衆人或笑之則曰吾非狂癡者也是以君子察其行而信其言推其用心而哀其志墓誌天聖以來穆伯長尹師魯蘇子美歐陽永叔始唱爲古文以變西崑體學者翕然從之其有楊劉體者人戯之曰莫太崑否石介守道深疾之以爲孔門之大害作怪說二篇上篇排佛老下篇排楊億於是新進後學不敢爲楊劉體亦不敢談佛老後歐陽公蘇公復主楊大年吕氏家塾記石介旣卒夏英公言於仁宗曰介實不死北走胡矣㝷有㫖編管介妻子於江淮又岀中使與京東部刺史發介棺以驗虚實是時吕居簡爲京東轉運使謂中使曰若發棺空而介果北走則雖孥戮不足以爲酷萬一介屍在未甞叛去即是朝廷無故發人塚墓何以示後丗耶中使曰誠如金部言然則若之何以應中㫖居簡曰介之死必有棺殮之人又内外親族及㑹葬門生無慮數百至於舉柩窆棺必用㓙肆之人今皆檄召至此劾問之苟無異說即皆令具軍令狀以保任之亦足以應詔也中使大以爲然遂自介親屬及門人姜潜以下并㓙肆棺殮舁柩之人合數百狀皆結罪保證中使持以入奏仁宗亦悟竦之譛尋有旨放介妻子還郷而丗以居簡爲長者東軒筆録又云夏竦之死也仁宗將徃澆奠吴奎言於上曰夏竦多詐今亦死矣仁宗憮然至其家澆奠畢躊蹰乆之命大閹去竦面羃而視之丗謂剖棺之與去面羃其爲人主之疑一也亦所謂報應者邪張安道雅不喜石介謂狂譎盗名所以與歐范不足至人目以姦邪一日謁曾祖至祖父書室中案上見介書曰吾弟何爲與此狂生遊又問黃景微何在聞前日狂生以羔鴈聘之不受何不與喫了羊着了絹一任作怪何足與之較辤受義理也曽祖除御史中丞固辤不拜石介以書與祖父以不拜爲非其略云内相爲名臣子容爲賢子天下屬望所繫非輕豈可以辤位爲廉張見者此書也蘇氏談訓歐陽公銘先生之墓曰徂徠之巖巖與子之德兮魯人之所瞻汶水之湯湯與子之道兮愈逺而彌長道之難行兮孔孟遑遑一丗之屯兮萬丗之光曰吾不有命兮安在乎桓魋與臧倉自古聖賢皆然兮噫子雖毀其何傷
