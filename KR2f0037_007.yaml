body:
  text: 內翰范公公名祖禹字淳甫成都華陽人中進士第知資州龍川縣司馬溫公辟同編修資治通鑑書成除袐書省正字哲宗即位擢右正言以親嫌改著作佐郎神宗實録檢討官遷著作郎兼侍講遷右諌議大夫兼實録修撰改禮部侍郎進翰林侍讀學士兼國史院事又為翰林學士兼侍講哲宗親政以龍圗閣學士知陜州紹聖𥘉提舉亳州明道宫繼責授武安軍節度副使永州安置再貶昭州別駕賀州安置移賔州再移化州卒年五十八公未生河南郡太君夢一偉丈夫被金甲至寢室曰吾故漢將軍鄧禹也既寤猶見之是日公生遂以為名𥘉字蘿得溫公以傳稱鄧仲華內文明篤行淳備改字淳曰或配甫子而稱之故字淳甫家傳公弱不好弄博學強記年十三通議河南君皆蚤丗叔祖忠文公撫育如已子公自以既孤每歲時親賔慶㑹慘怛若無所容閉門讀書未嘗預人事既至京師所與交逰皆一時聞人忠文每器之曰天下士也謂諸子曰三郎汝師也當取法焉公第三視忠文諸子為諸父行云家傳熙寧三年司馬文正公修歷代君臣事迹辟公同編修供職袐省時王荆公當國人皆奔競公未嘗往謁王安國與公友善嘗諭荆公意以公獨不親附故未進用公竟不往見家傳𥘉溫公又辟劉公攽劉公恕同修書及溫公歸洛詔聽以其屬自隨而二公各在官所獨公在洛溫公專以書局事屬之故公於此書致力為多是時冨韓公致事居洛韓公素嚴毅杜門罕與人接侍公獨厚疾篤召公以密疏授之大抵論王安石誤國及新法之害言極憤切韓公薨或疑以為不可奏公卒上之家傳元豐三年三月五日神宗晏駕六月七日公上疏言先王制禮以君服同於父皆斬衰三年蓋恐為人臣者不以父事其君此所以管乎人情也自漢巳來不唯人臣無服而人君遂亦不為三年之喪唯國朝自祖宗已來外廷雖用易月之制而宫中實行三年之服且易月之制前丗所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以大行在殯而百官有司容貌衣服無異於行路之人豈人之性如此其薄哉由上不為之制禮也今群臣易月而人主實行喪故十二日而小祥朞而又小祥二十四日而大祥再朞而又大祥夫練祥不可以有二也既以日而為之又以月而為之此禮之無據者也既除服矣至葬而又服之祔廟而後即吉才八月耳而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮既不可追且衰裳不可以服勤則斷以日月而易朝服以治事亦是也臣愚以為冝令群臣朝服止如今日而未除衰至朞而服之漸除其重者再期而又服之乃釋衰其餘則君服斯服可也至於禫不必為之服唯未純吉以至於祥然後無所不佩則三年之制略如古矣又論厚葬之禍乞於儉制之中更加損約未報又奏曰天子者天下之共主故其喪使天下共服之今朔望之禮群臣朝服以造殯宫是以吉服臨喪也人主獨以衰服在上是以先帝之服為人主之私喪也凡此二者皆禮之所不安也今欲風天下以忠孝莫如先正此禮然古者君臣居喪而行吉禮則服冕既畢禮則復衰今人主素服以聽朝而人臣朝服以治事亦古之遺法也唯群臣燕服當為之制朞年之內純用縞素小祥可以有色而漸加以緣使脫去朝服而猶知有喪則人情不可得而忘矣書曰三載四海遏密八音古者禮不下庶人唯遏密三年所以為君服也今祔廟之後群臣不樂而百姓無禁是殺禮以姑息習為俗樂之浮民而使人不知君臣之義也彼不為樂必有他業以養其生豈遽至於因窮哉臣以為禁之合於禮而無傷於俗請禁之便執政皆以為難唯溫公然之而議竟寢家傳公除正言客有言溫公以公在言路必能協濟國事溫公正色曰子謂淳夫見光有過不言乎殆不然也遺事公在書局分職唐史考其成敗治亂得失之迹撮其機要論次成書名曰唐鑑欲獻之神宗屬神宗已不豫未及上元祐元年上表進其書家傳又遺事云公諫疏多自毀去平生為文深不欲人知京師刋行唐鑑欲移文開封毀板冲力陳不可乃巳又云元祐中客有見伊川先生者几桉無它書唯印行唐鑑一部先生謂客曰近方見此書自三代以後無此議論崇寧中沖見欒城先生於頴昌欒城曰老來不欲泛觀書近日且且看唐鑑元祐𥘉伊川除崇政殿說書時公為著作佐郎實録院檢討伊川嘗謂溫公曰經筵若得范淳夫來尤好溫公曰他已修史朝廷自擢用矣伊川曰不謂如此但經筵須要他溫公問何故伊川曰頥自度乏溫潤之氣淳夫色溫而氣和尤可以開陳是非導人主之意其後除侍講遺事除兼侍講上疏太皇太后其略曰祥禫將終即吉方始服御器用內外一新奢儉之端皆由此始又况皇帝冨於春秋聖性未定覩儉則儉覩奢則奢所以輔養不可不御名陛下若崇儉朴以輔聖德使目不視靡曼之色耳不聽淫哇之音非禮不言非禮不動則學問日益聖德日隆此宗社無疆之福也臣聞奉宸庫已取珠子六十斤户部已用金至三千六百兩不為不多矣恐增加無巳滋長侈心故願預為之防止於未然家傳忠文公在許公謁告省覲上遣使宣問賜銀百兩仍頒手詔龍茶命公賫賜蜀公𥘉朝廷既相溫公申公詔起蜀公欲以門下侍郎處之蜀公以書問出處於公公以謂不當起蜀公得書大喜曰是吾心也凡吾所欲為者君實已為之矣何用復出又與親舊書云比亦欲出矣而三郎勸止遂已家傳神宗服除故事開樂置宴公言君子之於喪服以為至痛之極不得已而除之若以開樂故特設宴則似除服而慶賀非君子不得已而除之之意也請更不作宴唯因事則聽樂庶合禮意上從之家傳冬大寒禁中出錢十萬貫以賜貧民公言朝廷自嘉祐已前諸路皆有廣惠倉以救恤孤貧京師有東西福田院以收養老幼廢疾至嘉祐八年增置城南北福田院共為四院此乃古之遺法也然每院止以三百人為額則京師之衆孤窮者不止千二百人每遇太冬盛寒然後降旨救恤則民已凍餒死損者衆矣臣以為冝於四福院增蓋官屋以處貧民不限人數委左右廂提舉使臣預設方略救濟不必專散以錢計其存活死損以為殿最其天下廣惠倉乞更舉行令官吏用心振恤須要實惠及貧民上納用焉家傳講論語畢賜宴于東宫上遣中使賜御書唐人詩各一首宰執講讀官凡十有三人拜賜公表謝曰臣願陛下篤志學問亦如好書益進道德皆若遊藝又賦詩以獻退而節略尚書論語孝經要切之語訓戒之言得二百一十九事名曰三經要語進之家傳是夏權住進講公上疏其略曰陛下今日學與不學繫天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子欣慕願立於朝以直道事陛下輔助德業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取冨貴而專權利矣君子專於為義小人專於為利君子之得位欲行其所學也小人之得位將濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人之進學莫不在於年少之時陛下數年之後雖欲勤於學問恐不得如今日之專也臣竊為陛下惜此日月願以學為急則天下幸甚家傳除諌議大夫充實録修撰時吕申公巳薨公遂就職家傳蔡確既貶公上言聖人之道不過得中天下之事不可極意過中極意後必有悔用刑寧失之於寬不可失之於急寧可失之於略不可失之於詳自丁謂以來不竄逐大臣六十餘年今已用大刑四方聞之無不震聳其黨有素懷姦心為衆所知者固不逃於聖鑒自餘偏見異論者若皆以為黨確而逐之臣恐刑罰之失中人情之不安也又因登對勸上以辨邪正曰比年以來大臣以兼容小人為寬好惡不明邪正不分宰相以進賢退不肖為職而邪正不分豈不負國望戒大臣各以公心求賢多引鯁正之人以重朝廷無使小人得位為他日患家傳韓嘉彥已選尚公主公上言國朝舊制婚姻之家無預政事者今嘉彥尚主而忠彥執政此非祖宗故事不可為子孫法陛下念韓琦之功冨貴其家可也至於執政必選天下之望不可專以動舊自用忠彥巳來外議籍籍至今未巳今國家既與為執政以前人望不及范純仁自居大位純仁頓失人望是以大防比之差少過失然其為人粗踈果敢好立崖岸簡於接物士大夫多不親附自六曹尚書侍郎兩省侍從未聞宰相召一人問以職事陛下深居帷幄皇帝未親庶政尤不可使宰相權重昔真宗用王欽若丁謂必以馬知節參之今陛下專任大防而劉摰與大防協同此非相參之人也近用左右丞二人又皆人望素輕以臣料之自此廟堂論議必無異同朝廷一决於大防與摯無有敢違之者如此則公道何以得立惟陛下稍自攬權綱無使威福之柄漸移於下家傳范忠宣公之罷公嘗論列客有謂忠宣曰范淳夫亦有言何也忠宣曰使純仁在言路見宰相政事如此亦豈可默也遺事除給事中公復陳河事利害乞罷韓忠彥政事力辭然後就職即上言臣所領工房伏見朝廷應副修河司所須日有行下文字臣稽之於古考之於今質之於中外人言竊謂此功必不可成恐雖應副枉費國財民力有害無利大臣猶執前說遂降指揮且開減水河權罷修河然其後卒如公議家傳禁中下開封府覔乳母十人公偶以腹疾在告聞之即上疏皇帝曰陛下未建中宫而先近幸左右好色伐性傷於太早有損聖德無益聖體此臣之所甚憂也陛下今年十四嵗而生於十二月其實猶十三嵗此豈近女色之時乎陛下承天地宗廟社禝之重守祖宗百三十年基業為億兆之父母豈可不愛惜聖體哉又上疏太皇太后曰千金之家有十三嵗之子猶不肯使近女色而况於萬乘之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉臣嘗見司馬光言章獻明肅太后保護仁宗皇帝最為有法自即位已後未納皇后已前居處不離章獻卧內所以聖體完實在位最為長久章獻於仁宗此功最大臣考之國史仁宗在乳褓章獻使章惠太后護視章獻臨朝仁宗起居飲食章惠必與之俱所以保佑扶持恩意勤備今陛下臨朝日有萬事至於左右護視皇帝臣不知有如章惠者乎願陛下與皇太后皇太妃詳論此事戒飭保傅令以章惠為法如其不然女色爭進數年之後敗德亂政無所不有陛下雖欲悔之豈可及乎既而太皇太后喻宰臣吕大防以兩諌議及公所奏皆無是事且令公轉喻諌官公既病愈參告乃知之遂以喻諌官劉安世安世責公不言公言亦曾入一文字遂與劉公再入一疏見劉公事中家傳有詔選后并令侍從禮官講求禮制公上疏言四事一曰族姓二曰女德三曰隆禮四曰博議又與諸公討論講議約先王之禮參酌其冝為之禮上之及中宫𥘉建又解家人卦以獻家傳按文集𥘉欲以都亭驛為皇后行第皇帝服通天冠絳紗𫀆發冊公言皇后天下母不可以先居夷狄之館古者天子親迎蓋將以為天地宗廟社禝主故用祭服通天冠當古皮辨乃齊服不可用從之浙西水灾朝廷遣使賑之言者謂浙西灾不至大而州郡奏報以少為多乞考其虛實而懲責其尤甚者又乞令賑濟官凡措畫稍大事並申取朝廷指揮其急切不可待報者雖許一面施行亦須便具奏知有旨施行公封還之極論其不可家傳公嘗采集帝王學問及記祖宗講讀故事為帝學八卷上之家傳袐書監王欽若臣奏差真靖大師陳景元校黃夲道書公封還之以謂諸子百家神仙道釋蓋以備篇籍異聞以示藏書之冨夲非有益於治道不必使方外之士讎校以崇長異學也今館閣之書無所不有若用此為例各委夲色則豈祖宗設館之意哉昔王安石使其門僧智緣隨王韶誘說木征時人謂之安撫大師今乃有校書道士人必謂之編校大師矣事雖至微實損國體遂罷其命家傳元祐七年三月邇英閣對公奏臣掌國史伏觀仁宗皇帝在位四十二年豐功盛德固不可得而名言所可見者其事有五畏天愛民奉宗廟好學納諌仁宗行五者於天下所以為仁也然仁宗每因事示人好惡皇祐中楊安國講直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之仁宗曰蘧伯玉信君子矣然不若史魚之直據孔子之所言則史魚不若蘧伯玉之為君子仁宗之言人君之言也人君唯欲臣下切直故言蘧伯玉不若史魚以開臣下切直之路由是天下知仁宗好直不好佞此聖人之大德也願陛下以為法昭示所好以慰群生之望上然之家傳公進言無隱考古驗今反覆曲折至於再四而其言愈切大意勸上畏天愛民修身納諌稽法祖宗而專引仁皇行事以為故實又采集仁宗聖政數百事為仁宗訓典六卷以獻公平居口不言人過遇事别白邪正是非略無假借以謂不若是則履霜堅冰危國亡家之夲也必極論而力正之在經筵據經守正獻納尤多講尚書內作色荒外作禽荒酣酒嗜音峻宇雕墻有一于此未或不亡講畢再誦此六句却立云願陛下留聽哲宗首肯者再三然後退就位講孟子今之樂猶古之樂公曰孟子切於救民故深勸齊王與民同樂而謂今之樂猶古之樂然丗俗之樂鄭衛淫哇之聲非先王之法豈可以薦上帝配祖考降天神出地祇也今樂古樂如君子小人之不可同邪正之不可並如必欲以禮樂治天下國家則當如孔子答顔淵之言孔子所言者為邦之正道孟子所言者救世之急務此所以不同講公劉好貨大王好色公曰孟子以王好貨勸以當如公劉與民同利以王好色勸以當如太王與民同欲然臣竊以謂公劉非好貨乃是厚民太王非好色乃是正家人君不可以好貨亦不可以好色好貨則貪而害民好色則荒而害政孟子事齊宣王中才以下之君故其言如此家傳東坡先生嘗謂薦曰范淳夫講說為今經筵講官第一言簡而當無一冗字無一長語義理明白而成文燦然乃得講師三昧也李豸師友談記太史公詰朝當講即前一夕正衣冠儼然如在上前命子弟侍坐先案講其說先生平時溫溫其語若不出諸口及當講開列古義仍參之時事及近代本朝典故以為戒勸其音琅琅然聞者興起談記太史公講王制巡狩柴望之禮曰古之人多因燔柴望秩之說乃附㑹為卦禪之事或以求神仙或以祈福或以告太平成功皆秦漢之侈心非古者巡狩省方之義為人臣凡有勸人主封禪者皆佞臣也談記太史公講太史奉諱惡天子齊戒受諌之說注謂子邜與先代忌辰之類為諱惡公曰以臣所見所謂諱惡者危亡之言也為人君必使危亡之言不絶于耳為人臣必使危亡之言不絶于口然後君臣相與戒御名畏懼保其社禝若夫子卯雖為桀紂之亡日與先代忌辰此有司常事耳不足道也談記元祐𥘉公以著作郎兼侍講每造邇英過押班御藥閣子都知巳下列行致恭即退顧子敦嘗與都知梁惟簡一言公大以為失體陳衍𥘉管當御藥院來謝宅門數步外下馬留榜子與閽者云只煩陳覆欲知曾到門下其後公為諌議大夫僦居城西白家巷東鄰陳衍園也衍每至園中不敢髙聲謂同列曰范諌議一言到上前吾輩不知死所矣遺事公為禮部侍郎車駕將幸太學公以唐開元中內出王者衮冕之服以衣先聖今乃未用王者之制請幸學酌獻之日特命改正家傳公薦王存蘇軾趙彥若鄭雍可備讀官程頥孔武仲吕希哲吕大臨管師仁可備講官又别奏辨頥𬒳誣事甚悉家傳執政以公懇請進擬龍圗閣待制知梓州太母宣諭曰只為孫兒不肯教他去且為孫兒留之公遂不敢有請家傳太皇太后登遐公言太皇太后新棄天下陛下初攬庶政乃宋室隆替之夲社禝安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時不可不御名也太皇太后內定大䇿擁立陛下聽政之初詔令所下百姓呼舞至公無私焦勞刻苦專心一意保佑陛下斥逐姦邪裁抑僥幸九年之間始終如一故雖德澤深厚結於百姓而小人怨者亦不為少矣今必有小人進言曰太皇太后不當改先帝之政逐先帝之臣此乃離間之言不可不察也當陛下即位之初中外臣民上書言政令不便者以萬數太皇太后因天下人心之欲改與陛下同改之非以巳之私意而改也既改其法則作法之人及主其人者有罪當逐陛下與太皇太后亦以衆言而逐之其所逐者皆上負先帝下負萬民天下之所讎疾而欲去之者也太皇大后豈有憎愛於其間哉顧不如此則天下不安耳惟陛下清心照理辨察是非有以此言惑聖聽者宜明正其罪付之典刑痛懲一人以警群慝則帖然無事矣如其不然則臣恐姦言繼進致陛下於有過之地失天下之心不可不預防也此等既上悮先帝欲復悮陛下天下之事豈堪小人再破壞耶初公與蘇公約皆上章論列蘇公巳具草見公之章遂附名同奏竟不肯出其藁因謂公曰公之文經世之文也軾於朝廷文字失於過當不若公言之皆可行也公又上疏陳祖宗創業之艱難勸上憂勤抑畏以守大業且曰元豐之末時運艱危先帝早棄天下陛下嗣位幸賴太皇太后以大公至正為心罷王安石吕惠卿等所造新法而行祖宗舊政故社禝危而復安人心離而復合乃至契丹主亦與宰相議曰南朝專行仁宗政事可飭燕京留守使戒邊吏守約束無生事夫以夷狄之情如此則中國人心可知矣太皇太后為陛下立太平之基巳有成效臣願陛下守之以靜無所改為恭巳以臨之虛心以處之詔左右大臣動必循守祖宗法度陛下躬攬於上咨諏善道察納讜言則群臣邪正萬事是非皆了了於聖心矣家傳有㫖召內臣十餘人而李憲王中正之子皆在其中公上疏言陛下初政未嘗聞行一美政訪一賢臣而先進用內臣如此衆多之口必謂陛下私於近習臣竊惜之不報又請對極言小人宦官不可用歷引古今及陳吕惠卿蔡確章惇李憲王中正等罪狀時惇惠卿皆復官上巳有相惇意人情益搖大臣不敢爭臺諌不敢議惟公論奏不巳親舊力勸止公以謂今事巳不可回必得重禍公曰不然吾以經術侍人主職在輔導事至於此其能默乎哲宗臨朝威嚴群臣不敢仰視而待遇公極於溫渥是日所論亦皆和顔開納公曰陛下既以為然臣乞携此章示執政且詰責之時范忠宣猶當軸也上曰且留此朕欲再看復獎喻再三公謝而退家傳元祐九年三月朔日有食之不盡如鉤公因對極言宜恐懼修省以答天戒務在安靜以寧天心時繼述之論巳興方欲更變法度公每因事進諌言極忠憤哲宗終無忤色公乞𥙷外上云不要入文字執政官有闕公亦不知上意明日蘇公自門下侍郎出知汝州公再上章請郡又不許上且欲大用有成命矣內外梗之者甚衆巳而中輟家傳閠四月除知陜州朝辭勸上以寬到任謝表云非堯舜不陳竊慕責難之義惟祖宗是憲仰禆求助之明蓋平日之志也家傳章惇拜相蔡卞修國史公罷郡宫觀令與同進書官趙尚書彥若黃校理庭堅同於京畿居住報應史院取㑹文字初卞以前史官直書王安石罪欲中傷以詆誣神考之罪實録中出千餘條以謂皆無證據欲逮諸史官繫詔獄核實既而檢尋悉有據故所問止三十二事公以實報遂與趙公黃公皆坐貶公得永州公平生淡然無欲家人不見其喜怒之容修書于洛有終焉之志及登侍從無時不求退每𬒳除擢必力辭不得巳然後就職及𬒳貶責處之怡然嘗曰吾西蜀一布衣耳今復不仕何為不可家傳紹聖三年徙賀州謫詞云朕於庶言無不嘉納至於以訐為直以無為有則在所不赦公云吾論多事矣皆可以為罪也亦不知所坐何事後乃知坐向言覔乳媪事惇卞以謂上疏太母所以離間哲宗也然公先上皇帝疏後數日乃上太母疏止是勸上以愛身修德太母以保護上躬而巳明年徙賔州元符元年移化州所𬒳受止是白劄子竟不知所坐也家傳公燕居正色危坐未嘗不冠出入步履皆有常處几桉無長物研墨刀筆終嵗不易其所平生所觀書如手未觸衣稍華者不服十餘年不易衣亦無垢汙履雖穿如新皆出於自然未嘗有意如此也遺事公每誦董仲舒之語正其義不謀其利明其道不計其功謂沖曰君子行巳立朝正當如此若夫成功則天也遺事公言舊年子弟赴官有乞書於蜀公者蜀公不許曰仕宦不可廣求人知受恩多則難立朝矣遺事吕吉甫之用事也神宗極知其姦邪嘗謂惠卿可斬紹聖初起廢謝表力詆元祐政事及諸公又自陳遭遇先朝𬒳眷深厚鋪叙甚詳公笑曰宜乎世以嚴子陵為髙人也遺事東坡好戲謔語言或稍過公必戒之東坡每與人戲必祝曰勿令范十三知公舊行第十三也遺事公篤於兄弟之愛蜀中嵗入不復問多寡奏薦先諸弟及捐館溫猶未官也遺事公平生不問家有無俸入所得與族人賔客共之以故常不足逮南遷家徒四壁遽以蜀田質於人出倍稱之息始能辦行遺事哲宗即位宣仁后垂簾同聽政群賢畢集于朝專以忠厚不擾為治和戎偃武愛民重榖庶幾嘉祐之風矣然雖賢者不免以類相從故當時有洛黨川黨朔黨之語洛黨者以程正叔侍講為領䄂朱光庭賈易等為羽翼川黨者以蘇子瞻內翰為領䄂吕陶等為羽翼朔黨者以劉摯梁燾王巖叟劉安世為領䄂羽翼尤衆諸黨相攻擊不巳正叔多用古禮子瞻謂其不近人情如王介甫深疾之或加玩侮故朱光庭賈易不平皆以謗訕誣子瞻執政兩平之是時既退元豐大臣于散地皆銜怨刺骨隂伺間隙而諸賢皆不悟自分黨相毀至紹聖初章惇為相同以為元祐黨盡竄嶺海之外可哀也吕微仲秦人戅直無黨范醇夫蜀人師溫公不立黨亦不免竄逐以死尤可哀也聞見録公曰范純夫其問學修身固好若造理與立事則未在蓋氣質弱於劉道原元城談録一之四內翰竇公公名儀字可象薊州漁陽人晉天福中舉進士歷漢周為翰林學士判河南府國初再入翰林乾德四年卒年五十三儀弟儼侃稱僖皆繼登科儼字望之漢史館修撰周中書舍人國初轉禮部侍郎卒年四十二稱字日章周袐書郎開寶中拜右𥙷闕開封府判官出為彰義軍節度推官太宗即位召拜左諌議大夫後拜參知政事卒年五十八趙普自樞密使授集賢殿大學士是時范質等皆巳罷相中書絶曹普授官勑無人署字普入奏之太祖曰卿但進來朕為卿署可乎普曰有司所署非帝王之事太祖曰卿問陶穀竇儀必有所說乃召問之榖時為尚書對曰自古輔相未嘗虛位唯唐文宗時甘露事後中書無宰相當時以僕射尚書奉行制書今尚書乃六官之長可以署勑儀曰此非承平之制不足法今皇弟尹正京府兼中書令此正宰相任也署勑宜矣普即入奏遂召太宗署勑掇遺太祖欲改元謂宰相曰今改年號須古來未有者時宰相以乾德為請且言前代所無三年正月平蜀蜀宮人有入掖庭者太祖因閲其奩具得鑑背字云乾德四年鑄大驚曰安得四年所鑄乎出鑑以示宰相皆不能對乃召學士陶穀竇儀奏曰蜀少主曾有此號鑑必蜀中所鑄太祖大喜因歎曰作宰相須是讀書人自是大重儒臣矣劉貢父詩話王著既貶官內署闕人太祖謂范質等曰王著昨以酒失深嚴之地當選謹重之士以處之質等對以前朝學士惟竇儀清介謹厚然頃自翰林遷端明今又官為尚書難於復召太祖曰禁中非此人不可卿當諭朕意令勉赴所職即日再入翰林為學士金坡遺事竇儀開寶中為翰林學士時趙普專政帝患之欲聞其過一日召儀語及普所為多不法且譽儀早負才望之意儀盛言普開國勳臣公忠亮直社稷之鎮帝不恱儀歸言於諸弟張酒引滿語其故曰我必不能作宰相然亦不詣朱崖吾門可保矣既而召學士盧多遜多遜嘗有憾於普又喜其進用遂攻普之短果罷相出鎮河陽普之罷甚危賴以勳舊脫禍多遜遂參知政事作相太平興國七年普復入相多遜有崖州之行是其言之驗也談苑太祖下滁州世宗命儀籍其帑藏至數日太祖遣親吏取藏絹儀即白曰公初下城雖傾藏取之誰敢言者今既有籍即為官物非詔旨不可得也後太祖屢對大臣稱儀有守欲以為相趙普忌其剛直乃引薛居正參知政事及儀卒太祖聞之驚歎曰天何奪我竇儀之速耶太宗亦稱儀質重嚴整有家法閨門敦睦人無間言諸弟皆不能及僖亦中人之才惟稱為有操尚耳蒙求儼顯德中上疏言六綱一曰明禮二曰崇樂三曰熙政四曰正刑五曰勸農六曰經武蒙求太祖嘗晚坐崇政殿召學士竇儼對上時宴服儼至屏樹間見之不進中使促不應上訝其久不出笑曰竪儒以我燕服爾遽命𫀆帶儼遂趨出沂公筆録儼尤善推步星曆與盧多遜楊徽之同在諌垣謂二公曰丁卯歲五星當聚於奎奎主文明又在魯分自此天下始太平二拾遺必見之老夫不與也至乾德間五星果聚於奎玉壷清話竇稱為晉府記室賈琰為判官每諸王宗室宴集琰必怡聲下氣褒讃捷給稱叱之曰賈氏子何巧言令色之甚獨不懼於心邪太宗甚怒白太祖斥出為涇州節判後即位思之召為樞密直學士數月參政中謝語之曰汝知何以及此稱曰陛下以臣往年霸府遭逢所以至此耳上曰不然以卿嘗面拆賈琰故任卿左右思聞直言耳談苑竇儀尚書夲燕人為性嚴重家法整肅尚書每對客坐即二侍郎三起居四參政五𥙷闕皆侍立焉晉公談録
