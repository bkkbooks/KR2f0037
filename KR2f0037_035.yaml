body:
  text: 五之五内翰蜀郡范忠文公公名鎭字景仁成都華陽人中進士第爲新安主簿召試擢館閣校勘除直祕閣開封府推官擢知諌院改集賢殿修撰修起居注知制誥遷翰林學士出知陳州復入翰林爲學士兼侍讀知通進銀臺司尋以本官致仕哲宗即位遷光禄大夫拜端明殿學士兼侍讀固辭改提舉嵩山崇福宫數月復告老以銀青光禄大夫致仕元祐三年卒年八十一景仁少舉進士善文賦埸屋師之爲人和易脩敕薛簡肅公宋景文公皆器重之𥙷國子監生及貢院奏名皆第一故事殿廷唱第過三人則爲奏名之首者必抗聲自陳以祈恩雖考校在下天子必擢寘上列以吴春卿歐陽永叔之耿介猶不免從衆景仁獨不然左右與竝立者屢趣之使自陳景仁不應至七十九人始唱名及之景仁出拜退就列訖無一言衆皆服其安恬自是始以自陳爲恥舊風遂絶司馬公作傳參知政事王公薦召試學士院詩用彩霓字學士以沈約郊居賦雌霓連蜷讀霓爲入聲謂景仁爲失韻由是除館閣校勘殊不知約賦但取聲律便美非霓不可讀爲平聲也當時有學者皆爲景仁憤鬱而景仁處之晏然不自辨爲校勘四年應遷校理丞相龐公薦景仁有美才不汲汲於進取特除直祕閣傳上䟽論民力困弊請約祖宗以來官吏兵數酌取其中爲定制以今賦入之數十七爲經費而儲其三以備水旱非常又言古者冢宰制國用唐以宰相兼鹽鐵轉運或判户部度支今中書主民樞宻主兵三司主財各不相知故財已匱而樞宻益無窮民巳困而三司取財不巳請使中書樞宻通知兵民財利大計與三司同制國用蘇内翰撰墓誌葬温成皇后太常議禮前謂之園後謂之園陵宰相劉沆前爲監護使後爲園陵使公言甞聞法吏舞法矣未聞禮官舞禮也請詰問前後議異同狀又請罷焚瘞錦繡珠玉以紓國用從之墓誌文彦博冨弼入相百官郊迎時兩制不得詣宰相居第百官不得間見公言隆之以虚禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情墓誌議減任子及間歲取士又乞令宗室屬踈者𥙷外官仁宗曰卿言是也顧恐天下謂朕不能睦族耳公曰陛下甄别其賢者顯用之不没其能乃所以睦族也雖不行至熈寜𥘉卒如公言墓誌仁宗性寛容言者務訐以爲名或誣人隂私公獨引大體略細故時陳執中爲相公甞論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今隂陽不和財匱民困盗賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之墓誌仁宗即位三十五年未有繼嗣嘉祐𥘉得疾中外危恐不知所爲公獨奮曰天下事尚有大於此者乎即上䟽曰太祖捨其子而立太宗此天下之大公也周王旣薨眞宗取宗室子飬之宫中此天下之大慮也願陛下以太祖之心行眞宗故事擇宗室賢者異其禮物而試之政事以系天下心章累上不報因闔門請罪㑹有星變其占爲急兵公言國本未立若變起倉卒禍不可以前料兵孰急於此者乎今陛下得臣䟽不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲爲宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之憂則其禍豈獨一死而巳哉夫中變之禍死而無愧急兵之憂死且有罪願以此示大臣使自擇而審處焉聞者爲之股栗除兼侍御史知雜事公以言不從固辭不受執政謂公上之不豫大臣甞建此䇿矣今間言已入爲之甚難公復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也諸公言今日難於前日安知他日不難於今日乎凡見上面陳者三公泣上亦泣曰朕知卿忠卿言是也當更俟三二年凡章十九上待罪百餘日鬚髮爲白朝廷不能奪乃罷知諌院改集賢殿修撰判流内銓修起居注除知制誥公雖罷言職而無歲不言儲嗣事以仁宗春秋益髙毎因事及之兾以感動上心及爲知制誥正謝上殿面論之曰陛下許臣今復三年矣願早定大計明年又因祫享獻賦以諷其後韓琦卒定䇿立英宗墓誌又温公日録云先是王純臣爲潤王宫教授數譽濮王之子某之賢於兄伯庸且曰某㓜時上養之如子其妃髙氏曹后之甥也字洮洮㓜亦在宫爲養女上甞戯謂后曰他日當以洮洮嫁某吾二人相與爲姻家又曰洮洮異日有皇后分既長出宫遂成昏若勸上建以爲嗣勢易助也由是政府皆屬心文公又使任乃孚往來與景仁謀上𥘉甚開納巳而爲宦官宫妾所間浸有難意兩府共議其事樞宻使王徳用舉手加頂曰若立太子置此菩薩於何地由是議亦不合事浸沮壞景仁數問文公文公曰事不諧矣景仁曰奏䟽何在曰􅌊之矣於是景仁凢上六七章不報及家居待罪乞落諫職除巳蜀一郡時八月也又上六七章不報及出復録前後所上章乞對靣陳之且求外𥙷上許之景仁乞使中使傳宣中書上令景仁自語之冨公曰巳不用嘉謀又出諫官不可未㡬乃有修撰之命英宗即位中書奏請追尊濮安懿王下兩制議以爲冝稱皇伯髙官大國極其尊榮詠執政意更下尚書省集議巳而臺諌爭言其不可乃下詔罷議令禮官檢詳典禮以聞公時判太常寺率禮官上言漢宣帝於昭帝爲孫光武於平帝爲祖其父容可以稱皇考然議者猶非之謂其以小宗而合大宗之統也今陛下旣考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇考立寢廟論昭穆皆非是於是具列儀禮及漢儒論議魏明帝詔爲五篇奏之墓誌以草制違故事出知陳州陳飢公至三日發庫廪三萬貫石以貸不及奏監司繩之急公上書自劾詔原之是歲大熟所貸悉還陳人至今思之墓誌王安石爲政始變更法令改常平爲青苗法公上䟽曰常平之法始於漢之盛時視榖貴賤發歛以便農末最爲近古不可改而青苗行於唐之衰亂不足法且陛下疾冨民之多取而少取之此正百歩與五十步之間耳今有二人坐市賈一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎䟽三上不報邇英閤進讀與吕惠卿爭論上前因論舊法預買紬絹亦青苗之比公曰預買亦敝法也若陛下躬節儉府庫有餘當并預買去之奈何更以爲比乎韓琦上䟽極論新法之害安石使送條例司䟽駮之諌官李常乞罷靑苗錢安石令常分析公皆封還其詔詔五下公執如𥘉司馬光除樞宻副使光以所言不行不敢就職詔許辭免公再封還之上知公不可奪以詔直付光不由門下公奏由臣不才使陛下廢法有司失職乞解銀臺司許之㑹有詔舉諌官公以蘇軾應詔而御史知雜謝景温彈奏軾罪公又舉孔文仲爲賢良文仲對䇿極論新法之害安石怒罷文仲歸故官公上䟽爭之不報時年六十三即上言臣言不行無顔復立於朝請致仕䟽五上最後指言安石以喜怒爲賞罸且曰陛下有納諌之資大臣進拒諌之計陛下有愛民之性大臣用殘民之術安石大怒自草制極口詆公落翰林學士以本官致仕聞者皆爲公懼公上表謝其略曰雖曰乞身而去敢忘憂國之心又曰望陛下集群議爲耳目以除壅蔽之姦任老成爲腹心以養和平之福天下聞而壯之安石雖詆之深人更以爲榮焉墓誌公旣得謝蘇軾徃賀之曰公雖退而名益重矣公愀然不樂曰君子言聽計從消患於未萌使天下隂受其賜無智名無勇功吾獨不得爲此命也夫使天下受其害而吾享其名吾何心哉軾慙而退墓誌景仁旣退居有園第在京師専以讀書詩賦自娯客至無貴賤皆野服見之不復報謝故人或爲具召之雖權貴不拒也不召則不徃見之或時乗興岀遊則無逺近皆徃甞乗籃輿歸蜀與親舊樂飲賑施其貧者周覽江山窮極勝賞期年然後返年益老而視聽聦明支體尤堅彊嗚呼曏使景仁枉道希世以得冨貴蒙屈辱任憂患豈有今日之樂邪則景仁所失甚少所得殊多矣詩云愷悌君子神所勞矣又曰樂只君子遐不眉壽景仁有焉傳又墓誌云或勸公稱疾杜門公曰死生旤福天也吾其如天何同天節乞隨班上壽許之遂著爲令𥘉英宗即位祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖公上言太祖起宋州有天下與漢髙祖同僖祖不當復還乞下百官議不報及上即位公又言乞遷僖祖正太祖東嚮之位時年幾八十矣韓維上言公在仁宗朝首開建儲之議其後大臣繼有論奏先帝追録其言存沒皆推恩而鎮未甞以語人人亦莫敢爲言者雖顔子不伐善介子推不言禄不能過也悉以公十九䟽上之拜端明殿學士墓誌元祐𥘉首以詔起公曰西伯善飬二老來歸漢室卑詞四臣入侍爲我強起無或憚勤天下望公與温公同升矣公辭曰六十三而求去蓋以引年七十九而復來豈云中禮卒不起先是神宗山陵公㑹葬陵下蔡京見公曰上將起公矣公正色曰鎭以論新法不合得罪先帝一旦先帝棄天下其可因以爲利故公卒不爲元祐二聖一起紹聖𥘉章惇蔡卞欲并斥公爲元祐黨將加追貶蔡京曰京親聞蜀公之言如此非黨也惇卞乃巳聞見録𥘉仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等考正公與司馬光皆上䟽論律尺之法又與光徃復論難凡數萬言自以爲獨得於心元豐三年神宗詔公與劉几定樂公曰定樂當先正律上曰然雖有師曠之聦不以六律不能正五音公作律尺龠合升斗豆區鬴斛欲圖上之又乞訪求眞黍以定黄鍾而劉几即用李照樂加用四清聲而奏樂成詔罷局賜賚有加公謝曰此劉几樂也臣何與焉及提舉崇福宫欲造樂獻之自以爲嫌乃先請致仕旣得謝請太府銅爲之逾年乃成比李照樂下一律有竒二聖御延和殿召執政同觀賜詔嘉獎以樂下太常詔三省侍從臺閣之臣皆徃觀焉時公已屬疾樂奏三日而薨墓誌又公作東齋記事曰君實子莫逆之交也惟議樂爲不合往在館閣時决於同舎同舎莫能决遂奕碁以决之君實不勝乃定其後二十年君實在西京爲留臺予往候之不持他書惟持所撰樂論八篇示之爭論者數夕莫能决又投壺以决之予不勝君實讙曰大樂還魂矣凡半月卒不得要領而歸豈所見然邪將戯謔邪抑遂其所執不欲改之邪俱不可得而知也是必戯謔矣公清明坦夷表裏洞逹遇人以誠恭儉御名黙口不言人過及臨大節决大議色和而語壯常欲繼之以死雖在萬乗前無所屈篤於行義奏𥙷先族人而後子孫郷人有不克婚葬者輙爲主之客其家者常十餘人雖僦居陋巷席地而坐飲食必均兄鎡卒于隴城無子聞其有遺腹子在外公時未仕徒歩求之兩蜀間二年乃得之曰吾兄異於人體有四乳是兒亦必然巳而果然名之曰百常以公䕃今爲承議郎公少受學於郷先生龐直温直温之子昉卒於京師公娶其女爲孫婦飬其妻子終身其學夲於六經仁義口不道佛老申韓異端之說其文清麗簡逺學者以爲師法凡五入翰林四知貢舉凡朝廷有大述作大議論未甞不與契丹髙麗皆知誦公文賦少時甞賦長嘯却胡騎及奉使契丹虜相目曰此長嘯公也其後兄子百禄亦使虜虜首問公安否墓誌李􅞧談紀云東坡云范景仁平生不好佛晚年清减節嗜慾一物不芥蔕於心却眞是學佛作家然至死不取佛法又程氏遺書云今日卓然不爲此學者惟范景仁與君實爾然其所執理有出於禪學之下者一日做身主不得爲人驅過去裏又曰范景仁論性曰豈有生爲此死又却爲彼儘似見得後却云自有鬼神又却迷也客有問今世之勇於迃叟者叟曰有范景仁者其爲勇人莫之敵客曰景仁長僅五尺循循如不勝衣奚其勇叟曰何哉而所謂勇者而以瞋目裂眥髪上指冠力曵九牛氣陵三軍者爲勇乎是特匹夫之勇耳勇於外者也若景仁勇於内者也自唐宣宗以來不欲聞人言立嗣萬一有言之者輙切齒疾之與倍畔無異而景仁獨唱言之十餘章不巳視身與宗族如鴻毛後人見景仁無恙而繼爲之者則有矣然景仁者冒不測之淵無勇者能之乎人之情孰不畏天子與執政親愛之至隆者孰若父子執政欲尊天子之父而景仁引古義以爭之無勇者能之乎禄與位皆人所貪或老且病前無可冀猶戀戀不忍捨去况景仁身已通顯有聲望視公相無跬歩之逺以言不行年六十三即拂衣歸終身不復起無勇者能之乎凡人有所不能而人或能之無不服焉如吕獻可之先見范景仁之勇决皆余所不及也余心誠服之故作范景仁傳傳熈寜元豐間士大夫論天下賢者必曰君實景仁其道徳風流足以師表當世其議論可否足以榮辱天下二公蓋相得歡甚皆自以爲莫及曰吾與子生同志死當同傳而天下之人亦無敢優劣之者二公旣約更相爲傳而後死者則誌其墓故君實爲景仁傳其略曰吕獻可之先見景仁之勇决皆予所不及也蓋二公用捨大節皆不謀而同如仁宗時論立皇嗣英宗時論濮安懿王稱號神宗時論新法其言若出一人相先後如左右手故君實常謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反復相非終身不能相一君子是以知二公非苟同者墓誌三朝名臣言行後録卷第五六之四丞相鄭國宋元憲公公名庠字公序安州安陸人天聖初舉進士開封試禮部皆第一通判襄州召試遷左正言知制誥入翰林爲學士寳元中以右諫議大夫叅知政事岀知楊州徙鄆州復入叅知政事除樞宻使皇祐中拜同中書門下平章事罷知河南府復入爲樞宻使封莒國公以河陽三城節度使同平章事判鄭州徙相州英宗初改封鄭國公判亳州以司空致仕薨年七十一爲左正言㑹郭皇后廢以諫官伏閤爭不可得坐罰金王禹玉撰神道碑它日烖異數見宰相唯能開觀寺爲民祈福公謂烖異之來所以戒政事此豈所以應天變哉奏罷之神道碑先是趙元昊反劉平石元孫皆以輕敵失軍因詔中書兼管樞宻院機事時縁邊諸帥官重者互領陜西四路以故號令頗不一又兵多分屯堡障公言冝使大帥收重兵内地它帥自當一道緩急有警則分兵四岀以援之其議乆不决後卒如公計神道碑帝召二府天章閣觀書岀詔目問天下利病事宰相倉猝莫敢對公時叅知政事獨進曰臣等皆待罪二府固已緫萬事而共謀之不當下同諸生對䇿願至中書條上旣退草數千言奏之後皆施用神道碑初公言比有近幸之人多縁内降得橫恩冝因大祀之後斥絶以新聖政於是帝別爲手詔與赦書同降神道碑公間言祖宗收方鎮之權甞欲畿甸蓄禁兵四十萬今所蓄不精且多外𥙷戍更非彊夲之埶又武臣用恩幸者多得仕邊要而孤寒者常在東南至老無恩澤公乃作科條均其所入官而恩幸者滋不說神道碑皇祐中宋元憲公請置家廟下兩制禮官議以爲廟室當靈長若身没而子孫官微即廟隨毀請以其子孫習三品階勲及爵庶常得奉祀不報退朝録宋元憲公甞奏事而帶寛誤墜文書于地不顧而行仁宗呼内侍臣拾以與之議者謂仁宗有人君體宋公得大臣體吕氏家塾記宋鄭公初名郊字伯庠與其弟祁自布衣時名動天下號爲二宋其爲知制誥仁宗驟加獎眷便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋交其言不祥仁宗遽命改之公怏怏不獲巳乃改名庠字公序公後更踐二府二十餘年以司空致仕兼享福壽而終而譛者竟不見用以卒可以爲小人之戒也歸田録宋元憲公甞曰殘人矜才逆詐恃明吾終身不爲也退朝録王侍郎古說元憲宋公以言者斥其非才罷樞相守洛有一舉人行橐中有不稅之物爲僕夫所告公曰舉人應舉孰無所貨之物未可深罪若奴告主此風不可長也寮屬曰犯人乃言官之子也意欲激其報之公不荅但送稅院倍其稅仍治其奴罪而遣之麈史宋元憲雍雍然有德之君子也旣叅大政朝廷無事廟堂之上日閱文史後旣登庸天下承平日乆尤務清静無所作爲有爲者病之公甞自謂時賢多以不才誚我因爲自詠詩曰我夲無心士終非濟丗才虚舟人莫怒疑虎石當開蚊負愁山重葵傾喜日來欲將嘲強解眞意轉悠哉麈史宋元憲公初執政遇事輒分别是非可否用是斥退及再登用遂浮沉偷安云
