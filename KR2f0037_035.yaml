body:
  text: 五之五內翰蜀郡范忠文公公名鎮字景仁成都華陽人中進士第為新安主簿召試擢館閣校勘除直祕閣開封府推官擢知諌院改集賢殿修撰修起居注知制誥遷翰林學士出知陳州復入翰林為學士兼侍讀知通進銀臺司尋以本官致仕哲宗即位遷光祿大夫拜端明殿學士兼侍讀固辭改提舉嵩山崇福宫數月復告老以銀青光祿大夫致仕元祐三年卒年八十一景仁少舉進士善文賦埸屋師之為人和易修敕薛簡肅公宋景文公皆器重之𥙷國子監生及貢院奏名皆第一故事殿廷唱第過三人則為奏名之首者必抗聲自陳以祈恩雖考校在下天子必擢置上列以吳春卿歐陽永叔之耿介猶不免從衆景仁獨不然左右與竝立者屢趣之使自陳景仁不應至七十九人始唱名及之景仁出拜退就列訖無一言衆皆服其安恬自是始以自陳為恥舊風遂絶司馬公作傳參知政事王公薦召試學士院詩用彩霓字學士以沈約郊居賦雌霓連蜷讀霓為入聲謂景仁為失韻由是除館閣校勘殊不知約賦但取聲律便美非霓不可讀為平聲也當時有學者皆為景仁憤鬱而景仁處之晏然不自辨為校勘四年應遷校理丞相龐公薦景仁有美才不汲汲於進取特除直祕閣傳上疏論民力困弊請約祖宗以來官吏兵數酌取其中為定制以今賦入之數十七為經費而儲其三以備水旱非常又言古者冢宰制國用唐以宰相兼鹽鐵轉運或判户部度支今中書主民樞密主兵三司主財各不相知故財已匱而樞密益無窮民巳困而三司取財不巳請使中書樞密通知兵民財利大計與三司同制國用蘇內翰撰墓志葬溫成皇后太常議禮前謂之園後謂之園陵宰相劉沆前為監護使後為園陵使公言嘗聞法吏舞法矣未聞禮官舞禮也請詰問前後議異同狀又請罷焚瘞錦繡珠玉以紓國用從之墓志文彥博冨弼入相百官郊迎時兩制不得詣宰相居第百官不得間見公言隆之以虛禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情墓志議減任子及間歲取士又乞令宗室屬踈者𥙷外官仁宗曰卿言是也顧恐天下謂朕不能睦族耳公曰陛下甄别其賢者顯用之不沒其能乃所以睦族也雖不行至熙寧𥘉卒如公言墓志仁宗性寬容言者務訐以為名或誣人隂私公獨引大體略細故時陳執中為相公嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今隂陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之墓志仁宗即位三十五年未有繼嗣嘉祐𥘉得疾中外危恐不知所為公獨奮曰天下事尚有大於此者乎即上疏曰太祖捨其子而立太宗此天下之大公也周王既薨真宗取宗室子飬之宫中此天下之大慮也願陛下以太祖之心行真宗故事擇宗室賢者異其禮物而試之政事以系天下心章纍上不報因闔門請罪㑹有星變其占為急兵公言國本未立若變起倉卒禍不可以前料兵孰急於此者乎今陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之憂則其禍豈獨一死而巳哉夫中變之禍死而無愧急兵之憂死且有罪願以此示大臣使自擇而審處焉聞者為之股栗除兼侍御史知雜事公以言不從固辭不受執政謂公上之不豫大臣嘗建此䇿矣今間言已入為之甚難公復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也諸公言今日難於前日安知他日不難於今日乎凡見上面陳者三公泣上亦泣曰朕知卿忠卿言是也當更俟三二年凡章十九上待罪百餘日鬚髮為白朝廷不能奪乃罷知諌院改集賢殿修撰判流內銓修起居注除知制誥公雖罷言職而無歲不言儲嗣事以仁宗春秋益髙每因事及之兾以感動上心及為知制誥正謝上殿面論之曰陛下許臣今復三年矣願早定大計明年又因祫享獻賦以諷其後韓琦卒定䇿立英宗墓志又溫公日録云先是王純臣為潤王宫教授數譽濮王之子某之賢於兄伯庸且曰某幼時上養之如子其妃髙氏曹后之甥也字洮洮幼亦在宫為養女上嘗戲謂后曰他日當以洮洮嫁某吾二人相與為姻家又曰洮洮異日有皇后分既長出宫遂成昏若勸上建以為嗣勢易助也由是政府皆屬心文公又使任乃孚往來與景仁謀上𥘉甚開納巳而為宦官宫妾所間浸有難意兩府共議其事樞密使王德用舉手加頂曰若立太子置此菩薩於何地由是議亦不合事浸沮壞景仁數問文公文公曰事不諧矣景仁曰奏疏何在曰􅌊之矣於是景仁凡上六七章不報及家居待罪乞落諫職除巳蜀一郡時八月也又上六七章不報及出復録前後所上章乞對靣陳之且求外𥙷上許之景仁乞使中使傳宣中書上令景仁自語之冨公曰巳不用嘉謀又出諫官不可未幾乃有修撰之命英宗即位中書奏請追尊濮安懿王下兩制議以為冝稱皇伯髙官大國極其尊榮詠執政意更下尚書省集議巳而臺諌爭言其不可乃下詔罷議令禮官檢詳典禮以聞公時判太常寺率禮官上言漢宣帝於昭帝為孫光武於平帝為祖其父容可以稱皇考然議者猶非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇考立寢廟論昭穆皆非是於是具列儀禮及漢儒論議魏明帝詔為五篇奏之墓志以草制違故事出知陳州陳飢公至三日發庫廪三萬貫石以貸不及奏監司繩之急公上書自劾詔原之是歲大熟所貸悉還陳人至今思之墓志王安石為政始變更法令改常平為青苗法公上疏曰常平之法始於漢之盛時視榖貴賤發斂以便農末最為近古不可改而青苗行於唐之衰亂不足法且陛下疾冨民之多取而少取之此正百步與五十步之間耳今有二人坐市賈一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎疏三上不報邇英閣進讀與吕惠卿爭論上前因論舊法預買紬絹亦青苗之比公曰預買亦敝法也若陛下躬節儉府庫有餘當并預買去之奈何更以為比乎韓琦上疏極論新法之害安石使送條例司疏駮之諌官李常乞罷靑苗錢安石令常分析公皆封還其詔詔五下公執如𥘉司馬光除樞密副使光以所言不行不敢就職詔許辭免公再封還之上知公不可奪以詔直付光不由門下公奏由臣不才使陛下廢法有司失職乞解銀臺司許之㑹有詔舉諌官公以蘇軾應詔而御史知雜謝景溫彈奏軾罪公又舉孔文仲為賢良文仲對䇿極論新法之害安石怒罷文仲歸故官公上疏爭之不報時年六十三即上言臣言不行無顔復立於朝請致仕疏五上最後指言安石以喜怒為賞罰且曰陛下有納諌之資大臣進拒諌之計陛下有愛民之性大臣用殘民之術安石大怒自草制極口詆公落翰林學士以本官致仕聞者皆為公懼公上表謝其略曰雖曰乞身而去敢忘憂國之心又曰望陛下集群議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之安石雖詆之深人更以為榮焉墓志公既得謝蘇軾往賀之曰公雖退而名益重矣公愀然不樂曰君子言聽計從消患於未萌使天下隂受其賜無智名無勇功吾獨不得為此命也夫使天下受其害而吾享其名吾何心哉軾慙而退墓志景仁既退居有園第在京師専以讀書詩賦自娛客至無貴賤皆野服見之不復報謝故人或為具召之雖權貴不拒也不召則不往見之或時乘興出遊則無逺近皆往嘗乘籃輿歸蜀與親舊樂飲賑施其貧者周覽江山窮極勝賞期年然後返年益老而視聽聰明支體尤堅彊嗚呼嚮使景仁枉道希世以得冨貴蒙屈辱任憂患豈有今日之樂邪則景仁所失甚少所得殊多矣詩云愷悌君子神所勞矣又曰樂只君子遐不眉壽景仁有焉傳又墓志云或勸公稱疾杜門公曰死生禍福天也吾其如天何同天節乞隨班上壽許之遂著為令𥘉英宗即位祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖公上言太祖起宋州有天下與漢髙祖同僖祖不當復還乞下百官議不報及上即位公又言乞遷僖祖正太祖東嚮之位時年幾八十矣韓維上言公在仁宗朝首開建儲之議其後大臣繼有論奏先帝追録其言存沒皆推恩而鎮未嘗以語人人亦莫敢為言者雖顔子不伐善介子推不言祿不能過也悉以公十九疏上之拜端明殿學士墓志元祐𥘉首以詔起公曰西伯善飬二老來歸漢室卑詞四臣入侍為我強起無或憚勤天下望公與溫公同升矣公辭曰六十三而求去蓋以引年七十九而復來豈云中禮卒不起先是神宗山陵公㑹葬陵下蔡京見公曰上將起公矣公正色曰鎮以論新法不合得罪先帝一旦先帝棄天下其可因以為利故公卒不為元祐二聖一起紹聖𥘉章惇蔡卞欲并斥公為元祐黨將加追貶蔡京曰京親聞蜀公之言如此非黨也惇卞乃巳聞見録𥘉仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等考正公與司馬光皆上疏論律尺之法又與光往復論難凡數萬言自以為獨得於心元豐三年神宗詔公與劉几定樂公曰定樂當先正律上曰然雖有師曠之聰不以六律不能正五音公作律尺籥合升斗豆區釜斛欲圖上之又乞訪求真黍以定黃鍾而劉几即用李照樂加用四清聲而奏樂成詔罷局賜賚有加公謝曰此劉几樂也臣何與焉及提舉崇福宫欲造樂獻之自以為嫌乃先請致仕既得謝請太府銅為之逾年乃成比李照樂下一律有竒二聖御延和殿召執政同觀賜詔嘉獎以樂下太常詔三省侍從臺閣之臣皆往觀焉時公已屬疾樂奏三日而薨墓志又公作東齊記事曰君實子莫逆之交也惟議樂為不合往在館閣時决於同舍同舍莫能决遂奕碁以决之君實不勝乃定其後二十年君實在西京為留臺豫往候之不持他書惟持所撰樂論八篇示之爭論者數夕莫能决又投壺以决之豫不勝君實歡曰大樂還魂矣凡半月卒不得要領而歸豈所見然邪將戲謔邪抑遂其所執不欲改之邪俱不可得而知也是必戲謔矣公清明坦夷表裏洞逹遇人以誠恭儉御名默口不言人過及臨大節决大議色和而語壯常欲繼之以死雖在萬乘前無所屈篤於行義奏𥙷先族人而後子孫鄉人有不克婚葬者輒為主之客其家者常十餘人雖僦居陋巷席地而坐飲食必均兄鎡卒于隴城無子聞其有遺腹子在外公時未仕徒步求之兩蜀間二年乃得之曰吾兄異於人體有四乳是兒亦必然巳而果然名之曰百常以公䕃今為承議郎公少受學於鄉先生龐直溫直溫之子昉卒於京師公娶其女為孫婦飬其妻子終身其學夲於六經仁義口不道佛老申韓異端之說其文清麗簡逺學者以為師法凡五入翰林四知貢舉凡朝廷有大述作大議論未嘗不與契丹髙麗皆知誦公文賦少時嘗賦長嘯却胡騎及奉使契丹虜相目曰此長嘯公也其後兄子百祿亦使虜虜首問公安否墓志李􅞧談紀云東坡云范景仁平生不好佛晚年清减節嗜欲一物不芥蒂於心却真是學佛作家然至死不取佛法又程氏遺書云今日卓然不為此學者惟范景仁與君實爾然其所執理有出於禪學之下者一日做身主不得為人驅過去裏又曰范景仁論性曰豈有生為此死又却為彼儘似見得後却云自有鬼神又却迷也客有問今世之勇於迃叟者叟曰有范景仁者其為勇人莫之敵客曰景仁長僅五尺循循如不勝衣奚其勇叟曰何哉而所謂勇者而以瞋目裂眥髮上指冠力曵九牛氣陵三軍者為勇乎是特匹夫之勇耳勇於外者也若景仁勇於內者也自唐宣宗以來不欲聞人言立嗣萬一有言之者輒切齒疾之與倍畔無異而景仁獨唱言之十餘章不巳視身與宗族如鴻毛後人見景仁無恙而繼為之者則有矣然景仁者冒不測之淵無勇者能之乎人之情孰不畏天子與執政親愛之至隆者孰若父子執政欲尊天子之父而景仁引古義以爭之無勇者能之乎祿與位皆人所貪或老且病前無可冀猶戀戀不忍捨去况景仁身已通顯有聲望視公相無跬步之逺以言不行年六十三即拂衣歸終身不復起無勇者能之乎凡人有所不能而人或能之無不服焉如吕獻可之先見范景仁之勇决皆余所不及也余心誠服之故作范景仁傳傳熙寧元豐間士大夫論天下賢者必曰君實景仁其道德風流足以師表當世其議論可否足以榮辱天下二公蓋相得歡甚皆自以為莫及曰吾與子生同志死當同傳而天下之人亦無敢優劣之者二公既約更相為傳而後死者則志其墓故君實為景仁傳其略曰吕獻可之先見景仁之勇决皆豫所不及也蓋二公用捨大節皆不謀而同如仁宗時論立皇嗣英宗時論濮安懿王稱號神宗時論新法其言若出一人相先後如左右手故君實常謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反復相非終身不能相一君子是以知二公非苟同者墓志三朝名臣言行後録卷第五六之四丞相鄭國宋元憲公公名庠字公序安州安陸人天聖初舉進士開封試禮部皆第一通判襄州召試遷左正言知制誥入翰林為學士寶元中以右諫議大夫參知政事出知楊州徙鄆州復入參知政事除樞密使皇祐中拜同中書門下平章事罷知河南府復入為樞密使封莒國公以河陽三城節度使同平章事判鄭州徙相州英宗初改封鄭國公判亳州以司空致仕薨年七十一為左正言㑹郭皇后廢以諫官伏閣爭不可得坐罰金王禹玉撰神道碑它日烖異數見宰相唯能開觀寺為民祈福公謂烖異之來所以戒政事此豈所以應天變哉奏罷之神道碑先是趙元昊反劉平石元孫皆以輕敵失軍因詔中書兼管樞密院機事時緣邊諸帥官重者互領陜西四路以故號令頗不一又兵多分屯堡障公言冝使大帥收重兵內地它帥自當一道緩急有警則分兵四出以援之其議久不决後卒如公計神道碑帝召二府天章閣觀書出詔目問天下利病事宰相倉猝莫敢對公時參知政事獨進曰臣等皆待罪二府固已總萬事而共謀之不當下同諸生對䇿願至中書條上既退草數千言奏之後皆施用神道碑初公言比有近幸之人多緣內降得橫恩冝因大祀之後斥絶以新聖政於是帝別為手詔與赦書同降神道碑公間言祖宗收方鎮之權嘗欲畿甸蓄禁兵四十萬今所蓄不精且多外𥙷戍更非彊夲之藝又武臣用恩幸者多得仕邊要而孤寒者常在東南至老無恩澤公乃作科條均其所入官而恩幸者滋不說神道碑皇祐中宋元憲公請置家廟下兩制禮官議以為廟室當靈長若身沒而子孫官微即廟隨毀請以其子孫習三品階勳及爵庶常得奉祀不報退朝録宋元憲公嘗奏事而帶寬誤墜文書于地不顧而行仁宗呼內侍臣拾以與之議者謂仁宗有人君體宋公得大臣體吕氏家孰記宋鄭公初名郊字伯庠與其弟祁自布衣時名動天下號為二宋其為知制誥仁宗驟加獎眷便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋交其言不祥仁宗遽命改之公怏怏不獲巳乃改名庠字公序公後更踐二府二十餘年以司空致仕兼享福壽而終而譛者竟不見用以卒可以為小人之戒也歸田録宋元憲公嘗曰殘人矜才逆詐恃明吾終身不為也退朝録王侍郎古說元憲宋公以言者斥其非才罷樞相守洛有一舉人行橐中有不稅之物為僕夫所告公曰舉人應舉孰無所貨之物未可深罪若奴告主此風不可長也寮屬曰犯人乃言官之子也意欲激其報之公不答但送稅院倍其稅仍治其奴罪而遣之麈史宋元憲雍雍然有德之君子也既參大政朝廷無事廟堂之上日閲文史後既登庸天下承平日久尤務清靜無所作為有為者病之公嘗自謂時賢多以不才誚我因為自詠詩曰我夲無心士終非濟丗才虛舟人莫怒疑虎石當開蚊負愁山重葵傾喜日來欲將嘲強解真意轉悠哉麈史宋元憲公初執政遇事輒分别是非可否用是斥退及再登用遂浮沉偷安云
