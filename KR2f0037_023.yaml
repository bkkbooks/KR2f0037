body:
  text: 四之二端明蔡公公名襄字君謨興化軍仙遊人中進士甲科慶暦𥘉除知諌院兼修起㞐注政事有急者至一夕三上䟽四年以親老出知福州遂爲福建路轉運使丁父憂服除復修注知制誥知開封府出知泉州再知福州召爲翰林學士三司使出知杭州遷端明殿學士徙知應天府未行丁母憂以疾卒年五十六范仲淹貶知饒州余靖上䟽論救尹洙請與同貶歐陽脩移書責司諌髙若訥皆坐貶蔡襄作四賢一不肖詩以記其事四賢謂淹靖洙脩不肖謂若訥也其詩播于都下士人爭傳冩之鬻書者市之頗獲厚利契丹使至宻市以還後張中庸使北幽州館舎中有冩歐陽脩詩於壁者政要慶暦𥘉永叔安道王素俱除諌官君謨以詩賀曰御筆新除三諌官喧然朝野競相歡當年流落丹心在自古忠良得路難必有謀猷禆帝右直湏風采動朝端世間萬事俱塵土留取功名乆逺㸔三人以其詩薦於上㝷亦除諌官記聞是時天下無事士大夫㢮於乆安一日元昊叛師乆無功天子慨然厭兵思正百度以修太平旣已排羣議進退二三大臣又詔増置諌官四貟使拾遺𥙷闕所以遇之甚寵公以材名在選中遇事感激無所廻避權倖畏歛不敢撓法干政而上得益與大臣圖議明年屢下詔書勸農桑興學校革弊修廢而天下竦然知上之求治矣於此之時言事之臣無日不進見而公之𥙷益爲尤多歐公撰墓誌御史唐公介以直言忤旨貶春州别駕廷臣無敢言者公獨論其忠人皆危之而上悟意解唐公得改英州遂復召用墓誌御史吕景𥘉呉中復馬遵坐論梁丞相罷臺職除他官公封還辭頭不草制其後屢有除授非當者必皆封還之而上遇公益厚曰有子如此其母之賢可知命特賜冠帔以寵之墓誌慶暦三年九月諌官蔡襄上言兩府私第毋得見賔客若欲詢訪天下之事采拔竒異之才許臨時延召詔旬休許見賔客至和二年七月翰林學士歐陽脩又上言兩制以上毋得詣兩府之第詔從之記聞陳執中以前兩府知青州兼青齊一路安撫使率民錢數萬貫修城民間苦之㑹賊王倫起沂州入青州境執中遣青齊捉賊傅永吉掩擊盡獲之上聞之嘉永吉以爲能超遷閤門使入見上稱羙其功永吉對曰臣非能有所成也皆陳執中授臣節度臣奉行之幸有成耳因極言執中之羙上益多永吉之讓而賢執中謂宰相曰陳執中在青州乆可召之遂以執中叅知政事於是諌官蔡襄孫甫等爭上言執中剛愎不才若任以政天下不幸上不聽諌官爭不止上乃命中使賫勑告即青州授之且諭意曰朕欲用卿舉朝皆以爲不可朕不惑人言力用卿耳明日諌官復上殿上作色逆謂之曰豈非論陳執中邪朕已召乆矣諌官乃不敢復言執中旣至中書是時杜衍章得象爲相賈昌朝與執中叅知政事凢議論執中多與之立異蔡襄孫甫所言旣不用因求出下中書中書共奏云諌院闕人乞且留二人供職旣奏上頷之退歸即召吏出劄子令襄甫且供職衍及得象旣署執中不肯署曰曏者上無明旨當復奏何得遽令如此吏還白衍衍取劄子壞焚之執中遂奏云衍黨顧二人苟欲令其在諌署欺罔擅權及臣覺其情遂取劄子焚之以滅迹懷姦不忠明日衍左遷尚書左丞出知兖州仍即日發遣賈昌朝爲相襄知福州甫知鄧州頃之得象亦出知陳州執中遂爲相記聞公爲政精明而於閩人㔫知其風俗至則禮賢勸學除其甚害徃時閩士多好學而専用賦以應科舉公得先生周希孟以經術傳授學者常至數百人公爲親至學舎執經講問爲諸生率延見處士陳烈尊以師禮而陳襄鄭穆方以徳行著稱郷里公皆折節下之閩俗重凶事而奉浮圖㑹賔客以盡力豐侈爲孝否則深自愧恨爲郷里羞而姦民㳺手無頼子幸而貪飲食利錢財來者無限極徃徃至數百千人至有親亡祕不舉哭必破産辦具而後敢發䘮者有力者乗其急時賤買其田宅而貧者立劵舉責終身困不能償公曰弊有大於此耶即下令禁止至於巫覡主病蠱毒殺人之類皆痛斷絶之然後擇民之聦明者敎以醫藥使治疾病其子弟有不率敎令者條其事作五戒以敎諭之乆之閩人大便公旣去閩人相率詣州請爲公立徳政碑吏以法不許謝即退而以公害政私刻于石曰俾我民不忘公之徳墓誌三司開封丗稱省府爲難治公㞐之皆有能名其治京師談笑無留事尤喜破姦發隱吏不能欺至啇財利則較天下盈虚出入量力以制用必使下完而上給下曁百司因習蠹弊切磨剗剔乆之簿書纎悉紀綱條目皆可法墓誌蔡侍郎襄自給事中三司使除禮部侍郎端明殿學士知杭州𥘉上入爲皇子中外相慶知大計巳定矣旣而稍稍傳言有異議者指蔡公爲一人及上即位始親政毎語及三司事便有忿然不樂之意蔡公終以此疑懼請出旣有除命韓曽二公因爲上言蔡襄事出於流言難以必信前世人主以疑似之嫌害及忠良者可以爲鑒也臣脩亦啓曰或聞蔡襄文字尚在禁中陛下曽觀之否上曰文字即不曽見無則不可知其必無臣奏曰若無文字則事未可知就使陛下曽見文字猶湏更辨眞僞徃時夏竦欲䧟富弼乃先令婢子學石介書字歲餘學成乃僞作介與弼書謀廢立事書未及上爲言者廉知而發之頼仁宗聖明弼得免禍至如臣丁母憂服闋初還朝有嫉忌臣者乃僞撰臣一劄子言乞沙汰内官欲以激怒羣閹是時家家有本中外喧傳亦頼仁宗保全得至今日由是而言陛下曽見文字猶湏更辨眞僞何況止是傳聞疑似之言何可爲信上曰官家若信傳聞蔡襄豈有此命歐陽公奏事録公於朋友重信義聞其䘮則不御酒肉爲位以哭盡哀乃止甞飲㑹靈東園坐客有射矢誤中傷人者客遽指爲公矢京師喧然事旣聞上以問公公即再拜愧謝終不自辨退亦未甞以語人墓誌公爲文章清遒粹美工於書畫頗自惜不妄爲人書仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰温成皇后碑文又勑公書則辭曰此待詔職也墓誌蘇子容云歐公不言文章而喜談政事君謨言政事而喜論文章各不矜其所能也蘇氏談訓襄性忮刻用刑殘酷知泉州時甞以叔母䘮不在式假通判黄泪攝州事與晉江令章拱之置酒作樂襄隂怒之即捃拱之事械送獄拱之坐是除名竄流其弟望之累詣闕訟冤乆之乃得雪朝廷不直其所爲而士亦以此少之四之二丞相萊國冦忠愍公公名凖字平仲華州下邽人中進士第知歸州巴東縣通判鄆州太宗召對稱㫖爲三司度支推官鹽鐵判官淳化二年擢左諫議大夫樞宻副使改同知院事罷知青州明年召叅知政事至道二年罷知鄧州咸平初徙河陽同州鳯翔府知開封府除三司使景德元年同平章事三年出知陜州從封㤗山徙天雄軍入爲樞宻使同平章事未幾以使相罷判河南府永興軍天禧元年復入相三年罷爲太子太傅降太常卿知相州徙安州貶道州司馬乾興元年再貶雷州司戸叅軍天聖元年徙衡州司馬未行而薨年六十三後十餘年贈中書令賜謚詔翰林學士孫抃撰神道碑御篆其首曰旌忠云太宗幸魏也公之年十有六以父䧟蕃上書行在辭色激昻舉止無畏上壯之命有司記姓名後二年進士及第寖以貴顯遺事公年十九舉進士時太宗取人多問其年年少者徃徃罷遣或教公增其年公曰吾初進取可欺君耶知歸州巴東縣毎期㑹賦役不出符移唯具郷里姓名揭縣門民莫敢後者嘗賦詩有野水無人渡孤舟盡日橫之句時以爲若得用必濟大川手植雙栢於縣庭至今民以比甘棠謂之萊公栢政要又燕談云元祐九年巴東大火栢與公祠俱焚明年莆陽鄭贑來爲令悼栢之焚惜公手植不忍剪伐種凌霄於下使附幹以上以著公遺迹且慰邦人之思太宗時冦公爲貟外郎奏事忤上㫖上拂衣起欲入禁中公手引上衣令上復坐决其事然後退上由是嘉之嘗曰朕得冦凖猶唐文皇之得魏鄭公也記聞太宗時一歲大旱天子以爲憂嘗輦過館中汎以問衆衆皆曰水旱天數也堯湯所毋奈何凖獨曰朝廷刑罰偏頗凡天旱爲是發耳上怒起入禁中頃之召凖問所以偏頗狀凖曰願召兩府至前臣即言之宫登樓以觀百姓皆合手叩額歌呼相慶曰少年天子也李后聞之不恱以告上上即召公責曰百姓但知有太子而不知有朕卿誤朕也公曰太子萬丗嗣社稷之主也若傳之失其人是爲可憂今天下歌其得賢臣敢以爲賀上意始解遺事章聖即位公守青州上想見之㑹遣中使撫廵山東因令問公安否且促取朝見表來公再拜謝曰陛下若不棄臣朝召而夕行也要君之章實不敢上旣而召還遂領相印遺事按此乃太宗朝事也契丹犯澶淵急書一夕凡五至萊公不發封飲笑自如明日同列以聞眞宗大駭取而發之皆告急也大懼以問公曰陛下欲了欲未了邪曰國危如此豈欲乆耶曰陛下欲了不過五日爾其說請幸澶淵上不語同列懼欲退公曰士安等止候駕起從駕而北上難之欲還内公曰陛下入則臣不得見而大事去矣請無還而行也遂行六軍百司追而及之談叢澶淵之役王超傅潜兵力弗加遂致中外之議不一至有以北戎狃開運之勝聞於上者唯冦萊公首乞親征李沆宋湜賛之然而群下終以未必勝爲言時陳堯叟請幸蜀王欽若乞幸江南上召萊公問之公曰不知誰爲此謀者上曰卿姑斷其可否勿問其人也公曰臣欲得獻䇿之人斬以釁鼓然後北伐耳上悟遂决澶淵之行見東軒筆録遺事及聞見録亦與此同行次長垣遣置邊河守將凖侍上側積制書數十通近臣在東西廡下呼而命之皆辭曰無兵詔報曰百姓皆兵府庫皆財聽若所爲不責若野戰但䧟失城郭則以軍法從事皆馳傳去州郡卒無䧟者萊公傳公從上在澶淵王欽若隂請幸金陵陳堯叟請幸蜀上以問公時欽若堯叟在旁公心知二人所爲陽爲不知曰誰爲陛下畫此䇿者可斬也今虜勢慿陵陛下當率勵衆心進前禦敵以衛社稷柰何欲委棄宗廟逺之楚蜀邪且以今日之勢鑾輿回軫一歩則四方瓦解萬衆雲散虜乗其勢楚蜀可得至邪上悟乃止二人由是怨公記聞又曰乗輿在河上行宮召公入計事公將入聞内中人謂上曰群臣欲將官家何之何不速還京師及入見上問以二人之策公曰群臣怯懦無知不異向者婦人之言云云上善其計遂北渡河按此二說與前說異當以前說爲正然其所記萊公之言爲尤詳故并録之契丹冦河北南至冀貝虜騎甚盛州郡震動天子北廵至澶州虜騎巳過魏府矣上疑不欲渡河駐南澶州凖勸上北渡以固士卒心毋令虜得乗勝上猶豫未决時陳堯叟勸上避之蜀王欽若勸上避之金陵上以問凖凖曰誰爲陛下畫此計者上曰頋所畫如何耳毋問其名凖曰臣姑欲知之先斬此曹以令天下且先帝建都垂五十年天下財用兵甲聚於京師宗廟社稷之所寄也不幸有事陛下當與臣等以死守之今一旦棄去非復陛下所有若盗賊因縁而起陛下當何歸乎上黙然按此亦與涑水記聞之說同凖又勸上北渡上猶未决因起更衣凖亦下殿去時髙瓊爲殿前都指揮使宿衛殿下凖謂瓊曰事當柰何太尉胡不一言瓊曰相公謀之廟堂瓊何敢與知然相公所以謂上何凖曰今渡河則河北不勞力而定不渡則虜日益熾人心不敢自固雖有智者不能善其後矣瓊呼曰陛下聽冦凖語凖所言是也上還問之語良乆凖即眣瓊以其兵先渡又自牽馬奉上上乃從之旣至澶州上御城北門凖居上前上盡以軍事委凖凖因承制專决號令明肅士卒喜恱虜數千騎乗勝薄城下有詔吏士迎擊之斬獲太半虜乃引退不敢復逼㑹暮上還宫留凖居城上上使人視凖何爲曰凖方飲酒歌笑上未甞不釋然也遺事云上至澶州賊猶未退公曰六軍心膽在陛下身上今若登城必禽賊矣上因御澶之北門將士望見黄屋皆呼萬歳聲震原野勇氣百倍又記聞曰公在澶淵毎夕與楊億飲博謳歌諧謔喧呼常逹旦或就寢則鼾息如雷上使人覘之喜曰得渠如此吾復何憂相持十餘日契丹計索欲引去始遣使請和旣有約矣又率其衆詐欲填壕㑹有飛矢射其統軍殺之契丹大擾其請和遂益堅凖不肯虜使來益恭上將許之凖欲邀使稱臣且獻幽州地時上厭兵事姑欲覊縻不絶而巳於是有譛凖不願與虜平幸有兵事以自取重上亦不恱凖不得巳乃許之當時虜舉國來冦入中國千餘里其歸不十日不能出漢地郡邑堅壁清野以待冦虜人馬飢乏百萬之衆可毋戰而死虜窘如此誠少抑緩之契丹不敢不稱臣幽州可必得也萊公傳又遺事云虜請和上以問公公曰如用臣䇿可數百年無事不然四五十年後臣恐戎心又生矣上曰朕不忍生靈受困不如且聽其和四五十年後安知無能捍塞者乎戎遂得和虜兵旣退來求和親命曹利用與之約時契丹巳疲又懼鎮定大兵扼其歸路見利用至甚喜寢以珠縁貂褥虜主求割河北利用曰如此臣得族罪矣不敢以聞許歲給金繒二十萬虜嫌其少利用復還奏之上曰百萬以下皆可許也利用出凖召利用至幄次語之曰雖有勑旨汝徃所許毋得過三十萬過三十萬勿來見凖凖將斬汝利用股栗再至虜帳果以三十萬成約而還記聞和議成諸將請設伏邀擊可使虜匹馬不返萊公勸帝勿從縱虜歸國以保盟好聞見録眞宗之次澶淵也一日語萊公曰今虜騎未退而天雄軍截在賊後萬一䧟没則河朔皆虜境也何人可爲朕守魏萊公曰當此之際無方略可展古人有言智將不如福將臣觀叅知政事王欽若福禄未艾冝可爲守於是即時進熟出勑退召欽若諭以上意授勑俾行欽若茫然自失未及有言公遽曰主上親征非臣子辭難之日叅政爲國柄臣當體此意馹騎巳集仍放朝辭便冝即塗身乃安也遽酌大白飲之命曰上馬盃欽若驚懼不敢辭飲訖拜别公荅拜曰叅政勉之回日即爲同列也欽若馳入魏則戎虜滿野無以爲計但屯塞四門終日危坐越數日虜騎退乃召爲次相或云王公數進疑辭於上前故萊公因事出之以成勝敵之勣耳東軒筆録初契丹入冦陳堯叟奏請㳂河皆撤去浮橋舟舡皆收泊南岸勑下河陽河中陜府如其奏百姓驚擾知河中府王濟獨不肯撤封還勑書且奏以爲不可陜州通判張稷時以公事在外州中巳撤浮橋稷還聞河中不撤乃復脩之冦公由是知此二人明年召濟爲知雜御史稷爲三司判官濟性鯁直衆多嫌之及冦公罷濟亦出守而卒記聞又談叢曰澶淵之役眞宗欲南下萊公不可曰是棄中原也欲斷橋因河而守公曰是棄河北也國之存亡在河北不可棄也澶淵之役所下一紙書爾州縣堅壁郷村入保金幣自隨糓不可徙隨在瘞藏冦至勿戰故虜雖深入而無得才破德清一城而得不𥙷失未戰而困談叢章聖甞謂兩府欲擇一人爲馬歩軍指揮使公方議其事吏有以文籍進者公問其故曰例簿也公叱曰朝廷欲用一牙官尚湏檢例即安用我軰哉壞國政者正由此耳遺事上以澶淵之功待公至厚群臣無以爲比數稱其功王欽若疾之承間言曰澶淵之役凖以陛下爲投瓊與虜博耳苟非勝虜則爲虜所勝非爲陛下畫萬全計也且城下之盟古人耻之今虜衆悖逆侵迫畿甸凖爲宰相不能殄滅㓙醜卒爲城下之盟以免又足稱乎上由是寖踈之頃之凖罷而天書事起記聞又聞見録云上旣回鑾毎歎萊公之功小人或譛之曰之孤注陛下知博乎錢輸將盡取其餘盡出之謂陛下冦凖之孤注也尚何念帝聞之驚甚萊公眷禮遂衰公鎮大名府北使道由之謂公曰相公望重何以不在中書公曰皇上以朝廷無事北門鏁鑰非凖不可掇遺大中祥符元年正月天書降于宫中承天門天子以改元其六月又降于㤗山是歲十月封泰山間二歲祀后土汾隂天子奉天書謹甚載以玉輅天書所行天子不敢當其道居無幾何復有神降于延恩殿號稱天尊天子親自見之上於是益崇飭祀事自天書始降則築昭應宫其後復置㑹靈景靈之屬而祀老子于亳州天下無慮皆神事矣凖是時出爲外官又不信天書上益踈凖最後知京兆府都監朱能復獻天書上以問王旦旦曰始不信天書者凖也今天書降凖所當令凖上之則百姓將大服而疑者不敢不信也上從之使中貴人逼凖朱能素事宦者周懷政而凖婿王曙居中與懷政善勸凖與能合凖始不肯曙固要凖凖亦因此復爲中書侍郎平章事天禧三年也萊公傳天禧末眞宗寢疾章獻明肅劉太后漸預朝政眞宗意不能平冦萊公探此意遂欲廢章獻立仁宗尊眞廟爲太上皇而誅丁謂曹利用等於是引李迪楊億曹瑋盛度李遵朂等叶力處畫巳定凢誥命盡使楊億爲之且將舉事㑹萊公因醉漏言有人馳報謂謂夜乗犢車徃利用家謀之明日利用入盡以萊公所謀白太后遂矯詔罷公政事及眞宗上仙遂指公爲反而投海上其事有類上官儀者天下冤之楊億臨死取當時所爲詔誥及始末事迹付遵朂收之章獻上仙遵朂乃抱億所留書進呈仁宗及叙陳夲末仁宗盡見當日曲直感歎再三遂下詔湔滌其冤贈中書令謚曰忠愍又贈楊億禮部尚書謚曰文凢預萊公黨而𬒳逐者皆昭雪之故李淑爲億贈官制曰天禧之末政漸宫闈能叶元臣議尊儲極蓋謂是也東軒筆録又龍川志云真宗晚年得風疾自疑不起甞卧枕宦者周懹政股與之謀欲命太子監國懷政東宮官也出與冦凖謀之凖遂議立太子廢劉后黜丁謂等使楊億草具詔書億私語其妻弟張演曰數日之後事當一新語稍洩丁謂夜乗婦人車與曹利用謀之誅懷政黜凖召億至中書億懼便液俱下面無人色謂素重億無意害之徐曰謂當改官煩公爲一好詞耳億乃少安凖初爲此謀欲遣使四方宣示風指誅異巳者使楊億爲詔書遣其壻王曙出使曙知其不可力止之意其必有禍敗藏其詔書草使其妻縫置夾衣中及劉后旣没朝廷方欲理凖舊勛曙出其書文字磨滅殆不可復識由此億得贈官賜謚凖爲人忠亮自信固無異心然使之得志必有恣横失衆之事未必不爲國之禍也又記聞曰眞宗不豫冦萊公與周懹政宻言於上請傳位太子上許之自皇后以下皆不與知旣而月餘無所聞二月二日上幸後苑命後宮挑生菜左右皆散去懷政伺上獨處宻懷小刀至上所涕泣言曰臣前言社稷大計陛下旣許臣等而月餘不决何也臣請割心以明忠欵因以刀劃其胷僵仆於地流血淋漓上大驚因是疾復作左右扶輿入禁中皇后命收懷政下獄案問其狀又於宮中索得萊公奏言傳位事乃命親軍校楊崇勲宻告云冦凖周懷政等謀廢上立太子遂誅懷政而貶萊公按此三書所載大同小異今並存之公好士樂善不倦推薦种放丁謂之徒皆出其門然嘗語所親曰丁生誠竒材惟不堪重任公爲丞相謂叅知政事嘗㑹食都堂羮染公鬚謂起拂之公正色曰身爲執政而親爲宰相拂鬚耶謂慙不勝公恃正直而不虞巧佞故卒爲所䧟遺事公爲樞宻使曹利用爲副使公以其武人輕之議事有不合者輙曰君一夫耳豈解此國家大體利用由是銜之眞宗將立劉后公及王旦向敏中皆諫以爲出於側微不可劉氏宗人橫於蜀奪民鹽井上以后故欲捨之公固請行法是時上巳不豫不能記覧政事多宫中所决丁知曹冦不平遂與利用合謀請罷公政事除太子少傅上初不知歲餘忽問左右吾目中乆不見冦凖何也左右亦莫敢言上崩太后稱制公再貶雷州是歲丁亦獲罪記聞又倦遊録云丁謂言先朝因節日賜宴于冦相第冦好以大白飲人時曹利用爲樞宻副使不領其意冦怒曰若一夫耳敢爾邪曹厲聲曰利用在樞府而相公謂之一夫明日當於上前辨之自此二公不恊厥後發萊公之事者曹貂也預謂何事然中外皆知萊公之禍丁有力焉又遺事云章聖不預謂侍臣曰使朕無後丗憂者惟冦凖李迪爲可託及大漸乃用丁謂而黜公皆非上意也公始謫道州司馬素無公宇百姓聞之競荷瓦木不督而㑹公宇立成頗亦宏壯守土者聞于朝遂再有海康之行倦遊録公之貶雷州也丁謂遣中使賁勑徃授之以錦囊貯劒揭於馬前旣至公方與郡官宴飲驛吏言狀公遣郡官出迎之中使避不見入傳舎中乆之不出問其所以來之故不荅上下皆皇恐不知所爲公神色自若使人謂之曰朝廷若賜凖死願見勑書中使不得巳乃以勑授之公乃從録事叅軍借緑衫着之短纔至膝拜受於庭升堦復宴飲至暮而罷記聞公貶死於雷詔還葬雒陽過公安民皆迎祭哭其䘮斬竹揷地以掛紙錢焚之尋復生笋成林邦人神之號曰相公竹因立廟其旁祀奉甚謹劉貢父王樂道各甞爲文刻石以記其事見麈史及名臣傳又東軒筆録云公赴貶雷州道出公安剪竹揷於神祠之前而祝曰凖之心若有負朝廷此竹必不生若不負朝廷此枯竹當再生其竹果生按此說與前二書異竊意前說爲是公少時不脩小節頗愛飛鷹走狗太夫人性嚴嘗不勝怒舉秤鎚投之中足流血由是折節從學及貴母巳亡每捫其痕輙哭記聞公初爲樞宻直學士賞賜金帛甚厚乳母泣曰太夫人不幸時家貧求一縑作衾禭不可得豈知今日冨貴哉公聞之慟哭盡散金帛終身不畜財産後雖出入將相所得俸禄惟務施與公外奢内儉無聲色之娱寢處一青幃二十餘年時時有破壞益命𥙷葺或以公孫洪事靳之笑荅曰彼詐我誠雖弊何憂且不忍處之乆而以弊復棄也靳者愧之遺事處士魏野贈公詩曰有官居鼎鼐無宅起樓臺及上即位北使至賜宴兩府預坐北使歷視坐中問譯者曰誰是無宅起樓臺相公坐中無荅丁謂令譯者謂曰朝廷初即位南方須大臣鎭撫冦公暫撫南夏非乆即還政要鄧州花蠟燭名著天下雖京師不能造相傳云是冦萊公燭法公嘗知鄧州而自少年冨貴不點油燈尤好夜宴劇飲雖寢室亦燃燭逹旦每罷官去後人至官舎見厠溷間燭淚在地徃徃成堆杜祁公爲人清儉在官未甞燃官燭油燈一炷熒然欲滅與客相對清談而巳二公皆爲名臣而奢儉不同如此然祁公壽考終吉萊公晚有南遷之禍遂殁不反雖其不幸亦可以爲戒也歸田録凖爲人敏銳多智忼慨好樂賔客奢侈玉食其自奉養時時越法度然不治産業而矜權尚氣收取聲名其天性也萊公傳王元之之子嘉祐爲館職平時若愚騃獨冦萊公知之喜與之語萊公知開封府一旦問嘉祐曰外人謂劣丈云何嘉祐曰外人皆云丈人旦夕入相萊公曰於吾子意何如嘉祐曰以愚觀之丈人不若未爲相爲善相則譽望損矣萊公曰何故嘉祐曰自古賢相所以能建功業澤生民者其君臣相得皆如魚之有水故言聽計從而功名俱美今丈人負天下重望相則中外有太平之責焉丈人之於明主能若魚之有水乎此嘉祐所以恐譽望之損也萊公喜起執其手曰元之雖文章冠天下至於深識逺慮殆不能勝吾子也記聞張忠定公守蜀聞萊公大拜曰冦凖眞宰相也又曰蒼生無福門人李畋怪而問之曰人千言而不盡者凖一言而盡然仕太早用太速不及學耳張冦布衣交也萊公兄事之忠定常面折不少恕雖貴不改也萊公在𡵨忠定在蜀還不留旣別頋萊公曰曾讀霍光傳否曰未也更無它語萊公歸取其傳讀之至不學無術笑曰此張公謂我矣談叢張乖崖常稱使冦公治蜀未必如詠至於澶淵一擲詠亦不敢爲也深歎服之記聞凖䟽通博𥙿果敢沈毅能斷大務不循細檢喜風幹善議論與人無城府接物無崖岸頋大義可爲者必奮厲翔躍以身先之其勇若賁獲至於外險中艱斬然涯垠亦坦坦無退衂意聞一善薦道推輓不進用不巳附離苟合者疾之如仇讎孫抃奉勑撰旌忠碑凖得罪南行過零陵踰大陂溪夷承間鈔掠而去巳而酋長召告之曰若等奈何竊賢相行橐神明其佑若乎趣遣種人持所掠還凖伏道下引道且拜凖慰遣之至南海晨旦朝謁從事如常時謂其子曰守法奉正士人常操以窮通成敗易之者非吾意也爲層樓於署東偏置机榻其間危坐終日寂無它營經史老莊及天笁書環列前後暇或看誦之賔至則慿髙瞰虚笑語燕燕若初無廊廟之貴者嶠南山水峻絶馬不能進郡縣官有伐竹爲輕輿以迓凖者凖謝曰吾罪人騎馬足矣冒炎溽捫險阻日行百里左右爲之泣下凖昂然無隕穫容色其度量過人如此及雷陽吏以圖獻閱視之首載郡東南門抵海岸凢十里凖恍然悟曰吾少時有到海秪十里過山應萬重之句廼今日意爾人生得䘮豈偶然耶旌忠碑丁謂敗得竄道繇海康凖從者有欲釋憾謀不利於謂凖知之陳大席一廡間設戯具悉召坐且命之博弈因隱几觀焉聞謂行廼罷旌忠碑又歸田録云冦忠愍公貶雷州時丁晉公與馮相拯在中書丁當秉筆初欲貶崖州而丁忽自疑語馮曰崖州再渉鯨波如何馮唯唯而巳丁乃徐擬雷州丁之貶也馮遂擬崖州當時好事者相語曰若見雷州冦司户人生何處不相逢比丁之南也冦復移道州冦聞丁當來遣人以蒸羊逆于境上而收其僮僕杜門不放出聞者多以爲得體凖平生著述於章䟽尤工旨粹言簡多所開益餘藁即焚㓕棄去雖至戚不得見好爲詩警䇿清悟有劉夣得元微之風格其氣燄竒拔則又過之旌忠碑
