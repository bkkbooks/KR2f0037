body:
  text: 子闔竊考國史寳元元年三月魏忠獻公以右司諫論罷宰執四人遂拜張文懿昭文章文簡集賢同日叅大政者乃王忠穆李康靖也子闔五世祖文莊公時在北門後又知開封府康定元年五月魏公爲樞宻直學士陜西經略安撫副使文莊公以翰林學士兼龍圖閣學士使陜右㑹魏公與夏英公議攻守䇿九月使事還道拜叅知政事與宋宣獻並制亦非宋元憲先是康靖以大資政罷文懿已去位再相吕申公距寳元之初僅三歲河内王公别録所記舛誤李貳卿續通鑑論之詳矣淳熈五年五月十二日朝奉郎新通判廬州軍州事賜緋魚袋晁子闔謹題三朝名臣言行録緫目第一卷一之一丞相魏國韓忠獻王琦第二卷二之一丞相韓國富文忠公弼二之二叅政歐陽文忠公脩第三卷三之一太師潞國文忠烈公彦愽三之二叅政趙康靖公槩三之三叅政吴文肅公奎三之四叅政張文定公方平第四卷四之一樞宻胡文恭公宿四之二端明蔡公襄四之三尚書王懿敏公素四之四集賢學士劉公敞第五卷五之一叅政唐質肅公介五之二叅政趙清獻公抃五之三御史中丞吕公誨五之四御史中丞彭公思永五之五内翰蜀郡范忠文公鎭第六卷六之一太傳魯國曽宣靖公公亮六之二丞相荆國王文公安石第七卷七之一丞相温國司馬文正公光諫議大夫司馬公康附第八卷八之一丞相申國吕正獻公公著侍講吕公希哲附第九卷九之一中書舎人曽公鞏九之二内翰曽文昭公肇九之三内翰蘇文忠公軾九之四門下侍郎蘇公轍第十卷十之一丞相康國韓獻肅公絳十之二門下侍郎韓公維十之三中書侍郎傳獻簡公堯俞十之四尚書彭公汝礪第十一卷十一之一丞相范忠宣公純仁十一之二尚書左丞王公存十一之三丞相蘇公頌第十二卷十二之一丞相劉忠肅公摯十二之二樞宻王公巖叟十二之三諌議劉公安丗第十三卷十三之一内翰范公祖禹十三之二侍郎鄒公浩十三之三諌議陳忠肅公瓘第十四卷十四之一康節邵先生雍十四之二宻學陳公襄十四之三祕書丞劉公恕十四之四節孝徐先生積十四之五正字陳公師道三朝名臣言行録緫目予讀近代文集及記事之書觀其所載國朝名臣言行之迹多有補於丗教者然以其散岀而無統也旣莫究其始終表裏之全而又汨於虚浮怪誕之說予常病之於是掇取其要聚爲此録以便記覽尚恨書籍不備多所遺闕嗣有所得當續書之五朝名臣言行録緫目第一卷一之一中書令韓國趙忠獻王普一之二樞宻使濟陽曹武惠王彬一之三丞相魯國范公質一之四内翰竇公儀一之五丞相李文正公昉一之六丞相許國吕文穆公蒙正一之七丞相張文定公齊賢第二卷二之一丞相吕正惠公端二之二樞宻錢宣靖公若水二之三丞相李文靖公沆二之四丞相王文正公旦第三卷三之一丞相向文簡公敏中三之二叅政陳晉公恕三之三尚書張忠定公詠三之四樞宻馬正惠公知節三之五樞宻曹武穆公瑋第四卷四之一丞相畢文簡公士安四之二丞相萊國冦忠愍公凖四之三太尉衛國髙烈武王瓊四之四内翰楊文公億四之五丞相王文康公曙第五卷五之一丞相沂國王文正公曾五之二丞相李文定公迪五之三叅政魯肅簡公宗道五之四叅政薛簡肅公奎五之五叅政蔡文忠公齊第六卷六之一丞相許國吕文靖公夷簡六之二丞相陳文惠公堯佐六之三丞相晏元獻公殊六之四丞相鄭國宋元憲公庠六之五叅政韓忠憲公億六之六叅政程文簡公琳第七卷七之一丞相祁國杜正獻公衍七之二叅政范文正公仲淹七之三東染院使种公丗衡第八卷八之一丞相潁國龐莊敏公籍八之二樞宻使狄武襄公青八之三叅政呉正肅公育八之四叅政王文忠公堯臣八之五樞宻包孝肅公拯八之六樞宻使魯國王武恭公德用第九卷九之一諫議田公錫九之二内翰王公禹偁九之三侍讀孫宣公奭九之四中丞李恭惠公及九之五中丞孔公道輔九之六起居舎人尹公洙九之七尚書余襄公靖九之八待制王公質九之九侍讀孫公甫第十卷十之一希夷陳先生搏种放魏野林逋附十之二安定胡先生瑗十之三㤗山孫先生復十之四徂徠石先生介十之五
