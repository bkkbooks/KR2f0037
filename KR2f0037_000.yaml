front:
  text: 王巖叟編魏公别録公甞言天下事不能必如人望仁宗時王隨陳堯佐爲輔相皆老病而不和中書事多不决韓億石中立二叅政又頗以私害公公時爲諌官屢䟽不納後物議益喧公復上章乞廷辯上迫於正論遂罷四人者當時天下望在王沂公吕申公杜祁公范希文而公亦引薦之及宣麻日乃張士遜昭文章得象集賢宋庠晁宗慤叅政天下大失望公曰事固不可知如此人意不能必也李燾續通鑑長編按王巖叟此録謬誤宋庠叅政在寳元二年十一月晁宗慤叅政在康定元年九月不與士遜得象同入中書明甚宗慤此時在翰苑才二年庠實初除翰苑然上意本用庠偶以䜛止更一年餘卒用之或傳聞疑似致此而范仲淹二年前權知開封府坐䜛落天章閣待制去冬𥙷外方自饒徙潤猶未復職驟遷政府恐亦無此例韓琦自言必不差巖叟聽之不審又不加叅考遽筆之于書耳
