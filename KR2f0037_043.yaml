body:
  text: 九之四門下侍郎蘇公公名轍字子由老蘇先生之次子舉進士復中制科除商州軍事推官乞飬親不赴復為大名府推官熙寧二年上書召對為三司條例司屬官出為河南推官淮陽教授齊州掌書記簽書南京判官謫監筠州鹽酒稅知歙州績溪縣哲宗即位除祕書省校書郎明年至京師除右司諌遷起居郎中書舍人户部侍郎轍林學士奉使契丹還為御史中丞拜尚書右丞遷門下侍郎元祐末落職知汝州降授試少府監分司南京筠州居住又貶授散官安置循雷二州元符末移嶽州復太中大夫宫觀崇寧中降朝請大夫居潁昌政和末年八十餘薨轍年十九舉進士釋褐二十三舉直言仁宗親䇿之於廷時上春秋髙始倦於勤轍因所問極言得失䇿入轍自謂必見黜然考官司馬君實第以三等范景仁難之蔡君謨曰吾三司使也司會之言吾愧之而不敢怨惟胡武平以為不遜力請黜之上曰以直言召人而以直棄之天下謂我何宰相不得已置之下第除商州軍事推官知制誥王介甫意其右宰相專攻人主比之谷永不肯撰詞宰相韓魏公哂曰此人䇿語謂宰相不足用欲得婁師德郝處俊而用之尚以谷永疑之乎知制誥沈文通亦考官也知其不然故文通當制有愛君之言諌官楊樂道見上曰蘇轍臣所薦也陛下赦其狂直而收之盛德之事也乞宣付史館上恱從之潁濵遺老傳神宗嗣位既二年矣求治甚急轍以書言事即日召對延和殿時介甫新得幸以執政領三司條例上以轍為之屬不敢辭介甫急求財利而不知本吕惠卿為之謀主轍議事多牾一日介甫出一卷書曰此青苗法也諸君熟議之有不便以告勿疑它日轍告之曰以錢貸民使出息二分本以救民之困非為利也然出納之際吏緣為姦雖有法不能禁錢入民手雖有良民不免非理費用及其納錢雖冨民不免違限如此則鞭菙必用州縣事不勝煩矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥幸得錢非國之福使吏倚法督責非民之便吾雖未嘗假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病安用貸為晏之所言則常平法耳今此法見在而患不修公誠有意於民舉而行之劉晏之功可立俟也介甫曰君言有理當徐議行之後有異論幸勿相外也自此逾月不言青苗會河北轉運判官王廣廉召議事廣廉嘗奏乞度僧牒數千道為本錢於陜西漕司私行青苗法春散秋斂與介甫意合即請而施之河北自此青苗法遂行於四方遺老傳𥘉陳暘叔以樞密副使與介甫共事二人操術不同介甫所唱暘叔不深和也既召見謝卿材等八人欲遣之四方搜訪遺利中外傳笑知所遣必生事迎合然莫敢言轍往見暘叔暘叔逆問君獨來見何也對曰有疑欲問公耳近日有八人者欲遣往諸路不審公既知利害所在事有名件而使往按實之耶其亦未知其實漫遣出外網捕諸事也暘叔曰所遣果賢將不肯行君無過憂對曰公誠知遣使之不便而恃遣者之不行何如暘叔曰君姑退得徐思之後數日暘叔召屬官於密院言曰上即位之𥘉命天下監司具本路利害以聞至今未上今當遣使冝得此以議可草一劄子乞催之惠卿覺非其非黨中意不樂漫具草無益也轍知力不能救以書抵介甫暘叔指陳其決不可者且請補外介甫大怒將加以罪暘叔止之奏除河南推官遺老傳元祐元年除右司諌宣仁后臨朝用司馬君實吕晦叔等欲革弊事舊相蔡確韓縝樞密使章惇皆在位窺伺得失中外憂之轍言曰先帝晚年寢疾彌留照知前事之失親發德音將洗心自新以合天意而此志不遂奄棄萬國天下聞之知前日弊事皆先帝之所欲改思慕聖德繼之以泣是以皇帝踐阼聖母臨政奉承遺旨罷導洛廢市易損青苗止助役寬保甲免買馬放修城池之役復茶鹽鐵之舊黜吳居厚吕孝廉宋用臣賈青王子京張誠一吕嘉問蹇周輔等命令所至細民鼓舞相賀臣愚不知朝廷以為凡此誰之罪也上則大臣蔽塞聰明逢君之惡下則小臣貪冒榮利奔競無恥二者均皆有罪則大臣以任重責重小臣以任輕責輕雖三尺童子所共知也今確等自山陵以後猶偃然在職不肯引咎辭位以謝天下謹案確等受恩最深任事最久據位最尊獲罪最重而有􅌤靣目曽不知愧確等誠以昔之所行為是耶則今日安得不爭以昔之所行為非耶則昔日安得不言窮究其心所以安而不去者蓋以為是皆先帝所為非吾過也夫為大臣忘君徇巳不以身任罪戾而歸咎先帝不忠不孝寧有過此乞出臣此章宣示確等使自處進退之分臣雖萬死不恨也三人竟皆逐去然卒不以其前後反復歸咎先帝罪之丗以為恨遺老傳吕惠卿始諂事介甫倡行虐政以害天下其後勢鈞力抗則傾陷介甫甚於仇讎丗尤惡之時惠卿自知罪大乞宫觀自便不預貶竄轍且疏其姦請加深譴乃以散官安置建州天下韙之遺老傳司馬君實既以清德雅望專任朝政知雇役之害欲復行差役不知差雇之弊其實相半講之未詳而欲一旦復之民始聞而喜徐而疑懼君實不信也王介甫以其私説為詩書新義以考試天下士學者病之君實改為新格而勢亦難行方議未定轍言自罷差役至今僅二十年吏民皆未習慣况役法關涉衆事根芽盤錯行之徐緩乃得審詳若不窮究首尾匆遽便行恐既行之後别生諸弊今州縣役錢例有積年寬剩大約足支數年若且依舊雇役盡今年而止催督有司審議差役趂仐冬成法來年役使鄉户但使既行之後無復人言則進退皆便又言進士來年秋賦日月無幾而議不時決傳聞四方不免惶惑詩賦雖號小技而比次聲律用功不淺至於治經誦讀講解尤不可輕易要之來年皆未可施行欲乞先降指揮來年科場一切如舊惟經義兼取注疏及諸家論議或出巳見不專用王氏學仍罷律義令天下舉人知有定論一意為學以待選試然後徐議元祐五年以後科舉格式未為晚也遺老傳是嵗上將親饗明堂轍言國朝舊典冬至圜丘必兼饗天地從祀百神若其有故不祀圜丘别行他禮或大雩於南郊或大饗於明堂或恭謝於大慶皆用圜丘禮樂神位其意以為皇帝不可以三年而不親祀天地百神故也臣竊見皇祐明堂遵用此法最為得禮臣愚欲乞明詔禮官今秋明用皇祐明堂典禮庶幾精誠陟降溥及上下奏入不報至七年上將親郊轍備位政府乃與諸公共伸前議合祭天地遺老傳初神宗以夏國內亂用兵攻討於熙河路增置蘭州於延安路增置安強米脂等五寨至此夏國雖屢遣使而未修職貢二年夏始來賀登極使還未出境又遣使入界朝廷知其有請地之意然大臣議棄守未決轍言曰頃者西人雖至而疆埸之事初不自言度其狡心蓋知朝廷厭兵確然不請欲使此議發自朝廷得以為重朝廷深覺其意忍而不豫情得勢窮始來請命一失此機必為後悔彼若點集兵馬屯聚境上許之則畏兵而豫不復為恩不豫則邊舋一開禍難無已間不容髮正在此時不可失也况今日之事主上妙年母后聽斷將帥吏士恩情未接兵交之日誰使效命若其羽書沓至勝負紛然臨機決斷誰任其責惟乞聖心以此反覆思慮早賜裁斷無使西戎别致猖狂棄守之議皆不得其便於是朝廷許還五寨夏人遂服初元豐中河決大吳先帝知故道不可復還因導之北流水性已順惟河道未深隄防未立嵗有決溢之患本非深害至此諸公皆未究悉河事而潞公欲以河為重事中書侍郎吕微仲樞密副使安厚卿從而和之始謂河西流入泊淀久必淤淺異日或從北界入海則河朔無以禦狄故三人力主回河之計諸公莫能奪吕晦叔時為中書相轍間見問曰公自視智勇孰與先帝勢力隆重能鼓舞天下孰與先帝晦叔驚曰君何言歟對曰河決而北自先帝不能回而諸公欲回之是自謂智勇勢力過先帝也且河決自元豐導之北流亦自元豐是非得失今日無所預諸公不因其舊而修其未完乃欲取而回之其為力也難而其為責也重矣晦叔唯唯曰當與諸公籌之既而回河之議紛紛而起晦叔亦以病沒遺老傳轍遷户部侍郎常因轉對言曰願明詔有司罷外水監丞舉河北河事及諸路都作院皆歸轉運司至於都水軍器將作三監皆兼隸户部使定其事之可否裁其費之多少而工部任其功之良苦程其作之遲速苟可否多少在户部則傷財害民户部無所逃其責矣苟良苦遲速在工部則敗事乏用工部無所辭其譴矣利出于一而後天下貧冨可責之户部矣朝廷以為然從之惟都水仍舊遣老傅轍自為中書舍人與范子功劉貢父同詳定六曹條例子功領吏部元豐所定吏額主者苟恱群吏比舊額幾數倍朝廷患之命量事裁減巳再上再却矣子功奉使轍兼領事吏有白中孚者進曰吏額不難定也昔之流內銓今侍郎左選也事之煩劇莫過此矣昔銓吏止十數而今左選吏至數十事不加舊而用吏至數倍何也昔無重法重祿吏通賕賂則不欲人多以分所得今行重法給重祿賕賂比舊為少則不忌人多而幸於少事此吏額多少之大情也舊法日生事以難易分七等重者至一分輕者至一釐以下積若干分而為一人今若取逐司兩月事定其分數則吏額多少之限無所逃矣轍以其言遍問屬官皆莫應獨李之儀對曰是誠可為也即與之儀議之曰此羣吏身計所係也若以分數為人數必大有所損將大致紛紜雖朝廷亦將不能守乃具以白宰執請據實立額俟吏之年滿轉出或事故死亡者勿輔及額而止不過十年羡額當盡功雖稍緩而見吏知非身患不復怨矣諸公以為然遂申尚書省取諸司兩月生事諸司吏皆疑懼莫肯供再申乞榜諸司使知所立額俟它日見闕不輔非法行之日即有減損也榜出文字即具至是成書以申三省左僕射吕微仲大喜欲攘以為已功以問三省吏皆莫曉有諸司吏任永壽者頗知其意微仲恱之於尚書省創吏額房使永壽與三省吏數人典之小人無逺慮而急於功利即背前約以立額日裁損吏貟復以好惡改易諸吏局次几近下吏人惡為上名所壓者即為撥出上名於它司間慢司分欲入要地者即自寺丞監撥入省曹之類是也凡奏上行下皆微仲專之不復經三省法出中外洶洶微仲既為御史所攻永壽亦以恣橫贓汙刺配久之微仲知衆不伏乃使左右司再加詳定略依本議行下遺老傳使契丹還為御史中丞自元祐𥘉革新庶政至是五年矣一時人心已定惟元豐舊黨分布中外多起邪説以搖撼在位吕微仲與中書侍郎劉莘老二人尤畏之皆持兩端為自全計遂建言欲引用其黨以平舊怨謂之調亭宣仁后疑不決轍於延和靣論其非退復再以劄子論之奏入宣仁后命宰執於簾前讀之仍諭之曰蘇轍疑吾君臣遂兼用邪正言極中理諸公相從和之自此參用邪正之説衰矣轍復奏曰竊見方今天下雖未大治而祖宗綱紀具在州郡民物粗安若大臣正已平心無生事要功之意因弊修法為安民靖國之術則人心自定雖有異黨誰不歸心向者異同反覆之心蓋亦不足慮矣但患朝廷舉事類不審詳曩者黃河北流正得水性而水官穿鑿欲導之使東移下就髙汩五行之理及陛下遣官按視知不可為猶或固執不從經今纍嵗回河雖罷減水尚存遂使河朔生靈財力俱困今者西夏青唐外皆臣順朝廷招來之厚惟恐失之而熙河將吏創築二堡以侵其膏腴議納醇忠以奪其節鉞功未可覬爭巳先形朝廷雖知其非終不明白處置若遂養成邊舋關陜豈復安居如此二事則臣所謂冝正已平心無生事要功之意者也昔嘉祐以前鄉差衙前民間常有破産之患熙寧以後出賣坊場以雇衙前民間不復知有衛前之苦及元祐之𥘉務於復舊一例復差官收坊埸之錢民出衙前之費四方驚顧衆議沸騰尋知不可旋又復雇去年之秋又復差法又熙寧雇役之法三等人户並出役錢上户以家産髙強出錢無藝下户昔不充役亦遣出錢故此二等人户不免咨怨至於中等昔既巳自差役今又出錢不多雇法之行最為其便罷行雇法上下二等欣躍可知唯是中等則反為害且如畿縣中等之家例出役錢三貫若經十年為錢三十貫而已今差法既行諸縣手力最為輕役農民在官日使百錢最為輕費然一嵗之用已為三十六貫二年役滿為費七十餘貫罷役而歸寬鄉得間三年狹鄉不及一嵗以此較之則差役五年之費倍於雇役十年賦役所出多在中等如此條目不便非一故天下皆思雇役而厭差役今五年矣如此二事則臣所謂冝因弊修法為安民靖國之術者也臣以聞見淺狹不能盡知當今得失然四事不去如臣等輩猶知其非而况於心懷異同志在反覆幸國之失有以藉口者乎臣恐如此四事彼已默識於心多造謗議待時而發以搖撼衆聽矣伏乞宣喻宰執事有失當改之勿疑法或未完修之無倦苟民心既得則異議自消陛下端拱以享承平大臣逡巡以安冨貴海內蒙福上下所同豈不休哉然大臣怙權耻過終莫肯改遺老傳轍為執政三省又奏除李清臣吏部尚書給事中范祖禹封還詔書進呈不允祖禹執奏如初正言姚勔亦言不當三省復除蒲宗孟兵部尚書轍謂諸公且候邦直命下然後議此如何皆不應及簾前微仲奏諸部久闕尚書見在人皆資淺未可用又不可闕官須至用前執政上有黽俯從之之意轍奏前日除李清臣給諌紛然爭之未定今又用宗孟恐不便宣仁后曰奈闕官何轍曰尚書闕官已數年何嘗闕事今日用此二人正與去年用鄧溫伯無異此三人者非有大惡但昔與王圭蔡確輩並進意思與今日聖政不合見今尚書共闕四人若並用似此四人使互進黨類氣勢一合非獨臣等耐何不得亦恐朝廷難耐何矣且朝廷只貴安靜如此用人臺諌安得不言臣恐自此閙矣宣仁后曰信然不如且靜諸公遂卷除目持下遺老傳微仲之在陵下也堯夫奏乞除執政上即用李邦直為中書侍郎鄧聖求為尚書右丞二人久在外不得志遂以元豐事激怒上意邦直尤力舊法母后之家十年一奏門客時皇太妃之兄朱伯材以門客奏徐州冨人竇氏堯夫無以裁之一日日中請轍於都堂與邦直議之轍曰上始親政皇太妃閣中事當遍議之車服儀制已付禮部月費冝付户部奏薦付吏部可也凡事付有司必以法裁處朝廷又酌其可否而後行於體為便明日奏之上曰月費俟內中批出奏薦皇太后家減二年皇太妃十年議已定邦直獨曰此可為後法今姑與之可也上從之邦直之附會類如此會廷䇿進士邦直撰䇿題即為邪説以扇惑群聽轍論之曰先帝在位近二十年而終身不受尊號裁損宗室恩止袒免減朝廷無窮之費出賣坊埸雇募衙前免民間破家之患罷黜諸科誦數之學訓練諸將慵墯之兵置寄祿之官復六曹之舊嚴重祿之法禁交謁之私行淺攻之䇿以制西戎收六色之錢以寬雜役凡如此類皆先帝之睿算有利無害而元祐以來上下奉行未嘗失墜者也至於其他事有失當何丗無之父作之於前子救之於後前後相濟此則聖人之孝也漢武帝外事四夷內興宫室財用匱竭於是修鹽鐵榷酤均輸之政民不堪命幾至大亂昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察為明以讖決事天下恐懼人懷不安章帝即位深鑒其失代之以寬厚愷悌之政後丗稱焉臣不勝區區願陛下反覆臣言御名勿輕事改易若輕變九年已行之事擢任纍嵗不用之人人懷私忿而以先帝為詞則大事去矣奏入不報再以劄子靣論之上不恱李鄧從而媒孽之乃以夲官出知汝州遺老傳蘇子由崇寧中居潁昌方以元祐黨籍為罪深居自守不復與人相見逍遙自處終日默坐如是者幾十年以至於沒亦人所難能也吕氏雜志八之三參政吳正肅公公名育字春卿建州浦城人中進士甲科舉賢良方正通判蘇州還知太常禮院改右正言供職知制誥進翰林學士知開封府慶曆五年拜樞密副使數月改參知政事復為樞密副使出典數州召為翰林侍讀學士辭疾請郡得汝州會疾甚以集賢院學士判西京留司御史臺召還判尚書都省除宣徽南院使鄜延路經略安撫使以疾辭改知河中徙河南薨年五十五公為人明敏徑果強學博辨能自忖度不可守不發已發莫能屈奪歐陽公撰墓志公為政簡嚴所至民樂其不擾去雖久愈思之知襄城縣宗室宦官往來上冢過縣者無虛日或夜半叩縣門索牛駕車公輒不應及旦徐告曰牛不可得也由是皆曰此不可為也凡過其縣者不敢以鷹犬犯民田至它境然後敢縱獵其治開封府尤先豪猾曰吾何有以及斯人去其為害者而巳墓志元昊初遣使上書有不順語朝廷亟命將出師而群臣爭言竪子可即誅滅獨公以謂元昊雖名蕃臣而實夷狄其服叛荒忽不常冝示以不足責外置之且其巳僣名號誇其人勢必不能自削以取羞種落第可因之賜號若國主者且故事也彼得其欲冝不肯妄動然時方鋭意於必討故皆以公言為不然其後師久無功而元昊亦歸過自新天子為除其罪卒以為夏國主由是議者始悔不用公言而虛弊中國墓志又龍川志六寶元初元昊慢書始聞張鄧公為相即議絶和問罪時西邊弛備已久不知兵識者以為憂吳春卿時為諫官上言夷狄不識禮義冝勿與較許其所求彼將無詞舉動然後隂勑邊臣密修戰備使年嵗之間戰守之計立則元昊雖欲妄作不能為深害矣奏入鄧公笑曰人言吳舍人心風果然既而和事一絶元昊入寇所至如入無人之境後數年力盡求和嵗增賂遺仍改名兀卒朝廷竟亦不問丗乃以春卿之言為然公嘗與賈丞相爭事上前殿中人皆恐色變公論辨不巳既而曰臣所爭者職也顧力不能勝矣願罷臣職不敢爭上多公直乃復以為樞密副使居嵗餘大旱賈丞相罷去御史中丞髙若訥用洪範言大臣廷爭為不肅故雨不時若因并罷公墓志公知蔡州蔡故多盜公按令為民立伍保而簡其法民便安之盜賊為息京師有告妖賊聚確山者上遣中貴人馳至蔡以名捕者十人使者欲得兵自往取之公曰使者欲藉兵立威欲得妖人以還報也使者曰欲得妖人爾公曰吾在此雖不敏然聚千人于境內安得不知使信有之今以兵往是趣其為亂也此不過鄉人相聚為佛事以利錢財爾一弓手召之可致也乃館使者日與之飲酒而密遣人召十人者皆至送京師告者果伏辜墓志龐丞相經略河東與夏人爭麟州界亟築柵於白草公以謂約不先定而亟城必生事遽以利害牒河東移書龐公且奏疏論之朝廷皆不報已而夏人果犯邊殺驍將郭恩而龐丞相等與其將校十數人皆以此得罪麟府遂警墓志公在二府太保公以列卿奉朝請父子在廷士大夫以為榮而公踧踖不安自言子班父前非所以示人以法顧不敢以人子私亂朝廷之制願得罷去不聽天子數推恩群臣子弟公每先及宗族踈逺者至公之卒子孫未官者七人墓志公在諫職時賈昌朝等數人名編修資善堂書而實教授內侍公奏罷之為參知政事山東盜起仁宗遣中使察視還奏盜不足慮惟兖州杜衍鄆州冨弼得山東心此為可憂上欲徙二人淮南公曰盜誠無足慮而小人乘時以傾大臣非國家福也乃止後判西京留司御史臺留臺舊不領民事時張堯佐知河陽民訟久不決多詣公者公為辨曲直判狀尾堯佐畏恐奉行上嘗語輔臣曰育剛正可用但嫉惡太過耳公性明果所至作條教簡踈易行而不可犯遇事不妄發發即莫能奪其辨論明白使人聽之不疑初尹開封范仲淹在政府因白事數與仲淹忤既而仲淹安撫河東有奏請多為任事者所沮公取可行者固執行之王鞏云其父仲儀言陳執中罷相仁宗問誰可代卿者執中舉吳育上即召赴闕會乾元節侍宴偶醉坐睡忽驚顧拊床呼其從者上愕然即除西京留臺以此觀之執中雖俗吏亦可賢也育之不相命矣夫然晚節有心疾亦難大用仁宗非棄材之主也東坡志林
