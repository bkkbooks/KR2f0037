body:
  text: 三之四參政張文定公公名方平字安道宋城人明道二年以茂材異等擢為祕書省校書郎知蘇州崑山縣又以賢良方正直言極諌中選通判睦州召知諌院知制誥除翰林學士為三司使坐事出知滁州徙江寧府杭州入判流內銓知滑州移益州以三司使召還復出知南京帥秦州英宗𥘉召還翰林為學士承旨神宗即位除參知政事丁父憂服除入覲知陳州徙南京過闕除宣徽使知青州公以英宗所書立神宗十五字進遂詔歸本院供職除中太一宫使久之復請去乃易宣徽南院使判應天府請老以太子少師致仕元祐六年薨年八十五公年十三入應天府學潁悟絶人家貧無書嘗就人借三史旬日輒歸之曰吾巳得其詳矣凡書皆一閲終身不再讀屬文未嘗起草宋綬蔡齊見之曰天下竒材也共薦之蘇內翰撰墓志通判睦州時趙元昊欲叛而未有以發則為嫚書求大名以怒朝廷規得譴絶以激使其衆公以謂朝廷自景德以來既與契丹盟天下忘備將不知兵士不知戰民不知勞蓋三十年矣若驟用之必有喪師蹶將之憂兵連民疲必有盜賊意外之患當含垢匿瑕順適其意使未有以發得歲月之頃以其間選將厲士堅城除器為不可勝以待之雖元昊終於必叛而兵出無名吏士不直其上難以決勝小國用兵三年而不見勝負不折則破我以全制其後必勝之道也方是時士大夫見天下全盛而元昊小醜皆欲發兵誅之惟公與吳育同議議者不深察以二人之論為出於姑息遂決計用兵天下騷動公獻平戎十䇿大略以為邊城千里我分而賊専雖屯兵數十萬然賊至常以一擊十必敗之道也既敗而圖之則老師費財不可為已冝及民力之完屯重兵河東示以形勢賊入寇必自延渭而夏州巢穴之守必虛我師自麟府渡河不十日可至此所謂攻其所必救形格勢禁之道也宰相吕夷簡見之謂宋綬曰君能為國得人矣然不果用其䇿墓志方元昊之叛也禁兵皆西而諸路守兵多㨂赴闕郡縣無備乃命調額外弓手公在睦州條上利害八事及是有旨遣使於陜西河東京東西路刺弓箭手為宣毅保捷指使公連上疏爭之甚力不從所刺兵二十餘萬人皆市人不可用而宣毅驕甚所至為寇自是民力大困國用一空識者以不從公言為恨墓志元昊既叛陜西四路置帥夏英公竦為總帥居長安不臨邊精兵勇將得留置麾下四路戰守出入皆取決焉既逺不及事而四路負敗罰終不及總帥知制誥張公安道為諌官言自古元帥無不身自對敵雖齊桓晉文霸主亦親履行陳至於將佐有敗元帥必任其責諸葛亮為大將軍馬謖之敗降右將軍此古今通義也今夏竦端坐長安末嘗臨敵諸路失律一皆不問有總帥之名而無總帥之實乞據四路敗事加以責罰而罷總帥使四路帥臣自任戰守之計有事干它路者遞相關報隨冝救應於事為便朝廷從之英公降知别州而四路各任其事蓋始於此龍川志慶曆元年西方用兵已六年矣上既益厭兵而賊亦困弊不得耕牧休息虜中匹布至十餘千元昊欲自致其道無由公慨然上疏曰陛下猶天地父母也豈與此犬豕豺狼較勝負乎願因今嵗郊赦引咎示信開其自新之路申敕邊吏勿絶其善意若猶不悛亦足以怒我而曲彼雖天地鬼神必將誅之仁宗喜曰是吾心也命公以疏付中書吕夷簡讀之拱手曰公之言及此是社稷之福也是歲赦書開諭如公意明年元昊始請降墓志權知開封府府事至繁為尹者皆置版以記事公獨不用默記數百人以次決遣了無遺忘吏民大驚以為神不敢復欺墓志元昊遣使求通巳在界上而契丹與元昊御名隙使來約我請拒絶其使時主者欲遂納元昊故為答書曰元昊若盡如約束則理難拒絶仁宗以書示公與宋祁公上議曰書詞如此是拒契丹而納元昊得新附之小羌而失久和之強虜也封册元昊而契丹之使再至能終不聽乎若不聽則契丹之怨必自是始若聽而絶之則中國無復信義永斷招懷之理矣是一舉而失二虜也當賜元昊詔曰朝廷納卿誠𣢾本緣契丹之請今聞卿招誘契丹邊户失舅甥之歡契丹遣使為言卿冝審處其事但嫌隙朝除則封册莫行矣如此於西北為兩得時人伏其精識墓志宰相賈昌朝與參知政事吳育忿爭上前公將對昌朝使人約公當以公代育公怒叱遣曰此言何為至於我哉既對極論二人邪正曲直然育卒罷墓志又荆公曰録云神宗嘗言方平少時好進嘗自干仁宗求為執政荆公言方平為御史中丞専附賈昌朝誤仁宗賞罰甚衆前三司使王拱辰請榷河北鹽既立法矣而未下公見上問曰河北再榷鹽何也仁宗驚曰始立法非再也公曰周丗宗榷河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅而弛其禁丗宗許之今兩稅鹽錢是也豈非再榷乎仁宗大悟曰卿語宰相立罷之公曰法雖未下民已户知之當直以手詔罷不可自有司出也仁宗大喜命公密撰手詔下之河朔父老相率拜迎於澶州為佛老會者七日以報上恩且刻詔書北京至今父老過其下必稽首流涕墓志又龍川志云河朔地鹻民刮鹻煎鹽不買而足用周世宗常榷海鹽共得三十萬緡民多犯法極苦之藝祖征河東還父老進狀乞隨兩稅納錢三十萬緡而罷榷法藝祖許焉今兩稅外食鹽錢是巳是時民於澶州河橋設感聖恩道埸父老至今能道之及仁宗朝王君貺為三司使復議榷法未定君貺去職張安道繼之具本末以奏且曰河朔歲有河堤國信之勞比諸道為苦恐不冝復榷鹽以困之仁宗驚曰朕不知也奈何重困河朔生靈卿為朕撰數句語朕將親批出使河朔人知此意即批奏牘後曰朕恐河朔軍民復食貴鹽所請冝不行時賈魏公昌朝留守北都聖語至即刻石於府園騎山樓癭木亭上及賈公再守魏而提點刑獄薛向密奏乞行榷法託以它事入議朝廷許之賈公具知其計及其還置酒邀之中食引至騎山癭木亭相對酒五行無它語向顧見石刻知事巳露遂不復議榷事魏人以此深德賈公又筆談亦云太祖嘗降墨勑聽民賈販唯收稅錢與龍川志同慶曆中衛士夜逾宫垣為變仁宗旦語二府以貴妃張氏有扈蹕之功樞密使夏竦倡言冝講求所以尊異貴妃之禮宰相陳執中不知所為公見執中言漢馮婕妤身當猛獸不聞有所尊異且皇后在而尊貴妃古無是禮若果行之天下謗議必大萃於公終身不可雪也執中聳然敬從公言而罷墓志自陜右用兵公私困之公言自祥符以來萬事惰弛務為姑息漸失祖宗之舊取士任子磨勘遷輔之法既壞而任將飬兵皆非舊律國用既窘則政出一切大啇姦民乘隙射利而茶鹽香礬之法亂矣此治亂盛衰之本不可以不急治且比年以來朝廷頗引輕嶮之人布之言路違道干譽利口為賢內則臺諌外則監司下至吏胥僮奴皆可以御名危其上自將相公卿宿貴之人皆爭屈體以收禮後輩有不然者則謗毀隨之惴惴焉惟恐不免何暇展布心腹為國立事哉此風不革天下無時而治也墓志又龍川志云張公安道嘗為豫言道非眀民將以愚之國朝自真宗以前朝廷尊嚴天下私説不行好竒喜事之人不敢以事搖撼朝廷故天下之士知為詩賦以取科第不知其它諺曰水到魚行既巳官之不患其不知政也昔之名宰相皆以此術馭天下仁宗𥘉年王沂公吕申公為政猶持此論自設六科以來士之翹俊者皆爭論國政之長短二公既罷則輕鋭之士稍稍得進漸為竒論以撼朝廷朝廷往往為之動搖廟堂之淺深既可得而知而好名喜事之人盛矣申公雖復作相然不能守其舊俗意雖不喜而亦從風靡矣其始也范諷孔道輔范仲淹三人以才能為之稱首其後晏元獻為政冨鄭公入參政事多置諌官以廣上聽上方嚮之而晏公深為之助乃用歐陽修余靖蔡襄孫沔等並為諌官諌官之勢自此日橫鄭公尤傾身下士以求譽相師成風上以謙虛為賢下以傲誕為髙於是私説遂勝而朝廷輕矣然豫以張公之論得其一不得其二徒見今丗朝廷輕甚故思曩日之重然不知其敝也大臣恣為非橫而下無由能動其害亦不細也使丁晉公之時臺諌言事必聽巳如仁宗中年其敗巳久矣至於申公非諸公並攻其短其害亦必有甚者蓋朝廷之重輕則不在此誠使正人在上與物無私而舉動適當下無以議之而朝廷重矣安在使下不得議哉下情不上通此亦人主之深患也可則從之否則違之豈害於重哉西漢之𥘉専任功臣侯者如絳灌之流不可謂不賢至使賈誼董仲舒皆老死不得用事遍則害生故曰張公得其一不得其二由此言之也秦州叛羌斷古渭路帥張忭發兵討賊而副總管劉渙不受命皆罷之以公代忭公力辭曰渙與忭有階級今互言而兩罷帥不可為也忭以故得不罷墓志移鎮西蜀始李順以甲午歲叛蜀人記之至是方以為憂而轉運使攝守事西南夷有卭部川首領者妄言蠻賊儂智髙在南詔欲來寇蜀攝守大驚調兵築城民大驚擾朝廷聞之發陜西步騎戍蜀兵仗絡繹相望於道詔促公行且許以便冝從事公言南詔去蜀二千餘里道嶮不通其間皆雜種不相役屬安能舉大兵為智髙寇我哉此必妄也臣當以靜鎮之道遇戍卒兵仗輒遣還入境下令卭部川曰寇來吾自當之妄言者斬悉歸所調兵罷築城之役會上元觀燈城門皆通夕不閉蜀遂大安巳而得卭部川之譯人始為此謀者斬之梟首境上而配流其餘黨於湖南西南夷大震先是朝廷獲智髙母子留不殺欲以招智髙至是乃伏法復以三司使召還奏罷蜀橫賦四十萬減鑄鐵錢十餘萬蜀人至今紀之墓志公𥘉主計京師有三年糧而馬粟倍之至是馬粟僅足一歲而糧亦減半因建言京師無山河之險特依重兵以立國耳兵恃食食恃漕運河控引江淮利盡南海天聖以前歲發民浚之故河行地中有張君平者以疏導京東積水始輟用汴夫其後淺妄者爭以裁減費役為功河日湮塞今仰而望河非祖宗之舊也遂畫漕運十四䇿宰相冨弼請施行之退謂公曰自慶曆以來公論食貨詳矣其後未期而京師有五年之蓄墓志知秦州時亮祚方驕僣閲士馬築堡篳篥城之西壓秦境上屬户皆逃匿山林公即料簡將士聲言出塞實按軍不動賊既不至言者因論公無賊而輕舉宰相曽公亮曰兵不出塞何名為輕舉有備而賊不至則以輕舉罪之邊臣自是不敢為先事之備矣墓志按溫公集有論張方平守邊輕易狀言其姦憸貪猥士論共知在秦州貴倨下情不通臣罪其素無備不罪其過為備也英宗不豫學士王圭當直不召召公赴福寧殿上憑几不言賜公坐出書一幅八字曰來日降詔立皇太子公抗聲曰必頴王也嫡長而賢請書其名上力疾書以付公公既草制尋充册立皇太子禮儀使墓志神宗即位召見側門公曰仁宗崩厚葬過禮公私騷然請損之上曰奉先可損乎公曰遺制固云以先志行之天子之孝也上歎曰是吾心也公又奏百官遷秩恩已過厚若錫賚復用嘉祐近比恐國力不能支乞追用乾興例足矣從之省費十七八墓志御史中丞王陶擊宰相參知政事吳奎與之辨上欲罷奎且諭公曰奎罷當以卿代公力辭曰韓琦久在告意保全奎奎免必不復起琦勳在王室願陛下復奎位手詔諭琦以全始終之分及奎罷竟以公代之墓志又溫公集有二劄子論方平姦邪貪猥嘗為包拯所論事迹甚多溫公由此罷臺職云御史中丞缺曽公亮欲用王安石公極論安石不可用墓志又記聞云上將召用介甫訪於大臣爭稱譽之張安道時為承旨獨言安石言偽而辨行偽而堅用之必亂天下由是介甫深怨之知陳州時方置條例司行新法率欲以豐財而強兵公因陛辭極論其害皆深言危語曰水所以載舟亦所以覆舟兵猶火也不戢當自焚若行新法不巳其極必有覆舟自焚之憂上雅敬公不甚其言曰能復少留乎公曰退即行矣上亦悵然墓志公在陳州暇日坐西軒聞外板築喧甚曰民築嘉應侯張太尉廟公曰巢賊亂天下趙犫以孤城力戰保此州捍大患者也此而不祀張侯何為者哉命夷其廟立趙侯祠墓志延和殿賜坐問祖宗禦戎之䇿孰長公曰太祖不勤逺略如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以丗襲故邊圉無事董遵誨捍環州郭進守西山李漢超保關南皆十餘年優其祿賜寬其文法而少遣兵諸將財力豐而威令行間諜精審吏士用命賊所入輒先知併兵禦之戰無不克故以十五萬人而獲百萬之用終太祖之丗邊鄙不聳天下安樂及太宗平并州欲逺取燕薊自是歲有契丹之虞曹彬劉廷謙傳潛等數十戰各亡士卒十餘萬又內徙李彞興馮暉之族致繼遷之變三邊皆擾朝廷始旰食矣真宗之𥘉趙德明納𣢾及澶淵之克遂與契丹盟至今人不識兵革可謂盛德大業祖宗之事大略如此亦可以鑒矣近歲邊臣建開拓之議皆行嶮僥幸之人欲以天下安危試之一擲事成則身蒙其利不成則陛下任其患不可聽也上曰慶曆以來卿知之乎元昊𥘉臣何以待之公曰臣時為學士誓詔封册皆臣所草具言本末上驚曰爾時已為學士可謂舊德矣時契丹遣泛使蕭禧來上問虜意安在公曰虜自與中國通好安於豢飬吏士驕惰實不欲用兵昔蕭英劉六符來仁宗命二府置酒殿廬與語英頗泄其情六符變色目之英歸竟以此得罪今禧黠虜願如故事令大臣與議無屈帝尊與虜交口禧至以河東疆事為辭上復以問公公曰嘉祐二年虜使蕭扈嘗言之朝廷討論之詳矣命館伴王洙詰之扈不能對録其條目付扈以歸因以洙藁上之禧當辭偃蹇卧驛中不起執政未知為言公班次二府因朝謂樞密使吳充曰禧不即行使主者日致餽而切問且使邊吏以其故檄虜中可也充啓用其説禧即日行墓志故事歲賜契丹金繒服器召二府觀焉熙寧中張文定公以宣徽使與召衆謂天子修貢為辱而陛下神武可一戰勝也公獨曰陛下謂宋與契丹凡幾戰勝負幾何兩府八公皆莫知也神宗以問公公曰宋與契丹大小八十一戰惟張齊賢太原之戰才一勝耳陛下視和與戰孰便上善之談叢上數欲廢易汴渠公曰此祖宗建國之本不可輕議餉道一梗兵安所仰食則朝廷無措足之地矣墓志自王安石為政始罷銅禁姦民日銷錢為器邊關海舶不復譏錢之出故中國錢日耗而西南北三虜皆山積公極論其害請詰問安石舉纍朝之令典所以保國便民者一旦削而除之其意安在墓志髙麗使過南京長吏當送迎公言臣班視二府不可為陪臣屈詔獨遣少尹墓志師征安南公以謂舉西北壯士健馬棄之南方其患有不可勝言者若老師費財無功而還則社稷之福也且交趾風俗與諸夷不類自建隆以來吳昌文丁部黎桓李公溫四易姓矣皆以大校篡立有唐末五代藩鎮傾奪之風此可以計破者也墓志新法既鬻坊埸河渡司農又并祠廟鬻之官既得錢聽民為賈區廟中侮慢穢踐無所不至公言宋王業所基也而以火王閼伯封於啇丘以主大火微子為宋始封此二祠者獨不可免於鬻乎上震怒批出曰慢神辱國無甚於斯於是天下祠廟皆不得鬻墓志公自念將老無以報上論事益切至於論用兵起獄尤為反復深言曰老臣且死見先帝地下有以籍口矣上為感慟至永樂之敗頗思其言墓志三之四樞密馬正惠公公名知節字子元幽州薊人父全義從太祖定天下力戰有功卒公年七歲太祖召見禁中賜名輔官歷典數郡景德中擢檢校太保簽書樞密院事進樞密副使出知天雄軍召知樞密院事出知貝州卒年六十五開寶五年公年十八監彭州兵馬以嚴飭見憚如老將太平興國三年領兵戍秦州清水姦人李飛雄乘驛稱詔捕公及秦隴巡檢劉文𥙿等將繫之秦州劫獄囚盜庫兵以反公辨其詐與文𥙿執飛雄治殺之王荆公撰神道碑雍熙二年監博州兵馬時劉延讓敗於君子驛而契丹歸矣公方料丁壯集芻糧繕城治械如冦至吏民初不恱其生事也巳而契丹果至度不可攻乃去神道碑知定逺軍時議發河南十三州之民轉餉河北公告轉運使樊知古此軍聚兵少而積粟多簸其腐尚可得十七知古用此得粟五十萬斛以罷河南之役事聞朝廷太宗嘉之神道碑李順之亂公討平劒州召還至三泉而復以公與王繼恩討賊繼恩怒公抗直使守彭州盡收其軍而與之羸卒三百賊率其衆至號十萬公力戰一日亡其卒太半乃夜獨出招救兵復入賊以敗去神道碑蜀卒劉旰聚黨數千人為亂所攻數州至輒取之公以卒三百追至蜀州與戰旰走卭州而招安使上官正召公歸成都計事公為正畫曰賊破卭州必乘勝薄我我軍雖倍未易敵也不如迎其弊急擊破之必矣遂行次方井與正合殺旰等無噍類神道碑知秦州諸羌質子有三十年不釋者公悉歸之諸羌德公訖公去無一人犯塞神道碑知成都府有告騎士謀為變者所引以千數公捕殺其首七人而置其餘無所問自乾德後歲漕蜀物以冨人為送吏多坐漂失籍其家公奏擇三班使臣及三司軍大將代之而課其漕事為賞罰至今便之神道碑知延州至郡羌方以兵覷邊會上元開門張燈視以無為而羌卒不能為冦神道碑又移知鎮州會契丹入邊自澶以北城郭皆晝閉詔使過公輒留之而募人間行送詔皆得其報以聞又以便冝使所至受諸漕挽給邊之物故契丹欲虜掠無所得車駕次澶州大將王超提卒數十萬逗留不赴公屢趣之乃出師猶辭以中渡無橋至則公先巳度材一夕而橋就上聞手詔褒之且知公果可以屬大事也神道碑祥符元年東封泰山以為行宫都總管自此行幸必以公為都總管許以專殺公部分明約束審出入肅然而未嘗輒戮一人神道碑邊將言契丹近塞大臣議皆請發兵以備公獨議使邊將移書問狀從之契丹解去神道碑除樞密副使當是時契丹巳盟大臣方言符瑞而公每不然之獨常從容極言天下雖安不可忘戰去兵之意及它爭議甚衆真宗多以公言為是神道碑公少慷慨以武力智謀自喜又能好書賔友儒者所與善必一時豪傑有集二十卷其文長於議論神道碑自始仕以至登用遇事謇謇未嘗有所顧憚王冀公丁晉公用事每廷議得其不直輒面詆之真宗初或甚忤然終以此知公而天下至今稱其正直神道碑又記聞曰真宗末王欽若每奏事或懷數奏出其一二其餘皆匿之既退以已意稱聖旨行之嘗與馬知節俱奏事上前欽若將退知節目之曰懷中奏何不盡出之又王文正遺事曰樞密馬公知節與同列奏對次忽厲聲曰王欽若等讀盡劄子莫謾官家馬公退見王文正公詞色尚怒因語公曰諸子上前議論如此知節幾欲以笏擊死之但恐驚動君相耳公歎撫久之馬公方直惟公力保庇於上前真宗東封泰山車駕發京師上及從官皆𬞞食封禪禮畢上勞宰臣王旦等曰卿等久食𬞞不易旦等皆再拜馬知節獨進言𬞞食者唯陛下一人耳王旦等在道與臣同次舍無不私食肉者於是旦等皆再拜曰誠如知節之言記聞
