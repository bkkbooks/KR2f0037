body:
  text: 八之四參政王文忠公公名堯臣字伯庸應天府虞城人舉進士第一通判明州知光州入為右司諌知制誥同知通進銀臺司入翰林為學士為陜西體量安撫使權三司使遷翰林學士承旨群牧使拜樞密副使參知政事薨年五十六諡文安元豐中詔以公嘗與建儲之議贈太師中書令改今諡知光州嵗大旱群盜發民倉廩吏法當死公曰此飢民求食爾荒政之所恤也乃請以減死論其後遂以著令至今用之歐陽公撰墓志遷左司諌郭皇后廢居瑶華宫有疾上頗哀矜之方后廢時宦者閻文應有力及后疾文應又主監醫后且卒議者疑文應有姦謀公請付其事御史考桉虛實以釋天下之疑事雖不行然自文應用事無敢指言者後文應卒以恣橫斥死后猶在殯有司以歲正月用故事張燈公言郭氏幸得厚恩復位號乃天子后也張燈可廢上遽為之罷墓志元昊反西邊用兵以公為陜西體量安撫使公視四路山川險易還言某路冝益兵若干某路賊所不攻某路冝急為備至於諸將材能長短盡識之薦其可用者二十餘人後皆為名將是時邊兵新敗於好水任福等戰死今韓丞相坐主帥失律范文正公亦坐移書元昊皆奪招討副使公因言此兩人天下之選也其忠義智勇名動夷狄不冝以小故置之且任福由違節度以致敗尤不可深責主將由是忤宰相意并其他議多格不行明年賊入涇原戰定川殺大將葛懷敏乃公指言為備處由是始以公言為可信而前所格議悉見施行因復遣公安撫涇原路公曰陛下復用韓琦范仲淹幸甚然將不中御兵法也願許以便冝從事上以為然因言諸路都部署可罷經略副使以重將權而偏將見招討使以軍禮置德順軍於籠竿城廢營田以其地益募弓箭手墓志公使還行至涇州而德勝寨兵迫其將姚貴閉城叛公止道左解裝為榜射城中以招貴且發近兵討之初吏白曰公奉使且還歸報天子爾貴叛非公事也公曰貴土豪也頗得士心然初非叛者今不乘其未定速招降後必生事為朝廷患貴果出降墓志自朝廷理元昊罪軍興而用益廣前為三司者皆厚賦暴斂甚者借內藏率冨人出錢下至果菜皆加稅而用益不足公始受命則曰今國與民皆弊矣在陛下任臣者如何由是天子一聽公所為公乃推見財利出入盈縮曰此本也彼末也計其緩急先後而去其蠹弊之有根穴者斥其妄計小利之害大體者然後一為條目使就法度罷副使判官不可用者十五人更薦用材且賢者期年民不加賦而用足明年以其餘償內藏所借數百萬又明年其餘而積於有司者數千萬而所在流庸稍復其業墓志初宦者張永和方用事請收民房錢十之三以佐國事下三司永和隂遣人以利動公公執以為不可度支副使林濰附永和議不已公奏罷濰乃止益利夔三路轉運使皆請增民鹽井課歲可為錢十餘萬公亦以為不可而權幸因緣多見裁抑京師數為飛語及上之左右往往讒其短者上一切不問而公為之亦自若也及公既罷上慰勞之公頓首謝曰非臣之能惟陛下信用臣爾墓志為樞密副使持法守正以身任天下事凡宗室宦官醫師樂工嬖習之賤莫不關樞密而濫恩幸請隨其事可損損之可絶絶之至其大者則皆著為定令由是小人益怨造為飛書以害公公得書自請曰臣恐不能勝衆怨願得罷去上愈知公為忠為下令捕為書者甚急公益感勵在位六年廢職修舉皆有條理墓志樞密使狄青以軍功起行伍居大位而士卒多屬目往往造作言語以相扇動人情以為疑而青色頗自得公嘗以語衆折青為陳禍福言古將帥起微賤至冨貴而不能保首領者可以為鑒戒青稍沮畏墓志公在政事論議有所不同必反復切劘至於是而後止不為獨見在上前所陳天下利害甚多至施行之亦未嘗自名其所設施與在樞密時特異豈政事者丞相府也其體自冝如是邪墓志公有建儲事見文潞公冨韓公范蜀公事中
