body:
  text: 八之五樞密包孝肅公公名拯字希仁廬州合肥人舉進士知天長縣徙知端州入為監察御史歷三司户部判官京東陜西河北轉運使三司户部副使擢天章閣待制知諌院復為河北都轉運使徙知瀛揚廬州江寧府召權知開封府遷諌議大夫權御史中丞為三司使拜樞密副使薨包孝肅公知天長縣有訴盜割牛舌者公使歸屠其牛鬻之既而有告私殺牛者公曰何為割某家牛舌而又告之盜者驚伏徙知端州州嵗貢硯前守緣貢率數十倍以遺權貴人公命製者才足貢數嵗滿不持一硯歸吕許公夷簡聞包拯之才欲見之一日待漏院見班次有包拯名頗喜及歸又問知居同里巷意以拯欲便於求見無幾報拯朝辭乃就部注一知縣而出尤竒之遽使人追還遂薦對除裏行自此擢用巵史包孝肅在言路極言時事復為京尹令行禁止至今天下皆呼包待制又曰包家市井小民及田野之人凡徇私者皆指笑之曰你一箇包家見貪汚者曰你一箇司馬家天下稱司馬公曰司馬家吕氏家孰記包孝肅公立朝剛嚴聞者皆憚之至於閭里童稚婦女亦知其名貴戚宦官為之斂手舊制凡訟訴不得徑造庭下府吏坐門先收狀牒謂之牌司公開正門徑使至前自言曲直吏民不敢欺包孝肅尹京號為明察有編民犯法當杖脊吏受賕與之約曰今見尹必付我責狀汝第呼號自辨我與汝分此罪汝決杖我亦決杖既而包引囚問畢果付吏責狀囚如吏言分辨不巳吏人聲訶之曰但受脊杖出去何用多言包謂其市權捽吏於庭杖之十七特寬囚罪止從杖坐以沮吏勢不知乃為所賣卒如素約小人為姦固難防也孝肅天性峭嚴未嘗有笑容人謂包希仁笑比黃河清筆談王禹玉曰包希仁知廬州廬州即鄉里也親舊多乘勢擾官府有從舅犯法希仁撻之自是親舊皆屏息希仁始及第以親老侍養不仕宦且十年人稱其孝知開封府為人剛嚴不可干以私京師為之語曰關節不到有閻羅包老吏民畏服逺近稱之為長吏僚佐有所關白喜面折辱人然其所言若中於理亦畨然從之剛而不愎此人所難也記聞包孝肅知諌院數論斥大臣權幸請罷一切內降曲恩又列上唐魏鄭公三疏請置坐右以為龜鑑別條七事多見采納及後為中丞奏曰東宫虛位日久天下以為憂群臣數有言者卒未聞有所處置未審聖意持久不決何也夫萬物皆有根本而太子者天下根本也根夲不立禍孰大焉仁宗曰卿欲誰立公曰臣非才備位所以乞豫建太子者為宗廟萬丗計耳陛下問臣欲誰立是疑臣也臣行年七十且無子非邀後福者唯陛下裁察仁宗喜曰徐當議之公性峭直然奏議平允常惡俗吏苛刻務為敦厚雖嫉惡甚至人情所不及即推以恕不為苟合未嘗偽色辭以恱人不作私書至於干請無故人親黨一皆絶之居家儉約衣服器用飲食雖貴如初官時云
