body:
  text: 三之一太師潞國文忠烈公公名彥博字寬夫汾州介休人中進士第景祐中為殿中侍御史河東轉運副使以龍圗閣學士知秦州徙益州慶曆七年擢諌議大夫樞密副使改參知政事貝州亂明鎬討之久未克公請行因以為宣撫使賊平除禮部侍郎同中書門下平章事皇祐三年御史唐介論公語切仁宗怒介貶英州別駕公亦出知許州至和二年再入為相嘉祐三年以使相判河南府封潞國公歷判大名太原府丁母憂起復使相加兩將軍號力辭得終喪詔俸賜比宰臣之半亦辭不受治平二年為樞密使熙寧六年拜司空建節判河陽徙判大名府元豐三年除太尉開府儀同三司復判河南會王堯臣之子同老上書明其父功以公為證於是詔加河東永興節度使力辭許之六年請老以守太師致仕元祐𥘉命平章軍國重事六日朝一月兩赴經筵五年復以太師致仕紹聖初降授太子少保薨年九十二文潞公夲姓敬其曽大父避石晉髙祖諱更姓文至漢復姓敬入夲朝其大父避翼祖諱又更姓文𥘉敬氏避諱各用其一偏或為文氏或為苟氏然敬字從巳力切音棘非苟也從攴非文也俱非其一偏也聞見後録文潞公幼時與群兒擊毬入柱穴中不能取公以水灌之毬浮出司馬溫公幼與群兒戲一兒墮大水甕中已沒群兒驚走不能救公取石破其甕兒得出識者已知二公之仁智不凡矣聞見録文潞公謂豫言𥘉及第授大理評事知絳州翼城縣未赴任有客李夲者三見訪而後得見之且言夲有壻為縣中巡檢幸公庇之又言曰夲非獨奉干亦有以奉助夲嘗知其邑戶口衆人猾難治因出一䇿文字皆景迹人姓名其首姓張比潞公至姓張人事己敗縣未能結正簿尉皆云某等在此各嵗餘豈無過失為此人所持幸君之來必辦之矣於是公盡得其姦狀上于州決配之邑人皆悚畏東齋記事寶元中河東闕漕使堂上議難得可任者章郇公言聞縉紳間説文彥博者磊落有稱時吕許公曰恨不識也可召來靣詢之明日召至堂上許公都不交一談但睥睨不巳郇公強問其鄉曲任使次第因問河東事曰彥博鄉里無所不知郇公喜之文退許公歎曰此大有福人何所任用不可遂自殿中侍御史差委明年就遷待制不出十年出將入相趙康靖公録文潞公在成都米價騰貴因就諸城門相近院凡十八處減價糶賣仍不限其數張榜通衢翌日米價遂減前此或限勝斗以糶或抑市井價直適足以增其氣熖而終不能平其價大抵臨事當須有術也東齋記事文潞公知益州喜遊宴嘗宴鈐轄廨舍夜久不罷從卒輒拆馬庌為之薪不可禁遏軍校白之座客服栗公曰天實寒可拆與之神色自若飲如故卒氣沮無以為變記聞樞密直學士明鎬討貝州久未下上深以為憂問於兩府參知政事文彥博請自往督戰八年正月丁丑以彥博為河北宣撫使監諸將討貝州時樞密使夏竦惡鎬凡鎬所奏請多從中沮惟恐其成功彥博奏今在軍中請得便冝從事不中覆上許之閏月庚子朔克貝州擒王則初彥博至貝州與明鎬督諸將築距闉以攻城旬餘不下有牢城卒董秀劉炳請穴地以攻城彥博許之貝州城南臨御河秀等夜於岸下潛穿穴棄土於水晝匿穴中城上不之見也久之穴成自教場中出秀等以褐𫀆塞之走白彥博選敢死二百命指使將之銜枚自穴入有帳前虞候楊遂請行許之遂白軍士中有病咳者數人此不可去請易之從之既出穴登城殺守者垂絙以引城外人城中驚擾賊以火牛突之登城者不能拒頗引却楊遂力戰身𬒳十餘創援槍刺牛牛却走賊遂潰王則張巒卜吉與其黨皆突圍走至村舍官軍追圍之則猶著花幞頭軍士爭趣之部署王信恐則死無以辨以身覆其上遂生擒之巒吉死於亂兵不知所在彥博斬則於北京夏竦奏言所獲賊魁恐非真遂檻車送京師剮於馬市董秀劉炳並除內殿崇班記聞文彥博知永興軍起居舍人母湜鄠人也至和中湜上言陜西鐵錢不便於民乞一切廢之朝廷雖不從其鄉人多知之爭以鐵錢買物賣者不肯受長安為之亂民多閉肆僚屬請禁之彥博曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百匹使賣之曰納其直盡以鐵錢勿以銅錢也於是衆知鐵錢不廢市肆復安記聞至和初陳恭公罷相而並用文富二公正衙宣麻之際上遣小黃門密於百官班中聽其論議而二公久有人望一旦復用朝士往往相賀黃門具奏上大恱余時為學士後數日奏事垂拱上問新除彥博等外議如何余以朝士相賀為對上曰古之人君用人或以夢卜茍不知人當從人望夢卜豈足慿耶故余作文公批答云永惟啇周之所記至以夢卜而求賢孰若用搢紳之公言從中外之人望者具述上語也歸田録文潞公為相因進對言嘗聞德音以搢紳多務奔競非裁抑之無以厚風俗莫若稍旌恬退之人則躁競者自知愧恥乃薦王安石韓維張瓌皆擢用焉龐莊敏時為樞密使公與之同議省兵汰為民者六萬減廪給之半者又二萬云唐質肅公為御史論公專權植黨交結宫禁仁宗怒召二府示之疏唐公語益切樞密副使梁公適叱唐公下殿詔送臺劾之公獨留再拜曰御史言事職也願不加罪於是唐公既貶而公亦罷相其後公再入相首薦唐公復召用焉嘉祐元年正月甲寅朔上御大慶殿立仗朝會前夕太雪至壓宫架折上在禁庭跣禱于天及旦而霽百官就列既卷簾上暴感風眩之疾僅能成禮而罷巳未契丹使者入辭置酒紫宸殿上疾又作左右扶入禁中文彥博遣人以上旨諭使者云昨夕宫中飲酒過多今日不能親臨宴遣大臣就驛賜宴仍授國書彥博與兩府俟於殿閣久之召內侍都知史志聰鄧保吉等問上至禁中起居狀志聰等對以禁中事嚴密不敢泄彥博怒叱之曰主上暴得疾繫社稷之安危惟君輩得出入禁闥豈可不令宰相知天子起居欲何為邪自今疾勢小有增損必一一見白仍命直省引至中書取軍令狀志聰等素謹願及夕諸宫門白下鎖志聰曰汝曹自白宰相我不任受其軍令兩府謀以上躬不寧欲留宿宫中而無名辛酉文彥博建議設醮祈福於大慶殿兩府晝夜焚香設幄宿於殿之西廡志聰等白故事兩府無留宿殿中者彥博曰今何論故事也壬戌上疾小間兩府求詣寢殿見上志聰等難之平章事富弼責之志聰等不敢違知開封府王素夜叩宫門求見執政白事文彥博曰此際宫門何可夜開詰旦素入白有禁卒告都虞候欲為變者執政欲收捕按治彥博曰如此則張皇驚衆乃召殿前都指揮使許懷德問曰都虞候某甲者何如人懷德曰在軍職中最為謹良彥博曰可保乎曰可保彥博曰然則此卒有怨於彼誣之耳當亟誅之以靖衆衆以為然考博乃請平章事劉沆判狀尾斬於軍門及上疾愈沆譛彥博於上曰陛下違豫時彥博擅斬告反者彥博以沆判呈上上意乃解𥘉彥博欲判狀斬告變者參政王堯臣揑其膝乃請劉相判之先是富弼用朝士李仲昌䇿自澶州啇胡河穿六漯渠入橫隴故道北京留守賈昌朝素惡弼隂結內侍右班副都知武繼隆令司天官二人俟兩府聚處於大慶殿廷執狀抗言國家不當穿河於北方致上體不安文彥博知其意有所在未有以制也後數日二人又上言請皇后同聽政亦繼隆所教也史志聰等以其狀白執政彥博視而懷之不以示同列有喜色同列問不以告既而召二人詰之曰汝今日有所言乎對曰然彥博曰天文變異汝職所當言也何得輒預國家大事汝罪當族二人懼色變彥博曰觀汝直狂愚耳未欲治汝罪自今無得復爾二人退彥博乃以狀示同列同列皆憤怒曰奴敢爾妄言何不斬之彥博曰斬之則事彰灼於中宫不安衆皆曰善既而議遣司天官定六漯於京師方位彥博復遣二人往武繼隆曰請留之彥博曰彼不敢輒妄言有人教之耳繼隆默不敢對二人至六漯恐治前罪乃更言六漯在東北非正北無害也戊辰以後上神思浸清寧壬申罷醮兩府始分畨歸第不歸者各宿於其府記聞又云樞密使王德用開便門入中書潞公執守門親事官送開封府撻之明日謂同列曰昨日悔不斬守門者天子違豫禁中門戶豈得妄開邪熙寧二年潞公為樞密使陳升之拜相以公宗臣詔升之位公下公言國朝樞密使無位宰相上者獨曹利用嘗在王曽張知白上卒取禍敗臣忝文臣粗知義理不敢紊亂朝著上從之溫公日録慶州軍亂二府入議文潞公曰朝廷施為務合人心以靜重為先不冝偏聽陛下即位以來厲精求治而人情未安者更張之過耳祖宗法未必不可行但有廢墜不舉之處耳王荆公曰所以為此將以去民之害何為不可若萬事隳頽如西晉風兹乃益亂也蓋荆公知公言為巳發故力排之于尼父師旦密人夲選人屢以贓失官編管在蔡尼嘗適人生子後為二鬼所慿言事或有驗遂為尼名惠普士庶逺近輻湊以佛事之嘗因宦者言邵亢石全彬富弼李柬之肅之冝為輔相皆常敬之者也東之姪女二人事之王樂道命李氏甥為其母首傳習妖教收下獄詔京東差官按之得諸公書自韓曽以下皆有之文公獨無上問其故文曰臣但不知耳知之亦當有書時人美其分謗溫公日録韓魏公留守北京李稷以國子博士為漕頗慢公公不為較待之甚禮俄潞公代魏公為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至北京李稷謁見坐客次久之公著道服出語之曰而父吾客也只八拜稷不獲已如數拜之聞見録文潞公判北京有汪輔之者新除運判為人卞急𥘉入謁潞公方坐廳事閲謁置桉上不問入宅久之乃出輔之已不堪既見公禮之甚簡謂曰家人須令沐髮忘見運判勿訝輔之沮甚舊例監司至之三日府必作會公故罷之輔之移文定日檢按府庫通判以次白公公不答是日公家宴內外事並不許通輔之坐都廳吏白侍中家宴匙鑰不可請輔之怒破架閣庫鎖亦無從檢按也密劾潞公不治神宗批輔之所上奏付潞公有云侍中舊德故煩卧護北門細務不必勞心輔之小臣敢爾無禮將别有處置之語潞公得之不言一日會監司曰老謬無治狀幸諸君寬之監司皆愧謝因出御批以示輔之輔之皇恐逃歸託按部以出未幾輔之罷烏乎神宗眷遇大臣沮抑小人如此可謂聖矣聞見録元豐三年王堯臣子同老言至和三年仁宗不豫內外寒心先臣參預朝政與宰相文彥博富弼請立英宗皇帝為嗣仁宗感悟開納大計遂定會潞公來自北都過闕入覲神宗以問公對曰自至和以來中外之臣乞立皇嗣者甚衆臣等雖有請事未果行至嘉祐末韓琦等卒就大事蓋琦等功也神宗曰議論椎輪於至和時發端為難仁祖意已定其後止申前詔耳正如丙吉霍光事前後不相掩也卿冝盡録夲末將付史官公乃具奏其詳於是手詔中書曰彥博蓄德深厚善不自伐懷此大功絶口不言中外搢紳莫有知者今緣故臣子明其父勳始得夲末乃知援立之功厥有攸在嘉祐之詔但宣之耳遂加公河東永興節度使公復力辭宴餞瓊林輔臣皆預兩遣中謁者遺詩以寵其行有報在不言功之語當世榮之龍川志云至和三年仁宗始不豫皇嗣未建宰相文富韓三公方議所立參知政事王公堯臣之弟正臣嘗為宗室説書官知十三使之賢即言之諸公諸公亦舊知之乃定議草奏書印欲上而上疾有瘳即止堯臣私收奏夲後纍年韓公當國群臣相繼乞選立宗室子乃定立十三使為皇子及仁宗晏駕皇子踐祚賞定䇿之功以韓公為首及元豐末堯臣子同老上書繳進元奏時諸公惟文公富公在皆歸老於洛會文公入助郊饗神宗訪之公具奏所以神宗恱焉故一時諸公例皆𬒳賞而韓氏諸子惡分其功辨之不巳文公之罷平章重事由此故也然英宗之譽布於諸公則始於堯臣而其為皇子嗣寶位則韓公之力不可誣也又記聞云元豐中文潞公自北都召對上問以至和繼嗣事公對曰臣等備位兩府當此之際議繼嗣乃職分耳然亦幸值時無李輔國王守澄之徒用事於中故臣等得效其忠懇耳上憮然有間而善之元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官唐介參政之子義問為轉運判官退謂其客尹煥曰先公為臺官嘗言潞公今豈挾為恨耶義問當避之煥曰潞公所為必有理姑聽之明日公交府事以次見監司府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣義問聞之復謂煥曰微君殆有失於潞公也一日潞公謂義問曰仁宗朝先參政為臺諌以言彥博謫官彥博亦罷相判許州未幾彥博復召還相位即上言唐某所言正中臣罪召臣未召唐某臣不敢行仁宗用彥博言起參政通判潭州尋至大用與彥博同執政相知為深義問聞潞公之言至感泣自此出入潞公門下後潞公為平章重事薦義問以集賢殿修撰帥荆南烏乎潞公之德度絶人蓋如此聞見録元豐五年文潞公以太尉留守西都時富韓公以司徒致仕潞公慕唐白樂天九老會乃集洛中公卿大夫年德髙者為耆英會以洛中風俗尚齒不尚官就資聖院建大厦曰耆英堂命閩人鄭奐繪像堂中時富韓公年七十九文潞公與司封郎中席汝言皆七十七朝議大夫王尚恭年七十六太常少卿趙丙祕書監劉几衛州防禦使憑行己皆年七十五天章閣待制楚建中朝議大夫王御名言皆年七十二太中大夫張問龍圗閣直學士張燾皆年七十時宣徽使王拱辰留守北京貽書潞公願預其會年七十一獨司馬溫公年未七十潞公素重其人用唐九老狄兼謨故事請入會溫公辭以晚進不敢班文富二公之後潞公不從令鄭奐自幕後傳溫公像又之北京傳王公像於是預其會者凡十三人潞公以地主擕妓樂就富公宅作第一會至富公會送羊酒不出餘皆次為會洛陽多名園古剎有水竹林亭之勝諸老鬢眉皓白衣冠甚偉每宴集都人隨觀之潞公又為同甲會司馬郎中且程太中珦席司封汝言皆丙午人也亦繪像於資聖院其夜司馬公與數公又為真率會有約酒不過五行食不過五味唯菜無限楚正議違約增飲食之數罰一會皆洛陽太平盛事也洛之士庶又生祠潞公於資聖院溫公取神宗送公判河南詩隸于榜曰佇瞻堂塑公像其中冠劒偉然都人事之甚肅聞見録元祐𥘉哲宗幼沖起文潞公以平章軍國重事召程正叔為崇政殿説書正叔以師道自居每侍上講色甚莊繼以諷諌上畏之潞公對上恭甚進士唱名侍立終日上屢曰太師少休公頓首謝立不去時年九十矣或謂正叔曰君之倨視潞公之恭議者以為未盡正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也識者服其言聞見録公之在朝契丹使耶律永昌劉霄來聘軾奉詔館客與使者入覲望見公殿門外却立改容曰此潞公也耶所謂以德服人者問其年曰何壯也軾曰使者見其容未聞其語其總理庶務酬酢事物雖精練少年有不及貫穿古今洽聞強記雖專門名家有不逮使者拱手曰天下異人也公既歸洛西羌首領有溫溪心者請於邊吏願獻良馬於公邊吏以聞詔聽之東坡集潞公凝簡莊重顧眄有威逮事四朝荐更二府七換節鉞位將相五十餘年再守秦州大名求興五判河南遍歷公孤兩以太師致仕英傑威重名聞四夷雖位體隆貴而平居接物謙挹尊德樂善如恐不及邵雍程皓以道學名丗居洛陽公與之遊從甚密及皓死既葬親為題其墓為明道先生云至和中陳執中為宰相其嬖人張氏笞女隸至死臺官趙抃范師道極言執中營救張氏故獄久不直因言執中無材行不可任宰相翰林學士毆陽修亦上書請退執中議久不決左右怪仁宗禁中少遊燕默有所思慮焦勞見於容色居月餘如此因問上曰陛下比憂勞見於容色得非思代執中者乎上曰然左右乃曰代執中者易得耳何至此耶上曰此老子却可謾人久之始用文彥博富弼二人代之朝議皆謂得人數日歐陽修得對上問新除彥博等外議如何修具以朝議為對上曰卿意如何修曰誠如外議上又問彥博弼果如何修曰陛下已用彥博等復問其如何臣所未喻上曰彥博有才然膽大弼前在政府甚好今復來恐多顧慮良久又曰弼前深為人所中傷今來亦焉能不顧慮然不若守前志不變也既而彥博果不能謹畏後因郭申錫李傪爭塞河事彥博意有所左右上由此罷之弼亦竟以多顧慮少所建明皆如所料南豐雜識二之二樞密錢宣靖公公名若水字淡成河南新安人雍熙中舉進士釋褐同州觀察推官擢祕書丞直史館遷知制誥翰林學士至道初以右諌議大夫同知樞密院事以母老求解機務便奉養遂以夲官充集賢院學士復判流內銓知開封府出知天雄軍巡撫陜西還拜鄧州觀察使知并州薨年四十四錢若水為舉子時見陳希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地爐坐僧熟視若水久之不語以火箸畫灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留後若水登科為樞密副使年才四十致仕希夷初謂若水有仙風道骨意未決命僧觀之僧云做不得故不復留然急流中勇退去神仙不逺矣僧麻衣道者也聞見録錢若水為同州推官知州性𥚹急數以胸臆決事不當若水固爭不能得輒曰當奉陪贖銅耳巳而果為朝廷及上司所駮州官皆以贖論知州愧謝已而復然前後如此數矣有冨民家小女奴逃亡不知所之奴父母訟於州命録事參軍鞫之録事嘗貸錢於冨民不獲乃劾冨民父子數人共殺女奴棄尸水中遂失其尸或為元謀或從而加功罪皆應死冨民不勝榜楚自誣服具上州官審覆無反異皆以為得實若水獨疑之留其獄數日不決録事詣若水廳事詬之曰若受冨民錢欲出其死罪邪若水笑謝曰今數人當死豈可不少留熟觀其獄詞邪留之且旬日知州屢趣之不能得上下皆怪之若水一旦詣州屏人言曰若水所以留其獄者密使人訪求女奴今得之矣知州驚曰安在若水因密使人送女奴於知州所知州乃垂簾引女奴父母問曰汝今見汝女識之乎對曰安有不識也因從簾中推出示之父母泣曰是也乃引冨民父子悉破械縱之其人號泣不肯去曰微使君之賜則某滅族矣知州曰推官之賜也非我也其人趣詣若水廳事若水閉門拒之曰知州自求得之我何與焉其人不得入繞垣而哭傾家資以飯僧為若水祈福知州以若水雪冤死者數人欲為之奏論其功若水固辭曰若水但求獄事正人不冤死耳論功非其夲心也且朝廷若以此為若水功當置録事於何地邪知州歎服曰如此尤不可及矣録事詣若水叩頭愧謝若水曰獄情難知偶有過誤何謝也於是逺近翕然稱之未幾太宗聞之驟加進擢自幕職半歲中為知制誥二年中為樞密副使記聞錢若水為學士太宗禮遇殊厚嘗草賜趙保忠詔云不斬繼遷存狡兔之三穴潛疑光嗣持首鼠之兩端太宗覽之甚恱謂若水曰此四句正道著我意又與趙保吉詔有既除手足之親已失輔車之勢其辭甚美太宗御筆批其後云依此詔夲極好至今其子延年寶藏之金坡遺事李繼隆與轉運使盧之翰有隙欲陷之罪乃檄轉運司期八月出塞令辦芻粟轉運司調發方集繼隆復為檄言據隂陽人狀國家八月不利出師當更取十月轉運司遂散芻粟既而復為檄云得保塞胡偵候狀言賊且入塞當以時進軍芻粟即日取辦是時民輸挽者適散倉卒不可復集繼隆遂奏轉運司乏軍興太宗大怒立召中使一人付三函令乘驛馳取轉運使盧之翰竇玭及某人首丞相吕端樞密使柴禹錫皆不敢言惟樞密副使錢若水爭之請先推驗有狀然後行法上大怒拂衣起入禁中二府皆罷若水獨留廷中不去上既食久之使人偵視廷中有何人報云有細瘦而長者尚立焉上出詰之曰爾以同州推官再期為樞密副使朕所以擢任以爾為賢爾乃不才如是邪尚留此安俟對曰陛下不知臣無狀使得待罪二府臣當竭其愚慮不避死亡輔益陛下以報厚恩李繼隆外戚貴重莫比今陛下據其一幅奏書誅三轉運使雖有罪天下何由知之鞫驗事狀明白加誅亦何晚焉獻可替否死以守之臣之常分臣未獲死固不敢退上意解乃召吕端等奏請如若水議先令責狀許之三人皆黜為行軍副使既而虜欲入塞事皆虛誕繼隆坐罷招討知秦州記聞詔訪備邊之䇿若水條上五事一擇郡守二募鄉兵三積芻粟四革將帥五明賞罰錢公若水嘗率衆過河號令軍伍分布行列悉有規節深為戍將所伏上知之謂左右朕嘗見儒人談兵不過講之於尊爼硯席之間於文字則引孫吳述形勢皆間暇清論可也責之於用則罕見有成效者今若水亦儒人曉武深可嘉也時言者請城綏州積兵禦黨項詔公自魏乘疾傳往桉至則乞罷其役時論韙之上嘗謂左右曰朕觀若水風骨秀邁才力有餘止疑其算部蹙隘果至大用恐愈迫之其後果夭玉壷清話至道初吕蒙正罷相以僕射奉朝請上謂左右曰人臣當思竭節以保冨貴吕蒙正前日布衣朕擢為輔相今退在班列寂寞想其目穿望復位矣劉昌言曰蒙正雖驟登顯貴然其風望不為忝冒僕射師長百僚資望崇重非寂寞之地且亦不聞蒙正之鬱悒也况今巖穴髙士不求榮逹者甚多惟若臣輩苟且官祿不足以自重耳上默然又嘗言士大夫遭時得位冨貴顯榮豈得不竭誠以報國乎錢若水言髙尚之人固不以名位為光寵忠正之士亦不以窮逹易志操其或以爵祿恩遇之故而效忠於上此中人以下者之所為也上然之及劉昌言罷上問趙鎔等曰頻見昌言否鎔等曰屢見之上曰涕泣否曰與臣等談多至流涕上曰大率如此當在位之時不能悉心輔職一旦斥去即汍瀾涕泗若水曰昌言實未嘗涕泣鎔等迎合上意耳若水因自念上待輔臣如此蓋未嘗有秉節髙邁不貪名勢能全進退之道以感動人主遂貽上之輕鄙將以滿歲移疾遂草章求解職會晏駕不果上及今上之初年再表遜位乃得請談苑公美風神有器識能斷大事事繼母以孝聞風流儒雅善談論尤輕財好施所至推誠待物委任僚佐總其綱領無不稱治汲引後進推賢重士胸中豁如也
