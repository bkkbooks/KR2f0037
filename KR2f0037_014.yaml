body:
  text: 三之一太師潞國文忠烈公公名彦博字寛夫汾州介休人中進士第景祐中爲殿中侍御史河東轉運副使以龍圗閣學士知秦州徙益州慶暦七年擢諌議大夫樞宻副使改叅知政事貝州亂明鎬討之乆未克公請行因以爲宣撫使賊平除禮部侍郎同中書門下平章事皇祐三年御史唐介論公語切仁宗怒介貶英州別駕公亦出知許州至和二年再入爲相嘉祐三年以使相判河南府封潞國公歴判大名太原府丁母憂起復使相加两將軍號力辭得終䘮詔俸賜比宰臣之半亦辭不受治平二年爲樞宻使熈寜六年拜司空建節判河陽徙判大名府元豐三年除太尉開府儀同三司復判河南㑹王堯臣之子同老上書明其父功以公爲證於是詔加河東永興節度使力辭許之六年請老以守太師致仕元祐𥘉命平章軍國重事六日朝一月两赴經筵五年復以太師致仕紹聖初降授太子少保薨年九十二文潞公夲姓敬其曽大父避石晉髙祖諱更姓文至漢復姓敬入夲朝其大父避翼祖諱又更姓文𥘉敬氏避諱各用其一偏或爲文氏或爲苟氏然敬字從巳力切音棘非苟也從攴非文也俱非其一偏也聞見後録文潞公㓜時與群兒擊毬入柱穴中不能取公以水灌之毬浮出司馬温公㓜與群兒戯一兒墮大水甕中已沒群兒驚走不能救公取石破其甕兒得出識者已知二公之仁智不凢矣聞見録文潞公謂予言𥘉及第授大理評事知絳州翼城縣未赴任有客李夲者三見訪而後得見之且言夲有壻爲縣中廵檢幸公庇之又言曰夲非獨奉干亦有以奉助夲甞知其邑戸口衆人猾難治因出一䇿文字皆景跡人姓名其首姓張比潞公至姓張人事己敗縣未能結正簿尉皆云某等在此各嵗餘豈無過失爲此人所持幸君之來必辦之矣於是公盡得其姦狀上于州决配之邑人皆悚畏東齋記事寳元中河東闕漕使堂上議難得可任者章郇公言聞縉紳間說文彦愽者磊落有稱時吕許公曰恨不識也可召來靣詢之明日召至堂上許公都不交一談但睥睨不巳郇公強問其郷曲任使次第因問河東事曰彦愽郷里無所不知郇公喜之文退許公歎曰此大有福人何所任用不可遂自殿中侍御史差委明年就遷待制不岀十年出將入相趙康靖公録文潞公在成都米價騰貴因就諸城門相近院凢十八處减價糶賣仍不限其數張榜通衢翌日米價遂减前此或限勝㪷以糶或抑市井價直適足以増其氣熖而終不能平其價大抵臨事當須有術也東齋記事文潞公知益州喜遊宴甞宴鈐轄廨舎夜乆不罷從卒輙拆馬庌爲之薪不可禁遏軍校白之座客服栗公曰天實寒可拆與之神色自若飲如故卒氣沮無以爲變記聞樞宻直學士明鎬討貝州乆未下上深以爲憂問於两府叅知政事文彦愽請自徃督戰八年正月丁丑以彦愽爲河北宣撫使監諸將討貝州時樞宻使夏竦惡鎬凢鎬所奏請多從中沮惟恐其成功彦愽奏今在軍中請得便冝從事不中覆上許之閏月庚子朔克貝州擒王則初彦愽至貝州與明鎬督諸將築距闉以攻城旬餘不下有牢城卒董秀劉炳請穴地以攻城彦愽許之貝州城南臨御河秀等夜於岸下潜穿穴棄土於水晝匿穴中城上不之見也乆之穴成自教場中出秀等以褐𫀆塞之走白彦愽選敢死二百命指使將之銜枚自穴入有帳前虞候楊遂請行許之遂白軍士中有病欬者數人此不可去請易之從之旣出穴登城殺守者垂絙以引城外人城中驚擾賊以火牛突之登城者不能拒頗引却楊遂力戰身𬒳十餘創援槍刺牛牛却走賊遂潰王則張巒卜吉與其黨皆突圍走至村舎官軍追圍之則猶著花幞頭軍士爭趣之部署王信恐則死無以辨以身覆其上遂生擒之巒吉死於亂兵不知所在彦愽斬則於北京夏竦奏言所獲賊魁恐非眞遂檻車送京師剮於馬市董秀劉炳並除内殿崇班記聞文彦愽知永興軍起居舎人母湜鄠人也至和中湜上言陜西鐵錢不便於民乞一切廢之朝廷雖不從其郷人多知之爭以鐵錢買物賣者不肯受長安爲之亂民多閉肆僚屬請禁之彦愽曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百疋使賣之曰納其直盡以鐵錢勿以銅錢也於是衆知鐵錢不廢市肆復安記聞至和初陳恭公罷相而並用文富二公正衙宣麻之際上遣小黄門宻於百官班中聽其論議而二公乆有人望一旦復用朝士徃徃相賀黄門具奏上大恱余時爲學士後數日奏事垂拱上問新除彦愽等外議如何余以朝士相賀爲對上曰古之人君用人或以夣卜茍不知人當從人望夣卜豈足慿耶故余作文公批荅云永惟啇周之所記至以夣卜而求賢孰若用搢紳之公言從中外之人望者具述上語也歸田録文潞公爲相因進對言甞聞德音以搢紳多務奔競非裁抑之無以厚風俗莫若稍旌恬退之人則躁競者自知愧恥乃薦王安石韓維張瓌皆擢用焉龐莊敏時爲樞宻使公與之同議省兵汰爲民者六萬减廪給之半者又二萬云唐質肅公爲御史論公專權植黨交結宫禁仁宗怒召二府示之䟽唐公語益切樞宻副使梁公適叱唐公下殿詔送臺劾之公獨留再拜曰御史言事職也願不加罪於是唐公旣貶而公亦罷相其後公再入相首薦唐公復召用焉嘉祐元年正月甲寅朔上御大慶殿立仗朝㑹前夕太雪至壓宫架折上在禁庭跣禱于天及旦而霽百官就列旣卷簾上暴感風眩之疾僅能成禮而罷巳未契丹使者入辭置酒紫宸殿上疾又作左右扶入禁中文彦愽遣人以上旨諭使者云昨夕宫中飲酒過多今日不能親臨宴遣大臣就驛賜宴仍授國書彦愽與两府俟於殿閤乆之召内侍都知史志聦鄧保吉等問上至禁中起居狀志聦等對以禁中事嚴宻不敢泄彦愽怒叱之曰主上暴得疾繋社稷之安危惟君軰得出入禁闥豈可不令宰相知天子起居欲何爲邪自今疾勢小有増損必一一見白仍命直省引至中書取軍令狀志聦等素謹愿及夕諸宫門白下鎻志聦曰汝曹自白宰相我不任受其軍令两府謀以上躬不寜欲留宿宫中而無名辛酉文彦愽建議設醮祈福於大慶殿两府晝夜焚香設幄宿於殿之西廡志聦等白故事两府無留宿殿中者彦愽曰今何論故事也壬戌上疾小間两府求詣寢殿見上志聦等難之平章事富弼責之志聦等不敢違知開封府王素夜叩宫門求見執政白事文彦愽曰此際宫門何可夜開詰旦素入白有禁卒告都虞候欲爲變者執政欲収捕按治彦愽曰如此則張皇驚衆乃召殿前都指揮使許懷德問曰都虞候某甲者何如人懷德曰在軍職中最爲謹良彦愽曰可保乎曰可保彦愽曰然則此卒有怨於彼誣之耳當亟誅之以靖衆衆以爲然考愽乃請平章事劉沆判狀尾斬於軍門及上疾愈沆譛彦愽於上曰陛下違豫時彦愽擅斬告反者彦愽以沆判呈上上意乃解𥘉彦愽欲判狀斬告變者叅政王堯臣揑其膝乃請劉相判之先是富弼用朝士李仲昌䇿自澶州啇胡河穿六漯渠入横隴故道北京留守賈昌朝素惡弼隂結内侍右班副都知武繼隆令司天官二人俟两府聚處於大慶殿廷執狀抗言國家不當穿河於北方致上體不安文彦愽知其意有所在未有以制也後數日二人又上言請皇后同聽政亦繼隆所教也史志聦等以其狀白執政彦愽視而懷之不以示同列有喜色同列問不以告旣而召二人詰之曰汝今日有所言乎對曰然彦愽曰天文變異汝職所當言也何得輒預國家大事汝罪當族二人懼色變彦愽曰觀汝直狂愚耳未欲治汝罪自今無得復爾二人退彦愽乃以狀示同列同列皆憤怒曰奴敢爾妄言何不斬之彦愽曰斬之則事彰灼於中宫不安衆皆曰善旣而議遣司天官定六漯於京師方位彦愽復遣二人徃武繼隆曰請留之彦愽曰彼不敢輒妄言有人教之耳繼隆黙不敢對二人至六漯恐治前罪乃更言六漯在東北非正北無害也戊辰以後上神思浸清寜壬申罷醮两府始分畨歸第不歸者各宿於其府記聞又云樞宻使王德用開便門入中書潞公執守門親事官送開封府撻之明日謂同列曰昨日悔不斬守門者天子違豫禁中門戸豈得妄開邪熈寜二年潞公爲樞宻使陳升之拜相以公宗臣詔升之位公下公言國朝樞宻使無位宰相上者獨曹利用甞在王曽張知白上卒取禍敗臣忝文臣粗知義理不敢紊亂朝著上從之温公日録慶州軍亂二府入議文潞公曰朝廷施爲務合人心以靜重爲先不冝偏聽陛下即位以來厲精求治而人情未安者更張之過耳祖宗法未必不可行但有廢墜不舉之處耳王荆公曰所以爲此將以去民之害何爲不可若萬事隳頽如西晉風兹乃益亂也蓋荆公知公言爲巳發故力排之于尼父師旦宻人夲選人屢以贓失官編管在蔡尼甞適人生子後爲二鬼所慿言事或有驗遂爲尼名惠普士庶逺近輻湊以佛事之甞因宦者言邵亢石全彬富弼李柬之肅之冝爲輔相皆常敬之者也東之姪女二人事之王樂道命李氏甥爲其母首傳習妖教収下獄詔京東差官按之得諸公書自韓曽以下皆有之文公獨無上問其故文曰臣但不知耳知之亦當有書時人羙其分謗温公日録韓魏公留守北京李稷以國子愽士爲漕頗慢公公不爲較待之甚禮俄潞公代魏公爲留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至北京李稷謁見坐客次乆之公着道服出語之曰而父吾客也只八拜稷不獲已如數拜之聞見録文潞公判北京有汪輔之者新除運判爲人卞急𥘉入謁潞公方坐㕔事閱謁置桉上不問入宅乆之乃出輔之已不堪旣見公禮之甚簡謂曰家人須令沐髮忘見運判勿訝輔之沮甚舊例監司至之三日府必作㑹公故罷之輔之移文定日檢按府庫通判以次白公公不荅是日公家宴内外事並不許通輔之坐都㕔吏白侍中家宴匙鑰不可請輔之怒破架閣庫鎻亦無從檢按也宻劾潞公不治神宗批輔之所上奏付潞公有云侍中舊德故煩卧護北門細務不必勞心輔之小臣敢尔無禮將别有處置之語潞公得之不言一日會監司曰老謬無治狀幸諸君寛之監司皆愧謝因岀御批以示輔之輔之皇恐逃歸託按部以岀未幾輔之罷烏乎神宗眷遇大臣沮抑小人如此可謂聖矣聞見録元豐三年王堯臣子同老言至和三年仁宗不豫内外寒心先臣叅預朝政與宰相文彦愽富弼請立英宗皇帝爲嗣仁宗感悟開納大計遂定㑹潞公來自北都過闕入覲神宗以問公對曰自至和以來中外之臣乞立皇嗣者甚衆臣等雖有請事未果行至嘉祐末韓琦等卒就大事蓋琦等功也神宗曰議論椎輪於至和時發端爲難仁祖意已定其後止申前詔耳正如丙吉霍光事前後不相揜也卿冝盡録夲末將付史官公乃具奏其詳於是手詔中書曰彦愽蓄德深厚善不自伐懷此大功絶口不言中外搢紳莫有知者今縁故臣子明其父勲始得夲末乃知援立之功厥有攸在嘉祐之詔但宣之耳遂加公河東永興節度使公復力辭宴餞瓊林輔臣皆預兩遣中謁者遺詩以寵其行有報在不言功之語當世榮之龍川志云至和三年仁宗始不豫皇嗣未建宰相文富韓三公方議所立叅知政事王公堯臣之弟正臣甞爲宗室說書官知十三使之賢即言之諸公諸公亦舊知之乃定議草奏書印欲上而上疾有瘳即止堯臣私収奏夲後累年韓公當國群臣相繼乞選立宗室子乃定立十三使爲皇子及仁宗晏駕皇子踐祚賞定䇿之功以韓公爲首及元豐末堯臣子同老上書繳進元奏時諸公惟文公富公在皆歸老於洛㑹文公入助郊饗神宗訪之公具奏所以神宗恱焉故一時諸公例皆𬒳賞而韓氏諸子惡分其功辨之不巳文公之罷平章重事由此故也然英宗之譽布於諸公則始於堯臣而其爲皇子嗣寳位則韓公之力不可誣也又記聞云元豐中文潞公自北都召對上問以至和繼嗣事公對曰臣等備位兩府當此之際議繼嗣乃職分耳然亦幸值時無李輔國王守澄之徒用事於中故臣等得効其忠懇耳上憮然有間而善之元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官唐介叅政之子義問爲轉運判官退謂其客尹煥曰先公爲臺官甞言潞公今豈挾爲恨耶義問當避之煥曰潞公所爲必有理姑聽之明日公交府事以次見監司府官如常儀或以問公公曰吾未視府事三公見庶僚也旣交印河南知府見監司矣義問聞之復謂煥曰微君殆有失於潞公也一日潞公謂義問曰仁宗朝先叅政爲臺諌以言彦愽謫官彦愽亦罷相判許州未幾彦愽復召還相位即上言唐某所言正中臣罪召臣未召唐某臣不敢行仁宗用彦愽言起叅政通判潭州㝷至大用與彦愽同執政相知爲深義問聞潞公之言至感泣自此出入潞公門下後潞公爲平章重事薦義問以集賢殿脩撰帥荆南烏乎潞公之德度絶人蓋如此聞見録元豐五年文潞公以太尉留守西都時富韓公以司徒致仕潞公慕唐白樂天九老㑹乃集洛中公卿大夫年德髙者爲耆英㑹以洛中風俗尚齒不尚官就資聖院建大厦曰耆英堂命閩人鄭奐繪像堂中時富韓公年七十九文潞公與司封郎中席汝言皆七十七朝議大夫王尚恭年七十六太常少卿趙丙祕書監劉几衛州防禦使憑行己皆年七十五天章閣待制楚建中朝議大夫王御名言皆年七十二太中大夫張問龍圗閣直學士張燾皆年七十時宣徽使王拱辰留守北京貽書潞公願預其㑹年七十一獨司馬温公年未七十潞公素重其人用唐九老狄兼謩故事請入㑹温公辭以晚進不敢班文富二公之後潞公不從令鄭奐自幕後傳温公像又之北京傳王公像於是預其㑹者凢十三人潞公以地主擕妓樂就富公宅作第一㑹至富公㑹送羊酒不出餘皆次爲㑹洛陽多名園古刹有水竹林亭之勝諸老鬢眉皓白衣冠甚偉每宴集都人隨觀之潞公又爲同甲㑹司馬郎中且程太中珦席司封汝言皆丙午人也亦繪像於資聖院其夜司馬公與數公又爲眞率㑹有約酒不過五行食不過五味唯菜無限楚正議違約増飲食之數罰一㑹皆洛陽太平盛事也洛之士庶又生祠潞公於資聖院温公取神宗送公判河南詩隷于牓曰竚瞻堂塑公像其中冠劒偉然都人事之甚肅聞見録元祐𥘉哲宗㓜冲起文潞公以平章軍國重事召程正叔爲崇政殿說書正叔以師道自居毎侍上講色甚莊繼以諷諌上畏之潞公對上恭甚進士唱名侍立終日上屢曰太師少休公頓首謝立不去時年九十矣或謂正叔曰君之倨視潞公之恭議者以爲未盡正叔曰潞公三朝大臣事㓜主不得不恭吾以布衣爲上師傅其敢不自重吾與潞公所以不同也識者服其言聞見録公之在朝契丹使耶律永昌劉霄來聘軾奉詔館客與使者入覲望見公殿門外却立改容曰此潞公也耶所謂以德服人者問其年曰何壯也軾曰使者見其容未聞其語其緫理庶務酬酢事物雖精練少年有不及貫穿古今洽聞強記雖專門名家有不逮使者拱手曰天下異人也公旣歸洛西羗首領有温谿心者請於邊吏願獻良馬於公邊吏以聞詔聽之東坡集潞公凝簡莊重顧眄有威逮事四朝荐更二府七換節鉞位將相五十餘年再守秦州大名求興五判河南徧歴公孤两以太師致仕英傑威重名聞四夷雖位體隆貴而平居接物謙挹尊德樂善如恐不及邵雍程顥以道學名丗居洛陽公與之游從甚宻及顥死旣葬親爲題其墓爲明道先生云至和中陳執中爲宰相其嬖人張氏笞女隷至死臺官趙抃范師道極言執中營救張氏故獄乆不直因言執中無材行不可任宰相翰林學士毆陽脩亦上書請退執中議乆不决左右怪仁宗禁中少遊燕黙有所思慮焦勞見於容色居月餘如此因問上曰陛下比憂勞見於容色得非思代執中者乎上曰然左右乃曰代執中者易得耳何至此耶上曰此老子却可謾人乆之始用文彦愽富弼二人代之朝議皆謂得人數日歐陽脩得對上問新除彦愽等外議如何脩具以朝議爲對上曰卿意如何脩曰誠如外議上又問彦愽弼果如何脩曰陛下已用彦博等復問其如何臣所未喻上曰彦愽有才然膽大弼前在政府甚好今復來恐多顧慮良乆又曰弼前深爲人所中傷今來亦焉能不顧慮然不若守前志不變也旣而彦愽果不能謹畏後因郭申錫李傪爭塞河事彦愽意有所左右上由此罷之弼亦竟以多顧慮少所建明皆如所料南豐雜識二之二樞宻錢宣靖公公名若水字淡成河南新安人雍熈中舉進士釋褐同州觀察推官擢祕書丞直史舘遷知制誥翰林學士至道初以右諌議大夫同知樞宻院事以母老求解機務便奉養遂以夲官充集賢院學士復判流内銓知開封府岀知天雄軍廵撫陜西還拜鄧州觀察使知并州薨年四十四錢若水爲舉子時見陳希夷於華山希夷曰明日當再來若水如期徃見有一老僧與希夷擁地爐坐僧熟視若水乆之不語以火箸畫灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留後若水登科爲樞宻副使年才四十致仕希夷初謂若水有仙風道骨意未决命僧觀之僧云做不得故不復留然急流中勇退去神仙不逺矣僧麻衣道者也聞見録錢若水爲同州推官知州性𥚹急數以胷臆决事不當若水固爭不能得輙曰當奉陪贖銅耳巳而果爲朝廷及上司所駮州官皆以贖論知州愧謝已而復然前後如此數矣有冨民家小女奴逃亡不知所之奴父母訟於州命録事叅軍鞫之録事甞貸錢於冨民不獲乃劾冨民父子數人共殺女奴棄屍水中遂失其屍或爲元謀或從而加功罪皆應死冨民不勝榜楚自誣服具上州官審覆無反異皆以爲得實若水獨疑之留其獄數日不决録事詣若水㕔事詬之曰若受冨民錢欲岀其死罪邪若水笑謝曰今數人當死豈可不少留熟觀其獄詞邪留之且旬日知州屢趣之不能得上下皆怪之若水一旦詣州屏人言曰若水所以留其獄者宻使人訪求女奴今得之矣知州驚曰安在若水因宻使人送女奴於知州所知州乃垂簾引女奴父母問曰汝今見汝女識之乎對曰安有不識也因從簾中推岀示之父母泣曰是也乃引冨民父子悉破械縱之其人號泣不肯去曰微使君之賜則某滅族矣知州曰推官之賜也非我也其人趣詣若水㕔事若水閉門拒之曰知州自求得之我何與焉其人不得入繞垣而哭傾家貲以飯僧爲若水祈福知州以若水雪冤死者數人欲爲之奏論其功若水固辭曰若水但求獄事正人不冤死耳論功非其夲心也且朝廷若以此爲若水功當置録事於何地邪知州歎服曰如此尤不可及矣録事詣若水叩頭愧謝若水曰獄情難知偶有過誤何謝也於是逺近翕然稱之未幾太宗聞之驟加進擢自幕職半歲中爲知制誥二年中爲樞宻副使記聞錢若水爲學士太宗禮遇殊厚甞草賜趙保忠詔云不斬繼遷存狡兎之三穴潜疑光嗣持首䑕之兩端太宗覽之甚恱謂若水曰此四句正道着我意又與趙保吉詔有旣除手足之親已失輔車之勢其辭甚美太宗御筆批其後云依此詔夲極好至今其子延年寳藏之金坡遺事李繼隆與轉運使盧之翰有隙欲䧟之罪乃檄轉運司期八月岀塞令辦芻粟轉運司調發方集繼隆復爲檄言據隂陽人狀國家八月不利岀師當更取十月轉運司遂散芻粟旣而復爲檄云得保塞胡偵候狀言賊且入塞當以時進軍芻粟即日取辦是時民輸輓者適散倉卒不可復集繼隆遂奏轉運司乏軍興太宗大怒立召中使一人付三凾令乗驛馳取轉運使盧之翰竇玭及某人首丞相吕端樞宻使柴禹錫皆不敢言惟樞宻副使錢若水爭之請先推驗有狀然後行法上大怒拂衣起入禁中二府皆罷若水獨留廷中不去上旣食乆之使人偵視廷中有何人報云有細瘦而長者尚立焉上岀詰之曰爾以同州推官再朞爲樞宻副使朕所以擢任以爾爲賢爾乃不才如是邪尚留此安俟對曰陛下不知臣無狀使得待罪二府臣當竭其愚慮不避死亡𥙷益陛下以報厚恩李繼隆外戚貴重莫比今陛下據其一幅奏書誅三轉運使雖有罪天下何由知之鞫驗事狀明白加誅亦何晚焉獻可替否死以守之臣之常分臣未獲死固不敢退上意解乃召吕端等奏請如若水議先令責狀許之三人皆黜爲行軍副使旣而虜欲入塞事皆虚誕繼隆坐罷招討知秦州記聞詔訪備邊之䇿若水條上五事一擇郡守二募郷兵三積芻粟四革將帥五明賞罰錢公若水甞率衆過河號令軍伍分布行列悉有規節深爲戍將所伏上知之謂左右朕甞見儒人談兵不過講之於尊爼硯席之間於文字則引孫呉述形勢皆閑暇清論可也責之於用則罕見有成効者今若水亦儒人曉武深可嘉也時言者請城綏州積兵禦党項詔公自魏乗疾傳徃桉至則乞罷其役時論韙之上甞謂左右曰朕觀若水風骨秀邁才力有餘止疑其筭部蹙隘果至大用恐愈迫之其後果夭玉壷清話至道初吕蒙正罷相以僕射奉朝請上謂左右曰人臣當思竭節以保冨貴吕蒙正前日布衣朕擢爲輔相今退在班列寂寞想其目穿望復位矣劉昌言曰蒙正雖驟登顯貴然其風望不爲忝冒僕射師長百僚資望崇重非寂寞之地且亦不聞蒙正之鬱悒也况今巖穴髙士不求榮逹者甚多惟若臣軰苟且官禄不足以自重耳上黙然又甞言士大夫遭時得位冨貴顯榮豈得不竭誠以報國乎錢若水言髙尚之人固不以名位爲光寵忠正之士亦不以窮逹易志操其或以爵禄恩遇之故而効忠於上此中人以下者之所爲也上然之及劉昌言罷上問趙鎔等曰頻見昌言否鎔等曰屢見之上曰涕泣否曰與臣等談多至流涕上曰大率如此當在位之時不能悉心𥙷職一旦斥去即汍瀾涕泗若水曰昌言實未甞涕泣鎔等迎合上意耳若水因自念上待輔臣如此盖未甞有秉節髙邁不貪名勢能全進退之道以感動人主遂貽上之輕鄙將以滿歲移疾遂草章求解職㑹晏駕不果上及今上之初年再表遜位乃得請談苑公美風神有器識能斷大事事繼母以孝聞風流儒雅善談論尤輕財好施所至推誠待物委任僚佐緫其綱領無不稱治汲引後進推賢重士胷中豁如也
