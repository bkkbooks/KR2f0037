body:
  text: 十二之三諌議劉公公名安丗字器之大名人中熈寜六年進士第歴洺州司法叅軍河南府左軍廵判官哲宗即位除祕書省正字擢右正言遷起居舎人兼左司諌又遷左諌議大夫除中書舎人辭不拜以集賢殿脩撰提舉西京崇福宫俄復除寳文閣待制樞宻都承旨出知眞定府落職知南安軍改提舉洪州王隆觀南安軍居住責授少府少監分司南京新州别駕英州安置元符􅀄移梅州徽宗即位移衡州尋改濮州團練副使鼎州居住未行除脩撰知鄆州待制知眞定府罷知潞州落職知沂州貶信陽軍除名勒停送峽州編管乆之提舉南京鴻慶宫復直龍圖閣宣和七年卒年七十八公儀狀魁碩聲吐如鍾見賔客談論踰時體無欹側肩背竦直身不少動至手足亦不移性嚴毅雖家居無墮容子弟進見侍側肅如也其孝悌忠信恭儉正直不好聲色不殖貨財誠心自然非勉強而行之也窮經樂道至老不衰言行録開府公與司馬温公爲同年契因遂從學于温公熈寜六年舉進士不就選徑歸洛温公曰何爲不仕公以􅃮彫開斯未能信之語以對温公􅀃復從學者數年一日避席問盡心行已之要可以終身行之者温公曰其誠乎吾平生力行之未甞須􅁷離也故立朝行已俯仰無媿爾公問行之何先温公曰自不妄語始自是拳拳弗失終身行之調洺州司法叅軍時吴守禮爲河北轉運使嚴明守法官吏畏之吴一日問有人告司户􅂍汚如何公對不知吴不悅明日閱視倉庫召司户者謂曰人訴尓有􅂍夲來按尓今劉司法言尓無之姑去於是衆方知公長者然公心常不自快曰司户實有􅂍而我不以誠告吾其違温公教乎後因讀楊子雲君子避礙通諸理而後意方釋然言不必信此而後可言行録又韓瓘所記談録云公曰先人與温公同年以其樂於教育故白公遣安丗從學與公休同業凢三四日一往以所習所疑質焉公忻然告之無勌意凢五年得一語曰誠安丗請問其目公喜曰此問甚善當自不妄語入余􅀄甚易之及退而自隱括日之所行與凢所言自相掣肘矛楯者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘􅁉又道護録云公言安丗平生只是一箇誠字更撲不破誠是天道思誠是人道天人無兩箇道理因舉左手頋之􅀏曰只爲有這軀殻故假思以通之耳及其成功一也安丗自從十五􅀊以後便知有這箇道理也曾事事着力畢竟不是只有箇誠字縱横妙用無處不通以此杜門獨立其樂無窮任怎生也動安丗不得温公薦充館職因謂公曰知所以相薦否公曰獲從公遊舊矣温公曰非也光居間足下時節問訊不絶光位政府足下獨無書此光之所以相薦也言行録桉文集有乞不就試狀云王景興師事楊賜􅀓爕以郡將堂舉孝廉後聞其䘮皆去官行服而近丗臣僚薦辟磨勘舉者亡􅃿亦皆報罷臣少學於光晚蒙推薦今光薨謝臣旣不能効古人之節去官送䘮而遽飾固陋之辭以干榮進實所未安自王荆公吕惠卿蔡確章惇繼踵執政幾二十年士大夫多出其門布列内外任職之人不與王吕則與蔡章在朝廷者十有五六温公當國姦邪小人惡其害已興訛造訕更唱迭和㑹温公遽薨善􅀋自失朋邪相慶意蔡章復用雖執政間亦多畏此二人之險甚於虺蝪依違顧望中外憂之宣仁后問吕申公孰爲司馬相公門下素所厚善可爲臺諌者吕以公嘗爲温公所薦擢右正言言行録是時差除頗多政府親戚公言祖宗以來執政大臣親戚子弟未嘗敢受内外華要之職自王安石秉政以後盡廢累聖之制專用親黨務快私意二十年間廉恥掃地今廟堂之上猶習故態歷䟽太師平章軍國重事彦􅀶司空平章軍國事公著左僕射大防右僕射純仁門下侍郎固左丞存右丞宗愈堂除子弟親戚凢數十人且曰中書侍郎摯未見所引私親而依違其間不能糾正雷同循黙豈得無罪願出臣此章徧示三省俾自此以往厲精更始言行録胡宗愈除右丞不恊公論臺諌更䟽論列巳而諌官王覿坐是罷斥於外然臺諌論之不巳皆不報中執法孫莘老御史楊康國相繼辭去獨公與左司諌韓川同對宣仁后因問近日差除如何公與川奏朝廷用人皆恊輿望唯是胡宗愈公議以爲不當即略陳宗愈罪狀宣仁后曰今且試其所爲公謂朝廷設官從㣲至著自有等級要湏歷試灼見其賢然後舉而加於衆人之上則人無異論若執政之官陛下所與朝夕圖議天下之事若謀猷獻替動皆中理固爲盡善一有差失天下將有受弊者以此論之執政豈是試人之地宣仁后嘉納退而又以劄子論宗愈向爲蔡確引用今又隂結惇確凢十二事章十餘上皆留中而公論之不已又申三省乞請章䟽付外施行翌早三省奏事罷執政皆退簾中有語曰右丞且住劉安丗有章䟽言右丞右丞冝自爲去就宗愈遂罷言行録章惇於崑山縣強市民田人户經州縣監司次第陳訴皆不敢受理又經户部論訟復不敢治御史臺亦不彈劾公累上䟽不報乃極論之曰桉惇抱死黨之志而濟以隂謀藴大奸之才而輔之殘忍因縁王安石吕惠卿之黨遂得進用而造起邊􅂩徼幸富貴在先帝時巳坐買田不法嘗罷執政蔡確引用再叨大任陛下嗣位擢置上樞而内懷姦謀沮毀聖政以至悖慢帷幄之前殊無臣子之禮及以家難退歸里閭而敢慿恃㓙豪劫持州縣使無辜之民流離失業乞特賜竄殛仍委臺臣置院推劾其崑山􅂫州及夲路監司亦乞並行黜責章四上朝廷令發運司體究詔贖銅十斤公復争之以謂所責太輕未厭公議况惇與確黃履邢恕素相交結自謂社禝之臣貪天之功徼幸異日天下之人指爲四㓙若不因其自致人言遂正典刑異日却欲竄逐深恐無名且干繫官吏因惇致罪皆處從坐惇係首惡之人乃止贖銅事理顚錯亦已太甚况下狀之日惇父尚在而別籍異財事狀顯著考按律文罪入十惡愚民冒犯猶有常刑惇爲大臣天下所望而虧損名教絶㓕義理止從薄罰何以示懲聖人制法惟務至公若行於匹夫而廢於公卿伸於愚民而屈於貴近此乃姑息之弊政非清朝之所冝行也言行録李常始阿附王荆公故神宗甞曰李常非佳士屬者安石家居常求對極稱其賢以爲朝廷不可一日無安石寜可逐臣不可罷安石旣退更具以此言告安石以賣恩當時已爲清議所貶及元祐間爲御史中丞與侍御史盛陶隂庇姦慝緘黙不言丗􅀹惡之公言常陶賦性柔邪秉心不一昔蔡確用事之日隂相交結故擢常爲户部尚書以陶爲考功郎官今並㞐丞雜阿䛕朋黨殊無公道蔡確猶在謫籍而爲其弟碩陳乞内徙又自請潁昌自便章惇強買民田二人目覩其事終無一言如此者七事䟽方入未及行㑹知漢陽軍吴處厚上蔡確安州所爲謗詩公即論奏曰確詩十篇多渉譏訕而二篇􅀹甚非所冝言指斥乗輿情理切害犯大不敬借唐爲論謗訕君親至於滄海􅀭波之語其所包藏􅀹爲悖逆蓋確自謂齒髪方盛足以有爲意在它日時事變易徼幸復用攄泄禍心此而可捨國法廢矣與左諌議大夫梁燾對於延和兩宫宣諭令具行遣比例條列宻奏即以宰相丁謂等貶崖州司户條例以聞􅀄吴處厚繳進確詩李常以爲不冝長此風盛陶謂確夲無意公與燾并奏其罪請俟蔡確事畢特行竄逐彭汝礪曽肇同在中書爲舎人亦皆極力救確公言上自執政下至堂吏確之黨與殆居其半百端營救齊奮死力若使邪說得行揺動正論則朝廷之事極有可憂此臣所以夙夜寒心過爲陛下之計已而蔡確責授光禄卿分司南京而彭汝礪封還詞頭不肯草制公與梁燾吴安詩同上䟽力争以爲責命太輕未厭與議䟽十餘上始竄確於新州於是中丞李常侍御史盛陶殿中侍御史翟思監察御史趙挺之王彭年坐是同日出臺中一空彭汝礪落職黜守偏州曽肇亦罷斥外􅀘言行録蔡確雖貶尚與章惇等自謂有定䇿功創造語言恐脅貴近爲中外憂公復言曰臣近嘗進對論蔡確朋黨雖粗陳大槩未能盡逹天聽事體至重不可不憂臣聞蔡確章惇黃履邢恕四人者在元豐之末號爲死黨惇確執政倡之於内履爲中丞與其寮屬和之於外恕立其間往來傳送天下之事在其掌握聖上嗣位四人者以謂有定䇿之功眩惑中外若不早爲辨正臣恐異日必爲朝廷之患臣聞元豐七年秋宴之日今上皇帝出見群臣都下喧傳以爲盛事明年神考晏駕衆謂前日之出已示與子之意其事一也自先帝違豫嘉歧二王日詣寢殿候問起居及疾􅀔稍増太皇太后即時靣諭並令還宫非遇宣召不得輙入有以見聖心無私保佑御名重其事二也建儲之際大臣未嘗啓沃而太皇太后内出皇帝爲神考祈福手書佛經宣示執政稱羙仁孝發於天性遂令草詔誕告外庭蓋事已先定不假外助其事三也陛下聽政之􅀄首建親賢之宅才告畢工二王即日遷就外第天下之人莫不服陛下之聖明深得逺嫌之理其事四也此實太皇太后聖慮深逺爲宗廟社禝無窮之計彼四人者乃敢貪天之功以爲巳力伏望明詔執政及當時受遺之臣同以親見䇿立今上事迹作爲金縢之書藏之禁中又以其事夲末著實録然後明正四㓙之罪布告天下除蔡確近巳貶竄外所有章惇黃履邢恕欲乞並行逐之逺方終身不齒所貴姦豪屏息它日無患由是三人亦皆得罪言行録始公論蔡確未行兩府中獨范丞相留身簾前力解之時左丞王存巳去行數歩爲范一言留之當時公嘗奏云伺􅃸行遣蔡確了日當節次劾奏奸黨乞賜竄逐至是乃言之且言純仁爲樞宻日因司馬光乆在病告遂以國用不足爲說乞依舊散青苗息錢光聞其事力疾入見以死争之又於上前親自奏禀云不知是何姦邪之人勸陛下復爲此事純仁汗顔畏縮不敢仰視尋得聖旨盡令寢罷光謂臣曰純仁自爲執政言行反覆隂懷頋望止爲全身之謀以名取人其弊至如此以上皆光之語臣不敢有一字増損純仁與存遂皆罷去言行録遷起居舎人兼左司諌時有詔權罷講筵乆之公偶爲家人雇乳母牙媪以謂無有詰其故因言内降指揮見求乳母公怒曰汝何敢尓妄言且今上猶未納后安得有此媪云内東門司開封府録實預其事公與府録有契因折簡問之荅如所聞即上䟽靣言迺者民間喧傳見求乳母臣謂陛下富於春秋尚未納后未嘗輙信近日傳者益衆頗有實狀臣忝備言職當諌其漸昔者帝堯惟以天下爲憂不敢以位爲樂成湯不邇聲色萬丗傳誦皇帝陛下不可以不勉太皇太后不可以不勸也願爲宗廟社稷之大計清間之燕頻御經帷仍引近臣與之議論前古治亂之要當今政事之冝悉俾開陳以助聖學無溺於所愛而忘其可戒則天下幸甚哲宗但俛首不言宣仁后曰此事無之恐卿誤聽反覆良乆公云臣請繼此復言明日兩府奏事宣仁后留吕丞相告之且云可諭安丗無再言吕曰臣忝備宰相無由與言官相見􅀂召至都堂恐駭人聽今給事中范祖禹雅與安丗厚善而臣與祖禹共事於國史臣請退語祖禹以聖語諭安丗宣仁后曰善范過公所趣小吏白諌議朝服聽宣諭公􅀄唯唯而已徐曰醇甫居侍從論思之地且職在勸講義當盡規柰何反止同列耶於是醇甫退而亦論之公復上䟽言伏聞德音諭臣以所論後宫事實未嘗有者稽首承命感抃交集臣歷觀前丗之主鮮有不以聲色爲累至於近之太早御之無節則又不能保固眞源増益壽考聖賢所戒可爲寒心且丗俗之間粗有百金之産猶知愛其子孫以爲嗣續之託而况國朝百三十年之太平六聖憂勤積累之基業陛下繼而有之可不自愛自重以爲宗廟社稷無窮之計乎若陛下實未嘗爲則臣之所言猶不失諌官之職萬一有之則臣之進說巳是後時惟兾陛下愛身進德留意問學清心御欲増厚福基臣不勝惓惓愛君之至宣仁后􅀄不知因公言始窮詰其事乃知雇乳母者爲劉氏也后怒而撻之由是劉深以望公其後專寵孟后幽廢正位中闈是爲昭懷皇后言行録自崇慶垂簾復祖宗舊政温公旣薨之後荆公之徒多爲飛語以動揺在位誘之以利脅之以禍無所不至大臣多首䑕兩端爲自全計吕范二相􅀹畏之欲用其黨以平舊怨謂之調亭差除之際公與梁燾朱光庭每極力争論吕公病之因薦熈豐舊人鄧温伯爲翰林承旨意言官必争因以逐之公言温伯熈寜中王安石吕惠卿更相傾䧟温伯始終反覆岀入兩黨又附蔡確爲之草制稱其有定䇿之功乞行罷黜䟽累上不報又於延和靣對極言論難甚乆宣仁后曰卿等湏體朝廷之意天下事豈可盡由臺諌亦當出自宸􅂨公以義理開陳退復論之凢六上章不報即引疾在告陳乞宫觀尋除中書舎人公力辭門下侍郎劉莘老亦奏温伯實王安石黨人梁燾朱光庭劉安丗皆忠純諒直之臣中外之情以其去住卜朝廷意向憂國之臣無不疑懼兩宫復遣中使宣諭􅃬以珍膳公請益堅乃除集賢殿脩撰提舉西京崇福宫言行録公徧歷言路正色立朝知無不言言無不盡毎以辨是非邪正爲先進君子退小人爲急其靣折庭争至雷霆之怒赫然則執簡却立伺天威少霽復前極論一時奏對且前且却者或至四五殿庭觀者皆汗縮竦聽公退則咨嗟嘆服至以俚語目之曰殿上虎言行録公曰安丗作都承旨待制欲至梁門見一相識吕微仲作左相與執政岀尚書省相從歸府第遇之於塗余去蓆帽凉衫歛馬於浚溝廟下旣至遣人傳語相揖而過當時若無所據則爲犯義微仲歸不下㕔呼門下省法吏問從官道逢宰相如何吏檢條但有尚書省官避令僕兩省官各避其官長而無兩制避宰相之法㣲仲遂止然終不樂范相之出由安丗章䟽已而復拜吕相遂擬安丗眞定宣仁難之吕云劉安丗曽言范純仁純仁今旣復相冝少避之宣仁曰今旣不作言事官自不相妨其後樞宻院奏事宣仁申前語韓師朴如吕之對宣仁曰如此正人冝且留朝廷遂輟譚録元祐中詔議北郊典禮􅂫子瞻主合􅀕之議從之者五人余謂湏當分􅀕從者僅四十人又有三人欲於十月以神州地祇之􅀕易夏至方澤之祀復有一人欲上不親祠而通權火天子於禁中望拜旣而朝廷復送下三狀再令詳定子瞻狀引昊天有成命詩以難分􅀕之議衆官憚子瞻之􅀔莫敢攖觸乃蒙見推因作前議以荅之旣送同議官簽書遂致漏泄其徙馳告子瞻曰􅀂劉承旨議上决恐難荅莫􅀂白子由亟令罷之子由時爲門下侍郎即日降旨罷議竟不得上比觀蘭臺文選印行子瞻議狀盡非元奏之語深可駭異其禮部所議􅀄甚平易後爲門人開說遂爲後狀以進亦但慮减損禋賜動軍中之情又謂合祭巳乆神祇所饗改之必有殃咎可爲寒心而已余隨其所論以理折之固無遺者今覧印夲追記舊文十不存一懼後人不知夲末因録奏草於右使覧者得以推見事實云劉公北郊後序劉公奏狀略云􅂫軾謂合祭貟丘於禮爲得不可復改臣等謹按周禮天子親祀上帝凡九國朝三􅀊一郊固巳踈闊豈可因循謬誤不加考正古者求神以􅀋天陽物也地隂物也􅀊月時日方位牲器樂舞皆從其􅀋今議者於聖人成法則棄而不行猥用王莽不經之說至引夫婦同牢私媟之語黷亂天地又引昊天有成命之詩以爲證臣等竊詳此詩終篇未嘗有合􅀕之文序乃後儒之辭亦謂成周之丗圎丘方澤各歌此詩以爲樂章耳如潜之序曰季冬献魚春薦鮪也豐年之序曰豐年秋冬報也噫嘻之序曰春夏祈榖于上帝也如此之􅀋不知爲一祭邪抑二祭也􅀂郊禋賜予乃五代姑息之弊法聖朝寛仁不欲遽罷􅀂分而爲二何所不可議者乃欲因此造爲險語以動上聽又引禍福殃咎之􅀃劫持朝廷必欲從巳甚無謂也大抵臣等所守乃先王之正禮而􅂫軾之議皆後丗之便冝􅁠之與正决不可合伏望聖慈詳審其當上以體神考之志下以正千載之惑豈勝幸甚宣仁后晏駕吕丞相使陵下范丞相奏乞除執政即用李清臣爲中書侍郎鄧温伯爲尚書右丞時大臣卒用調亭之說遂有李鄧之除二人皆熈豐之黨屢見攻於元祐乃以先朝事激怒上意㑹庭䇿進士李鄧撰䇿題歷詆元祐之政有復新法之意從而中傷元祐諸人公乃出鎭常山未幾元豐舊人悉皆收召遂相章惇言者以公頃言蔡確落職知南安軍而吕丞相亦不免逺竄乃深媿於公其後范丞相門人狀范公之行曰使其言行於熈豐時後不必至紛更盡申於元祐中必無紹聖大臣復讎之禍或以此問公公曰㣲仲堯夫不知君子小人􅀔不兩立如氷炭故開倖門延入李鄧排去正人易􅀂反掌調亭之􅀃果何益乎昔温公爲相日蓋知其後必有反覆之禍然救生民之患如救焚拯溺猶恐不及何暇更顧異日一身之患哉丗以公爲知言言行録公度嶺北望中原自念奉父母遺體而􅄬炎荒且無兼侍恐一旦溘然爲慈親憂因憶温公語云北人在瘴地唯絶嗜欲可以不死自是遂絶言行録又談録云公言其平日康寕之狀云安丗尋常未嘗服藥方迁謫時年四十有七先妣必欲與俱百端懇罷不許安丗念不幸使老親入於炎瘴之地巳是不孝􅀂非義固不敢爲父母惟其疾之憂如何得無疾祇有絶欲一事遂舉意絶之自是逮今未嘗有一日之疾亦無宵􅄰之變瓘曰公平生學術以誠入無往而非誠凢絶欲是眞絶欲心不動故公曰然公曰安丗自絶欲來三十年氣血意思只如當時終日接士友劇談雖夜不寐翌朝精神如故平生坐必端巳未嘗傾側靠􅀝毎日行千歩燕坐調息復起觀書未嘗晝寢啜茶伴客有至六七盌􅀄無所苦書字㓜服先人之訓先工正書然後學行行巳能草今人未能正書而便草如未能坐立而便走也安有是理故終身未嘗草字與人書尺至老未嘗使人輙代歳時家廟􅀕饗拜跪七十有二未嘗廢闕此祖先相傳安丗終身由之以勵子孫一皆夲之以誠故心嘗前知兩月前自覺必有變異果長子不禄故至誠如神聖人豈吾欺哉公言安丗􅀄到南方有一髙僧教余言南方地􅀬而酒性亦大􅀬夲草所謂大海雖凍而酒不氷今嶺南煙瘴之地而更加以酒必大發疾故疾之狀使人遍身通黃此􅀬之極也故余過嶺即斷酒雖遍歷水􅁟惡弱它人必死之地而余獨無恙今北歸巳十年矣未嘗一日患瘴者此其効也語録紹聖􅀄黨禍起器之􅀹爲章惇蔡卞所忌逺謫嶺外盛夏奉老母以行途人皆怜之器之不屈也一日行山中扶其母籃􅞿憇樹下有大蛇冉冉而至草木皆披靡擔夫驚走器之不動也蛇􅀂相向者乆之乃去村民羅拜器之曰官異人也蛇吾山之神見官喜相迎耳官行無恙乎温公門下士多矣如器之者所守凛然死生禍福不變蓋其平生喜讀孟子故剛大不枉之氣似之聞見録惇卞用事所以殺公者百計皆不克然必欲致於死故方竄廣東則移廣西旣抵廣西則復徙廣東凢二廣間甲令所載稱逺惡州軍者無所不至雖盛夏令所在州軍監督日行一舎或泛海往來貶所人皆謂公爲必死然七年之間未嘗一日病年幾八十堅悍不衰此非人力所及殆天相之也或問何以至於此曰誠而巳言行録先是文及甫持䘮在河陽邢恕在懷州及甫以劉丞相摯任中司日嘗彈罷其左司郎銜怨不巳以書抵恕曰及改月遂除畢禫􅀕當外􅀘入朝之計未可必當塗猜怨於鷹􅀭者益深其徒實繁司馬昭之心路人所知也又濟之以粉昆朋􅀋錯立必欲以眇躬爲甘心快意之地紹聖末蔡確子渭受旨於翰林學士蔡京且迎合大臣乃上書引及甫書爲證訟劉丞相及公等誣䧟其父謀危社禝朝廷駭之委京究問置獄於同文館遂逮及甫就吏及甫稱鷹􅀭謂其父潞公也當塗者謂劉摯也其徒實繁者謂梁燾王巖叟劉安丗孫升韓川之􅀋也司馬昭之心路人所知者縁摯竄斥頋命宰相蔡確是時國􅀔甚危疑摯有頃揺之心意在不測如司馬昭廢辱之事也粉昆朋􅀋者粉謂王巖叟靣如􅀓粉昆謂梁燾燾字貺之以貺爲兄以兄爲昆也欲以眇躬爲甘心快意之地可爲寒心者眇躬謂主上摰旣懷無君之心有動揺不逞之意前巳甘心快意於蔡確軰今欲快意於主上是欲以主上爲甘心快意之地有憂國之心者爲可寒心也問有何照據則曰先父屏人􅀃來即無的確照據時劉丞相王彦霖巳物故然而其謀夲出於蔡京故京猶乞上殿親冩劄子争論不巳三省言蔡京奏摰等逆心及甫言之於元祐其事可信不誣在法九族當坐則其一時黨附顯著之人同惡相濟豈得無之如劉安丗嘗論禁中雇乳母謂陛下已親女寵又論不御經筵謂陛下巳惑酒色誣罔聖躬形於章䟽者果何心也今摰貶死廢及子孫而安丗不問罪罰殊科如此臣不知其說也詔范祖禹移化州安置劉安丗移梅州安置王巖叟朱光庭諸子並勒停永不收叙公時執䘮不候服闋赴貶所言行録公在貶所忽有所厚士􅀋數軰至殷勤之餘輙相向垂涕公曰豈非安丗有後命乎客曰屬聞朝廷遣使入郡將不利於公願公自裁無辱公告之曰安丗罪大責輕􅀂朝廷不貸甘心東市之誅使國家明正典刑誅一戒百亦助時政之萬一何至效匹夫匹婦自經於溝瀆哉不爲動使者入海島杖死元祐内臣陳􅄛蓋累聖相授不殺近臣惇卞屢造此禍而不克故因令使者迃往諸郡以虚聲逼諸流人使其自盡也自是廣人寖知惇卞意時公貶所有土豪縁進納以入仕者因持厚資入京師以求見惇犀珠磊落賄及僕􅀠乆之不得見其人直以能殺公意逹之惇乃見之不數日薦上殿自選人改秩除夲路轉運判官其人飛馭徑驅至公貶所郡將遣其客來勸公治後事涕泣以言公色不動留客飲酒談􅀏自􅀂對客取筆書數􅁓徐呼其僕曰聞朝廷賜我死即死依此行之謂客曰死不難矣客從其僕取􅁓閱之則皆經紀其家與同貶當死者之家事甚悉客驚歎以爲不可及也俄報運使距郡城二十餘里而止翌日當至家人聞之益號泣不食亦不能寐且治公身後事而公起居飲食如平常曾無少異至夜半伺公則酣寢􅈹息如雷忽聞鍾動上下驚曰鍾聲何太早也􅀺明問之鳴鍾者乃運判公一夕嘔血而斃矣明日有客唁者曰若人不死則公未可知矣然公亦無喜色於是見公處死不亂如此言行録惇卞謀害公旣不克是時昭懷寵冠六宫隆祐幽廢惇乃以公頃論禁中雇乳母事媒孽之始鄒至完亦嘗諌立劉氏坐竄嶺外至是詔應天少尹孫橐以檻車抵二公貶所欲收以致京師至泗濵聞哲宗登遐徽宗即位置郵走赦孫即聞於朝乃不收言行録曽子宣爲右相李􅀖直爲門下侍郎一時正人皆爲所忌公帥眞定吕子進帥髙陽過闕合入見縁公鄆帥謝章有曰志存許國如萬折而必東忠以事君雖三已而無愠曽李覧之曰如此怎生屈摺遂不許入朝韓丞相忠彦薦張芸叟爲大諌􅀖直出之帥中山蔡京作相用范致虚諌䟽曰河北三帥連衡恐非社稷之福公與張吕同日報罷言行録公知潞州部使者希蔡京旨治郡中事無巨細皆詳考然終不得毫髪過雖過往驛劵亦無違法予者部使者亦歎服之公在南京奉祠府尹因徧取宫觀􅀉居官白直曆閱之或差禁卒或過其數至公獨無其持身廉御名如此譚録公曰安丗􅀄除諌官未敢拜命入與孃子謀曰朝廷不以安丗不肖誤除諌官這箇官職不比閑慢差遣湏與它朝廷理㑹事有所觸犯禍出不測朝廷方以孝治天下如以老母懇辭必無不可孃子曰不然諌官是天子争臣我見你爺要做不能得你是何人蒙它朝廷有此除授你若果能􅀘報朝廷假使得罪我不選甚處隨你去但做安丗遂備禮辭免尋便供職三日朝廷有大除拜安丗便入文字凢二十四章又論章惇十九章及得罪惇必欲見殺人言春循梅新與死爲鄰髙竇雷化􅀃着也怕八州惡地安丗歷遍七州於其中間又遭先妣䘮禍與兒子軰扶護靈柩盛夏跣足日行數十里脚底都穿破一日下程大底兒子悶絶于地後來究竟不起今只有老夫與兒子兩人在耳道護録公曰今人咸言事已如此不可復理安丗以爲甚易耳孟子云夫天未欲平治天下也如欲平治天下當今之丗捨我其誰哉非敢輕蔑天下之士自以實見天下有可爲之理爾請言一事安丗少時在開寳寺習省課潞公爲樞相一日以先人監牧司申一事頗違當時朝廷之意召安丗問之安丗以實對已而問近有所聞否安丗言昨有人相訪云王介甫求去甚堅恐相公代其任潞公曰安得有此譬如立大厦其匠擅其工斤斧紛然其大木截之令小小者復碎之曽未就緒輙要主人辭去舊屋旣毀新材又壞後之人如何其可爲也余時甚少氣頗銳應之曰安丗雖晚進以理觀之似未然潞公愕然曰何故安丗曰今日新政不知果順人之所欲爲人之利乎若不然相公當之去所害興所利反掌之間耳潞公黙然它日見先人云嘗請令郎相見其論甚堅正也譚録先是建中年間公與􅂫子瞻自嶺外同歸道出金陵時有吏人吴黙者以詩贄二公子瞻稱之跋數語於詩後公亦題其末以勉其學是後内侍梁師成得幸自謂子瞻遺腹子與一二故家稍稍親厚黙知其說因携二公所跋詩謁之梁甚恱奏之以官至宣和間梁益大用以太傅直睿思殿參可三省樞宻院事貴震一時雖蔡京童貫皆出其下是時黙改名可爲正使師成令可自京師來宋欲鈎致公引以大用且以書抵公可至三日然後敢出之且道所以來之意大槩以諸孫未仕爲言以動公公謝曰吾若爲子孫計則不至是矣且吾廢斥幾三十年未嘗曽有􅀧墨與當朝權貴吾欲爲元祐完人不可破戒乃還其書而不荅人皆爲公危之而公自若也言行録公曰士夫知舊多勸扁舟東下窮山水之勝且以逺屏自全者余謝之曰舊一擾擾如一鼎之沸安有清泠處乎安丗丗食君禄又嘗備法從緩急自知死所何避之有以此㤗然未嘗經意昔温公自陜論新法不可以治郡得請歸洛時劇宼王充聚黨數千橫行大行中先人出兩驛延勞之云今日且喜公歸某前甚憂之􅀂此宼知公有人望萬一劫公東來以之動民柰何公􅀏而不荅再問之則云此何足問吾軰平日學道以忠孝爲質有死而已夫復何懼固知君子渉丗自處固有素矣譚録先生曰金陵有三不足之說聞之乎僕曰未聞先生曰金陵用事同朝起而攻之金陵闢衆論進言於上曰天變不足懼祖宗不足法人言不足䘏此三句非獨爲趙氏禍乃爲萬丗禍也老先生嘗云人主之􅀔天下無能敵者或有過舉人臣欲回之必思有大於此者巴㰖之庶幾可回也今乃教人主使不畏天變不法祖宗不䘏人言則何等事不可爲也僕曰此言爲萬丗禍或有術可以絶此言使不傳於後丗乎先生曰安可絶也此言一出天下人皆聞之􅀂著論明辨之曰此乃禍天下後丗之言雖聞之不可從也譬如毒藥不可絶而神農與歷代名醫言之曰此乃毒藥如何形色食之必殺人故後人見而識之必不食也今乃絶之不以告人旣不能絶而人誤食之死矣先生又曰巴􅄃兩字賢可記取極有意思馬永卿編語録先生因言及王荆公學問先生曰金陵亦非常人其粗行與老先生略同其質朴儉素終身好學不以官職爲意是所同也但學有邪正各欲行其所學者爾而諸人輙溢惡此人主所以不信而天下之士至今疑之以其言不公故愈毀之而愈不信也嘗記漢時大臣於人主之前說人短長各以其實如匡衡論朱雲以爲雲素好勇數犯法亡命受易頗有師道是其一也凢人有善有惡故人有毀有譽􅀂不稱其善而併以爲惡而毀之則人必不信有是惡矣故攻金陵者只冝言其學乖僻用之必亂天下則人主必信􅀂以爲以財利結人主如桑洪羊禁人言以固位如李林甫姦邪如盧􅂎大佞如王莽則人不信矣蓋以其人素有德行而天下之人素尊之而人主夷考之無是事則與夫毀之之言亦不信矣此進言者之大戒語録器之嘗謂予言當官處事湏權輕重務合道理母使偏重可也夫是之謂中因言元祐間嘗謁見馮當丗宣徽當丗言熈寜􅀄與陳􅊙叔吕寳臣同任樞宻􅊙叔聦明少比遇事之來迎刃而解而吕寳臣􅀹善秤停事毎事之來必秤停輕重令得所而後已也事經寳臣處者人情事理無不允當器之因極言秤停二字最吾軰當今所冝致力二字不可不詳思熟講也寳臣即惠穆公也童蒙訓器之云安丗􅀄登第與二同年謁李若谷叅政三人同起身請教李曰若谷自守官以來常持四字曰勤謹和緩其間一後生應聲曰勤謹和旣聞命矣緩之一字某所未聞李正色作氣曰何嘗教賢緩不及事來且道丗間甚事不因忙後錯了吕氏􅄂録胡珵問曰筮仕之􅀄遽領推勘不知治獄要道何如公曰在常注意而一事不如意敬安丗有一同年宋若谷在洺州同官留意獄訟當時遂以治獄有聲監司交薦其後官至中散大夫嘗曰獄貴初情毎有繫獄者一行若干人即時分牢異處親徃遍問私置一簿子隨所通說筆記之因以手指畫􅂰上教珵曰題云某日送到某人某事若干人列各人姓名其後行間相去可三寸許以􅀄訊問所得語列䟽姓名左方其後結正無能出􅀄語者蓋人乍入狴犴旣倉卒又異處不能相謀此時可以得其情耳獄貴􅀄情此要道也道護録與黃鍰用和小柬云俞玘筆尚未蛀損但撚心不正主鋒多偏􅀓毫太薄抑按無力此其所短也又柬云向者論俞玘筆病出於偶然乃蒙閤下推之以及脩身之道何嗜學之篤也栁公權謂心正則筆正亦有此理苟知其要亦不必專守斯言也道護録後公自宣和乙巳歳元日以後謝絶賔客四方書問皆不啓封家事無巨細悉不問曰異時吾死歛以時服柩中御名無置一物於是家人始爲公憂夏六月丙午忽大風飛瓦驟雨如注雷電晝晦於公正寢人皆駭懼而走及雨止辨色公已終矣聞者咸異焉葬開封府祥符縣樂安郷邊村之原楊中立以文弔之曰刼火洞然不燼唯玉搢紳徃徃傳誦以爲切當公在宋杜門屏迹不妄交遊人罕見其靣然田夫野老市井細民以謂若過南京不見劉待制如過泗州不見大聖及公􅃿耆老士庶婦人女子持薫劑誦佛經而哭公者日數千人至塡擁不得其門而入家人因設數大鑪於􅆹下争以香炷之香價踴貴後二年虜人驅墳户發棺見公顔貌如生咸驚曰必異人也問誰墳戸對以某官一無所動蓋棺而去言行録昔有與􅂫子瞻論元祐人才者至公則曰器之眞鐵漢不可及也言行録三之三尚書張忠定公公名詠字復之濮州鄄城人舉進士中第知鄂州崇陽縣歷通判轉運使入爲樞宻直學士同知銀臺通奏封駮司出知益州咸平初召還爲戸部使改御史中丞出知杭州徙永興軍五年再知益州還朝未幾出知昇州秩滿州民借留就轉工部尚書再任仍充昇宣十州宣撫使代還不能朝復求領郡命知陳州八年卒年七十公少倜儻有大志尚氣節重然諾爲學必本仁義不喜浮靡太平興國四年秋與忠愍冦公同赴大名舉議將首薦公公以同郡張覃素有文行即率冦公上書請以覃爲冠一府欽歎遂如公言士論多之韓魏公撰神道碑公令崇陽民以茶爲業公曰茶利厚官將搉之不􅀂早自異也命拔茶而植桑民以爲苦其後搉茶他縣皆失業而崇陽之桑皆巳成其爲絹而北者􅀊百萬匹其冨至今始令下唯通城一郷不變其後別自爲縣民亦貧至今也談叢公在崇陽甞坐城門下見里人有􅀒菜而歸者問何從得之曰買之市公怒曰汝居田里不自種而食何惰邪笞而遣之談叢公在銀臺時張永德爲并代帥小校犯法杖之而死有詔按罪公封還詔書曰永德方被邊􅀉􅀂責一小校遂摧辱之臣恐帥體輕而小人慢上矣不納旣而果有營卒脅刺其大校者上始寤公言面加慰勞神道碑淳化四年冬東西兩川旱民飢吏失救䘏冦大起五年正月賊首李順䧟成都府詔遣昭宣使王繼恩充招安使率兵討之復命公知成都府事五月繼恩破賊收成都上留公至秋始遣行時􅀜中率民􅀒粮以餉川師道路不絶公至府問城中所屯兵尚三萬人而無半月之食公訪知鹽價素髙而廪有餘積乃下其估聽民得以米易鹽於是民爭趨之未踰月得米數十萬斛軍中喜而呼曰前所給米皆雜糠土不可食今一一精好此翁眞善幹國事者公聞而喜曰吾令可行矣時益雖收復諸郡餘冦尚充斥繼恩恃功驕恣不復出兵日以娯燕爲事軍不戢徃徃剽奪民財公於是悉擒招安司素用事吏至廷面數其過將盡斬之吏皆股栗求活公曰汝帥聚兵玩冦不肯出皆汝軰爲之今能亟白乃帥分其兵尚可免死吏呼曰唯公所命兵不分願就戮公釋之繼恩即日分兵鄰州當還京師者悉遣之不數日減城中兵半旣而諸軍請食馬芻粟公命以錢給之繼恩詬曰馬不食錢給錢何也公聞召繼恩謂曰今賊餘黨所在尚多民不敢出招安使頓兵城中不即討芻粟民所輸今城外皆冦也何由得之繼恩懼即時出城討賊公計軍食有二歳備乃奏罷陜西運粮上喜曰向益州日以乏糧爲請詠至方踰月巳有二􅀊備此人何事不能了朕無慮矣公以順黨始皆良民一旦爲賊脅從復其間有疲弱偶挂盗籍者當示以恩信許其自新即揭牓諭之巳而首者相踵公皆釋其罪使歸田里一日繼恩械賊數十人請公行法公詢之悉皆前所自首者復縱之繼恩恚而問公公曰前日李順脅民爲賊今日僕化賊爲民不亦可乎公度繼恩日横不能改亟以狀聞願選忠實可􅀝者與繼恩共事上乃命入内内侍省押班衛紹欽充同招安使自是繼恩兇􅀔爲屈未幾二人者皆召歸就以劒門􅀜緫管上官正爲招安使順之餘黨公撫安于内正擒討于外再閱月而兩川平神道碑三年秋西川都廵檢使韓景祐爲所部廣武卒劉旰所逐率衆掠懷安軍破漢州公方與僚屬㑹大慈寺報至飲燕如故舉城憂之賊又掠卭蜀將趨益公適㑹客報者愈急公復不問其夕始召上官正謂曰賊始發不三四日破數郡勢方銳不可擊今人得所掠氣驕敢逼吾城乃送死耳請岀兵比至方井當遇賊破之必矣正即受教及行公爲出送于郊激其盡力正至方井果遇賊一戰斬旰首餘黨盡平衆益服公料敵制勝人所不及神道碑又記聞云張詠知益州有廵檢所領龍猛軍人潰爲群盗龍猛軍者本皆募群盗不可制者充之慓悍善闘連入數州俘掠而去蜀人大恐詠一日召鈐轄以州牌印付之鈐轄愕然請其故詠曰今盗􅀔如此而鈐轄晏然安坐無討賊心是必欲令詠自行也鈐轄冝攝州事詠將出討之鈐轄驚曰某今行矣詠曰何時曰即今詠頋左右張酒具於城西門之上曰鈐轄將出吾今餞之鈐轄不得巳勒兵出城與飲於樓上酒數行鈐轄曰某願有謁於公詠曰何也曰某所求兵粮願皆應副之詠曰諾老夫亦有謁鈐轄曰何也詠曰鈐轄今徃必滅賊􅀂無功而返必斷頭於此樓之下矣鈐轄震慄而去旣而與賊遇果敗士衆皆還走幾十里鈐轄召其將校告之曰觀此翁所爲眞斬我不爲異也遂復進力戰大破之賊遂平討劉旰兵廻有以賊首級求賞者公曰當奔突交戰之際豈暇􅀗其首邪此必戰後翦來知復是誰殿直叚倫曰學士果神明也當時隨倫爲先鋒入賊用命者皆中傷被體主帥令付營將理矣公命悉舁以來先録其功帶首級者次之於是軍情以公賞罸至當相顧歡躍語録公性剛毅寡欲唯著皂絁袍角帶不事外飾因責决一吏彼枝詞不伏公曰這的莫要劒喫彼云决不得喫劒則得公牽出斬之以徇軍吏愕眙相顧自是俱服公之威信令出必行語録初知益州斬一猾吏前後郡守所􅀝任者吏稱無罪公封判令至市曹讀示之旣聞斷辭告市人曰爾輩得好知府矣蓋李順嘗有死罪繫獄此吏故縱之也見語録時有僧行止不明有司執之以白公公判其牒曰勘殺人賊旣而案問果一民也與僧同行於道中殺僧取其祠部戒牒三衣因自披剃爲僧寮屬問公何以知之公曰吾見其額上猶有繫巾痕也記聞主帥帳下寵卒恃􅀔嚇民􅁀取財物民有訴者其人縋城夜遯公差衙校往捕之戒曰爾於擒得處則渾衣撲入井中作逃走投井申來是時群黨忷忷知其巳投井故無它議又免與主帥有不恊名語録時民間訛言云有白頭老翁午後食人男女郡縣譊譊至暮路無行人公召犀浦知縣謂曰近訛言惑衆汝歸縣去訪市肆中歸明人尚爲郷里患者必大言其事但立證解來明日果得之送上州公遂戮于市即日帖然夜市如故公曰妖訛之興沴氣乗之妖則有形訛則有聲止訛之術在乎識斷不在乎厭勝語録李順黨中有殺耕牛避罪亡逃者公許其首身拘母十日不出釋之復拘其妻一宿而來公斷云禁母十夜留妻一宵􅀝門之望何踈結髮之情何厚舊爲惡黨今又逃亡許令首身猶尚顧望就市斬之於是首身者繼至並遣歸業民悉安居語録乖崖守蜀兵火之餘人懷反側一日合軍旅大閱始出衆遂嵩呼者三乖崖亦下馬東北望而三呼復攬轡行衆不敢讙或以此事告韓魏公公曰當是時􅄾亦不敢措置麈史李順王均亂蜀張公鎮成都一日見一卒抱小兒在廊下戯小兒忽怒批其父張公見之集衆語曰此方悖逆乃自習俗㓜巳如此况其長成豈不爲亂遂令殺之數日間又一卒相歐公問知其一乃上名遂斬次卒自是一軍肅然巵史公前後治益愛利之政不可悉紀舉其大者則公嘗以蜀地素狹㳺手者衆事寧之後生齒日繁稍遇水旱則民必艱食時米㪷直錢三十六乃按諸邑田稅如其價􅀊折米六萬斛至春籍城中細民計口給劵俾輸元估糴之奏爲永制逮今七十餘年雖時有災饉米甚貴而益民無餒色者公之賜也蜀風尚侈好遨樂公從其俗凡一􅀊之内㳺觀之所與夫飲饌之品皆著爲常法後人謹而從之則治違之則人情不安輒以累罷去神道碑又語録云依當時米價三百六十文科折米一斗與此不同公凢有興作先帖諸縣於民籍中係工匠者具帳申來分爲四畨役十日滿則罷去夏則夘入午歇一時冬抵莫放各給木札一幞以禦寒工徒皆恱有一瓦匠因雨乞假公判云天晴蓋瓦雨下和􅅺事雖至微公俱知悉巵史公採訪民間事無逺近悉得其實蓋不以耳目專委於人公曰彼有好惡亂我聦明但各於其黨詢之再詢則事無不審矣李畋問其旨公曰詢君子得君子詢小人得小人各就其黨詢之雖事有隱匿者亦十得八九矣語録公寢室中張燈炷香通夕宴坐郡樓上鼔番漏水歷歷分明儻一刻差誤必詰之守籖者指名伏辜謂公爲神明公曰鼔角爲中軍號令號令在前尚不分明其餘外事將如何也語録公有清鑒善臧否人物凢所薦辟皆方廉恬退之士甞曰彼好奔競者將自得之何假吾舉神道碑又語録云轉運黄虞部好舉時才之士公勸曰大凡舉乆須舉好退者好退者廉謹知耻􅀂舉之則志節愈堅少有敗事莫舉奔競者奔競者能曲事謟媚求人知巳􅀂舉之必能矜才好利累及舉官故不少矣其人旣解奔競又何須舉他益不貢士者幾二十年學校頽替公察郡人張及李畋張逵者皆有學行爲郷里所服遂延􅅄加禮敦勉就舉後三人悉登科歷美官於是兩川學者知勸文風日振神道碑又湘山野録云初蜀人雖知向學而不樂仕宦公察其有聞於郷者得張及李畋張逵暇日召與語徃徃延入卧内從容欵曲故公於民情無不察亦三人佐之也又語録曰公問李畋曰子同人中有善講習者否畋以同門生劉式對公遂辟充州學主諸生受業者五十餘人毎休務日就學置酒以勸勞之自爾蜀人不以千里爲逺來學者甚衆忠定公每斷事有情輕法重情重法輕者必爲判語讀以示之蜀人鏤版謂之戒民集大抵以敦風俗篤孝義爲夲也湘山野録忠定公爲御史中丞一日於行香所宰相張齊賢呼叅知政事温仲舒爲郷弟及它語鄙甚公以非所冝言失大臣體遂彈奏之齊賢深以爲恨後於上前短公曰張詠夲無文凡有申奏皆婚家王禹偁代爲之禹偁前在翰林作齊賢罷相麻詞其辭醜詆故齊賢兩欲中傷之公聞自辨上曰卿平生著述幾多可進來公遂以所著進上閱於龍圖閣未竟賜坐上曰今日暑甚頋黃門於御几取常所執紅銷金龍扇賜公且稱文善公起再拜乃納扇於几上曰便以賜卿美今日獻文事澠水燕談公文章雄健有氣骨稱其爲人甞爲聲賦梁公周翰覽而歎曰二百年來不見此作矣神道碑公知杭州事時􅀊飢民冒禁販鹽捕獲者數百人公悉寛其罰官屬執言不可公曰錢塘十萬家餓殍如此􅀂鹽禁益嚴則聚而爲盗患益甚矣俟秋成敢爾當痛以法繩之境内卒以無擾神道碑公在杭有冨民病將死子方三􅀊乃命其婿主其貲而與婿遺書曰他日欲分財即以十之三與子而以七與婿子時長立果以財爲訟婿持其遺書詣府請如元約公閱之以酒酹地曰汝之婦翁智人也時以子㓜故以此屬汝不然子死汝手矣乃命以其財三與婿而子與其七皆泣謝而去服公明斷神道碑初公之自蜀還也詔以諫議大夫牛冕代公公聞之曰冕非撫御才其能綏輯乎始踰年果致神衛大校王均之亂逐冕據益州後雖討平之而民尚未寧㑹益守馬公知節徙延安上以公前治蜀長於安集威惠在人復以公爲樞宻直學士遷刑部侍郎知益州事蜀民聞之皆鼓舞相慶如赤子乆失父母而知復來鞠我也公知民信巳易嚴以寛凡一令之下人情無不慰愜蜀部復大治轉運使黄觀以政迹聞賜詔加􅅄就改吏部侍郎命謝濤廵撫于蜀上遣濤諭公曰得卿在蜀朕不復有西顧之憂因詔公與濤議鑄景德大鐵錢于嘉卭州一當小鐵錢十銅錢一于今便之神道碑公問李畋曰百姓果信我否對曰侍郎威惠及民民皆信服公曰前一任則未也此一任應稍稍爾秀才只此一箇信五年方得成語録時金陵多火災居者不安公廉知皆奸民所爲潜捕得之乃命先折其脛斬之以徇火患遂絶神道碑有范延貴者爲殿直押兵過金陵張忠定公爲守因問曰天使㳂路來還曽見好官貟否延貴曰昨過􅀽州萍郷縣邑宰張希顔者雖不識之知其好官貟也公曰何以言之延貴曰自入縣境驛傳橋道皆完葺田萊墾闢野無惰農及至邑則􅝬肆無賭博市易不敢諠爭夜宿邸中聞更鼔分明以是知其必善政也公大􅀏曰希顔固善矣天使亦好官貟也即日同薦於朝希顔後爲發運使延貴亦爲閤門祗􅃸皆號能吏也東軒筆録忠定公自金陵入苦腦疽未陛見御史閤門累奏上寛其告俾養疾公恨不得面陳所懷乃抗論近年虚國家帑藏竭生民膏血以奉無用之土木者皆賊臣丁謂王欽􅀂啓上侈心之所爲也不誅死無以謝天下章三上不報出知陳州眞宗甞稱其材任將帥以疾不盡其用深嘆惜之渑水燕談又記聞所載與此大同但云乞斬丁謂頭置於國門以謝天下然後斬詠頭置於丁氏之門以謝丁謂上亦不罪焉又談叢云公疾旣愈上使中人徃問將召之也丁謂以白金千兩賂使者還言如故乃不召公在陳一日方食邸報至公且食且讀旣而抵案慟哭乆之哭止復彈指乆之彈止罵詈乆之乃丁􅀳公逐萊公也公自知禍必及已乃延三大户於便坐與之博袖間出彩骰子勝其一坐乃買田宅爲歸計以自汙􅀳公聞之亦不害也余謂此智者爲之賢者不爲也賢者有義而巳寧避禍哉禍豈可避耶談叢公早學劒遂精其術兩河間人無敵者生平勇於爲義遇人艱急苟情有可哀必極力以濟無所頋惜神道碑又蒙求曰張詠少學擊劒樂爲竒節有士人逰宦逺郡爲僕夫持其不法事恐之且欲其女爲妻即止嵗乆益恣横不能制詠寓於傳舎知其事即陽假此僕爲馭單􅀐出城至林麓中斬之而還相傳此事是舉進士時史不言公之當官凡所施設動有逺識始時人或不能測其後卒有大利民感無窮至自奉養逮于服玩之具則寡薄儉陋雖寒士不􅀂也公退闢静室焚香燕坐聚書萬卷徃徃手自校正旁無聲色之好神道碑又語録云公寢室中無侍婢服玩之物閴如也李畋甞侍坐廡下因謂公寢禪室不如公哂曰吾不爲輕肥爲官以至此吾徃年及第後以詩􅀉傅霖逸人云前年失脚下漁磯苦戀明時未得歸􅀉語巢由莫相􅀏此心不是愛輕肥豈今日之言也東軒筆録云王均李順之亂凡官於蜀者多不挈家以行張公知益州單􅀐赴任官属憚其嚴峻莫敢蓄婢使者公不欲絶人情遂自買一婢以侍巾􅌨自此官属稍稍置姬侍矣公在蜀四年􅀍召還闕呼婢父母出貲以嫁之仍處女也公在蜀一日有術士上謁自言能煆汞爲白金公即市汞百兩俾煆一火而成不耗銖兩公立命工煆爲一大香爐鑿其腹曰充大慈寺殿上公用送寺中以酒榼遺術者而謝絶之公天賦正直濟以剛果始終挺然無所屈撓自力學筮仕則有澤及天下之心而以冨貴爲薄逸人傅霖髙蹈之士與公素善公甞與夜㑹劇談時諸鄰多病瘧者一夕頓愈甞訪三峯陳先生摶一見公厚遇之顧謂弟子曰此人於名利澹然無情逹必爲公卿不逹則爲帝王師其爲髙人推重如此神道碑又語録云公少時謁華山陳圖南遂欲隱居圖南曰公方有官職未可議此其􅀔如失火家待君救火豈可不赴也初蜀新亂張尚書至公宇襲舊制周列更鋪凡數百所公即日命罷之人心大安及代去留一卷實封文字與僧正希白且云􅃸十年觀此後十年公薨于陳州訃至蜀人罷市號慟希白爲公設大㑹齋請知府凌䇿諫議發開所留文字乃公􅀞像衣兎褐繫絛草裹自爲賛曰乖則違俗崖不利物乖崖之名聊以表德因號乖崖公遂􅀞于天慶觀仙遊閣又九曜院皆􅀞公像府衙之東南隅又有祠堂皆後人思公而爲之也公曰事君者廉不言貧勤不言苦忠不言已效公不言已能斯可以事君矣語録公謂李畋曰大小之事皆湏用智智猶水也不流則腐􅀂凡百不用智臨大事之際寧有智來語録公曰爲政之道府吏曰治未也庶民曰治未也僧道曰治未也未􅀂識見無私學古之士曰治斯治矣語録公曰臨事有三難能見一也見而能行二也當行必果决三也語録公謂李畋曰子還知公事有隂陽否對曰未也曰凡百公事未著字前則屬陽陽主生也通變由之著字後屬隂隂主刑也刑貴正名名不可改語録公謂李畋曰子異日爲政信及於民然後教之言及於義然後勸之動而有禮然後化之静而無私然後民安而樂業矣行斯四者在乎先率其身不然則民退必有後言矣又曰子見舊政之􅁦其大者卒不須革觀釁而動乗而革之雖痛繩以法亦怨不生也語録李畋苦痁旣瘳請謁公曰子於病中曾得移心法否對曰未也公曰人能於病中移其心如對君父畏之敬之静乆自愈語録王陶云臨川晏詹甞爲余言張公自蜀還對眞宗言蜀中兵亂朝廷處置緩急有失幾冝者因言如王旦乃太平宰相爾眞宗黙然它日御便殿召公對謂公曰王旦眞太平宰相也仰視殿霤無它言公遂退夫一語不合大功盡棄人之爲言固難矣哉蘇軾書公帖後云以寛得愛愛止於一時以嚴得畏畏止於力之所及故寛而見畏嚴而見愛皆聖賢之難事而所及者逺矣張忠定公治蜀用法之嚴似諸葛孔明諸葛孔明與公遺愛皆至今蓋尸而祝之社而稷之也
