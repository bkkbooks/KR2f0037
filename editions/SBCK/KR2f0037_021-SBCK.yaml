body:
  text: 樞宻胡文恭公公名􅀫字武平常州􅀳陵人中進士第爲眞州楊子尉召試爲舘閣校理通判宣州知湖州爲兩浙轉運使召還修起㞐注知制誥遷翰林學士嘉祐六年拜左諌議大夫樞宻副使英宗即位出知杭州神宗初以疾告除太子少師致仕命未至而卒年七十二通判宣州有􅀍誣以殺人者獄成議法將抵死公疑之呼囚以訊囚憚箠楚不敢言公正衣冠坐堂上思之俄而假寐夢有人來告曰吴姓也公遽引囚辟左右復訊之囚曰旦將之田縣吏執以赴官不知其由也公取獄辭窮治乃􅀍歐之婦與吴姓姦姦者殺其夫與婦謀執平人以告也公之精誠格物盖如此胡宗愈撰行狀知湖州前守滕公大興學校費民錢數千萬安定先生胡公瑗始教授於其間未訖滕公罷去羣小斐然謗議以爲􅅬公用錢有不明者自通判以下不肯書其簿公於坐折之曰君佐滕侯幾時矣假滕侯之謀有不臧奚不早告隂拱以觀俟其去廼非之豈古人分謗之意哉一坐大漸爲公書公廼闢齋㕔於學之東増舎益弟子貟安定先生之敎得盛於東南東南之士知本經術行義以爲學者公之力爲最多行狀未幾丁母憂毀瘠終制逾三年不㞐於内時人比之孟獻子行狀入内都知楊懷敏坐衛士夜盗入禁中驚乗輿斥出爲和州都監懷敏用事乆勢動中外未幾召復故職公知制誥封還辭頭不草制論曰衛士之變蹤跡連懷敏得不窮治誅死幸矣豈冝復在左右其命遂止歐陽公撰墓誌公爲人清儉謹黙内剛外和羣㞐􅀏語讙譁獨正顔色温温不動聲氣與人言必思而後對故其涖官臨事御名重不輙發發亦不可囬止而其趣要歸於仁厚墓誌朝議在官年七十而不致仕者有司以時桉籍舉行公以謂飬廉恥厚風俗冝有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其事使人得自言而全其美節朝廷嘉其言是至今行之墓誌又行狀云公謂廉恥之責當先士人功舊之甄冝厚武士邊防偏禆京師將校年七十者衆其間曽經行陳立功伐一旦下令悉令告老沮立功之心解守邊之體非所以爲國飬恩也時包公拯親建此議屢以詞氣折公公論不可奪朝廷卒從公議皇祐新樂成議者多異論有詔新樂用於常祀朝㑹而郊廟仍用舊樂公言書稱同律而今舊樂髙新樂下相去一律難並用而新樂未施於郊廟先用之朝㑹非先王薦上帝配祖考之意皆不可近制禮部四􅀊一貢士議者患之請更爲間􅀊議已定公獨以爲不然曰使士子廢業而奔走無寜􅀊不如復用三􅀊之制也衆皆以公言爲非行之數年士子果以爲不便而卒用三􅀊之制墓誌公學問該􅀶兼通隂陽五行天人災異之說南京鴻慶宫災公以謂南京聖宋所以受命建號而大火主於啇丘國家乗德而王者也今不領於祠官而比年數災宐修火祀事下大常􅀊以長吏奉祠啇丘自公始慶暦六年夏河北河東京東同時地震而登萊尤甚公以􅀊推之曰明年丁亥􅀊之刑德皆在北宫隂生於午而極於亥然隂猶彊而未即伏陽猶㣲而未即勝此所以震也是謂龍戰之㑹而其位在乾今西北二虜中國之隂也宐爲之備不然必有内盗起於河朔明年王則以貝州叛公又以爲登萊視京師爲東北易艮少陽之位也今二州並置金坑多聚民以鑿山谷陽氣損泄故隂勝而動縣官入金􅀊幾何小利而大害可即禁止以寜地道皇祐五年正月㑹靈宫災是􅀊冬至祀天南郊以三聖並配明年大旱公曰五行火禮也去􅀊火而今又旱其應在禮此殆郊丘並配之失也即建言並配非古宐用迭配如初詔其後并州議建軍爲節鎭公以星土考之曰昔髙辛氏之二子不相能也尭遷閼伯於啇丘主火而啇爲宋星遷實沉於臺駘主水而參爲􅀳星國家受命始於啇丘王以火德又京師當宋之分野而并爲􅀳地參啇仇讎之星今欲崇􅀳非國之利也自宋興平僣僞并最後服太宗削之不使列於方鎭八十年矣謂宐如舊制墓誌詳議官闕判院者當擇人薦於上公與同列得二人此二人才智明法無上下一人者監稅河北以水災虧課同列議曰虧課小失不足白上以累才公不可至上前悉白之且曰此人小累才足惜仁宗曰果得才小累何恤遂除詳議官同列退誚公曰詳議欲得人公固欲白上縁是不得奈何公曰彼得與不得一詳議官耳是固亦有命也􅀫以誠事主今白首矣不忍絲髮欺君以䘮平生之節爲之開陳聽主上自擇耳同列驚曰某從公乆乃不知公所存如此行狀涇卒以折攴不給出惡言欲爲亂其後斬二人黥四人亂意乃息委公置獄治三司吏不時計度三司使護吏不肯遣公曰涇卒悖慢誠其罪然折攴軍情所繫積八十五日而不與則三司豈得無罪耶陛下以包拯近臣不令置對可謂曲法申恩而拯猶不自省公拒制命臣􅂲主威不行而綱紀益廢矣拯懼立遣吏就獄行狀上命公爲靑詞禱諸陵山川以求儲嗣公上䟽仁宗謂漢文帝二年有司請豫建太子是時文帝已有元子猶對有司稱楚王呉王淮南王皆秉德以陪朕何爲不豫哉太祖皇帝感昭憲太后遺言捨魏王而立太宗其神武英斷自開闢以來未之有也陛下必待聖嫡然後擬議非㞐安思危之道願察宗室之賢者立之則儲位定而人心安矣仁宗感悟遂罷祈禱行狀公在翰林十年多所􅀘益大抵不爲苟止而妄隨故其言或用或不用而後卒如其言然天子察公之忠欲大用者乆矣嘉祐六年八月拜公諌議大夫樞宻副使公旣御名静而當大任􅀹顧惜大體而羣臣方建利害多更張庶事以革弊公獨猒之曰變法古人所難不務守祖宗成法而徒紛紛無益於治也又以謂契丹與中國通好六十餘年自古未有也善待夷狄者謹爲備而已今三邊武備多弛牧馬著虚名於籍可乗而戰者百無一二又謂滄州宐分爲一路以禦虜此今急務也􅀂其界上交侵小故乃城寨主吏之職朝廷宐守祖宗之約不宐爭小利而隳大信深戒邊臣生事以爲功在位六年其議論􅀋皆如此墓誌公在樞府夏人入貢至都門伴送者以不去蒲撾不與入夏人以舊例不肯去紛争不已公訪知其實見富丞相曰蒲撾舊例彼不敢去而以死爭正慮得罪於本國耳今彊去之徒使其曲在我非綏懷之意也即與富丞相入奏許之延州遣指使楊定押伴西人入貢因獻取横山之䇿朝廷議以定爲宣事舎人委定經制西事公力爭曰定貪狡多詐爲國生患不宐驟加進用其命遂寢其後復以定領前職知保安軍定果與西人通謀多受寳貨西人責其背約誘至境上而殺之行狀公􅀹重章郇公之爲人謂郇公爲宰相五六年及死之後天下不見其黨與偏私之迹云行狀公少甞善一浮圖其人將死謂公曰我有祕術能化瓦石爲黄金子其葬我我以此報子公曰爾之後事吾敢不勉祕術非吾欲也浮圖歎曰子之志未可量也其篤行自勵至於貴顯常如布衣時墓誌客有造胡文恭公者具公服鞾板而忘記不易㡌胡公與之對語盡禮而退終未甞色動吕氏家塾記胡文恭公平生守道不以進退爲意在文館二十餘年每語後進曰富貴貧賤莫不有命士人當脩身俟時無爲造物者所􅅓世以爲名言澠水燕談三之五樞宻曹武穆公公名瑋字寳臣武惠王之子以父任􅀘西頭供奉官閤門祗候知渭州眞宗即位遷西上閤門副使徙鎮戎軍爲環慶鈐轄兼知邠州徙眞定鈐轄復爲涇原鈐轄兼知渭州移知秦州兼縁邊安撫使天禧中爲鄜延路副都緫管拜宣徽北院使簽書樞宻院事除南院使環慶路都緫管安撫使乾興初謫左衛大將軍知萊州復華州觀察使知青州徙天雄永興軍拜昭武軍節度使知眞定府定州都緫管天聖八年薨年五十八嘉祐中詔配享眞宗廟庭公知鎮戎軍時繼遷虐使其衆人多怨者公即移書言朝廷恩信撫納之厚以動之羗人得書徃徃感泣於是康如諸族皆内附咸平六年繼遷死其子德明求保塞公上書言繼遷擅中國要害地終身旅拒使謀臣狼顧而西憂方其國危子弱不即捕㓕後更盛強無以息民當是時朝廷欲以恩致德明寢其書不用而河西大族延家妙娥等遂拔其部人來歸諸將猶豫未知所以應公曰德明野心去就尚疑今不急折其羽翮而長養成就之其飛必矣即自將􅀐士入天都山取之内徙德明由此遂弱而至死不敢窺邊王荆公撰行狀曹南院知鎮戎軍日嘗出戰小捷虜兵引去瑋偵虜兵去已逺乃驅所掠牛羊輜重緩驅而還頗失部伍其下憂之言於瑋曰牛羊無用徒縻軍不􅀂棄之整衆而歸瑋不荅使人候虜兵去數十里聞瑋利牛羊而師不整遽還襲之瑋愈緩行得地利處乃止以待之虜軍將至近使人請之曰蕃軍逺來必甚疲我不欲乗人之怠請休憩士馬少選决戰虜方苦疲甚皆欣然嚴軍歇良乆瑋又使人諭之歇定可相馳矣於是各皷軍而進一戰大破虜師遂棄牛羊而還徐謂其下曰吾知虜巳疲故爲貪利以誘之比其復來幾行百里矣􅀂乗銳便戰猶有勝􅀒逺行之人􅀂小憇則足痺不能立人氣亦闌吾以此取之筆談知渭州公乃圖涇原環慶兩路山川城郭戰守之要以獻眞宗留其一樞宻院而以其一付夲路使諸將出兵皆按圖議事行狀秦西南羗唃厮囉宗哥立遵始大遵獻方物求稱賛普公上書言夷狄無厭一足其求必輕中國大臣方疑其事㑹得公書遂不許而猶以爲保順軍節度使公曰我狃遵矣又將爲冦吾治兵以俟爾遵使其舅賞様丹招熟戸郭厮敦爲郷導公即誘様丹捕厮敦而許以一州様丹終殺厮敦公遂奏以爲潁州刺史而様丹亦舉南市城以獻先是張􅁻知秦州生事熟戸多去爲遵耳目及公誅様丹即皆惶恐避逃公許之入贖自首還故地而至者數千人後遂帖服皆爲用至明年囉遵果悉衆號十萬冦三都公帥三將破之追比至沙州所俘斬以萬計事聞除客省使康州防禦使其後又破㓕馬波叱臘􅀑留等諸羗囉遵遂以窮􅀌逃入磧中而公斥境隴上置弓門威逺凢十寨自是秦人無事矣行狀曹侍中將薨太宗親臨視之問以後事對曰臣無事可言固問之對曰臣二子璨與瑋材器有取臣􅀂内舉皆堪爲將上問其優劣對曰璨不如瑋巳而果然瑋知秦州嘗出廵城以城上遮箭版大髙召主者令下之主者對曰舊如此乆矣瑋怒曰舊固不可改邪命牽出斬之僚佐以主者老將諳兵事罪小冝可赦皆諫瑋瑋不聽卒誅之軍中懾伏西蕃犯塞􅃸􅀐報虜將至瑋方飲㗖自􅀂頃之報虜去城數里乃起貫戴以帛􅆞身令數人引之身停不動上馬出城望見虜陣有僧奔馬徃來於陣前檢校瑋問左右曰彼布陣乃用僧邪對曰不然此虜之貴人也瑋問軍中誰善射者衆言李超瑋即呼超指示之曰汝能取彼否對曰慿太保威靈願得十五􅀐裹送至虜陣前可以取之瑋以百􅀐與之勑曰不􅀗而返當死遂進至虜陣前􅀐左右開超射之一發而斃於是虜鳴笳嘯而遁瑋以大軍乗之虜衆大敗出塞窮追俘斬萬計改邊鑿壕西蕃由是慴服至今不敢犯塞每言及瑋則加手於頂呼之爲父云瑋在秦州有士卒十餘人叛赴虜中軍吏來告瑋方與客奕棋不應軍吏亟言之瑋怒叱之曰吾固遣之去汝再三顯言邪虜聞之亟歸告其將盡殺之記聞曹太尉瑋知秦州立遵内冦是時公方灼炙才數壯猝起應敵指揮號令及事定乆之瘡愈瘢大數寸蓋用力氣使然也曹公在邊蕃部有過惡者皆平定之每以餞將官爲名出郊而兵馬次序以食品爲節􅀂曰下某食即某隊發比至水飯則捷報至矣大帥料敵當如此東齋記事曹瑋之守秦州也州之西止於文􅄹􅀜􅀜之所在最爲要害􅀜之左右皆蕃族也瑋以恩信結之咸爲之用故秦州每􅀊出兵以守文盈而巳所守旣寡則州兵雖少而足用粮草可以自給自後帥臣守其舊規不敢増改龍川志公爲將幾四十年用兵未嘗敗衂􅀹有功於西方舊羗殺中國人得以羊馬贖死如羗法公以謂如此非所以尊中國而愛吾人奏請不許其贖又請􅀘内附羗百族以上爲軍主假以勲階爵秩如王官至今皆爲成法陜西􅀊取邊人爲弓箭手而無所給公以塞上廢地募人爲之􅀂干畒出一卒􅀂干畒出一馬至其種歛爲發州兵戍守至今邊賴以實所募皆爲精兵瑋募弓箭手使馳射校強弱勝者予田二頃再更秋課市一焉馬必勝甲然後官籍之則加田五十畒至三百人以上團爲一指揮擇要害處爲築堡使自塹其地爲方田環之立馬社一馬死衆爲出錢市馬開邊濠率令深廣丈五尺山險不可塹者因其峭絶治之使足以限虜後皆爲法在渭州取隴外籠干川築城置兵以守曰後當有用此者及李元昊叛兵數出卒以籠干爲德順軍而自隴以西公所措置人悉以爲便也自三都之戰威震西海唃厮囉聞公姓名即以手加顙在天雄契丹使過魏地輙隂勒其從人無得髙語疾驅至多憚公不敢仰視契丹旣請盟眞宗於兵事尤所重即有邊奏手詔詰難至十餘反而公每守一議終無以奪眞宗後愈聽信有論邊事者徃徃宻以付公可否行狀公在西府丁謂用事稍除不附巳者旣貶冦萊公指公爲黨出公環慶又降知萊州公自知宿將爲謂所忌恐益爲竒中即日上道從弱卒十餘人不以弓韔矢箙自隨行狀天雄卒有犯法衆謂獄具必殺之公乃處以常法或以爲疑公􅀏曰臨邊對敵斬不用命者所以令吾衆非喜殺也平時治内郡安事此乎􅀄守邊時山東知名士賈同造公客外舎公欲按邊即同舎邀與俱同問從兵安在曰巳具旣出就􅀐見甲士三千列立人音不徹舎同歸語人曰瑋果名將也公爲將不如其父寛然自爲一家云公好讀書所如必載書數兩兼通春秋公羊榖梁左氏傳而尤熟於左氏行狀寳元中王忠穆公爲樞宻使河西首領趙元昊叛上問邊備輔臣皆不能對明日樞宻四人皆罷忠穆謫􅉑州翰林學士蘇公儀與忠穆善出城見之忠穆謂公儀曰􅎦之此行前十年已有人言之公儀曰必術士也忠穆曰非也昔時爲三司塩鐵副使䟽决獄囚至河北是時曹南院自陜西謫官初起爲定帥􅎦至定治事畢瑋謂􅎦曰决事巳畢自此當還明日願少留一日欲有所言􅎦旣愛其雄材又聞欲有所言遂爲之留明日具饌甚簡儉食罷屏左右曰公滿靣權骨不爲樞輔即邊帥或謂公當作相則不然也然不十年必揔樞柄此時西方當有警公冝預講邊備蒐閱人材不然無以應卒􅎦曰四境之事惟公知之何以見教曹曰瑋在陜西日河西趙德明嘗使人以馬博易于中國怒其息微欲殺之莫可諫止德明有一子方年十餘􅀊極諫不巳曰以戰馬資鄰國巳是失計今更以貨殺邊人則誰肯爲我用者瑋聞其言私念之曰此子欲用其人矣是必有異志聞其甞徃來㸦市中瑋欲一識之屢使人誘致之不可得乃使善􅀞者圖其貌旣至觀五朝名臣言行録卷第三之五
