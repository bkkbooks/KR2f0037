body:
  text: 九之四御史中丞李㳟惠公公名及字㓜幾其先范陽人後徙鄭州中進士第再調昇州觀察推官知興化軍通判曹州擢知隴州初置提􅀧刑獄以公使陜西特遷一官除三司户部副使爲淮南轉運使知秦杭鄆州應天河南府召拜御史中丞卒曹瑋乆在秦州累章求代眞宗問王旦誰可代瑋者旦薦樞宻直學士李及上即以及知秦州衆議皆謂及雖謹厚有行檢非守邊之才不足以繼瑋楊億以衆言告旦旦不荅及至秦州將吏心亦輕之㑹有屯駐禁軍白晝掣婦人銀􅁫於市中吏執以聞及方坐觀書召之使前略加詰問其人服罪及不復下吏亟命斬之復觀書如故將吏皆驚服不日聲譽逹於京師億聞之復見旦具道其事且曰向者相公初用及外廷之議皆恐及不勝其任今及材器乃如此信乎相公知人之明也旦􅀏曰外廷之議何其易得也夫以禁軍戍邊白晝爲盗於市主將斬之事之常也烏足以爲異政乎旦之用及者其意非爲此也夫以曹瑋知秦州七年羌人讋服邊境之事瑋處之巳盡其冝矣使他人徃必矜其聦明多所變置敗壞瑋之成績旦所以用及者但以及重厚必能謹守瑋之規摹而巳矣億由是益服旦之識度記聞章獻太后臨朝内侍省都知江德元權傾天下其弟德明奉使過杭州時李及知杭州待之一如常時中人奉使者無所加益僚佐皆曰江使者之兄㞐中用事當今無比榮枯大臣如反掌耳而使者精銳復不在人下明公待之禮無加者意者明公雖不求福獨不畏其爲禍乎及曰及待江使者不敢慢亦不敢過如是足矣又何加焉旣而德明謂及寮佐曰李公髙年何不求一小郡以自處而乆㞐餘杭繁劇之地豈能辨耶僚佐走告及曰果然使者之言甚可懼也及􅀏曰及老矣誠得小郡以自逸庸何傷待之如前一無所加旣而德明亦不能傷也時人服其操守記聞李公於杭州每訪林先生逋於􅀌山望林麓而屏導從歩入先生之廬一日冒雪岀郊衆皆謂當置酒召客乃獨造逋清談至暮而返逋死公以䘮服哭送拜墓乃歸吴兒自是恥其風俗之薄也晁以道集蔡君謨甞書小吴牋云李及知杭州市白集一部乃爲終身之恨此君殊清節可爲丗戒張乖崖鎮蜀當遨時士女環左右終三年未甞囬顧此君殊重厚可以爲薄末之檢押此帖今在張乖崖之孫堯夫家予以謂買書而爲終身之恨近於過激苟其性如此亦可尚也筆談
