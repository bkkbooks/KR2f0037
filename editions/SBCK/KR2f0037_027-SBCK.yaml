  text: 三朝名臣言行後録卷第五之一
  hash: sha256:205481193c0f862ef1f6d1aca4cfd4d7a9327c2c8e4f86306f821e67554f506b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_027-1a}
body:
  text: 叅政唐質肅公公名介字子方荆南人舉進士歴官州縣召爲􅁥察御史裏行遷殿中侍御史裏行以言事貶英州别駕數月徙􅁥郴州稅通判潭州復召爲殿中侍御史除直集賢院權開封府推官出知楊州歴轉運發運使三司度支副使除天章閣待制知諌院出知洪州英宗召爲御史中丞出知太原府神宗即位遷權三司使遂叅知政事薨年六十公爲岳州沅江令州民李氏以髙貲爲上下所漁擾或者不厭因告其祠鬼用人守喜擊斷則逮繋其家百口極獄之慘情不得奏専以屬公公攷閱實非殺人者守又奏以爲未盡詔遣御史方偕移劾澧州卒用公所具獄不能變州吏皆坐罪去偕以活死者得官公終不自言也劉忠肅公撰神道碑知莫州任丘縣縣當國信驛頓徃返誅索繁急其下因縁爲姦利異時俛首趣事莫敢何辨公爲作區畫預居其物毎使至親坐驛門給之一以法令從事應復還而毀失者移文取其償故過者皆戢上下便之塘水􅀊浸邑田十一村而塘實中人主之州縣畏其執不敢拒公募民自髙陽起堤亘十餘里蔽之其患遂息神道碑通判徳州轉運使崔嶧以庫帛配民而過估之公即移書安撫司曰河北仍年􅀍水菑民困不聊轉運使不爲之卹然則爲上存民者不在安撫司乎嶧聞怒按其留牒不即下公終不從嶧亦不能果行王禹玉撰墓誌爲殿中侍御史裏行内侍督作龍鳯車于啓聖院公言此太宗神御所在爲後宫輿服故喧瀆其中又飾金玉過制皆非是詔罷之神道碑張堯佐者以進士擢第累官至屯田貟外郎知開州㑹其姪女有寵於仁宗爲脩媛堯佐遂驟遷一日中除宣徽節度景靈群牧四使御史唐介上䟽引楊國忠爲戒不報又與諌官包拯吴奎等七人論列殿上又白御史中丞留百官班欲以庭争卒奪堯佐宣徽景靈兩使特加介六品服以旌敢言未幾堯佐復除宣徽使知河陽唐謂同列曰是欲與宣徽而假河陽爲名耳我曹豈可中巳耶同列依違不前唐遂獨争之不能奪仁宗諭曰除擬􅀄出中書介遂極言宰相文彦􅀶知益州日以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦􅀶而相富弼又言諌官吴奎觀望挾姦語甚切直仁宗怒却其奏不視且言將貶竄介徐讀畢曰臣忠義憤激雖鼎鑊不避也上急召二府以䟽示之曰介言它事乃可至謂彦􅀶因貴妃得執政何言也介面質彦􅀶曰彦􅀶冝自省即有之不可隱彦􅀶拜謝不巳樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲衆􅂲禍出不測是時蔡襄脩起居注立殿陛即進曰介誠狂直然納諌容言人主之美徳必望全貸遂召當制舎人就殿廬草制貶春州别駕翊日御史中丞王舉正救解之上亦中悔改爲英州别駕復取其奏以入又明日罷彦􅀶黜吴奎而遣中使護送介至貶所且戒以必全之無令道死名臣傳及碑誌又晁以道云仁宗貶唐介嶺南將行遣中使賜介金又畫其像置之便殿又聞見録曰仁宗一日幸張貴妃閣見定州紅甆器帝怪問曰安得此物妃以王拱辰所獻爲對帝怒曰甞戒汝勿通臣僚饋遺不聽何也因以所持柱斧碎之妃愧謝乆之乃巳妃又甞侍上元宴於端門服所謂燈籠錦者上亦怪問妃曰文彦􅀶以陛下眷妾故有此獻上終不樂或云燈籠錦者潞公夫人遺張貴妃公不知也公怡然南去絶口不爲人道當此之時天下士大夫識與不識聞風歎慕聳然有立志徃徃作爲文章以頌詠其美自是言事官以畏嘿爲恥而大臣亦知所鑒戒云神道碑潭州一巨賈私藏蚌胎爲􅀜吏所搜太守而下輕其估悉自售焉唐質肅公時以言事謫潭倅分珠獄發奏方入仁宗謂近侍曰唐介必不肯買案具奏覆覧之果然湘山野録改殿中侍御史知復州未至召充言事御史特遣内侍齎告勑就賜令乗驛赴朝公至不以一語自明帝曰知卿被謫以來未甞以私書至京師可謂不易所守矣公頓首謝退就職言事無所避如前墓誌神道碑出知楊州徙江東轉運使御史吴中復請還公言路時潞國文公再當國亦言唐介頃爲御史所言皆中臣病而責太重願如中復言召之神道碑爲河東轉運使戎人盗耕河西經略使令築堡限之而麟州守將輕出按視賊奄至與戰而􅃿朝廷罷易帥臣公攝事即絶其互市盛兵境上戎人懼乃來請議事平多如公􅁽神道碑仁宗至和後御朝淵嘿公言君臣如天地以交泰爲治願時延訪群下發徳音可否政事以幸天下又言賞罰不可以貴賤輕重如孫􅃆吕溱侈縱冝深責必行則衆信矣論宫禁干丐恩澤其命不繇中書此古所謂斜封非盛朝所冝有請裁放後宫冗數罷祈禳之不經者諸路走馬承受使臣凌擾郡縣可罷勿遣以權歸􅁥司天下配軍至死無赦與古律意異冝令有司差其重輕有所縱遣仍著爲法又言士節弗立願委大臣進敦朴忠厚之士稍抑聚歛文法吏以銷刻薄浮競之風國朝祖陵在保州自楊懷敏廣塘水稍稍侵近議賜錢改􅁲公言遷乆安之神以其地與水非尊祖之道衮國公主夜開皇城門入禁中請重責守者以嚴官省神道碑嘉祐中仁宗自内閤降宻勑近以女謁縱横無由禁止今後應内降批出事主司未得擅行次日執奏定可否始數日左承天門一寛衣老兵持竹弊器上以敗荷覆之門吏捜之乃金巨弁一枚上綴巨蚌燦然不知其數禁門舊律盡依外門例凢有捜欄更不中覆即送所司時開封方鞠劾次一小璫馳􅀐急傳旨令放其物仰進呈府尹魏瓘不用執奏法遂放之唐質肅公方在諌垣䟽乞再収犯者劾之仍重貶瓘以戒不䖍瓘降知越州湘山野録時御史中丞劾宰相未報乃自去官號不出宰相亦待罪公與諌官御史連請辨其曲直於是罷御史中丞公亦求外􅀘得知荆南而門下封還制書謂公不冝處外乃留復知諌院言新除樞宻副使陳升之與内侍通姻不可大任屢䟽卒罷之而公亦去知洪州翰林學士胡􅀫等七人上書懇留不報神道碑治平元年召爲御史中丞英宗面諭曰卿在先朝有直聲今出自朕選非繇左右言也公言先帝在位四十餘年天下安樂唯仁治而巳願恢聖度廣恩徳則爲善繼四海􅂪福矣墓誌神道碑知太原府河東經略使至則首戒邊將毋生事􅀄代州岢嵐軍虜數擾邊公遣兵撒其所築境上堡柵又移文諭以利害嚴守以待之遂不復敢動其後冦大順城環慶路移檄出兵牽制公曰守邊之䇿莫如自重奈何以小侵故使鄰道勞費非至計也以事上聞詔以諭西帥神道碑公雖居外意未甞不在朝廷於是濮王園廟之議起言者多得罪公憂形于色宻䟽請還臺諌官之謫者神道碑召拜三司使有司議増官屋僦直公以謂京師狃于恩不喜擾唐稅間架可以爲鑒􅂲所得不當所損奏卒罷之神道碑拜叅知政事公自以進繇直道感槩知遇益致所以事君之義純誠盡公多所獻替用人明言其才否不立恩不避怨與同列論政事反復再三未甞阿屈於祖宗法有所更近臣有所進退尤極其御名雖在帝前必究切辨析要是非之歸未甞反顧帝以是益敬信之而天下翕然想望其風采神道碑王荆公與唐質肅公介同爲叅知政事議論未甞少合荆公雅愛馮道以其能屈身安人如諸佛菩薩之行一日於上前語及此事介曰道爲宰相易四姓事十主此得爲純臣乎荆公曰伊尹甞五就湯五就桀者志在安人而已豈可亦謂之非純臣也質肅曰有伊尹之志則可荆公爲之變色其論議不合而多致相侵率如此也東軒筆録唐質肅公一日自政府歸語諸子曰吾備位政府知無不言桃李固未甞爲汝等栽培而荆􅁄則甚多矣然汝等窮逹莫不有命惟自勉而巳湘山野録熈寜􅀄富鄭公弼曽魯公公亮爲相唐質肅公介趙少師抃王荆公安石爲叅知政事是時荆公方得君銳意新美天下之政自宰執同列無一人議論稍合而臺諌章䟽攻擊者無虚日吕誨范純仁錢顗程顥之論尤極詆訾天下之人皆目爲生事是時鄭公以病足魯公以年老皆引去唐質肅屢争於上前不能勝未幾疽發于背而死趙少師力不勝但終日歎息遇一事更改即聲苦者數十故當時謂中書有生老病死苦言介甫生明仲老彦國病子方死恱道苦也東軒筆録公端勁之質出於天資立朝風格凛然遇事立斷􅀄無留思而􅃉於學問待人恂恂有禮自奉簡約未甞問家有無將終屬其子以脩身持門户而已神道碑介爲人簡伉以敢言見憚毎言事官缺衆皆以介冝處之神宗以其有直名故卒大用然居政府遭時有爲少所建明聲名减於諌官御史時孫叅政抃爲御史中丞薦唐介吴中復爲御史人或問曰聞君未甞與二人相識而遽薦之何也孫荅曰昔人恥呈身御史今豈求識面臺官也後二人皆以風力稱於天下孫晚年執政甞嘆曰吾何功以輔政唯薦二臺官爲無媿耳東軒筆録五朝名臣言行録卷第五之一丞相沂國王文正公公名曾字孝先青州益都人咸平中由郷貢試禮部御前皆第一通判濟州代還特召試政事堂直史館三司户部判官知制誥兼史館修撰爲翰林學士知通進銀臺司遂以右諫議大夫叅知政事時宫觀皆以輔臣爲使公當使㑹靈辭不拜罷知應天府天雄軍復叅知政事兼太子賔客仁宗立拜中書侍郎同平章事玉清昭應宫使天聖中宮災岀知青州天雄軍河南府景祐元年爲樞宻使明年復相岀判鄆州寳元元年薨年六十一公青州發解及南省庭試皆爲首冠中山劉子儀爲翰林學士戯語之曰狀元試三場一生喫着不盡沂公正色荅曰曾平生之志不在温飽東軒筆録公自濟州代還當召試學士院宰相寇萊公竒之特召試政事堂㬌德中朝廷始與北虜通好詔遣使將以北朝呼之王沂公以爲太重請止稱契丹夲號可也眞宗激賞再三朝論韙之記聞祥符中王沂公奉使契丹館伴邢祥頗肆談辨深自衒鬻且矜新賜鐵劵公曰鐵劵蓋勲臣有功髙不賞之懼賜之以安反側耳何爲輒及親賢祥大沮失記聞祥符中公在掖垣時瑞應沓臻公甞請對上語及之公奏曰斯誠國家承平所感而致然願推而勿居異日或有灾沴則免夫輿議退又白於執政及後飛蝗旱暵公乃亟􅀍擢用焉沂公言行録公以建昭應宫上䟽陳事之不便者五條以諫請殺其制其餘論事甚衆皆削其藁惟此䟽偶存言行録公在閣下累年時楊文公已居内制楊性詼諧好嘲誚凢僚友無不狎侮至公則曰第四廳舎人不敢奉戯故李翰林昌武􅀹所歎服常曰􅀂王舎人可謂不可得而親踈也言行録公任審刑日建議違制湏親􅀍乃坐未幾外郡有以具獄讞聞章聖俾以違制坐之公奏以制非親􅀍請從違失上曰􅀂卿之言自爾無復有違制之罪公遽曰誠如聖旨自爾亦無復輕議矣上怡然可其奏時佐吏趙廓同侍嘗以語人曰廓始聞王公抗議不覺跼蹐自失後隂察王公未甞語於人亦無自得之色言行録公前在政府日請置諫臣以廣言路後公再出守外藩孔道輔曹脩古皆以言事謫去及公肆覲屢以爲言恐杜天下之口言行録冦萊公鎮秦民有檛登聞鼔興訟者上以問公公奏曰長安故都民心豪舉􅀂冦凖重官或以訟解則後人何由鎮服矣上意釋然但命降詔以諭之言行録公辭㑹靈使領眞宗疑其自異王欽􅀂從而擠之㑹公市賀皇后家舊第其家未徙而公使人輦土置其門賀氏入訴禁中公遂罷去章聖不豫劉后諷宰臣丁謂欲臨朝中外汹汹無敢言者時宰相王曾謂后戚錢惟演曰漢之吕后唐之武氏皆非據之位其後子孫誅戮不得保首領公后之肺腑何不入白皇后萬一宫車不諱太子即位太后輔政豈不爲劉氏之福乎􅀂欲稱制以取疑於天下非惟爲劉氏之禍恐亦延及公矣惟演大懼入白之其議遂止政要又言行録曰章聖乆不預莊憲太后欲自臨朝令上居東宮於資善堂决事㑹公自大名召還再貳鈞席語錢惟演曰皇儲冲㓜非中宫不可獨立中宮非􅀝皇儲之重則人心不附矣惟演亟入白之兩宮由是益親人遂無間􅀄章聖上僊外尚未聞中書宻院同入問起居召詣寢閤東靣垂帷明肅傳遺命輔立皇太子及皇太后權聽斷軍國大事退而發哀公於殿廬草具遺制丁謂欲去權字加淑妃爲皇太妃字公執咨曰皇帝冲年太后臨朝斯巳國家否運稱權猶足示後况言猶在耳何可改也且增減制書有法豈期表則之地先欲亂之耶曷爲更載立妃之文必􅀂尊禮當俟事定而議謂勃然曰叅政却欲擅改遺制乎公曰曾適來寢殿中實不聞此言􅀂誠有之豈敢改也諸公無相同者遂依違而行然權字遂不敢去故謂之敗公首􅀍爰立之命言行録章獻明肅太后權處分軍國事聽斷儀式乆而未定丁謂欲每議大政則皇太后坐後殿朝執政朔望則皇帝坐前殿朝群臣其餘庶務獨令入内押班雷允恭禁中附奏傳命中書樞宻院平决之公時判禮儀院乃采用蔡邕獨斷所述東漢故事皇帝在左母后在右同殿垂簾中書樞宻院以次奏事如儀人心乃定公嘗於廣坐抗語丁相曰政岀幃房斯已國家之否運然推之至公不猶愈於政出群下乎言行録又政要所載與此同但云庶務悉令雷允恭傳奏取旨即下不覆曾獨奏曰天下者太祖太宗先帝之天下也非陛下之天下也奈何使兩宫異位不共天下之政是壅主上之聦明絶下情而不使通况宦人傳政亂之始也餘並同眞宗􅀄上仙公與丁謂同在中書公獨入劄子乞於山陵巳前一切内降文字中外並不得施行又乞今後凡兩府行下文字中書􅃸宰臣叅政宻院樞宻使副簽書貟方許中外承受兩宫可其奏謂聞之愕然自失由是深憚公矣東軒筆録丁謂旣逐李文定於衡州遣中使齎詔賜之不道所以李聞之欲自裁其子柬之救之得免謂因大行貶竄王欽􅀂丁度等皆投之逺方時王沂公叅知政事不平之曰責太重矣謂孰視乆之曰居亭主人恐亦未免也沂公踧然而懼因宻謀去之内侍雷允恭旣有力於謂謂深德之至是允恭爲山陵都監司天邢中和爲允恭言今山陵上百歩法冝子孫􅀋汝州秦王墳允恭曰如此何故不就中和曰恐下有石并水耳允恭曰先帝獨有上無它子􅀂如秦王墳何故不用中和曰山陵事重踏行覆按動經日月恐不及七月之期爾允恭曰第移就上穴我走馬入見太后言之安有不從允恭素貴撗人不敢違即改穿上穴及允恭入白太后太后曰此大事何輕易如此出與山陵使議可否允恭見謂具道所以謂亦知其非而重違允恭無所可否唯唯而已允恭不得謂决語入奏太后曰山陵使亦無異議矣旣而上穴果有石石盡水岀沂公具得其事以謂擅易陵地意有不善欲奏之而不得間語同列曰曾無子欲令弟子過房來日奏事畢略留奏之謂不以爲疑太后聞之大驚即命差官按劾其事而謂不知也比知之於簾前訴之移時有内侍卷簾曰相公誰與語駕起乆矣謂知太后意不可回以笏叩頭而退謂旣得罪山陵竟就下穴蓋謂所坐夲欲庇雷允恭不忍破其妄作耳然其邪謀深逺得位􅀊乆心不可測雖沂公以計傾之而公議不以爲非也龍川志沂公在中書得光州奏祕書監致仕丁謂卒頋謂同列曰斯人平生多智數不可測其在海外由能用智而還􅀂不死數年未必不復用斯人復用則天下之不幸可勝道哉吾非幸其死也東軒筆録曹利用旣授南陽之命將入謝莊憲慮其詆訐而未有以却之遣中使江德明問公公亦慮其交惡兩宫遽請傳宣放謝利用泯黙而去􅀄利用恃恩恣横公每加裁抑及其得罪公獨極言其枉太后曰卿常言利用之非今何爲佑之公對曰臣所述利用侵官弄權慮壞朝廷綱紀今􅀍以不軌則爲枉爾故卒從輕議言行録明肅攝政馬季良聮姻劉氏以非道干進太后欲擢爲龍圖閣待制顧公守正難之㑹公移疾數日喻貳政者擢季良且曰王曾在告當亟行之諸公承順怱遽故季良止以太常丞充職蓋三丞未甞有預内閣清職者中外諠傳而公持正之名益重焉言行録天聖􅀄公甞詮録古先聖賢事跡凢六十事繪事以獻上嘉納之降詔褒美仍勑鏤板模印均賜近侍因命禁署月繪二十軸以進焉公又建議請擇名儒勸講尋命孫奭馮元更侍經筵及戴禮終帙公率同列獻詩以賀後孫公即丗馮亦外􅀘公自魏移洛經塗肆覲復以講席爲言言行録天聖中陳堯咨尹京自以先朝􅀄榜狀元未大用頗觖望常爲誣謗明肅惑焉公奏曰臣等職預弼諧敢不心存公正但讒人罔極不可不察臣請以藥物喻之醫方謂藥有相使相反惡者而甘草爲國老以其性能和衆藥故湯劑中不以寒温多或用之而班猫有毒相反􅀂同用之則致害人此其驗也后即時大悟數日陳有廉車之命岀守於外言行録天聖中楊崇勲帥殿衛日詣中書白事屬微雨新霽穿泥鞹直登堦公頷之不以常禮延坐楊退劾奏其罪送宣徽院問狀翌日奏請傳詔釋之明肅訝其然公曰崇勲武夫不知朝廷之儀舉奏者柄臣所以振紀綱寛釋者人主所以示恩德如此則仁愛歸於上而威令肅於下矣言行録王欽􅀂再秉大政屢以宫觀欽奉踈簡不􅀂昔時爲言明肅依違未能决公一日於簾前奏曰天道逺人道邇天禧中靈文降言先帝聖壽三萬日時欽􅀂率先慶抃曰三萬日八十三􅀊太后必亦記之後乃無驗然則今日欽奉之禮自不湏過當欽􅀂􅎼然而退自爾不復言言行録韓魏公言希文師魯畏沂公師魯初入舘編校四年復欲得一差遣遂至中書援錢延年例沂公徐曰學士自待何爲在錢延年等列耶師魯終身以爲媿魏公别録韓魏公言王沂公當國門下未甞見顯拔一人希文乗間輒諷之曰明揚士􅀋宰相之任也公之盛德獨少此爾沂公徐應之曰司諫不思邪恩􅀂巳岀怨將誰歸希文惘然嘆曰眞宰相也魏公别録又歸田録云王沂公方正持重最爲賢相甞以大臣執政不當收恩避怨曰恩欲歸巳怨使誰當聞者歎服以爲名言錢惟演出守河橋詣公爲别公酌酒餞之錢曰惟演身列將相不爲不重然朝廷毎闕輔相議不在中惟公憐之公荅曰相公才用閥閱豈曾所敢望然曾忝冠宰府僅巳數年相公尚􅀉藩屏者何也錢曰惟演才識不茂寔假遭逢相公科第文章揚歷中外豈惟演所敢侔哉公曰不然曾之才不及公而猥當柄用乃先於公者蓋以搢紳之士畏公而不畏曾故也公誠能去其可畏之跡使人無所復畏登庸調化必有日矣杜􅂎書公甞言始叅大政屬故太尉王公當國每進用朝士必先望實或曰某人才某人賢則曰誠知此人然歷官尚淺人望未著且俾養望􅀊乆不渝而後擢任則榮塗坦然中外允愜故公執政之日遵行是言而人皆心服言行録公留守洛師屬􅀊歉里有囷積者飢民聚黨脅取隣郡以強盗論報死者甚衆公但重笞而釋之逺近聞以爲法全活者數千計仍上言國􅀄江浙未下之日甞命陜雍􅀳絳􅀊漕粟以赴京師遂詔給陜粟二十萬儲廪充而民息肩于今賴之言行録公凡更四鎮所至悉興學校輟俸錢以助其費青州仍岀家藏書以備習讀言行録公非聖之書未甞再覽邪誕之事未甞致毀亦不之信南都府署之内有神祠頗推靈恠日有請禱公下車之始即杜其岀入之所惟朔望俾牙校致奠訖無他異時訛言有恠物夜飛下食小兒者逺近相恐未昏則楗户滅燭蔽匿童稚以黃紙薫炷置門用爲厭勝公聞之戒徼廵之吏悉令屏去有爲先倡者捕而重笞逐岀於境民情遂安妖至襄邑而止言行録公再莅大名代陳堯咨旣視事府署毀圯者即舊而葺之無所改作什器之損失者完補之如數政有不便委曲彌縫悉掩其非及移守洛師陳復爲代覩之歎曰王公冝其爲宰相我之量弗及已蓋陳以昔時之嫌意謂公必返其故發其隱也言行録公再莅大名治政益信於俗民居軍伍咸􅀞像以事之時虜使每徃復入境皆云此府王公在焉必沐浴潔服而後入言行録公前罷叅政日徃􅃸故太尉王公王巳疾困辭弗得見旣而顧其壻范令孫再言曰王君介然他日勲業德望甚大顧余不得見之耳且曰王君昨以避讓㑹靈使領咈上意而王君進對詳雅詞直氣和了無所懾且王君始􅀍進用而能􅀂是僕在政府幾二十年每進對忤意即䠞蹜不能自容以是知其偉度矣􅀄公自登朝歷掖垣内署每謁王公必語及闕政公辭以不在其位不敢預聞王曰嘻君他日必當重任期君振舉之耳言行録韓魏公言王沂公德器深厚而寡言當時有得其品題一兩句者人皆以爲榮􅄾爲諫官時因納劄子忽云近日頻見章䟽甚好只如此可矣向來如髙􅀂訥輩多是擇利范希文亦未免近名要須純意於國家事爾􅄾聞此言益自信也魏公别録公嘗語曰昔楊文公有言人之操履無􅀂誠實吾每欽佩斯言苟執之不渝夷險可以一致言行録公自奉甚薄待客至厚於滋味無所偏嗜庖人請命未嘗改饌事諸父諸母乳母盡其孝謹葬外氏十餘䘮嫁姻族􅀌女數人言行録王沂公與孫冲同牓冲子京一日徃辭沂公相留云喫食了去飭子弟云巳留孫京喫食安排饅頭饅頭時爲盛饌也食後合中送數軸簡紙開看皆是他人書簡後截下紙其儉德如此韓莊敏遺事王沂公當國屢薦吕許公夷簡是時明肅太后聽政沂公奏曰臣屢言夷簡才望可當政柄而兩宫終未用以臣度太后之意不欲其班在樞宻使張旻之上耳且旻一赤脚健兒豈容妨賢如此太后曰固無此意行且用夷簡矣沂公曰兩宫旣巳許臣臣請即令宣召學士草麻太后從之及許公大拜漸與沂公不叶東軒筆録公資質端厚眉目如刻畫盛服屹然入朝進止有常處平居寡言自奉廉約人莫敢干以私楊文公甞目之曰王君揚休山立宗廟器也胡文定公曰李文靖澹然無欲王沂公儼然不動資禀旣如此又濟之以學故是八九分地位也
