body:
  text: 五之四御史中丞彭公公名思永字季長吉州廬陵人中天聖五年進士第歴知南海分寜縣通判睦州知潮州召爲侍御史出守宣州爲湖北益州路轉運使權知成都府召還爲户部副使以天章閣待制充陜西都轉運使知瀛州英宗即位徙知江寜府召權御史中丞神宗􅀄降授給事中知黄州徙太平亳楊三州熈寜三年以户部侍郎致仕卒年七十一南海分寜素號難治前令比以罪去民化公之誠相戒以毋犯法至於無訟旣又通判睦州㑹台州大水􅁥司奉詔以公攝守事公悉心救養不憚勞苦至忘寢食盡葬溺死者爲文以祭之問疾苦賑飢乏去盗賊撫羸弱民貧不能營葺者命工伐木以助之數月而公私之舎畢復人安其居公視故城􅋻壞曰郡瀕海而無城此水所以爲害也程􅃥勸功民忘其勞城成遂爲永利移知潮州潮民􅀊苦脩堤之役吏縁爲姦貧者尤被其害公爲之法役均而費省民大恱明道先生撰行狀召爲侍御史極論内降授官賞之弊以謂斜封非公朝之事仁宗深然之皇祐祀明堂前一日有傳赦語百官皆得遷秩者公方從駕􅀫景靈宫亟上言不冝濫恩以益僥倖旣肆赦果然時張堯佐以妃族進王守忠以親侍帷幄􅀍寵叅知政事闕貟堯佐朝暮待命守忠亦求爲節度使物議讙動公帥同列言之皆曰冝待命行公曰冝以先事得罪命出而不可救則爲朝廷失矣遂獨抗䟽極言至曰陛下行此覃恩無意􅀌寒獨爲堯佐守忠故取恱衆人耳月言妃族秉政内臣用事皆非國家之福䟽入仁宗震怒人皆爲公危之公曰苟二人之命不行雖赴鼎鑊無恨於是御史中丞郭勸諌官吴奎皆爲上言其忠當蒙聽納不冝加罪仁宗怒解而堯佐守忠之望遂格公猶以汎恩罷臺職行狀公爲荆湖北路轉運使至部奏黜守令之殘􅤒疲懦者各一人而八州知勸時大農以利誘諸路使以羡餘爲獻公曰裒民取賞吾不忍爲遂無所獻行狀成都闕守詔公權領府事有吏盗官錢千緡付獄巳三􅀊猶縱其出入自􅀂者公命窮治之一日而獄具蜀人以交子貿易皆藏於腰間盗善以小刄取之於稠人中民病苦之公得其狀即捕獲一人使䟽其黨􅀋得十餘軰悉黥􅀠諸軍盗者遂絶二罪而人知畏法蜀乃大治􅀊有中貴人祠峩嵋常留成都中數十日誅取珍貨竒玩例至數百萬錢一出於民間公命三省其二使者恨怒而去公不之顧行狀河朔謀帥以公鎮髙陽時狃於承平治兵者鮮明紀律而三􅀜爲甚公爲帥方重嚴正犯者頗以軍法從事驕兵大戢河北舊以桑麻爲産籍之髙下民懼不敢蓺植故益貧公奏更其法自是絲績之利􅀊􅀊増益行狀召權御史中丞時追崇濮園大號復有稱親之議諌官御史以典禮未正相繼論列者六七人皆以罪去公始拜中司力陳其不可且請召還言事者上未之察更爲䟽極論其事言益切至英宗深加聽納事幾施行而大臣持之甚力故不果公因求解憲職以章言者五進見而面陳者多至不記㑹英宗不豫公憂懼不復言行狀又伊川先生集代彭中丞奏云濮王生陛下而仁宗皇帝以陛下爲嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之適子濮王陛下所生之父於屬爲伯陛下濮王出継之子於屬爲姪此天地大義生人大倫如乾坤定位不可得而變易者也固非人意所能推移苟亂大倫人理㓕矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更􅁛濮王爲親是有二親則是非之理昭然自明不待辯論而後見也然而聖意必欲稱之者豈非陛下大孝之心義雖出継情厚本宗以濮王寔生聖躬曰伯則無異於諸父􅁛王則不殊於臣列思有以尊大使絶其等倫如此而巳此豈陛下之私心哉蓋大義所當典禮之正天下之公論而執政大臣不能將順陛下大孝之心不知尊崇之道乃以非禮不正之號上累濮王致陛下於有過之地失天下之心貽亂倫之咎言事之臣又不能詳據典禮開明大義雖知􅁛親之非而不知爲陛下惟所生之至恩明尊崇之正禮使濮王與諸父夷等無有殊别此陛下之心所以難安而重違也臣以爲當以濮王之子襲爵奉祀尊􅁛濮王爲濮國大王如此則夐然殊號絶異等倫凢百禮數必皆稱情請舉一以爲率借如旣置嗣襲必伸􅀕吿當曰姪嗣皇帝名敢昭告于皇伯父濮國大王自然在濮王極尊崇之道於仁皇無嫌二之失天理人心誠爲允合不獨正今日之事可以爲万丗之法復􅂲議者以大字爲疑此則不然蓋繫於濮國下自於大統無嫌矣御史蔣之竒奏發大臣隂事欲扳公爲助乃曰公甞言之公亦謂帷箔之私非外人所知誠難究詰然亦有以取之故謗言一興而人以爲信且其首爲濮園議違典禮以犯衆怒不冝更在政府執政以之竒所論􅄀昧不可質迫公言其所從來三問而公奏益急且曰風聞者以廣聦明也今必問其所從來因而罪之則後無聞矣寜甘重謫不敢廢國家開言路之法因極陳大臣朋黨専恣非朝廷計翌日降授給事中知黄州行狀公仁厚誠恕出於自然年八九􅀊時從尚書出官岳州晨起將就學舎得金􅁫於門外黙坐其處以伺訪者有一吏徘徊乆之問故果墜􅁫者也公詰其狀驗之信即出付之吏謝以數百金公􅀏不受曰我􅀂欲之取􅁫不過於數百金耶吏嘆駭而去始就舉時貧無餘貲惟持金釧數隻棲於旅舎同舉者過之衆請出釧爲翫客有墜其一於䄂間者公視之不言衆莫知也皆驚求之公曰數止此耳非有失也將去䄂釧者揖而舉手釧墜於地衆服公之量居母䘮貧甚郷人争饋之皆謝去後居顯仕自奉飬不改其素平生無聲色竒巧之翫其氣守髙爽議論清澹而端莊恭謹動必由禮未甞有墮慢之色戯侮之言見者皆知畏重然􅁭度夷曠不可澄撓人莫見其喜怒之變遇事明白不事襮飾接人無貴賤髙下一以忠信爲政本仁惠吏民愛之如父母惟不喜矯情恱衆揚巳取譽常曰牢籠之事吾所不爲居憲府多所論奏未甞以語人或疵其少言惟謝之終不自辨每謂人曰吾不爲它學但㓜即學平心以待物耳又常教其子弟曰吾數􅀊時冬處􅀍中則知思天下之寒者矣其本源如此故仁恕之善見於天下而人推其誠長者至其持守剛勁喜善嫉惡而勇於斷决則不可以勢利誘不可以威武移潮州宅舊傳多怪前後守臣無寜處者公迄去未甞問其其有無其逹理守正􅀂此凛乎其丈夫也六之二丞相陳文惠公公名堯佐字希元閬州閬中人中進士第累遷太常丞爲開封府推官貶通判潮州還直史舘歴知廬壽二州兩浙京西河東河北轉運使入爲三司戸部副使天聖初知制誥知通進銀臺司出知河南府徙并州權知開封府爲翰林學士拜樞宻副使叅知政事出知永興軍徙廬州同州拜同中書門下平章事罷以使相判鄭州以太子太師致仕薨年八十二公爲人剛毅篤實好古愽學嘗以言事貶通判潮州其所言蓋大臣所難言者歐陽公撰神道碑潮之惡溪有鱷魚食人不可近公命捕得鳴皷于市以文告而戮之鱷患屏息神道碑又澠水燕談云咸平中陳文惠公謫官潮州時潮人張氏子濯于江邊爲鱷魚所食公曰昔韓吏部以文投惡溪鱷魚逺徙今乃賊人則不可赦矣乃命吏督漁者網得戮之圖其形爲之賛至今人多傳之鰐大者數丈或玄黄或蒼白似龍而無角􅀋蛇而有足睅目利齒見之駭人􅆑化山谷間大率爲鰐者十二三焉餘或爲􅷞或爲􅀛也喜食人畜其食必以尾卷去如象之任鼻也知壽州遭􅀊大飢公自岀米爲糜以食餓者吏民以公故皆争岀米其活數萬人公曰吾豈以是爲私惠邪蓋以令率人不􅀂身先而使其從之樂也神道碑錢塘江堤以竹籠石而潮嚙之不數􅀊輙壞而復理公嘆曰堤以捍患而反病民乃議易以薪土言者以爲非便而丁􅀳公主之以黜公公争不巳乃徙公京西而籠石爲堤數􅀊功不就民力大困卒用公議堤乃成神道碑河東地寒而民貧奏除石炭稅減官冶鐵課􅀊數十萬以便民曰轉運征利之官也利有夲末下有餘則上足吾豈爲俗吏哉神道碑太行山當河北河東兩路之界公以謂􅀳自前丗爲險國常先叛而後服者恃此也其在河東鑿澤州路後徙河北鑿懷州路而太行之險通行者得公以爲利公曰吾豈爲今日利哉神道碑河决壞滑州公躬自􅁀露晝夜督促剏爲木龍以巨木駢齒浮水上下殺其􅁀堤乃成又爲長堤以護其外滑人曰不可使後人忘我陳公因號其堤爲陳公堤神道碑開封府治京師公以謂治煩之術任威以擊強盡察以防姦譬於激水而欲其澄也故公爲政一以誠信每􅀊正月夜放燈則悉籍惡少年禁錮之公召諭曰尹以惡人待汝汝安得爲善吾以善人待汝汝忍爲惡耶因盡縱之凡五夜無一人犯法者神道碑太常愽士陳詁知祥符縣縣吏惡其明察欲中以事而詁公廉事不可得乃欲以竒動京師自録事以下空一縣皆逃去京師果喧言詁政苛􅁀是時章獻明肅太后猶聽政怒詁欲加以罪公爲樞宻副使力争之以謂罪詁則姦人得計而沮能吏詁由是獲免神道碑公十典大州六爲轉運使常以方嚴肅下使人知畏而重犯法至其過失則多保佑之故未甞按黜一下吏神道碑故事知制誥者先試其文辭天子以公文學天下所知不復命試自國朝以來不試知制誥者唯楊億及公二人而巳神道碑公居官不妄進取爲太常丞者十三年不遷爲起居郎者七年不遷自議錢塘堤爲丁􅀳公所絀後􅀳公益用事專威福故人子弟以公乆于外多勉以進取公曰唯乆然後見吾守如是十五年今天子即位􅀳公事敗投海外公乃見召用神道碑公初作相以唐劉蕡所對䇿進曰天下治亂自朝廷始朝廷賞罰自近始凡蕡之所究言者皆當今之弊臣所欲言而陛下之所冝行也天子嘉納之神道碑公居家以儉約爲法雖巳貴常使其子弟親執賤事曰孔子固多能鄙事臨卒口占數十言自誌其墓神道碑吕申公累乞致仕仁宗問之曰卿果退當何人可代申公曰知臣莫􅀂君陛下當自擇仁宗再三問之申公對曰陛下欲用英俊經綸之才臣所不知必欲圖任老成鎮撫百度周知天下之良苦無如陳堯佐者仁宗深然之遂大拜湘山野録公性儉謹行見動物必戒左右勿殺器服壞隨輒􅀘之曰無使不全以見棄也公父秦國公省華三子長曰堯叟爲樞宻使同中書門下平章事季曰堯咨爲武信軍節度使皆舉進士第一人及第三子巳貴秦公尚無恙每賔客至其家公及伯季侍立左右坐客䠞蹜不安求去秦公􅀏曰此兒子軰爾故天下皆以秦公教子爲法而以陳氏丗家爲榮神道碑堯咨精於弧矢常自號小由基爲知制誥岀守荆南廻其母馮氏問之曰汝典名藩有何異政堯咨曰州當孔道過客以堯咨善射無不歎服母曰汝父訓汝以忠孝輔國家今不務仁政善化而專卒伍一夫之伎豈汝先人之意耶以杖擊之金魚墜地名臣傳
