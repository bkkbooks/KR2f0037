body:
  text: 九之五御史中丞孔公公名道輔字原魯孔子四十五代孫舉進士爲寧州軍事推官改知仙源縣奉孔子祠章獻太后臨朝召爲左正言岀知鄆州徙青州明道二年召爲右諫議大夫權御史中丞岀知泰徐兖州復入爲中丞岀知鄆州中道病卒年五十四公仕當今天子天聖寳元之間以剛毅諒直名聞天下甞知諫院矣上書請明肅太后歸政天子而廷奏樞宻使曹利用上御藥羅崇勲罪狀當是時崇勲操權利與士大夫爲市而利用悍彊不遜内外憚之甞爲御史中丞矣皇后郭氏廢引諫官御史伏閤以爭之求見上皆不許而固爭之得罪然後巳蓋公事君之大節如此此其所以名聞天下而士大夫多以公不終於大位爲天下惜者也王荆公撰墓誌初莊獻太后稱制郭后恃太后執頗驕橫後宫多爲太后所禁遏不得進太后崩上始得自縱適美人尚氏父自所由除殿直賞賜無筭恩寵傾京師郭后妬屢與之忿爭尚氏常於上前有侵后不遜語后不勝忿起批其頰上自起救之后誤查上頸上大怒閻文應勸上以爪痕示大臣而謀之上因以示吕夷簡且告之故夷簡因宻勸上廢后上疑之夷簡云光武漢之明主也郭后止以怨懟坐廢况傷乗輿乎廢之未損聖德上未許外人籍籍頗有聞之者左司諫祕閣校理范仲淹因登對極陳其不可且冝早息此議不可使有聞於外也夷簡將廢后奏請勑有司無得受臺諫章奏十二月乙卯稱皇后入道賜號浄妃㞐別宫右諫議大夫權御史中丞孔道輔恠閤門不受章奏遣吏詗之始知其事奏請未降詔書丙辰與范仲淹帥諸臺諫詣閤門請對閤門不爲奏道輔等欲自宣祐門入趣内東門宣祐監官宦者闔扉拒之道輔拊門銅鐶大呼曰皇后􅀍廢奈何不聽我曹入諫宦者奏之湏􅁷有旨臺諫欲有所言冝詣中書附奏道輔等悉詣中書論辨諠譁夷簡曰廢后自有典故仲淹曰相公不過引漢光武勸上耳此漢光武失德又足法邪自餘廢后皆昬君所爲主上躬堯舜之資而相公更勸之効昬君所爲乎夷簡拱立曰兹事明日諸君更自登對力陳之道輔等退夷簡即爲熟狀貶黜道輔等故事中丞罷須有告詞至是直以勑除之道輔等始還家勑㝷至遣人押出城仍下詔云云十一月戊子故后郭氏薨后之􅀗罪也上直以一時之忿且爲吕夷簡閻文應所賛故廢之旣而悔之后出㞐瑶華宫章惠太后亦逐楊尚二美人而立曹后乆之上遊後園見郭后故肩輿悽然傷之作慶金枝詞遣小黃門賜之且曰當復召汝夷簡文應聞之大懼㑹后有小疾文應使毉官故以藥發其疾疾甚未絶文應以不救聞遽以棺歛之王伯庸時爲諫官上言郭后未卒數日先具棺器請推按起㞐狀上不從但以后禮葬於佛舎而巳或曰章獻初崩上與夷簡謀以夏竦等皆莊獻太后之黨悉罷之退告郭后郭后曰夷簡獨不附太后邪但多機巧善應變耳由是并夷簡罷之是日夷簡押班聞唱其名大駭不知其故夷簡素與内侍副都知閻文應等相結使爲中詗乆之乃知事由郭后夷簡由是惡郭后記聞公孫中書舎人夲中甞言温公日録涑水記聞多岀洛中人家子弟増加之僞如郭后之廢當時論者止以爲文靖不合不力争及罷諸諫官爲不美爾然後來范蜀公劉原父吕縉叔皆不以文靖爲非盖知郭后之廢不爲無罪文靖知不可力争而遂巳也􅀂如此記所言則是大姦大􅁖罪不容誅當時公議分明豈容但已乎公所至官治數以争職不阿或絀或遷而公持一節以終身蓋未甞自詘也其在兖州也近臣有獻詩百篇者執政請除龍圗閣直學士上曰是詩雖多不如孔道輔一言乃以公爲龍圗閣直學士於是人度公爲上所思且不乆於外矣未幾果復召以爲中丞而宰相使人􅀃公稍折節以待遷公乃告以不能於是又度公且不得乆㞐中而公果出墓誌初開封府吏馮士元坐獄語連大臣數人故移其獄御史劾士元罪止於杖又多更赦公見上上固怪士元以小吏與大臣交私汙朝廷而所坐止如此而執政又以謂公爲大臣道地故出知鄆州墓誌又東坡志林云聞之蘇子容孔道輔爲御史中丞勘馮士元盡法不阿仁宗稱之有意大用時大臣與士元通姦利最甚者宰相程琳也道輔旣得其情矣而退傅張士遜不喜道輔欲有以中之上使道輔送劄子中書士遜屏人與語乆之因言公將大用道輔喜士遜曰公所以致此誰之力也非程公公不至此道輔悵然愧而德之不數日上殿力救琳上大怒旣貶琳亦黜道輔道輔知爲士遜所賣感憤得疾死中路公使契丹契丹燕使者優人以文宣王爲戲公赩然徑出虜使主客者邀還坐且令謝公正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝虜君臣黙然公廉於財樂振施遇故人子恩厚􅀹篤而尤不好􅀑神禨祥事在寧州道士治眞武像有蛇穿其前數出近人人傳以爲神州將欲視驗以聞故率其屬徃拜之而蛇果岀公即舉笏擊蛇殺之自州將以下皆大驚巳而又皆大服公由此始知名然余觀公數處朝廷大議視禍福無所擇其智勇有過人者勝一蛇之妖何足道哉丗多以此稱公者故余亦不得而略也墓誌元祐中上元駕幸凝祥池宴從臣教坊伶人以先聖爲戲刑部侍郎孔宗翰奏唐文宗時甞有爲此戲者詔斥去之今豈冝尚容有此詔付伶官于理或曰此細事何足言者孔曰非爾所知天子春秋鼎盛方且尊德樂道而賤工乃爾䙝慢縱而不治豈不累聖德乎聞者嘆伏澠水燕談宗翰道輔之子也
