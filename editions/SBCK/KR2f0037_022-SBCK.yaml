body:
  text: 十三之二吏部侍郎鄒公公名浩字志完常州晉陵人中進士第歷楊州頴昌府教授元祐七年除太學愽士出爲襄州教授元符元年召對除右正言明年除名勒停覊管新州徽宗即位復宣徳郞添監􅀽州酒稅除右正言遷右司諌起居舎人明年除中書舎人遷吏部侍郞除寳文閣待制知江寧府㝷改知杭州未赴責授衡州别駕永州安置明年除名勒停昭州居住崇寧四年移漢陽軍居住五年復承奉郎遂歸常州大勸四年復直龍圗閣政和元年卒年五十二道郷鄒公自少以道學行義知名於時其爲人也和順積中而英華發外望之睟然見於顔靣不問知其爲仁人君子也其遇事接物猶虚舟然而堅挺之姿如精金良玉不可磨磷元符中用侍臣之薦擢居諌垣從人望也是時哲宗皇帝厲精求治用賢如不及一見即以公輔期之嘉言入告無不從者適中宫虚位之乆大臣欲自結於嬖暱爲保位之謀迎意媚合不以正公力言之以爲公議不允忤上㫖姦䛕之徒惡其害巳相與恊力擠之於䧟穽之中又下石焉皆是也公之章留中不下乃僞爲之加以詆誣不實之語如取它人之子而殺其母之􅀋流布中外欲天下聞之眞􅀂有罪者其爲謀深矣雖有端人正士無敢爲公辨明者公旣􅃿迨今二十餘年昔之姦朋凋䘮略盡而正論行焉眞僞是非始有在矣紹興三年其子柄集公之奏議一編屬余爲叙余於公非一朝燕游之好也知公爲􅀹詳其事之夲末皆余所親聞見者故詳著之以昭示來世庶乎使小人知君子之爲善終不可誣也公之將亡余適還自京師聞公疾革未及㢮擔即馳徃省之見其薾然僅存餘息然語不及私猶以國事爲問蓋其平生以天下之重爲巳任至垂絶而不忘也每追念及之愴然不能釋嗚呼世道䘮乆矣不復有斯人也􅀛山集鄒公奏議集序張繹曰鄒浩以極諌得罪世疑其賣直也先生曰君子之於人也當於有過中求無過不當於無過中求有過程氏遺書志完脩㓗有志行記覧該緫援筆數千言立就斯可畏者然自視如未足士有一善無貴賤必與之交無逺邇必欲收而取之崔正言婆娑集志完云聖人之道備于六經六經千門萬户何從而入大要在中庸一篇其要在衘名獨而已但於十二時中看自家一念從何處起即􅀧檢不放過便見工力胡氏傳家錄田晝者字承君陽翟人故樞宻宣簡公姪也人物雄偉議論慷􅁣俱有前軰之風鄒浩志完教授頴昌與承君逰相樂也志完性懦因得承君故遇事輙自激勵元符間承君監京城門志完除言官遣客見承君以測其意客問承君近讀何書承君曰吾作墨子詩有知君旣得雲梯後應悔當年泣染絲之句爲志完發也客言於志完志完折簡謝曰承君辭甚苦因約相見承君取告見之問志完曰平生與君相許者何如今君爲何官志完愧謝曰上遇群臣未甞假以聲色獨於浩若相喜者今天下事故不勝言意欲使上益相信而後言貴可有益也承君許之旣而朋黨之禍大起時事日變更承君謝病歸陽翟田舎一日報立劉氏爲皇后承君謂子曰志完不言可以絶交矣又一日志完以書約承君㑹潁昌中塗承君喜甚亟往志完具言諌立皇后時浩之言戅矣上初不怒也浩因奏曰臣即死不復望清光矣下殿拜辭以去至殿門望上猶未興凝然􅀂有所思也明日浩乃得罪留三日臨别志完出涕承君正色責曰使志完隱黙官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君無以此舉自滿士所當爲者未止此也志完茫然自失歎息曰君之贈我厚矣乃别去建中靖國􅀄承君入爲太宗正丞宰相曽布欲收置門下不能屈除提舉常平亦辭請知淮陽軍以去吏民畏愛之嵗大疫承君日自挾毉户問病者藥之良勤得疾而卒聞見録五朝名臣言行録卷第四之一丞相畢文簡公公名士安字仁叟代州雲中人乾德四年舉進士歷知台饒乾三州入爲左拾遺兼冀王府記室叅軍知制誥淳化中召入翰林爲學士以父名乂林抗章引避議者以禮律二名不偏諱却之眞宗尹京以爲判官東宫建兼右庶子及即位權知府事再爲學士景德初遷吏部侍郎叅知政事踰月拜平章事二年冬薨年六十八呉越入朝公以選知台州旣至言錢氏所上圖籍皆張侈賦數願一用舊籍以輯新民詔從之劉莘老撰神道碑端拱中詔王府官各上所爲文帝問近臣曰文吾旣知之其行孰優皆以公對帝喜曰是也以本官知制誥召爲翰林學士大臣以張洎言帝曰洎視士安詞蓻踐歷固不減但履行逺在其下耳神道碑公知開封府近臣有怙埶爲不法彊買民家定㛰子者公請對白其横奪還之神道碑契丹謀入冦公首䟽五事應詔陳選將餉兵理財之䇿甚備帝多納用於是中書闕宰相乃進公吏部侍郎叅知政事入謝帝曰未也行且相卿然時方多事求與卿同進者其誰可公頓首辭謝曰臣材駑朽不足以勝任惟冦凖兼資忠義善斷大事此宰相才也帝曰聞其剛使氣對曰凖資方正慷􅁣有大節忘身徇國秉道疾邪此其素所蓄積朝臣罕岀其右者第不爲流俗所喜今天下之民雖蒙休德涵養安佚而西北跳梁爲邊境患正􅀂凖者所冝用也帝曰然當籍卿宿德鎮之不閱月拜公本官平章事冦公實並命而以公監修國史位在上旣而契丹益犯邊北州皆警二公始合議請帝幸澶淵時景德元年九月也虜統軍順國王撻覽引兵入塞號二十萬初雲州觀察使王繼忠戰没虜中至是爲虜人奏請議和大臣莫敢如何其事獨公以爲可信力賛帝當羈縻不絶漸許其成帝謂虜悍如此恐不可保公曰臣甞得虜降人言虜雖深入屢挫不甚得志隂欲引去而耻無名且彼寧不畏人乗虚覆其穴此請殆不妄繼忠之奏臣請任之帝喜乃手詔繼忠許其請和時巳詔廵幸而議者猶閧閧二三大臣有進金陵及成都圖者公亟同冦公請對力陳其故堅定前計帝乃幸澶淵軍數十萬虜大震然猖狂乗衆猶掠德清至澶北鄙㑹官軍伏弩發射撻覽死衆潰遁去而講和之計遂定初帝嚴兵將行太白晝見流星岀上台北貫斗魁或言兵未冝北或言大臣應之公適卧疾移書冦公曰屢請􅞿疾從行而詔不許今大計已定惟君勉之士安得以身當星變而就國事所願也已而少間追至澶淵因從以還兵罷乃按邊要選良守將易置之雄州以李允則定州馬知節鎮州孫全照保州楊延明它所擇用各得其任令塞下止驅掠通互市除鐵禁招流亡廣儲畜未幾夏州趙德明亦欵塞内附二方旣定中外略安量時制法次第施行如搉酤母得增額平反已决死罪録爲勞訟不干已者坐以重至今不易復置賢良方正直言極諫等科以廣取士每對必爲帝言崇儉息民近忠直逺諛佞是爲政要故當時天下無事號至治云神道碑公資端重偉儀觀少以名節自厲貫于夷險白首不易平生無一語過差雖貴奉養無異平素未甞殖産爲子孫計故天下稱其清而其亡也帝謂冦公曰畢士安君子人也事朕南府東宫以至輔相飭躬謹行有古人之風後王文正公爲相甞面奏曰陛下前稱畢士安清畏如古人在位聞之無不感歎且士安仕至輔相而四海無田園㞐第没未終䘮家用已屈今其妻有貸於臣家其不􅀒陛下所知滋可見矣是固冝有以周之然當岀上恩非臣敢爲私惠時也帝聞歎息賜白金五千兩神道碑公平生寡交遊無黨援唯王􅀳公吕公端見引重王文正公冦萊公楊文公相友善旣引冦公同政而冦公守正疾惡小人多不便日思所以傾之者布衣申宗古告其交通安王元傑冦公皇恐莫知所以自明公力辨其誣下宗古吏具得姦罔斬之冦公乃安王禹偁濟州白屋子甞以事至公官舎隂識其非常童留之教以學後遂登科進用更在公前及公繼知制誥其命乃禹偁詞也公去潞州事連禹偁亦謫黃州公猶厚資其行云神道碑公端方沉雅有清識所至以嚴正稱然性謙退甞謂人曰僕仕宦無赫赫之譽但力自規檢庻幾寡過耳咸平中詔選官校勘三國志􅀳唐書或有言兩􅀳事多鄙惡不可流行者眞宗以語宰相公對曰惡以戒丗善以勸後善惡之事春秋備載帝然之遂命刋刻蓬山志
