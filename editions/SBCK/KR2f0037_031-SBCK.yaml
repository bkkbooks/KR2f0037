body:
  text: 五之三御史中丞吕公公名誨字獻可正惠公之孫登進士第歴旌徳扶風主簿遷雲陽令知翼城縣簽書定國軍節度判官知大通􅁥召入爲殿中侍御史岀知江州復召還臺英宗即位同知諌院兼侍御史知雜事出知蘄州徙􅀳州神宗􅀄召爲鹽鐵副使擢天章閣待制復知諌院遷諌議大夫權御史中丞出知鄧州提舉西京崇福宫致仕熈寜四年卒年五十八獻可㓜􅀌自力爲學家於洛陽性沉厚不妄交逰洛陽士人徃徃不之識司馬温公撰墓誌召入爲殿中侍御史彈劾無所避兖國公主仁宗之愛女下嫁李瑋薄其夫家甞因忿恚夜開禁門入訴於上獻可奏􅀫衛不可不嚴公主夜叩禁門門者不當聽入并劾奏公主閤宦者竄逐之㑹有新除樞宻副使者當時人有疑論獻可與其僚直以衆言陳上前謂必不可留章十七上卒與俱罷墓誌同知諌院時上有疾太后權同聽政内侍都知任守忠乆用事於中上之立非守忠意乗此與其徒間搆兩宫造播惡言中外恟懼獻可連上兩宫書開陳大義辭情切至由是􅄌孝益篤讒言不得行上疾乆未平獻可請蚤建東宫以安人心旣而上小瘳謙黙未可否事獻可屢乞親萬機攬威福延近臣通下情又請太后間數日一御東殿漸逺庶務自謀安佚㑹小旱因請上親出禱雨使外疑釋然太后旣歸政獻可復言於上今雖專聽斷太后輔佐先帝乆多閱天下事事之大者猶冝􅀜白咨訪然後行示不敢専以報盛徳任守忠謀不售而懼乃更巧爲謟䛕求自入於上獻可曰是不可使乆處左右亟言上數其前後巨惡并其黨史昭錫竄南方因上言大姦已去其餘白日憑恃無禮者冝一切縱捨勿念以安反側墓誌執事建言欲如漢氏故事推尊濮安懿王獻可率僚屬極陳其不可且請治執政之罪積十餘章不聽乃求自貶又十餘章懷知雜御史勑告納上前曰臣言不效不敢居其位上重違大臣又嘉臺官敢直言章留中不下還其勑告屢詔令就職獻可與僚屬具録所上奏草納中書稱不敢奉詔固請即罪上不得已聽以本官出知蘄州墓誌治平元年余與孫覺皆編校史館書籍直舎相對覺過余言曰聞臺官以數言事不用相約以謂言小事不足決去就當共争濮王事不聽則決去蓋是時知雜御史吕誨吕大防范純仁等與諌官司馬光數論孫固庸回王廣淵姦邪不當用其言愈切而用之愈堅事如此􅀋者甚衆凢臺諌官入輙以進呈訖寢之時人謂之訖了范純仁言臺吏亦爲之沮􅎼毎白御史曰某事又訖了也蓋執政方恃權欲一切以阻言者而言者以不能塞聀爲慙且憤故相約如此覺語余時正月􅀄五六間也後數日果聞臺官論濮王事甚急至上元後誨等䟽已七八上不聽遂皆納勑告求罷去家居不復供職而執政方宻啓令禁中自定議尊濮王爲皇故誨等云曽公亮趙槩對范純仁等言禁中已自啇量則知大臣隂與計謀蓋謂此也是月二十間天章閣賞小桃因以勸太后太后有酒所卧閤中内臣髙居簡入褰太后寢幃太后驚起坐居簡與御藥蘇利涉從上至太后榻前拜以書一封進太后求一押字太后酒未解不知書所言何事遂從之故誨等䟽云蘇渉髙居簡眩惑皇太后蓋謂此也旣而書出乃太后命中書尊濮王爲皇等事明日遂奉行太后始知京師諠然下至閭巷亦以爲不可太后力爭不已二十二日乃下詔罷濮王稱皇等事范純仁等欲起供職吕誨曰稱親猶爲吾徒言不用也遂以前後所上九䟽乞付中書求去而誨等遂皆絀矣蓋自至和以後仁宗雖甞屬疾然在位乆熟知人情僞與群臣材性之善惡故雖委事大臣而聽用臺諌官廣開言路使耳目無壅蔽大臣有不法者輙去之故任者雖專亦不能自肆治平􅀄英宗新即位多不豫任事益專始欲快意因用王疇爲樞宻副使知制誥錢公輔封還辭頭遂絀公輔爲滁州團練副使知制誥祖無擇亦封還辭頭又罸無擇銅三十斤而制遂行是時凡臺諌官言事一切不聽或盡逐臺官不留一人京師爲之語曰絶市無臺官其蔽至於如此然人主猶采物論朝廷正人未盡去公議有所屬故言事者斥逐相望而後來者其言愈厲至濮王之事執政議稱王爲考是也遂欲稱王爲伯陋矣蓋兩言者各率其私意而不知考據於載籍皆不學之過故各有得失然爭論至於紛紜連年洶洶者蓋由言路不通人情憤惋故至於此者皆執政自用好勝激之使然也南豐雜識吕獻可以追尊濮園事擊歐陽公如曰首開邪議妄引經證以枉道恱人主以近利􅀒先帝者凡十四章具載獻可奏議中司馬文正作序乃首載歐陽公諌臣論以爲誠言文正之意以獻可能盡歐陽公所書諌臣之事使歐陽公無得以怨歟抑以歐陽公但能言之獻可實能行之也不然獻可排歐陽公爲邪反以歐陽公之論序獻可之奏又以爲誠言可乎歐陽公晚著濮議一書専與獻可諸公辨獨歸過獻可爲甚矣邵氏後録上素聞其彊直擢爲天章閣待制復知諌院遷諌議大夫權御史中丞是時有侍臣棄官家居者朝野稱其材以爲古今少倫天子引叅大政衆皆喜於得人獻可獨以爲不然衆莫不怪之居無何新爲政者恃其材棄衆任已厭常爲竒多變更祖宗法専汲汲歛民財所愛信引抜時或非其人天下大失望獻可屢争不能得乃抗章悉條其過失且曰誤天下蒼生必此人如乆居廟堂必無安静之理又曰天下本無事但庸人擾之上遣使諭解獻可執之愈堅乃罷中丞出知鄧州墓誌熈寜間王介甫􅀄拜叅知政事神考方厲精求治一日紫宸早朝二府奏事頗乆日刻旣晏例隔登對官於後殿湏上更衣復坐以次賛引時吕獻可任御史中丞將對於崇政而司馬温公爲翰林學士侍講邇英閤亦將趨資善堂以俟宣召相遇於路並行而北温公宻問曰今日請對欲言何事獻可舉手曰䄂中彈文乃新叅也温公憚然曰以介甫之文學行義命下之日衆皆喜於得人奈何論之獻可正色曰君實亦爲此言耶王安石雖有時名上意所向然好執偏見不通物情輕信難回喜人佞巳聽其言則美施於用則踈若在侍從猶或可容置諸宰府則天下必受其弊矣温公又諭之曰與公素爲心交苟有所懷不敢不盡今日之論未見有不善之迹似傷怱遽或别有章䟽願先進呈姑留是事更加籌慮可乎獻可曰上新嗣位冨於春秋朝夕所與謀議者二三執政而已苟非其人將敗國事此乃心腹之疾治之惟􅂲不及顧可緩邪語未竟閤門吏抗聲追班乃趨而去温公退自經筵黙坐玉堂終日思之不得其說旣而縉紳間寖有傳其章䟽者徃徃偶語竊議疑其太過未幾聞中書置三司條例司平日介甫之門躁進謟䛕之士悉辟召爲僚屬日相與講議於局中以經綸天下爲已任始變更祖宗法専務聚歛造出條目頒於四方妄引周官蔽其誅剥之實輔弼大臣異議不可囬臺諌從官力爭不能奪州縣􅁥司奉行㣲忤其意則譴黜隨之於是百姓騷然矣然後前日之議者始愧仰歎服以爲不可及而獻可終縁兹事出知鄧州嗚呼行僻而堅言僞而辯學非而􅀶順非而澤唯孔子乃能識之雖子貢之賢有所不知也方介甫自小官以至禁從其學行名聲􅁀著於天下乆矣士大夫識與不識咸想聞其風且曰朝廷不用則已用之則必能推其所學以致太平及叅大政中外相賀而獻可獨不以爲然衆莫不怪之巳而考其行事卒如所料非明智不惑傑出於丗俗之表何以及此易曰知機其神乎又曰㡬者動之微􅁻之先見者也獻可有焉温公旣辭副樞之命退居洛陽毎論當丗人物必曰吕獻可之先見范景仁之勇决皆予所不及心誠服之故作范景仁傳蓋景仁之勇决得温公之傳而後明獻可理文雖亦成於公手然止載其平生大節而自相論難之語不欲詳著故獻可之先見天下莫有知者予甞從學於温公親聞其說懼賢者之髙論逺識遂將淪􅃿無傳於丗乃書蜀公之傳後以貽樂善之君子云劉諫議集又聞見録云神宗天資節儉因得老宫人言祖宗時妃嬪公主月俸至㣲嘆其不可及王安石獨曰陛下果能理財雖以天下自奉可也帝始有意主靑苗助􅃥之法矣安石之術􅀋如此故吕誨中丞彈章曰外示朴野中懷狡詐獻可雖在外遇朝廷有大得失猶言之不置㑹有疾奏乞閑官歸郷里朝旨未許乃乞致仕墓誌􅀄正惠公薨其家日益貧獻可旣仕常分俸之半以給宗族之􅀌􅊔者室無餘貲所以自奉飬至儉薄其治民主於惠利而疾姦􅁀大抵槩以公平故所至人安之屢爲言職其奏草存可見者几二百八十有九歴觀古人有能得其一二巳可載之列傳垂示後丗在獻可曽何足道前後三逐皆以迕犯大臣所與敵者莫非秉大權天子所信嚮氣勢軋天下獻可視之􅀂無所睹正色直辭指數其非不去不巳旁側爲之股栗而獻可處之自如平居容皃語言恂恂和易使之不得位於朝人不過以謹厚長者名之而巳矣及遇事苟義所當爲疾趨徑前如救焚溺所不當爲畏避逺去如顧䧟穽惟􅂲墜焉晚年病卧洛陽猶旦夕憤嘆以天下事爲憂過於在位任其責者曽不念其身之病子孫之貧也嗚呼今之丗愛君憂民發於誠心無所爲而爲之可巳而不巳始終不變有如獻可者能㡬人邪故其􅃿之日天下識不識皆咨嗟痛惜彼其心豈獨私於獻可哉墓誌獻可病自草章乞致仕曰臣無􅀫疾偶值醫者用術乖方殊不知脉􅃸有虚實隂陽有逆順診察有標夲治療有先後妄􅄬湯劑率任情意差之指下禍延四枝寖成風痺遂艱行歩非秪憚􅏓盭之苦又將虞心腹之變勢巳及此爲之奈何雖然一身之㣲固未足恤其如九族之託良以爲憂是思納禄以人偷生不俟引年而還政蓋以一身之疾喻朝政之病也温公康節日就卧内問疾獻可所言皆天下國家之事憂憤不能忘未甞一語及其私也一日手書託温公以墓銘温公亟省之巳瞑目矣温公呼之曰更有以見屬乎獻可復張目曰天下事尚可爲君實勉之温公誌其墓未成河南監牧使劉航仲通自請書石旣見其文遲囬不敢書仲通之子安丗曰成吾父羙可乎代書之仲通又隂祝獻可諸子勿摹本􅂲非三家之福時用小人蔡天申爲京西察訪置司西都天申厚賂䥴工得夲以獻安石天申􅀄欲中温公安石得之掛壁間謂其門下士曰君實之文西漢之文也獻可忍死謂温公以天下尚可爲當自愛後温公相天下再致元祐之盛獻可不及見矣天下誦其言而悲之至温公薨獻可之子由庚作挽詩云地下􅀂逢中執法爲言今日再昇平記其先人之言也聞見外司馬文正公銘公之墓曰有宋名臣言正惠公之孫以忠直敢言克紹其門位則不究道則不􅀒年則不壽名則不朽嗚呼爲人臣爲人嗣始終無愧能厎于是可謂備矣五之五叅政蔡文忠公公名齊字子思其先洛陽人徙家萊州眞宗朝舉進士第一通判兖州直集賢院仁宗初修起㞐注兼御史知雜事入翰林爲學士岀知河南府徙宻州應天府召爲御史中丞擢三司使拜樞宻副使叅知政事岀知頴州薨年五十二公㓜依外舅劉氏能自力爲學州舉進士第一以書薦其里人史防而㞐其次祥符八年眞宗皇帝采賈􅁩置器之􅀃試禮部所奏士讀至公賦有安天下意歎曰此宰相器也凡貢士當賜第者考定必召其髙第數人並見又叅擇其材質可者然後賜第一及公召見衣冠偉然進對有法天子以爲無能過者亟以第一賜之歐公撰行狀又歸田録云眞宗好文雖以文辭取士然必視其形神器識或取其所試文辭有理趣者徐奭鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上㞐實取王臣之威重蔡齊置器賦云安天下於覆盂其功可大皆以爲第一蔡文忠公喜酒飲量過人旣登第通判濟州日飲醇酎徃徃至醉是時太夫人年巳髙頗憂之一日山東賈存道先生過濟文忠館之數日先生愛文忠之賢慮其以酒廢學生疾乃爲詩示文忠曰聖君恩重龍頭選慈母年髙鶴髮垂君寵母恩俱未報酒如成病悔何追文忠矍然起謝之自是非親客不對酒終身未甞至醉澠水燕談賈同字希德門人私謚曰存道先生通判兖州太守王臻治政嚴急喜以察盡爲明公務爲裁損濟之以寛獄訟爲之不􅁈逾年通判濰州民有告某氏刻僞稅印爲姦利者巳逾十年蹤跡連蔓至數百人公歎曰盡利於民民無所逃是爲政者之過也爲緩其獄得減死者十餘人餘皆釋而不問濰人皆曰公德於我使我自新爲善人由是風化大行行狀眞宗新棄天下天子諒隂不言丁􅀳公用事專權欲邀致公許以知制誥公拒不徃已而冦萊公王文康公皆以不附連黜公歸歎曰吾受先帝之知至於此豈冝爲權臣所脅得罪非吾懼也旣而􅀳公敗士嘗爲其用者皆恐懼獨公終無所屈行狀太后修景德寺成詔公爲記而宦者羅崇勲主營寺事使人隂謂公曰善爲記當得叅知政事公故遲之頗乆使者數趣終不以進崇勲怒讒之太后行狀莊獻明肅皇太后崩議尊楊太妃爲太后垂簾聽政議决召百官賀公曰天子明聖奉太后十餘年今始躬親萬事以慰天下之心豈冝女后相繼稱制且自古無有固止不追班太妃卒不預政止稱太后於宫中行狀京師有指荆王爲飛語者内侍省得三司小吏鞠之連及數百人上聞之大怒詔公窮治迹其所來無端而上督責愈急有司不知所爲京師爲之恐動公以謂繆妄之􅀃起於小人不足窮治且無以慰安荆王危疑之心奏䟽論之一夕三上上大悟乃可其奏止笞數人而巳中外之情乃安行狀南海蠻酋虐其部人部人欵冝州自歸者八百餘人議者以爲不可納冝還其部公獨以爲蠻去殘酷而歸有德且以求生冝内之荆湖賜以間田使自營今縱却之必不復還其部苟散入山谷當爲後患爭之不能得其後數年蠻果爲亂行狀郭皇后廢京師冨人陳氏女有色選入宫爲后公爭之以爲不可自辰至巳辨論不巳上意稍悟遂還其家河决橫壠改而北流議者以爲當塞公曰水性下而河北卑順其所趣以導之可無澶滑壅潰之患而貝愽數州得在河南於國家便但理堤護魏州而已從之澶滑果無患契丹􅀕天於幽州以兵屯界上界上驚搔議者欲發大軍以備邊公獨料其必不動後卒無事公在大位臨事不回無所牽畏而恭謹謙退未甞自伐天下推之爲正人縉紳之士􅀝以爲朝廷重行狀錢惟演作樞宻直學士題名記附離丁謂輒去冦凖姓氏云逆凖不書公言於仁宗曰冦凖社稷之臣忠義聞天下豈可爲姦黨所誣哉遂令磨去公之卒故吏朱宷至潁潁之吏民見宷泣於馬前指公嘗所更歷施爲曰此公之迹也其爲政有仁恩所至如此平生喜薦士如楊偕郭勸劉隨龐籍叚少連比比爲當丗名臣公爲人神色明秀須眉如􅀞精學愽問寛大沉黙一言之岀終身可復行狀仲淹自布素從公遊見公岀處語黙無一不善門中奉親日視其色諸父昆弟愛之如傷先朝采㧞以輔相器之當遺弓之初公懷哀慕不能食者數日家人視其衾衣涕泗霑濕公病汝隂聞拓拔僣稱嘻吁感槩教弟禀言西事甚詳蓋忠孝之性發之天也公於親舊間雖死生不易有􅀌遺者爲之嫁娶又好學無倦尤以名教爲急孔子之後丗襲文宣公而宰曲阜乾興中四十九代孫承祐卒遂廢十餘年公聞承祐有母弟在抗章請復其嗣有詔從之其立朝也能清其心髙其行未嘗取於人兩㞐憲臺方嚴不動百辟畏其風權戚有過則彈劾不隱未甞求其下也在政府浩然示至公於中外以進賢爲樂以天下爲憂見佞色則嫉聞善言必謝孜孜論道以致君堯舜爲心與大臣㞐和而不􅀝正而不訐無親踈之間有方大之量朝廷爲之重刑賞爲之平范文正公撰墓誌五朝名臣言行録卷第五之五
