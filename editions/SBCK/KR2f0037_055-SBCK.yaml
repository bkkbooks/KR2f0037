body:
  text: 九之九侍讀孫公公名甫字之翰許州陽翟人初舉進士得同學究岀身再舉及第華州觀察推官知絳州翼城縣辟永興軍司録監益州交子務入爲祕閣校理改右正言知諫院岀知鄧州徙安州歷江東兩浙轉運使知陜州徙􅀳州爲河東轉運使三司度支副使嘉祐元年以天章閣待制兼侍讀卒年六十公爲華州推官轉運使李紘薦其材遷大理寺丞知絳州翼城縣故丞相杜祁公與紘皆以清節自髙尤難於取士聞公紘所薦也數招致之一見大喜巳而祁公自御史中丞知永興軍辟公司録凡事之繁猥者一以委之公歎曰待我以此可以去矣祁公爲謝顧事非它吏不能者不敢煩公公乃從容爲陳當丗之務所以緩急先後施設之冝又多薦士之賢而在下者於是祁公自以爲得益友歐陽公撰墓誌監益州交子務蜀用鐵錢民苦轉貿重故設法書紙代錢以便市易轉運使以僞造犯法者多欲廢不用公曰交子可以僞造錢亦可以私鑄私鑄有犯錢可廢乎但嚴治之不當以小仁廢大利後卒不能廢祁公爲樞宻副使薦于朝得祕閣校理是時諸將兵討靈夏乆無功天下騷動盗賊數入州縣殺吏卒吏多失職而民􅁦矣天子方銳意更用二三大臣乃極選一時知名士増置諫官使􅀘闕失公以右正言居諫院上好納諫諍未甞罷言者而至言宫禁事它人猶湏委曲開諷而公獨曰所謂后者正嫡也其餘皆猶婢爾貴賤有等用物不冝過僣自古寵女色初不制而後不能制者其禍不可悔上曰用物在有司吾恨不知爾公曰丗謂諫臣耳目官所以逹不知也􅀂所謂前丗女禍者載在書史陛下可自知也上深嘉納之保州兵變前有告者大臣不時發之公因力言樞宻使副當得罪使乃杜祁公也邊將劉滬城水洛于渭州部署尹洙以滬違節度將誅之大臣稍主洙議公以謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙公平生所善者也公在諫院所言􅀘益􅀹多是三者其一人所難言其二人所難處者其後言宰相以某事當去者上亟爲罷之因以陳執中爲叅知政事公又言執中不可用由是上難之公遂求解職於是小人不便大臣執政而朋黨之論起二三公相繼去位公亦在論中而辯諍愈切不自疑由是罷諫職以右司諫知鄧州墓誌知諫院因災異言應天在誠行愛民遂請斥浮費岀宫女除别庫之私以寛賦歛初李元昊反河西契丹亦以兵近邊謀棄約任事者於西方益禁兵二十萬北方益土兵亦二十萬又益禁兵四十指揮及群盗張海等劫京西江淮皆警是時巳更用大臣矣又令天下益禁兵公言曰天下所以大困者在浮費而浮費之廣者兵爲甚今不能損又可益之耶且兵巳百萬矣不能止盗而但欲多兵豈可謂知所先後哉不報於是極論古今養兵多少之利害以聞語詆大臣􅀹切旣而保州有兵變朝廷賞先言者公以謂有先言者而樞宻院不以時下不可以無責天子曰某吾方􅀝以治也不可使去位公猶固請議其罰又云公始爲杜丞相所知慶曆之間二三大臣又與公同心任事然論保州之變則所指者蓋杜公非益兵之議則所詆者蓋二三大臣也其不偏於所好如此行狀慶曆中孫甫蔡襄爲諫官言宰臣晏殊役官兵治邸舎懷安苟且無向公之心遂罷殊政事而甫等因薦冨弼代殊上怒以謂進用宰相人主之任臣下不冝有所指陳遂相陳執中而甫等極言執中不可用不聽則相與求罷爲外官不許遂請退自陳上曰卿等言一不聽則求去令朕有逐言者名自爲計則善也甫自陳以私便求岀襄亦以養親爲言先是襄嘗乞告至莆田迎親而親不果來至是上乃曰卿昨迎親不來何不遂留侍養襄惶恐不能對甫徐進曰蔡襄所以辭親逺來事陛下冀萬一有禆􅀘今言旣不行蔡襄是以湏却思歸去養親南豐􅄂識孫之翰言慶曆中上用杜衍范仲淹冨弼韓􅄾任政事而以歐陽脩蔡襄及甫等爲諫官欲更張庶事致太平之功仲淹亦皆戮力自効欲報人主之知然好同惡異不能曠然心無適莫甫嘗家居石介過之問介適何許來介言方過冨公問冨公何爲介曰冨公言􅅬宗諒守慶州用公使錢坐法杜公則欲致宗諒重法不然則衍不能在此范公則欲薄其罪曰不然則仲淹請去冨公欲抵宗諒重法則懼違范公欲薄其罪則懼違杜公患是不知所决甫曰守道以謂如何介曰介亦􅀼患之甫廼嘆曰法者人主之操柄今冨公患重罪宗諒則違范公薄其罪則違杜公是不知有法而未嘗意在人主也守道平生好議論自謂正直亦安得此言乎因曰甫少而好學自度必難用於丗是以退爲唐史記以自見而屬爲諸公牽挽使備諫官亦甞與人自謀去就而所與謀者適好進之人遂見誤在此今諸公之言如是甫復何望哉自此凢月餘不能寐慶曆之間任事者其後余多識之不黨而知其過如之翰者則一人而巳矣南豐􅄂識知􅀳州近臣過􅀳夜半叩城欲入公曰城有法吾不得獨私終不爲開門行狀初謝絳知鄧州有惠政慶曆中范仲淹洎甫相繼守郡皆號循吏好教育士􅀋今翰林學士賈黯鄧人也甞善三公之爲人因爲創三賢堂於百花洲名臣傳公素羸性澹然寡所好欲恂恂似不能言而内勁果遇事精明議者謂公道德文學冝在朝廷備頋問而錢􅂖刀筆非其職然公處之益辦至臨疑獄滯訟常立得其情大賊張海郭貌山攻劫啇鄧新破南陽順陽公安輯有方常曰教民知戰古法也乃親閱縣弓手教之擊射坐作皆爲精兵盗賊爲息陜當東西衝吏苦厨傳而前爲守者顧毀譽不能有所損至公痛裁節之過客畏其清初無所望而亦莫之毀也陜人賴以紓後遂爲法行狀云隣州􅀊時以酒相慶問公命儲别藏備官用一不歸于巳今遂爲法其爲轉運使所至州縣視其職事脩廢察其民樂否以此陞黜官吏而不納毀譽遇下雖嚴而不害其在兩浙范文正公守杭州以大臣或便冝行事公曰范公貴臣也吾屈於此則不得伸於彼矣由是一切繩以法而常以監司自處范公遇公無倦色及退而不能無恨公遇范公不少下然退而未甞不稱其賢也墓誌公雖貴而衣食薄無妾媵不飾玩好不與酣樂泊如也時從當丗處士講評以爲得其好而客或造其席者與之言終日不能以􅀔利及也行狀公喜接士務揚人善所得俸廪多所施與撫諸􅀌兒教育如己子墓誌孫之翰人嘗與一硯直三十千孫曰硯有何異而如此之價也客曰硯以石潤爲賢此石呵之則水流孫曰一日呵得一檐水纔直三錢買此何用竟不受筆談公􅀶學彊記􅀹喜言唐事能詳其君臣行事夲末以推見當時治亂每爲人􅀃如其身履其間而聽者曉然如目見故學者以謂終􅀊讀史不如一日聞公論也所著唐史記七十五卷論議閎贍書未及成公旣卒詔取其書藏于祕府墓誌司馬温公書公唐史記後云孫公昔著此書甚自重惜常别緘其藁於笥必盥手然後啓之謂家人曰萬一有水火兵刀之急它貨財盡棄之此笥不可失也毎公私少間則增損改易未嘗去手其在江東爲轉運使岀行部亦以自隨過亭傳休止輙取脩之會宣州有急變乗馹遽徃不暇挈以俱旣行於後金陵大火延及轉運廨舎弟子察親􅀒其笥避於沼中島上公在宣州聞之亟還入門問曰唐書在乎察對曰在乃恱餘無所問自壯年至于白首乃成亦未以示人文潞公執政嘗從公借之公不與但録姚崇宋璟論以與之況它人固不得見也蘇内翰荅李廌書云録示孫之翰唐論僕不識之翰今見此書凛然得其爲人至論禇遂良不譛劉洎太子瑛之廢由張􅀃張廵之敗縁房琯李光弼不當圖史思明宣宗有小善而無人君大略皆舊史所不及也歐陽公銘公之墓曰惟學而知方以行其義惟簡而無欲以遂其剛力雖弱兮志則彊
