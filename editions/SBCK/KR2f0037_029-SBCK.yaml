body:
  text: 五之二叅政趙清獻公公名抃字閱道衢州西安人舉進士爲武安軍節度推官知建州崇安縣通判泗州擢爲殿中侍御史出知睦州移梓州路轉運使改益州路召爲右司諌出知䖍州召爲侍御史知雜事爲河北都轉運使以龍圖閣直學士知成都府神宗即位召知諌院未幾擢右諌議大夫叅知政事累章乞罷以資政殿學士知杭青二州進大學士知成都府知越州又徙知杭州元豐二年告老加太子少保致仕薨年七十七公爲武安軍推官有僞造印者吏皆以爲當死公獨曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死一府皆服蘇内翰撰神道碑以母越國太夫人䘮廬于墓三年不􅀫于家縣榜其所居里爲孝弟處士孫處爲作孝子傳神道碑通判泗州泗守昬不事事􅁥司欲罷遣之公獨左右其政而晦其所以然使若權不已出者守得以善罷神道碑曽公亮爲翰林學士未識公而以臺官薦召爲殿中侍御史彈劾不避權幸京師號公鐵面御史其言常欲朝廷别白君子小人以謂小人雖小過當力排而絶之後乃無患君子不幸而有詿誤當保持愛惜以成就其徳故言事雖切而人不厭神道碑温成皇后方葬始命叅知政事劉沆􅁥護其􅃥及沆爲相而領事如故公論其當罷以全國體復言宰相陳執中不學無術且多過失章十二上執中卒罷去神道碑又記聞云趙抃上言陳相不學亡術措置㒹倒引用邪佞招延卜祝私讎嫌􅂩排斥善良很愎任情家聲狼藉等八事先是吕溱出守徐蔡襄守泉吴奎守壽韓絳守河陽已而歐陽脩乞蔡賈黯乞荆南公即上言近日正人賢士紛紛引去憂國之士爲之寒心侍從之賢如脩輩無幾今皆欲請郡者以正色立朝不能謟事權要傷之者衆矣脩等由此不去一時名臣頼之以安神道碑知睦州睦􅀊爲杭市羊公爲移文却之民籍有茶稅而無茶地公爲奏蠲之民至今稱焉神道碑西蜀地逺而民弱吏恣爲不法州郡以酒食相饋餉衙前治厨傳破家相屬也公身帥以儉不從者請以違制坐之蜀風爲之一變窮城小邑民或生而不識使者公行部無所不至父老驚喜相慰姦吏亦竦神道碑宋庠爲樞宻使選用武臣多不如舊法公陳其不可陳升之除樞宻副使公與唐介吕誨范師道同言升之交結宦官進不以道章二十餘上不省即居家待罪詔強起之乃乞􅀘外二人皆相次去位公與言者亦罷神道碑公得䖍州地逺而民好訟人謂公不樂公欣然過家上冢而去旣至遇吏民簡易嚴而不苛悉召諸縣令告之爲令當自任事勿以事諉郡苟事辦而民恱吾一無所問令皆喜爭盡力䖍事爲少獄以屢空改修鹽法踈鑿贛石民頼其利䖍當二廣之衝行者常自䖍易舟而北公間取餘材造舟得百艘移二廣諸郡曰仕宦之家有父兄没而不能歸者皆移文以遣當具舟載之至者旣悉授以舟復量給公使物歸者相繼於道神道碑賈昌朝以使相判大名府公欲按視府庫昌朝遣其屬來告曰前此􅁥司未有按視吾事者公雖欲舉職􅂲事有不應例奈何公曰捨大名則列郡不服矣即徃視之昌朝􅀄不說也前此有詔募義勇過期不足者徒二年州郡不時辦官吏當坐者八百餘人公􅀍旨督其事奏言河朔頻􅀊豐熟故募不如數請寛其罪以俟農􅂩從之坐者得免而募亦隨足昌朝乃愧服曰名不虚得矣神道碑神宗即位召知諌院故事近臣自成都還將大用必更省府不爲諌官大臣爲言上曰用趙抃爲諌官頼其言爾苟欲用之何傷及謝上謂公聞卿匹馬入蜀以一琴一􅀛自隨爲政簡易亦稱是耶公知上意將用其言即上䟽論吕誨􅀓堯俞范純仁吕大防趙瞻趙鼎馬黙皆骨鯁敢言乆譴不復無以慰縉紳之望上納其說郭逵除簽書樞宻院事公議不允公力言之即罷神道碑居三月擢右諫議大夫叅知政事感激思􅁬面議政事有不盡者輙宻啓聞上手詔嘉之公與冨弼曽公亮唐介同心輔政率以公議爲主㑹王安石用事議論不恊旣而司馬光辭樞宻副使臺諌侍從多以言事求去公言朝廷事有輕重體有大小財利於事爲輕而民心得失爲重青苗使者於體爲小而禁近耳目之臣用捨爲大今不罷財利而輕失民心不罷青苗使者而輕棄禁近耳目去重而取輕失大而得小非宗廟社稷之福臣􅂲天下自此不安矣言入即求去神道碑至和中范景仁爲諌官趙恱道爲御史以論陳恭公事有􅂩熈寜中介甫執政恨景仁數訐之於上且曰陛下問趙抃即知其爲人他日上以問恱道對曰忠臣上曰卿何以知其忠對曰嘉祐􅀄仁宗違豫鎭首請立皇嗣以安社稷豈非忠乎旣退介甫謂恱道曰公不與景仁有􅂩乎恱道曰不敢以私害公記聞趙恱道曰介甫毎有中使宣召及賜予所贈之物常倍舊例隂結内侍都知張􅀂水押班藍元振因能固上之寵上使中使二人潜察府界青苗還皆言民便樂之故上堅行盛崇介甫用之不疑又曰晦叔罷中丞之日上諭執政曰王子韶言青苗實不便但臣先與此議不敢論列小人首䑕兩端當黜之介甫徳其獨不叛巳至今未黜也温公日録王荆公􅀄叅政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳趙清獻同叅政事獨折之曰君言失矣如皐夔稷契之時有何書可讀荆公黙然邵氏後録公素號寛厚杭之無頼子弟以此逆公皆駢聚爲惡公知其意擇重犯者率黥配他州惡黨相率遁去未幾徙靑州因其俗朴厚臨以清淨時山東旱蝗自淄齊來及境遇風退飛墮水而盡神道碑五年成都以戍卒爲憂朝廷擇遣大臣爲蜀人所愛信者皆莫如公遂以大學士知成都然意公必辭及見上曰近􅀊無自政府復往者卿能爲我行乎公曰陛下有言即法也顧豈有例哉上大喜公乞以便冝行事即日辭至蜀黙爲經略而燕勞暇如他日兵民晏然一日坐堂上有卒長在堂下公好諭之曰吾與汝年相􅀂也吾以一身入蜀爲天子撫一方汝亦冝清御名畏戢以帥衆比戍還得餘貲持歸爲室家計可也人知公有善意轉相告語莫敢復爲非者神道碑劒州民李孝忠集衆二百餘人私造符牒度人爲僧或以謀逆告獄具公不􅂌法吏以意决之處孝忠以私造符牒餘皆得不死喧傳京師謂公脫逆黨朝廷取具獄閱之卒無以易也茂州蕃部鹿明玉等蠭聚境上肆爲剽掠公亟遣部將帥兵討之夷人驚潰乞降願殺婢以盟公使喻之曰人不可用三牲可也使至巳縶婢引弓將射心取血聞公命讙呼以聽事訖不殺一人神道碑趙清獻公􅀄任成都携一􅀛一鶴以行其再任也屏去􅀛鶴止一蒼頭執事張公􅁉學士送以詩云馬諳舊路行來滑􅀛放長河不共來吕氏家塾記吴越大饑民死者過半公盡所以救荒之術發廪勸分而以家貲先之民樂從焉生者得食病者得藥死者得藏下令脩城使民食其力故越人雖饑而不怨復徙治杭旱與越等其民􅀹病旣而朝廷議欲築其城公曰民未可勞也罷之神道碑南豐集有趙公越州救災記趙閱道熈寜中以大資政知越州兩浙旱蝗米價踊貴餓死者十五六諸州皆牓衢路立賞禁人増米價閱道獨牓衢路令有米者任増價粜之於是諸州米商輻湊詣越米價更賤民無餓死者閱道治民所至有聲在成都杭越尤著記聞公平生不治産業嫁兄弟之女以十數皆如已女在官爲人嫁􅀌女二十餘人居郷葬􅁀骨及貧無以歛且葬者施棺給薪不知其數少育於長兄振振旣􅃿思報其徳將遷侍御史乞不遷以贈振大理評事公爲人和易温厚周旋曲宻謹繩墨蹈規矩與人言如􅂲傷之平生不畜聲􅇊晚􅀊習爲養氣安心之術翛然有髙舉意將薨晨起如平時子㞦侍側公與之訣詞色不亂安坐而終不知者以爲無意於丗也然至論朝廷事分别邪正􅁣然不可奪宰相韓􅄾甞稱趙公眞丗人摽表蓋以爲不可及也神道碑公爲吏誠心愛人所至崇學校禮師儒民有可與與之獄有可出出之治䖍與成都􅀹爲丗稱道要之以惠利爲本然至於治杭誅鋤強惡姦民屏迹不敢犯蓋其學道清心遇物而應有過人者矣神道碑韓忠獻公之守安陽人將闘訟輙自止曰吾非畏汝慙見侍中耳郡幾至無事趙清獻再守錢塘天下劇郡清獻公從容爲之其政本於愷悌然不嚴而肅民莫敢犯議者謂二公治民雖西京所稱循吏不能過也吕氏家塾記趙清獻公平生日所爲事夜必衣冠露香九拜手告于天應不可告者則不敢爲也聞見後録蘇内翰銘公之碑曰蕭望之爲太􅀓近古社稷臣其爲馮翊民未有聞黄覇爲頴川治行第一其爲丞相名不迨昔孰知清獻公無適不冝􅀖之司直民之父師其在官守不専於寛時出猛政嚴而不殘其在言責不專於直爲國愛人掩其疪疾盖東郭順子之清孟獻子之賢鄭子産之政晉叔向之言公兼而有之不幾於全乎五之三叅政魯肅簡公公名宗道字貫之亳州譙人舉進士歷濠州定逺尉秀州海鹽令通判河陽天禧元年擢右正言仁宗爲皇太子除兼諭德及即位兼侍講判吏部流内銓拜右諫議大夫叅知政事居位七年薨仁宗在東宫魯肅簡公爲諭德其居在宋門外俗謂之浴堂巷有酒肆在其側號仁和酒有名於京師公徃徃易服微行飲于其中一日眞宗急召公將有所問使者及門而公不在移時乃自仁和肆中飲歸中使遽先入白乃與公約曰上􅀂恠公來遲當託何事以對幸先見教冀不異同公曰但以實告中使曰然則當得罪公曰飲酒人之常情欺君臣子之大罪也中使嗟歎而去眞宗果問使者具如公對眞宗問公何故私入酒家公謝曰臣家貧無器皿酒肆百物具備賔至如歸適有郷里親客自逺來遂與之飲然臣旣易服市人亦無識臣者眞宗􅀏曰卿爲宫臣恐爲御史所彈然自此竒公以爲忠實可大用晚年每爲章獻明肅太后言群臣可大用者數人公其一也後章獻皆用之歸田録魯宗道爲正言事有違誤風聞彈䟽眞宗稍厭之宗道一日自訟於上前曰臣在諫列而諫守臣職也陛下以數而厭之豈非事納諫之虚名俾臣尸素苟禄乎臣竊媿之願得罷去上恱其忠慰勉以遣他日追念其言御筆題殿壁曰魯直掇遺章獻太后臨朝魯肅簡公屢有獻替太后問唐武后何如主對曰唐之罪人也幾危社稷太后黙然時有上言請立劉氏七廟者太后以問輔臣衆不敢對公獨曰不可退謂同列曰􅀂立劉氏七廟如嗣君何帝太后將同幸慈孝寺欲以大安輦前帝行公曰婦人有三從在家從父嫁從夫夫殁從子太后乃命輦後乗輿行執政多任子於館閣讀書公曰館閣育天下英才豈䊵袴子弟得以恩澤處耶吾子誠㓜巳任京官然終不使慁國恩樞宻使曹利用恃權驕橫公屢折之帝前時貴戚用事者莫不憚之目爲魚頭叅政因其姓且言骨鯁如魚頭也魯肅簡公立朝剛正嫉惡少容在政府七年務裁抑僥倖不以名器私人及薨太常謚曰剛簡議者不知爲美謚以爲因謚譏之竟改爲肅簡公與張文節公知白當垂簾之際同在中書二公皆以清節直道爲一時名臣而魯􅀹簡易􅀂曰剛簡􅀹得其實也歸田録
