body:
  text: 十三之三諌議陳忠肅公公名瓘字瑩中南劒州沙縣人中元豐二年進士甲科爲湖州書記簽書鎭東軍判官事除太學􅀶士辭不就紹聖初復除􅀶士袐書省校書郎通判滄州除著作佐郎樞宻院編脩官皆辭不赴差知衛州徽宗即位召除右正言遷右司諫責監楊州粮料院改知無爲軍復召爲著作郞實録院檢討官辭史局除右司貟外郎以上宰相書責監建州武夷觀坐黨籍除名勒停送􅀽州編管崇寧元年移送㢘州量移郴州得自便以子正彚事逮繫詔獄送通州安置坐進尊堯集送台州編管復宣教郎主管江州太平觀令居南康軍徙楚州宣和六年卒靖康中贈諌議大夫紹興中特賜謚公爲越州簽判蔡卞爲帥待公甚厚每以公學識卓異待遇加禮而公已得其心術常欲踈逺之屢引疾㝷醫章不得上㑹明倅闕蔡㑭公權攝以時當得職田意公方貧必喜於少紓公到明遂伸㝷醫之請將所得圭租遜前官明州以法當公得公以義不當受卒不取而歸之官廪􅀄卞甞爲公語張懐素道術通神雖飛禽走獸能呼遣之至言孔子誅少正卯彼甞諌以爲太早漢楚成皐相持彼屢登髙觀戰不知其嵗數殆非世間人也公毎竊􅀏之及將往四明而懐素且來㑹稽卞留公少俟公不爲止曰子不語怪力亂神以不可訓也斯近怪矣州牧旣甚信重士大夫又相謟合下民視之從風而靡使眞有道者固不願此不然不識之未爲不幸也後二十年懐素敗多引名士或欲因是染公竟以㝷求無迹而止非公素論守正則不免於羅織矣遺事紹聖􅀄章申公以宰相召道過山陽公適相遇隨衆謁之章素聞公名獨請登舟共載而行訪以當世之務公曰請以所乗舟爲諭偏重其可行乎移左置右其偏一也明此則可行矣章黙然未荅公復曰上方虚心以待公公必有以副上意者敢問將欲施行之叙以何事爲先何事爲後何事當緩何事當急誰爲君子誰爲小人諒有素定之論願聞其略章復竚思良乆曰司馬光姦邪所當先辨無急於此公曰相公悮矣此猶欲平舟􅀔而移左以置右也果然將失天下之望矣章厲色視公曰光輔母后獨宰政柄不務纂紹先烈肆意大改成緒悮國如此非姦邪而何公曰不察其心而疑其迹則不爲無罪若遂以爲姦邪而欲大改其已行則誤國益甚矣乃爲之極論熈豐元祐之事以爲元豐之政多異熈寧則先志固已變而行之温公不明先志而用母改子之說行之太遽所以紛紛至於今日爲今之計唯當絶臣下之私情融祖宗之善意消朋黨持中道庶乎可以救弊若又以熈豐元祐爲說無以厭服公論恐紛紛未艾也辭辯淵源議論勁正章雖迕意亦頗驚異遂有兼取元祐之語留公共飯而別章到闕召公爲太學愽士公聞其與蔡卞方合知必害於正論遂以婚嫁爲辭乆乃赴官於是三年不迁遺事􅀛山語録云􅉷中言宰舟事最好然元祐舟不知爲甚樁得太重及紹聖時不知却如何亦偏多載了據此兩舟所載者因何物得重今當減去何物則適平若􅀍人問到此湏有處置始得如是夲分處置得事之人必湏有規矩䋲墨一一調和得是不令錯了若只說得揔腦便休亦不濟事孟子言天下可運於掌如彼所言天下誠可運於掌也公爲太學􅀶士薛昂林自之徒爲正録皆蔡卞之黨也競推尊荆公而擠排元祐禁戒士人不得習元祐學術卞方議毀資治通鑑板公聞之因䇿士題特引序文以明神考有訓於是林自駭異而謂公曰此豈神考親製耶公曰誰言其非也自又曰亦神考少年之文爾公曰聖人之學得於天性有始有卒豈有少長之異乎自辭屈愧歉遽以告卞卞乃宻令學中置板髙閣不復敢議毀矣遺事紹聖大臣嫉元祐更改王荆公已行之法乃用繼述之說以爲形跡先朝追貶司馬温公等加以不孝之名上謗宣仁事傷國體公時爲太學􅀶士􅀍㫖賜對其奏劄曰道常然而不渝事有弊則必變故堯舜禹皆以若稽古爲訓若者順而行之稽則考其當否或若或稽必使合於民情所以成帝王之治也造􅂰之言遂明繼述之義且論天子之孝與士大夫不同㤗陵喜所未聞反復詰問語遂移時迫於進饍公乃引退上意感悟約公再見有變更時事之意執政聞而恨之遂黜公于外㤗陵聖顔英睿臣下奏對往往懾於天威少或契合公始召見遽以人所難言逆意開陳辭逹義明使人主豁然感寤由是搢紳士夫罔不欽服蘇黃門聞之撫几歎曰吾兄東坡最善論事然亦不知出此遂以書抵公歎譽甚至遺事又聞見録云陳瑩中紹聖􅀄用章惇薦爲太學􅀶士先是惇之妻甞勸惇無修怨惇作相専務報復首起朋黨之禍惇妻死惇悼念不堪􅉷中見惇客甚衆謂惇曰公與其無益悲傷曷若念夫人平生之言蓋譏惇之報怨也惇以爲忤不復用公甞爲別試所主文林自謂蔡卞曰聞陳瓘欲盡取史學而黜通經之士意欲沮壞國是而動揺荆公之學也卞旣積怒謀將因此害公而遂禁絶史學計畫已定唯候公所取士求疪立說而行之公固預料其如此乃於前五名悉取談經及純用王氏之學者卞無以發然五名之下往往皆􅀶洽稽古之士也公甞曰當時若無矯揉則􅀔必相激史學往往遂廢矣故隨時所以救時不必取快目前也遺事公自館職請外􅀘得倅滄州秩滿移守衛州中間數有薦章兩􅀍内除皆辭不行至紹聖末徽宗即位召爲言事官於是即日就道論章惇蔡明繼述平日之志略行焉遺事公方赴召命至闕聞有中旨令三省繳進前後臣僚章䟽之降出者公謂宰屬謝聖藻曰此必有姦人圗蓋已愆而爲此謀者若盡進入則異時是非變亂省官何以自明因舉蔡京上䟽請滅劉摯等家族及妄言携劒入内欲斬王珪等數事謝驚悚即白時宰録副夲于省中其後京黨欺誣蓋抹之說不能盡行由有此跡不可泯也遺事徽宗初政欲革紹聖之弊以靖國於是大開言路衆議皆以瑶華復位司馬温公等叙官爲所當先公時在諌省獨以爲幽廢母后追貶故相彼皆立名以行非細故也今欲正復當先辯明誣罔昭雪非辜誅責造意之人然後發爲詔令以禮行之庶幾可無後患不冝欲速致悔也朝廷以公論乆鬱且欲快恱人情遽施行之至崇寧間蔡京用事悉改建中之政人乃服公逺慮也遺事公在言路知無不言然議論持平務存大體彈擊不以細故未甞及人私過常言人主託言者以耳目固不當以淺近見聞惑其聦明况以訐爲忠無􅀘於時反傷治體乎遺事公譽望早達自登科不汲汲於仕進元祐紹聖間諸公交薦於朝公御名所主多所退避及後􅀍眷知居言路排姦扶正所指議者往往甞相舉薦故公䟽文有曰在彼則舉爾所知在此則爲仁由已未甞以預薦而入其黨亦不以小故而絶其恩蓋公之意以士人出處不因薦刺而廢公議則朋黨之說無縁而起遺事公因朝㑹見蔡京視日乆而不瞬甞以語人曰京之精神如此它日必貴然矜其禀賦敢敵太陽吾恐此人得志必擅私逞欲無君自肆矣㝷居諌省遂攻其惡京聞公言因所親以自解且致情懇而以甘言啖公公使荅之曰杜詩所謂射人先射馬擒賊湏擒王不得自巳也於是攻之愈力遺事公每謂天下之事變故無常唯稽考往事則有以知其故而應變王氏之學乃欲廢絶史學而咀嚼虚無之言其事與􅀳無異將必以荒唐亂天下矣故彈蔡京䟽文有曰絶滅史學一似王衍重南輕北分裂有萌逮今三十餘年而所言無不驗者遺事公以紹聖史官專據荆公日録以修􅁉陵實録變亂是非不可傳信故居諌省首論其事進日録辯乞改實録又因􅇡責合浦著尊堯集深闢誣妄以明君臣之義然猶止以増加之罪歸于蔡卞蓋公之意以謂荆公已殁宗其說以殖私黨者卞實罪魁救時革弊當以去卞爲先若根源鋤塞則制其流蔓易矣及邪說大行􅀔不可回於是直攻荆公之惡以明禍夲之所在所以復著四明尊堯也雖尊崇宗廟破闢私史立意則同而議論直捷無所廻避則後集乃公之所取以爲正也故公自謂四明尊堯者芻蕘改過之書也後集序文可以備見遺事元城譚錄曰陳瑩中安丗甞薦自代而未甞識而中庸曰道之不行不明也我知之矣智者賢者過之愚者不肖者不及也若瑩中者多失之過如尊堯集先評王荆公爲伊吕聖人之耦而後納諸僣叛不軌之域此學術不粹也其始論荆舒日録也乃歸過蔡卞以爲吾用權道且君子立言行巳當夲之誠此之謂誠可乎春秋書二百四十二年之事善善惡惡或原心定罪則有之何甞有嫁罪誣人之事今欲正一大事而枉筆且誣人是自招曲也如此安有能立者乎又曰當今之務非岀於荆公則入於温公矣元祐諸公所行蓋有未當處不可全用今日之事則固不可用有一道理未甞爲人􅀃恐万一傳去使渠軰先施弓箭而不可不爲吾子言然則救弊之理莫若只宗神考大有不可及者則漸自正韓瓘曰陳瑩中之說固如是也公曰安丗實甞語之以此劉公集有荅陳公書論尊堯集大槩與前說同但其末云報君行巳苟巳無憾而今而後亦可以忘言矣公自諌省謫楊州筦庫以論蔡京交結外戚迕欽聖也􅀍命數日欽聖悔寤遣中使宣諭以非夲旨方且開解主上召還矣賜公度牒十道俾勿遽行繼遂有無爲之命公以京猶在朝廷而復言者差遣是非不辨不敢祗受及京得外􅀘公乃拜命遺事公自右司貟外郎兼權給事中時何相執中爲禮部侍郎一日以間與公曰今早見貴人公即眞矣公即呼正彚示之曰吾與丞相議事多不合今所聞乃爾是欲以官爵相餌也若受其薦進而復有異同則公議私恩兩有愧矣吾有一書將􅄬之以决去就汝其爲我書之又曰郊祀不逺彼不相亮則失汝恩澤能不介意乎正彚再拜願得書公乃大喜明日持以入局未及問丞相約公相見連介催促公留使者少候已而同舎朱世英來公拉之同往朱不知所以丞相見公有同行者有不豫之色公不候坐定遽出書爲獻丞相大怒辯論移時公指事叙言辭色不撓堂吏比肩聳觀朱亦皇恐失措丞相怒甚翹足肆坐語浸驕慢公雍容起白曰瓘之所論者國事是非當付之公議相公未可失待士之禮也丞相整儀無語公遂起竟不聞所以相招者何言信宿遂有海陵之命遺事公自嶺外歸居明州甞令正彚幹蠱錢塘偶聞蔡崈詫說蔡京之福厚其事有動揺東宫之迹不敢隱嘿乃自陳于帥司蔡薿時爲杭帥方與京叙宗盟結死黨遂執正彚送京師而飛書告京俾爲計事下開封制獄獄辭果不右正彚而公亦連逮開封尹李孝偁脅誘公使證正彚之妄公曰正彚聞蔡京將不利於社禝傳於道路遽自陳告瓘豈與知若瓘以所不知忘父子之恩而指其爲妄則情所不忍挾私情以符合其說又義所不爲况不欺不貳平昔所以事君教子豈於利害之際有所貪畏自違其言乎蔡京姦邪必爲國禍瓘固甞論於諌省亦不待今日語言間也時内侍黃經臣監勘聞公所對失聲歎息謂公曰主上正欲得實右司但依此供狀其後獄具正彚猶坐所言過實流竄海島公亦有安置通州之命遺事又聞見録云瑩中爲諫官時爲上皇極言蔡京蔡卞不可用用之决亂天下蔡京深恨之屢竄責例用赦放歸猶􅀠通州一日瑩中之子走京師言蔡京事詔獄下明州捕􅉷中甚急士民哭送之瑩中不爲動入獄見其子􅀍繫笑曰不肖子煩吾一行蔡京用酷吏李孝壽治其事孝壽坐廳事簾中列五木于庭引瑩中問之􅉷中從容曰蔡京之罪瓘實知之不肖子不知也多求􅁓自書孝壽懼以瑩中爲不知情即日放歸再􅀠通州其子配海上公在通州張無盡入相欲引公以自助時置政典局乃自局中奉旨取公所著尊堯集蓋將施行所論而由史局用公也公料其不能成事辭以修寫而未發繼日承政典局牒坐聖旨㑭州郡催促公乃用奏狀進表以黃帕封緘繳申政典局乞於御前開拆或謂公當徑申局中而通書廟堂公曰恨不得直達乙覽豈復可與書耶彼爲宰相有所施爲不於三省公行乃置局建官若自私者人將懷疑而生忌正恐尊堯至而彼巳動揺也逺其迹猶恐不免况以書耶繼而悉如公言張旣罷黜公亦有台州之命責詞謂公私送與張商英意要行用於是衆人服公之逺慮而恠何鄧輩敢欺罔上下也何執中爲宰相鄧洵仁爲執政遺事公謫台州朝旨不下司行移峻急所過州郡皆令兵甲防送不得稽留至台乆之人莫敢以居屋借賃者暫館僧舎而郡守以十日之法每遣廂廵起遣故十日必爲之遷一寺公處之澹然不以介意遺事公到台數月朝廷起遷人石悈知州事且令赴闕之官士論訩訩咸爲將有處分于公也悈至果􅀭言怖公視事次日即遣兵官突來約束不得令岀入取責鄰人防守狀又置邏卒數鋪前後廵察抄録賔客書問之往還者雖親戚家書殆至隔絶未幾復令兵官突來所居搜檢行李攝公至郡郡庭􅂷簾如制獄大陳獄具蓋朝旨取索尊堯副夲而悈爲此以相迫脅耳公知其意遂發問曰今日之事豈􅀍旨耶悈非所料失措而應曰有尚書省劄子卷簾出示公劄子所行蓋取尊堯集副夲以爲係詆誣之書合繳申毀棄也公曰然則朝廷指揮取尊堯集耳追瓘至此復欲何爲因問之曰君知尊堯所以立名乎蓋以神考爲堯而以主上爲舜也助舜尊堯何爲詆誣時相學術淺短名分之義未甚講求故爲人所法使請治尊堯之罪將以結黨固寵也君所得於彼者幾何乃亦不畏公議干犯名分乎請具申瓘此語瓘將顯就誅戮不必以刑獄相恐悈不待公言畢屢揖公退㝷語人曰不敢引其說尚自如此良可畏也繼又幽公於僧舎使小吏監守對榻坐卧窘辱百端人情憂怖慮有不測公安之不以爲撓悈亦終不能爲害遺事公謫台州於法合進謝表台州不爲發遞表未得達而石悈之來聲􅀔甚異公料其必受蔡薿風旨意在得其所􅄬書必將捜索及行李於是爲封事繳謝表封緘於篋題以臣名悈至果如所料而以緘題之故不敢輙開遂以奏御薿與執中皆怒未幾罷之或問公何以審其如此公曰吾於薿􅀄無它薿懷遺書之愧而其黨未必知納忠相捃實自爲計今顯其迹則法使之術不行矣遺事公雖縁蔡氏得罪而首論私史力排王氏王蔡之黨如薛昂蹇序辰何執中鄧洵仁洵武蔡薿之徒皆當時恊力排䧟欲殺公者亦不獨蔡京兄弟而巳蔡薿與公􅀄不相識公上宰相書謫守海陵薿爲太學生以長書遺公論天下事皆合天下之公議遣人致於海陵謂公諌䟽婉而有理似陸宣公剛而不撓似狄梁公文章淵源發明正道則韓文公其人也至次年薿以對䇿爲大魁所陳時務與前書頓異於是愧悔而欲殺公以滅口宻賛京黨岀力􅀹甚正彚三山之竄石悈台州紛紛皆其所爲也遺事公遷責以來杜門不治人事絶迹州郡宴㑹幾三十年所至人情向慕雖田夫野老咸知名願見及自天台歸通川道由㑹稽時王豐甫仲薿爲越帥以公早爲􅄮公所器重具舟檝爲禮􅃸公於郊因共載歸府舎越人聞公赴府㑹競來觀瞻比肩輿歸館道路遮擁幾不可行爲人欽重如此遺事公在台五年屢該赦當自便而刑部不敢檢舉旣而上旨令叙官放還乃因郊霈霑恩然初以宣德郎􅀍謫而叙官乃得承事郎實鐫降也􅀍命之後忽得州牒備坐省劄云奉御批叙復數内陳瓘叙復未當合於見存官外叙一官仍取旨與差遣符州告示夲官知委公旣供知委而來通州將數月又有省劄下通州令公具家狀陳乞差遣人皆賀公以爲起發有漸也公曰此廟堂欺君玩世之術爾若與差遣豈應見問上聞吾叙官不當而見於御批諸公不敢但巳爲此遷延之說以塞上旨家狀雖可供而差遣其可乞耶彼謂吾不堪流落而因兹乞憐爾乃報云家狀昨因削籍毁棄無慿供具事果不行遺事公旣還寓通州時開封尹盛章與石悈以私􅂩詬爭章宻取旨送悈獄以罪編置通州因􅀭言爲公報忿公聞而嘆曰此豈盛丗所宜有耶因謀徙居以避之時縣宰與公姻家而於悈亦沾親悈屬宰求館舎宰以爲疑公謂宰曰親戚患難冝相周旋置此䘏彼乃爲義事無足嫌也宰於是與之盡力悈聞而愧感遣其子來致謝公曰吾爲宰盡親戚忠告之益爾非欲以德報怨也却之不見月餘遂挈家爲江上之逰遺事公泛江至江州愛其江山之勝因卜居于城外杜門不岀謁而來者不拒士大夫經由江上者徃徃不之公府而必到公家公延接無間每爲燕豆之欵踰年歡適忽有朝旨不許岀城月申存在又更易守臣日降不下司文移以俟新守之到外間叵測無不震懼交逰中有來索與公徃復書簡者有碎公所書碑刻牌額者公亦自期以死􅅥息俟命而巳閱數日乃移南康居住蓋縁王宷得罪疾公者乗此時以怖公也劉待制器之聞之以書抵公曰此乃鶴相恐脅濮上之䇿􅇊止此耳遺事公晚年益􅀒天下重名蔡氏之黨必欲殺公以快意時王寀得罪而公適居江州䜛者以爲公來居宷之郷郡因危言䧟公頼徽宗聖察止令移居南康及後方㓂嘯聚又造飛語言公之壻爲㓂所劫取欲以相中傷復有楚州之命蓋公所論京卞皆披摘其用心而發露其潜慝蔡氏最所忌嫉故得禍比同時諸公爲最酷猶以徽宗保全不至死也遺事公徙居山陽也經由江都時淮帥毛友達可或疑其蔡氏腹心勸公晦跡而過公曰吾無私憾於蔡氏蔡氏之人豈無是非之公乎乃先遣書遺之毛報書加禮有公立朝行巳之道願望見而不可得之語即出郊􅃸公語頗輸誠公亦待之無間後聞其奏報方㓂事不爲欺隱以書譽之於舊曰蔽遮江淮沮遏賊􅀔斯人有助也蓋公與人爲善不分彼此大率如是晚進後軰因公激發黙化而爲善者不可一二舉也遺事公性至孝事親承順顔色使親庭無不適之意居䘮毀瘠如禮廬墳茹􅂼連年有甘露芝草之瑞於兄弟友愛􅀹至伯氏早世公撫䘏其􅀌教養嫁娶使皆有所成立􅀄奏􅀘恩澤捨巳子而先伯父之子及後貶責以至終身諸子皆白衣未甞有不滿之意遺事公性謙和與物無競與人議論率多取人之長雖見其短未甞面折唯微示意以警之人多退省愧服􅀹好􅅄進後輩一言一行苟有可取即譽美傳􅀭謂巳不能公平生手不執錢不視權衡貨殖之事未甞講論唯於農田不廢詢訪以米之貴賤而察􅀊之豐凶也然常語人則曰有國家豈能忘利或孳孳而營之或臨事必以爲言此前賢以爲戒也遺事公雖閑居容止常莊言不苟發雖盛暑見子孫軰未甞不正衣冠一日甞與家人語家人戯問實否公退自責者累日豈吾甞有欺於人耶何爲有此問也御下􅀹有禮法未甞以非􅀋罵人遺事公有斗餘酒量每飲不過五爵雖㑹親戚間有歡適不過大白滿引恐以長飲廢事每日有定課自雞鳴而起終日冩閱不離小齋倦則就枕旣窹即興不肯偃仰枕上每夜必置行燈於床側自提就案人或問公何不呼喚使令者公曰起止不時若渉寒暑則必動其念此非可常之道偶吾性安之故不欲以勞人也遺事公智明慮逺事無大小必原始要終驗如符契又通易數如靖康變故隆祐垂簾國家中興之事往往甞預言之士大夫間有親聞者遺事李丞相伯紀爲柱史坐論水􅀍謫有書與公求華嚴奥旨若將忘世者公以狄梁公得筏猶捨之語報之且謂李文靖王文正二公皆好佛者未甞􅅺其教文而專以衛物爲心文靖爲相以不擾之說報罷内外所陳利害文正當軸終日端黙包兵革以待夷狄勉其繼踵二公於筌筏之外書辭數千言及後伯紀果大用識者歎公澡鑑且服公之至論也遺事徐師川以才氣自􅀒少肯降志於人常言吾於魯直爲舅氏然不免有所竊議至於了翁心誠服之毎見公或經旬月必設拜禮忠宣范公晚年益以天下自任􅀹留意人材或問其所儲蓄人材可爲今日用者荅曰陳瓘又問其次曰陳瓘自好也蓋言公可以獨當天下之重也宣和之末人憂大厦之將顚或問㳺定夫察院以當今可以濟世之人定夫曰四海人材不能周知以所知識陳了翁其人也劉器之亦甞因公病使人勉公以毉藥自輔云天下將有頼於公當力加保養以待時用也其爲賢士大夫所欽屬如此遺事公自遷責所居必葺小齋終日冩閱内典觀經史二十餘年如一日未甞少懈以所抄録名曰知恩殆千餘軸又雜觀百家之文毉卜等書開卷得益者亦片􅁓記録粘于壁間環座旣遍即合爲一䇿名曰壁記如此者又數十􅁽遺事張丞相天覺晚年亦好佛書重道建華嚴閣作醮籙㑹黃冠釋子紛紛奔趨之公雖甞􅀍其薦引然素未相識及通書也至是代書簡之曰辟榖非眞道談空失自然何如勲業地無愧是神仙及在山陽方與賔舊㑹食見邸報有天覺所上遺表遽止酒而起歎傷異常客有以爲疑者公曰張固非粹德且復才踈然時人歸向之今其云亡絶人望矣近觀天時人事必有變革正恐雖有盛德者未必孚上下之聽殆難濟也未幾公亦感疾浸至大故遺事陳瑩中與􅀜止叔沼與滎陽公書問其言前輩與公之交逰必平闕書云某公某官如稱器之則曰待制劉公之􅀋其與已同等則必斥姓名示不敢尊也如曰㳺酢謝良佐云此皆可以爲後生法童蒙訓陳瑩中甞言學者湏常自試以觀巳之力量進否易曰或躍在淵自試也此聖學也童蒙訓陳左司瓘送其姪淵責沈文曰予元豐乙丑夏爲禮部貢院􅀧檢官適與校書郎范公淳夫同舎是時先公爲袐書省正字公甞論顔子不遷怒貳過惟伯淳能之予問公曰伯淳誰也公黙然乆之曰不知有程伯淳邪予謝曰生長東南實未知也予常以寡陋自愧了翁之子正由云了翁自是每得明道先生之文必冠帶然後讀之范太史遺事􅀛山先生題責沈後曰了翁以蓋丗之才邁往之氣包括宇宙宜其自視無前矣乃退然不以賢知自居而以不聞先生長者之名爲愧非有尊徳樂義之誠心而以自勝爲疆何以及此髙文大筆著之簡􅁽使丗之自廣而狹人者有所矜式豈曰少􅀘之哉建中之􅀄右司諌陳公瑩中論蔡氏弟兄忤㫖竄嶺表公之南遷不以其罪舉天下憤惜之無敢言者名􅀠黨籍餘二十年轉徙道途無寧􅀊卒以窮死􅀄京爲翰林學士承旨以辭命爲職潜姦隱慝未形於事雖位通顯世之人蓋莫知其非也公於是時力言京不可用用之必爲腹心患宗社安危未可知也聞之者往往甚其言以爲京之惡不至是巳而結嬖倖竊國柄矯誣先烈怙寵妄作爲宗社禍悉如公言於是人始服公爲蓍􅀛也昔王文公安石以學行􅀒時望神宗皇帝引叅大政士大夫相慶於朝謂三代之治可以立致吕公獻可獨以爲不然抗章論之雖文正温公猶以爲太遽欲獻可姑緩未幾多變更祖宗故事以興利開邊爲先務諸公雖悉力交攻之莫能奪其流毒至于今未殄也故温公毎謂人曰獻可之先見余所不及心誠服之余以謂公之於京言之於未用之前獻可於文公論之於旣用之後則公之先見於獻可有光矣􅀛山撰公祠堂記四之三太尉衛國髙烈武王王名瓊家丗燕人徙亳州之蒙城事太宗爲御龍直指揮使累遷歸義軍節度使殿前都指揮使景德元年從幸澶淵有功明年以病求解兵柄授檢校太尉忠武軍節度使三年薨年七十二王曾孫女配英宗皇帝是爲宣仁聖烈皇后云太平興國四年從征太原太宗引兵自幽州還聞虜兵盛至留王夜作引龍直樂于御營遲明王度車駕已逺潰圍轉戰以岀至行在所而六班卒不至太宗欲誅六班王曰陛下晨夕兼行令不蚤下主將之罪也今衛士皆以材勇選從下太原有功未賞盡誅之可虖帝怒遂釋王禹玉撰神道碑髙瓊以歸義節度使爲并州馬歩軍都部署潘美亦在太原舊制節度領軍職者居上瓊以美舊臣表請居下瓊後爲歩軍都指揮使㑹戍兵以廪食陳弱譁言者瓊知之一日巡營士卒方聚食因取其飯啖之謂曰邊鄙無事而坐飽此冝知幸也蒙求管軍貟闕王兼領二司王乃言曰臣老矣如有負薪之憂誰爲可任者先朝自殿前而下各置副都指揮使及都虞候常有十人職近事親易以第進又使士卒預識其威名緩急臨戎上下得以附習此軍制之大要也上從之神道碑景德元年契丹直抵澶州眞宗北幸駐驆韋城大臣有勸上南巡者召問王行幄王惖然曰虜去國逺闘􅀔不能持乆况羽檄召天下兵行且至進則可以决有功今止軍不發衆情大惑誰爲陛下建此者眞宗曰將更議於大臣王曰天子親御六軍蒙犯霜露國之安危事在轉漏尚何議也遂發韋城次澶州將抵浮橋左右猶躊􅦚未進王下馬自扶輦擁衆渡河旣而請帝御北城觀兵漢軍望黄蓋皆仰呼萬􅀊而虜人亦大呼聲聞數十里其種酋皆駭視失色有頃弩伏發射契丹貴將撻覽死遂奉書請盟師還賜燕于行宫而李繼隆石保吉魏咸信酒酣爭功王曰天子神武一舉而折敵公等何功之與也繼隆等愧甚神道碑又記聞曰上在澶淵南城殿前都指揮使髙瓊因請幸河北曰陛下不幸北城北城百姓如䘮考妣馮拯在旁呵之曰髙瓊何得無禮瓊怒曰君以文章爲大臣今虜􅀐充斥如此猶責瓊無禮君何不賦一詩詠退虜􅀐邪上乃幸北城至浮橋猶駐輦未進瓊以所執檛築輦夫背曰何不亟行今巳至此尚何疑焉上乃命進輦旣至登北城門樓張黄龍旗城下將士皆呼萬􅀊氣􅀔百倍㑹虜大將撻覽中弩死虜衆遂退他日上命冦凖召瓊詣中書戒之曰卿夲武臣勿強學儒士作書語也又談叢曰契丹侵澶萊公相眞宗北伐臨河未度是夕内人相泣明日叅知政事王欽􅀂請幸金陵樞宻副使陳堯叟請幸蜀眞宗以問諸將王曰蜀逺欽􅀂之議是也上與後宫御樓船浮汳而下數日可至殿上皆以爲然公大驚色脫王徐曰但陛下去都城一歩則城中別有主矣吏卒皆北人家在都下將歸事其主誰肯送陛下者金陵豈可到邪公又喜過望曰瓊知此何不爲上駕邪王乃大呼逍遥子公掖帝以升遂渡河而成功又元城語録曰太祖與羣臣言未甞文談蓋欲激厲將士之氣此漢髙祖溺儒冠之意也至太宗好文方戰爭之時多作詩賦羣臣屬和故武事不競卒有潘美之敗及澶淵之役章聖旣渡大河至浮橋一半髙瓊執御轡曰此處好喚宰相吟兩首詩也蓋當時宰相王欽􅀂陳堯叟軰好爲詩賦以薄此輩故平日憾之而有此語又蘇子曰王郎反河北丗祖得鉅鹿信都兵議者以爲可因二郡兵自送還長安惟邳彤不可以爲公旣西則邯鄲之兵不肯􅂢父母背成主而千里送公其離散逃亡可必也丗祖深感其言而止此東漢興亡之决邳彤可謂漢之元臣矣髙瓊之言大略似之皆一代雄桀也它日衛士有白禀粟陳腐者王曰邊防戰守之兵暴露寒苦而所食粟與䜴同色􅀂等日旣食太官月所給又先進様於上前豈特諸軍比也有一言以動吾軍者斬於是衆莫敢有言其後王􅀍疾乆不出輙有遺陳粒殿下者中貴人得之以聞人賜精米一斛王嘆曰安有是邪遂以疾辭典軍神道碑王素爲冦凖所知而王欽􅀂以南廵之議恨凖凖罷相欽􅀂知樞宻院王疾甚眞宗趣駕欲臨問欽􅀂乃言天子問疾所以寵勲臣今瓊無破敵之功不可徃帝乃止神道碑眞宗甞問卿子幾人曰臣子十有四人臣誠愚不肖然未甞不教以知書於是賜諸經史於其家每戒諸子母曲事要埶以蘄進身􅀂吾奮節行間至秉旄􅃏豈因人力哉又甞與諸子論蔚昭敏李斌之爲人諸子曰此衆之所非也王曰吾常與此二人者言其忠質一心無銖髮敢欺朝廷衆之所非吾之所取也神道碑
