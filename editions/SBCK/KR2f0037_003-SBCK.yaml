body:
  text: 丞相魏國韓忠獻王王名􅄾字稚圭相州安陽人中天聖五年進士第二人授將作監丞通判淄州改太常丞直集賢院監左藏庫徙開封府推官遷度支判官景祐三年除右司諌供職寳元二年擢知制誥知審刑院益利路大飢爲體量安撫使康定元年西邊用兵爲陜西安撫使尋加樞宻直學士充經略安撫副使同管勾都緫管司事降知秦州兼秦隴都緫管㳂邊招討等使慶暦二年改除秦州觀察使數月復爲樞宻直學士充陜西四路都緫管經略招討等使明年召拜樞宻副使除資政殿學士知楊州徙鄆州眞定府定州皇祐五年授武康節度使知并州徙相州除樞宻使嘉祐三年拜集賢殿大學士平章事六年進昭文相英宗即位封魏國公神宗即位除鎭安武勝等軍節度使司徒兼侍中判相州改淮南節度使判永興軍復判相州徙大名府熈寜六年復請相八年薨年六十八贈尚書令配饗英宗廟庭上親製神道碑以賜之題碑額曰两朝頋命定䇿元勲之碑徽宗朝追封魏王公自㓜而􅀌鞠於諸兄旣長能自立有大志端重寡言不好嬉弄所學不用力而過人性淳一無邪曲孝于其母悌事諸兄皆不教而能李清臣撰行狀天聖五年仁宗􅀄臨軒試進士公年二十名在第二時唱名第一甲方終太史奏日下五色雲見左右從官皆賀於殿上家傳監左藏庫時方貴髙科多徑去爲顯職公獨滯於筦庫衆以爲非冝公處之自若不以爲卑冗職事亦未甞苟且禁中須索金帛皆内臣直批聖旨下庫無印記可以考驗公奏曰天禧中甞專置傳宣合同一司􅀜防甚嚴官物非得合同慿由不可給後相習爲弊廢而不行願復舊制詔從之舊有監秤内臣一貟綱運至必俟監秤始得受納内臣往往數日不至寳貨皆􅁀露廊廡逺方衙校苦於稽留公奏罷之災傷州郡所輸物帛不如度者例猶追剥公請蠲之家傳徙開封府推官理事不倦暑月汗流浹背府尹王愽文大器重之曰此人要路在前而治民如此眞宰相器也胡氏傳家録以右司諌供職勸上明得失正朝廷紀綱親近忠直放逺邪佞時災異數見公以災變婁發主於執政者非才累言於上未見納公又奏曰豈陛下擇輔弼未得其人邪若杜衍范仲淹孔道輔宋郊胥偃衆以爲忠正之臣可備進擢不然甞所用者王曽吕夷簡蔡齊宋綬亦人所屬望也章十上不報公乃抗䟽乞出䟽示中書敕御史臺集百官㑹議上乃罷宰臣王隨陳堯佐叅知政事韓億石中立等四人者家傳王巖叟編別録云公常言天下事不如人望者多仁宗朝王隨陳堯佐爲輔相皆老病而不和中書事多不决韓億石中立二人叅預又頗以私意害公公旣論罷之天下望在王沂公吕申公杜祁公范希文而公亦引薦之及宣麻曰乃張士遜昭文章得象集賢宋庠晁宗慤叅政天下大失望是時朝廷欲以公爲知制誥寵其盡言公曰諌行足矣因取羙官非夲意也人其謂何語聞遂寢時災異數見朝廷但齋醮禳謝公旣上䟽極論又聞大慶殿建設道塲公奏前世祈禱之法必徹樂减膳脩德理刑下詔求言側身避殿始可轉禍爲福願法而行之宫中宴飲亦望節减不獨仰奉天戒實可上安聖躬且大慶殿者國之路寢陛下非行大禮􅀍法服則未甞臨臣下非大慶㑹則不能一至于庭豈容僧道凢庸之人継日累月喧􅄂于上非所以正法度而尊威神也今後設醮望於别所安置上嘉納之家傳公又言賞罰當從中書出今數聞有内降不可不止王曽蔡齊宋綬當世名臣冝大用上納其􅀃王沂公見公論事切直有本末喜謂公曰比年臺諌官多畏避爲自安計不則激發近名如君固不􅀒所職諌官冝若此沂公天下正人公得此益自信行狀民間復作銷金服玩公請以先朝舊制禁絶之乃下詔申諭未幾有犯者開封以刑名未明申請審刑院議止徒三年公奏大中祥符八年勑犯銷金者斬請復用之家傳詔同詳定阮逸胡瑗等所造鍾律公論曰祖宗舊法遵用斯乆屬者徇一士之偏議變數朝之定律臣切計之不若窮作樂之源爲致治之夲使政令平簡民物熈洽海内擊壤鼓腹以歌太平斯乃上世之樂可得以器象求乎旣逹其源又當究今之所急國家方夏寜一乆㢮邊備犬戎之性豈能常保願陛下與左右弼臣緩兹求樂之誠移訪安邊之議急其所急在理爲長遂詔將來南郊且用和峴舊樂家傳發解開封府舉人時惟禮部貢院置封彌謄録二司開封止有封彌官公請並設謄録司以示至公從之家傳侍御史􅀽素言乞依賈昌朝所奏取景德至景祐年凢百用度較其出入省罷不急詔公與張若谷任中師同三司詳定公謂景德以來歳月巳深文案必不完具若俟齊集而議徒成淹乆但考見今日實爲浮費自可裁度上聞如故將相戚里之家多占六軍等耗縣官衣粮爲私家僕􅀠在京不啻數千人若此􅀋何必待景祐文書較計邪詔從之又言自古興儉以勸天下必以身先之今欲減省浮費莫如自宫掖始請令三司取入内内侍省并御藥院内東門司先朝及今來賜予支費之目比附酌中皆從減省無名者一切罷之詔禁中支費只入内内侍省御藥院内東門司同相度減省報詳定所其臣僚支賜即許㑹問入内内侍省施行家傳公爲諌官三年所存諌藁欲歛而焚之以効古人謹密之義然􅂲無以見人主從諌之羙乃集七十餘章爲三卷曰諌垣存藁自序於首大略曰諌主於理勝而以至誠將之家傳知審刑院先是盗殺同黨旣巳就捕例不抵死公曰此但并有其貲或就滅其口非有自新改過之心無足矜者請更議其法乃詔盗殺其徒而不首者毋得原家傳以益利路人飢爲體量安撫使公至則蠲减稅以募人入粟招募壯者等第刺以爲廂禁軍一人充軍數口之家得以全活檄劒門􅀜民流移而欲東者勿禁簡州艱食爲甚明道中以災傷甞勸誘納粟後糶錢十六餘萬歸於常平公曰是錢乃賑濟之餘非官緡也發庫盡以給四等以下户逐貪殘不職吏罷冗役七百六十人爲饘粥活飢人一百九十餘萬蜀人曰使者之來更生我也家傳李元昊􅀄叛兵鋒銳甚中國乆不知戰人心頗􅂲士大夫多避西行公使蜀道潼陜歸奏事便殿上問西兵形􅀔公具以所聞對上即曰朕比憂乏人桉邊卿其爲朕往授陜西安撫使趣上道公勇欲自効馳至延安則羗巳解圍去然士氣沮傷將吏往往移病求罷職公即選練材武治戰守器慰安居人収召豪傑與之計議檄諸郡完城郭如河北始設烽燧以候虜先是大將劉平戰北或誣其叛去遂錮守平妻子具獄河中府公力辨白釋之録戰死者􅉠恤賞贈邊臣皆勸范雍守延州朝廷以爲不能欲以趙振代公奏曰振麄勇可使搏戰非謀議守邊才願留雍以觀後効無巳則起范仲淹爲可臣爲國家憂非私仲淹也若渉朋比誤陛下事當族慶人陳叔慶等陳邊防䇿旣而􅀘官東南公奏曰忠義憤懣爲國獻計雖稍収用乃置于僻左實覊縻之非所以開示誠意徠人才也又奏罷率馬令以寛民力及裁處它利害甚悉上益知公可辨大事行狀康定元年五月天子命夏公竦都護西師而以公副之未幾遣學士晁宗慤内侍王守忠督出兵攻賊公曰如詔意爲便不則元昊聚兵出不意攻我我倉猝赴敵必敗合府爭曰承平乆不習戰羗寇􅁀起今將與兵未訓講其可深入客闘乎願謹􅀜塞以歳月平之公所論不得用使持奏還而元昊掠鎮戎軍偏將劉継宗逆戰果不利詔下切責俾以進兵日月來上衆復㑹議曰軍事雖可擇便冝行之然大計亦不當遽乃畫攻守二䇿求中决公馳驛奏闕下上許用攻䇿巳而執政以爲難公不得巳獨上章曰元昊竊數州精兵不出四五萬餘皆婦女老弱舉族而行我四路之兵不爲少分戍數十城塞彼聚而來故常衆我散故常寡相遇毎不敵是以元昊能數勝今不究此失乃待賊太過以二十萬重兵惴然坐守界濠不敢與虜确臣實痛之願更命近臣觀賊之隙如不可不擊則願不疑臣言奏雖不下知兵者以公􅀃爲然行狀公往來塞下勤苦志􅃦食期有以報上出按屯至涇原聞元昊乞和公諭諸將曰無約而降者謀也宜益備不可懈㢮遽調兵瓦亭兵未集賊果入鈔山外公􅃌圗授諸將曰山間狹隘可守過此必有伏或致師以怒我爲餌以誘我皆無得輙出待其歸且墯也邀擊之而禆將任福王仲寳狃小勝數違節度公遣府吏耿􅀓就詰責不從則又檄福曰違節度有功亦斬福猶進兵遇伏遂戰死嫉公者乞置公大罪後大帥使収餘兵得檄福衣帶間封上之安撫使王公堯臣亦以實奏朝廷知罪在諸將止左遷右司諌知秦州行狀公在秦増廣州城以保固東西市招輯屬户益市諸羗馬討殺生羗之鈔邊者厲兵以待賊訖公去秦賊不敢窺秦塞爲盗行狀慶暦二年陜西四帥皆改觀察使公爲秦州觀察使曰吾君憂邊臣子何可以擇官獨不辭行狀又家傳云公上表謝曰辭之則有可疑之迹掇希求進用之嫌受之則有從權之名恊軍旅稱呼之便􅀄京師所遣戍兵脆懦不習勞苦賊常輕之目曰東軍而土兵勁悍善戰公奏増土兵以抗賊而稍减屯戍内實京師又以籠竿城據衝要乞建爲徳順軍以蔽蕭􅀜鳴沙之道旣任事乆歳􅀘月完甲械精堅諸城皆有備賞罰信于軍中將亦習闘識形􅀔每出輙有功勇氣倍于􅀄時公方建請於鄜慶渭三州各以土兵三萬爲一軍軍雖別屯而耳目相通爲一視虜所不備互出擣之破其和市屠其種落困撓其國因以招横山之人度横山隳則平夏兵素弱必不能支我下視興靈穴中兎尓章旣上又與范公定謀益堅而元昊黠賊知不可敵亦歛兵不敢輙近塞行狀丞相范公純仁治平中爲御史坐言事謫通判安州甞言康定間元昊宼邊韓魏公領四路招討駐延安忽夜有人携匕首至卧内遽褰幃帳魏公起坐問誰何曰某來殺諌議又問曰誰遣汝來曰張相公遣某來蓋是時張元夏國正用事也魏公復就枕曰汝携予首去其人曰某不忍願得諌議金帶足矣遂取帶而出明日魏公亦不治此事俄有守陴卒報城櫓上得金帶者乃納之時范兄純祐亦在延安謂魏公曰不治此事爲得體蓋行之則沮國威今乃受其帶是墮賊計中矣魏公握其手再三嘆服曰非􅄾所及麈史公與范公在兵間最乆两公名重一時人心歸之樂爲之用朝廷􅀝以爲重故天下稱爲韓范仁宗知公乆勞于外遣使宻諭旨曰卿􅀌立無人援薦獨朕知之行召卿矣明年春與范公同召拜樞宻副使公自請捍邊至五表不聽旣至又與范公伸前議同决䇿上前期以兵覆元昊㑹夏國送􅅃公謀不果用范公毎恨齟齬功不就故作閱古堂詩叙其事傳于世行狀時邊事雖欲講解元昊猶上書邀朝廷其輕者欲自建元爲父子呼兀卒及令我使與陪臣爲列二府遽欲從之公獨謂不可許數廷議衆尚不從公持之愈堅故晏丞相至變色而起公守所見不易卒殺其禮如公言行狀􅀄夏人方議講和公以謂邊備不可弛請與范公俱出按行遂命公宣撫陜西范公宣撫河東范公請益兵數萬屯河陽蒲中及以兵從公以爲不必請兵上前議未合退於殿廬中范公猶爭以爲非益兵不可公曰若爾則􅄾乞自行不用朝廷一人一􅀐范公色忿欲再請對道公語公􅀏止之㑹杜祁公冨韓公賛公􅀃卒不發兵范公亦不以爲忤也家傳又别録云公甞爲門人語此事曰國家事鎭之則静但敢者少爾如希文亦未免有易動處公旣至􅀜陜屬歳大飢群盗嘯聚啇􅉑之郊張海郭貌山邵興衆數千人巡檢上官珙與戰失利餘軍潰散藏匿山谷邵興掲牓招誘啇州錢監役兵公遣屬官薛向乗傳往料簡之其舊係邊兵即令歸􅀠舊籍餘並押赴陜府填諸軍闕額又遣人賁牓招致上官珙下散軍諭以免罪歸所屬仍召揚拙等將㳂邊土兵入山捕張海邵興等皆相繼殱􅗮􅀜輔按堵是冬大旱河中同華等十餘州飢民相率東徙出􅀜公即選官分詣州縣發省倉賑之又蠲賦役察官吏能否者陞黜之又以兵數雖多而􅄂以疲老耗用度選禁軍不堪征戰者停放一萬二千餘人後田况乞選諸路軍不堪戰者爲廂軍云若謂兵驕乆一旦澄汰􅂲致亂則去年韓􅄾汰邊兵萬餘人豈聞有爲亂者哉家傳時仁宗以天下多事急于求治手詔宰相杜衍曰朕用韓􅄾范仲淹富弼皆中外人望有可施行冝以時上之又開天章閣賜坐咨訪絶務公條九事大略備西北選將帥明按察豐財利㧕佞倖進有能退不才去冗食謹入官繼又獻七事議稍用而小人巳側目不安二府或合班奏事公必盡言事雖屬中書公亦對上指陳其實同列尤不恱獨仁宗識之曰韓􅄾性直行狀又強至所編遺事云公言仁廟御批朕用韓􅄾富弼范仲淹皆公議人望之所歸凢所議事仰章得象杜衍以下公心恊力行之文正家藏一本一以與公今尚存也蘇子羙軰爲進奏院事發仁宗爲䜛者所惑夜遣中使散入大臣家捕同飲者公明日對曰夜來聞遣宦官遶京城捕館職甚駭物􅃪此事但付有司自有行遣縁陛下即位來不曽做此等事何故今日􅈝如此上色悔乆之别録公云諸人欲以進奏院事傾正黨宰相章得象晏殊不可否賈昌朝叅政隂主之張方平宋祁王拱辰皆同力以排至列狀言王益柔作傲歌罪當誅公時在右府不與此事因兩府同對偶言益柔狂語何足深計校方平等皆陛下近臣今西邊用兵有何限大事不為陛下論列而同狀攻一王益柔其情亦可見上遂釋然别録富鄭公安撫河北還至都門命守鄆公奏曰朝廷聞北虜􅀧兵弼以忠義請行事畢歸奏去京師咫尺胷中籌䇿不得一陳於陛下之前乃責􅀘閑郡四方不聞其罪曽無一人爲弼言者臣切爲陛下惜之累上不報行狀前此陜西帥鄭公戩以劉滬董士廉城水洛涇原守將尹洙狄青謂非便詔輟其役㑹戬罷兼涇原路二人猶城之青欲斬以徇不克戬論救于朝朝廷薄二人罪公曰二人者實違詔何可無罪列十事辨析後士廉詣闕訟而柄臣爲之佐佑又屬公與當時有名大臣改更天下敝事僥倖者憚之故富公杜公相繼罷去公亦懇求􅀘外行狀徙知鄆州京東素多盗捕盗之法以百日爲三限限中不獲者抵罪盗未必得而被刑者甚衆公請獲它盗者聽比折除過捕者有免刑之路故盗多獲朝廷著爲天下法至今用之家傳公自楊徙鄆自鄆徙鎭定所至設條教葺帑廪治武庫勸農興學人人樂其愷悌愛慕之如父母定州乆用武將治兵無法度至于驕不可使當明公鎬引諸州兵平甘陵獨定兵邀賞賚怨語幾欲譟城下公素聞其事以爲定兵不治將爲亂旣至即用兵律裁之察其橫軍中尤不可教者捽首斬軍門外士死攻圍􅉠賞其家􅄺其􅀌兒使繼衣廪恩威旣信則倣古兵法作方貟鋭三陣指授偏將日月教習之由是定兵精勁齊一號爲可用冠河朔京師發龍猛卒戍保州在道竊取人衣屨或飯訖不與人直至定公留不遣曰保州極塞甞有叛者豈可􅄂以驕兵戍之易素教者數百人以往而所留卒未踰月亦皆就律不敢復犯法一府禆佐如狄青軰熟聞公平日語見潘羙爲帥避宼鈔爲已累令民内徙空塞下不耕號禁地而忻代州寜化火山軍廢田甚廣歐陽公脩甞奏乞耕之爲并帥沮撓乆不行公至遣人行視曰此皆我􅃾田民居舊迹猶存今不耕適留以資虜後且皆爲虜人有之矣遂奏募弓箭手居之得户四千墾地九千六百頃屬城歳發防秋兵至河外人病逺餉公曰宼來可預知奚防秋爲罷不復遣河東俗􅄂羗夷用火葬公爲買田封表刻石著令使得葬於其中人遂以焚屍爲恥行狀除樞宻使公以皇朝百餘年祖宗以征伐平定中國外臨制四夷機事歸樞宻府文書藏于吏舎朽蠹散亡爲可惜奏擇吏整比紀次之多得三聖親筆見其神斷及四方兵要根本爲六百八十卷制禄令驛令使有成法三司吏不復得弄文移爲稽故賕賄自絶訖今以爲便請稍出内帑錢糴粟數百萬實邊備建遣郝質王慶民度藏才三族故地命郭靄復城爲豐州與麟府相爲羽翼瞰契丹夏國相通之道行狀溪洞蠻彭仕羲納其子師寳之妻師寳與子投辰州告之且言將謀叛轉運使李肅之等遂領兵討之自是入宼不巳仕羲方乞復通貢奉却欲得投來子孫二府合議宰相文彦愽呼吏擬奏許之公曰二子旣還則為魚肉矣它日朝廷何以來蠻夷也遂議遣殿中丞雷簡夫往議之先約勿殺師寳俾知龍賜州然後許降仕羲乃聽命納􅅃荆湖之間遂無事家傳中書習舊敝毎事必用例五房史操例在手顧金錢惟意所去取所欲與白舉用之所不欲行或匿例不見公令删取五房例及刑房斷例除其冗謬不可用者為綱目􅀋次之封縢謹掌毎用例必自閱自是人始知賞罰可否出宰相五房史不得髙下于其間又編中書機要如樞宻院舉督天下吏職嚴京百司察不職者及貴臣挾恃放縱有罪無所貸以懲廢弛之風隂消官者權又試􅀘宗室外官興學校變科舉别考五路貢士雖不行其後頗如其􅀃行狀公推廣上之仁德使及微細考尋天禧􅀄甞於京門外四禪院買地以瘞無主骸骨官給錢六百㓜者半之後因循不復給錢而死者􅁀露於道見者閔傷乃舉舊制行之家傳公自爲宰相即與當時諸公同力一德謀議制作完􅀘天下事所汲引多正直有名或忠厚可鎮風俗列侍從備臺諫以公議用之士莫自知出何人門下嘉祐四年下祫饗赦事多便民者命諸路舉學行􅀹異敦遣詣京師館于太學試舎人院差使授官立柴氏後爲崇義公法春秋存亡國繼絶世之義擇才臣詣四方寛恤民力籍户絶田租爲廣惠倉以廣賑恤募耕唐鄧廢田勸課農作摹方書賦藥物以救疾病守令治最者乆其任以率吏課裁定令勑以省疑讞弛茶禁以便東南之人愚民得無䧟大罪議者以謂近于三代之仁義多公所論議施行行狀仁宗春秋髙繼嗣未立天下以爲憂雖或有言者而大臣莫敢爲議首公數乗間伏奏乞選立皇子上顧曰後宫一二欲就館卿其母亟後誕育皆皇女公一日挾孔光傳進對曰漢成帝立二十五年無繼嗣已議立帝弟之子定陶王爲皇太子成帝中材常主猶能之以陛下之聖何難于此哉太祖爲天下長慮福流至今惟陛下以太祖心爲心則無不可矣仁宗感悟始以英宗判宗正寺英宗力辭宦官宫妾􅀔未便中外皆爲危之公復啓曰陛下屬之以大任而不肯當蓋其沉逺詳重識慮有以過人非有它也事猶豫不決招䜛慝生變故且名未正則尚得以辭名體一定父子之分明則浮議亦不復得摇矣仁宗欣納曰如此則冝乗明堂大禮前亟立爲皇子乃召樞宻大臣諭其事大臣或愕曰此大事毋遽上顧曰朕意决矣曰誠如此臣敢爲天下賀又召學士爲詔書學士亦請對然後進藁英宗旣爲皇子尚堅卧公又奏曰今旣爲陛下子何所間哉願令宫人就諭旨及夲宫族屬敦勸上如其請先帝始就慶寜宫㑹仁宗棄天下平旦入預大議英宗即皇帝位宫門徐開追百官班宣遺制衛士坐甲諸司幕廡下治䘮人情肅然日至巳午市肆猶有未知者公性厚重未甞名其功其門人親客或燕坐從容語及立皇子定策事必正色曰此仁宗神德聖斷爲天下計皇太后母道内助之力朝廷有定議乆矣臣子何預焉故一二大事天下莫知其詳行狀又遺事云公自定武入爲樞宻使時仁宗嗣未立公請置内學教宗子建儲之意黙存其中事未及行公秉政仁宗倦勤甚􅀔漸迫更不暇置内學毎進對罷即論太子天下本不可不預立以繋天下心語日益深切前後不可勝數仁宗終無一言不喜亦不怒公患之它日仁宗忽顧公謂朕亦有意多時時有二宗子甞育宫中公乗其意動急叩之謂二宗子陛下亦必自能見其孰聦明知否可屬大計仁宗以英宗爲言公即將順以彼一人便若幽厲語更不及英宗乞降聖旨劄子權判宗正司後两府通簽御劄張昪太尉見之懼深罪公何不素議及次日殿上大言此事繫社稷陛下不可錯上曰此事與相公經啇量來昪下殿至中書又詰公公曰此甚入思慮來不錯昪退公笑曰若與之素議豈不壊了事英宗􅀄爲皇子時允弼最尊屬心不平且有語及即位國朝制度嗣天子即位先親王賀次六軍次見百官公是時先獨召允弼入稱先帝晏駕皇子即位大王當賀允弼曰皇子爲誰曰某人允弼謂豈有團練使爲天子者何不立尊行公曰先帝有詔允弼曰焉用宰相遂循殿陛上公叱下曰大王人臣也不得無禮左右甲士巳至遂賀次召諸親王見六軍百官中外晏然遺事英廟即位已數日􅀄掛服于柩前哀未發而疾暴作大呼語言􅂲人所不可聞左右皆反走大臣軰駭愕癡立莫知所措公亟投杖於地直趨至前抱入簾曰誰激惱官家且當服藥内人驚散公呼之徐徐方來遂擁上以授之曰皆湏用心照管官家再三慰安以出仍戒當時見者曰今日事唯某人見某人見外人未有知者復就位哭處之􅀂無事然歐陽永叔歸以語所親曰韓公遇事眞不可及別録英宗􅀄以驚疑得疾雖平而疑未解潜晦自居猶􅀂疾者靣壁堅卧莫受藥餌公日率同僚自捧藥以進公俯而懇告則或熟視公而不言或取藥覆公之衣而不顧公或跪於榻上者移時或拜於床下者數四太后每勞公曰相公亦不易勝矣大王汝自勸及大王勸之􅀹不顧也然湏公強之而後服别録英宗遇貂璫少恩禮左右不恱多道禁中隠宻者雖大臣亦心惑其􅀃公獨屹然不動昌言於衆曰豈有前殿不曽差了一語而一入宫門得許多錯來􅄾深疑此事簾前亦屢以此爲對自爾人情知公意不可摇妄傳語言者遂稍息慈壽一日送宻札與公有爲孀婦作主之語仍勑中貴俟報公但曰領聖㫖公以山陵有事呈乞晚臨後上殿諸公不與旣見謂上曰官家不得驚有一文字湏進呈只是不可泄陛下今日皆太后力恩不可報然旣非天屬之親願加意承奉便自無事上曰謹奉教公又云此文字臣不敢留幸宫中宻焚之若泄則間遂開卒難合矣它日光獻對中書泣訴英宗疾中語言起居之狀繼而樞宻院對語亦如前富公弼退而謂公曰適聞得簾下所􅀃否弼則不忍聞蓋富意以太后之言爲然而歸咎於英宗及公力勸太后徹簾不敢令富公預聞後中書巳得光獻旨還政宻院猶未知也迨手書出富公愕然因此不恱家傳英廟旣自外來又方寢疾不豫人情傾向在太后公慮宫中有不測者一日因對深以言動太后曰臣等只在外面不得見官家内中保護全在太后􅀂官家失照管太后亦未安穩太后驚曰相公是何言語自家更是用心公即曰太后照管則衆人自照管同列爲縮頸流汗旣而吴奎長文曰語不太過否公曰不得不如此別録公潜察英廟已安而曹后未有還政意乃先建議英廟曰可一出祈雨使天下之人識官家上然之咨太后太后怒曰獨不先禀此耶孩兒未安􅂲未能出公曰可以出矣太后曰人主出不可以不備禮儀方處䘮素仗未具公曰此小事朝廷頥旨即辦不數日素仗成上遂幸相國寺京師之疑已解太后不乆竟還政别録曹后􅀄未還政公力引古以動之云前世母后更聦明者多莫不以固吝權位敗名德太后若脫然復辟則是千古所未有請閱史書一一可見太后曰自家何敢望賢人公察其意回矣即連賛成之後數日批出云某日更不御殿公亟令捲簾徹座乃往白上上曰莫未否公曰巳得親詔矣上遂釋然别録􅀄曹后難於還政公􅀃曰當别與太后議儀制山呼警蹕益衛士五百人之􅀋太后旣允即以諷上上曰相公苦崇㢡母后是豈好事公曰臣等亟以此誘之方肯放下陛下何惜此耶􅀂以輕重比之與之者止如鷄􅆑放下者乃如太山富公云何啻太山遂定別録英宗􅀄在藩邸恭儉好學禮下師友甚得名譽嘉祐末仁宗不豫大臣議選立宗室子仁宗勉從衆議立爲皇子然左右近習多不樂者帝憂懼辭避者乆之及仁宗晏駕帝即位以憂得心疾大臣議請慈聖垂簾帝疾甚時有不遜語后不樂大臣有不預立皇子者隂進廢立之計惟宰相韓􅄾確然不變叅知政事歐陽脩深助其議甞奏事簾前慈聖嗚咽流涕具道不遜狀􅄾曰此病故耳病巳必不爾子病母可不容之乎慈聖不懌曰皇親軰皆􅀏太后欲於舊渦尋兎兒聞者驚懼皆退數歩獨􅄾不動曰太后不要胡思亂量少間脩乃進曰太后事仁宗數十年仁聖之德著於天下婦人之性鮮不妬忌昔温成之寵太后處之􅁉然何所不容今母子之間而反不能忍耶太后曰得諸君知此善矣脩曰此事何獨臣等知之中外莫不知也太后意稍和脩復進曰仁宗在位歳乆德澤在人人所信服故一日晏駕天下禀承遺命奉戴嗣君無一人敢異同者今太后一婦人臣等五六措大耳舉足造事非仁宗遺意天下誰肯聴從太后黙然乆之而罷後數日獨見英宗帝曰太后待我無恩公曰自古聖帝明王不爲少矣然獨稱舜爲大孝豈其餘盡不孝也父母慈愛而子孝此常事不足道惟父母不慈而子不失孝乃可稱耳今但陛下事之未至耳父母豈有不慈者帝大悟自是不復言太后短矣熈寜中歐陽公退居潁上轍往見之間言及此公曰古所謂社稷臣韓公近之昔上在潁邸方人情疑二公招記室王陶使宻􅀃王傾身奉事慈聖王用其言身執家人禮至親奉几案進飲食慈聖由是歸心而大計始定龍川志仁宗靈駕欲到永昭葬且有日道路忽傳皇堂棟損有司憂駭不知所出公至鄭始聞時諸使見公鈎公指皆欲不問而掩之公正色曰不可果損當易之􅀂違葬期侈所費此責猶可當亦無可奈何若苟且掩之後有壞覆人主致疑心臣下何以當責一坐爲之歎息服其不苟處事必盡識且及逺旣到皇堂棟乃不損遺事英宗􅀄立外六班有謀變者或言於公公曰事不成不過族耳吾不懼也旣而卒無事英宗即政公以其勇智不世出可與有爲乃考尋中書祖宗御批得百餘畨俱缺落不完􅀘綴僅能識其字皆經國長筭大䇿如取太原下江南伐犬戎付中書之􅀋編成十餘軸一日䄂進英宗一見之不覺避御座是時同列皆謂公有不言教萬乗事後上僊公哭之慟曰何事不可爲别録英宗即位有疾請光獻太后垂簾同聽政有入内都知任守忠者姦邪反復間諜两宫時司馬温公知諌院吕諌議爲侍御史凢十數章請誅之英宗雖悟未施行宰相韓魏公一日出空頭敕一道叅政歐陽公巳簽書矣叅政趙公槩難之問歐陽公曰何如歐陽公曰第書之韓公必自有􅀃魏公坐政事堂以頭子勾任守忠者立庭下數之曰汝罪當死責蘄州團練副使蘄州安置取空頭敕填之差使臣即日押行其意以謂少緩則中變矣聞見録公爲宰相十年當仁宗之末英宗之􅀄朝廷多故公臨大節處危疑苟利國家知無不爲􅀂湍水之赴深壑無所疑憚或諌曰公所爲如是誠善萬一蹉跌豈惟身不自保􅂲家無處所殆非明哲之所尚也公歎曰此何言也凢爲人臣者盡力以事君死生以之顧事之是非何如耳至於成敗天也豈可豫憂其不成遂輟不爲哉聞者愧服其忠勇如此故能光輔三后大濟艱難使中外之人餔啜嬉逰自􅀂曽無驚視傾􅃪竊語之警坐置天下於太寜公之力也温公撰祠堂記孫和甫嘉祐治平間在中書編排文字甞言昭陵未復土英廟未親政朝廷多故中書文字日盈於前公一一從頭看看了即處置了接人更乆處事更多精神意思定而不亂靜而不煩如終日未甞觸事者殊不似議了一件事讀了一􅁓文字精神意思終日不來別録治平中夏國泛使至將以十事聞朝廷未知其何事也時太常少卿祝諮主館伴旣受命先見樞府已而見丞相韓魏公曰樞宻何語曰樞府云􅀂使人議及十事第云受命館伴不敢輙及邊事公􅀏曰豈有止主飲食而不及它語耶公乃徐料十事以授祝曰彼及某事則以某辭對辯某事則以某辭折祝唯唯而退及宴使者果及十事凢八事正中公所料祝如所教荅之夏人聳伏澠水燕談濮安懿王以英宗踐祚例當改封英宗􅀹詳謹不欲遽旣踰大祥始詔兩制議其禮兩制謂當封大國稱皇伯中書疑所生稱皇伯無經据又封爵湏下誥名之則未得其中方下三省再議英宗復詔罷之而臺諌官攻中書不已㔫指切歐陽公諸公莫不避匿自解公獨謂人曰此中書事皆共議何可獨罪歐陽公士大夫嘆其平直忠諒不肯推謗以與人行狀公素知陜西苦屯戍餽餉頗艱當得民兵以爲助因乞籍民爲義勇二府難其事諌官亦爭之曰􅀜輔民將驚駭亡去願以一身救二十萬人死二府以白上上曰河北有義勇乎曰有又曰河東有義勇乎曰有然則陜西奚獨爲不可論遂决至今􅀜輔爲便人皆服上之言簡而盡而亦多公之守也行狀夏賊叩大順城公言冝留歳賜遣使詰其罪大臣自文丞相悉以爲不然左右或舉寳元康定之喪師以動上意公曰軍事湏料彼此今日禦戎之備大過昔時且諒祚狂童國人不附其􅀔何敢望元昊詰之必服大臣或私相語曰渠謂料敵且觀渠所料公卒建遣何次公往詰諒祚逾月而次公還以諒祚表聞屬英宗已卧疾二府同入問起居畢公叩御榻曰諒祚表云何英宗力疾顧曰一如所料一如所料行狀􅀄英宗卧疾乆一日公問起居退神宗出寢門憂形於色顧公曰柰何公曰願大王早暮在上左右神宗曰此乃人子之職公曰非爲此也神宗感悟而去英宗自感疾後不能語凢處分事皆書於紙治平三年十二月上疾漸革二府問疾罷公奏曰陛下乆不視朝中外憂惶冝早建立太子以安衆心上頷之公請上親筆指揮上乃批曰立大王爲皇太子公曰大王乃潁王也煩聖躬更親書之英宗又批於後大大王潁王某公曰欲乞只今晚宣學士降麻上頷之公召御藥髙居簡於前授以御札曰適巳得聖旨令今晚宣學士依此降制是晚鎻院時神宗侍側聞是命辭於榻前者乆之制下又設置東宫官屬於是國本定矣􅀄英宗旣許建儲處分畢顔色悽􅃤嘻嘘涕下文潞公退而語之曰相公適見上靣色否人至此雖父子之間亦不能不動公曰國事至此無可奈何家傳英宗􅀄晏駕急召上未至英宗復手動曽公愕然亟告公欲止召太子公拒之曰先帝復生乃一太上皇愈促召上其逹權知變如此遺事上旣即位王陶由東宫官入御史府爲中丞意有所觖望奏彈宰相不押常朝班朝廷以宰相日奏事垂拱退詣文德殿押常朝班或巳過辰正則御史臺放班行之巳數十年爲故事陶憤不勝乃肆誣詆語渉不遜諌官隂爲恊比上察其姦罷陶言職公亦遽乞􅀘郡乃遣内侍張茂則賜手札慰諭起之行狀又聞見録云神宗􅀄即位王陶言魏公不押常朝班爲跋扈帝遣近侍以陶䟽示魏公公奏曰臣非跋扈者陛下遣一小黃門至則可縛臣以去矣帝爲之動出陶知陳州又家傳云王陶既出邵亢猶欲撼公上曰若不是韓􅄾朕只是一皇親太保耳亢聞此語惶懼自悔一日中書進呈罷上獨留公訪對乆之因語及英宗􅀄即位服藥次第上曰是時不易處當日如何公曰是時人情誠憂懼然内則惟於太后前主以必不妨外則急於皇子位差置官屬相繼陛下自觀察使以使相封郡王奉朝請立於允􅀄之上人心知有所屬内外遂安英宗亦得安然服藥上歛容拱手曰此恩何敢忘公惶􅂲謝它日上謂公近有欲以二大國封濮王者如何公曰先帝遵守典禮不敢爵父而陛下豈可爵祖又當以何親稱之邪此必黨濮議者欲求必勝殊不顧上累陛下孝德而措先帝於重不幸也願深察之上欣然納焉家傳韓魏公爲相日曽公爲亞相趙康靖歐陽公爲叅政凢事該政令則曰問集賢該典故則曰問東㕔該文學則曰問西㕔至於大事則自决之矣人以爲得宰相體麈史公爲英宗山陵使復土還朝以疾辭位除兩鎭節度使判相州公以兼領兩鎭近世無有力辭改淮南節度使虚上相之位以待之㑹种諤以兵取綏州納降人嵬名山族帳數萬人諒祚將以兵報西邊皆警輟公往經略授陜西安撫使判永興軍家傳曰公辭二府方奏事殿上議邊事未决曽公亮等奏曰今日韓􅄾朝辭在門外乞與同議上亟召之公旣對即奏曰臣前日備貟政府自當叅議今日藩臣也惟奉行朝廷命令耳決不敢預聞上觀公意確遂罷議後元豐中吕惠卿除知延州乃自請乞與二府同議邊事坐是黜貶上因諭輔臣曰甞記韓􅄾􅀄往陜西召至此與二府議事再三辭不肯預始知老臣自識體也方行夏人誘保安軍守將楊定殺之以復怨公旣趨􅀜中知羗中苦飢又􅀒罪勢可以困奏絶其歳賜選將厲兵具餴糗器用移師西指爲出討計而諒祚死秉常告哀謝罪械送殺楊定者李崇貴韓道喜以自贖時議多欲棄綏州朝廷巳屢趣廢公曰綏州要害出賊脅下已得之何可廢也冝増築􅂌熟户大酋折繼世降羗嵬名山守之後雖不取猶足以易地未見聽則使府佐劉航驛奏後果用易塞門安逺故寨不合卒留爲綏德城險固可守虜人常恨失之狂人尉倉等謀爲亂以術禽取戮之不脫一人寛其詿誤又城噴珠堡據篳篥川赴甘谷寨拓秦州之塞招弓箭手居之用便冝脩涇原葉爕㑹爲熈寜栅􅀞圗付將吏教以方略張聲援屯兵扼賊路畢役虜不敢犯皆奪其地利包屬羗于其中以固藩衛武事有序則欲先収横山漸取河南地遂爲大字檄陳向背福禍牓塞下騰入虜中招横山之衆而或者􅂲其有功力沮壞之行狀又遺事云有以使永昭後公不退爲問者公曰是時英宗始立疾作不任事􅄌壽懷二三時在永昭一日遣一近璫小封親札諭英宗狂惑等事問相公如何報曰慈壽旣云未定疊未定疊人言語何足怪它日復遣使見逼甚公曰只乞與曽公亮以下啇量曽公軰果不敢當皆云候韓􅄾回􅄾是時旣使回一日奏對罷直論以爲太后旣無親出子上幸養在宫中乆先帝有詔與子其於子母不爲不順若更懷猶豫聽䜛佞禍亂由此必起立人之子皆知不􅀂立巳之子然太后旣無子不得不自認業慈壽由此語塞不復出口􅄾是時豈暇自顧進退之分未幾英宗上仙今上即位一日遂墾辭位上流涕謂相公欲何之􅄾一日又盡持四方士人見責不退書開陳以謂清議不容如此豈敢安位上又流涕不語請益堅它日忽宣諭巳有恩命云亦不乆在外虚席以待故除兩鎭有衮衣待還之語公復進見謂制語太過使臣不得安外乞改之上不許遂之相後移雍上使喻云只俟西帥回召見􅄾是時巳知不可爲堅請還相次改北門事由此分矣詔復知相州仍令赴闕朝覲陛辭之日上從容訪問政事公因進言用人當辨邪正爲治之本莫先於此上曰侍中國之龜鑑朕敢不從家傳又遺事云公自長安入覲朝廷欲留之公隂知時事遂堅請相陛辭日上謂卿去誰可屬國者公引元老一二人上黙然問金陵何如公曰爲翰林學士則有餘處此地則不可上又不答公便退後有問公何以識之公曰甞讀金陵荅楊忱一書窺其心術只爲一身不爲天下以此知非宰相器又聞見録云公自永興過闕神宗問曰卿與王安石議論不同何也魏公曰仁宗立先帝爲皇嗣時安石有異議與臣不同故也帝以魏公之語問荆公公曰方仁宗欲立先帝爲皇子時春秋未髙萬一有子措先帝於何地臣之論所以與韓􅄾異也荆公強辯􅀋如此當魏公請册英宗爲皇嗣時仁宗曰少俟後宫有就閤者公曰後宫生子所立嗣退居舊邸可也蓋魏公有以處之矣然荆公終英宗之世屢召不至實自慊也改判大名府時朝廷行青苗法衆議皆以謂不便臺諌官凢言及者皆以罪斥中外無復敢言公􅁣然上䟽乞罷其法條例司䟽難頒下及令進奏官指揮本院將中書劄子頒行天下公再奏曰臣詳制置司䟽駮事件即將臣元奏要切之語多從删去唯舉大槩用偏辭曲爲阻難及引周禮國服爲息之􅀃文其謬妄上以欺罔聖聴下以愚弄天下之人將使無復敢言其非者臣不勝痛憤至再有辨列按周禮泉府掌以市之征布歛市之不售貨之滯於民用者以其價買之物掲而書之以待不時而買者各從其抵鄭衆釋云書其價掲著其物也不時買者謂急求者也抵故價也臣謂周制民有貨在市而無人買或有積滯而妨民用者則官以時價買之書其物價示民􅀂有急求者則以官元買價與之此所謂王道也經又云凢賒者􅀕祀無過旬日䘮紀無過三月鄭衆釋云賒貰也以􅀕祀䘮紀故從官貰買物唐賈公彦䟽云賒與民不取利也經又云凢民之貸與其有司辨之以國服爲之息鄭衆釋云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出爲息也此所謂王道也而鄭康成云以其於國服事之稅爲息也於國事受園廛之田而貸萬泉者則朞出息五百臣謂周禮園廛二十而稅一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其􅃮林之征二十而五鄭康成蓋約此法謂從官貸錢若受園廛之地貸萬錢者出息五百公彦因而解謂近郊十一者萬錢朞出息一千逺郊二十而三者萬錢朞出息一千五百甸稍縣都之民萬錢朞出息二千臣謂如此則湏漆林之户取貸方出息二千五百也然當時未必如此今放青苗錢凢春貸十千半年之内便令納利二千秋再放十千至年終又令納利二千則是貸萬錢者不問逺近之地歳令出息四千也周禮至逺之地止出息二千今青苗取利尚過周禮一倍則制置司所言比周禮貸民取息立定分數巳不爲多亦是欺罔聖聴且謂天下之人皆不能辨也且今古異制貴於便時周禮所載有不可施于今者其事非一􅀂謂泉府一職今可施行則上言以官錢買在市不售及民間積滯之貨候民急求則依元買價與之民有􅀕祀䘮紀就官中借物限旬日三月還官而不取其利制置司何不將此周公太平巳試之法盡申明而行之豈可獨舉注䟽貸錢取息之利事以詆天下之公言哉上始得公䟽意已大悟亟欲寢罷王安石引疾在告唯叅知政事趙抃等對上諭欲罷之意抃乃曰此主於安石乞更俟安石出議之安石旣出執之益堅聞者惜之未幾御史中丞吕公著亦言青苗法非便安石欲黜之上曰湏别坐事令出旣而又曰公著言韓􅄾近有章䟽朝廷亦當聴納自古執政與藩臣􅀂生間隙至有舉􅀳陽之甲以逐君側之惡者安石遽曰只此可以逐矣公著遂坐誣大臣欲舉􅀳陽之甲罷知蔡州諌官孫覺聞之曰此言覺甞奏之今貶公著誤也公旣以言忤權臣又公著告詞明坐所因公益皇􅂲遂以疾上章乞知徐州章四上神宗遣内侍李舜舉慰諭之乃止家傳又行狀云初法下曰􅄾老臣也義不敢默及不聴暁官屬亟奉行曰􅄾一郡守也其敢不如令又聞見録云魏公知楊州王荆公􅀄及第爲簽判毎讀書至逹旦略假寐日巳髙急上府多不及盥潄魏公見荆公少年疑夜飲放逸一日從容謂荆公曰君少年無癈書不可自棄荆公不荅退而言曰韓公非知我者魏公後知荆公之賢欲収之門下荆公終不屈故荆公熈寜日録中短魏公爲多毎曰韓公但形相好爾作􅀞虎圗詩詆之至魏公薨荆公有挽詩云幕府少年今白髪傷心無路送靈輀猶不志魏公少年之語也太宗眞宗甞獵於大名之郊賦詩數十篇賈魏公時刻于石公留守日以其詩藏于班瑞殿旣成客有勸公摹本以進者公曰脩之則已安用進爲客亦莫喻公意韓絳來遂進之公聞之嘆曰昔豈不知進耶顧上方銳意四夷事不當更導之爾别録公因語華相在北門頗姑息三軍公曰御軍自有中道嚴固不可愛亦不可若當其罪雖日殺百人何害人自不怨遺事公曰魏公潞公俱甞鎭北門方魏公時朝城令决一守把兵士方二下輙悖罵不已知縣以解府魏公使前問云汝罵長官信否曰當時乗忿實有之公曰汝爲禁兵旣差在彼便有階級安可如此即於解狀判領赴市曹處斬從容平和略不變色衆但見其投筆方知有異至潞公時復有外鎭解一卒如前者潞公震怒問之兵對如實亦判處斬而擲筆以此見二公之量不同如魏公則彼自犯法吾何怒之有不惟學術之妙亦天資之過人爾元城語録公所歴諸大鎭皆有遺愛人人􅀞像事之獨魏人於生祠爲塑像歳時瞻奠比狄梁公戎狄􅀹畏公名凢使契丹及來使者必問韓侍中安否今何在其子忠彦使幕北虜主問左右孰屢使南朝識韓侍中觀忠彦貌􅀋父否或對曰頗􅀋乃即宴坐命􅀞工圗之而去館伴楊興功遽以告忠彦北門爲聘使道舊與京尹書皆押字不名及公留守則名于書其副使成禹錫仍喻來介曰以侍中在此故特名及公去魏後留守引前比欲得其名數強之卒不可毎南來渉臨清界即誡其下曰此韓侍中境無多湏索也行狀又澠水燕談云公舊有徳於􅀜中秦人愛之後子華自丞相出宣撫陜西父老有逺來觀於道傍者愕然相謂曰吾以謂韓公乃非也於是相引以去熈寜八年三月上遣近璫賁詔書問公曰两朝通好垂八十年近歳以來生事彌甚代北舊疆自有定封比亦遣官桉行經界甚明朕曲敦盟好固欲息民虜情無厭勢未能已今横使再來意在必得祖宗舊地决難順從􅀂事出不測其將奈何卿夙著忠義歴事三朝乃心罔不在王室國有大政謀及故老今待遇之要備禦之方如何卿冝宻陳朕將親覧公􅁣然曰事至如此難爲從半塗間理㑹湏講所以致之由乃可因手書千餘言以對又靣語使者曰横使雖傲不肯去第勿恤待以常禮使之乆留無害也冝復選使使虜就議則渠自不安矣比使者歸朝廷已許其地而蕭禧還矣别録又聞見録云熈寜七年春契丹遣㲹使蕭禧來言代北對境有侵地請遣使分畫神宗許之遣太常少卿劉忱爲使忱對便殿曰臣受命以來在樞府考核文據未見夲朝有尺寸侵虜地且鴈門者古名限塞雖跬步不可棄臣當以死拒之忱出疆帝手敕曰虜理屈則忿卿姑如所欲與之忱不奉詔􅀄以祕書丞吕大忠爲副使命下大忠丁家艱詔起復未行忱亦使回虜又遣蕭禧來帝開天章閣召執政與忱大忠同對論難乆之忱固執前議大忠亦然執政知不可奪罷忱爲三司判官大忠乞終喪制帝遣中使賜富韓公韓魏公文潞公曽魯公手詔問以計策韓魏公䟽曰臣觀近年以來朝廷舉事則似不以大敵爲恤虜人見形生疑必謂我有圗復燕南之意故造此釁端屢遣使以争理地界爲名觀我應之之實如何爾其所致虜之疑者七事髙麗臣屬契丹於朝廷乆絶朝貢乃因啇舶招諭而來於國家􅀄無損益而契丹謂以圗我一也吐蕃部族不相君長未甞爲邊患而強取其地建熈河一路殺其老弱以數萬計契丹聞之當謂行將及我二也邊近四山地􅀔髙仰不可爲溏濼向聞遣使部兵徧置榆柳以制虜􅀐三也義勇民兵將校甚整教習亦精而忽創團保甲一道紛然義勇人十去其七破可用之成法得増數之虚名四也河北城池工築並興増置守具檢視器械五也創都作院頒降弓刀新様大作戰車費財殫力先自困弊六也置河北三十七將各專軍政州縣不得􅀜預聲言出征又深見可疑之形七也夫北虜素爲敵國因疑起事不得不然亦其善自爲謀者也今横使再至􅀄示偃蹇以探伺朝廷況代北􅀄與雄州素有定界若優容而與之虜情無厭浸滛不許虜遂持此以爲巳直縱未大舉􅀔必漸擾諸邊卒隳盟好臣昔曽言青苗錢事而言者輙賜厚誣非陛下之明幾及大戮自此聞新法日下實避嫌疑不敢論列今親􅀍詔問事係國家安危言及而隠罪不容誅臣甞切計始爲陛下謀者必曰自祖宗以來因循苟簡治國之本當先富強則可以鞭笞四夷盡復唐之故疆然後制作禮樂以文太平故散青苗錢爲免役法次第取錢又内外置市易務新制日下更改無常官吏違者坐徒不以赦降監司督責以刻爲明今農怨於畎畒啇旅嘆於道路官吏不安其職􅂲陛下不盡知也夫欲攘斥四夷以興太平而先使􅀖本困摇衆心離怨此則陛下始謀者大誤也又好進之人不顧國家利害但得邊事將作富貴可圗必曰虜􅀔已衰特外恃驕慢爾以陛下神聖文武若擇將臣領大兵深入虜境則強劃之地一舉可復此又未之思也今河朔累歳灾傷民力大乏將官麄勇寡謀保甲未經訓練􅀂驅重兵頓於堅城之下粮道不繼腹背受敵雖曹彬米信名德宿將猶以此致岐溝之敗也臣愚今爲陛下計謂冝遣使報聘優致禮幣具言朝廷向來興作乃脩備之常與北朝通好之乆自古所無豈有它意且疆土素定當如舊界請命邊吏退近者侵占之地不可持此造端隳累世之好如將官之􅀋因而罷去以釋虜疑萬一􅃪服則可以迁延歳月陛下益飬民愛力選賢任能踈逺姦䛕進用忠鯁使天下恱服邊備日充虜果敗盟然後一振威武恢復故􅆠快忠義不平之心雪祖宗累朝之憤矣富韓公文潞公曾魯公皆主不與之論時王荆公再入相曰將欲取之必固與之也以筆畫其地圗命天章閣待制韓縝奉使舉與之蓋東西棄地五百餘里云祖宗故地荆公輕以􅂌隣國又建以與爲取之論至後世姦臣以伐燕爲神宗遺意卒致天下之亂荆公之罪可勝數哉具載之以爲世戒公器量過人性渾厚不爲畦畛峭塹功蓋天下位冠人臣不見其喜任莫大之責蹈不測之禍身危于累􅆑不見其憂怡然有常未甞爲事物遷動平生無僞飾其語言其行事進立于朝與士大夫語退息于室與家人言一出于誠門人或從公數十年記公言行相與反復考究表裏皆合無一不相應其所措置規摹閎大髙逺外視如甚略巳而詳觀其中則細故小物莫不各有區處故有志必成平居與人接禮下之問勞慰存氣語和易容人過失不以爲己忤小大無所較計及朝廷事則守其所當爭及於義理而後止毅然終不可奪行狀公氣貌嚴重人雖望而畏之及乎接物極恭而温􅀄爲館職所與游者皆一時英俊石曼卿氣豪邁多戯侮同舎獨見公不敢少慢但時呼爲韓家蓋當時市井小民凡所畏者尊官則呼厥姓曰某家故石効此語爲人敬服如此器量閎愽無所不容自在館閣已有重望於天下與同館王拱辰御史葉定基同發解開封府舉人拱辰定基時有喧爭公安坐幕中閱試卷如不聞拱辰忿不助巳詣公室謂公曰此中習宰相器度耶公和顔謝之别録云趙良規賔客甞曰公􅀄入館時年二十餘歳亦未甞有事跡著于人者然人意巳自以公輔許之矣及公爲樞宻副使石介有慶暦聖德頌曰予早識􅄾􅄾有竒骨可屬大事敦厚如勃後爲宰相歐陽永叔作相州晝錦堂記曰臨大節决大事垂紳正笏不動聲氣而措天下於太山之安可謂社稷之臣矣天下傳之以爲知言家傳公爲陜西招討時師魯與英公不相與師魯於公處即論英公事英公於公處亦論師魯公皆納之不形於言遂無事不然不靜矣遺事公言在政府時極有難處事蓋天下事無有盡如意湏索包惣不然不可一日處矣别録公言􅄾待罪中書時事有不當然者必堅立不動反覆論列湏正而後退不敢取次便放過别録慶暦中公與杜衍富弼范仲淹同心輔政更革弊事援引正人時張方平錢明逸王拱辰爲两制皆歴中丞故杜祁公而下爲三人者排逐指爲朋黨相繼罷去是時二府許逐廳見賔客拱辰來見因諷勸公奮手作跳擲􅀔曰湏是躍出黨中公對􅄾惟義之從不知有黨也旣而公亦求去位家傳又遺事云公惟務容小人善惡黒白不太分故小人忌之亦少如范富歐尹常欲分君子小人故小人忌怨日至朋黨亦起方諸公斥逐獨公安焉後扶持諸公復起皆公力也公旣解相印王丞相遺公書謂過周勃霍光姚崇宋璟又曰爲古人所未甞任大臣所不敢天下以爲名言歐陽文忠公亦曰進退之際從容有餘德業两全謗䜛自止過周公逺矣行狀公在宰相作乆旱喜雨詩上句言雷動風行雷雨作解之事斷句云湏􅁷慰滿三農望却歛神功寂似無人謂此眞做出相業也在北門重陽有詩云不羞老圃秋容淡且看寒花晚節香公居常謂保􅀄節易保晚節難故晚節事事􅀹著力所立特完又作喜雪詩云危石蓋深塩虎䧟老枝擎重玉龍寒人謂公身雖在外自任以天下之重如此公爲詩用意深非詳味之莫見其指皆此􅀋也遺事公雖在外然其心常繫社稷至身老而心益篤雖病不忘國家或有時聞更祖宗一法度壞朝廷一紀綱則泣血終日不食别録公曰􅄾平生仗􅀌忠以進每遇大事即以死自處幸而不死皆偶成實天扶持非􅄾所能也别録又遺事云公云臨事若慮得是劄定脚做更不移成敗則任它方可成務如􅄾􅀌忠毎頼神道相助幸而多有成耳公甞謂大臣以李固杜喬爲本其弊猶􅂲爲胡廣趙戒以胡趙自處弊可知也遺事公曰昔與希文議邊事唯旋旋小進爲得計亟欲多展必不可保别録公言慶暦中與希文彦國同在西府上前爭事議論各别下殿各不失和氣如未甞爭也甞時相善三人正如推車子蓋其心主於車可行而巳不爲巳也别録公因􅀃康定以來事嘆曰忠義難立直道難行别録忠義一作中道公因論進退曰處去就之難者不可猛而有迹公毎聞新執政用一人歎曰放上則易放下則難遺事凢人語及其所不平則氣必動色必變辭必厲唯公不然更􅀃到小人忘恩背義欲傾巳處辭和氣平如道尋常事別録公爲丞相毎見文字有攻人隱惡者即手自封之未甞使人見別録歐陽永叔在政府時每有人不中理者輙峻折之故人多怨公則不然從容喻之以不可之理而巳未甞峻折之也語録公因論君子小人之際皆當以誠待之但知其小人則淺與之接耳凢人至於小人欺巳處覺必露其明以破之公獨不然明足以照小人之欺然毎受之未甞形色也别録又遺事云人有疑公待君子小人皆以誠往往爲小人所欺奈何公曰不然亦觀其人如何隨分數放之耳豈可以爲小人不待以誠邪公謂小人不可求逺三家村中亦有一家當求處之之理知其爲小人以小人處之更不可校如校之則自小矣人有非毀但當反巳是不是巳是則是在我而罪在彼烏用計其如何遺事公語小人害君子猶蜂蠆之毒物違之正使不能加諸人可謂善處矣遺事公以恩及人無求德心故所及者廣所感亦深平時非不知人之欺終不别白能受其欺賤官因事爭於前毎及巳之誤即受之事行其直者不主巳爲是若禀事甞訐觸非而却之異日復禀終不以前日芥蔕置乎色亦惟是之從遺事孫和甫奉使虜中過魏請教于公公曰勿以爲夷狄而鄙薄之甚善公在魏府僚屬路拯者就案呈有司事而狀尾忘書名公即以䄂覆之仰首與語稍稍潜卷從容以授之别録禁卒有私逃數日而􅀒其母以至者軍中執之以見公按法當死卒曰母老且病近在數舎間常􅂲不復見誠知擅去當誅得一見死無恨公惻然考按得實即以便冝釋之軍中感恱有垂涕者别録公性至仁其臨事或誅一人或笞一人顔色不覺有異别録仁宗朝李都尉喜延士大夫盡聲色之樂一時館閣清流無不往者公於其間最年少獨未甞造焉李數召而公數以事辭人有強之者公曰固欲往但未有名耳公處之不失和李莫能致怨同時諸公亦不以爲介也別録公在大名日有人獻玉盞二􅃗云耕者入壞塚而得表裏無纎瑕可指亦絶寳也公以百金荅之㔫爲寳玩毎開宴召客特設一卓覆以錦衣置玉盞其上一日召漕使且將用之酌酒勸坐客俄爲一吏誤觸倒玉盞俱碎坐客皆愕然吏且伏地待罪公神色不動􅀏謂坐客曰凢物之成毁亦自有時數俄顧吏曰汝誤也非故也何罪之有坐客皆歎服公寛厚不已遺事公帥定武時夜作書令一侍兵持燭於旁侍兵它顧燭燃公􅂡公遽以䄂摩之而作書如故少頃回視則已易其人矣公􅂲主吏鞭之亟呼視之曰勿易渠巳解持燭矣軍中感服别録公姿貌英特羙鬚髯骨骼清聳眉目森秀圗繪傳天下人以謂如髙山大岳望之氣象雄傑而包育微細畜泄雲雨藏匿寳怪蓋自然也平時家居雖祁寒盛暑倦劇對僮使亦攝衣危坐無怠容遇事遽猝而意不亂冗劇而才有餘萬兵侍帳百吏遶前處之安静􅁉如也巳而剖决皆就條理勤于吏職簿書文檄檢察研核莫不躬親左右或曰公位重年耆艾功名如此朝廷賜守郷郡以養安幸無親小事公曰巳憚煩勞吏民當有受敝者且俸禄日萬錢不事事吾何安哉公㔫知命毎誡其子曰窮逹禍福固有定分枉道以求之徒䘮所守切勿爲也余以􅀌忠自信未甞有因縁慿籍而每遭人主爲知巳今忝三公所恃者公道與神明而巳矣焉可誣哉其自守如此行狀公之在相位也凢進用人惟以公議所在多有未甞識者人亦不知出何人門下人或可詢聞所稱薦用之不疑甞訪於王安石安石曰文行則孫􅁴吏事則張頡皆可用也時二人皆常調小官公乃處覺於館閣任頡於省府它皆此􅀋也所薦引於上前者未甞輙漏其語間因上有宣諭或同僚談􅀃人始聞之公􅀄罷相上問孰可以爲執政者公力薦韓綘忠直有公輔之器上遂用爲樞宻副使旣而有排毀絳者上曰韓􅄾之去惟薦此人朕豈可違公旣罷去蘇頌除脩注往謝二府叅政趙槩曰韓公屢欲用君以魯公避親嫌今乃上記前日韓公語矣二公始知公甞援巳也家􅀓公喜用知名士或不識其靣旣用之其人亦不自知所進薦也不私所親以官而怨家仇人其才果可用必用之守楊州日轉運使李參沮州事在陜西甞救有罪將李緯寛之而緯子師中不知猶訟于朝孫􅃆爲御史以西事詆公甚力及爲宰相悉置不報顯進之三人者皆愧悔深自恨行狀又遺事云李師中爲布衣坐父緯鎮戎退陣當斬公馳至鎮戎以賊衆我寡非諸將罪且欲戮其爲首一人師中父在貸中方請于朝李師中赴南宫試遂上書論公募民爲兵往應賊大擾乞斬公謝陜西旣不行後甞有疑公心公執政有請勿害師中者公曰彼是時以子救父豈可加罪人聞之咸服其公恕然師中終未之信後擢知两制師中方愧服且深謝之又家傳曰師中方坐事廢黜一日擢爲髙陽􅀜安撫使賜對日神宗諭曰韓􅄾力薦卿有才故委以方靣師中方大愧服又遺事云公兄爲泰倅孫元規爲司理甞薦之遂拜元規書問未甞踰時不講後公爲西帥兵敗元規領言責深議公罪自此慊公書問遂絶公一日以書問元規平日事契如此若以伯氏嘗薦而後見攻此乃韓厥之舉也若􅄾當言責亦不爲元規隱此何待􅄾之不廣願公勿疑元規疑之終不講書公秉政頗以公有害巳心後起廢爲慶帥過闕乃泣見曰􅃆真小人公知􅃆􅃆不知公又家傳曰􅃆帥慶州過闕賜對英宗諭曰韓􅄾稱卿有邊帥才故復用卿􅃆退而䄂長書俯伏謝罪皇愧幾無所容有問公郭逵衆人皆謂出公力曰用人等事非人臣得專湏還它主上􅀂用人是則將順非則開陳何謂􅄾力始英宗欲郝質在西府公謂質固得但二府論道經􅀖地一黥卒主之􅂲反使不安如狄青才業爲中外所仗一旦居此論議卒紛然而去愛之適所以害之英宗沉吟乆曰曰如此則用郭逵粗勝質遂然之旣阻其一又阻其次不可王陶遂見誣以引往年之厮役又曰此事惟趙少師知之是時同議以謂大躐等當近下安排名目遂有同簽書之號遺事公元勲盛德如此聞人一小善則曰􅄾不及也別録公平日􅅄進人物極愽至心許者不過一二人多見其與人長忘人短而用之謂太濫其實胷中不啻黒白遺事公平日論時望諸公皆不以經綸許之謂才器湏周可當四靣入麄入細乃經綸事業今皆可當一靣才也遺事公論近世宰相獨許裴􅀳公本朝惟師服王沂公又甞云􅀂􅀳公􅀧檢著亦有未盡處君子成人之羙不可言也不知摘􅀳公何事恨不得聞也或問公威克厥愛允濟如潞公臨大事全是威何如曰待威而後濟者亦是也然有不湏以威而能濟者觀公意豈以德不足者必待威以立事耶古人謂鵰鶚百鳥望而畏之鸞鳯百鳥望而愛之其服則一其品固相逺矣遺事公甞言仁廟議配饗清議皆與沂公不與申公誠意不可欺如此又曰頃時丁宼立朝天下聞一善事皆歸之萊公未必盡出萊公也聞一不善事皆歸之􅀳公未必盡岀􅀳公也蓋天下之善惡爭歸焉人之脩身養誠意不可不謹又曰沂公爲相論其事則無可數者論其人則天下信之爲賢宰相又曰申公以進賢自任恩歸於巳時士皆出其籠絡獨歐范尹旋収旋失之終不受其籠絡遺事公謂挺然忠義奮不顧身師魯之所存也身安國家可保明消息盈虚之理希文之所存也敢問二公曰立一節則師魯可也考其終身不免終亦無所濟若成就大事以濟天下則希文可也公言富公爲鄆倅沂公作安撫使一日謂富公曰即日當曽位富不敢當沂公曰然進時易退時難遺事或問君實晦叔天下所屬望它日大用何如公曰才偏規摹小問晦叔平日曰今日廼是平日遺事孔嗣宗任河北憲司農召議役法别公請言公不荅請益堅公曰故舊不當無言此行但爲河北􅀃得些衆人不敢道意思足矣嗣宗臨上馬又曰富貴易得名節難保嗣宗歸不懌者數日終不能自克遺事吴長文子璟素以堅挺有器節稱公亦稱之及幕府有闕門下有以璟爲言者公曰此人氣雖壯然包蓄不深發必􅁀且不中節當以此敗置而不言不踰年璟敗皆如其言遺事趙君錫􅀍召别公請教公曰平日之學正爲今日若不錯餘不錯矣終不語及它事又請云若上問某事以何對公曰此則在廷評自處遺事李清臣平日多於公前論釋氏貴定力謂無定則不能主善公每然之後朝廷斥異論者清臣頗持两端公因書問之曰比來臺閣斥逐紛紛吾親得不少加定力耶公之善諭人如此遺事錢明逸乆在禁林不滿意出爲秦州居常怏怏不事事公聞之語人曰巳雖不足獨不思所部十萬生靈耶别録公平日謂成大事在膽未常以膽許人往往自許也遺事公曰勇可習遺事潞公在西府人有以公進退諷潞公者潞公曰彦􅀶豈可望韓公韓公地位别彦􅀶則有些麄材蒙朝廷擢備两府耳人頗與潞公自知之明遺事韓魏公屢薦歐陽公而仁宗不用它日復薦之曰韓愈唐之名士天下望以爲相而竟不用使愈爲之未必有􅀘於唐而談者至今以爲謗歐陽脩今之韓愈也而陛下不用臣􅂲後之談者謗必及國不特臣軰而巳陛下何惜不一試之以暁天下後世也上從之談叢公言歐曽同在两府歐性素􅄶曽則齷齪每議事至厲聲相攻不可解公一切不問俟其氣定徐以一言可否之二公皆伏遺事公晚與歐陽永叔相知而相親最深永叔心服公之德量甞曰累百歐陽脩何敢望韓公公曰永叔相知無它􅄾以誠而已公知永叔不以繫辭爲孔子書又多不以文中子爲可取中書相㑹累年未甞與之言及也別録石守道編三朝聖政録將上一日求質於公公指數事爲非其一太祖惑一宫鬟視朝晏群臣有言太祖悟伺其酣寢刺殺之公曰此豈可爲萬世法已溺之廼惡其溺而殺之彼何罪使其復有嬖將不勝其殺矣遂去此等數事守道服其清識遺事石守道作慶暦聖德詩忠邪太明白公與范公適自陜西來朝道中得之范公拊股謂公曰爲此怪􅀑軰壞了也公曰天下事不可如此如此必壞别録公言始學行巳當如金玉不受微塵之汚方是及其成德有所受亦有所不害者不然無容矣遺事公甞謂忠義之心皆有之惟其執之不固勉之不力是以不及於古人遺事公甞從容議及養兵事􅁣然曰􅄾有所思而得之未甞語人人亦未必信養兵雖非古然積習已乆不可廢之又自有利處不爲不深昔者發百姓戍邊無虚歳父子兄弟有生離死別之苦議者但爲不如漢唐調兵於民獨不見杜甫石壕吏一篇調兵於民其弊乃至此後世旣収拾強悍無賴者養之以爲兵良民雖稅歛良厚而終身保骨肉相聚之樂此豈小事又其練習戰陣而豪勇可使安得與農民同日道也別録公甞謂處事不可有心有心則不自然不自然則擾太原土風喜射故民間有弓箭社􅄾在太原不禁亦不驅故人情自得亦可寓武備於其間後宋相繼政頗著心處之下令籍爲部伍仍湏用角弓太原人貧素只用木弓自此有賣牛置弓者人始騷然矣此蓋出於有心也遺事公重恩義好樂士大夫􅅄與後進賙人之急視用財物如瓦礫糠粺不以慁其意旣乏則􅂢已服用玩好或脫取家人簪珥與之士歸趨之無逺近公不厭踈戚與交舊之孫子寒窶無所託而依以爲生者常十數家少善尹師魯師魯亡割俸􅂌其􅀌爲直其􅁈于朝仍奏録其子合宗族百口衣食均等無所異嫁􅀌女十餘人養育諸姪比于已子所得恩例先及旁族逮其終子有褐衣未命者追孝祖考恨不及養奉瑩域其厚自五世祖冢皆訪得之買田其旁植松檟召人守視之貴顯五十年身爲將相累更大賜予及其殁也庫無羡錢室無竒玩頼天子賜金帛官出葬資䘮事得以無乏行狀又聞見録云尹師魯以貶死其子朴方襁褓旣長韓魏公聞於朝命以官薦爲屬教育之如子弟朴少年有才所爲或過舉魏公掛師魯之像哭之朴亦早死公天性清簡至於圖􅀞愽奕聲伎之娱一無所好獨觀書史晝夜不倦餘暇則喜書札素愛顔魯公書而加以遒徤自成一家端重剛勁􅀋其爲人行狀韓魏公在相府時家有女樂二十餘軰及崔夫人亡一日盡厚遣之同列多勸且留以爲莫年歡公曰所樂能幾何而常令人心勞孰􅀂吾簡靜之樂也識者以謂過人逺矣別録崔公孺諌議大夫立之子韓魏公夫人之弟也性亮直善靣折人魏公執政用監司有非其人者公孺曰公居陶鎔之地冝法造化爲心造化以虵虎者害人之物故置虵於藪澤置虎於山林今公乃置之於通衢使爲民害可乎魏公甚嚴憚之記聞或問伊川量可學否曰可學進則識進識進則量進曰如魏公可學否曰魏公是間氣胡氏傳家録論韓魏公范文正公皆是天資不由講學上蔡語録三朝名臣言行録卷第一一之二樞宻使濟陽曹武惠王王名彬字國華眞定靈壽人漢乾祐中􅀘成德軍牙職入周以後宫近戚歴典蒲􅀳軍太祖乾德初改内客省使兼樞宻承旨二年征蜀以爲歸州行營都監師還授宣徽南院使義成軍節度使開寳七年十月征江南爲昇州西南路行營都部署明年十一月江南平以功拜樞宻使領忠武軍節度太宗即位加同平章事從平太原加兼侍中出爲天平節度使雍熈三年王師北伐爲幽州道行營前軍都部署以違詔失律責授檢校太保右驍􅀐上將軍四年起爲武寧節度使眞宗嗣位召拜樞宻使咸平二年薨年六十九追封濟陽郡王配享太祖廟庭王事周甞監蒲州軍蒲帥王知鎬性長厚以王帝室近親􅀹所加禮而王恭謹彌至雖公府宴樂必端簡終日未甞旁視王公謂從事曰老夫自謂夙夜匪懈今覩監軍誠散率之甚也李宗諤撰行狀使吴越宣賚旣畢即日而廻私覿之禮皆所不受越人追以奉之王猶不納旣而曰吾或終拒之是近名也遂盡籍其數歸奏世宗願納内帑世宗曰前使東南者皆分外求索是致逺人頗輕朝命汝獨如此可謂賢矣然此常禮不必固辭王始拜賜悉散遺親舊不留一錢行狀充􅀳州兵馬都監劉鈞盗據并汾􅀳爲敵境王未及壯爰膺戎􅀉晝則訓練夜則警廵食無膏梁衣靡文采甞一日王與主帥曁諸賔從環坐於野適有鄰道守將命單介馳書詣王使人素不識潜問人曰誰爲曹公有指王以示之者使人初謂其紿也􅀏曰豈有國戚近臣肯衣弋綈袍坐木素胡床者乎審視之方信其簡儉如此行狀太祖始在潜躍實典禁軍以王中立不􅀝尤所推重然王非因公事未甞造門羣居醼樂亦所罕至太祖益以此竒之建隆二年自平陽召歸謂曰我當日常欲親汝汝何故踈吾王頓首謝曰臣事周朝連葭莩之親復忝内職靖恭守位猶恐􅀗過安敢妄有交納太祖曰朕素知汝意方將擢用冝罄乃誠以輔新􅀖也行狀又記聞云太祖事世宗於澶州曹彬爲世宗親吏掌茶酒太祖嘗從求酒彬曰此官酒不敢相與自沽酒以飲太祖及即位語群臣曰世宗舊吏不欺其主者獨曹彬耳由是委以腹心使監征蜀之軍大舉伐蜀詔劉光義充歸州路行營前軍副部署以王爲都監始破三㑹巫山寨次平夔州又取遂州時諸將皆欲屠城殺降以逞威􅁀唯王申禁戢之令明勸賞之法繇是乗破竹之􅀔不血刃而峽中郡縣悉下兩川平王與諸將㑹成都大將王全斌等日夕縱酒不恤軍事部下列校皆求取無厭蜀人苦之王屢勸全斌等冝速振旅凱旋全斌等逗留不發卒致全師雄等作亂郡縣相應盗賊􅑣起王與崔彦進悉力剪平之洎全斌等歸闕太祖盡得全斌等所爲事狀又靣詰王仁贍仁贍歴詆諸將奢縱不法事冀以自解止言清畏廉恪唯曹彬一人耳太祖大怒全斌等並下吏議即日授王宣徽南院使充義成軍節度使王獨懇請曰收蜀將校皆得罪臣以無功獨蒙厚賞恐無以勸天下太祖􅀏曰卿有茂功加以不伐設有微累仁贍肯惜言哉夫懲惡勸善此所以勵臣子也王不敢辭行狀又掇遺曰曹彬討蜀初克成都有􅀗婦女者彬悉閉于一第竅以度食且戒左右曰是將進御當宻衛之洎事罷咸訪其親以還之無者備禮以嫁之及師還輜重甚多或譛言悉竒貨也太祖宻令伺之圖書也無銖金寸錦之附焉又記聞曰王仁贍自劒南獨先歸闕乞見歷數王全斌等貪縱之狀太祖􅀏謂仁贍曰納李廷珪妓擅開豐德庫金寳此又誰邪仁贍惶怖叩仗待罪曰此行清介畏謹但止有曹彬一人爾􅀳公談録曰太祖遣王全斌等平蜀全斌殺降兵三千人時曹彬不從但收其文案不署字及師還太祖傳宣送中書取勘左右曰方克復西蜀回雖殺降兵亦不可便案劾今後陛下如何用人太祖曰不然河東江南皆未歸服若不勘劾恐今後委任者轉亂殺人但且令勘劾洎勘案成宣令後殿見責問曰如何敢亂殺人又曰曹彬但退不干你事曹不退但叩頭伏罪曰臣同商議罪合誅戮太祖遂皆原之後忽一日宣曹并潘美曰命汝収江南又顧曹曰更不得似徃時西川亂殺人曹徐奏曰臣􅀂不奏又恐陛下未知曩日西川殺降之事臣曽商量固執不下臣見收得當日文案元不着字太祖令取覽之謂曰如此則當時何故堅自服罪曰臣從初與全斌等同􅀍委任若全斌等獲罪臣獨清雪不爲穩便所以一向服罪太祖曰卿旣欲自當罪又安用留此文字曰臣􅀄謂陛下必行誅戮故留此文書令老母進呈乞全老母之命太祖尤器遇之又潜謂曰但只要他歸服切勿煞是他無罪過自是自家着他不得卿切㑹取曹曰謹奉詔旨不敢違越􅀳公曰今國家享無疆之休良由是耳而曹之諸子皆享豐禄豈非餘慶乎王與太祖宻論天下事無不合上意而公堂㑹議如不能言太祖益所器重行狀太祖遣曹彬潘美征江南彬辭才力不迨乞別選能臣美盛言江南可取帝大言諭彬曰所謂大將者能斬出位犯分之副將則不難矣美汗下不敢仰視將行夜召彬入禁中帝親酌酒彬醉宫人以水沃其靣旣醒帝撫其背以遣曰㑹取㑹取他本無罪只是自家着他不得蓋欲以恩德來之也是故以彬之厚重美之明銳更相爲助令行禁止未甞妄戮一人而江南平聞見録曹彬事太祖時將討金陵責後主稱疾不朝之罪以彬長者令爲統帥將終全其城彬累遣告城中大軍决取十一月二十七日破城冝早爲之圖後主將遣其愛子清源郡公仲寓入覲至仲冬下旬日日克期仲寓未出彬屢遣督之言郎君到寨即四靣罷攻後主終惑左右之言以爲堅壘如此天象無變豈可計日而取蓋敵人之言豈足爲信但報言行李之物未備宮中之宴餞未畢將以二十七日出彬又令懇言至二十六日亦無及矣果以是日城䧟整軍成列至其宮城門後主方開門奉表納降彬荅拜爲之盡禮先是宫中預積薪後主誓言􅀂社稷失守當携血屬以赴火旣見彬彬諭以歸朝俸賜有限費用至廣當厚自齎裝旣歸有司之籍則無及矣遣後主入治裝禆將梁逈田欽􅍈皆力爭以爲苟有不虞咎將誰執彬但㗛而不荅逈等切諌彬曰非爾所知觀煜神氣懦夫女子之不若豈能自引决哉煜果無他彬遣五百人爲般致輜重登舟有一卒􅀒籠下道旋彬立命斬之􅀒檐者罔敢蹉跌後主旣失國殊無心問家計旣升舟隨軍官吏入其宫屏幃几硯什器皆設不動所齎持鮮矣談苑江南文武官吏頼王保全皆得其所親屬有爲軍士所掠者王即時遣還之因大搜軍中無得匿人妻女倉廩府庫悉委轉運使按籍檢視王一不問振乏絶恤鰥寡仁人之心無所不至吴人大恱及歸舟中無他物惟圖籍衣被而巳行狀曹彬攻金陵垂克忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈唯須諸公共發誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香爲誓明日稍愈及克金陵城中皆按堵如故曹翰克江州忿其乆不下屠戮無遺彬之子孫貴盛至今不絶翰卒未三十年子孫有乞匄於海上者矣程頥云記聞金陵之䧟後主以藏中黃金分賜近臣辦裝張佖得二百兩詣曹彬自陳不受願奏其事彬以金輸官而不以聞談苑太祖遣曹彬等下江南許以平定之日授之相印洎凱旋恩禮踰厚而絶無前命彬等因曲宴從容陳叙及之上曰非忘之也顧念河東未下而卿等官位隆重豈可更親此事耶彬等宴退其家各賜錢百萬其重爵勸功若此沂公筆録涑水記聞云彬怏怏而退至家見錢滿室乃歎曰好官亦不過多得錢耳何必使相也以功拜樞宻使王在宥宻常公服危坐如對君父接小吏亦以禮未甞以名呼歸私第唯閉閤宴居不妄通賔客五鼓纔動巳待漏於禁門矣雖雪霜不易其操如此者八年行狀王和氣接物煦如陽春忠誠事君皎如白日不以冨貴驕人唯以謙恭自處兩緫機宻五臨蕃翰位益髙而志益下寵愈厚而憂愈深不蓄羡財爲子孫計不樹私黨爲門館恩所居之宅僅芘風雨敗簷踈牖不堪其憂而王處之恬然自􅀂喜愠之色家人不知湛然澄波莫窺其際所以西降蜀南平吴出將入相善始令終者蓋王能以功業自全而善守冨貴也加以歴代治亂近朝興廢燦然胷中問一知十每與朝士清談終日鴻儒碩生自以爲不及行狀曹侍中爲人仁愛多恕平數國未甞妄斬人甞知徐州有吏犯罪旣立案逾年然後杖之人皆不暁其旨彬曰吾聞此人新娶婦􅀂杖之彼其舅姑必以婦爲不利而惡之朝夕笞罵使不能自存吾故緩其事而法亦不赦也其用志如此記聞曹武惠王國朝名將勲業之盛無與爲比甞曰自吾爲將殺人多矣然未甞以私喜怒輙戮一人其所居堂室弊壞子弟請加修葺公曰時方大冬牆壁瓦石之間百蟲所蟄不可傷其生其仁心愛物蓋如此旣平江南回詣閤門入見牓子稱奉勑江南幹當公事回其謙恭不伐又如此歸田録曹武惠王始生周􅀊日父母以百玩之具羅於席觀其所取武惠左手提干戈右手取爼豆斯須取一印餘無所視後果爲樞宻使相卒贈濟陽王配享帝食公雖兼領將相不以爵禄自大造門者皆降廡而揖不名呼下吏吏之禀白者雖劇暑不冠不見伐江南西蜀二國諸將皆稇載而歸惟公但圖史衾簟而巳爲藩帥中塗遇朝紳必引車避過市戢其傳呵戒導吏去馬不得越十輪恐壅遏市井性仁恕清謹無撓強記善談論清白如寒儒宅帑無十日之蓄至坐武帳止衣弋綈紵絮而巳征幽州偶失律於􅃰鹿素服待罪趙叅政昌言請按軍法朝廷察之止責右驍衛上將軍未幾遂起趙叅政自延安還因事􅀍劾於尚書省乆不許見時公巳復樞宻使三抗䟽力雪之方許朝謁士論歎伏玉壷清話侍中曹公彬爲樞宻使向公敏中爲副使當是時契丹犯塞繼遷叛命每軍書狎至上必亟召樞臣計議彬則曰此狂冦當速發兵誅討斬决而已止用強弩若干歩兵若干定矣敏中徐曰某所儲廪未備或道途迂逺或出兵非其時當别施方略制之纎悉措置多從敏中所議上謂將帥難其人彬必懇激而言臣請自効更無他􅀃敏中常私恠之及子瑋亦有將材累歴邊任威名甚重晚自樞貳出鎮西鄙臨事整衆酷􅀋先君復果於戰闘而不肯以安民柔逺爲意豈將帥之體固當􅀂是邪王沂公筆録曹冀王彬前後受命帥師征討諸國凢降四國主江南西川廣南湖南也未甞殺一無辜功名顯著爲諸將之首諸子皆賢令瑋琮璨繼領旄􅃏陶弼觀王􅀞像有詩曰蒐兵四把降王縛教子三登上將壇其後少子玘追封王爵實生慈聖光獻太后輔佐仁祖母儀累朝聖功仁德天下懷慕以至濟隂生享王爵子孫昌盛近世無比非元功隂德享報深厚何以至此雖漢馬唐郭殆無以過嗚呼盛哉澠水燕談
