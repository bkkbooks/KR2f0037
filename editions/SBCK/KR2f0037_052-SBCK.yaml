body:
  text: 九之六起居舎人尹公公名洙字師魯河南人中進士第調河南府户曹叅軍知光澤縣召試除館閣校勘貶監郢州酒稅大將葛懷敏辟爲經略判官范韓二公出爲經略安撫副使復以公爲判官降通判濠州韓公知秦州辟通判州事改知涇州徙渭州兼領涇原路經略公事移知慶州遷起居舎人直龍圖閣貶崇信軍節度副使徙監均州酒稅卒年四十六師魯河南人姓尹氏諱洙然天下之士識與不識皆稱之曰師魯蓋其名重當丗而丗之知師魯者或推其文學或髙其議論或多其材能至其忠義之節處窮逹臨禍福無愧於古君子則天下稱師魯者未必盡知之師魯爲文章簡而有法博學彊記通知今古長於春秋其與人言是是非非務窮盡道理乃巳不爲苟止而妄隨而人亦罕能過也遇事無難易而勇於敢爲其所以見稱於丗者亦所以取嫉於人故其卒窮以死歐陽公撰墓誌范公貶饒州諫官御史不肯言師魯上書言仲淹臣之師友願得俱貶貶監郢州酒稅墓誌康定元年春夏人冦延州大將劉平戰死天子命夏公開府永興以經略招討之予與范公爲之副公爲判官未幾上遣翰林學士晁公宗慤督出兵攻賊合府議奏曰今將與兵尚未習練願謹邊防期以嵗月平之使還而賊復冦鎮戎詔下切責俾以進兵月日來上府中復議曰將在軍雖得以自便然攻守大計當禀筭于朝廷乃畫攻守二䇿余與公詣闕奏之唯上所擇詔取攻䇿巳而難之事方寢賊復遣人以書叩延州僞請和而大舉兵冦涇原之山外殺部署任福公時在慶州得涇原求援書即移文慶帥率其部將劉政銳兵數千人便道走鎮戎未至賊引去夏公奏公爲專徙通判濠州韓魏公撰墓表初朝廷之將用攻䇿也命葛懷敏出鄜延道勒兵綏宥間攻賊積聚招懷種族奪其要害而堡障之賊知朝廷之威必飜然來服則乆而易制公曰是行也不患將卒無勇患應敵寡謀耳乃自請叅議懷敏行營軍事有詔如請而事中罷墓表涇原乗葛懷敏覆軍之後傷夷殘缺千罅百漏公夙夜撫葺一道以完時宣徽使鄭公爲陜西四路帥主静邊寨主劉滬議遣其屬董士廉與滬於章川堡南入諸羌中開道二百里脩水洛城以通秦之援兵公曰賊數犯塞必併兵一道五路帥之戰兵常不登二萬人而當賊昊舉國之衆且由黃石河路來援雖逺水洛路二日而援師安然以濟今無故奪諸羌田二百里引堡屯師坐耗芻粮不勝計以冀秦援一二日之速則吾兵愈分而邊用不給矣乃奏罷之便詔從之㑹鄭改知永興軍乃署前帥牒飭滬等督役如初二人者遂不奉詔興作不巳公遣人召滬者再不至乃命瓦亭寨主張忠代滬滬復不受代部署狄公於是親至德順軍攝滬士廉下獄差官按問而鄭比奏夲道沮滬等功朝廷薄滬等罪徙公慶州而城水洛焉墓表又記聞云先是渭州西路廵檢劉滬建筞以爲秦渭兩路有急發兵相援路出隴坁之内回逺恐不及事請募熟戸於山外築水洛結公二城以兵戍之緩急以通援兵之路都部署鄭戩以狀聞命滬及董士廉董其役㑹韓􅄾宣撫陜西還奏罷四路招討以戩知永興軍又言兩城之旁多生户今奪其地恐城未畢而冦至請罷之戩因極言二城之利不可􅂺罷詔三司副使魚周詢徃視其利害未至尹洙召滬士廉令還滬士廉以熟戸旣集官物無所付請遂成之洙怒以二人違節制命部署狄青徃斬之青械繫滬士廉於德順軍及周詢還是戩議乃徙洙慶州范公旣罷政事當時衆賢執政皆指爲朋黨欲因事斥逐之董士廉者即詣闕上書以水洛事訟公且誣公在渭有盗贓制使承風指按驗百端不能得一毫以汙公有部將孫用者出于軍校嘗自京取民息錢至官貧不能償公與狄公惜其材乃分假公使錢俾償其民而月取其俸償于官逮按問而錢先巳輸官矣坐此貶公崇信軍節度副使徙監均州酒稅墓表又南豐􅄂識云尹洙當慶曆中與范仲淹等友善仲淹等旣罷朝政洙亦爲人希時宰意攻以居渭州時事遂置獄遣劉湜按之一日謂洙曰龍圖得罪死矣洙請其事湜曰龍圖以銀爲偏提給銀有記而收偏提無籍是以知龍圖當得罪死也洙曰此不足以致洙罪也以銀爲偏提用某工校主之附某籍可取視之湜閱籍果然知不能害嘆息而巳其後洙在隨州而孫甫之翰知安州過隨二人皆好辨論對榻語幾月無所不道而洙未甞有一言及湜者甫問曰劉湜按師魯欲致師魯於死而師魯絶口未甞有一言及湜何也洙曰湜與洙夲未甞有不足之意其希用事者意欲害洙廼湜不能自樹立耳洙何恨於湜乎甫深伏其識量之翰又言尹洙自謂平生好善之心過於嫉􅁖之翰以謂信然師魯在均州得疾㳂牒至南陽訪醫藥疾革頋稚子在前無甚憐之色與賔客言終不及其私整冠帶盥濯怡然隱几而卒墓誌范公作師魯文集序云師魯來南陽一日予謂師魯曰將與韓公稚圭歐陽永叔述君之行而分俸以濟君之家君其無憂師魯舉手曰君言盡矣吾不復云翌日再徃不􅀗見傳言曰巳别矣遂隱几而卒又記聞云尹師魯謫官均州時范希文知鄧州師魯得疾即擅去官詣鄧州以後事属希文希文日徃視其疾一旦遣人招希文甚遽旣至師魯曰洙今日必死矣人言將死者必見􅀑神此不可信洙並無所見但覺氣息奄奄就盡耳隱几坐與希文語乆之謂希文曰公可出洙將逝矣希文出至廳事巳聞其家號哭希文竭力送其䘮及妻拏歸洛陽按涷水記聞所載如此與范歐二公所記巳不同而沈氏筆談所記尤詭異今不復載師魯當天下無事時獨喜論兵爲叙燕息戍二篇行于丗自西兵起凡五六歳未甞不在其間故於西事尤習其詳欲訓土兵代戍卒以減邊用爲禦戎長乆之䇿皆未及施爲而元昊臣西兵解嚴師魯亦去而得罪矣墓誌公天性慈仁内剛外和凢事有小而可矜者必惻然不忍發見顔皃及臨大節斷大事則心如金石雖鼎鑊前列不可變也在軍謙勤愛士雖悍夫冗列皆降意容接故人人願盡其力所至郡邑脩設條教務以實惠及下去則人思之墓表文章自唐之衰日淪淺俗寖以大敝夲朝柳公仲塗始以古道發明之後卒不能振天聖初公獨與穆叅軍伯長矯時所尚力以古文爲主次得歐陽永叔以雄詞鼓動之於是後學大悟文風一變墓表師魯深於春秋故其文謹嚴辭約而理精章奏䟽議大見風采士林聳慕焉范文正公撰文集序夲朝古文柳開仲塗穆脩伯長首爲之唱尹洙師魯兄弟繼其後歐陽文忠公蚤工偶儷之文及官河南始得師魯乃出韓退之文學之蓋公與師魯於文雖不同公爲古文則居師魯後也如五代史公嘗與師魯約分撰其後師魯死無子今歐陽公五代史頒之學官盛行於丗内果有師魯之文乎抑歐陽公自爲之也歐陽公誌師魯墓論其文曰簡而有法且謂人曰在孔子六經中唯春秋可當則歐陽公於師魯不薄矣崇寧間改脩神宗正史歐陽公傳乃云同時有尹洙者亦爲古文然洙才下不足以望脩云蓋史官皆晚學小生不知前軰文章淵原自有次第也聞見録天聖明道中錢文僖公自樞宻留守西都謝希深爲通判歐陽永叔爲推官尹師魯爲掌書記梅聖俞爲主簿皆天下之士錢相因府第起􅀟桂樓西城建臨園驛命永叔師魯作記永叔文先成凡千餘言師魯曰洙止用五百字可記文成永叔服其簡古永叔自此始爲古文聞見録韓魏公表公之墓曰嗚呼自古聖賢必推性命如公之文武傑立而貫以忠義兮此天之性位不大顯遭讒而跌且不壽兮此天之命雖孔孟不能以兼適兮尚一歸于黙定昩者不思而妄求兮徒自奔於邪徑故公臨禍福生死而曾不少變兮是能安性命而歸正唯大名赫然日月之光􅀆亘萬古而増瑩吾聞善人者天必報其後􅀆冝嗣人之蒙慶韓魏公曰希文常勸以身安而後國家可保師魯以謂不然直謂臨國家事不當更頋身公雖重希文之􅀃然性之所喜以師魯爲愜爾魏公別録師魯兄源字子漸與師魯俱有名於當丗其論議文章博學彊記皆有以過人而師魯好辯果於有爲子漸爲人剛簡不矜飾能自晦藏與人居乆而莫知至其一有所發則人必驚伏其視丗事􅀂不干其意巳而搉其情僞計其成敗後多如其言其性不能容常人而善與人交乆而益篤趙元昊冦邊圍定川堡大將葛懷敏發涇原兵救之君遺懷敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏法見敵必赴而不計利害此其所以數敗也冝駐兵瓦亭見利而後動懷敏不能用其言遂以敗死劉渙知滄州杖一卒不服渙命斬之以聞坐專殺降知宻州君上書爲渙論直得復知滄州范文正公嘗薦君材可以居館閣召試不用遂知懷州及范公與韓冨諸公皆罷而師魯與一時賢士亦多􅀍誣枉得罪君歎息憂悲發憤徃徃􅀍酒哀歌泣下朋友皆􅀼怪之已而以疾卒歐陽公撰墓誌又名臣傳云渙即劉滬之兄也滬甞訟洙文致其罪而源乃捄雪其兄其不私如此
