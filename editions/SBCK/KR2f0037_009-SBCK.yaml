body:
  text: 十之四尚書彭公公名汝礪字器資饒州鄱陽人治平二年舉進士第一調保信武安幕府除國子監直講改大理寺丞擢太子中允監察御史裏行出爲江南西路轉運判官元祐􅀄除起居舎人進中書舎人落職守徐州召權兵部侍郎徙刑部使契丹還徙吏部紹聖􅀄除權吏部尚書尋以寳文閣待制知江州至郡數月卒年五十四故事進士第一人無入吏部選者公釋褐歴保信軍節度推官武安軍節度掌書記丁外艱服除復授漳州軍事推官在選十年人以爲淹而公處之澹如也曾内翰撰墓誌丞相王文公得公詩義善之留爲國子監直講改大理寺丞御史中丞鄧綰欲舉公御史召公不徃後雖薦之而爲小人所訹復自陳失舉且薦它官代之神宗察其姦怒甚王文公亦以爲言即日黜綰除公太子中允監察御史裏行墓誌公在言職非唐虞三代不論􅀄對上十事一正本二任人三守令四理財五養民六賑捄七興事八變法九青苗免役十塩事指陳得失利病多人難言者又言吕嘉問領市易司專事聚歛非法意當罷黜俞充謟事中人王中正至使妻出拜之不當除檢正中書五房公事神宗爲寢充命而究語所從得公言如此非所以廣聦明不肯奉詔宗室賣婚至女娼家子行有日矣公奏罷之因言皇族雖服屬巳踈然皆宗廟子孫不可使閭閻下賤得以貨取願爲更著婚姻法王中正李憲用兵陜西公言不當以兵付中人因及漢唐禍亂之事神宗􅀄􅀂不懌出語詰公公拱立不動伺間復言帝卒爲之改容是日殿廷觀者始皆爲公懼巳而皆歎服墓誌元豐元年罷爲館閣校勘江南西路轉運判官辭日復上䟽論時事且言今不患無將順之臣患無諌争之臣不患無敢爲之臣患無敢言之臣神宗察其忠慰諭乆之墓誌元祐二年以起居舎人召旣至執政有問新舊之政者公曰政無彼此之辨一於是而已今所更大者取士及差役法行之而士民皆病未見其可執政不能屈墓誌踰年拜中書舎人賜服金紫詞命雅正人以爲有古風遇事不苟多所建白其論詩賦回河事􅀹力主議者皆不悅公亦數請去是時大臣有持平者頗與公相佐佑而一時進取者病之欲排去其􅀋未有以發㑹知漢陽軍吴處厚得蔡丞相確安州詩上之傅㑹解釋以爲怨謗諌官交章請治又造爲危言以激怒太皇太后必欲寘之極法公曰此羅織之漸也數以白執政不能捄則上䟽論列甚切又不聽則居家待罪時中書舎人止公一人旣而蔡丞相有謫命公曰我不出誰任其責者即入省封還除目辨論愈切御史臺自中丞而下五人坐是同日出臺中一空公復力争以爲不可諌官指公爲朋黨太皇太后曰汝礪豈黨確者亦爲朝廷論事爾巳而蔡丞相貶新州用起居舎人草詞行下而公亦落職知徐州一二大臣相繼去位自是正人道壅而進取者得志矣公在臺旣甞論吕嘉問事且與蔡丞相異趣使外十年蔡爲有力後治嘉問獄不肯阿執政意擠之坐奪一官至是又辨蔡丞相不當謪至得罪乃巳人以此益賢之墓誌召權兵部侍郎徙刑部㑹有具獄執政以爲可殺公以爲當貸而執政以特旨殺之公執不下執政怒舎公而罰其屬公言奉制書而有不便許論奏法也且非屬罪自劾請去章四上不聽御史亦助之言遂并其屬免罰墓誌紹聖元年今上初專聽斷召二三大臣脩舉熈寜元豐政事人人争獻所聞公居之如不能言者或問之曰在前日則無言之者於今則夫人而能言之矣以寳文閣待制知江州入辭上勞問甚寵曰與卿非乆别也問所欲言者公曰陛下今所復者其政不能無是非其人不能無賢不肖政唯其是則政無不善人唯其賢則人無不得矣墓誌二年正月召公于江州以爲樞宻都承旨翌日以訃聞旣而遺表至其略以謂土地已有餘願拊以仁財用非不饒願節以禮佞人初􅀂可悅而其患在後忠言初若可惡而其利甚愽以至恤河北流移察江南水旱凢數百言墓誌公爲監司務大體不事細苛而於議獄必􅀓經典故在京西多所全宥爲州所至有惠愛􅀹以興學養士賑乏恤􅀌爲急墓誌公居家孝友事寡嫂謹甚兄無子爲立後官之又官其弟汝方而後其子汝方聞公䘮即棄所居官歸論者多之族人貧者分俸錢賙給或爲置義莊與人交盡誠敬少時師事桐廬倪天隠天隠亦竒之及官保信迎天隠置于學執弟子禮事之天隠死無子公爲并其母葬之又葬其妻又割俸資其女同年進士宋渙未官而死公經理其後不啻其家人蓋其篤行如此墓誌公平生好學喜問樂聞其過自任以聖賢之重而於貧冨貴賤利害得䘮一不以累其心至於憂國愛君推賢揚善則拳拳孜孜常􅀂不及故自處顯於朝廷事知無不言言不行必争争而不得必求去人始而駭中而疑卒而信則曰名節之士也忌之者則以爲好異或以爲近名最爲今范丞相純仁所知范公再相人謂公必用旣對太皇太后首曰姑徐進彭汝礪蓋已有間之者及出江州未數月上命召還或曰須改嵗不幸而公死矣墓誌三朝名臣言行後録卷第十一之五丞相李文正公公名昉字明逺深州饒陽人漢乾祐初舉進士仕周爲翰林學士國朝開寳六年拜翰林學士遂叅政事太平興國八年拜同中書門下平章事端拱初罷淳化二年復相四年又罷明年以司空致仕至道二年薨年七十二李相昉在周朝知開封府人望已歸太祖而昉獨不附王師入京昉又獨不朝貶道州司馬昉歩行日十數里監者中人問其故曰湏後命耳上聞之詔乗馬乃買驢而去三嵗徙延州别駕在延州爲生業以老三嵗當徙昉不願内徙後二年宰相薦其可大用召判兵部昉五辭行至長安移疾六十日中使促之行至洛陽又移疾三十日而後行旣至上勞之昉曰臣前日知事周而已今以事周之心事陛下上大喜曰宰相不謬薦人談叢太宗語侍臣曰朕何如唐太宗左右互辭以讃獨李昉無它言微誦白㞐易諷諌七德舞詞曰怨女三千放出宫死囚四百來歸獄上聞之遽興曰朕不及朕不及卿言驚朕矣掇遺李昉太宗時與宋琪同建議復時政記月終送史舘先進御而後付有司時政記進御自昉始也蒙求盧多遜與李昉相善昉待之不疑多遜知政多毀昉人有以告昉昉不信之後太宗語及多遜事昉頗爲解釋太宗曰多遜㞐常毀卿一錢不直昉始信之太宗由是目昉爲善人蒙求李文正爲相有求差遣見其人材可取將收用必正色拒絶之巳而擢用或不足收用必和顔温語待之子弟或問其故公曰用賢人主之事我􅀂受其請是市私恩也故峻絶之使恩歸於上􅀂其不用者旣失所望又無善辭此取怨之道也巵史李文正公常期王文正公旦必爲相自小官薦進之公病召王公勉以自愛旣退謂其子弟曰此人後日必爲太平宰相然東封西祀亦不能救也巵史至道元年燈夕太宗御樓時李文正以司空致仕於家上亟以安輿就其宅召至賜坐於御樓之側敷對明爽精力康勁上親酌御樽飲之選餚核之精者賜焉謂近侍曰昉可謂善人君子也事朕兩入中書未甞有傷人害物之事宜其今日所享如此也玉壷清話公温和無城府寛厚多恕不念舊惡在位小心循謹無赫赫稱好接賔客雅厚張洎而薄張佖及罷相洎草制深詆之而佖朔望常詣其第人或謂佖曰李公待君素不厚何數詣之佖曰我爲廷尉日李公方秉政未甞一有請求此吾所以重之也
