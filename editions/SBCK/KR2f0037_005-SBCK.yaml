body:
  text: 十之一丞相康國韓獻肅公公名絳字子華叅知政事忠憲公之子也以父任爲大理評事登進士甲科除太子中允通判陳州召知太常禮院歴開封府推官户部判官江南饑出爲體量安撫還知制誥出知河陽召入翰林爲學士權御史中丞出知蔡州移知慶州加端明殿學士知成都府英宗即位召還除三司使俄拜樞宻副使神宗􅀄領制置三司條例司拜叅知政事熈寜二年拜陜西河東宣撫使即軍中拜同中書門下平章事㑹慶州卒叛遂罷相守鄧州徙知大名府七年復爲相出知許州拜建雄軍節度使知定州移河南府哲宗即位進封康國公加開府儀同三司判大名府屢告老拜司空檢校太尉致仕薨年七十七公爲開封府推官男子冷清自謂母娠宫中生民間於是自稱皇太子都人聚觀頗以爲疑吏収捕驗問亦不敢迫府官至有改容禮之者旣而果無實猶止覊置近郡公上䟽引成方遂事論奏甚切清遂伏誅劉貢父撰行狀江淮兩浙歳飢以公體量安撫江南東西路到部則發倉廪振貧乏問百姓疾苦縣邑以衙前爲重役一當其役則破家竭産民至有嫁祖母與母而析生異居以避役者公爲立則衙前法奏行之民以爲便又兼并之家私占陂池溪湖少出稅以錮其利公使以税均所近民田而陂池溪湖使衆共之行狀使還除右正言供職時大臣佐佑時政務循故事公一日奏言政事冝出聖斷上諭云屢有人言朕少斷非不欲豦分蓋縁國家動有祖宗故事苟或出令未合憲度便成過失以此須經大臣論議而行臺諌官見有未便但言來不憚追改也行狀宣祖神御温成園陵皆寓奉先寺仁宗將幸奉先或謂因欲臨后園公預以所聞諌旦日飭駕使諭公曰朕欲酌神御非詣后園也李􅀖直撰神道碑召爲翰林學士仁宗甞遣使祈嗣茅山公當草祝詞公因上䟽言祈嗣頋禱祠何益夫女御閉於深宫者衆宦人養子絶人之丗者多非所以順天地致螽斯之福於上也書奏仁宗即日出宫人數百詔有司裁定宦人養子令神道碑孫沔吕溱等守藩犯法從官聮章請貰其罪公曰法自貴者始更相救援則公道廢矣遂并劾之宫人或納賂請降度牒紫方􅂁歳時内宴至有與伶官私􅀏語者公宻發其事上亟爲逐典掌劉氏及它不謹者十餘人神道碑自公爲中司言事甚多時富鄭公爲宰相多寢不下公不能堪條前後所言極論之初張茂實母乳悼獻太子茂實㓜從其母畜於宫中後壯長寖貴領親軍以掛嫌議出爲外官至是鄭公復用茂實主兵公并以爲言且論其畏避自私不足以荅上恩塞群望因請歸家待罪不敢赴臺供職而諌官詆公中傷宰相擅去官守由是罷知蔡州行狀知成都府蜀中春秋夏米價常貴張詠尚書治蜀自二月減價糶官米八月糶塩各給劵爲據以惠貧户歳乆質賣悉歸豪右公諭其自首别給劵貧民凢七千餘户因奏每三年視貧富一易之民有疾疫致醫藥客軍貧民死者葬之奏立寺額度僧主管増置學校减嗇冗費異時内臣奉使至蜀州郡迎悅其意有所貨易輙附益之其費皆出於酒場官衆以爲患公奏請加禁約英宗聞之喜詔内侍省著爲令毎行必申飭焉行狀爲三司使内諸司吏有干恩澤者詔已許之公執條例奏禀上曰朕不知條例當爲卿改後有此等事亦須執奏三司事多與宫省相􅀜近習有所干請即牾條例公未甞詭隨公一日奏事具爲上言所以且曰即有飛語願賜覆實上曰知卿盡公不肯放過事朕在藩邸時備聞群臣以國事爲人情隳壞法度積弊日甚頼卿盡力我自諳暁卿勿慮也它日公又言曰國朝之制上所用財幣不欲顯名者乃用合同慿由取之内臣因循凢賜予之􅀋並以合同慿由施行歳常數十百萬三司無由鉤校人皆疑禁中浮費不知其間賜予宗室及群臣者過半也請以其冝付有司者付之有司英宗嘉納自是費用之有例者悉歸三司得以㑹計矣行狀遷樞宻副使因進對神宗問天下遺利公對求遺利莫􅀂盡地力退而具䟽以謂害農之大弊無甚於差役不可不改請委侍從臺省官集議及聖詔愽謀以収群䇿上嘉納之􅀄公在三司時議欲使官户量出免役錢兼并之家計田頃承役唯存郷役及弓手之外並與蠲除單丁女户在第一等者亦量納役錢其餘一切以免役錢雇召如此即不限田而官户兼并之家不敢過制以貪利中人得以置田以爲生品官不必充役而無業之民得以應募矣至是上手扎取之公具録以進上令學士草詔訪問旣進入上以未見哀痛惻怛之意手定詔藁宻封示公令公潤色以進爲大小訪焉王荆公領條例司深以公言爲然遂推廣衙前之法以及它役行狀熈寜三年五月除叅知政事時樞宻副使闕貟㑹公獨奏事神宗問誰可􅀘者公以司馬光對遂以授光行􅃺熈寜二年九月夏羗大入慶州境圍七寨殺略數千邊將髙敏戰死榆林以公爲陜西宣撫使賜空名宣告即軍中賞功詔許除補所部官自受命至陛辭三日而行賜金繒及織文􅂁纔至邊悉分與將吏公初行環慶勞饗蕃漢士傷痍者賜帛褁瘡治兵鄜延使偏將种諤出青澗城趨銀州界破撫寜開光諸帳屯守囉兀公欲自髙奴通道河東詔兼河東宣撫使就拜同中書門下平章事昭文舘大學士公遣將出麟府兵徑虜中凢九日㑹囉兀下又破賊馬户川斬馘數千􅀗綉旗木符領盧印公􅀄至邊裂諸路兵置七將間其無備互出擣之至是深入破敵者十七戰皆捷招降數萬人居以曠圡方築據奪其要害而慶將失撫御兵有叛亡者時内外多與公異意争歸咎宣撫司邊事摇矣公一不辨以身任其責罷相知鄧州其後旣収兵羗人亦卷廬帳驅畜産遁去客食河外餓死者衆數年終不能復而使大酋數叩保安軍求通使並塞皆空無賊火上於是知公爲有功復召爲相神道碑又行狀云申勑諸路爲堅壁自守之計城寨有不可守者棄之分七將之兵爲淺攻擾擊之計以困戎虜或云公命种諤城囉兀雪中築撫寜堡調發倉卒􅀜中騷然公駐延州命四路帥無得預軍事皆聽於諤又命蕃官王文諒節制環慶之師自入陜西以軍中錢散與乞人又奪􅀐士馬以與蕃部厚犒賞之軍士皆怨夏人䧟撫寜又急攻囉兀公命諸路出師牽制慶兵再出遂作亂公之入相繼王荆公之後政事有未便者賢士大夫或置不用公將更易振舉之奏古者冢宰制國用今天下財用出入宰相乃不預聞始置局中書稽攷天下財用之數量入以爲出援用司馬光上曰吾於光豈有所愛頋光未肯來耳又數與同列論事上前不得盡行其言乃歎曰勢不能有所禆􅀘矣唯早去位可以全進退之分故一年之間求去者三行狀三司使發市易官罪而同列佑之欲弗責方創賈人免行錢孫尚書永議有異而同列欲論永罔上故不實上書人鄭俠絞切下獄而執政馮公京甞賙俠同列欲以黨俠爲重坐公辨帝前不得直數求罷上爲逐市易官稍寛二臣者而它相至欲復留故賈人劉佐任市易公固言不可論上前未决公再拜曰臣言不用辱相位請從此辭上愕曰兹小事何用耶公奏曰小事弗伸况大事乎上爲罷佐遣使持手詔諭公使就位公乃起後數月固稱疾乃拜觀文殿大學士禮部尚書知許州神道碑知河南府夏大雨伊落汎溢冐城郭居民􅀍溺者太半公方以疾在告聞之力疾而出率府僚救護全濟者甚衆物價騰踴人多不得食公發倉廪以平物價収葬溺死者禁止盗賊訛言驚衆者刑黥之人以寜息脩完廬舎工直十倍公爲設法招來它州人四近坌集公私皆得興作而工直亦平矣又奏築長堤以虞後患幾月而成後三年伊洛復漲如前日頼堤而免㑹行保馬法令保甲家自飬馬毎都馬五十匹期十五年數足提舉官欲其速成爲巳功脅趣州縣要以二年期㑹旣急馬價不訾民至破産不得馬公爲條奏止之如􅀄令行狀􅁉陵興役洛人言昭陵厚陵時府吏中夜視事留守亦􅀫于外至公不改常度早晚視事外唯増日中一出而已内外畏戢莫敢妄作事皆辦集或言陵下乏水人多暍死詔置水車數百及瓢瓠竹筒數萬公知其未甞乏水也遣使具措置水事及取脩奉官司不乏水狀聞舊奉陵之物無先後之序吏縁􅅰下公使以所須緩急第爲之期掲榜示人由是人不争競而工價平洛人曰洛中不知有裕陵者公之賜也行狀判大名府遣使問役法利害公請到鎭條析以聞旣至上䟽以謂􅀄論役法之弊止謂衙前一役願得納錢募人旣行之農民無破家之患遂并它役以此用錢至廣雖不當役者亦不得免此議論所以多也務求􅑿餘謂之寛剰重非所冝復其舊爲便以仐所取錢計年支雇募所費頗􅑿二分以備非常免除第五等减第四等數則天下速􅀍聖澤矣後司馬丞相建議一用熈寜法差役公以六條事駮之議之連年然亦多叅用公所言者行狀公爲人嚴重好禮其居家燕處無墮容子弟勝冠有所賀謝必具衣冠而後使拜存恤宗族逺近無遺推財予之不計有無自仕宦未逹時巳爲族人之孤特者嫁娶之凢十餘人矣行狀公兄弟友愛天至自忠憲公爲两府大臣至公兄弟同時爲眞相近輔者三人衣冠之盛近丗未甞有也又皆眉壽髙年公將歸許而两弟時亦皆七十同時請老朝廷貪惜賢徳未之許也其爲榮盛又前古所未有行狀公自少氣節嶷然聞其言見其貌皆知其必位將相剛正渾厚而於交親仁以盡至朝廷事不可屈撓以私據理道論是非不辨正不巳推引賢能急於家事以誠待人無所疑而知人常不誤司馬温公方與執政忤而公言温公可代巳爲樞宻副使至爲宰相又薦之神宗亦可之曰卿度光來乎朕當亟召力引吴正憲公忠諒可任大事宣撫陜西首薦今左右丞相爲判官吕大防范純仁常舉布衣王安國能辭章程頥有經行士大夫出其門多知名天下􅀄進士科進擢速公言偶程文占上選未見才實勞最躐衆人指期爲卿輔殆亡所謂自是始議間年一貢士而殺其恩嘉祐中與陳秀公議茶法官不失常課刑辟歳省數千人又言差役病民最甚冝􅂌上農及官户單丁女户薄率錢募衙前吏凢不可募者存郷户則上户免服役而游手之民得以應募有業矣英宗未果行至熈寜􅀄申講前議及温公建言一用差法詔訪利害公曰臣􅀄議謂衙前可募其後乃并及它役所募旣廣遂率錢及下户至多取羡數以今所冝第除羡數免下户錢惠澤周矣因條六事異温公議後皆叅取焉公前此於温公踈外中援其賢及議朝廷事自守不奪所見乃如此又建言官制錯謬如近臣乃兼判中書門下省細務多􅀜决二府恩大政祖宗方耡天下襲唐季未及更冝早論定其後神宗改官制約用六典多如公所陳者將殁猶上書懇惻言天下事所臨六州皆生立祠聞訃有巷哭者公撫飬􅀌貧雖旁宗踈屬皆仰嫁娶衣食周門生故吏之不能自存者俸禄無所餘神道碑一之三丞相魯國范公公名質字文素大名宗城人後唐長興中登第仕􅀳爲翰林學士漢初加戸部侍郎周祖起兵以爲樞宻副使廣順初拜中書侍郎平章事世宗不豫入受頋命輔立恭帝太祖受禪加兼侍中罷叅知樞宻乾德二年罷爲太子太傅薨年五十四將終戒其子無得請謚立碑質自從仕未甞釋卷人或勉之質曰昔甞有異人與吾言他日必當大任苟如其言無學術何以處之蒙求周祖自鄴舉兵向闕京師亂范魯公隱於民間一日坐封丘巷茶肆中有人貌怪陋前揖曰相公無慮時暑中公所執扇偶書大暑去酷吏清風來故人二句其人曰世之酷吏􅁈獄何止如大暑也公它日當深究此􅁦幸無忘吾言公惘然乆之後至祅廟後門見一土木短􅀑其貌肖茶肆中見者公心異焉亂定周祖物色得公遂致大用公見周祖首建議律條繁廣輕重無據吏得以因縁爲姦周祖特詔詳定是爲刑統聞見録范質初作相與馮道同堂道意輕其新進潜視所爲質初知印當判事語堂吏曰當判之事並施籖表得以視而書之慮臨文失誤貽天下㗛道聞嘆曰眞識大體吾不如也質後果爲名相談苑世宗在楊州怒竇儀罪在不測范質非時求見世宗意其救儀將避之質趨而前曰儀近臣以小過忤旨罪不當誅因免冠叩首泣下曰臣備位宰相不敢致人非辜當帝王之怒幸陛下寛之世宗意解遂赦儀罪蒙求范質奉行制敕未甞破律毎命刺史縣令必以戸口版籍爲急蒙求周恭帝之世有右拾遺直史館鄭起上宰相范質書言太祖得衆心不冝使典禁兵質不聽及太祖入城諸將奉登明德門太祖命軍士皆釋甲還營太祖亦歸公署釋黃袍俄而將士擁質及王溥魏仁浦等皆至太祖嗚咽流涕曰吾受世宗厚恩今爲六軍所逼一旦至此慙􅀒天地將若之何質等未及對軍校羅彦􅉞按劒厲聲曰我軰無主今日必得天子太祖叱之不退質頗誚讓太祖且不肯拜王溥先拜質不得巳從之且稱萬歳請詣崇元殿召百官就列周帝内出制書禪位太祖就龍墀北面再拜命宰相扶太祖登殿易服於東序還即帝位群臣相賀及太宗即位先命溥致仕蓋薄其爲人也又甞稱質之賢曰惜也但欠世宗一死耳記聞又龍川别志云周顯德末年太祖任殿前􅀧檢功業日隆而謙下愈甚老將大校多歸心者雖宰相王溥亦隂効誠欵今南御園則溥夙所獻也惟范質忠於周室初無所附及丗宗晏駕北邊奏契丹入冦命太祖以大兵出拒之行至陳橋軍變旣入城韓勍以親衛戰於闕下敗死太祖登正陽門望城中諸軍未有歸者乃脫甲詣政事堂時早朝未退而聞亂質下殿執溥手曰倉卒遣將吾儕之罪也􅀲入溥手幾出血溥無語旣見子今身未冷奈何如此太祖質曰先帝養太尉如太祖性仁厚流涕􅀍面然質知􅀔不可遏曰事已爾無太倉卒自古帝王有禪讓之禮今可行也因具陳之且曰太尉旣以禮受禪則事太后當如母養少主當如子切勿􅀒先帝舊恩太祖揮涕許諾然後率百官行禮由此太祖深敬重質仍以爲相者累年終質之丗太后少主皆無恙故太祖太宗每言賢相必以質爲稱首范魯公嘉謀偉量時稱名相自以執政之地生殺􅃤舒所繫苟不能蚤夜兢畏悉心精慮敗事覆餗憂患畢至加之道有枉直時有夷險居其位者今古爲難甞謂同列曰人能􅈹吸三斗醇醋即可爲宰相矣沂公筆録舊制宰相早朝上殿命坐有軍國大事則議之從容賜茶而退自餘除拜號令刑賞廢置事無巨細並熟狀擬定進入止於禁中親批紙尾用御印可其奏謂之印畫降出奉行而巳由唐歴五代不改其制國初范質王溥魏仁浦自以前朝舊相且憚太祖英睿具劄子面取進止朝退各䟽其事所得聖旨臣等同署字以志之自是奏御寖多或至旰􅉴命坐啜茶之禮尋亦廢罷今遂爲定式沂公筆録公性卞急好面折人以廉介自持未甞受四方饋遺前後所得禄賜多給􅀌遺閨門之中食不異品身没之後家無餘貲後太祖因講求輔相謂侍臣曰朕聞范質但有所居宅不營産眞宰相也太宗亦素重質甞對近臣稱累朝宰弼以爲循規矩惜名器持廉節無出質之右者
