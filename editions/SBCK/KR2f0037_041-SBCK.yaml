body:
  text: 九之二翰林學士曽文昭公公名肇字子開中書舎人鞏之季弟中進士第調台州黄嵓簿居鄭州守聞其賢薦爲州教授神宗召對擢崇文院校書兼國子􅁥直講元豐元年爲國史院編脩官除吏部郎中遷右司元祐􅀄擢起居舎人遷中書舎人以寳文閣待制知潁州徙陳州應天府七年還朝守禮部侍郎復岀知徐州紹聖􅀄徙知瀛州坐史事奪一官知滁州徙㤗州海州徽宗即位除中書舎人翰林學士兼侍讀岀知陳州徙南京楊州定州崇寧元年落職知和州道除舒州靈仙觀奪兩官徙居岳州又貶濮州􅇛練副使汀州安置徙台州復朝散郎還居􅃳州里第大觀元年卒年六十一王荆公當國數稱公於上前上見公首問所從學以兄鞏對上黙然同知太常禮院自秦以來禮文殘缺先儒各以臆􅀃無所稽據公在職多所􅁵正親祠皇地祇於北郊蓋自公發之雖衆議不同而公獨引經辨析詞􅈲精慤故異論莫能奪其議明堂配饗徧及五帝􅀄雖不合後亦卒見施用楊文靖公撰公行􅄒曽肇爲集賢校理兼國子􅁥直講脩將作􅁥勑㑹其兄論市易事􅀍責執政怒未巳遂盡罷肇主判滯於館下最爲閑冷又多希􅈲窺伺之者衆皆危之曽處之恬然無愠旣而曽魯公公亮薨肇撰次其行狀上覧而善之即日有􅈲除史院編脩官東軒筆録哲宗嗣位宣仁太后垂簾聽政用司馬温公吕申公爲宰相士多傳時自効公獨挺然不爲丗變所移由是諸公益賢之知其有常德也行述門下侍郎韓公維靣奏范百禄所爲不正及有非理事十餘件簾中怒甚以爲輔臣奏劾臣寮當公行具章䟽明論曲直旣無明文何異䜛毀黜知鄧州公不草制兩上章論之曰維執政爲朝廷别白邪正是非真得大臣體雖案牘不具出於口奏豈可便謂之欺君大臣參與國論臧否人物不必一一湏形文字顧所言當與不當行之人心服與不服耳今陛下責維徒奏而巳遂謂有欺君之意臣恐命下之日人心眩惑謂陛下以疑似之罪逐大臣恐於陛下盛德不爲無損執政大臣自此以維爲戒無敢開口論議臧否人物君臣上下更爲形迹恐非陛下推赤心待大臣之􅁩亦非大臣展布四體以事陛下之道也竟以它舎人行下事雖不從士論韙之行述諌官王覿言執政忤旨落職知􅃳州公封還詞頭言覿之一身岀入内外不足爲重輕而陛下􅀉腹心於大臣􅀉耳目於臺諌二者相湏不可闕一今覿一言論及執政即日去之是何異愛腹心而塗耳目豈不殆哉上悟加覿直龍圖閣行􅄒太皇太后受􅁽有司檢用章獻明肅太后故事當御文德殿公奏䟽曰伏見太皇太后聽政以來止於延和殿垂簾視事受契丹人使朝見亦止御崇政殿未甞出踐外朝蓋外朝天子之正宁太皇太后崇執謙德不欲臨御以爲天下後丗法推此言之受􅁽外朝殆非太皇太后之意特以故事當然耳切詳故事天聖二年兩制定皇太后受􅁽於崇政殿仁宗自出聖意特詔有司改文德殿此蓋人主一時之制非典法也願下明詔屈從天聖二年兩制之議受􅁽於崇政殿仰稱太皇太后克巳復禮謙恭㧕損之盛德中批令學士院降詔如公所請是􅀊坤成節禮官建議於崇政殿上壽用天聖三年故事三省樞宻院特降朝􅈲引九年㑹慶殿上壽如乾元節之儀公奏䟽曰太皇太后昨降詔書以謂不敢自同於章獻太后今此舉似與前後夲末不相稱殆非太皇太后之意特執政大臣出於不思耳䟽入從之行述四年春旱甚中丞李公常請罷春宴執政難之公率彭公汝礪上䟽曰天菑方作民食未充正君臣側身畏懼憂恤百姓之時乃相與飲食燕樂恐無以消復天變導迎和氣翼日有􅈲罷宴二公在朝論事數與時忤至是浸不容矣當是時丞相范公純仁左丞王公存論議多與二公合異意者欲盡去之㑹有以蔡丞相確安州詩上者諫官交章以爲謗訕謫新州范王二公争之不能得同時罷去先是公與彭公約當制者必極論之㑹公除給事中未拜彭公當制言甚力諫官多前日與公論異者言彭公實公使之誣以賣友公不自辨固辭新命請外章四上除寳文閣待制知頴州行述在潁濬清河百餘里以通東南物貨人至今頼之部使者議開八丈溝䟽陳蔡積水潁人素以爲患公距其議使者以語訹公復移書折之及徙陳執論益堅人於是知公非私於一州也行􅄒移知應天府宋當東南孔道宴勞無虚日公曰飾厨傳以邀往來之譽吾不爲也乃積公帑之餘大興學校親加訓導飬成人材爲多行􅄒哲宗􅀄祀南郊有詔合􅀕天地如祖宗故事公守前議論之語甚厲不報乃拜章自劾徙刑部不拜請去不巳除知徐州行􅄒哲宗旣親政追用舊臣盡復熈豐之法數稱公議禮有守及公入對不及垂簾事所陳皆國家大體以謂人主雖有自然之聖質必頼左右前後皆得其人以爲政之夲冝於此時御名選忠信端良􅀶古多聞之士置諸左右以參諷議以備顧問與夫深處法宫之中親近䙝御之徒其損益相去萬萬矣忤貴近意故不得留行􅄒時元祐諸公皆流竄嶺表最後謫前史官范祖禹等以實録譏訕爲罪􅀄實録成公與陸佃林希以嘗在􅈰例轉一官公奏臣不逮成書不可因人之功以叨賞典累辭不許至是希爲中書舎人納所遷官在職公耻自陳以覬幸免遂與佃俱奪一官降小郡以公知滁州御史言希不當與公異佃與奏書不當與公同乃削佃職除公集賢殿脩撰守滁行􅄒元符三年上皇即位欽聖太后權同聽斷一日二府奏事簾中宣諭曰神宗在宫中嘗稱曽肇可用召還除中書舎人即日請對言治道在廣言路而巳祖宗以來數詔百官使以次對神宗舉而行之於熈寧之􅀄以興起事功爲後丗法願陛下迹神考之故事脩轉對之制下不諱之令明詔百官下及民庶得極言時政無有所􅀮然後擇其善者而行之且報之以賞大則加以爵秩小則􅃬之金帛其言不足採􅀂狂妄抵捂者一切置之不以爲罪庶以鼓動天下敢言之氣㑹日蝕四月朔故事當降詔求直言特命公草詔因具著所以言於上者敷告中外於是􅄬匭者日以千數故上得盡聞天下事行述元祐士大夫再以赦甄叙或復舊職典方靣公奏生者蒙恩巳厚矣唯是游䰟枯􅟆未􅀍聖澤請如冦準曹利用故事還其所奪官職及夲家恩澤又乞如祖宗朝每大赦後置看詳編配罪人一司命官典領使流竄廢錮之人均􅀍恩施皆見納用行􅄒公嘗奏言近丗帝王善爲治者莫如唐太宗善言治者莫如唐陸贄太宗正觀之治論者謂庶幾成康史官掇其大者別爲一書謂之正觀政要陸贄事唐德宗知無不言言無不盡要其歸必夲於帝王之道必稽於六藝之文此二書雖一代之文章實百王之􅀛鑑伏願陛下退朝之暇紬繹經史之餘取此二書置之坐右留神省覽發言行事以此爲準庻於盛德有􅀘萬一行􅄒給事中二人相繼封駮除目三省進呈令中書舎人書讀行下公言三省各有職守不相侵踰門下所以駮正中書違失故中書舎人不兼給事中職事恐因此隳壞官制有損治體行述諫官陳瓘以言及東朝與政事􅀍謫公適館伴虜使事畢還家即奏書兩宫曰瓘昨者所論臣雖不知其詳以詔旨觀之瓘言雖狂其意則忠何則瓘以踈逺小臣妄意宫闈之事披冩腹心無所顧避此臣所謂狂也皇太后有援立明聖不丗之大功有前期歸政過人之盛德萬一有纎毫可以􅃌議則於清躬不爲無累瓘以憂君之誠陳預防之戒欲以開悟聖心保全盛羙忘身爲國臣子所難此臣所謂忠也以臣愚計皇帝以瓘所言狂率而逐之皇太后以天地之量􅀮忍包容特下手書而留之則天下之人必曰皇帝恭事母儀不容小臣妄議其孝如彼皇太后功德巍巍而能含洪光大雖有狂言不以爲罪其仁如此兩􅁩俱得豈不美哉􅀄瓘得罪左右無敢言者公獨盡言請復瓘舊職其犯顔嬰鱗率此􅀋也行述先是禮部議哲宗升祔冝於太廟殿増一室公獻議稱書禮記皆云七廟國朝自僖祖而下至仁宗始備七丗故英宗祔廟則遷順祖神宗祔廟則遷翼祖三昭三穆合於典禮今大行皇帝於神宗父子也如禮官所議更増一室則廟中當有八世四昭三穆考於典禮未有合者大行皇帝祔廟當與神宗爲昭穆上遷宣祖以合禮文七丗三昭三穆之􅁩時爲禮部者方執政故公議見絀時議者又言上當爲哲宗服期從兄弟之服公在邇英讀史記至堯崩三年之䘮畢因言堯舜同岀黄帝舜且爲堯喪三年者舜嘗臣堯故也侍讀温益進言曰史記丗次不足信􅀂堯舜同出則舜娶堯女爲娶從祖姑公以史記丗次禮記􅀕法大傳之􅀃質於上前益語塞行述時有陳大中至正之論者以元祐紹聖均爲有失魯公稱上命命公推此意爲詔諭天下公見上言陛下欲建皇極以消弭朋黨湏先分君子小人賞善罸惡不可偏廢開􅀃甚至巳而詔自中岀上命魯公相公適視草禁中因舉數事爲戒所謂休息百姓緫核庶工甄叙材良敦􅅄正直澄清風俗振肅紀綱退與魯公言未嘗不丁寧反復以此也夲朝學士弟草兄制惟韓氏與公無它比也士論榮之行述朝廷更茶法内侍閻守懃主之公謂與民争利不可爲是時守懃方用事􅀔傾中外非守義弗渝無敢忤其意也建中靖國元年太史復奏四月朔太陽當蝕公請對極言因陳天人精祲之􅀃至誠懇激言發涕下行述桉公集此劄子云連年日食正月􅀊旦赤氣亘天變不虚生必有所自意者陛下簡儉清浄之化或衰於前而宫室服玩之侈聲色技藝之好或萌於心與抑刑獄滋彰之敝復生而閭里有不安者與不然則朝廷上下忠邪賢不肖有未辨而政令賞罸有未當與抑左右前後有阿䛕壅蔽􅀼弄威福之人而四方萬里銜􅁈失職之民有不得伸者與此冝陛下反復循察萬一有之固當痛自尅責改過不吝使皆無之猶湏戒慎不暏恐懼不聞􅀶延忠良使之交儆庶以荅塞天変轉災爲祥元祐士大夫再􅀍降黜公義不獨全請與俱貶言者繼之落職知和州行述魯公巳罷政言路率公素所不合者未敢誦言排公迺言元符末有外臣上書議及宫禁因䟽大臣數人嘗有是議而竄公名其間坐奪兩官徙居岳州明年秋治上封事異趣者千餘人因追咎公草求言詔貶濮州􅇛練副使汀州安置在汀二年杜門不與人接日閱書數卷而巳室内僅容一榻坐卧其中􅀂將終身焉人不堪其憂而公處之􅁉如也行述公天資仁厚而剛大之氣睟然見於顔靣望之􅀂不可犯而即之則温然可親不問知其爲成德君子也與人交無逺近踈戚之間不爲虚詞飾貌一以誠意引掖後進惟恐不及一經品目人人自好自少力學於六經百氏之書無所不究含英茹實以畜其德非如丗儒徒摭其華雕繪組織爲辭章而巳經綸之業蓋其素所藴積也故其在朝則以論思之責爲巳任出藩于外則所至有成績瀛州救荒之政全活者不可以數計至其受代則民挽留之圯道闔門而不得去更十一州􅀂此􅀋不可悉數家素貧未嘗屑意有無而以字􅀌振乏爲急由布衣以至處顯視其居處􅀍服飲食無少異殁之日陳無新衣薦無完衾帷帳器用質素敝惡闔門千􅃌無所歸聞其風者雖庸夫賤􅀠皆歎息爲之泣下行述曾子開端嚴可畏有大臣之風􅀂其軰流雖位崇望重少不以言語禮貌牢籠人者殊爲失體􅀛山語録又云曽子開不以顔色語言假借人其重爲得大臣之體於今可以庻幾前軰風流者惟此一人耳五朝名臣言行録卷第八之一丞相潁國龐莊敏公公名籍字醇之單州武成人中進士第歷黃州司理叅軍開封府法曹知襄邑縣擢群牧判官殿中侍御史開封府判官出爲廣東福建轉運使景祐三年爲侍御史元昊反爲陜西體量安撫使降知汝州除陜西轉運使進龍圖閣學士知延州兼經略安撫招討使元昊旣稱臣召爲樞密副使改叅知政事拜樞宻使進同中書門下平章事罷知鄆州拜昭德軍節度使知并州復爲觀文殿大學士知青州徙定州召還京師以太子太保致仕薨年七十六明道中召入爲殿中侍御史章獻太后崩章惠太后欲踵之臨朝公奏燔閤門所掌垂簾儀制以沮其謀仁宗始專萬機冨於春秋左右欲以竒巧自媚後􅁐珠玉之工頗盛於前日公上言今螽􅑺爲災民憂轉死北有耶律西有拓䟦陛下安得不以儉約爲師奢靡爲戒重惜國用以徇民之急上深納其言中丞孔公道輔甞謂人曰今之御史多承望要人風指隂爲之用獨龐君天子御史耳司馬公撰墓誌爲開封判官尚美人方有寵遣宦者稱教旨免工人市繇公上言祖宗已來未有美人敢稱教旨干撓府政者上怒抶宦者切責美人仍詔諸官府自今有傳宫中之命皆毋得施行龍圖閣學士范諷喜放曠不遵禮法士大夫多慕效之又爲姦利事公屢奏其狀不報會使廣南將行復奏言之且曰苟不懲治則敗亂風俗將如西􅀳之季不可不察有詔置獄以覈其實獄成諷坐貶仍下詔戒天下風俗墓誌慶曆元年延安缺帥以公爲之明年除延州觀察使不拜延安自五龍川之敗戎落民㞐焚掠幾盡距郭無幾悉爲㓂境人心危懼公至􅀘綻茹漏聚用增備撫民以仁馭軍以嚴戍兵近十萬未有壁壘多􅀉止民家無秋毫敢犯民者諸將欲出兵公必召問方畧取其所長而誨其所短告以賞罰巳而必行由是諸將莫敢不盡力出輒有功是時元昊數犯邊覆軍殺將而獨不近鄜延間或小入輒以敗去故地爲虜所據者公悉逐之築十一城於險要其腹中可食之田盡募民耕之延安遂爲樂土㑹朝廷益厭兵欲赦元昊之罪以詔書命公招懐之公曰虜驟勝方驕􅀂遣人􅀃之彼益偃蹇不可與言先是元昊用事之臣野利旺榮遣其牙校李文貴來公留之於邊至是召之自從公所喻以逆順禍福遣還文貴尋以旺榮等四人書來用敵國禮公以其不遜未敢復書請於朝朝廷急於息民命公復書勿拒稱旺榮等爲太尉且曰元昊果肯稱臣雖仍其僣名可也公上言僣名理不可容臣不敢奉詔太尉天子上公非陪臣所得稱今方抑止其僣而稱其臣爲上公􅂲虜滋驕不可得臣旺榮等與臣書自稱寧令謨寧令此虜中之官中國不能知其義可以無嫌臣輙從而稱之朝廷善之旺榮等又請用小國事大國之禮公曰此非邊帥所敢知也而主􅀂遣使者奉表以來乃敢導致於朝廷耳是時朝廷方修復涇原公􅂲虜猝犯之敗其功乃留連其使數與之講議雖抑止其僣亦不决然絶也如是踰年元昊乃遣其臣賀從勗來自稱男􅀖面令國兀卒郎霄上書父大宋皇帝公使謂之曰天子至尊荆王叔父也猶奉表稱臣今名體未正不敢以聞從勗曰子事父猶臣事君也使從勗得至京師而天子不許請更歸議之公上言虜自背誕以來雖屢戰得氣然䘮和市之利民甚愁困今其辭禮寖順必誠有改事中國之心願聽從勗詣闕更選使者往至其國以詔旨抑之彼必稱臣凡名稱禮數及求匄之物當力加裁損必不得已乃少許之若所求不違恐犲狼之心未易􅄹厭也朝廷皆從其䇿元昊果稱臣􅁽命爲夏國主墓誌莊敏公爲鄜延招討使元昊効順公召李誠之問其信否誠之曰元昊數欺中國故疑之今則可信也元昊向得歳賜而不用積年而後叛今用兵數歳雖戰屢勝而所攻不克田里所掠不辦一日之費向來之積費巳盡矣故罷兵耳然公毋以爲功歸之朝廷則兵可罷竊計諸公不以此與人也公未以爲然旣而果遣兩人以他事使虜過延問朝廷議罷兵云何皆曰不知及還與虜使王延壽來公召㑹兩人問延壽來意又曰不知公曰延壽黠虜與君來而君且不知耶召禆將曰問王延壽何來吾爲􅀅而不與知邪亟書所奏事來不然且遣還兩人大懼乃以情告願還使者公曰軍令不可反君自止之而書其事來兩人具以事聞公自是異李焉談叢元昊旣効順而不肯臣請稱東朝皇帝爲父國􅃅吾祖年用私號求割三州十六縣地朝議彌年不决旣而報書年用甲子國號易其一字虜使過延公坐堂上召虜使立前而謂曰爾主欲戰則戰今不戰而降則朝廷所賜藩臣詔與頒朔封國皆有常制不必論自古夷狄盗中國之地則聞之未聞割地與夷狄也三州十六縣豈可得耶使曰清逺故屬虜且墳墓所在故欲得耳公曰中國所失州縣今未十年若論墳墓所在則中國多矣使語塞公曰爾主旣受封歳禄多少此則可議餘不足論虜使畏服談叢公在延州治州城及諸寨皆募禁軍爲之軍行出塞則使因糧於敵馬芻皆自刈之還􅂌其直民無飛輓之勞及去民遮道泣曰公用兵數年未甞以一事煩民雖以一子爲香焚之猶不足報也追送數驛乃去墓誌文公爲相龐公爲樞宻使以近丗養兵之􅁦在於多而不精故國用困竭於是大加簡閱揀放爲民者六萬餘人減其衣糧之半者二萬餘人衆議紛然以爲不可施昌言李昭亮尤甚皆言衣食於官乆不願爲農又皆習弓刀一旦散之閭閻必皆爲盜賊上亦疑之以問二公二公曰今公私困竭上下遑遑其故非他正由畜養冗兵太多故也今不省去無由蘇息萬一果有聚爲盗賊者二臣請以死當之旣而昭亮又奏兵人揀放所以如是多者大抵皆縮頭曲膕詐爲短小以欺官司耳公乃言兵人苟不樂歸農何爲詐欺如此上意乃决邊儲由是稍蘇後數年王德用爲樞宻使許懷德爲殿前都指揮使復奏選廂軍以􅀘禁軍増數萬人東軒筆録又記聞云傅永曰皇祐二年詔陜西揀閱諸軍及新保捷年五十以上若短不及格四指者皆免爲民議者紛然以爲邊事未可知不冝减兵又云停卒一旦失衣粮歸郷閭間必相聚爲盗賊縁邊諸將争之尤甚是時文公爲執政龐公爲樞宻使固執行之不疑是歳陜西所免新保捷凡三萬五千餘人皆歡呼返其家其未免者尚五萬餘人皆悲涕恨巳不得去永曰陜西縁邊計一歳費七十貫錢養一保捷是歳邊費凢减二百四十五萬貫陜西之民由是稍蘇公爲相專以公忠便國家爲事不以官爵養私交取聲譽端明殿學士程公戡知益州將行上俾公諭之曰戡還當處以兩府公曰兹事出於上恩臣不敢與聞卒不與言墓銘廣源蠻儂智髙反詔以樞宻副使狄青爲宣撫使討之言事者以青武人不足專任固請以侍從文臣爲之副上以訪公公以青必能辦賊請專以委之於是詔嶺南用兵皆受青節度卒破智髙墓誌此事詳見狄武襄公事中近丗臺官進用太速公舉舊制御史秩滿以大藩處之内侍省都知王守忠侍上乆求領節度使上以問公公曰自宋興以來未有内臣爲節度使者陛下至孝凢􅀕祀文物事有毫髮􅀜於宗廟者未甞不兢兢畏敬况祖宗典法又可隳邪上乃止由是内外怨疾頗多墓誌始平公自鄆徙并過京師謁上是時上新用文冨爲相自以爲得人謂公曰朕新用二相如何公曰二臣皆朝廷髙選陛下拔而用之甚副天下之望上曰誠如卿言文彦博猶多私至於冨弼萬口同詞皆云賢相也始平公曰文彦博臣頃與之同在中書詳知其所爲實無所私但惡之者毀之耳况前者􅀍謗而出今當愈畏敬矣冨弼頃爲樞宻副使未執大政朝士大夫未有與之爲怨者故交口譽之冀其進用而巳有所利焉若冨弼以陛下之爵禄樹私恩則非忠臣何足賢也若一以公議槩之則向之譽者將轉而爲謗矣此陛下所冝深察也且陛下旣知二臣之賢而用之則當信之堅任之乆然後可以責成功􅀂以一人之言進之未幾又以一人之言疑之臣􅂲太平之功未易可致也上曰􅀸言是也記聞至和三年以災異詔中外咸言得失公宻䟽曰太子天下本今陛下春秋固方盛然太子不豫建使四方無所係心願擇宗室之冝爲嗣者蚤决之羣情旣安則大異可塞矣臣歷位將相􅂲先犬馬無以報雖冒萬死而不悔也王禹玉撰神道碑虜盗耕屈野河田朝廷恐益復侵邊遣使更定其地旣而召虜人不至公遂禁邊母與和爲市虜人怨之日夜聚兵境上公又戒毋得輙舉師乆之虜且去公命通判并州司馬光詣麟州與知州武戡計事戡乃請築二堡于屈野之西使虜不敢耕故地光還公雖許之而堡實未築也巳而虜兵輒復聚管勾麟府兵馬郭恩走馬承受公事黄道元乃與戡擅率兵至忽里堆欲出其不意以擊之㑹伏發恩道元皆戰没而戡僅以身免未幾虜送道元歸詔御史鞠之乃言與戡等行視堡地因爲虜所掩公坐是罷節度使復爲觀文殿大學士知青州於是司馬光上書曰擅議築堡臣光實陳之今戡等輕出亡師傷國威重罪在臣光公聞亦上奏自咎皆不報神道碑知定州請老召還京師公陳請不巳或謂公今精力克壯年少所不及主上注意方厚何遽引去􅀂此之堅公曰必待筋力不攴明主厭棄然後乃去是不得巳豈止足之謂耶凡上表者九手䟽二十餘通朝廷不能奪五年聽以太子太保致仕墓誌公好學出於天性雖耋老家㞐常讀書賦詩以自娯至忘飢渇寒暑子弟雖愛之甚常莊色以誨之閨門燕㞐人不見其有惰容其爲治以愛民爲主明練法令以平心處之常曰凡爲大臣􅀹冝秪畏繩墨豈得自恃貴重亂天子法耶唯治軍差嚴有犯輙以便冝從事或斷斬刳磔或累笞取斃軍中股栗然能察知其勞苦至於廬舎飲食無不盡心爲之區處使皆完美故所至士卒望風聳畏而終無怨心遇僚屬謙恭和易有所􅀜白苟可取雖文書巳行立爲更易無愛吝心墓誌
