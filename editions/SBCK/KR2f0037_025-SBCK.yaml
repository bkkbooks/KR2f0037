body:
  text: 四之三尚書王懿敏公公名素字仲儀以父旦遺恩􅀘官召試賜同進士出身歴知濮鄂州召還知諌院擢天章閣待制淮南都轉運按察使徙知渭州坐事落職知汝州以樞宻直學士權知開封府出知定州成都府復入爲京尹以端明殿學士再知渭州乞換武職改澶州觀察使知成徳軍復以學士知太原府以工部尚書致仕卒年六十七仁宗方留精政事思聞朝廷得失御筆親除諌官而歐陽脩蔡襄余靖與公相次進用公起少年遇事感發甞言禮部取士不詢采行實顧文辭漫漶不足以應務請郡國置學擇明師使通知經術稍近三代里選之法自景徳以來較今内外無名之費數倍于前請置官三司量一􅀊所入其用非急者皆省去之㑹皇子生議欲因赦百官進官大賞賚諸軍公又言方元昊叛契丹數有所求縣官財用不足冝留金繒以佐邊費官爵以賞戰勞其議爲公止仁宗御天章閣出手詔問兩府大臣所以興治革弊之方公又大䟽時政姑息十餘事皆人所難言者末以非知之艱行之惟艱爲戒它日曲召公等四人靣諭曰卿等皆朕所自擇數論事無所避特皆賜章服王禹玉撰墓誌仁宗問王懿敏曰大僚中孰可命以相事者懿敏曰下臣其敢言帝曰姑言之懿敏曰唯宦官宫妾不知姓名者可充其選帝憮然有間曰唯富弼耳懿敏下拜曰陛下得人矣旣告大庭相冨公士大夫皆舉笏相賀或宻以聞帝益喜曰吾之舉賢於夣卜矣聞見後録慶暦中京師旱諌官王公素乞親行禱雨帝曰太史言月二日當雨一日欲出禱公曰臣非太史然是日必不雨帝問故公曰陛下幸其當雨以禱不誠也不誠不可動天臣故知不雨帝曰明日禱雨醴泉觀公曰醴泉之近猶外朝也豈憚暑不逺出邪帝毎意動則耳赤耳巳盡赤厲聲曰當禱西太一宫公曰乞傳旨帝曰車駕出郊不預告卿不知典故公曰國􅀄以虞非常今乆太平預告但百姓瞻望清光者衆耳無虞也諌官故不扈從明日特召公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑回望西太一宫上有雲氣如香煙以起少時雷電雨甚至帝却逍遥輦御平輦徹蓋還宫又明日召公對帝喜曰朕自卿得雨幸甚又曰昨即殿庭雨立百拜焚生龍腦香十七斤至中夜舉體盡濕公曰陛下事天當恭畏然隂氣足以致疾亦當御名帝曰念不雨欲自以身爲犧牲何御名也聞見後録公言王徳用進女口事帝􅀄詰以宫禁事何從知公不屈帝􅀏曰朕眞宗之子卿王旦之子有丗舊豈它人比徳用實進女口巳服事朕左右何如公曰臣之憂正􅂲在陛下左右耳帝即命宫臣賜王徳用所進女口錢各三百千押出内東門訖奏帝泣下公曰陛下旣不棄臣言亦何遽也帝曰朕若見其人留戀不肯去􅂲亦不能出矣少時宫官奏宫女已出内東門帝動容而起聞見後録公爲淮南都轉運按察使時􅀄置按察諸路皆以苛爲明獨公爲不苛然貪吏有自投劾去者墓誌權知開封府至和二年秋大雨壞蔡河水入都城宻詔軍吏障朱雀門公違詔止之曰方上不豫軍民廬舎多覆壓奈何障門更以動衆耶墓誌知成都府先是牙校􅀊輸酒坊錢以供厨傳之費前後日加豐而不知約故輸者亦加困而不能勝公爲一切裁約之省其費過半鐵錢唯行於兩川􅀊加鑄不止故錢輕貨重啇旅不行公爲罷鑄十年而物價以平利州路饑公遣發廪賑捄民得無流徙詔適下而公奏至上數稱嘉之公爲政在便人情蜀人録公所行爲王公異斷墓誌治平元年秋虜寇静邊寨圍童家堡天子西憂以公爲端明殿學士又知渭州於是畨酋故老皆歡呼越境望公之來比公馳至則虜解圍去矣公屢帥涇原馭將卒有恩無不得其歡心又善料敵情故塞下戍常少而積粟至十餘年甞廣渭之西南城濬隍三周屬羗間以土地來獻公悉募置弓箭手其行陣出入之法身自督敎之其居舊皆穿土爲室宼至老㓜多焚死公爲築八堡使足自保所部東西兩路廵檢比分領弓箭手不得自便公曰此豈前日募民兵意耶悉使散耕田里遇有警則發之故其士氣勇悍它路莫能及原州蔣偕說宣撫使范仲淹築堡大蟲巉堡未完而爲明珠滅臧伺間要擊之偕輙從間道遁歸伏庭下當以軍法論公貰令復徃緫管狄靑曰賊方据險設覆以待官軍偕輕而無謀徃必至敗公曰偕死則君徃靑計不得行偕卒能以死致其酋完所築堡而還畨官宻厮哥本天水羗也甞爲賊用始州欲覊縻之因請以爲十族廵檢及下公議即聲其罪械還夲族旣而叛去諸將曰不重購之後必爲邊患公曰吾在邊虜未甞敢輕入彼厮哥何爲也公一日燕堂上邊民悉驚走入城諸將曰使姦人亦從而入必將舉而内應不若拒之弗内公曰若拒之東去勢必揺􅀜中當且内之固知虜不敢犯我此必有姦言動之者乃下令曰敢復有言虜至者斬有頃􅃸􅀐從西來其傳果妄也諸將皆服墓誌知太原府㑹汾河大溢公曰􅀂壞平晉遂將灌州城乃命先具舟栰築堤以扞城一夕水果至人得無􅂲晉荐飢公勸大姓出粟活殍者十餘萬人墓誌公少感槩有大志人不敢以貴游子弟遇之及在朝敢言天下事數擊姦佞是時朝廷患政事因循日乆二三大臣因與共謀盡更前之所爲而間至於不次用人於是論者皆指以爲朋黨及大臣者去人莫敢以爲言公常獨言富弼韓􅄾范仲淹皆有重望冝復召用處之以不疑仁宗甞命公悉上爲御史諌官時所言事留觀殿中墓誌􅀄王素與歐陽脩數譽富弼於上前弼入相素頗有力弼旣相素知開封府兾弼引已登兩府旣不如志因詆毀弼又求外官遂出知定州徙知益州復還知開封府愈鬰鬰不得志厭倦繁劇府事多莽鹵不治數出遊宴素性驕侈在兩州皆以賄聞爲人無志操士大夫多鄙之開封府先有散從官馬千馬清善督察盗賊累功至班行府中頼之或謂素二馬在外威福自恣大爲姦利素奏悉逐之逺方於是京師盗賊屢發求捕不獲臺官言素不才亦自乞外􅀘朝廷因而罷之記聞素少長席富貴豪縱浮侈畜聲妓誇客然一時當路要人多其父時所引拔素亦善自交結又其爲吏知大略少時撃斷敢行皆足以發身及晚節官顯志得益頽靡在開封府㢮慢意不在事英宗甞對執政語及之云素自筮仕所至稱爲能吏旣升臺憲風力愈勁甞與同列奏事上前事有不合衆皆引去公方論列是非俟得旨乃退帝曰眞御史也議者目公爲獨擊鶻名賢詩話四之四内翰楊文公公名億字大年建州浦城人七歳能屬文年十一太宗聞其名詔送闕下試詩賦授袐書省正字令就袐閣讀書眞宗即位拜左正言與修太宗實録知處州召還知制誥召入翰林爲學士同修國史會母病陽翟請歸省不待報而行貶太常少卿分司西京起知汝州㑹加玉皇聖號表求陪預召還參詳儀制天禧四年復爲翰林學士是冬卒年四十七仁宗即位贈禮部尚書賜謚曰文楊文公年十一太宗親試一賦二詩頃刻而成上喜送中書再試執政令賦喜朝京闕詩亦立就且有願秉清忠節終身立聖朝之句宰相表賀湘山野録楊大年每欲作文則與門人賔客飲博投壷奕碁語􅀏諠譁而不妨締思以小方紙細書揮翰如飛文不加􅀧每盈一幅則命門人傳録門人疲於應命頃刻之際成數千言眞一代之文豪也歸田録楊文公凢爲文章所用故事常令子姪諸生檢討岀處每叚用小片紙録之文旣成則綴粘所録而蓄之時人謂之衲􅀍焉吕氏家塾記楊大年爲學士時草荅契丹書云鄰壤交歡進草旣入眞宗自注其側云朽壤䑕壤糞壤大年遽改爲鄰境明旦引唐故事學士作文書有所改爲不稱職當罷因亟求解職眞宗語宰相曰楊億不通商量眞有氣性歸田録楊文公以文章擅天下然特剛勁寡合有惡之者以事譛之大年在學士院忽夜召見於一小閤深在禁中旣見賜茶從容顧問乆之岀文藁數篋以示大年云卿識朕書蹟乎皆朕自起草未甞命臣下代作也大年皇恐不知所對頓首再拜而岀乃知必爲人所譖矣由是佯狂奔于陽翟眞宗好文初待大年眷顧無比晚年恩禮漸衰亦由此也歸田録楊文公性剛介寡合唯與李維路振刀衎劉筠數人厚善王欽􅀂驟貴公素薄其爲人欽􅀂銜之陳彭年方以文史進亦忌公名岀己右相與擠之㑹公母病陽翟別墅公請歸省遂不待報而行楊文公少以文進而方直自守後因母病有陽翟之行王文正公恐人害之白上遣使賜醫藥旣而言事者彈劾不已卒以亞卿分司上甞語輔臣曰聞楊億好謗時政王公曰楊億文人㓜荷國恩􅀂諧謔過當則恐有之至於謗訕臣保其不爲也王公器重文公至深頗思其歸乃因中書齋宿覽文公近詩而與趙文定諸時賢繼和上知之乃諭公召文公還爲袐書監乆之有問公者曰楊大年何不早與舊職公曰大年向以輕去上左右人言可畏賴上終始保全之今此職欲岀自清􅂨以全君臣之契公薨後文公方復禁署王文正公遺事楊文公爲執政所忌母病謁告不俟朝旨徑歸韓城與弟􅀝㞐踰年不調公有啓謝朝中親友曰介推母子願歸綿上之田伯夷弟兄甘受首陽之餓後除知汝州而希旨言事者攻之不巳公又有啓與親友曰巳擠溝壑猶下石而未休方困蒺藜尚􅀜弓而相射青箱雜記楊億在翰林丁謂初叅政事億例賀焉語同列曰骰子選爾何多尚哉未幾辭親疾逃陽翟別墅掇遺楊文公以直道獨立時有挾邪􅀃以進者面戯公曰君子知微知章知柔知剛公應聲荅曰小人不恥不仁不畏不義家塾記楊文公天性頴悟自㓜及終不離翰墨喜誨誘後進以成名者甚衆聞人有片辭可紀必爲諷誦手集當丗述作數十篇重交遊性耿介坦夷敦尚名節多周給親故廪禄亦隨而盡善談吐有味然評品人物善惡太明人多怨之范文正公讃公之像曰公以命丗之才其位不充故天下知公之文而未知其道也昔王文正公㞐宰府僅二十年未甞見愛惡之迹天下謂之大雅冦萊公當國眞宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞宻扶風馬公慷􅁣立朝有犯無隱天下謂之至直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣
