body:
  text: 十一卷丞相范忠宣公公名純仁字堯夫文正公之次子以恩補太常寺太祝中皇祐元年進士第知汝州襄城開封府襄邑縣治平中爲江東轉運判官擢殿中侍御史遷侍御史出通判安州徙知蘄州歷京西提􅀧刑獄陜西轉運使召還同知諌院修起居注判國子監出知河中府徙成都府路轉運使降知和州加直龍圖閣知慶州奪職知信陽軍徙齊州管句西京留守御史臺再知河中府元豐八年復職知慶州召還充侍講又除給事中元祐元年拜中大夫同知樞宻院事三年拜尚書右僕射兼中書侍郎明年以觀文殿學士知潁昌府進大學士知太原河南潁昌府召還復爲右僕射又罷知潁昌河南府改陳州落職知隨州再貶武安軍節度副使永州安置元符三年以光禄卿分司南京不數月以觀文殿大學士中太一宫使召以疾不赴薨年七十五徽宗書其碑額曰丗濟忠直之碑文正公門下多延賢士如胡瑗孫復石介李覯之徒與公從㳺晝夜肄業置燈帳中夜分不寢後公貴夫人猶収其帳頂如墨色時以示諸子孫曰爾父少時勤學燈煙迹也言行録再調官皆不赴文正公遣之公曰純仁豈可重於禄食而輕去父母耶雖近亦不能朝夕在側遂終養焉言行録丁文正公憂四方無所歸朝廷特爲給所居官俸仍借官屋居於許州文正公平生好施􅂢舘之日家惟四壁公居䘮中兄嫂弟妹聚族七十口約巳麤糲上下均一内外無間言飲食居處人不堪其憂哀毀骨立廬墓下與役夫同等而食言行録知襄城縣伯兄乆病心疾公承事照管湯藥飲食居處衣服必躬必親如孝子之事嚴父賈文元守北都辟掌機宻召編校祕閣書籍皆以兄病辭不赴冨文忠公責之曰臺閣清資人豈易得小官出常調亦難事何必苦辭公曰冨貴有命言行録襄城之民素不事􅁞織鮮有植桑者公患之因民之有罪而情輕者使植桑於家多寡隨其罪之輕重後按其所植榮茂與除罪自此人得其利公去民懷之不忘至今號爲著作林著作公宰縣時官也言行録知襄邑縣縣宇學校倉廪驛舎皆一新之又營學田擇郷之賢者以教其人聽政之暇時一至學親勸誘之言行録縣有牧地毎嵗衛士縱牧馬踐民田百姓病之而縣令不敢誰何公下車恩威著於上下百姓知公可頼一日民有訴衛士縱馬食田者公捕而杖之衛士校長申殿前司殿前司申樞宻院有旨劾公公申中書曰非不知衛士非畿邑小官所敢刑然養兵出於二稅二稅出於民田衛士牧馬而侵食民田則二稅將使何從而出哉身爲縣令職在養民􅀂坐視而不恤安用縣令哉章上特免罪仍令畿邑兼管句牧地自公始也言行録旱乆不雨公度將來必闕食遂盡籍境内客舟召其主而諭之曰民將無食爾等啇販唯以五榖貯之於佛寺中候闕食時吾爲汝主糶衆賈從命運販不停以至春首所蓄無慮十數萬諸縣飢獨境内之民不知也言行録公爲侍御史時方議濮安懿王典禮大臣與從官異論公言陛下親受仁宗詔而爲之子與前代入繼之主不同請如從官議繼與御史吕誨等更入論奏不聽則皆納告牒家居待罪旣而内出皇太后手書尊王爲皇夫人爲后公復言陛下以長君臨御奈何使命出房闥異日或爲權臣矯託之地非人主自安計時巳詔罷追尊趣公就職公猶以言不盡用請去益堅上不得巳出公通判安州公在臺數言人所難言及爭濮王事引􅁩據經語斥大臣􅀹切繇是名震天下曽子開撰墓誌神宗初即位􅁣然有追迹先王内脩政事外攘夷狄之志得王荆公任之多所更張公自還朝即勸上毋開邊隙言行録曰自陜西轉運副使召還神宗問曰卿在陜西乆主漕輓必精意邊事城郭甲兵糧儲如何公對曰城郭粗完甲兵粗修糧諸粗備神宗愕然曰卿才能如此朕所􅀝頼而職事皆言粗何也公徐對曰粗者未精之辭如是足矣臣願陛下無深留意於邊事恐邊臣觀望要功生事結釁夷狄殘害生靈耗竭財用糜費爵賞不惟爲今日目前之害又將貽他時意外之憂臣願陛下究孟子交鄰之道修孔子來逺之徳使好生之德洽于夷狄彼將愛戴陛下如父母雖其酋首桀傲欲侵侮我疆其徒亦不爲之用也又進言變改法度人心不寜書曰怨豈在明不見是圖願陛下圖不見之怨上曰何謂不見之怨公曰古人所謂天下之人不敢言而敢怒者是也上善之令條古事可爲戒者以聞公作尚書解以進及爲諌官前後爲上言以休兵省事節用冨民進君子退小人愛人材申公論爲急崇聚歛事苛刻親䜛佞任偏聽爲戒大則廷論小則䟽逹未聽則連章累牘不苟止其於君子小人之際􅀹反復激切無所諱避甞論冨韓公在相位不當數移疾杜門自爲形迹吕誨不當罷御史中丞李師中不可守邊薛向不可發運使向行均輸法於六路必將掊克生民歛怨基禍它所開陳􅀋如此上方鋭於求治又言道逺當馴致事大難速成人材不可遽求積敝不可頓革自古人君欲事功亟就必爲憸佞所乗不可不察公雅與荆公厚善至是數言其以五覇冨國疆兵之術惑誤人主失天下望旣而劉􅄾錢顗孫昌齡同時罷御史公又言􅄾等一言柄臣遽以罪絀今在廷阿附者衆奈何陛下更以法驅之益指切荆公并及它大臣詞氣甚厲上察其忠留章弗下而公請去不巳至闔門不出廼罷諌院留修起居注公固辭執政或遣所親諭公速起且除知制誥矣公曰是以利訹我也言不用萬鍾於我何加焉録所上章納中書門下執政見之怒出知河中府墓誌又聞見録云熈寜中朝廷有生老病死苦之語時王荆公改新法目爲生事曽魯公以年老依違其間冨韓公稱病不出唐質肅與荆公爭按問欲舉理直不勝疽發背死趙清獻唯聲苦時范忠宣公爲諫官皆劾之言荊公志在近功忘其舊學冨公謀身過於謀國曽公趙公依違不斷可否忠宣毎曰以王介甫比莽卓過矣但急於功利遂忘素守耳權成都府路轉運使兼領農田水利差役事公以新法於民不便反復論奏戒約州郡未得遽行安石怒公沮格新法使門下人捃摭公私事然卒不能得言行録環慶大饑帥守坐不職罷去以公代之過闕入對神宗見公甚喜曰卿父在慶甚有威名卿兵法必精公對曰臣素儒家未甞學兵法又問卿縱不學兵法卿乆隨侍在陜西必亦詳熟邊事公對曰臣隨侍時年㓜並不復記憶兼今日事體與昔時不同且臣不才陛下􅀂使完繕城壘愛養百姓臣䇿疲駑不敢有辭􅀂使臣開拓封疆侵攘夷狄則願别擇才者因遂力辭上不許公到慶州餓殍满路官無榖以振恤公欲發常平封摏粟麥振之州郡皆欲俟奏請得旨而後散公曰人七日不食即死何可待報諸公但勿預吾寜獨坐罪時一路荐饑耕牛殺盡五榖絶種官儲有限方懼未有以繼㑹是秋蓬生蔽野而結實如粟可食所収狼戾民食之餘公令官糴所収尚不貲又於鄰路市耕牛榖種計户口分貸蕃漢人户兼以人力墾耕布種甚廣遂大有年或言公禀貸過多而無活人之實朝廷疑之遣使按治民間聞之爭先輸官比使至無􅀒者詔使得藂塚於邠寧間喜曰全活不實之罪於此得矣發塚數骸藉其數上之詔委夲路監司窮治實前帥楚建中所封也與公殊無干涉朝廷遷治建中罪公連上䟽云建中當饑儉之初循守法令申請措置之間不免有殍死者比之臣來繼其法度已成之後故得一意賑恤偶免流亡况建中巳坐罪罷去今縁按臣而又及建中是一罪而再刑也建中猶贖銅三十斤言行録屬郡流人道慶稱􅁈按得􅁈狀郡將种詁訟公挾情變獄詔移獄比郡出御史治之逮公就對部人數萬號泣遮道童兒相率誦詩隨之乆乃去獄成古坐誣吿抵罪公猶以它事奪職知信陽軍墓誌移知齊州齊爲山東劇郡屠販劫盜無虚日人或勉公曰公爲政素寛然齊民兇悍性好剽劫以嚴治之猶不能戢􅀂一以寛恐不勝其治矣公曰寛出於性􅀂強以猛治則不能持乆猛而不乆以治􅇯民取玩之道也齊有两司理院囚繫常满多屠販盗竊而督賞者公曰此何不責保在外使之輸納耶通判州事起白公曰非不知此第以此軰兇􅁀釋之不旋踵復紊官司矣公曰終當如何曰徃徃待其自以疾斃於獄中是亦與民除害耳公蹙然曰法不當死而在位者以情殺之豈理也耶遂盡呼出立于庭下戒飭之曰爾軰爲惡不悛在位者不欲釋汝懼爲良民害復紊官司也汝等􅀂能悔過自新我欲釋汝皆叩頭曰敢不佩服教令遂釋之歡呼而出轉相告語是嵗犯法者減舊嵗之半言行録録事叅軍宋儋年中毒暴卒公得罪人置於法􅀄宋君因㑹客罷是夜門下人遽以疾告公遣家人子弟視其䘮事宋君小殮口鼻血出漫汙幎帛公疑其死不以理果爲寵妾與小吏爲姦付有司按治具伏因㑹客置毒在鱉䏑中公曰䏑在第幾廵豈有中毒而能終席耶命再劾之宋君果不􅄝鼈䏑爲坐客所并乃客散醉歸置毒酒盃中而殺之罪人覬他日獄變爲逃死之計也人以爲公發擿姦伏如神明􅀂非遇公則宋君之􅁈無以申於地下矣言行録公判留臺時一時􅂄舊多在洛公與司馬公皆好客而家貧相約爲眞率㑹脫粟一飯酒數行過從不間一日洛中誇以爲勝事行狀除給事中時哲宗宣仁太后共政司馬温公入相首改差役法公聞之謂人曰此事當熟講而緩行不然滋爲民病且宰相職在求人變法非所先也還朝力爲温公言之温公有所建請公復言宰相當虚心以延衆論不必謀自巳出謀自巳出則謟䛕得乗間迎合而正士將卷懷退避是時初改熈寜案問自首法公奏立文太深又言四方奏讞大辟有司一以八年十一月詔書從事坐死者視舊數倍非先王寜失盡不經之意蓋公雖與温公同志及臨事有所矯正􅀋如此於是人皆服公平直且知前於荆公非苟爲異也墓誌又言行録載公與温公手東曰蒙示奏藁益見公之存心然公旣知純仁不欲速而示之以益堅之削蓋欲使知其罪而黙黙耳黙默何難人人皆能不止能黙亦可賛公使公喜而自容於門下何用犯公怒而喋喋也若果如此則是純仁不若少年合介甫求早冨貴也何用白首強顔於此媚公求合哉惟其如此所以誤公一顧而提携至此惟公憐其誠而深察爲幸司馬温公欲令進士召朝官保任然後應舉又更貢舉法公曰舉人難得朝士相知士族近京猶可寒逺之人􅀹不易矣兼仐之朝士未必能過京官選人京官選人未必能如布衣徒令求舉未必有益旣欲不廢文章則雜文四六之科不如設在衆人􅂣中不須別設一科也孟子恐不可輕猶黜六經之春秋矣温公從之言行録除兼侍講公語人曰國之夲在君君之本在心人君之學當正心誠意以仁爲體使邪僻浮薄之説無自而入然後發號施令爲社稷宗廟之福豈務章通句解以資口舌之辯哉及在經筵進講必反覆開陳其說歸於人君可用而後止言行録同知樞宻院事􅀄公還自慶两宫亟遣中使賜太官饍出手詔問禦備西戎之䇿公請罷兵棄地因使歸所掠漢人執政持之未决㑹公入樞府復申前議又請予地之外歸一漢人予絹十两事皆施行旣而夏人未順公請陜西一郡自効不許㑹邊臣俘蕃酋􅀑章以獻两宫歸功輔臣褒賜異甚公請誅鬼章塞上以謝邊人而議者欲致其子収河南故地故赦不殺其後又欲官之公復固爭然􅀑章子卒不至墓誌公自爲執政務以愽大開上意忠篤革士風在樞府時言者攻章惇鄧綰公皆力爲捄解因言臣甞爲綰誣奏坐黜今日所陳恐録人之過太深實繫國體两宫感悟即日遣中使手詔嘉納因下詔書前日希合附㑹之人一切勿問言者亦勿復以言旣而在廷頗分朋黨論議多出私意浸潤之說稍行學士􅂫軾草䇿問題或言引用不當韓維罷門下侍郎􅀘外公奏軾無罪維心國家弗避嫌謗不可因譛言絀及在相位諌官王覿坐論朋黨貶公復爲辨君子小人朋黨之異因極言前丗朋黨之禍并録歐陽文忠公朋黨論以進墓誌前宰相蔡確坐詩語譏訕簾中臺諌章䟽交上必欲朝廷誅殛宰執侍從皆爲當然公獨以爲不可遂於簾前開陳方今聖朝冝務寛厚不可以語言文字之間曖昧不明之過誅􅇡大臣今日舉動冝與將來爲法式此事甚不可開端也宰臣奏蔡確黨人甚盛不可含胡不問公靣奏以爲朋黨難辨却恐悮及善人此事正宜詳審不可容易繼入奏曰切以朋黨之起蓋因趣向異同同我者謂之正人異我者疑爲邪黨旣惡其異我則逆耳之言難至旣喜其同我則迎合之佞日親以至眞僞莫知賢愚倒置國家之患何莫由斯至如王安石止因喜同惡異遂至黒白不分至今風俗猶以觀望爲能後來柄臣固合永爲商監今來蔡確不必推治黨人旁及枝葉臣聞孔子曰舉直錯諸枉能使枉者直則是舉用正直而可化枉邪爲善人不仁者自當屏迹矣何煩分辨黨人或恐有傷仁化公初與諸公議蔡確之命唯左丞王存與公相恊是日上前方開陳論列之際諸公畫可皆不頋公而先退公獨留身因揖王存上前論之益堅宣仁怒卒貶確新州言者交章擊公黨確公遂以疾請外即日以公知潁昌府王存知蔡州言行録又聞見録云元祐三年有吴處厚者以蔡確題安州車蓋亭詩來上以爲謗訕宣仁太后得之怒曰蔡確以吾比武后當重謫吕汲公爲左相不敢言忠宣乞薄􅃀罪不從􅀄議貶確新州忠宣謂汲公曰此路荆􅁄巳七八十年吾軰開之恐自不免汲公又不敢言忠宣因乞罷政先是河上所科夫􅃥許輸錢免夫上下皆以爲便公獨憂曰民力自此愈困矣或曰毎􅀊差夫一丁費萬錢今以七千免一丁又免百姓奔走執􅃥之勞豈不便乎公曰毎􅀊差夫雖曰萬錢然隨身者不過三千又得一丁就食于官今免夫所出七千盡歸于官矣民又儼然坐食於家蓋力者身之所出錢者非民所有今捨其所有而征其所無民安得不病此一事冨民不親執􅃥者以爲便窮民有力而無錢者非所便也又况差夫必計其的確合用之數縱使所差倍其所􅃥則力愈衆民愈不勞矣今若出錢以免夫雖三分之工亦可以取十分免夫錢其弊無由致察又從來差夫不及五百里外今免夫錢無逺不届􅀂遇掊克之吏則爲民之害無甚於此言行録知太原府河東土狹民衆惜地不葬其先公遣屬僚収無主燼骨別男女異穴以葬又檄一路諸郡皆倣此不可以萬數計刻石以記嵗月言行録復拜尚書右僕射因入謝簾中宣諭曰或以謂卿必先引用王覿彭汝礪卿冝與吕大防一心公對曰此二人實有士望臣亦知之臣終不敢保位蔽賢更望陛下加察行狀公前爲相時有司請歸河故道二三大臣主其議公獨爭以爲壅水使髙必難成功况今公私匱乏當緩其􅃥朝廷爲出近臣徃視還奏如公言主議者不懌宻啓以手詔督趣公復固爭两宫悟爲収還手詔公旣罷而河􅃥復興調發至潁昌公又上䟽極論两宫然之而􅃥猶不輟及公再相又遣從官御史經度不能易前說然主議者必欲成之後雖暫歸故道巳而復决人力爲之大敝至于今未復也墓誌又談叢元祐執政議河爲两􅀃文潞公安樞密燾主故道范丞相王左丞存主新道士大夫是故者見文安是新者見王范持两可者見四公也宣仁寢疾宰輔入問后留忠宣曰卿父仲淹可謂忠臣在章獻朝勸后盡母道在仁宗朝勸帝盡子道卿當似之聞見録上方親政於大臣中注意獨厚有宻薦人材者輙以質於公又甞問先朝法度公悉心以對無所回隱因勸上御名擇執政臺諌官且言仁宗朝委事執政而臺諌實叅論議可以爲法然不可用非其人上嘉納之墓誌一日三省同登蘇轍獨進上前論殿試䇿題因引漢昭變更武帝法度事哲宗怒曰安得以漢武比先帝轍再拜而退曰臣引用失當容臣待罪公奏曰漢武雄才大略史無貶辭又轍所論非異同正欲救巳行之言望陛下宣住蘇轍尚書右丞鄧潤甫越次言曰先帝法度爲司馬光蘇轍壞盡公曰不然法本無弊弊則當改上曰人謂秦皇漢武公奏蘇轍之所論事與時也非人也轍卒得罪去聞見録云李清臣首建紹述之議多害正人一日哲宗震怒謂門下侍郎􅂫轍曰卿安得以秦皇漢武上比先帝蘇公下殿待罪吕汲公等不敢仰視忠宣從容言曰史稱武帝雄材大略爲漢七制之主蓋近丗之賢君蘇轍果以比先帝非謗也陛下親政之􅀄進退大臣不當如訶叱奴僕哲宗怒少霽罷朝蘇門下舉笏以謝忠宣曰公佛地位中人也蘇公與忠宣同執政忠宣寡言蘇公平昔若有所疑至此方知其賢時士大夫觀望多誣詆垂簾時事人情大恐公以明道二年五月癸酉詔書上之曰望陛下稽倣而行以戒薄俗巳而狂人趙天啓作擬試䇿傳播中外御史章䟽稍取以爲用公又言今狂妄詆訐者巳多容之則累聖孝懲之則恐塞言路不􅀂以詔書禁約一遵仁宗故事尋以天啓在元祐中甞上書龍熈寜元豐政事爲非道編管鄧州公亦求去不許全臺言蘇軾行吕惠卿告詞訕謗先帝有旨落職知英州公䟽曰熈寜法度皆惠卿附㑹王安石建議不副先帝愛民求治之意至垂簾之際始用言者特行重竄今巳八年矣言者多當時御史何故畏避不即納忠而方有是奏豈非觀望耶客省副使髙士敦以太皇太后恩特旨改官蘇轍謫知汝州御史來之邵言士敦任成都鈐轄日不法事又論轍所謫太近公言之邵爲成都路監司士敦有犯自當按發轍與政累年之邵巳作御史亦無糾正今乃繼有二奏其情可知行狀哲宗親政吕汲公欲遷殿中侍御史楊畏爲諌議大夫忠宣曰天子諌官當用正人楊畏不可用汲公方約畏爲助謂忠宣曰豈以楊畏甞言公耶忠宣曰不知也蓋上初召忠宣畏甞有言上不行忠宣故不知也忠宣因乞罷政上不許後楊畏首叛汲公凢可以害汲公者無所不至聞見録公在相位凢薦引人材必以天下公議所薦命家人促裝以待謫命公在隨幾一年州事毫髪必親客至談􅀏終日無倦色公素苦目疾忽全失其明因上表乞致仕章惇戒堂吏不得上蓋懼公復有指陳終移上意遂貶公武安軍節度副使永州安置命下公怡然就道切戒子弟不得小有不平意曰不見是而無悶爾曹勉之人或謂公爲近名公聞而歎曰七十之年两目俱䘮萬里之行豈其欲哉伹區區愛君之心不能自巳人􅀂避好名之嫌則無爲善之路矣行狀又聞見録云永州命下忠宣欣然而徃毎諸子怨章惇忠宣必怒止之江行赴貶所舟覆扶忠宣出衣盡濕顧諸子曰此豈章惇爲之哉至永州公之諸子聞韓維少師謫均州其子告惇以少師執政日與司馬公議論多不合得免行欲以忠宣與司馬公議􅃥法不同爲言求歸白公公曰吾用君實薦以至宰相同朝論事不合即可汝軰以爲今日之言不可也有愧而生者不􅀂無愧而死諸子遂止公在永三年怡然自得或加以撗逆人莫能堪而公不爲動亦未甞含怒於後也墓誌公到永日課兒孫誦書躬親教督常至夜分在永三年終始如一至於飲食居處人不堪其憂公未甞興一念毎對賔客唯論聖賢脩身行巳餘及醫書方藥他事一語不持口而氣皃益康寜如在中州時行狀上皇即位之􅀄欽聖皇太后同聽政忠宣公自永州先以光禄卿分司南京鄧州居住蓋二聖欲用公矣遣中使至永州賜茶藥宻諭曰皇帝與太皇太后甚知相公在先朝言事忠直今虚位以待相公不知目疾如何用何人醫治只爲左右有不是當人阻隔相公公頓首謝又曰太后問相公官家即位行事如何天下人何說公曰老臣與逺方之人唯知鼓舞聖德又曰天下有不便事但奏來公曰敢不奉詔又曰鄧州且去否公曰巳出望外如歸郷里又曰離闕下日二聖再三言太后在宫中皇帝在藩邸甚知相公是直臣公感泣不巳俄復觀文殿大學士中太一宫使召赴闕供職而公病詔書有豈唯尊徳尚齒昭示寵優庶幾鯁論嘉謀日聞忠告之語公捧詔泣曰上果用我矣目明全失風痺不隨恩重命輕死有餘責上又遣中使賜銀合茶藥促公入覲仍宣渇見之意公曰老臣命薄虚蒙聖眷乞歸潁昌養疾上不得巳許之毎見輔臣問安否乃曰范純仁得一識靣足矣公復告老不允詔至公巳薨矣上與皇太后震悼出涕先是公疾革精識不亂諸子侍側口占遺表凡八事命門生李之儀次第之言行録載此表略云蓋常先天下而憂期不􅀒聖人之學此先臣所以教子而微臣資以事君又曰􅀂宣仁之誣謗未明致保佑之憂勤不顯夲權臣務快其私忿非㤗陵實謂之當然以至未究流人之徃愆悉以聖恩而特叙尚使存殁猶汙瑕疵又復未解彊􅂣之嚴幾空帑藏之積有城必守得地難耕凡此數端願留聖念諸子以其所言皆朝廷大事且防後患以公口占畫一繳申潁昌府用府印􅀉軍資庫及將葬之儀又作行狀論公平生立朝行已大節蔡京用事小人附㑹言公之子正平等撰造中使至永州傳宣聖語以爲遺表非公意也正平與之儀皆下御史獄捶楚甚苦正平之儀欲誣服其傳宣中使獨不服曰舊制凡傳聖語受本於御前請寳印出注籍於内東門遣使受聖語籍中使從其家得永州傳宣聖語夲有御寳如所言又驗内東門受聖語籍亦同又下潁昌府取正平所繳納遺表八事皆實獄遂解正平猶覊管象州之儀覊管太平州正平之家死於嶺外者十餘人獨正平遇赦得歸不出仕終身爲選人蔡京者紹聖初爲户部尚書欲結后戚向氏故奏展向氏墳寺事下開封府正平爲開封府縣尉徃按視其地曰向氏寺地步巳足民田不可奪府以其言聞哲宗怒京贖銅二十斤京由此恨正平故欲誣殺之嗚呼使忠宣公無恙相上皇於􅀄載天下豈復有今日之旤公旣病不能朝上皇始命相曰曽布與蔡京云聞見録公性夷易寛簡弗以聲色加人及􅁩所在則挺然不少屈誠心好善不爲忮克甞曰吾平生所學得之忠恕二字而巳繇是所至人歸其仁而憚其正歷事四丗終始無間言自爲布衣以至宰相㢘儉恭遜不少加損政府恩錫屢斥以廣義莊晚年南還貧甚得賜輒均及屬人前後任子恩多先踈族故公殁之日㓜子五孫未官墓誌又言行録云公甞曰我平生所學唯得忠恕二字一生用不盡以至立朝事君接待僚友親睦宗族未甞須􅁷離此也又戒子弟曰人雖至愚責人則明雖有聦明恕巳則昏爾曹但常以責人之心責巳恕巳之心恕人不患不到聖賢地位也親族間有子弟請教於公公曰唯儉可以助廉唯恕可以成徳其人書於坐隅終身佩服公平生自奉食無重肉不擇滋味麄糲毎退自公易衣短􅄄率以爲常自少至老自小官至逹宦終始如一雖暑月燕居不去上服未甞跣足亦不揮扇見子弟雖顚沛造次非加冠冕莊容不見公甞曰人材難得欲隨事有用則緩急無以應手七年之病求三年之艾非儲之以待則如病者何故雅以人才爲巳任毎有薦引必先公議而及其至也内舉有所不避其不可則人君所主亦必爭行狀公教子弟曰六經聖人之事也知一字則行一字要須造次顚沛必於是則所謂有爲者亦􅀂是耳豈不在人耶行狀時西邊儒帥有以威敵斥境請于公者手自荅曰大輅與柴車較逐鸞鳯與鴟梟争食連城與瓦礫相觸君子與小人􅋐力不惟不能勝兼亦不可勝不惟不可勝雖勝亦非也行狀子言范公堯夫之寛大也昔余過成都公時攝帥有言公於朝者朝廷遣中使降香峨眉實察之也公一日訪予欵語予問曰聞中使在此公何暇也公曰不爾則拘束已而中使果怒以鞭傷傳言者耳屬官喜謂公曰此一事足以塞其謗請聞於朝公旣不折言者之爲非又不奏中使之過也其有量如此程氏遺書范公堯夫攝帥成都程子將告歸别焉公曰願少留純仁將别子曰旣别矣何必復勞輿衛遂行公使人要於路曰願一見也旣見曰先生何以教我子曰公甞言爲將帥當使士卒視巳如父母然後可用然乎公曰如何子曰公言是也然公爲政不􅀂是何也公曰可得聞與子曰舊帥新亡而公張樂大饗將校於府門是教之視帥如父母乎曰亦疑其不可故使屬官攝主之也子曰是􅀹不可也公與舊帥同僚也失同僚之義其過小屬官於主帥其義重曰廢饗而頒之酒食如何曰無頒也武夫視酒食爲重事弗頒則必思其所以而知事帥之義乃因事而教也公曰􅀂從先生言而不來則不聞此矣其喜聞義如此遺書正叔說堯夫對上之詞言陛下冨國強兵後待做甚以爲非是此言安足諭人主如周禮豈不是冨國之術存焉子厚言堯夫抑上冨強之說正猶爲漢武帝言神仙之學長年不足惜言豈可入聖賢之曉人不如此方拙如梁惠王問何以利國則說利不可言之理極言之以至不奪不饜遺書科舉取人不得間有得者自是豪傑之士因科舉以進耳且資䕃得官與進士得官孰爲優劣以進士爲勝以資䕃爲慊者此自後丗流俗之論至使人恥受其父祖之澤而甘心工無益之習以與孤寒之士角勝於􅂣屋僥倖一第以爲榮是何見識夫應舉亦自寒士無禄不得巳籍此進身耳如得巳何用應舉范堯夫最有見識然亦以資䕃與進士分優劣建言於有無出身人衘位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者爲讀書而加􅅄勸焉則彼讀書者應舉得官而止耳豈眞學道之人至如韓持國自是經國之才用爲執政亦了得不可以其無出身便廢其執政之才曰堯夫所别異者莫非此等人否曰執政不是合下便做亦自小官以次遷之如後來吴坦求等在紹聖中􅀍駮了愽士以無出身故也彼自布衣中朝廷以其學行賜之爵命至其冝爲愽士乃復以爲無出身奪之此何理也資䕃進士中俱有人惟其人用之加一右字亦自沮人爲善􅀛山語録元符末吕惠卿罷延安帥陸師閔代之有訴惠卿多以人冒功賞者師閔以其事付有司未竟罷去曽布爲樞宻使素與惠卿有隙特自太原移徳孺延安蓋德孺於惠卿亦有隙也德孺至取其事自治有自皇城使追奪至小使臣者德孺由是太失邊將之心議者謂有詞於前政事巳在有司德孺乃取以自治失矣徳孺聦明過人而爲曽布所使惜哉未幾德孺亦以論􅃥法罷如忠宣丞相則不然公帥慶陽時爲緫管种詁無故訟於朝上遣御史按治詁停任公亦罷帥至公爲樞宻副使詁尚停任復薦爲永興軍路鈐轄又薦知隰州公毎自咎曰先人與种氏上丗有契義純仁不肖爲其子孫所訟寜論事之曲直哉嗚呼可謂以徳報怨者也以徳孺之賢於是乎有愧於忠宣矣聞見録紹聖􅀄哲宗親政用李清臣爲中書侍郎范丞相純仁與清臣論事不合范公求去帝不許范公堅辭帝不得巳除觀文殿大學士判潁昌府召章惇爲相未至清臣獨當中書益覬倖相位復行免􅃥青苗法除諸路常平使者惇至不能容以事中之清臣出知北京建中靖國􅀄上皇即位用韓忠彦爲相清臣爲門下侍郎忠彦與清臣有連故忠彦惟清臣言是聽清臣復用事范右丞純禮忠彦所薦清臣罷之劉安丗吕希純皆忠彦所重清臣不使入朝外除安丗帥定武希純帥髙陽張舜民忠彦薦爲諌大夫清臣出之帥眞定其所出與外除及不使入朝者皆賢士清臣素所憚不可得而用者忠彦懦甚不能爲之主曾布爲右相用范致虚諌䟽云河北三帥連衡恐非社稷之福劉安丗吕希純同日報罷清臣亦爲布所䧟出知北京伯温常論紹聖建中靖國之􅀄朝廷邪正治亂未定之際皆爲一李清臣以私意幸相位壞之邪􅀃旣勝衆小人並進清臣自亦不能立於朝矣使清臣在紹聖初同范丞相在建中靖國􅀄同范右丞劉安丗吕希純張舜民以公議正論共濟國事則朝廷無後日之禍而清臣亦得相位享羙名矣此忠臣義士惜一時治亂之機爲之流涕者也聞見録文正公四子長子少有大志不幸疾廢公與叔季克丗其家而公憂國愛君不以利害得䘮貳其心刻意名節難進易退雖屢黜廢志氣彌勵人以爲有文正之風焉其在朝廷專務􅅄進人材故天下善􅀋視公用舎以爲消長其論議平恕不爲巳甚丗謂使其言行於熈寜元豐時後必不至紛更盡申於元祐中必無紹聖大臣讎復之禍今上虚巳待公天下亦幸公復用而公疾不能朝以至不起哀哉旣病口授諸子遺奏數百言讀者益歎其忠墓誌曽文昭公銘公之墓曰逺矣范宗陶唐其系更夏商周保姓受氏在􅀳宣子以告穆叔流非不長止曰丗禄孰爲不朽維後有人􅀂公父子再秉國鈞有德有言百丗弗泯公起諸生至位丞相一節不回雖老猶壯御史抗議公惟守禮諌垣建白公不言利封疆之事公曰休兵廟堂之論公則持平利害異趣公爲砥柱愛惡相讎公爲虚舟丗夸以爭公避不有衆所憚行公惟恐後堂堂嶷嶷古社稷臣正色四丗屢亨屢屯白首南遷縱心順命巳僵復起天子之聖有澤在民有謀在國壽非不多人以爲嗇惟其卓偉山髙日赫歸從先君嵩洛之側帝念公賢形于詔墨後人來咨不假方􅁽請視豐碑丗濟忠直十之二安定胡先生先生名瑗字翼之㤗州海陵人累舉不第年四十餘景祐初更定雅樂詔求知音者范文正薦先生白衣對崇政殿授祕書省校書郎范公使陜西辟丹州推官改湖州州學教授以殿中丞致仕皇祐中復召議樂授光禄寺丞兼國子監直講嘉祐􅀄擢太子中允天章閣侍講仍治太學旣而疾不能朝以太常博士復致仕歸老於家而卒侍講布衣時與孫明復石守道同讀書㤗山攻苦食淡終夜不寢一坐十年不歸得家問見上有平安二字即投之澗中不復展讀曾孫滌所記師道廢乆矣自明道景祐以來學者有師惟先生曁泰山孫明復石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂爲學慶曆四年天子開天章閣與大臣講天下事始􅁣然詔州縣皆立學於是建太學于京師而有司請下湖州取先生之法以爲太學法至今爲著令歐陽公撰墓表先生教人有法科條纎悉備具以身先之視諸生如其父兄諸生亦信愛如其子弟胡安定在湖州置治道齋學者有欲明治道者講之於中如治兵治民水利筭數之􅀋甞言劉彞善治水利後累爲政皆興水利有功程氏遺書先生􅀹患隋唐以來仕進尚文詞而遺經業苟趨禄利及爲蘇湖二州教授嚴條約以身先之雖大暑必公服終日以見諸生嚴師弟子之禮解經至有要義貇貇爲諸生言其所以治己而後治乎人者學徒千數日月刮劘爲文章皆傳經義必以理勝信其師􅀃敦尚行實後爲太學四方歸之庠舎不能容旁拓歩軍居以廣之五經異論弟子記之自爲胡氏口義侍邇英講不以諱忌爲避蔡端明撰墓誌又曾孫滌記云侍講讀乾元亨利貞不避諱上與左右皆失色侍講徐曰臨文不諱上意遂解安定先生在湖學時福唐劉彞執中徃從之學者數百人彞爲髙第凡綱紀於學者彞之力爲多熈寧二年召對上問從學何人對曰臣少從學於安定先生胡瑗上曰其人文章與王安石孰優彞曰胡瑗以道德仁義教東南諸生時王安石方在場屋脩進士業臣聞聖人之道有體有用有文君臣父子仁義禮樂歴丗不可變者其體也詩書史傳子集垂法後丗者文也舉而措之天下能􅃳澤其民歸于皇極者其用也國家累朝取士不以體用爲夲而尚其聲律浮華之詞是以風俗偷薄臣師瑗當寳元明道之間􅀹病其失遂明體用之學以授諸生夙夜勤瘁二十餘年專切學校始自蘇湖終于太學出其門者無慮二千餘人故今學者明夫聖人體用以爲政教之夲皆臣師之功也上曰其門人今在朝爲誰對曰若錢藻之淵篤孫覺之純明范純仁之直温錢公輔之簡諒皆陛下之所知也其在外明體適用教于民者迨數十軰其餘政事文學粗岀於人者不可勝數此天下四方之所共知而歎美之不足者也上恱李廌書先生弟子散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問可知爲先生弟子其學者相語稱先生不問可知爲胡公也墓表侍講當召對例湏先就閤門習儀侍講曰吾平生所讀書即事君之禮也何以習爲閤門奏上令就舟次習之侍講固辭上亦不之強卒許之人皆謂山野之人必失儀及登對乃大稱旨上謂左右曰胡瑗進退周旋舉合古禮曾孫滌所記安定先生皇祐至和間爲國子直講朝廷命主太學生餘千人先生日講易予列諸生執經座下先生每講罷或引當丗之事以明之至小畜以謂畜止也臣止君也巳乃言及中令趙公相藝祖日上令擇一任諫争臣中令具名以聞上却之弗用異日又問可任者中令復上前劄上亦却之如此者三仍碎其奏擲於地中令輙懷以歸它日復問中令乃􅀘所碎劄子呈于上上乃大悟卒用其人麈史胡先生瑗判國子監其教育諸生皆有法先生每語諸生食飽未可據按或乆坐皆於氣血有傷當習射投壷㳺息焉是亦食不語寢不言之遺意也程伊川曰凡從安定先生學者其醇厚和易之氣望之可知也國子監舊有先生祠紹聖初林自爲博士聞於朝徹去聞見録公在仁宗朝嘗上書請興武學其略曰頃􅀊吴育巳建議興武學但官非其人不乆而廢今國子監直講内梅堯臣曾注孫子大明深義孫復而下皆明經旨臣曾任邊陲頗知武事􅀂使堯臣等兼莅武學毎日只講論語使知忠孝仁義之道講孫吴使知制勝禦敵之術於武臣子孫中選有智略者三二百人教習之則一二十年之間必有成効臣巳撰成武學規矩一卷進呈荆公詩曰先收先生作梁柱以次收拾桷與榱皇祐末召先生爲國子監講書專管勾太學數年進天章閣侍講猶兼學政其初人未甚信服乃使其徒之巳仕者盛晦之僑顧子敦臨吴元長孜軰分治職事又令孫莘老覺􅀃孟子中都士人稍稍從之一日升堂講易音韻髙朗指意明白衆方大服然在列者皆不喜謗議蜂起先生偃然不顧也強力不倦以卒有立迄今三十餘年猶用其規橅不廢先生在學時毎公私試罷掌儀率諸學子㑹于首善堂合雅樂歌詩乙夜乃散諸齋亦自歌詩奏琴瑟之聲徹于外吕氏家塾記吕原明侍講爲廌言頃仁皇時太學之法寛簡國子先生必求天下賢士眞可以爲人師者就其中又擇其􅀹賢者委專掌教導規矩之事胡翼之瑗初爲直講有㫖專掌一學之政文學行義一代髙之旣專學政遂推誠教育多士身率天下之士不逺萬里來就師之方是時㳺太學者端爲道藝稱弟子者中心恱而誠服之也胡亦甄别人物擇其過人逺甚人畏服者􅅄之激之以勸其志又各因其所好􅀋聚而别居之故好尚經術者好談兵戰者好文藝者好尚節義者皆使之以􅀋群居相與講習胡亦時召之使論其所學爲定其理或自岀一義使人人以對爲可否之當時政事俾之折􅂨故人皆樂從而有成今朝廷名臣徃徃胡之徒也李廌記客有話胡翼之爲國子先生日番禺有大啇遣其子來就學其子儇宕所齎千金仍病甚瘠客于逆旅若將斃焉偶其父至京師閔而不責携其子謁胡先生告其故曰是冝先警其心而後誘之以道者也乃取一帙書曰汝讀是可以先知養生之術知養生而後可以進學矣其子視其書乃黃帝素問也讀之未竟惴惴然懼伐性命之過甚悔痛自責冀可自新胡知其巳悟召而誨之曰知愛身則可以脩身自今以始其洗心向道取聖賢之書次第讀之旣通其義然後爲文則汝可以成名聖人不貴無過而貴改過無懷昔悔第勉事業其人亦頴銳善學二三年登上第而歸李廌記君在丹州建議更陳法治兵器開廢地爲營田募土人爲兵給錢使自市勁馬漸以代東兵之不任戰者雖軍校蕃酋亭鄣厮役以事見輙飲之酒訪備邊利害得以資其帥府府多武人初謂君徒能知古書耳旣觀君之所爲不以異己翕然稱之墓誌安定授監某處作院旣之官三日從容與老吏言製作利害以誠告曰器不精良由百工皆督以程課趣赴期㑹毎苟簡於事備數而巳今欲革此敝莫若使工各盡其能竭其力每事必求精緻仍不使之懈墮然後計其成而定以日力名數可也安定從其􅀃工吏欣然赴功樂事兵器堅利大非前日比矣至今爲作院法也此事􅀜注聞之􅀛山言行録侍講治家甚嚴閨門整肅􅀹謹内外之分兒婦雖父母在非節朔不許歸寧先子年弱冠常侍立左右賔至則供億茶湯并有遺訓嫁女必湏勝吾家者娶婦必湏不􅀂吾家者或問其故曰嫁勝吾家則女之事人必欽必戒婦不􅀂吾家則婦之事舅姑必執婦道曽孫滌所記
