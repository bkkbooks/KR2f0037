body:
  text: 九之七尚書余襄公公名靖字安道韶州曲江人舉進士試書判拔萃擢集賢校理坐言事落職貶監筠州酒稅慶曆中除右正言修起居注知制誥出知吉州改將作少監分司南京更授左神武大將軍辭不就知䖍州丁父憂起爲祕書監經制廣南東西路盗賊知潭州改青州召爲廣西體量安撫使移知廣州英宗即位拜工部尚書代歸道病卒年六十五公爲人質重剛勁而言語恂恂不見喜怒自少博學強記至於歷代史記雜家小􅀃隂陽律曆外曁浮屠老子之書無所不通歐陽公撰神道碑范文正以言事忤大臣貶知饒州諫官御史緘口避禍無敢言者公獨上書曰陛下親政以來三逐言事者矣􅀂習以爲常不甚重惜恐鉗天下之口不可不戒書旣上落職監筠州酒稅尹公洙歐陽公脩相繼抗䟽論列又以書讓諌官亦得罪逺謫時天下賢士大夫相與惜其去號爲四賢蘇台文撰行狀慶曆三年上增置諫官以開廣言路親筆公姓名除右正言公感激奮勵遇事輒言無所回避是年太白犯􅀊星于太微端門之右公論之曰金火罰星與􅀊相犯皆主兵䘮及饑蓋木爲德金爲刑惟金沴木五行所忌願陛下責躬修德以謝天變未幾火開寳寺塔上遣中貴人取塔基舊瘞舎利入禁中相傳以爲能岀光景自天子至于宫掖􅄂岀寳貨將復營建舉京師王公大姓莫不信嚮公論之曰天火之致夲是災變朝廷所冝誡懼以荅天意且自西陲用兵以來民苦賦役不聊其生至有父子夫婦携手赴井死者其窮至矣今復以其膏血之餘營建佛塔非所以荅天戒慰民心也昔梁武帝造長干塔亦有舎利光恠及臺城之敗何能致福於人此亦可以爲鑒矣公之論事不避忌諱大率􅀋此行狀又筆談云開寳塔災得舊􅄟舎利迎入内庭傳言頗有光恠將復建塔余襄公言彼一塔不能自衛何福可及於民凡腐草皆有光水精及珠之圎者夜亦有光烏足異也仁宗從之慶曆元年才人張氏進封脩媛四年以脩媛丗父職方貟外郎堯佐提􅀧開封府縣鎮公事右正言余靖上言堯佐不當得此差遣一堯佐不足爲輕重但鑒郭后之禍興於揚尚上曰朕不以女謁用人自有臣僚奏舉􅀂物議不允當與一郡記聞慶曆三年右正言余靖奉使契丹入辭書所奏事于笏各用一字爲目上顧見之問其所書者何靖以實對上指其字一一問之盡而後巳上之聽納不倦如此記聞慶曆四年元昊納誓請和將加封􅁽而契丹以兵臨境上遣使言爲中國討賊且告師期請止毋與和朝廷患之欲聽重絶夏人而兵不得息不聽生事北邊議未决公獨以謂中國厭兵乆矣此契丹之所幸一日使吾息兵養勇非其利也故用此以撓我爾是不可聽朝廷雖是公言猶留夏􅁽不遣而假公諫議大夫以報公從十餘􅀐馳岀居庸􅀜見虜於九十九泉從容坐帳中辯㭊徃復數十卒屈其議取其要領而還朝廷遂發夏􅁽臣元昊西師旣解嚴而北邊亦無事神道碑慶曆四年除知制誥復使契丹公前後三至虜中盡得情實坐甞爲胡語詩岀知吉州行􅃺又劉貢父詩話云余尚書使契丹能爲胡語契丹愛之及再徃虜情益親余作胡語詩虜主大喜爲之釂觴還坐貶官知䖍州丁父憂去官而蠻賊儂智髙䧟邕州連破嶺南州縣圍廣州乃即廬中起公爲袐書監知潭州即日馳在道改知桂州公奏曰賊在東而徙臣西非臣志也天子嘉之即詔公經制廣東西賊盗乃趨廣州而智髙復西走邕州自智髙初起交趾請岀兵助討賊詔不許公以謂智髙交趾叛者冝聽岀兵毋沮其善意累䟽論之不報至是公曰邕州與交趾接境今不納必忿而反助智髙乃以便冝趣交趾㑹兵又募儂黃諸姓酋豪皆縻以職與之誓約使聽節制或疑其不可用公曰使不與智髙合足矣及智髙入邕州遂無外援旣而宣撫使狄青㑹公兵敗賊於歸仁智髙走入海邕州平公請復終䘮不許諸將班師以智髙尚在請留公廣西委以後事遷給事中諌官御史列䟽言功多而賞薄再遷尚書工部侍郎公留廣西逾年撫緝完復嶺海肅然又遣人入特磨襲取智髙母及其弟一人獻于京師斬之神道碑嘉祐五年交趾冦邕州殺五巡檢驛召公以爲廣西體量安撫使悉發荆湖兵以從公至則移檄交趾召其臣費嘉祐詰責之嘉祐惶恐對曰種落犯邊罪當死願留取首惡以獻即械五人送欽州斬于界上神道碑廣之番舶裝船舊皆取稅公奏罷之以徠逺啇又請立法戒當任官吏不得市南藥及公北歸不載南海一物云行狀公資性莊重量寛而容衆有知人之鑒其帥邊也任使賢勇各盡其材甞所稱薦亦多顯逹間常接人温容遜辭不欲一忤人意及諫諍人主論列時政排斥橫議抵觸忌諱不少廻避帥二廣首尾幾十年以恩信􅀍于異域如交趾大理特磿南詔之國皆可以頥指氣使公之文武之材可謂具矣余靖夲名希古韶州人舉進士未預解薦曲江主簿王仝善遇之時知韶州者舉制科仝亦舉制科知州怒以爲玩巳捃其罪無所得唯得仝與希古接坐仝坐違勑停任希古杖臋二十仝遂閑居䖍州不復仕進希古更名靖取他州解及第景祐中爲館職爲范文正訟􅁈􅀗罪由是知名范公入叅大政引爲諫官袐書丞茹孝標䘮服未除入京師私營身計靖上言孝標冒哀求仕不孝孝標由是􅀗罪深恨靖靖遷龍圖閣直學士王仝數以書干靖求貨靖不能應其求孝標聞靖甞犯刑詐匿應舉乃自詣韶州宻求其案得之時錢子飛爲諫官方攻范黨孝標以其事語之子飛即以聞詔下䖍州問王仝靖隂使人諷仝令避去仝辭以貧不能岀靖置銀百兩於茶篚中託人餉之所託者恠其重開視􅀼銀而致茶於仝仝大怒及詔至州官勸仝對當日接坐者余希古今不知所在仝不從對稱希古即靖是也靖遂以將軍分司記聞
