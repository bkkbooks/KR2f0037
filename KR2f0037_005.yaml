body:
  text: 十之一丞相康國韓獻肅公公名絳字子華參知政事忠憲公之子也以父任為大理評事登進士甲科除太子中允通判陳州召知太常禮院歷開封府推官户部判官江南饑出為體量安撫還知制誥出知河陽召入翰林為學士權御史中丞出知蔡州移知慶州加端明殿學士知成都府英宗即位召還除三司使俄拜樞密副使神宗𥘉領制置三司條例司拜參知政事熙寧二年拜陜西河東宣撫使即軍中拜同中書門下平章事㑹慶州卒叛遂罷相守鄧州徙知大名府七年復為相出知許州拜建雄軍節度使知定州移河南府哲宗即位進封康國公加開府儀同三司判大名府屢告老拜司空檢校太尉致仕薨年七十七公為開封府推官男子冷清自謂母娠宫中生民間於是自稱皇太子都人聚觀頗以為疑吏收捕驗問亦不敢迫府官至有改容禮之者既而果無實猶止羈置近郡公上疏引成方遂事論奏甚切清遂伏誅劉貢父撰行狀江淮兩浙歲飢以公體量安撫江南東西路到部則發倉廪振貧乏問百姓疾苦縣邑以衙前為重役一當其役則破家竭産民至有嫁祖母與母而析生異居以避役者公為立則衙前法奏行之民以為便又兼并之家私占陂池溪湖少出稅以錮其利公使以稅均所近民田而陂池溪湖使衆共之行狀使還除右正言供職時大臣佐佑時政務循故事公一日奏言政事冝出聖斷上諭云屢有人言朕少斷非不欲豦分蓋緣國家動有祖宗故事苟或出令未合憲度便成過失以此須經大臣論議而行臺諌官見有未便但言來不憚追改也行狀宣祖神御溫成園陵皆寓奉先寺仁宗將幸奉先或謂因欲臨后園公預以所聞諌旦日飭駕使諭公曰朕欲酌神御非詣后園也李邦直撰神道碑召為翰林學士仁宗嘗遣使祈嗣茅山公當草祝詞公因上疏言祈嗣顧禱祠何益夫女御閉於深宫者衆宦人養子絶人之丗者多非所以順天地致螽斯之福於上也書奏仁宗即日出宫人數百詔有司裁定宦人養子令神道碑孫沔吕溱等守藩犯法從官聮章請貰其罪公曰法自貴者始更相救援則公道廢矣遂并劾之宫人或納賂請降度牒紫方𫀆歲時內宴至有與伶官私笑語者公密發其事上亟為逐典掌劉氏及它不謹者十餘人神道碑自公為中司言事甚多時富鄭公為宰相多寢不下公不能堪條前後所言極論之初張茂實母乳悼獻太子茂實幼從其母畜於宫中後壯長寖貴領親軍以掛嫌議出為外官至是鄭公復用茂實主兵公并以為言且論其畏避自私不足以答上恩塞群望因請歸家待罪不敢赴臺供職而諌官詆公中傷宰相擅去官守由是罷知蔡州行狀知成都府蜀中春秋夏米價常貴張詠尚書治蜀自二月減價糶官米八月糶鹽各給劵為據以惠貧户歲久質賣悉歸豪右公諭其自首别給劵貧民凡七千餘户因奏每三年視貧富一易之民有疾疫致醫藥客軍貧民死者葬之奏立寺額度僧主管增置學校减嗇冗費異時內臣奉使至蜀州郡迎悅其意有所貨易輒附益之其費皆出於酒場官衆以為患公奏請加禁約英宗聞之喜詔內侍省著為令每行必申飭焉行狀為三司使內諸司吏有干恩澤者詔已許之公執條例奏禀上曰朕不知條例當為卿改後有此等事亦須執奏三司事多與宫省相關近習有所干請即牾條例公未嘗詭隨公一日奏事具為上言所以且曰即有飛語願賜覆實上曰知卿盡公不肯放過事朕在藩邸時備聞群臣以國事為人情隳壞法度積弊日甚賴卿盡力我自諳曉卿勿慮也它日公又言曰國朝之制上所用財幣不欲顯名者乃用合同慿由取之內臣因循凡賜豫之類並以合同慿由施行歲常數十百萬三司無由鉤校人皆疑禁中浮費不知其間賜豫宗室及群臣者過半也請以其冝付有司者付之有司英宗嘉納自是費用之有例者悉歸三司得以㑹計矣行狀遷樞密副使因進對神宗問天下遺利公對求遺利莫若盡地力退而具疏以謂害農之大弊無甚於差役不可不改請委侍從臺省官集議及聖詔博謀以收群䇿上嘉納之𥘉公在三司時議欲使官户量出免役錢兼并之家計田頃承役唯存鄉役及弓手之外並與蠲除單丁女户在第一等者亦量納役錢其餘一切以免役錢雇召如此即不限田而官户兼并之家不敢過制以貪利中人得以置田以為生品官不必充役而無業之民得以應募矣至是上手扎取之公具録以進上令學士草詔訪問既進入上以未見哀痛惻怛之意手定詔藁密封示公令公潤色以進為大小訪焉王荆公領條例司深以公言為然遂推廣衙前之法以及它役行狀熙寧三年五月除參知政事時樞密副使闕貟㑹公獨奏事神宗問誰可𥙷者公以司馬光對遂以授光行狀熙寧二年九月夏羌大入慶州境圍七寨殺略數千邊將髙敏戰死榆林以公為陜西宣撫使賜空名宣告即軍中賞功詔許除補所部官自受命至陛辭三日而行賜金繒及織文𫀆才至邊悉分與將吏公初行環慶勞饗蕃漢士傷痍者賜帛褁瘡治兵鄜延使偏將种諤出青澗城趨銀州界破撫寧開光諸帳屯守囉兀公欲自髙奴通道河東詔兼河東宣撫使就拜同中書門下平章事昭文館大學士公遣將出麟府兵徑虜中凡九日㑹囉兀下又破賊馬户川斬馘數千獲繡旗木符領盧印公𥘉至邊裂諸路兵置七將間其無備互出搗之至是深入破敵者十七戰皆捷招降數萬人居以曠圡方築據奪其要害而慶將失撫御兵有叛亡者時內外多與公異意爭歸咎宣撫司邊事搖矣公一不辨以身任其責罷相知鄧州其後既收兵羌人亦卷廬帳驅畜産遁去客食河外餓死者衆數年終不能復而使大酋數叩保安軍求通使並塞皆空無賊火上於是知公為有功復召為相神道碑又行狀云申勑諸路為堅壁自守之計城寨有不可守者棄之分七將之兵為淺攻擾擊之計以困戎虜或云公命种諤城囉兀雪中築撫寧堡調發倉卒關中騷然公駐延州命四路帥無得預軍事皆聽於諤又命蕃官王文諒節制環慶之師自入陜西以軍中錢散與乞人又奪騎士馬以與蕃部厚犒賞之軍士皆怨夏人陷撫寧又急攻囉兀公命諸路出師牽制慶兵再出遂作亂公之入相繼王荆公之後政事有未便者賢士大夫或置不用公將更易振舉之奏古者冢宰制國用今天下財用出入宰相乃不預聞始置局中書稽考天下財用之數量入以為出援用司馬光上曰吾於光豈有所愛顧光未肯來耳又數與同列論事上前不得盡行其言乃歎曰勢不能有所禆𥙷矣唯早去位可以全進退之分故一年之間求去者三行狀三司使發市易官罪而同列佑之欲弗責方創賈人免行錢孫尚書永議有異而同列欲論永罔上故不實上書人鄭俠絞切下獄而執政馮公京嘗賙俠同列欲以黨俠為重坐公辨帝前不得直數求罷上為逐市易官稍寬二臣者而它相至欲復留故賈人劉佐任市易公固言不可論上前未决公再拜曰臣言不用辱相位請從此辭上愕曰兹小事何用耶公奏曰小事弗伸况大事乎上為罷佐遣使持手詔諭公使就位公乃起後數月固稱疾乃拜觀文殿大學士禮部尚書知許州神道碑知河南府夏大雨伊落泛溢冒城郭居民𬒳溺者太半公方以疾在告聞之力疾而出率府僚救護全濟者甚衆物價騰踴人多不得食公發倉廪以平物價收葬溺死者禁止盜賊訛言驚衆者刑黥之人以寧息修完廬舍工直十倍公為設法招來它州人四近坌集公私皆得興作而工直亦平矣又奏築長堤以虞後患幾月而成後三年伊洛復漲如前日賴堤而免㑹行保馬法令保甲家自飬馬每都馬五十匹期十五年數足提舉官欲其速成為巳功脅趣州縣要以二年期㑹既急馬價不訾民至破産不得馬公為條奏止之如𥘉令行狀𥙿陵興役洛人言昭陵厚陵時府吏中夜視事留守亦宿于外至公不改常度早晚視事外唯增日中一出而已內外畏戢莫敢妄作事皆辦集或言陵下乏水人多暍死詔置水車數百及瓢瓠竹筒數萬公知其未嘗乏水也遣使具措置水事及取修奉官司不乏水狀聞舊奉陵之物無先後之序吏緣優下公使以所須緩急第為之期揭榜示人由是人不爭競而工價平洛人曰洛中不知有裕陵者公之賜也行狀判大名府遣使問役法利害公請到鎮條析以聞既至上疏以謂𥘉論役法之弊止謂衙前一役願得納錢募人既行之農民無破家之患遂并它役以此用錢至廣雖不當役者亦不得免此議論所以多也務求􅑿餘謂之寬剩重非所冝復其舊為便以仐所取錢計年支雇募所費頗􅑿二分以備非常免除第五等减第四等數則天下速𬒳聖澤矣後司馬丞相建議一用熙寧法差役公以六條事駮之議之連年然亦多參用公所言者行狀公為人嚴重好禮其居家燕處無墮容子弟勝冠有所賀謝必具衣冠而後使拜存恤宗族逺近無遺推財豫之不計有無自仕宦未逹時巳為族人之孤特者嫁娶之凡十餘人矣行狀公兄弟友愛天至自忠憲公為兩府大臣至公兄弟同時為真相近輔者三人衣冠之盛近丗未嘗有也又皆眉壽髙年公將歸許而兩弟時亦皆七十同時請老朝廷貪惜賢德未之許也其為榮盛又前古所未有行狀公自少氣節嶷然聞其言見其貌皆知其必位將相剛正渾厚而於交親仁以盡至朝廷事不可屈撓以私據理道論是非不辨正不巳推引賢能急於家事以誠待人無所疑而知人常不誤司馬溫公方與執政忤而公言溫公可代巳為樞密副使至為宰相又薦之神宗亦可之曰卿度光來乎朕當亟召力引吳正憲公忠諒可任大事宣撫陜西首薦今左右丞相為判官吕大防范純仁常舉布衣王安國能辭章程頥有經行士大夫出其門多知名天下𥘉進士科進擢速公言偶程文占上選未見才實勞最躐衆人指期為卿輔殆亡所謂自是始議間年一貢士而殺其恩嘉祐中與陳秀公議茶法官不失常課刑辟歲省數千人又言差役病民最甚冝卑上農及官户單丁女户薄率錢募衙前吏凡不可募者存鄉户則上户免服役而游手之民得以應募有業矣英宗未果行至熙寧𥘉申講前議及溫公建言一用差法詔訪利害公曰臣𥘉議謂衙前可募其後乃并及它役所募既廣遂率錢及下户至多取羡數以今所冝第除羡數免下户錢惠澤周矣因條六事異溫公議後皆參取焉公前此於溫公踈外中援其賢及議朝廷事自守不奪所見乃如此又建言官制錯謬如近臣乃兼判中書門下省細務多關决二府恩大政祖宗方鋤天下襲唐季未及更冝早論定其後神宗改官制約用六典多如公所陳者將殁猶上書懇惻言天下事所臨六州皆生立祠聞訃有巷哭者公撫飬孤貧雖旁宗踈屬皆仰嫁娶衣食周門生故吏之不能自存者俸祿無所餘神道碑一之三丞相魯國范公公名質字文素大名宗城人後唐長興中登第仕晉為翰林學士漢初加戶部侍郎周祖起兵以為樞密副使廣順初拜中書侍郎平章事世宗不豫入受顧命輔立恭帝太祖受禪加兼侍中罷參知樞密乾德二年罷為太子太傅薨年五十四將終戒其子無得請諡立碑質自從仕未嘗釋卷人或勉之質曰昔嘗有異人與吾言他日必當大任苟如其言無學術何以處之蒙求周祖自鄴舉兵向闕京師亂范魯公隱於民間一日坐封丘巷茶肆中有人貌怪陋前揖曰相公無慮時暑中公所執扇偶書大暑去酷吏清風來故人二句其人曰世之酷吏冤獄何止如大暑也公它日當深究此弊幸無忘吾言公惘然久之後至祅廟後門見一土木短鬼其貌肖茶肆中見者公心異焉亂定周祖物色得公遂致大用公見周祖首建議律條繁廣輕重無據吏得以因緣為姦周祖特詔詳定是為刑統聞見録范質初作相與馮道同堂道意輕其新進潜視所為質初知印當判事語堂吏曰當判之事並施籖表得以視而書之慮臨文失誤貽天下㗛道聞嘆曰真識大體吾不如也質後果為名相談苑世宗在楊州怒竇儀罪在不測范質非時求見世宗意其救儀將避之質趨而前曰儀近臣以小過忤旨罪不當誅因免冠叩首泣下曰臣備位宰相不敢致人非辜當帝王之怒幸陛下寬之世宗意解遂赦儀罪蒙求范質奉行制敕未嘗破律每命刺史縣令必以戶口版籍為急蒙求周恭帝之世有右拾遺直史館鄭起上宰相范質書言太祖得衆心不冝使典禁兵質不聽及太祖入城諸將奉登明德門太祖命軍士皆釋甲還營太祖亦歸公署釋黃袍俄而將士擁質及王溥魏仁浦等皆至太祖嗚咽流涕曰吾受世宗厚恩今為六軍所逼一旦至此慙負天地將若之何質等未及對軍校羅彥瓌按劒厲聲曰我輩無主今日必得天子太祖叱之不退質頗誚讓太祖且不肯拜王溥先拜質不得巳從之且稱萬歲請詣崇元殿召百官就列周帝內出制書禪位太祖就龍墀北面再拜命宰相扶太祖登殿易服於東序還即帝位群臣相賀及太宗即位先命溥致仕蓋薄其為人也又嘗稱質之賢曰惜也但缺世宗一死耳記聞又龍川别志云周顯德末年太祖任殿前點檢功業日隆而謙下愈甚老將大校多歸心者雖宰相王溥亦隂效誠欵今南御園則溥夙所獻也惟范質忠於周室初無所附及丗宗晏駕北邊奏契丹入冦命太祖以大兵出拒之行至陳橋軍變既入城韓勍以親衛戰於闕下敗死太祖登正陽門望城中諸軍未有歸者乃脫甲詣政事堂時早朝未退而聞亂質下殿執溥手曰倉卒遣將吾儕之罪也瓜入溥手幾出血溥無語既見子今身未冷奈何如此太祖質曰先帝養太尉如太祖性仁厚流涕𬒳面然質知勢不可遏曰事已爾無太倉卒自古帝王有禪讓之禮今可行也因具陳之且曰太尉既以禮受禪則事太后當如母養少主當如子切勿負先帝舊恩太祖揮涕許諾然後率百官行禮由此太祖深敬重質仍以為相者纍年終質之丗太后少主皆無恙故太祖太宗每言賢相必以質為稱首范魯公嘉謀偉量時稱名相自以執政之地生殺慘舒所繫苟不能蚤夜兢畏悉心精慮敗事覆餗憂患畢至加之道有枉直時有夷險居其位者今古為難嘗謂同列曰人能鼻吸三斗醇醋即可為宰相矣沂公筆録舊制宰相早朝上殿命坐有軍國大事則議之從容賜茶而退自餘除拜號令刑賞廢置事無巨細並熟狀擬定進入止於禁中親批紙尾用御印可其奏謂之印畫降出奉行而巳由唐歷五代不改其制國初范質王溥魏仁浦自以前朝舊相且憚太祖英睿具劄子面取進止朝退各疏其事所得聖旨臣等同署字以志之自是奏御寖多或至旰􅉴命坐啜茶之禮尋亦廢罷今遂為定式沂公筆録公性卞急好面折人以廉介自持未嘗受四方饋遺前後所得祿賜多給孤遺閨門之中食不異品身沒之後家無餘資後太祖因講求輔相謂侍臣曰朕聞范質但有所居宅不營産真宰相也太宗亦素重質嘗對近臣稱纍朝宰弼以為循規矩惜名器持廉節無出質之右者
