body:
  text: 十一之三丞相蘇公公名頌字子容泉州同安人後徙潤州丹徒中進士第歷宿州觀察推官知江寜縣南京留守推官皇祐五年召試除館閣校勘同知太常禮院編定集賢院書籍出知潁州提點府界縣鎭公事淮南轉運使神宗即位召脩起居注擢知制誥知通進銀臺司審刑院罷歸班出知婺亳州應天府召判三班院復出杭州元豐初權知開封府降知濠州徙滄州召判尚書吏部元祐𥘉授刑部尚書遷吏部兼侍講改翰林學士承旨五年拜尚書左丞踰年拜右僕射兼中書侍郎八年罷爲觀文殿大學士岀知楊州改中太一宫使紹聖四年以太子少師致仕徽宗𥘉遷太子太保建中靖國元年薨年八十二知江寜府江寜縣事建業承李氏後版籍賦輿皆無法制每有發歛府移追擾吏係縲於道公至則曰此令職也府何與焉每因治訴旁問鄰里丁産多寡悉得其詳一日召郷老更定户籍民有自占不實者必曰汝家尚有某丁某産何不自言相顧而驚無敢隠者一縣以爲神明又爲剗革蠹弊更設條教簡而易行諸縣取以爲法它日諸令長造門領縣民拜廷下謝曰此曹獲免追逮皆公之賜也民有忿争者至誠喻以郷黨冝相親善意若以小忿而失歡心一旦緩急將何頼焉徃徃謝去或至半道思公言而歸縣以大治時監司王鼎王綽楊紘皆於部吏少許可及觀公施設則曰非吾所及也鄒侍郎撰行狀爲南京留守推官留守歐陽公一以府政委之曰子容處事精審一經閱覧則脩不復省矣杜祁公老居睢陽一見公深器之每間數日必折簡召甞曰如君眞所謂不可得而親踈者且自謂平生人罕見其用心處遂自小官以至爲侍從宰相所以施設出處先後本末悉以語公曰以子相知且知子異日必爲此官老夫非以自矜也其後公出入中外荐歴清要至爲宰輔還政退居略相似焉行狀富鄭公韓魏公爲相務推尚㢘退有德之士以勸厲風俗知公乆次儒館不干榮利屢問所欲惟力求外以便親養遂除知潁州後富公遺公書曰若吾子出處可謂眞古君子矣行狀公請以獲盗多寡立縣令殿最法以爲廵檢縣尉但能捕盗而不能使民不爲盗能使民不爲盗者縣令也且州縣物務歲課稍虧官佐有罰今良民罹剽刼之害而親民官獨不任責可乎行狀神宗自在藩邸聞公名及即位公適送伴契丹使次恩州驛夜火左右請與虜使出避州兵叩門欲入捄公不爲動閉門堅卧如常徐使守衛卒撲㓕之是夕州人譁言虜有變捄兵亦欲乗間生事至聞京師使還上問公所以處之者稱善乆之益知公可用及使淮南入辭勞問甚寵曽内翰撰墓誌公在審刑知金州張仲宣受財枉法抵死法官援前比貸死杖脊黥配海島公奏古者刑不上大夫仲宣官五品有罪得乗車今刑爲徒隷恐汚辱衣冠耳其人則無足矜也仲宣繇此得免杖黥止流海外自是命官無杖黥者墓誌又行狀云張仲宣坐枉法贓罪至死法官援李希輔例杖脊黥隷海島公奏曰希輔仲宣均爲枉法而情有輕有重上愕然曰枉法豈復有輕者公曰希輔知台州受賕數百千額外度僧仲宣則以所部金坑發檄廵檢體究無甚利士人憚興作遂以金八两求仲宣不差官比較止係違令可比恐喝條耳故枉法爲輕餘同上方勵精爲治急於人材大臣薦秀州判官李定召見擢太子中允監察御史裏行知制誥宋敏求以定驟自幕職而升朝著任執法非故事與公及李大臨相繼封還詞頭不草制詔再下公公言祖宗朝天下初定故有起孤逺而登顯要者眞宗以來雖有幽人異行亦不至超越資品今定非有積累之資明白之効一言稱旨便授御史浸漸不巳恐髙官要秩或可以𡵨路致也䟽入手詔召公對上引近詔舉臺官不拘官職髙下爲言且曰格命乆將得罪公對臣旣知其不可若因召諭遂變前言則是懷姦固位此尤陛下所當罪也退而又論舉官詔意不爲選人設文時敏求前罷公與大臨更奏復下至于七八最後特以付公固執不行迺與大臨俱罷歸班而定御史之命亦爲中寢公以守職不回絀人望益重賔客滿門日奉朝請雖風雨寒暑未甞移疾家貧檐石不充無愠色墓誌又行狀云公旣歸班執政或喻公請外官閑局公曰方以罪謫敢求自便乎又元城談録云天下以爲當然者謂之公論公論蓋非強名而乃天道也此道未甞廢頋所在如何爾如唐虞三代與吾祖宗之時公論在上君相主之賢哲聚於朝不肖沉於下海内入於陶冶一歸於正如晚周及東漢之餘上之人不能主公論所用非其人於是乎清議在下而士知所尊畏恥爲非義登其門者如龍從其死者如歸致黨錮之禍起視漢室爲何等時也頃時王安石薦李定召見陳襄彈之未行間擢太子中允監察御史裏行宋次道封還詞頭翌日辭職罷之又下次直李大臨蘇子容相繼封還更奏覆下至于七八子容與大臨俱落職奉朝請名譽赫然此乃祖宗德澤百餘年間養成風俗公論之不可屈如此與齊太史書崔抒殺其君殺三人而執筆如𥘉者何異其後攝官脩起居注章衡行之賢不肖於此可見要之公論不可一日廢然在上則治在下則亂可以卜丗也知婺州泝桐江水暴迅舟横欲覆魏國太夫人在舟中幾溺矣公哀號赴水救之舟忽自正太夫人甫出及岸舟乃覆衆以謂誠孝所感行狀祖父知亳州有豪民婦𬒳罪當杖以病未科每旬檢校未愈鄧元孚爲譙縣簿謂大人曰尊公髙明平昔以政事稱今豈可爲一豪婦人所紿公爲賢子不可不白但諭醫者如法檢校彼自不誣矣大人白之祖父曰萬事付公議何容心焉若言語輕重則人有觀望或有可悔旣而此婦死元孚大慙服曰某軰狹小豈可測公之用心也蘇氏談訓九年以吴越荐饑選知杭州一日出遇百餘人遮道泣訴曰某等以轉運司責所逋市易緍錢晝繫公庭夜禁廂院雖死無可償者公曰吾今釋汝使汝得營生事衣食之餘悉以償官期以歲月而足可乎皆曰不敢負於是縱之轉運使大怒欲奏公沮壞法令而民償責者乃先期而至遂不復言一日燕有羙堂聞將兵結集謀害官吏郡人喧傳恐懼不安公談笑自如宻喻兵官捕首領十數軰械送獄中逮夜㑹散而坐客不知也行狀充北朝生辰國信使在虜中遇冬至本朝暦先北朝一日北人問公孰是公曰暦家筭術小異遲速不同謂如亥時節氣當交則猶是今夕若踰數刻即屬子時爲明日矣或先或後各從本朝之暦可也虜人深以爲然遂各以其日爲節慶賀使還奏之上喜曰朕思之此最難處卿之所對極中事理因問虜中山川形勢人情向背公曰虜講和之日乆頗竊中國典章禮義以維持其政令上下相安未有離貳之意者昔人以謂匈奴直百年之運言其盛衰有數也上曰虜自耶律德光至今何止百年公曰漢武帝自謂髙皇帝遺朕平城之憂雖乆勤征討而匈奴終不服至宣帝呼韓單于稽首稱藩唐自中葉以後河湟䧟于吐蕃憲宗每讀正觀政要慨然有収復意至宣宗時乃以三關七州歸于有司由此觀之夷狄之叛服不常不繫中國之盛衰也上深然之行狀祖父尹開封頗嚴鞭扑以謂京師浩穰須彈壓當以柱後惠文治之非亳潁卧治之比談訓元豐𥘉白馬縣民有𬒳盗者畏賊不敢告投匿名書於縣弓手甲得之而不識字以示門子乙乙爲讀之甲以其言捕獲賊而乙爭其功吏以爲法禁匿名書而賊以此發不敢處之死而投匿名者當流爲情輕法重皆當奏蘇子容爲開封尹方廢滑州白馬爲邑上殿論賊可减死而投匿名者可免罪上曰此情雖極輕而告訐之風不可長乃杖而免之子容以謂賊不干巳者告捕而變主匿名本不足深過而先帝猶恐長告訐之風此所謂忠厚之至然熈寜元豐之間每立一法如手實禁塩牛皮之類皆立重賞以勸告訐者此當時小人所爲非先帝本意時范祖禹在坐曰當書之實録東坡集公在開封常治國子博士陳丗儒母爲群婢所殺事獄具輒爲法官所駮或謂公欲寛丗儒夫婦上以詰公且曰此人倫大惡毋縱有罪公對事在有司臣固不敢言寛亦不敢喻之使重旣而公罷開封獄移大理寺大理奏其妻母縁大臣有請于公又移御史臺自濠逮公赴對御史以言導公公曰使頌誣人死不可爲若自誣雖重得罪不避手書數百言皆自誣詞也上閱獄辭疑不直詔更劾實御史推窮乃大理丞賈種民増損囚辭以爲有請得其藁於獄吏家於是種民抵罪而公得白頋甞因人語及丗儒帷箔事公應曰然以是爲泄獄情罷郡歸班墓誌祖父知滄州陛辭上曰朕每欲用卿輙爲事奪豈非命耶然卿直道乆而自明祖父頓首謝兼語及偏親留京師未能偕行上問卿母誰氏祖父對曰故龍圗閣直學士陳從易之女上曰是天聖間侍從耶祖父對曰從易祥符中館職巳而外遷乆之因自廣州罷還不蓄南物獨載俸餘見錢過嶺仁宗皇帝聞之擢知制誥上曰其清節過於馬援矣故謝表云憫臣之數竒多難特軫淵衷勉臣以直道自明屢形天語談訓又云𥘉陳龍圖爲館職數十年不遷居䘮時士大夫有致賻者公不拒服除知廣州罷官不蓄南物獨載俸餘錢過嶺半以償贈賻者半以班宗族之貧者祖父元豐中自滄州𬒳召脩官制陛對日上曰更欲脩一書非卿不可以北虜通好八十餘年盟誓聘使禮幣儀式皆無所考據朕欲成一書但患爾來脩書者遷延歲月不肯早成然此書浩大以卿度之何時可畢祖父曰恐須一二年可矣上喜曰果然非卿不能如是之敏也及書成賜名華戎魯衛信録奏篇上上讀序引大喜曰正類序卦之文談訓文潞公甞謂祖父今之魏相也所謂好觀漢律令便冝章奏可以斷國論矣談訓公前後掌天官四選五年是時倉法行吏無所覬每選人改官京朝官使臣關陞磨勘或以功過當陞降者吏洗垢求瑕故爲稽滯公敕吏曰某官縁某事當㑹某處仍引合用條格具委無漏落狀同上自是吏不得逞每訴者至必取案牘使自省閱訴者服乃退其不服者公必徃復詰難度可行行之苟有疑則爲之奏請或廵白都堂故士大夫受賜多而不得者亦以爲無可憾行狀公兼侍讀奏言國朝典章大抵㳂襲唐舊史官所記善惡咸備乞詔史官學士采録新舊唐書中臣主所行日進數事以備聖覧遂詔經筵官遇非講讀日進漢唐故事二條公每有所進可爲規戒有𥙷時事者必述以巳意反復言之行狀公自與聞國政務在奉行故事使有司奉法遵職執事量能授任杜絶僥倖僣差之原深戒疆埸之臣邀功生事每廟堂論議援古證今出入經史所未安者必力争之毅然不可回公天資仁厚宇量閎博喜愠不形於色事親孝睦九族以慈處朋友以義㓜自偪束尤謹禮法雖燕居必正衣冠危坐家人莫見墮容平生未甞問家人有無晚際㑹所得俸賜隨即散用其自奉養至儉薄每食不過一肉始薨之日吊哭者造其寢堂見其居䖏服用無不歎愕咨嗟以爲寒素不若也自少所交皆當丗賢傑及登顯近務推挽正人吉士不問識與不識性酷嗜學晚歲彌甚自書契以來墳史所載九流百家之說至於圖緯隂陽五行律吕星官筭法山經本草訓故文字無所不通不獨見於論議文章必欲驗之實事以扶助丗教其於名理所造尤精詣所至爲政務大體深戒虚名因時乗理而實利及下莫見其迹旣去則人莫不思之在相位時避逺權勢門無雜賔其進退士大夫無纎毫私意以故人不歸恩而怨讟亦不切至焉行狀元祐中建請别製渾儀因命公提舉公旣䆳於律暦又以吏部令史韓公㢘曉筭術有巧思奏用之且授以古法爲臺三層上設渾儀中設渾象下設司辰貫以一機激水轉輪不假人力時至刻臨則司辰出告星辰躔度所次占候測驗不差晷刻晝夜晦明皆可推見前此未有也行狀至和中文潞公爲相甞請建家廟事下太常公議以爲禮大夫士有田則祭無田則薦是有圡者乃爲廟祭也有田則有爵無土與爵則子孫無以繼承宗祀是有廟者止於其躬子孫無爵祭乃廢也若叅合古今之制依約封爵之令爲之等差錫以土田然後廟制可議若猶未也即請考案唐賢寢堂祠饗儀止用燕器常食而巳行狀嘉祐中詔禮院議立故郭皇后神御殿于景靈宫公以謂勑書云向因忿欝偶失謙恭此則無可廢之事又云朕念其自歴長秋僅周一紀逮事先后祗奉寢園此則有不當廢之悔又云可追復皇后其祔廟謚冊並停此則有合祔廟及謚冊之義請祔郭皇后於后廟以成追復之義衆論未定丞相曽公問曰郭后是上元妃若祔廟則事體重矣公曰國朝三聖賀尹潘皆元妃事體正相類今止祔后廟則豈得有同異之言曾公曰議者以謂隂逼母后是恐萬嵗後配祔之意公曰若加一懷哀愍之謚則不爲逼矣曾公歎重乆之後宋公敏求謂公曰聞議郭后事引勑語此是先人宣獻爲叅政時自撰甚有微意云後有知禮者當行之蓋當時有沮此議者非公莫能見也然竟不行行狀甞議學校欲博士分經課試諸生以行藝爲升俊之路議貢舉欲先士行而後文藝去封彌謄録之法先行州縣使有司得專叅詳考察庶幾存郷舉里選之遺範又請每歲放進士量留人數以廣制科遺逸之選又謂尚書古之天臺朝廷萬事之本皆由此出仁宗朝大臣甞請移審官院歸吏部三班院歸兵部審刑院歸刑部庶稍近古制而當時議者不深惟其本苟憚興作遂不果行請先置朝臣两貟振舉綱維竢其整葺有緒然後議移審官等三院還省則南宫故事可舉而行一代典章於斯爲盛矣其後詔博士分經以三舎取士兼考行義又十餘年而官制行皆略如公言行狀甞因對神宗從容問宗子主祭承重之義公言古者貴賤不同禮諸侯大夫丗有爵禄故有大宗小宗主祭傳重之義則䘮服從而異制匹士庶人亦何預焉近代不丗爵宗廟因而不立尊卑亦無所統其長子孫與衆子孫無以異也今五服勑嫡孫爲祖父爲長子猶斬衰三年生而情禮則一死而䘮服獨異恐非先王制禮之本意也而丗俗之論乃以三年之䘮爲承重而不知爲承大宗之重也甞聞慶暦中朝廷議百僚應任子者長子與長孫差優與官餘皆降殺亦近古立宗之法也乞詔禮官博士叅議禮律合承重者酌古今収族主祭之禮立爲宗子繼祖者以異於衆子孫之法及士庶人不當同用一律使人知尊祖不違禮教行狀甞權樞宻院邊帥遣种朴入奏得諜言阿里骨巳死國人未知所立蕃官趙純忠者信謹可任願乗其未定以勁兵數千擁純忠入其國立之衆議欲如其請公獨曰不可越境而入其國使彼拒而不受得無損朝廷威重乎徐觀其變竢其定而撫輯之未晚也巳而邊奏至阿里骨故無恙行狀祖父執政時諸公奏對惟禀旨宣仁哲宗有言或無對者祖父奏事宣仁畢必再禀哲宗有宣諭必告諸公以聽聖語哲宗蓋黙識之後罷相周秩爲御史甞論元祐執政至祖父上曰蘇某知君臣之義與它人不同談訓祖父在元祐間不取諸公太紛紛常云君長誰任其咎耶談訓公前後歴典四選銓綜有條士無留滯有自辨者人人使盡其說故雖不得所欲亦心服而去其脩敕令必本大體爲侍讀多所啓迪及登丞弼論議持平務循故事避逺權寵不立黨授進退人材弗專主巳理有未當亦不苟從墓誌平生於人無纎芥仇怨在杭州日有要人以事屬公公不從後其人當言路懷忿抵巇或謂其事迹書扎具存可辨公笑曰吾豈爲是者在潁州日通判趙至忠本歸明人所至輙與守競公待之以禮具盡誠意它日至忠泣曰至忠虜人也然見義則服平生誠服者唯今韓魏公與公耳行狀王禹玉元厚之諸公甞問祖父曰公記之博以至國朝典故本末無遺日月不差用何術也祖父曰亦有一說某每以一歲中大事爲目欲記當年事則不忘矣如某年改元其年有某事某年上即位其年有某事某年立后若太子其年有某事某年命相其年有某事則記事之一法也後觀太史公書是歲孔子生是歲孔子卒是歲齊桓公㑹于葵丘是歲晉文公始覇之類恐亦此意也元曰不然至於暗記經史哩詠詩什以至士大夫家丗伐閱名諱婚姻無遺忘者又以何法乃眞強記爾談訓祖父甞言吾每聞前軰善言則終躬佩服少時聞計用章郎中爲吏以循良稱數典大郡政績尤異因徃造請求異聞乃𣢾語其可紀者曰人主不冝有所好有所好則腹心肝膽皆在人矣故好征戰則孫武白起之徒出而民殘於干戈矣好刑名則韓非張湯之徒出而民苦於刻核矣好聚歛則桑羊皇鎛之徒出而民困於掊克矣好順從則張禹胡廣之徒岀而民敝於夸大矣豈惟人主學士大夫亦冝知之夫神龍騰驤豈可覊也然或豢養於人者謂其有嗜慾也談訓祖父又甞言在江寜日楊告諌議謂吾曰甞愛韓非一言以謂土木偶人者耳鼻欲大口目欲小此言可以諭大夫圡木偶人而鼻先小目先大人或非之則無以爲也鼻大則可小目小則可大凢事皆然不厭於三思而熟慮也人皆以非爲刻薄此豈非忠厚之言哉告又自云始以中行外郎爲江東運副爲司長書押皆叩𥿄後有以前行充者書押須移上始悔𥘉之不三思也談訓舒信道元豐中自御史中丞銳於進取言事多渉刻薄爲王和甫所繩除名紹聖復通直郎知無爲軍或言其得罪深重不當叙復改監中嶽廟祖父聞之曰士大夫立朝當路一渉非義失人心則終躬遂廢如王君貺未三十爲御史丞縁進奏院事終躬轗軻不復大用䧟於刻薄可不御名哉談訓祖父言吾在金華每進讀至弭兵息民則必反復條奏援引古今使上不忘弭兵息民之意以謂人主之聦明不可有所嚮有所嚮則偏偏則爲患大矣當今守成之際應之以無心則天下無不治矣談訓祖父甞云吾平生未甞以私事干人主奏對惟義理之言故歴仕四朝中間雖謫不愧於觀過而神考以謂直乆而自明也談訓吕吉甫叅政事使其親友謂祖父曰子容吾郷里丈人行若從吾言執政可得也祖父笑而不荅談訓祖父云平生薦舉不知幾何人惟孟安序朝奉分寕人歲以雙井一斤爲餉知吾無包苴之饋也祖父甞云人生在勤勤則不匱户樞不蠧流水不腐此其理也談訓五朝名臣言行録卷第二之一丞相吕正惠公公名端字易直幽州安次人晉朝以䕃𥙷千牛備身開寳中知成都府太宗朝再爲開封判官皆坐累左遷復爲樞宻直學士拜叅知政事又擢拜戸部侍郎平章事逾年以病罷薨年六十六吕正惠公使髙麗遇風濤檣折舟人大恐公恬然讀書若在齋閤時玉壺清話太宗欲相正惠公左右或曰吕端之爲人糊塗讀爲鶻突帝曰端小事糊塗大事不糊塗决意相之吕氏家塾記保安軍奏獲李繼遷母太宗甚喜是時冦凖爲樞宻副使吕端爲宰相上獨召凖與之謀凖退自宰相幕次前過不入端使人邀至幕中曰郷者主上召君何爲凖曰議邊事耳端曰陛下戒君勿言於端乎凖曰不然端曰若邊鄙常事樞宻院之職端不敢與知若軍國大計端備位宰相不可以莫之知也凖以獲繼遷母告端曰君何以處之凖曰凖欲斬於保安軍北門之外以戒㐫逆端曰陛下以爲何如曰陛下以爲然令凖之宻院行文書耳端曰必若此非計之得者也願君少緩其事文書勿亟下端將覆奏之即召閤門吏使奏宰臣吕端請對上召入之端見具道凖言且言昔項羽得太公欲烹之漢髙祖曰願遺我一盃羮夫舉大事者固不頋其親况繼遷胡夷悖逆之人哉且陛下今日殺繼遷之母繼遷可擒乎若不然徒樹怨讎而益堅其叛心耳上曰然則柰何端曰以臣之愚謂冝置於延州使善飬視之以招徠繼遷雖不能即降終可以繫其心而母死生之命在我矣上撫髀稱善曰微卿幾誤我事即用端䇿其母後病死於延州繼遷尋亦死其子竟納𣢾請命記聞太宗大漸李太后與宣政使王繼恩忌太子英明隂與叅知政事李昌齡殿前都指揮使李繼勲知制誥胡旦謀立潞王元佐太宗崩太后使繼恩召宰相吕端端知有變鏁繼恩於閤内使人守之而入太后謂曰宫車已晏駕立嗣以長順也今將何如端曰先帝立太子正爲今日今始棄天下豈可遽違先帝之命更有異議乃迎太子立之尋以繼勲爲使相赴陳州夲鎮昌齡爲忠武行軍司馬繼恩爲右監門衛將軍均州安置胡旦除名流潯州記聞眞宗旣於大行柩前即位垂簾引見群臣宰相吕端於殿下平立不拜請卷簾升殿審視然後降堦率群臣拜呼萬歲記聞又談叢曰太宗不預吕正惠公日與太子問起居旣崩奉太子至福寧庭中而先登御榻解衣視之而降揖太子以升遂即位趙普在中書吕端爲叅政趙甞謂人曰吾甞觀吕公奏事得嘉賞未甞喜遇抑挫未甞懼亦不形言眞台輔之器也晉公談録公姿儀瓌秀有器量寛厚多恕意豁如也雖屢經擯退未甞以得䘮介懷深爲當世所服善與人交輕財好施未甞問家事其爲相持重識大體以清静簡易爲務毎奏對同列多異議公罕所建明一日内出手扎戒曰自今中書事必經吕端詳酌乃得聞奏公讓不敢當眞宗初即位毎見公肅然拱揖不以名呼甞召對便殿訪軍國大事經乆之制陳當世急務皆有條理上甚嘉納
