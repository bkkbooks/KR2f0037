front:
  text: 三朝名臣言行録卷第十一之二
  hash: sha256:797b6f3d3423906619673affe4da7c568348ada6e3859d9c02cd3f3c980e03dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_012-1a}
body:
  text: 尚書左丞王公公名存字正仲潤州丹陽人慶曆六年中進士第歷秀州嘉興主簿越州上虞令治平中入為國子直講館閣校勘知太常禮院元豐元年修起居注以右正言知制誥同修國史兼判太常寺五年遷龍圗閣直學士知開封府改兵部尚書遷户部元祐二年拜中大夫尚書右丞明年遷左丞出知蔡州徙楊州復召為吏部尚書乞出知杭州紹聖初致仕建中靖國元年薨年七十九公少有立志雖為小官修潔自重首為歐陽文忠公所知治平中吕正獻公判國子監薦為直講又用趙康靖公薦召試擢祕書省著作佐郎館閣校勘校集賢院書籍曽子開撰墓志公故為王文公所厚是時文公執政數引公論事不合即謝不往嘗召見便殿其言無所附麗纍上書陳時事因及大臣皆人所難言者神宗察公忠實無黨鄉意用之墓志公在館十年不少貶以干澤及為上所識擢益自感勵初修起居注即乞復唐正觀起居郎舍人職事執筆隨宰相入殿上韙其言故事左右史雖日侍便殿而欲奏事必稟中書俟旨公因對及之即詔左右史遇侍立許直前奏事遂著為令自公始也墓志官制行上尤御名用人公因請自熙寧以來有緣議論得罪或詿誤被斥而情實納忠非有大過者隨材召擢以備官使語合上意自是收拔者甚衆其補助將順類如此又嘗論赦令出上恩公罪異私慝而比歲議法治獄者多乞不以赦降去官原減官司謁禁本防請託而弔死問疾一切杜絶皆非便稍更其法執政見之不恱而上察其誠不以為忤也墓志公在政府遇事必爭韓維罷門下侍郎連章論救且曰去一人天下失望忠黨沮氣讒邪之人爭進矣又論杜純不當罷侍御史王覿不當罷諌官自公在兵部時太僕寺請內外馬事得專逹母隸駕部公言如此官制壞矣先帝正省臺寺監之職使相統制不可徇有司自便而隳巳成之法及執政又有建罷教畿內保甲者公復言今京師兵籍益削又廢保甲不教非為國家根本長久之計且先帝不憚艱難而為之既巳就緒無故而廢之不可時四方奏讞大辟刑部援比請貸而都省屢以無可矜恕却之公言此祖宗制也且有司援比欲生之朝廷破例欲殺之可乎又言比廢進士專經一科參以詩賦失先帝黜詞律崇經術之意河決而北幾十年水官議還故道二三大臣力佐佑之公言故道巳髙水性趣下徒費財力恐無成功纍章力爭卒輟其役公既中立自信不為詭隨一時公議翕然歸之然亦卒以是去蔡確賦詩安州吳處厚者上之以為怨訕諌官交章請行誅竄公與范丞相純仁或顯言或密疏最後留身簾前合力固爭以為不可確貶又謂不冝置之死地既而確再貶新州公與范丞相皆罷𥘉公在熙寧中論事巳為范丞相所推及偕執政趣又多合巳而俱罷天下稱之然公與人不苟相比前論不當罷教畿內保甲者乃范丞相所建也始自兵部尚書遷户部奉山陵有勞確乘間復徙公兵部而公志在體國不以怒遷士大夫益知公賢墓志復召為吏部尚書遷太中大夫公春秋寖髙志氣益壯時在廷朋黨之論稍熾公入對首言人臣朋黨誠不可長然或不察則濫及善人東漢黨錮之獄是也慶曆中或指韓琦冨弼范仲淹歐陽修為朋黨賴仁宗聖明不為所惑今日果有進此説者亦願陛下察之繇是復與任事者不合請老不許即求輔外墓志公性寬厚儀狀偉然平居恂恂不為詭激之行至有所守確不可奪議論平恕無所向背司馬溫公嘗曰並馳萬馬中能駐足者其王存乎故自束髮起家以至大耋歷事五丗而所持一心屢更變故而其守一道與人交久而益親視孤藐流落者恩意尤篤少時師事潁川陳浚浚死無子公貴求得其弟之子官之且恤其家終身其自奉甚約而喜厚賔客楊潤相去一水公守楊時援故相例得歲時過家上冡乃出賜錢五十萬賙給閭里又具牛酒會父老數百人親與酬酢皆歡醉而去鄉黨以為美談嘗悼近丗學士貴為公卿而祭祀其先但循庶人之制及歸老築居首營家廟如古法公唯一兄蚤丗事寡嫂甚謹拊其子如巳出又官其二孫退居丹陽且十年不以一毫擾人既殁鄉人哭之皆哀而四方有識之士又為朝廷惜也墓志一之七丞相張文定公公名齊賢字師亮曹州冤句人後徙洛陽太祖時舉賢良方正又獻十䇿皆報罷太平興國二年中進士第六年為江南西路轉運副使召還簽書樞密院事出知代州淳化二年拜吏部侍郎同平章事四年出知成都府咸平初復相坐冬至朝會被酒失儀免大中祥符五年以司空致仕七年薨年七十二太祖幸西都肆赦張文定公齊賢時以布衣獻䇿太祖召至便坐令面陳其事文定以手畫地條陳十䇿一下并汾二冨民三封建四敦孝五舉賢六大學七籍田八選良吏九懲姦十恤刑內四説稱旨文定堅執其六説皆善太祖怒令武士拽出及車駕還京語太宗曰我幸西都唯得一張齊賢耳我不欲爵之以官異時汝可收之使輔汝為相也至太宗初即位放進士榜決欲置於髙等而有司偶失掄選第三甲之末太宗不恱及注官有旨一榜盡與京官通判文定釋褐將作監丞通判衡州不十年果為相東軒筆録又聞見録云太祖幸西都文定公獻十䇿於馬前召至行宮賜衛士廊餐文定就大盤中以手取食帝用柱斧擊其首問所言十事文定且食且對略無懼色賜束帛遣之歸謂太宗曰吾幸西都為汝得一張齊賢宰相也張齊賢為江南轉運使吉州沿江有勾欄地錢其地為江水淪陷或官占為船場而所輸錢如故又李氏時民於江中編浮筏以居量丈尺輸稅名水場錢齊賢悉奏免之蒙求真宗時戚里有爭分財不均者更相訴訟又因入宫自理於上前更十餘斷不能服宰相張齊賢曰是非臺府所能決也臣請自治之上許之齊賢坐相府召訟者曰汝非以彼所分財少乎皆曰然即命各供狀結實乃召兩吏趣歸其家令甲家入乙舍乙家入甲舍貨財皆按堵如故分書則交易之訟者乃止明日奏狀上大恱曰朕固知非君莫能定者記聞公姿儀碩大善談方略以致君之術自負往往涉於踈闊前後治獄多所全宥喜提獎寒雋种放之召公所薦也大中祥符中嘗言玉清昭應宫繢畫祥瑞有損謙德及違奉天之意屢請罷土木之役然不事儀矩頗好治生再入相數起大獄又與冦公凖相傾奪人以此少之五朝名臣言行録卷第一
