body:
  text: 四之三尚書王懿敏公公名素字仲儀以父旦遺恩輔官召試賜同進士出身歷知濮鄂州召還知諌院擢天章閣待制淮南都轉運按察使徙知渭州坐事落職知汝州以樞密直學士權知開封府出知定州成都府復入為京尹以端明殿學士再知渭州乞換武職改澶州觀察使知成德軍復以學士知太原府以工部尚書致仕卒年六十七仁宗方留精政事思聞朝廷得失御筆親除諌官而歐陽修蔡襄余靖與公相次進用公起少年遇事感發嘗言禮部取士不詢采行實顧文辭漫漶不足以應務請郡國置學擇明師使通知經術稍近三代里選之法自景德以來較今內外無名之費數倍于前請置官三司量一歲所入其用非急者皆省去之會皇子生議欲因赦百官進官大賞賚諸軍公又言方元昊叛契丹數有所求縣官財用不足冝留金繒以佐邊費官爵以賞戰勞其議為公止仁宗御天章閣出手詔問兩府大臣所以興治革弊之方公又大疏時政姑息十餘事皆人所難言者末以非知之艱行之惟艱為戒它日曲召公等四人靣諭曰卿等皆朕所自擇數論事無所避特皆賜章服王禹玉撰墓志仁宗問王懿敏曰大僚中孰可命以相事者懿敏曰下臣其敢言帝曰姑言之懿敏曰唯宦官宫妾不知姓名者可充其選帝憮然有間曰唯富弼耳懿敏下拜曰陛下得人矣既告大庭相冨公士大夫皆舉笏相賀或密以聞帝益喜曰吾之舉賢於夢卜矣聞見後録慶曆中京師旱諌官王公素乞親行禱雨帝曰太史言月二日當雨一日欲出禱公曰臣非太史然是日必不雨帝問故公曰陛下幸其當雨以禱不誠也不誠不可動天臣故知不雨帝曰明日禱雨醴泉觀公曰醴泉之近猶外朝也豈憚暑不逺出邪帝每意動則耳赤耳巳盡赤厲聲曰當禱西太一宫公曰乞傳旨帝曰車駕出郊不預告卿不知典故公曰國𥘉以虞非常今久太平預告但百姓瞻望清光者衆耳無虞也諌官故不扈從明日特召公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑回望西太一宫上有雲氣如香煙以起少時雷電雨甚至帝却逍遙輦御平輦徹蓋還宫又明日召公對帝喜曰朕自卿得雨幸甚又曰昨即殿庭雨立百拜焚生龍腦香十七斤至中夜舉體盡濕公曰陛下事天當恭畏然隂氣足以致疾亦當御名帝曰念不雨欲自以身為犧牲何御名也聞見後録公言王德用進女口事帝𥘉詰以宫禁事何從知公不屈帝笑曰朕真宗之子卿王旦之子有丗舊豈它人比德用實進女口巳服事朕左右何如公曰臣之憂正恐在陛下左右耳帝即命宫臣賜王德用所進女口錢各三百千押出內東門訖奏帝泣下公曰陛下既不棄臣言亦何遽也帝曰朕若見其人留戀不肯去恐亦不能出矣少時宫官奏宫女已出內東門帝動容而起聞見後録公為淮南都轉運按察使時𥘉置按察諸路皆以苛為明獨公為不苛然貪吏有自投劾去者墓志權知開封府至和二年秋大雨壞蔡河水入都城密詔軍吏障朱雀門公違詔止之曰方上不豫軍民廬舍多覆壓奈何障門更以動衆耶墓志知成都府先是牙校歲輸酒坊錢以供厨傳之費前後日加豐而不知約故輸者亦加困而不能勝公為一切裁約之省其費過半鐵錢唯行於兩川歲加鑄不止故錢輕貨重啇旅不行公為罷鑄十年而物價以平利州路飢公遣發廪賑救民得無流徙詔適下而公奏至上數稱嘉之公為政在便人情蜀人録公所行為王公異斷墓志治平元年秋虜寇靜邊寨圍童家堡天子西憂以公為端明殿學士又知渭州於是畨酋故老皆歡呼越境望公之來比公馳至則虜解圍去矣公屢帥涇原馭將卒有恩無不得其歡心又善料敵情故塞下戍常少而積粟至十餘年嘗廣渭之西南城濬隍三周屬羌間以土地來獻公悉募置弓箭手其行陳出入之法身自督教之其居舊皆穿土為室寇至老幼多焚死公為築八堡使足自保所部東西兩路巡檢比分領弓箭手不得自便公曰此豈前日募民兵意耶悉使散耕田里遇有警則發之故其士氣勇悍它路莫能及原州蔣偕説宣撫使范仲淹築堡大蟲巉堡未完而為明珠滅臧伺間要擊之偕輒從間道遁歸伏庭下當以軍法論公貰令復往總管狄靑曰賊方據險設覆以待官軍偕輕而無謀往必至敗公曰偕死則君往靑計不得行偕卒能以死致其酋完所築堡而還畨官密厮哥本天水羌也嘗為賊用始州欲羈縻之因請以為十族巡檢及下公議即聲其罪械還夲族既而叛去諸將曰不重購之後必為邊患公曰吾在邊虜未嘗敢輕入彼厮哥何為也公一日燕堂上邊民悉驚走入城諸將曰使姦人亦從而入必將舉而內應不若拒之弗內公曰若拒之東去勢必搖關中當且內之固知虜不敢犯我此必有姦言動之者乃下令曰敢復有言虜至者斬有頃候騎從西來其傳果妄也諸將皆服墓志知太原府會汾河大溢公曰若壞平晉遂將灌州城乃命先具舟筏築堤以扞城一夕水果至人得無恐晉荐飢公勸大姓出粟活殍者十餘萬人墓志公少感槩有大志人不敢以貴遊子弟遇之及在朝敢言天下事數擊姦佞是時朝廷患政事因循日久二三大臣因與共謀盡更前之所為而間至於不次用人於是論者皆指以為朋黨及大臣者去人莫敢以為言公常獨言富弼韓琦范仲淹皆有重望冝復召用處之以不疑仁宗嘗命公悉上為御史諌官時所言事留觀殿中墓志𥘉王素與歐陽修數譽富弼於上前弼入相素頗有力弼既相素知開封府兾弼引已登兩府既不如志因詆毀弼又求外官遂出知定州徙知益州復還知開封府愈鬱鬱不得志厭倦繁劇府事多莽鹵不治數出遊宴素性驕侈在兩州皆以賄聞為人無志操士大夫多鄙之開封府先有散從官馬千馬清善督察盜賊纍功至班行府中賴之或謂素二馬在外威福自恣大為姦利素奏悉逐之逺方於是京師盜賊屢發求捕不獲臺官言素不才亦自乞外輔朝廷因而罷之記聞素少長席富貴豪縱浮侈畜聲妓誇客然一時當路要人多其父時所引拔素亦善自交結又其為吏知大略少時擊斷敢行皆足以發身及晚節官顯志得益頽靡在開封府弛慢意不在事英宗嘗對執政語及之云素自筮仕所至稱為能吏既升臺憲風力愈徑嘗與同列奏事上前事有不合衆皆引去公方論列是非俟得旨乃退帝曰真御史也議者目公為獨擊鶻名賢詩話四之四內翰楊文公公名億字大年建州浦城人七歲能屬文年十一太宗聞其名詔送闕下試詩賦授袐書省正字令就袐閣讀書真宗即位拜左正言與修太宗實録知處州召還知制誥召入翰林為學士同修國史會母病陽翟請歸省不待報而行貶太常少卿分司西京起知汝州會加玉皇聖號表求陪預召還參詳儀制天禧四年復為翰林學士是冬卒年四十七仁宗即位贈禮部尚書賜諡曰文楊文公年十一太宗親試一賦二詩頃刻而成上喜送中書再試執政令賦喜朝京闕詩亦立就且有願秉清忠節終身立聖朝之句宰相表賀湘山野録楊大年每欲作文則與門人賔客飲博投壷奕碁語笑喧譁而不妨締思以小方紙細書揮翰如飛文不加點每盈一幅則命門人傳録門人疲於應命頃刻之際成數千言真一代之文豪也歸田録楊文公凡為文章所用故事常令子姪諸生檢討出處每假用小片紙録之文既成則綴粘所録而蓄之時人謂之衲𬒳焉吕氏家孰記楊大年為學士時草答契丹書云鄰壤交歡進草既入真宗自注其側云朽壤鼠壤糞壤大年遽改為鄰境明旦引唐故事學士作文書有所改為不稱職當罷因亟求解職真宗語宰相曰楊億不通商量真有氣性歸田録楊文公以文章擅天下然特剛徑寡合有惡之者以事譛之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數篋以示大年云卿識朕書迹乎皆朕自起草未嘗命臣下代作也大年皇恐不知所對頓首再拜而出乃知必為人所譖矣由是佯狂奔于陽翟真宗好文初待大年眷顧無比晚年恩禮漸衰亦由此也歸田録楊文公性剛介寡合唯與李維路振刀衎劉筠數人厚善王欽若驟貴公素薄其為人欽若銜之陳彭年方以文史進亦忌公名出己右相與擠之會公母病陽翟別墅公請歸省遂不待報而行楊文公少以文進而方直自守後因母病有陽翟之行王文正公恐人害之白上遣使賜醫藥既而言事者彈劾不已卒以亞卿分司上嘗語輔臣曰聞楊億好謗時政王公曰楊億文人幼荷國恩若諧謔過當則恐有之至於謗訕臣保其不為也王公器重文公至深頗思其歸乃因中書齋宿覽文公近詩而與趙文定諸時賢繼和上知之乃諭公召文公還為袐書監久之有問公者曰楊大年何不早與舊職公曰大年向以輕去上左右人言可畏賴上終始保全之今此職欲出自清衷以全君臣之契公薨後文公方復禁署王文正公遺事楊文公為執政所忌母病謁告不俟朝旨徑歸韓城與弟倚居踰年不調公有啓謝朝中親友曰介推母子願歸綿上之田伯夷弟兄甘受首陽之餓後除知汝州而希旨言事者攻之不巳公又有啓與親友曰巳擠溝壑猶下石而未休方困蒺藜尚關弓而相射青箱雜記楊億在翰林丁謂初參政事億例賀焉語同列曰骰子選爾何多尚哉未幾辭親疾逃陽翟別墅掇遺楊文公以直道獨立時有挾邪説以進者面戲公曰君子知微知章知柔知剛公應聲答曰小人不恥不仁不畏不義家孰記楊文公天性頴悟自幼及終不離翰墨喜誨誘後進以成名者甚衆聞人有片辭可紀必為諷誦手集當丗述作數十篇重交遊性耿介坦夷敦尚名節多周給親故廪祿亦隨而盡善談吐有味然評品人物善惡太明人多怨之范文正公讃公之像曰公以命丗之才其位不充故天下知公之文而未知其道也昔王文正公居宰府僅二十年未嘗見愛惡之迹天下謂之大雅冦萊公當國真宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞密扶風馬公慷慨立朝有犯無隱天下謂之至直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣
