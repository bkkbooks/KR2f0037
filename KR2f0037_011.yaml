body:
  text: 二之二參政歐陽文忠公公名修字永叔吉州永豐人舉進士輔西京留守推官召試除館閣校勘貶峽州夷陵令復入為校勘出通判滑州慶曆𥘉擢知諌院俄同修起居注閲月拜右正言知制誥出使河東還以龍圖閣直學士為河北都轉運使左遷知制誥知滁州徙知楊州潁州復職知應天府以母憂去免喪為翰林學士知貢舉權知開封府拜禮部侍郎樞密副使未幾參知政事治平四年以勸文殿學士知亳州徙青蔡二州以太子少師致仕薨年六十六公生四歲而孤母韓國太夫人守節自誓親教公讀書家貧至以荻畫地學書公敏悟過人所覽輒能誦比成人將舉進士為一時偶儷之文已絶出倫輩翰林學士胥公時在漢陽見而竒之曰子必有名於世館之門下公從之京師兩試國子監一試禮部皆第一人遂中甲科輔西京留守推官始從尹師魯逰為古文議論當世事迭相師友與梅聖俞遊為歌詩相倡和遂以文章名冠天下留守王文康公知其賢還朝薦之蘇黃門撰神道碑又吳丞相撰行狀云公少時從里閭借書讀或抄之抄未畢而已成誦矣景祐中范文正公知開封府忠亮讜直言無回避左右不便因言公離間大臣自結朋黨乃落天章閣待制出知饒州余靖安道上疏論救以朋黨坐貶尹洙師魯上言靖與仲淹交淺臣於仲淹義兼師友當從坐貶監郢州稅歐陽修永叔貽書責司諌髙若訥不能辨其非辜若訥大怒繳奏其書降授夷陵縣令永叔復與師魯書云五六十年來此輩沉默畏御名布在世間忽見吾輩作此事下至竈間老婢亦相驚怪時蔡襄君謨為四賢一不肖詩以歌之記聞公𥘉坐論救范公遠貶三峽後元昊反范起為環慶帥辟公掌箋奏公嘆曰吾𥘉論范公事豈以為已利哉同其退不同其進可也遂辭不往行狀慶曆𥘉西師未解契丹𥘉復舊約京東西盜賊蜂起國用不給仁宗知朝臣不任事始登進范公及杜正獻公富文忠公韓忠獻公分列二府增諌貟取敢言士公首𬒳選以太常丞知諌院賜五品服未幾修起居注公每勸上延見諸公訪以政事上再出手詔使諸公條天下事又開天章閣召對賜坐給紙筆使具疏于前諸公皇恐退而上時所冝先者十數事於是有詔勸農桑興學校革磨勘任子等弊中外悚然而小人不便相與騰口謗之公知其必為害常為上分別邪正勸力行諸公之言𥘉范公之貶饒州公與尹師魯余安道皆以直范公見逐目之黨人自是朋黨之論起久而益熾公乃為朋黨論以進言君子以同道為朋小人以同利為朋人君但當退小人之偽朋用君子之真朋其言懇惻詳盡其後諸公卒以黨議不得久留於朝公性疾惡論事無所回避小人視之如仇讎而公愈奮厲不顧上獨深知其忠改右正言知制誥賜三品服仍知諌院故事知制誥必試上知公之文有旨不試與近世楊文公陳文惠公比逮公三人而已嘗因奏事論及人物上目公曰如歐陽修何處得來蓋欲大用而不果也神道碑時溫成后方有寵公言前世女寵之戒請加裁抑澧州進柿木成文有太平字公言今四海騷然未見太平之象請不宣示于外淮南漕臣獻羡餘十萬貫公請拒之以防刻剝行狀大臣有言河東芻糧不足請廢麟州徙治合河津或請廢其五寨命公往視利害公曰麟州天嶮不可廢也麟州廢則五寨不可守五寨不守則府州遂為孤壘今五寨存故虜在二三百里外若五寨廢則夾河皆虜巢穴河內州縣皆不安居矣不若分其兵駐並河清塞堡緩急不失應援而平時可省轉輸由是麟州得不廢又言欣代州岢嵐火山軍並邊民田廢不得耕號為禁地而虜常盜耕之若募民計口出丁為兵量入租粟以耕歲可得數百萬斛不然它日且盡為虜有議下太原帥臣以為不便持之久乃從凡河東賦斂過重民所不堪奏罷者十數事神道碑保州兵亂以公為龍圗閣學士河北都轉運使陛辭上靣諭無為久留計有所欲言言之公曰諌官得風聞言事外官越職而言罪也上曰第以聞勿以中外為意河北諸軍怙亂驕恣小不如意輒脅持州郡公奏乞優假將帥以鎮壓士心軍中乃定𥘉保州亂兵皆招以不死既而悉誅之脅從二千人亦分隸諸軍富公為宣撫使恐後生變與公相遇於內黃夜半屏人謀欲使諸州同日誅之公曰禍莫大於殺巳降况脅從乎既非朝命州郡有一不從為變不細富公悟乃止公奏置御河催綱司以督糧餉邊州賴之又置磁相州都作院以繕一路戎器河北方小治而二府諸公相繼以黨議罷去公慨然上書論之用事者益怒會公之外甥女張嫁公族人晟以失行繫獄言事者乘此欲并中公遂起詔獄窮治張資産上使中官監劾之卒辨其誣猶降官知滁州事神道碑口又遺事云富公之議誅亂兵也公時使河北復被命權知鎮州既力沮其議且曰修至鎮州必不從命富公不得已遂止是時小人讒言已入而富公大閲河北之兵多所升黜譛者因曰富弼擅命專權自作威福已收却河北軍情此兵不復知有朝廷矣於是京師禁軍亟亦大閲多所升擢而富公歸至國門密知鄆州向若遂擅殺二千人其禍何可測也然則公一言不獨活二千人命亦免富公於大禍也又墓志云奏造鎖栿船以絶侵盜又方條例北方利病欲大為錯置會罷不果又韓魏公別録云內官王昭明絶不類內官往年執政賈昌朝陳執中惡歐陽公欲因張氏事深治之令蘇安世鞫獄不成蘇云不如煆錬就仍乞不録問昭眀時為監勘官正色曰上令某監勘正欲盡公道爾煆鍊何等語也歐陽遂清脫至和𥘉判流內銓小人恐公且大用偽為公奏乞澄汰宦官宦官聞之果怒隂以事中公遂出公知同州而言者多謂公無罪上亦悟留刋修唐書俄入翰林為學士自滁州之貶至是十二年矣上臨御既久遍閲天下士群臣未有以大稱上意上思富公韓公之賢復召置二府時慶曆舊人惟二公與公三人皆在朝廷士大夫知上有致治之意翕然相慶神道碑公在翰林仁宗一日乘間見御閣春帖子讀而愛之問左右曰歐陽修之辭也乃悉取宫中諸帖閲之見其篇篇有意歎曰舉筆不忘規諌真侍從之臣也歐陽公在翰林日建言讖緯之書淺俗誣怪悖經妨道凡諸書及傳疏所引請一切削去之以無誤後學仁宗命國子學官取諸經正義所引讖緯之説逐旋寫録奏上時執政者不甚主之事竟不行吕氏家孰公權知貢舉是時進士為文以詭異相髙文體大壞公患之所取率以詞義近古為貴比以嶮怪知名者黜去殆盡榜出怨謗紛然久之乃服然文章自是變而復古神道碑又墓志云時舉者務為嶮怪之語號太學體公云一切黜去取其平淡造理者三年加龍圗閣學士權知開封府事所代包孝肅公以威嚴御下名震都邑公簡易循理不求赫赫之譽有以包公之政勵公者公曰凡人材性不一用其所長事無不舉強其所短勢必不逮吾亦任吾所長耳聞者稱善神道碑又行狀云公之尹京不事風采至寵貴犯禁令又求苟免者必置於法雖詔命有所不從且請加夲罪二等至今行之又遺事云韓子華謂公曰外議云餘材可以更治一開封府公嘗語人曰治民如治病彼富醫之至人家也僕馬鮮眀進退有禮為人診脈按醫書述病證口辨如傾聽之可愛然病兒服藥云無效則不如貧醫貧醫無僕馬舉止生踈為人診脈不能應對病兒服藥云疾已愈矣則便是良醫凡治人者不問吏材能否設施何如但民稱便即是良吏故公為數郡不見治迹不求聲譽以寬簡不擾為意故所至民便既去民思如楊州青州南京皆大郡公至三五日間事已十減五六一兩月後官府間如僧舍或問公為政寬簡而事不弛廢者何也曰以縱為寬以略為簡則弛廢而民受其弊也吾之所謂寬者不為苛急耳所謂簡者不為繁碎耳識者以為知言遺事又墓志云公之為政以鎮靜為夲明不及察寬不至縱吏民安之滁楊二州皆生立祠河決啇胡賈魏公留守北京欲開橫壠故道回河使東有李仲昌者欲道啇胡入六塔河詔兩省臺諌集議公故奉使河北知河決根夲以為河水重濁理無不淤淤從下起下流既淤上流必決水性避髙決必趨下以近事驗之決河非不能力塞故道非不能力復但勢不能已必決於上流耳橫壠功大難成雖成必有復決之患六塔狹小不能容受大河以全河注之濵棣德博必𬒳其患不若因水所趨增治隄防疏其下流浚之入海則河無決溢散漫之憂數十年之利也陳恭公當國主橫壠之議恭公罷去而宰相復以仲昌之言為然行之而敗河北被害者凡數千里神道碑狄武襄公為樞密使奮自軍伍多戰功軍中服其威名上不豫諸軍訛言籍籍公言武臣掌機密而得軍情不惟於國不便鮮不以為身害請出之外藩以保其終始狄公遂罷知陳州神道碑公在兵府與曽魯公考天下兵數及三路屯戍多少地里逺近更為圗籍凡邊防久闕屯戍者必加搜輔其在政府凡兵民官吏財利之要中書所當知者集為總目遇事不復求之有司時冨公久以母憂去位公與韓公同心輔政每議事心所未可必力爭韓公亦開懷不疑故嘉祐之政世多以為得神道碑又行狀云公嘗以祀假家居上遣中貴人就中書閣取總目而閲之公嘗因嘉祐水災凡再上疏請選立皇太子以固天下根夲言甚激切及在政府遂與諸公協定大議而先帝力辭宗正之命公進曰宗室不領職事忽有此除天下皆知陛下意矣然誥勑付閣門得以不受今立為皇子則詔書一出而事定矣仁宗以為然遂下詔行狀又神道碑云及宫車晏駕皇子嗣位海內泰然有盤石之固然後天下詠歌仁宗之聖與諸公之賢而向之黨議消釋無餘至於小人亦磨滅不復見矣又公奏事録云仁宗既連失褒豫鄂三王遂更無皇子自至和三年正月得疾踰時不能御殿中外憂恐既而康復自是言者常以國夲不可不急交章論𫐠每輒留中故樞密副使包公拯今翰林學士范景仁所言尤激其餘不為外人所知者不可勝數今樞密冨相與昭文韓相亦屢進説雖余亦嘗因大水言之然𥘉無采納之意如此五六年言者亦巳稍怠嘉祐六年秋余自樞庭過東府忽見內降一封乃諌官司馬光言皇子事既而知江州吕誨亦有疏論𫐠明日奏事垂拱殿二章讀畢未及有所啓仁宗遽曰朕有意多時矣但未得其人余自為校勘及在諫垣忝兩制逮此二十年每進對嘗劇從容至此始聞仁宗自稱朕既而左右顧曰宗室中孰為可韓公皇恐對曰不唯宗室不接外人臣等不知此事豈臣下敢議當出自聖擇仁宗曰宫中嘗養二子小者甚純然近不慧大者可也遂啓曰其名謂何仁宗即道今上舊名曰名某今三十歲矣余等遂力贊之議乃定余又奏曰此事至大臣等未敢施行請陛下今夕更思之臣等來日取旨明日奏事崇政殿因又啓之仁宗曰決無疑也余等奏言事當有漸容臣等啇量所除官既退遂議且判宗正時今上猶在濮王喪乃議起復來日將上仁宗大喜曰如此甚好二公與余又奏曰此事若行不可中止乞陛下斷在不疑仍乞自內中批出臣等奉行仁宗曰此事豈可令婦人知中書行可也余等喜躍稱賀六年十月也命既出今上再三辭避有旨候服闋取旨至七年二月一日服除今上堅卧稱疾前後十餘讓至七月韓公議曰宗正之命始出則外人皆知必為皇子也不若遂正其名使其知愈讓而愈進示朝廷有不可回之意庶幾肯受曽公與余皆以為然及將上今上纍讓表仁宗問如何韓公未對余即前奏曰宗室自來不領職事今外人忽見不次擢用皆知將立為皇子不若正其名命立為皇子緣誥勑降付閣門某得以堅卧不受若立為皇子只煩陛下命學士作一詔書告報天下事即定矣不由某受不受也仁宗沉思久之顧韓公曰如此莫亦好否韓公力贊之遂降詔書立為皇子仍更名某自議皇子事凡所奏請皆余與西廳趙侍郎自書其改名劄子余所書也𥘉擇日旁十字其最下一字乃今名也是仁宗親點今封在中書今上自在濮邸即有賢名及遷入內良賤不及三十口行李蕭然無異寒士有書數厨而已中外聞者相賀英宗即位之𥘉以疾未親政慈聖光獻太后臨朝公與諸公往來二宫彌縫其間卒復明辟神道碑樞密使嘗闕人公當次輔韓公曽公議將進擬不以告公公覺其意謂二公曰今天子諒隂母后垂簾而二三大臣自相位置何以示天下二公大服而止其後張康節公去位英宗復將用公公又力辭不拜公再辭重位諸公不喻其意而服其難神道碑自嘉祐以後朝廷務惜名器而進人之路稍狹公屢建言館閣育材之地材既難得而又難知則當博採而多畜之時兾一得於其間則傑然出為名臣矣餘亦不失為佳士也遂詔二府各舉五人其後召試中選者往往在清近朝廷稍收其用矣行狀孫侍郎長卿罷環慶路總管拜集賢院學士為河東都轉運使臺諌交章論列長卿守邊無狀冝加降黜中書以長卿歲滿得代無過可黜而臺諌論奏不已六月十一日進呈上厲聲曰已行之事何可改易臣修奏曰臣等不為巳行難改若朝廷果是除授不當能用臺諌之言改正足以上彰陛下從諌之聖至於臣等能不遂非而服義改過不吝聖賢所難亦是臣等好事但以長卿除授不為過當若曲從臺諌之言使彼銜冤受黜於理豈安故難行也上然之上又曰人言臺諌奪權臣修奏曰此則為陛下言者過也朝廷置臺諌官專為言事若使默然却是失職苟以言事為奪權則臺諌無職可供矣奏事録先朝僧官有闕多因權要請謁內降輔人時諌官御史纍有論列先帝深悟其事因著令僧職有闕命兩街各選一人較藝而輔至是鑒義有闕中書已下兩街選人未上而內臣陳承禮以寶相院僧慶輔為請內降令與鑒義中書執奏以為不可韓曽二公陳其事臣修亦奏曰輔一僧官當與不當至為小事何繫利害但中書事已施行而用內降衝改先朝著令則是內臣干撓朝政此事何可啓其漸又奏曰宦女近習自前世嘗患難於防制今小事若蒙聽許後有大事陛下必以害政不從是𥘉欲姑息而返成怨望不若絶之於漸此一小事陛下不以為意而從之彼必自張於外以謂為上親信朝政可回在陛下目前似一間事外邊盛勢不小矣上遽可中書所奏只令依條例選試臣修又奏曰事既不行彼必有言云萬事只由中書官家豈得自由行一事陛下試思從私請與從公議孰為得失而韓曽二公亦所陳甚多上皆嘉納也奏事録始英宗踐祚按祖宗舊典皇族尊屬之亡者皆贈官改封濮安懿王英宗所生父也中書以本朝未有故事請付有司詳處其當上謙恭御名重命過仁廟大祥下禮院兩制官同議如期詔下衆乃言王當稱伯改封大國中書以所生父稱伯疑無經據方再下三省議上遽令權罷俾有司徐求典故事久不行臺官挾憤不已遂持此斥公為主議上章歷詆必請議定及以本朝未嘗議及之事肆為誣説欲惑衆聽又相率納告身以示必去上數敦諭知不可留各以本官輔外後來者以風憲不勝為恥窺伺愈急今上即位𥘉御史蔣之竒者乃造無根之言欲以汙公中丞彭思永乘虛助之公退伏私居力請公辨上照其誣罔連詔詰問二人者辭窮皆坐貶公遂懇辭柄任遂以觀文殿學士知亳州墓志又遺事云濮議𥘉不出於公及臺諫有言公獨力辨於朝故議者指公為立議之人公不自辨唯曰今人以濮議為非使我獨當罪則韓曽二公冝有愧於我後世以濮議為是而獨稱我善則我冝愧於二公又撰濮議四卷悉記當時議論本末甚詳又於五代史記書晉出帝父敬儒周世宗父柴守禮事及李彥詢傳發明人倫父子之道尤為詳悉又蘇氏談訓云元祐中進用執政多取濮議臺諌吕微仲范堯夫傅欽之趙大觀皆是也宣仁聖意叵測然以經義人情揆之歐公之論為中理公平生不甚留意禮經嘗與祖父説濮議事自云修平生何嘗讀儀禮偶一日至子弟書院中几間有之因取讀見為人後者為其父齊衰杖期云云其言與修意合由是破諸異議自謂得之多矣又溫公曰録曰英宗之喪歐陽公於衰絰之下服紫地皂花緊絲𫀆以入臨劉庠奏乞貶責上遣使語歐陽公使易之歐陽公拜伏面謝又云歐陽公長子發娶沖卿之女郎中薛良孺歐陽之妻族也歬歲坐舉官不當被劾遷延踰南郊赦冀以脫罪歐陽避嫌上言請不以赦原良孺由是怨之揚言於衆云歐陽公有帷薄之醜朝士以濮議故多疾歐陽由是流布遂廣先是臺官既以紫𫀆事劾奏歐陽朝廷不行蔣之竒遂以此事上殿劾之仍言某月日中丞彭思永為臣言上以為無是事之竒伏地叩頭固請以其奏付密院於是永叔及沖卿皆上章自辨後數日復取其奏以入因謂執政曰言事者以閨門曖昧之事中傷大臣此風漸不可長乃命之竒思永分析皆無以對俱坐謫官仍敕榜朝堂先是之竒盛稱濮議之是以媚修由是薦為御史既而反攻修修尋亦外遷故其謝上表曰未乾薦禰之墨已關射羿之弓又龍川志云蔣之竒彈奏歐陽公英宗不聽之竒因拜伏地不起上顧左右問何故久不起之竒仰曰北所謂伏蒲矣上明日以語大臣京師傳以為笑又馬永卿曰歐陽公與韓魏公同在政府歐公長魏公一歲魏公諸事頗從之至議推尊濮安懿王同朝但攻歐公故歐公遺令託魏公作墓志蓋欲令魏公承當此事耳又奏事録云嘗因獨對奏曰近聞臺諌纍有文字彈奏臣不合專主濮王之議上荷陛下保全文字既悉留中言者於是稍息上曰參政性直不避衆怨每見奏事時或二相公有所異同便相折難其語更無回避亦聞臺諌議事往往靣折其短若似奏事時語可知人不喜也今後冝少戒此臣修對曰臣以愚拙敢不如聖訓知青州時諸縣散青苗錢公乞令民止納本錢以示不為利罷提舉管句官聽民以願請不報神道碑除宣徽南院使判太原府公辭求知蔡州且曰時多喜新竒而臣思守拙衆方興功利而臣欲循常執政知其終不附巳俄詔以本官知蔡州行狀歐陽文忠公在蔡州屢乞致仕門下生蔡承禧因間言曰公德望為朝廷倚重且未及引年豈容遽去也歐公答曰修平生名節為後生描畫盡惟有蚤退以全晚節豈可更俟驅逐乎倦遊雜録公在亳巳六請致仕比至蔡逾年復請四年以觀文殿學士太子少師致仕公年未及謝事天下益以髙公公昔守潁上樂其風土因卜居焉及歸而居室未完處之怡然不以為意神道碑公平生於物少有所好獨好收畜古文圗書集三代以來金石刻為一千卷以校正史傳百家訛謬之説為多在滁州時自號醉翁晚年自號六一居士曰吾集古録一千卷藏書一萬卷有琴一張有棊一局而常置酒一壷吾老於其間是為六一行狀公天資剛徑見義敢為襟懷洞然無有城府常以平心為難故未嘗挾私以為喜怒獎進人物樂善不倦一長之得力為稱薦故賞識之下率為聞人惟視姦邪嫉若讎敵直前奮擊不問權貴後雖隂𬒳讒逐公以道自處怡怡如也平生篤于朋友如尹師魯梅聖俞孫明復既卒其家貧甚公力經營之使皆得以自給又表其孤于朝悉録以官墓志公自云學道三十年所得者平心無怨惡爾公𥘉以范希文事得罪于吕相坐黨人逺貶三峽流落纍年比吕公罷相公始𬒳進擢及後為范公作神道碑言西事時吕公擢用希文盛稱公之賢能釋私憾而共力於國家希文子純仁大以為不然刻石則輒削去此一節云我父至死未嘗解仇公歎曰我亦得罪於吕丞相者唯其言公取信於後世也吾嘗聞范公平生自言無怨惡於一人兼其與吕公解仇書見在范集中豈有父自言無怨惡於一人而其子不使解仇於地下父子之性相逺如此信乎堯朱善惡異也公知潁州時吕公之子公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之奏疏見集中由是漸見擢用遺事陳恭公執中素不喜公其知陳州時公自潁移南京過陳拒而不見後公還朝作學士陳為首相公遂不造其門已而陳出知亳州罷使相換觀文公當草制陳自謂必不得其美辭至云杜門却掃善避權勢以逺嫌處事執心不為毀譽而更變陳大驚喜曰使與我相知深者不能道此此得我之實也手録一夲寄其門下客李中師曰吾恨不早識此人遺事公於經術務究大夲其所發明簡易明白其論詩曰察其美刺知其善惡以為勸戒所謂聖人之志者夲也因其失傳而妄自為之説者經師之末也今夫學者得其夲而通其末斯善矣得其夲而不通其末闕其所疑可也不求異於諸儒嘗曰先儒於經不能無失而所得固多矣盡其説而理有不通然後得以論正豫非好為異論也其於詩易多所發明為詩夲義所改百餘篇其餘則曰毛鄭之説是矣復何云乎行狀公嘗𬒳詔撰唐書又自撰五代史其為紀一用春秋法於唐禮樂志明前世禮樂之夲出於一而後世禮樂為空名五行志不書事應盡破漢儒災異附會之説其論著類此五代史辭約而事備及正前史之失為多行狀公於修唐書最後置局專修紀志而已列傳則宋尚書祁修也朝廷以一書出於兩手體不能一遂詔公看詳列傳令刪修為一體公雖受命退而嘆曰宋公於我為前輩且人所見多不同豈可悉如已意於是一無所易及書成奏御吏白舊制修書只列書局中官髙者一人姓名云某等奉勑撰而公官髙當書公曰宋公於列傳用功深而為日久豈可掩其名而奪其功乎於是紀志書公姓名列傳書宋姓名此例皆前未有自公為始也宋公聞而喜曰自古文人不相讓而好相凌掩此事前所未聞也遺事公修五代史記褒貶善惡其法甚精發論必以嗚呼曰此亂世之書也吾用春秋之法師其意不襲其文其論曰昔孔子作春秋因亂世而立治法余述夲紀以治法而正亂君此其志也書減舊史之半而事迹比舊史添數倍議者以謂功不下司馬遷又謂筆力馳騁相上下而無駮雜之説至於紀例精密則遷不及也亦嘗自謂我作伶官傳豈下滑稽也遣事自唐室之衰文體隨而不振陵夷至于五代氣益卑弱國𥘉柳公仲塗一時大儒以古道興起之學者卒不從景祐𥘉公與尹師魯專以古文相尚而公得之自然非學所至超然獨騖衆莫能及譬夫天地之妙造化萬物動者植者無細與大不見痕迹自極其工於是文風一變時人競為模範墓志公之於文天材有餘豐約中度雍容俯仰不大聲色而義理自勝短章大論施無不可有欲效之不詭則俗不淫則陋終不可及是以獨步當世求之古人亦不可多得神道碑鄭公嘗有遺訓戒御名用死刑韓國以語公公終身行之以謂漢法惟殺人者死今法多雜犯死罪故死罪非殺人者多所平反蓋鄭公意也神道碑張舜民遊京師求謁先逹之門是時歐陽公司馬公王荆公為學者所趣諸公之論於行義文史為多唯歐陽公多談吏事既久之不免有請大凡學者之見先生莫不以道德文章為欲聞者今先生多教人以吏事所未喻也公曰不然吾子皆時才異日臨事當自知之大底文學止於潤身政事可以及物吾昔貶官夷陵彼非人境也方壯年未厭學欲求史漢一觀公私無有也無以遣日因取架閣陳年公案反覆觀之見其枉直乖錯不可勝數以無為有以枉為直違法徇情滅親害義無所不有且以夷陵荒逺𥚹小尚如此天下固可知也當時仰天誓心曰自爾遇事不敢忽也逮今三十餘年出入中外忝塵三事以此自將今日以人望我必為翰墨致身以我自觀亮是當時一言之報也見張藝叟集公嘗誦故相王沂公之言曰恩欲歸巳怨使誰當且曰貧賤常思冨貴富貴必履危機此古人之所歎也惟不思而得既得而不患失之者其庶幾乎行狀公與其姪通理書云自南方多事以來日夕憂汝得昨日遞中書頓解憂想歐陽氏自江南歸明纍丗蒙朝廷官祿吾今又𬒳榮顯致汝等並列官品當思報效偶此多事如有差使盡心向前不得避事至於臨難死節亦是汝榮事但存心盡公神明自祐汝御名不可思避事也昨書中言欲買朱砂來吾不闕此物汝於官下冝守廉何得買官下物吾在官所除飲食外不曽買一物汝可觀此為戒也內翰蘇公題其後曰凡人勉強於外何所不至惟考之其私乃見真偽此歐陽公與其弟姪家書也東坡集蔡州妖尼于惠普妄託佛法言人禍福朝中士大夫多往問之所言時有驗於是翕然共稱為神尼公既自少力排釋氏故獨以為妖尼嘗有名公於廣坐中稱尼靈異云嘗有牽二牛過尼前者指示人曰二牛前世皆人也前者一官人後者是一醫人官人嘗失入人死罪醫藥誤殺人故皆罰為牛因各呼其前世姓名二牛皆應一坐聞之皆嘆其異公獨折之曰謂尼有靈能知牛前世尚不足信彼二牛安能自記其前世姓名又能曉人言而應乎且人為萬物之最靈其㔫者為聰明聖智皆不能自知其前世而有罪𬒳罰之牛乃能自知乎於是坐人皆屈伏遺事蘇內翰軾序公之文曰自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦固陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諌為忠長育成就至嘉祐末號稱多士歐陽子之功為多歐陽文忠公答李詡論性書性非學者之所急而聖人之所罕言或因而及焉非為性而言也文忠雖有是説然大約御名所習與所感及率之者以孟荀楊之説皆為不悖此其大略也臨岐計都官用章謂豫曰性學者之所當先聖人之所欲言吾知永叔卒貽後世之誚者其在此書矣王公塵史孟子一部書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隱羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變万化只説從心上來人能正心則事無足為者矣大學之修身齊家治國平天下其夲只是正心誠意而已心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論列是非利害文字上儘去得但於性分之內全無見處更説不行人性上不可添一物堯舜所以為萬世法亦只是率性而已所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔龜山語録一之六丞相許國吕文穆公公名蒙正字聖功河南人太平興國二年舉進士太宗始臨軒親試擢冠甲科五年拜左輔闕知制誥八年擢參知政事遂拜中書侍郎平章事淳化中罷既而復相至道元年出判河南府咸平四年復以左僕射平章事六年以病罷歸洛大中祥符四年薨年六十六淳化三年太宗謂宰相曰治國之道在乎寬猛得中寬則政令不成猛則民無所措手足有天下者可不敬之哉吕蒙正曰老子稱治大國若烹小鮮夫魚擾之則亂近日內外皆來上封求更制度者甚衆望陛下漸行清淨之化上曰朕不欲塞人言路至若愚夫之言賢者擇之亦古典也趙昌言曰今朝廷無事邊境謐寧正當力行好事之時上喜曰朕終日與卿論此事何愁天下不治苟天下親民之官皆如此留心則刑清訟息矣談苑上聞汴水輦運卒有私質市者謂侍臣曰幸門如鼠穴何可塞之但去其尤者可矣篙工楫師苟有少販鬻但無妨公不必究問冀官物之入無至損折可矣吕蒙正曰水至清則無魚人至察則無徒小人情偽在君子豈不知之若以大度兼容則萬事兼濟曹參不擾獄市者以其兼受善惡窮之則姦慝無所容故戒勿擾也聖言所發正合黃老之道事實國朝三入中書惟公與趙韓王爾未嘗以姻戚徼寵澤子從簡當奏輔舊制宰相奏子起家即授水部貟外郎加朝階公奏曰臣昔忝甲科及第釋褐止授六品京官况天下才能老於巖穴不能霑寸祿者無限今從簡始離襁褓一物不知膺此寵命恐罹隂譴止乞以臣釋褐所授官輔之固讓方允止授六品京官自爾為制湘山野録吕蒙正不喜記人過初參知政事入朝堂有朝士於簾內指之曰是小子亦參政邪蒙正佯為不聞而過之其同列怒令詰其官位姓名蒙正遽止之罷朝同列猶不能平悔不窮問蒙正曰若一知其姓名則終身不能復忘固不如母知也且不問之何損時皆服其量記聞吕文穆公以寬厚為宰相太宗尤所眷遇有一朝士家藏古鑑自言能照二百里欲因公弟獻以求知其弟伺間從容言之公笑曰吾面不過楪子大安用照二百里其弟遂不復敢言聞者歎服以謂賢於李衛公逺矣蓋寡好而不為物纍者昔賢之所難也歸田録吕公蒙正嘗問諸子曰我為相外議如何諸子云大人為相四方無事蠻夷賔服甚善但人言無能為事權多為同列所爭公曰我誠無能但有一能善用人耳此真宰相之事也公夾袋中有册子每四方人替罷謁見必問其有何人才客去隨即疏之悉分門類或有一人而數人稱之者必賢也朝廷求賢取之囊中故公為相文武百官各稱職者以此巵史吕文穆公既致政居洛真宗祀汾隂過洛文穆尚能迎謁至回鑾巳病帝為幸其宅問曰卿諸子孰可用公對曰臣諸子皆豚犬不足用有姪夷簡任頴州推官宰相才也帝記其語遂至大用文靖公也先是冨韓公之父貧甚客文穆公門下一日白公曰某兒子十許歲欲令入書院事廷評太祝公許之其子韓公也文穆見之驚曰此兒它日名位與吾相似亟令諸子同學供給甚厚文穆兩入相以司徒致仕後韓公亦兩入相以司徒致仕文穆知人之術如此聞見録公質厚寬簡有重望不結黨與遇事敢言每論政事有未允者必固稱不可太宗嘉其無隱趙韓王開國元老公晚輩驟進同在相位韓王甚推許之
