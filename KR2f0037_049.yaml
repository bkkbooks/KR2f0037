body:
  text: 九之三侍讀孫宣公公名奭字宗古愽平人以九經及第爲國子監直講諸王府侍讀判太常禮院國子監擢龍圖閣待制以父老請歸田里不許岀知宻州還糾在京刑獄岀知河陽徙兖州仁宗即位召爲翰林侍讀學士知審官院判國子監以年踰七十固請致仕拜工部尚書復知兖州以太子少傅致仕卒孫奭爲國子監直講太宗幸監詔奭講尚書說命三篇奭年少位下然音讀詳潤帝稱善因嘆曰天以良弼賚啇朕獨不得邪因以切勵輔臣賜奭緋章服記聞永興軍上言朱能得天書眞宗自拜迎入宫孫奭知河陽上䟽切諌以爲天且無言安得有書天下皆知朱能所爲惟上一人不知耳乞斬朱能以謝天下其辭有云得來唯自於朱能崇信只聞於陛下其質直如此上亦不之責頃之朱能果敗記聞眞宗將西祀龍圖閣待制孫奭上䟽切諫以爲西祀有十不可陛下不過欲效秦皇漢武刻石頌德誇曜後丗耳其辭有云昔秦多繇役而劉項起於徒中唐不恤民而黃巢因於飢歳今陛下好行幸數賦歛安知天下無劉項黃巢乎上乃自製辨疑論以解之仍遣中使尉諭焉記聞孫奭每上前說經及亂君亡國事反復申繹未嘗避諱因以規諷又掇五經切治道者爲五十篇號經典徽言上之畫無逸爲圖乞施便坐爲勸鑒之助時莊憲明肅皇后每五日一御殿與仁宗同聽政奭因言古帝王朝朝暮夕未有曠日不朝陛下冝每日御殿以覽萬機奏留中不報然上與太后雅愛重之每進見常加禮記聞孫奭累表聽致仕病甚戒其子不内婢妾曰無令我死婦人之手奭舉動方重論議有根柢不肯詭隨雷同眞宗巳封禪符瑞屢降群臣皆歌誦盛德獨奭正言諫争毅然有古風采精力於學同定論語爾雅孝經正義請以孟軻書鏤板復鄭氏所注月令於郊廟禮樂亦多所是正云記聞孫宣公以太子少保致仕居於鄆一日置宴御詩㕔仁宗甞賜詩刻石所居之㕔壁語客曰白傳有言多少朱門鏁空宅主人到了不曾歸今老夫歸矣喜動于色復頋石守道諷易離卦九三爻辭且曰樂以忘憂自得小人之志歌而鼓缶不興大耋之嗟公以醇德奥學勸講禁中二十餘年晚節勇退優㳺里中始終全德近丗少比澠水燕談宋尚書祁爲布衣時未爲人知孫宣公一見竒之遂爲知已後宋舉進士驟有時名故丗稱宣公知人公嘗語其門下客曰近謚用兩字而文臣必謚爲文皆非古也吾死得謚曰宣若戴足矣及公之卒宋方爲禮官遂謚曰宣成其志也歸田録孫宣公馮章靖公俱以鴻碩重望勸講禁中凢朝廷典禮事並二公討論之公嘗言孫八座所閱典故必以前代中正合彞法事類而陳之則政府奉行無疑馮貳卿求廣博不專以典正爲意故政府奉行煩於執奏以是二君之優劣分矣王沂公言行録
