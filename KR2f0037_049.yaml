body:
  text: 九之三侍讀孫宣公公名奭字宗古博平人以九經及第為國子監直講諸王府侍讀判太常禮院國子監擢龍圖閣待制以父老請歸田里不許出知密州還糾在京刑獄出知河陽徙兖州仁宗即位召為翰林侍讀學士知審官院判國子監以年踰七十固請致仕拜工部尚書復知兖州以太子少傅致仕卒孫奭為國子監直講太宗幸監詔奭講尚書説命三篇奭年少位下然音讀詳潤帝稱善因嘆曰天以良弼賚啇朕獨不得邪因以切勵輔臣賜奭緋章服記聞永興軍上言朱能得天書真宗自拜迎入宫孫奭知河陽上疏切諌以為天且無言安得有書天下皆知朱能所為惟上一人不知耳乞斬朱能以謝天下其辭有云得來唯自於朱能崇信只聞於陛下其質直如此上亦不之責頃之朱能果敗記聞真宗將西祀龍圖閣待制孫奭上疏切諫以為西祀有十不可陛下不過欲效秦皇漢武刻石頌德誇曜後丗耳其辭有云昔秦多繇役而劉項起於徒中唐不恤民而黃巢因於飢歲今陛下好行幸數賦斂安知天下無劉項黃巢乎上乃自製辨疑論以解之仍遣中使尉諭焉記聞孫奭每上前説經及亂君亡國事反復申繹未嘗避諱因以規諷又掇五經切治道者為五十篇號經典徽言上之畫無逸為圖乞施便坐為勸鑒之助時莊憲明肅皇后每五日一御殿與仁宗同聽政奭因言古帝王朝朝暮夕未有曠日不朝陛下冝每日御殿以覽萬機奏留中不報然上與太后雅愛重之每進見常加禮記聞孫奭纍表聽致仕病甚戒其子不內婢妾曰無令我死婦人之手奭舉動方重論議有根柢不肯詭隨雷同真宗巳封禪符瑞屢降群臣皆歌誦盛德獨奭正言諫爭毅然有古風采精力於學同定論語爾雅孝經正義請以孟軻書鏤板復鄭氏所注月令於郊廟禮樂亦多所是正云記聞孫宣公以太子少保致仕居於鄆一日置宴御詩廳仁宗嘗賜詩刻石所居之廳壁語客曰白傳有言多少朱門鎖空宅主人到了不曾歸今老夫歸矣喜動于色復顧石守道諷易離卦九三爻辭且曰樂以忘憂自得小人之志歌而鼓缶不興大耋之嗟公以醇德奧學勸講禁中二十餘年晚節勇退優遊里中始終全德近丗少比澠水燕談宋尚書祁為布衣時未為人知孫宣公一見竒之遂為知已後宋舉進士驟有時名故丗稱宣公知人公嘗語其門下客曰近諡用兩字而文臣必諡為文皆非古也吾死得諡曰宣若戴足矣及公之卒宋方為禮官遂諡曰宣成其志也歸田録孫宣公馮章靖公俱以鴻碩重望勸講禁中凡朝廷典禮事並二公討論之公嘗言孫八座所閲典故必以前代中正合彞法事類而陳之則政府奉行無疑馮二卿求廣博不專以典正為意故政府奉行煩於執奏以是二君之優劣分矣王沂公言行録
