body:
  text: 二之一丞相韓國富文忠公公名弼字彥國河南人舉茂材異等授將作監丞召試遷太子中允直集賢院出通判鄆州召為開封府推官擢知諌院為三司鹽鐵判官改右正言知制誥慶曆二年假資政殿學士尚書户部侍郎使契丹還除翰林學士不拜三年拜樞密副使自請為河北宣撫使道除資政殿學士知鄆州移青鄭蔡州河陽除宣徽南院使判并州至和二年召拜同平章事六年丁母憂英宗即位拜樞密使同平章事踰年以病求解機務以使相判河陽神宗即位封鄭國公熙寧元年移汝州入覲明年復相八月復以使相判河南府改亳州奪使相徙汝州尋請老拜司空復節度使平章事進封韓國公致仕元豐三年官制行改授開府儀同三司以至和與議建儲之功拜司徒六年薨年八十元祐𥘉詔配享神宗廟庭富韓公𥘉遊場屋穆修伯長謂之曰進士不足以盡子之才當以大科名世公果禮部試下時太師公官耀州公西歸次陜范文正公遣人追公曰有旨以大科取士可亟還公復還京師見文正辭以未嘗為此學文正曰已同諸公薦君矣久為君闢一室皆大科文字可往就館時晏元獻公為相求婚於文正文正曰公女若嫁官人仲淹不敢知必求國士無如富弼者元獻一見公大愛重之即議婚公遂以賢良方正登第聞見録郭后廢范仲淹爭之貶知睦州公上言朝廷一舉而獲二過縱不能復后冝還仲淹以來忠言蘇內翰撰神道碑寶元𥘉趙元昊反公時通判鄆州陳八事且言元昊遣使求割地邀金帛使者部從儀物如契丹而詞甚倨此必元昊腹心謀臣自請行者冝出其不意斬之都市又言夏守贇庸人平時猶不當用而況艱難之際可為樞密乎議者以為有宰相器神道碑擢知諌院康定元年日食正旦公言請罷燕徹樂雖虜使在館亦冝就賜飲食而已執政以為不可公曰萬一北虜行之為朝廷羞後使虜還者云虜中罷燕如公言仁宗深悔之𥘉宰相惡聞忠言下令禁越職言事公因論日食以為應天變莫若通下情遂除其禁神道碑元昊寇鄜延殺二萬人延帥范雍鈐轄盧守勤閉門不救中貴人黃德和引兵先走劉平石元孫戰死而雍守勤歸罪於通判都監竄之嶺南德和誣奏平降賊詔以兵圍守其家公言平自環慶引兵來援以姦臣不救故敗竟罵賊不食而死冝恤其家守勤德和皆中官怙勢誣人冀以自免冝竟其獄樞密院奏方用兵獄不可遂公言大臣附下罔上獄不可不竟時守勤養子為御藥亦奏罷之德和竟坐腰斬神道碑延州民二十人詣闕告急上召問具得諸將敗亡狀執政惡之命逺郡禁民擅赴闕者公言此非陛下意宰相惡上知四方有敗耳民有急不得訴之朝則西走元昊北走契丹矣神道碑夏守贇為陜西都總管又以宦者王守忠為都鈐轄公言用守贇已為天下笑而守忠鈐轄乃與唐中官監軍無異且守勤德和覆車之轍可復蹈乎詔罷守忠神道碑自用兵以來吏民上書者甚衆𥘉不省用公言知制誥本中書屬官可選二人置局中書考其所言可用用之宰相以付學士公言此宰相偷安欲以天下是非盡付它人又引國𥘉故事請使宰相兼領樞密院仁宗曰軍國之務當盡歸中書樞密非古官然未欲遽廢即詔中書同議樞密院事宰相辭曰恐樞密院謂臣奪其權公曰此宰相避事耳非畏奪權也會西夏首領二人來降輔借奉職羈置荆湖公言二人之降其家已族矣當厚賞以勸來者上命以所言送中書公見宰相論之宰相𥘉不知也公嘆曰此豈小事而宰相不知耶更極論之上從公言乃以宰相兼樞密使神道碑劉從願妻遂國夫人者王蒙正女也寶元中出入內廷或云得幸於上外人無不知者以此獲罪奪封罷朝謁久之復得入張公安道為諌官再以疏論列皆留中富鄭公時知制誥制下復遂國之封鄭公繳還詞頭封命遂寢唐制唯給事中得封還詔書中書舍人繳詞頭蓋自鄭公始安道見吕申公申公猶以非舊典不樂二公之不相喜凡皆此類也龍川志契丹自晉天福以來踐有幽薊北鄙之警略無寧歲凡六十有九年至景德元年舉國來寇真宗用寇凖計親征澶淵射殺其驍將順國王撻覽虜懼遂請和時諸將皆請以兵會界河上邀其歸徐以精甲躡其後殱之虜懼求哀於上遂詔諸將按兵縱虜歸虜自是通好守約不復盜邊者三十有九年及元昊叛兵久不決契丹之臣有貪而喜功者以我為怯且厭兵遂教其主設詞以動我欲得晉髙祖所與關南十縣慶曆二年聚重兵境上遣其臣蕭英劉六符來聘仁宗命宰相擇報聘者時虜情不可測群臣皆莫敢行宰相以公名聞乃以公接伴英等入境上遣中使勞之英託足疾不拜公曰吾嘗使北病卧車中聞命輒起拜今中使至而公不起見何禮也英矍然起拜公開懷與語不以夷狄待之英等遂去左右密以其主所欲得者告公且曰可從從之不可從更以一事塞之公具以聞上命御史中丞賈昌朝館伴不許割地而許增歲幣且命公報聘見虜主虜主曰南朝違約塞鴈門增塘水治城隍籍民兵此何意也群臣請舉兵而南寡人以謂不若遣使求地求而不獲舉兵未晚公曰北朝忘章聖皇帝之大德乎澶淵之役若從諸將言北兵無得脫者且北朝與中國好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣爭勸用兵者此皆其身謀非國計也虜主驚曰何謂也公曰晉髙祖欺天叛君而求助於北末帝昏亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖虜獲金帛充牣諸臣之家而壯士健馬物故太半此誰任其禍者今中國提封萬里所在精兵以百萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能公曰就使其勝所亡士馬群臣當之歟亦人主當之歟若通好不絶歲幣盡歸人主臣下所得止奉使者歲一二人耳群臣何利焉虜主大悟首肯久之公又曰塞鴈門者以備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不增城隍皆修舊民兵亦舊籍特輔其缺耳非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取關南皆異代事宋興已九十年若各欲求異代故地豈北朝之利也哉本朝皇帝之命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲以地故多殺兩朝赤子故屈巳增幣以代賦入若北朝必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神實臨之今北朝首發兵端過不在朕天地鬼神豈可欺也哉虜大感悟遂欲求婚公曰婚姻易以生隙人命修短不可知不若歲幣之堅久也本朝長公主出降齎送不過十萬緡豈若歲幣無窮之獲哉虜主曰卿且歸矣再來當擇一受之卿其遂以誓書來公歸復命再聘受書及口傳之詞于政府既行次樂壽謂其副曰吾為使者而不見國書萬一書詞與口傳者異則吾事敗矣發書視之果不同乃馳還都以晡入見宿學士院一夕易書而行聞見録云富公再使以國書與口傳之詞不同馳還奏曰政府固為此欲置臣於死臣死不足惜奈國事何仁宗召宰相吕夷簡靣問之夷簡從容袖其書曰恐是誤當令改定冨公益辨論不平仁宗問樞密使晏殊如何殊曰夷簡決不肯為此真恐誤耳冨公怒曰晏殊姦邪黨吕夷簡以欺陛下冨公晏公之壻也其忠直如此既至虜不復求婚專欲增幣曰南朝遺我書當曰獻否則曰納公爭不可虜主曰南朝既懼我矣何惜此二字若我擁兵而南得無悔乎公曰本朝皇帝兼愛南北之民不忍使蹈鋒鏑故屈巳增幣何名為懼哉若不得已而至於用兵則南北敵國當以曲直為勝負非使臣之所憂也虜主曰卿勿固執古亦有之公曰自古惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納則不可知其後頡利為太宗所擒豈復有此禮哉公聲色俱厲虜知不可奪曰吾當自遣人議之於是留所許增幣誓書復使耶律仁先及六符以其國誓書來且求為獻納公奏曰臣既以死拒之虜氣折矣可勿復許虜無能為也上從之增幣二十萬而契丹平契丹君臣至今誦其語守其約不忍敗者以其心曉然知通好用兵利害之所在也神道碑溫公日録云公力爭獻納二字及還而晏公已稱納矣𥘉公糾察在京刑獄時有用偽牒為僧者事覺乃堂吏為之開封按餘人而不及吏公白執政請以吏付獄執政指其坐曰公即居此無為近名公正色不受其言曰必得吏乃止執政滋不恱故薦公使契丹欲因事罪之歐陽修上書引顔真卿使李希烈事留公不報使還除吏部郎中樞密直學士懇辭不受始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之曰徒亂人意尋遷翰林學士公見上力辭曰增歲幣非臣夲志也特以朝廷方討元昊未暇與虜角故不敢以死爭耳神道碑富鄭公慶曆中以知制誥使北虜還仁宗嘉之一日王拱辰言於上曰富弼亦何功之有但能添金帛之數厚夷狄而弊中國耳仁宗曰不然朕所愛者土宇生民爾財物非所惜也拱辰曰財物豈不出於生民邪仁宗曰國家經費取之非一日之積歲出以賜夷狄亦未至困民若兵興調發歲出不資非若今之緩取也拱辰曰犬戎無厭好窺中國之隙且陛下只有一女萬一欲請和親則如之何仁宗憫然動色曰苟利社稷朕亦豈愛一女耶拱辰言塞且知譛之不行也遽曰臣不知陛下能屈己愛民如此真堯舜之主也灑泣再拜而出東軒筆録慶曆三年三月遂命公為樞密副使辭愈力至七月申前命公言虜既通好議者便謂無事邊備漸弛虜萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思夷狄輕侮中原之恥坐薪嘗膽不忘修政因以告納上前而罷逾月復以命公時元昊使辭上俟公綴樞密院班乃坐且使宰相章得象諭公曰此朝廷特用非以使虜故也公不得已乃受時晏殊為相范仲淹為參知政事杜衍為樞密使韓琦與公副之歐陽修余靖王素蔡襄為諌官皆天下之望魯人石介作慶曆聖德詩以美之公既以社稷為任而仁宗責成於公與仲淹數以手詔督公等條具其事又開天章閣召公等坐且給筆札使書其所欲為者遣中使二人更往督之且命仲淹主西事公主北事公遂與仲淹各上當世之務十餘條又自上河北安邊十三䇿大略以進賢退不肖止僥幸去宿弊為夲欲漸易諸路監司之不才者使澄汰所部吏於是小人始不恱矣神道碑元昊遣使以書來稱男而不臣公言契丹臣元昊而我不臣則契丹為無敵於天下不可許乃却其使卒臣之四年七月契丹來告舉兵討元昊十二月詔册元昊為夏國主使將行而止之以俟虜使公曰若虜使未至而行則事自我出既至則恩歸契丹矣從之是歲契丹受禮雲中且發兵會元昊伐呆兒族於河東為近上問公曰虜得無與元昊襲我乎公曰虜自得幽薊不復由河東入寇者以河北平易富饒而河東嶮瘠且虞我出鎮定搗燕薊之虛也今兵出無名契丹大國決不為此就使妄動當出我不意不應先言受禮雲中也元昊夲與契丹約相左右以困中國今契丹背約結好於我獨獲重幣元昊有怨言故虜築威塞州以備之呆兒屢殺威塞人虜疑元昊使之故為是役安能合而寇我哉或請調發為備公曰虜雖不來猶欲以虛聲困我若調發正墮其計臣請任之上乃止虜卒不動公謂契丹異日作難必於河朔既上十三䇿又請守一郡行其事神道碑𥘉石介聖德詩譽公等而詆夏竦竦怨之會介以書與公責以伊周之事竦遂教女奴習介書改伊周曰伊霍又偽作介為弼撰廢立詔草飛語上聞仁宗雖不信而公懼不自安因保州賊平求出宣撫河北歸及國門不得見除知鄆州自鄆移青會河朔大水民流京東擇所部豐稔者三州勸民出粟得十五萬斛益以官廪隨所在貯之得公私廬舍十餘萬間散處其人以便薪水澠水燕談云各因坊村擇寺廟及公私空屋又因山岩為窟窒以處流民官吏自前資待闕寄居者皆給其祿使即民所聚選老弱病瘠者廪之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉糗飯勞之出於至誠人人為盡力流民死者為大冢葬之謂之叢冢自為文祭之眀年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募而為兵者又萬餘人上聞之遣使勞公即拜禮部侍郎公曰救災守臣職也辭不受前此救災者皆聚民城郭中煮粥食之飢民聚為疾疫反相蹈籍死或待次數日不食得粥皆僵仆名為救之而實殺之自公立法簡便周至天下傳以為法至于今不知所活者幾千萬人矣神道碑又記聞云富公知青州州歲穰而河朔大飢飢民東流公以為從來拯飢多聚之州縣人既猥多倉廪不能供散以粥飯欺弊百端由此人多餓死死者氣熏蒸􅔂疫隨起居人亦致病斃是時方春野有青菜公出榜要路令飢民散入村落使富民不得固陂澤之利而等級出米以待之民重公令米榖大積分遣寄居間官往主其事間有健吏募流民中有曽為吏胥走隸者皆倍給其食令供簿書給納守禦之役借民倉以貯擇地為場堀溝為限與流民約三日一支出納之詳一如官府公推其法於境內吏之所在手書酒炙之饋日至人人欣戴為之盡力比麥熟人給路糧遣歸餓死者無幾作叢冢葬之其間強壯堪為禁卒者募得數千人靣刺指揮二字奏乞撥充諸軍時朝中有與公不相能者持之不報人為公憂之公連上章懇請且待罪乃得報自是天下流民處多以青州為法邵伯溫曰富公使虜功甚偉而每不自以為功至知青州活飢民四十餘萬則每自言之曰過於作中書令二十四考矣公之所以自任者世烏得而窺之哉蘇內翰奉詔撰公墓道之碑首論公使虜之功非公之心也王則據貝州反齊州禁兵欲屠城以應之或詣公告之公以齊非所部恐事泄變生時中貴人張從訓銜命至青公度從訓可使即以事付從訓使馳至郡發吏卒取之無得脫者且自劾擅遣中使罪仁宗嘉之神道碑至和二年召拜集賢相與文彥博並命宣制之日士大夫相慶於朝仁宗密覘知之謂侍臣歐陽修曰古之求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜也哉修頓首稱賀神道碑富韓公為相議欲稍由學校進士命侍從儒臣講立法制太學諸生經明行修者由右學升左學由左學升上舍歲終擇上舍中經行尤髙者比及第人命之以官既簽同列奏獨翰林歐陽永叔舍人劉原父異論曰如是則通經者未升於左學而辭賦者已在於髙科矣事卒不行吕氏家孰記至和間富公當國立一舉三十年推恩之法蓋公與河南進士假希元魏升平同埸屋相善公作相不欲私之故為天下之制至今行之聞見録仁宗弗豫大臣不得見中外憂恐文彥博與公等直入問疾內侍止之不可因以監視禳禱為名乞留宿內殿事皆關白而後行禁中肅然神道碑公之為相守格法行故事而附以公議無心於其間故百官任職天下無事以所在民力困弊賦役不均遣使分道相視裁減謂之寬恤民力又弛茶禁以通啇賈省刑獄天下便之神道碑六年丁秦國太夫人憂詔為罷春燕故事執政遇喪皆起復公以謂金革變禮不可用於平世仁宗待公而為政五遣使起之卒不從命天下稱焉神道碑又龍川志云冨鄭公韓魏公同在中書鄭公母老矣一日語及故事宰相有起復視事者魏公曰此非朝廷盛事已而鄭公居母憂朝廷屢詔起之上章三辭貼黃言臣在中書日嘗與韓琦言之決不當起魏公歎曰吾但以實言之不料以為怨自此二人稍稍有隙仁宗末年富公自相位丁太夫人憂服除英宗已即位魏公已遷左相故用富公為樞密相魏公已下皆遷官富公亦遷户部尚書公辭曰切聞制辭敘述陛下即位以臣在憂服無可稱道乃取嘉祐中臣在中書日嘗議建儲以此為效而推今日之恩嘉祐中雖嘗泛議建儲之事仁宗尚祕其請其於陛下則如在茫昧杳冥之中未見形象安得如韓琦等後來功效之深切著明也聞見録英宗即位之𥘉感疾不能視朝大臣請光獻大后垂簾權同聽政后辭之不獲乃從英宗才康復后已下手書復辟魏公奏臺諌有章疏請太后早還政后聞之遽起魏公急令儀鸞司徹簾后猶未轉御幈尚見其衣也時富韓公為樞密相怪魏公不關報徹簾事有韓魏公欲致弼於族滅之地之語歐陽公為參政首議追尊濮安懿王富公曰歐陽公讀書知禮法所以為此舉者忘仁宗纍主上欺韓公耳富公因辭執政例遷官疏言甚危三日不報見英宗面奏曰仁宗之立陛下皇太后之功也陛下未報皇太后大功先録臣之小勞非仁宗之意也方仁宗之世宗屬與陛下親相等者尚多必以陛下為子者以陛下孝德彰聞也今皇太后謂臣與胡宿吳奎等曰無夫婦人無所告至不忍聞臣實痛之豈仁宗之所望於陛下者哉以笏指御床曰非陛下有孝德孰可居此英宗俯躬曰不敢富公求去益堅遂出判河陽自此與魏公歐陽公絶後富公致政居洛每歲生日魏公不論逺近必遣使致書幣甚恭富公但答以老病無書魏公之禮終不替至薨乃已天下兩賢之魏公歐陽公之薨也富公皆不祭弔國史著富公以不預䇿立英宗與魏公絶至此祭弔不通非也聞見録英宗一日因公進除目而震怒響滿一殿擲除目榻下公慨然搢笏拾除目執之進曰前日陛下在藩邸時喜怒猶不可妄況今即天子位竊以天子亦有怒焉出九師以伐四夷否則陳斧鉞以誅大臣今日陛下之怒不為常事除目也必以臣等有大過惡可怒者何不斬臣以謝天下英宗為之霽色溫言公進説猶久之不已朝以道富公奏議序英宗𥘉臨御韓魏公為相富鄭公為樞密相一日韓公進擬數宦者䇿立有勞當遷官富公曰先帝以神器付陛下此輩何功可書韓公有愧色後韓公帥長安為范堯夫言其事曰琦便怕它富相公也邵氏後録踰年懇辭機務章二十上以使相判河陽復五上章辭使相且言真宗以前不輕以此授人仁宗即位之𥘉執政欲自為地故開此例終仁宗之世宰相樞密使罷者皆除使相至不稱職有罪者亦然天下非之今陛下𥘉即位願立法自臣始不從神道碑神宗即位以集禧觀使召赴闕公辭不至熙寧元年移判汝州且詔入覲以公足疾許肩輿至殿門令公子紹隆扶以入且命無拜坐語從容至日昊又欲以觀使留公公力辭赴郡明年二月除司空侍中昭文館大學士不拜復以為左僕射平章事公既至未見有於上前言災異皆天數非人事得失所致者公聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪説故先導上以無所畏使輔拂諌諍之臣無所復施其力此治亂之機也吾不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其決不然者神道碑群臣請上尊號及作樂上以久旱不許群臣固請作樂公又言故事有災變皆徹樂恐以同天節虜使當上壽故未斷其請臣以為此盛德事正當以示夷狄乞并罷上壽從之即日而雨公又上疏願益畏天戒逺姦佞近忠良上親答詔曰義忠言親理正文直苟非意在愛君志存王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也公既上疏謝復申戒不巳且云願陛下待群臣不以同異為喜怒不以喜怒為用捨神道碑熙寧初韓魏公罷政富公再相神宗首問邊事公曰陛下臨御未久臣愚以為首當推恩惠布德澤二十年未可道著用兵二字若干戈一興上貽聖憂下竭民力願勿首先留意邊事萬一戎狄渝盟人神共怒為應敵之計可也上問所先當如何公曰阜安宇內為先蓋是時王荆公巳有寵勸帝用兵以威四夷於是用王韶取熙河以窺靈武結髙麗以圖大遼又用章惇取湖北夔峽之蠻又用劉彞沈起窺交趾二人造戰艦於富良江上交趾偵知先浮海載兵陷廉州又破雍州殺守臣蘇緘屠其城掠生口而去又用郭逵趙禼宣撫廣南使直搗交趾逵老將與卨議論不同為交趾扼富良江兵不得進瘴死者十餘萬人元豐四年五路大進兵取靈武夏人決黃河水匱以灌吾壘兵將凍溺飢餓不戰而死者數十萬人又用吕惠卿所薦徐禧築永樂城夏人以大兵破之自禧而下死者十餘萬人報夜至帝早朝當寧慟哭宰執不敢仰視帝嘆息曰永樂之舉無一人言其不可者右丞蒲宗孟進曰臣嘗言之帝正色曰卿何嘗有言在內惟吕公著在外惟趙卨曽言用兵不是好事既又謂宰執曰自今更不用兵與卿等共饗太平然帝從此鬱鬱不樂以至大漸嗚呼痛哉聞見録時王安石參知政事議改法理財與公意不合公稱病求去章數十上上問誰可代卿公薦文彥博上默然良久曰王安石何如公亦默然八月以武寧軍節度使同平章事判河南府請改亳州公在亳州時方行青苗息錢法公以謂此法行則財聚於上人散於下且冨民不願請願請者皆貧民後不可復得故持之不行而提舉常平倉趙濟劾公以大臣格新法除左僕射判汝州公言新法臣所不曉不可以復治郡願歸洛養疾許之神道碑熙寧二年富公自亳州𬒳劾移判汝州過南京張安道留守富公來見坐久之富公徐曰人固難知也張公曰謂王安石乎亦豈難知者皇祐間方平知貢舉或薦安石有文學宜辟以考校姑從之安石者既來凡一院之事皆欲紛更之方平惡其人檄以出自此未嘗與之語也富公俯首有愧色蓋富公素喜荆公至得位亂天下方知其姦云聞見録富公熙寧中罷相鎮亳常深居養疾罕出視事幕府事須稟命者常以狀白公公批數字於紙尾莫不盡其理或事有難決幕府憂疑不能措手者相與求見公公以一二言裁處徐語它事幕府曉然率常失其所疑者退而歎伏以為不可及公早使強虜以片言折狂謀尊中國及揔大政視天下事若不足為者矧退處一郡乎澠水燕談公雖居家而朝廷有大利害知無不言交趾叛詔郭逵等討之公言海嶠嶮逺不可以責其必進願詔逵等擇利進退以全王師契丹來爭河東地界上手詔問公公言熙河諸郡皆不足守而河東地界決不可許神道碑故參知政事王堯臣子同老上言至和三年仁宗弗豫其父堯臣嘗與文彥博劉沆及公同決大䇿乞立儲嗣仁宗許之會翊日有瘳故緩其事人無復知者以其父堯臣所撰詔草上之上以問彥博彥博言與同老合上嘉公等勳績如此而終不自言下詔以公為司徒神道碑又聞見録云富公之客李偲問公曰公治平𥘉進户部尚書屢辭今進司徒一辭而拜何也公曰治平𥘉乃弼自辭官今日潞公皆遷弼豈敢堅辭妨他人也蓋潞公與荆公論政事不合出判北京七年不召自此眷禮復厚矣公性至孝恭儉好禮與人言雖幼賤必盡敬氣色穆然終身不見喜愠然以單車入不測之虜廷詰其君臣折其口而服其心無一語少屈所謂大勇者乎其好善疾惡蓋出於天資常言君子小人如冰炭決不可以同器若兼收並用則小人必勝薰蕕雜處終必為臭其為宰相及判河陽最後請老家居凡三上章皆言天子無職事惟辨君子小人而進退之此天子之職也君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結御名扇千岐萬轍必勝而後已小人復勝必遂肆毒於善良無所不為求天下不亂不可得也神道碑平生所薦甚衆尤知名者十餘人如王質與其弟素余靖張瓌石介孫復吳奎韓維陳襄王鼎張昷之杜杞陳希亮之流皆有聞於世世以為知人神道碑元豐六年富公疾病矣上書言八事大抵論君子小人為治亂之夲神宗語宰輔曰富弼有章疏來章惇曰弼所言何事帝曰言朕左右多小人惇曰可令分析孰為小人帝曰弼三朝老臣豈可令分折左丞王安禮進曰弼之言是也罷朝惇責安禮曰左丞對上之言失矣安禮曰吾輩今日曰誠如聖諭明日曰聖學非臣所及安得不謂之小人惇無以對是年五月大星殞於公所居還政堂下空中如甲馬聲公登天光臺焚香再拜知其將終也閏六月丙申薨司馬溫公范忠宣來吊哭公之子紹庭紹京泣曰先公有自封押章疏一通殆遺表也二公曰當不啓封以聞蘇內翰作公神道碑謂世莫知其所言者是也神宗聞訃震悼出祭文遣中使設祭恩禮甚厚政府方遣一奠而已聞見録富公為人溫良寬厚泛與人語若無所異同者及其臨大節正色慷慨莫之能屈智識深逺過人逺甚而事無巨細皆反復熟慮必萬全無失然後行之宰相自唐以來謂之禮絶百僚見者無長幼皆拜宰相平立少垂手扶之送客未嘗下階客坐稍久則吏從傍唱相公尊重客踧踖起退及公為相雖微官及布衣謁見皆與之抗禮引坐語從容送之及門視其上馬乃還自是群公稍效之自公始也自致仕歸西都十餘年常深居不出晚年賔客請見者亦多謝以疾所親問其故曰凡待人無貴賤賢愚禮貌當如一吾纍世居洛親舊蓋以千百數若有見有不見非均一之道若人人見之吾衰疾不能堪也士大夫亦知其心無怨也嘗欲之老子祠乘小轎過天津橋會府中徙市於橋側市人喜公之出隨而觀之至於安門市為之空其得人心也如此及違世士大夫無逺近識不識相見則以言不相見則以書更相吊唁往往垂泣其得士大夫心又如此嗚呼苟非事君盡忠愛民盡仁推惻怛至誠之心充於內而見於外能如是乎記聞劉器之云富鄭公年八十書座屏云守口如瓶防意如城朝氏客語故事宰相以使相致仕者給全俸公以司徒使相致仕居洛自三公俸一百二十千外皆不受公清心學道獨居還政堂每早作放中門鑰入聸禮家廟對夫人如賔客子孫不冠帶不見麈史云富鄭公治家嚴整子舍女僕戒不得互相往來閨門肅如也平時謝客文潞公為留守時節往來公素喜潞公昔同朝更拜其母每勸其早退云既薨公子紹廷字德先能守家法與公兩壻及諸甥皆同居公之第家之事一如公無恙時毫髮不敢變鄉里稱之建中靖國𥘉擢為河北西路提舉常平德先辭曰熙寧變法之𥘉先臣以不行青苗法得罪臣不敢為此官上益嘉之除祠部貟外郎崇寧中卒聞見録富文忠辭疾歸第以其俸劵還府府受之伊川先生曰受之者固無足議然納者亦未為得也留之而無請可矣程氏遺書富公致事家居專為佛老之學故吏吕大臨與叔奏記於公曰大臨聞之古者三公無職事惟有德者居之內則論道于朝外則主教于鄉古之大人當是任者必將以斯道覺斯民成已以成物豈以爵位進退體力盛衰為之變哉今大道未明人趨異學不入于莊則入于釋疑聖人為未盡輕禮義為不足學致人倫不眀萬物憔悴此老成大人惻隱存心之時以道自任振起壞俗在公之力冝無難矣若夫移精變氣務求長年此山谷避世之士獨善其身者之所好豈世之所以望於公者哉吕集蘇內翰軾作公神道碑銘曰五代八姓十有二君四十四年如絲之棼以人為嬉以殺為悁兵交兩河腥聞于天上帝厭之命我祖宗卑爾爐錘往銷其鋒孰謂民逺我聞其呻寧爾小忍無殘我民六聖受命維一其心敕其後人帝命是承勿劓刵人矧敢好兵百三十年諱兵與刑惟彼北戎謂帝我驕帝聞其言折其萌芽篤生萊公尺箠笞之既服既馴則擾綏之堂堂韓公與萊相望再聘于燕北方以寧景德元年始盟契丹公生是歲天命則然公之在母秦國寤驚旌旗鶴鴈降格其庭云有天赦已而生公天欲赦民公啓其衷北至燕然南至于河億萬維生公手撫摩水潦荐飢散流而東五十萬人仰哺于公公之在內自泉流瀕其在四方自葉流根百官維人百度惟正相我三宗重華協明帝謂公來隕星其堂有墳其丘公豈是藏維嶽降神今歸不留臣軾作頌以配嵩髙十之五老蘇先生先生名洵字明允眉州眉山人嘗舉進士茂材異等皆不中至和嘉祐間歐陽文忠公上其所著書二十二篇韓忠獻公復薦之召試舍人院辭疾不至遂除祕書省校書郎霸州文安縣主簿詔與陳州項城令姚闢同修太常因革禮書成方奏未報卒年五十八贈光祿寺丞職方君三子曰淡曰渙皆以文學舉進士而君少獨不喜學年巳壯猶不知書職方君縱而不問鄉閭親戚皆怪之或問其故職方君笑而不答君亦自如也年二十七始大發憤謝其素所往來少年閉戶讀書為文辭歲餘舉進士再不中又舉茂材異等不中退而歎曰此不足為吾學也悉取所為文數百篇焚之益閉戶讀書絶筆不為文辭者五六年涵畜充溢抑而不發久之慨然曰可矣由是下筆頃刻數千言其縱橫上下出入馳驟必造於深微而後止蓋其稟也厚故發之遲志也慤故得之精自來京師一時後生學者皆尊其賢學其文以為師法以其父子俱知名故號老蘇以別之歐陽撰墓志嘉祐中僕領益部得蘇君所著權書衡論因以書先之於翰林歐陽永叔一見大稱嘆目為荀卿子獻其書于朝自是名動天下士爭傳誦其文時文為一變稱為老蘇時相韓公琦聞其名而厚待之嘗與論天下事亦以為賈誼不能過也初作昭陵禮廢闕琦為大禮使事從其厚調發趣辦州縣騷然先生以書諫琦且再三至引華元不臣以責之琦為變色然顧大義為稍省其過甚者及先生沒韓亦頗自咎恨以詩哭之曰知賢不早用愧莫先於余者矣張安道撰墓表嘉祐初王安石名始盛黨友傾一時歐陽修亦善之勸先生與之遊而安石亦願交於先生先生曰吾知其人矣是不近人情者鮮不為天下患安石之母死士大夫皆吊先生獨不往作辨姦一篇先生既沒三年而安石用事其言乃信墓表辨姦略云羊叔子見王衍曰誤天下蒼生者必此人也郭汾陽見盧𣏌曰此人得志吾子孫無遺類矣自今言之其理固有可見者以吾觀之王衍之為人也容貌言語固有以欺丗而盜名者然使晉無惠帝雖衍百千何從而亂天下乎盧𣏌之姦固足以敗國然不學無文非德宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與語言私立名字以為顔淵孟軻復出而隂賊險很與人異趣是王衍盧𣏌合而為一人也其禍可勝言哉夫靣垢不忘浣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝以蓋丗之名而濟未形之惡雖有願治之主好賢之相猶當舉而用之則其為天下之患必然而無疑者非特二子之比也東坡中制科王荆公問吕申公見蘇軾制䇿否申公稱之荆公曰全類戰國文章若安石為考官必黜之故荆公後修英宗實録謂蘇明允為戰國縱橫之學云邵氏聞見後録因論蘇明允衡書權論曰觀其著書之名巳非豈有山林逸民立言垂丗乃汲汲於用兵如此所見安得不為荆公所薄曰大蘇以當時不去二虜之患則天下不可為又其審敵篇引朝錯説景帝削地之䇿曰今日夷狄之勢是亦七國之勢其意蓋欲掃蕩二虜然後致太平耳曰才以用兵為事日相搔擾何時見天下息肩時節以仁宗之丗視二虜豈不勝如戰國時然而孟子在戰國時所論全不以兵為先豈以崇虛名而受實敝乎亦必有道矣龜山語録五朝名臣言行録卷第十
