body:
  text: 八之六樞宻使魯國王武恭公公名徳用字元輔鄭州管城人父魯武康公超事太宗眞宗有勞公以父任爲官以御前忠佐爲馬軍都軍頭出爲邢洺礠相巡檢知廣信軍徙冀州召爲侍衛親軍都虞候殿前副都指揮使拜檢校太保簽書樞宻院事遷副使知院加宣徽南院使罷爲武寧軍節度使赴鎮降右千牛衛上將軍知隨州徙知曹州起爲保靜軍節度使知澶州徙定陳州入奉朝請出判相州拜平章事以太子太師致仕復以使相起判鄭州至和元年拜樞宻使封魯國公凡三嵗求去位至六七乃以爲景靈宫使五日一朝給扶者以子若孫一人明年薨年七十九至道二年遣五將討繼遷公從武康公出鐵門爲先鋒殺獲甚衆軍至烏白池諸將失期不得進公告其父曰歸師過險争必亂乃以兵前守隘令其軍曰亂行者斬由是士卒無敢先後雖武康公亦爲之按轡追兵望其軍整不敢近武康公嘆曰王氏有子矣歐陽公撰神道碑邢洺盗出入二州間歷年吏不能捕公以氊車載勇士爲婦人服盛飾誘之邯鄲道中賊黨争前邀劫遂皆就擒由是知名神道碑眞宗上僊時雖仲春而大雪苦寒莊獻太后詔賜坐甲衛士酒獨王德用令所轄不得飲后以問德用德用泣曰衛士荷先帝恩德厚矣今率土崩心安忍縱飲矧嗣君尚少未親萬機不幸一夫酗酒奮臂狂呼得不動人心耶后大歎賞自是有意大用澠水燕談先是軍中選𥙷不以公其貧亡貲雖當𥙷不可得公典禁軍親爲按籍以勞舊第進騎士請馬集於廷中混而給之吏無所容其私王禹玉撰墓誌章獻太后臨朝有詔𥙷一軍吏公曰𥙷吏軍政也敢挾詔書以干吾軍亟請罷之太后固欲與之公不奉詔乃止及太后上仙有司請衛士坐甲公以爲故事無爲太后䘮坐甲又不奉詔於是天子以公可任大事神道碑公善撫士狀貌雄偉動人雖里兒巷婦外至夷狄皆知其名氏御史中丞孔道輔等因事以爲言乃罷樞宻出鎮又貶官知隨州士皆爲之懼公舉止言色如平時惟不接賔客而已乆之道輔卒客有謂公曰此害公者也公愀然曰孔公以職言事豈害我者可惜朝廷亡一直臣於是言者終身以爲媿而士大夫服公爲有量神道碑又澠水燕談曰王武恭公狀皃魁偉而面色正黒雖匹夫下卒閭巷小兒外至遠夷君長皆知其名識與不識稱之曰黒王相公北虜常呼其名以驚小兒其爲戎狄畏服如此蘇紳孔道輔等言其宅枕乾岡貌類藝祖公奏曰宅枕乾岡朝廷所賜貌類藝祖父母所生云契丹聚兵幽涿遣使者有所求自河以北皆警乃拜公保静軍節度使知澶州契丹使者過澶州見公喜曰聞公名乆矣乃得見於此耶公爲言巳衰老中國多賢士大夫因指坐客歷陳其丗家使者竦聽神道碑公在定州契丹使人覘其軍或勸公執而戮之公曰吾軍整而和使覘者得實以歸是屈人兵以不戰也明日大閱于郊公執桴皷誓師號令簡明進退坐作肅然無聲乃下令曰具糗糧聽皷聲視吾旗所嚮契丹聞之震恐㑹復議和解徙知陳州道過京師天子遣中貴人問公欲見否謝曰備邊無功幸得蒙恩徙内地不敢見神道碑叔禮爲余言昔通判定州佐王德用是時契丹主在燕京朝廷發兵屯定州者幾六萬人皆寓居逆旅及民家闐塞城市未甞有一人敢諠呼暴横者將校相戒曰吾軰各當務歛士卒勿令擾我菩薩一旦倉中給軍粮軍士以所給米黒諠譁紛擾監官懼逃匿有四卒以黒米見德用曰汝從我當自入倉視之乃徃召專副問曰昨日我不令汝給貳分黒米八分白米乎曰然然則汝何不先給白米後給黒米此軰見所得米腐黒以爲所給盡如是故諠耳專副對曰然某之罪也德用叱從者杖專副人二十又呼四卒謂曰黒米亦公家物不給與汝曹當棄之乎汝何敢乃爾讙譁四卒相頋曰向者不知有八分白米故耳某等死罪德用又叱如此欲求决配乎指揮使百拜流汗乃捨之倉中肅然僚佐皆服其能處事記聞自寳元慶曆之間元昊叛河西兵乆無功士大夫爭進計䇿多所改作公笑曰奈何紛紛兵法不如是也使士知畏愛而怯者勇勇者不驕以吾可勝因敵而勝之爾豈多言哉其在樞宻亦嘗自請臨邊不許凢大謀議必以諮之其在外則遣中貴人詔問其言多見施用神道碑皇祐六年復爲樞宻使是嵗契丹使者來公與之射使者曰天子以公典樞宻而用冨公爲相得人矣語聞上喜賜公御弓一矢五十公善射至老不衰常侍上射辭曰幸得備位大臣舉止爲天下所視臣老矣恐不能勝弓矢上再三諭之乃手二矢再拜一發中之遂將釋復位上固勉之再發又中由是左右皆驩呼賜以襲衣金帶神道碑公爲人剛烈有大志善得士心平生論議長於兵而不學孫呉兵法遇事慷慨言亡所避在樞府時㑹契丹閱馬雲朔朝廷意其南牧議者以通好日乆不冝生此公曰戎狄虎狼也其可信哉願飭邊備常若㓂至猶恐其不及也慶曆中契丹果背約遣使欲求關南故地朝廷患之公方出帥眞定詔公㑹議二府公以謂契丹必欲内㓂不冝遣使示情此殆過貪漢餌爾公遂入奏言臣愚無狀願陛下假臣二十萬得先士卒以當匈奴臣不勝大願上不許公曰陛下即不忍勞民姑以金繒㗖之以全舊好後卒如公言上又甞遣使問公邊事公曰咸平景德中邊兵二十餘萬皆屯定武不能分㧖要害之處致虜兵軼境遽有澶淵之師又當時賜諸將陣圖人皆死守戰法緩急不相捄以至於敗誠願不以陣圖賜諸將使得應變出竒立功墓誌寳元初趙元昊欲僣稱號遣其校楊守素奉章還節因貢羊馬等朝廷欲拒弗内公曰第留所貢塞下令守素至闕徐計之或欲因守素入傳舎壓壞垣死其下公益以爲不可墓誌公天性孝友事後母盡力居家約易不事娱燕禄賜多賙施諸族與人交不苟旣合雖貧賤不遺故人爲人奸進於公公問約所遺幾何廼出金厚謝之曰故人吾不忘公恩其敢私市邪上甞賜飛白清忠二字藏于家墓誌韓忠獻公宋景文公同召試中選王徳用帶平章事例當謝二公有空踈之謙言德用曰亦曽見程文誠空踈少年更冝廣問學二公大不堪景文至曰吾屬見一老衙官是納侮也後二公俱成大名德用巳薨忠獻爲景文曰王公雖武人尚有前輩激勵成就後學之意不可忘也聞見後録五朝名臣言行録卷第八
