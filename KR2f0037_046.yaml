body:
  text: 八之六樞密使魯國王武恭公公名德用字元輔鄭州管城人父魯武康公超事太宗真宗有勞公以父任為官以御前忠佐為馬軍都軍頭出為邢洺礠相巡檢知廣信軍徙冀州召為侍衛親軍都虞候殿前副都指揮使拜檢校太保簽書樞密院事遷副使知院加宣徽南院使罷為武寧軍節度使赴鎮降右千牛衛上將軍知隨州徙知曹州起為保靜軍節度使知澶州徙定陳州入奉朝請出判相州拜平章事以太子太師致仕復以使相起判鄭州至和元年拜樞密使封魯國公凡三嵗求去位至六七乃以為景靈宫使五日一朝給扶者以子若孫一人明年薨年七十九至道二年遣五將討繼遷公從武康公出鐵門為先鋒殺獲甚衆軍至烏白池諸將失期不得進公告其父曰歸師過險爭必亂乃以兵前守隘令其軍曰亂行者斬由是士卒無敢先後雖武康公亦為之按轡追兵望其軍整不敢近武康公嘆曰王氏有子矣歐陽公撰神道碑邢洺盜出入二州間歷年吏不能捕公以氊車載勇士為婦人服盛飾誘之邯鄲道中賊黨爭前邀劫遂皆就擒由是知名神道碑真宗上仙時雖仲春而大雪苦寒莊獻太后詔賜坐甲衛士酒獨王德用令所轄不得飲后以問德用德用泣曰衛士荷先帝恩德厚矣今率土崩心安忍縱飲矧嗣君尚少未親萬機不幸一夫酗酒奮臂狂呼得不動人心耶后大歎賞自是有意大用澠水燕談先是軍中選輔不以公其貧亡資雖當輔不可得公典禁軍親為按籍以勞舊第進騎士請馬集於廷中混而給之吏無所容其私王禹玉撰墓志章獻太后臨朝有詔輔一軍吏公曰輔吏軍政也敢挾詔書以干吾軍亟請罷之太后固欲與之公不奉詔乃止及太后上仙有司請衛士坐甲公以為故事無為太后喪坐甲又不奉詔於是天子以公可任大事神道碑公善撫士狀貌雄偉動人雖里兒巷婦外至夷狄皆知其名氏御史中丞孔道輔等因事以為言乃罷樞密出鎮又貶官知隨州士皆為之懼公舉止言色如平時惟不接賔客而已久之道輔卒客有謂公曰此害公者也公愀然曰孔公以職言事豈害我者可惜朝廷亡一直臣於是言者終身以為愧而士大夫服公為有量神道碑又澠水燕談曰王武恭公狀貌魁偉而面色正黑雖匹夫下卒閭巷小兒外至遠夷君長皆知其名識與不識稱之曰黑王相公北虜常呼其名以驚小兒其為戎狄畏服如此蘇紳孔道輔等言其宅枕乾岡貌類藝祖公奏曰宅枕乾岡朝廷所賜貌類藝祖父母所生云契丹聚兵幽涿遣使者有所求自河以北皆警乃拜公保靜軍節度使知澶州契丹使者過澶州見公喜曰聞公名久矣乃得見於此耶公為言巳衰老中國多賢士大夫因指坐客歷陳其丗家使者竦聽神道碑公在定州契丹使人覘其軍或勸公執而戮之公曰吾軍整而和使覘者得實以歸是屈人兵以不戰也明日大閲于郊公執桴鼓誓師號令簡明進退坐作肅然無聲乃下令曰具糗糧聽鼓聲視吾旗所嚮契丹聞之震恐會復議和解徙知陳州道過京師天子遣中貴人問公欲見否謝曰備邊無功幸得蒙恩徙內地不敢見神道碑叔禮為余言昔通判定州佐王德用是時契丹主在燕京朝廷發兵屯定州者幾六萬人皆寓居逆旅及民家闐塞城市未嘗有一人敢喧呼暴橫者將校相戒曰吾輩各當務斂士卒勿令擾我菩薩一旦倉中給軍糧軍士以所給米黑喧譁紛擾監官懼逃匿有四卒以黑米見德用曰汝從我當自入倉視之乃往召專副問曰昨日我不令汝給二分黑米八分白米乎曰然然則汝何不先給白米後給黑米此輩見所得米腐黑以為所給盡如是故喧耳專副對曰然某之罪也德用叱從者杖專副人二十又呼四卒謂曰黑米亦公家物不給與汝曹當棄之乎汝何敢乃爾歡譁四卒相顧曰向者不知有八分白米故耳某等死罪德用又叱如此欲求決配乎指揮使百拜流汗乃捨之倉中肅然僚佐皆服其能處事記聞自寶元慶曆之間元昊叛河西兵久無功士大夫爭進計䇿多所改作公笑曰奈何紛紛兵法不如是也使士知畏愛而怯者勇勇者不驕以吾可勝因敵而勝之爾豈多言哉其在樞密亦嘗自請臨邊不許凡大謀議必以咨之其在外則遣中貴人詔問其言多見施用神道碑皇祐六年復為樞密使是嵗契丹使者來公與之射使者曰天子以公典樞密而用冨公為相得人矣語聞上喜賜公御弓一矢五十公善射至老不衰常侍上射辭曰幸得備位大臣舉止為天下所視臣老矣恐不能勝弓矢上再三諭之乃手二矢再拜一發中之遂將釋復位上固勉之再發又中由是左右皆歡呼賜以襲衣金帶神道碑公為人剛烈有大志善得士心平生論議長於兵而不學孫吳兵法遇事慷慨言亡所避在樞府時會契丹閲馬雲朔朝廷意其南牧議者以通好日久不冝生此公曰戎狄虎狼也其可信哉願飭邊備常若寇至猶恐其不及也慶曆中契丹果背約遣使欲求關南故地朝廷患之公方出帥真定詔公會議二府公以謂契丹必欲內寇不冝遣使示情此殆過貪漢餌爾公遂入奏言臣愚無狀願陛下假臣二十萬得先士卒以當胸奴臣不勝大願上不許公曰陛下即不忍勞民姑以金繒啖之以全舊好後卒如公言上又嘗遣使問公邊事公曰咸平景德中邊兵二十餘萬皆屯定武不能分扼要害之處致虜兵軼境遽有澶淵之師又當時賜諸將陳圖人皆死守戰法緩急不相救以至於敗誠願不以陳圖賜諸將使得應變出竒立功墓志寶元初趙元昊欲僣稱號遣其校楊守素奉章還節因貢羊馬等朝廷欲拒弗內公曰第留所貢塞下令守素至闕徐計之或欲因守素入傳舍壓壞垣死其下公益以為不可墓志公天性孝友事後母盡力居家約易不事娛燕祿賜多賙施諸族與人交不苟既合雖貧賤不遺故人為人姦進於公公問約所遺幾何乃出金厚謝之曰故人吾不忘公恩其敢私市邪上嘗賜飛白清忠二字藏于家墓志韓忠獻公宋景文公同召試中選王德用帶平章事例當謝二公有空踈之謙言德用曰亦曽見程文誠空踈少年更冝廣問學二公大不堪景文至曰吾屬見一老衙官是納侮也後二公俱成大名德用巳薨忠獻為景文曰王公雖武人尚有前輩激勵成就後學之意不可忘也聞見後録五朝名臣言行録卷第八
