body:
  text: 七之一諫議大夫司馬公公名康字公休文正公之子也舉明經中第授耀州富平主簿文正公奏留國子監聽讀文正公修資治通鑑奏充檢閲文字元豐八年擢祕書省正字遷校書郎丁文正公憂服除召為著作郎兼侍講除左正言以執政親嫌不就除司諫未拜命會疾亟除直集賢院提舉崇福宫而卒特贈右諫議大夫君幼端謹性至孝丁母夫人憂勺飲不入口者三日杖而後能起見者哀之文正公居洛十五年往來陜洛間士之從學於公者退與君語未嘗不有得塗之人見其容止雖不識皆知其司馬公之子也公薨執喪如夫人哀毀有加焉治喪皆用禮經家法不為丗俗事得遺恩悉以豫族人以𬞞食地卧得腹疾親戚勉以肉食終不肯及免喪毀瘠羸然治療不愈而卒范太史撰墓志𥘉文正公在相位與吕正獻公及同列共議稍修官制以就簡便令門下中書二省通職事草具未上而薨君上其遺藁降付三省而朝廷未遑有所行也墓志君為講官嘗上疏歷陳前丗治少而亂多祖宗創業之艱難積纍之勤勞以勸上及時嚮學守天下大器又勸太皇太后每於禁中訓導其言切至又言孟子為書最醇正陳王道尤明白所冝觀覽上曰方讀孟子尋詔講筵官編修孟子節解為十四卷以進君巳病矣猶自力解孟子二卷會除諫職未受條具諸所當言以待曰得一對極言而死無所恨矣疾病召醫于兖鄉民聞之詣醫告曰百姓受司馬公恩深今其子病願速往來告者日夕不絶醫遂行至則疾不可為矣沒語妻子以不報國恩為恨二聖嗟悼不巳所以優恤贈􅉠之甚厚墓志君篤行內外淳備必欲如古人燕居如對大賔動靜有矩法望之色莊氣和而言厲嚴於祭祀為人潔廉未嘗言財其事君務責難非堯舜仁義之道不陳於上前待族人委曲周旋唯恐不得其所欲與朋友忠信久而益親墓志三朝名臣言行録卷第七五朝名臣言行録卷第七之一丞相祁國杜正獻公公名衍字丗昌越州山隂人擢進士甲科補楊州觀察推官歷知縣通判知州提點刑獄轉運使召為三司戶部副使除天章閣待制河北都轉運使入為樞密直學士出知天雄軍仁宗召為御史中丞判流內銓審官院出知永興軍徙并州寶元二年復知永興軍召還權知開封府拜同知樞密院事改副使宣撫河東拜樞密使尋以吏部侍郎同中書門下平章事兼樞密使出知兖州慶曆七年年七十正旦日上表還印綬乃以太子少師致仕皇祐中進太子太師薨年八十公父早卒遺腹生公其祖愛之幼時祖父脫帽使公執之會山水暴至家人散走其姑投一竿與之使挾以自泛公一手執帽漂流久之救得免而帽竟不濡前母有二子不孝悌其母改適河陽錢氏祖父卒公年十五六二兄遇之無狀至引劒斫之傷腦出血數升其姑匿之僅而得免乃詣河陽歸其母繼父不之容往來孟洛間貧甚傭書以自資嘗至濟源冨民相里氏竒之妻以女由是資用稍給舉進士殿試第四及貴其長兄猶存待遇甚有恩禮二兄及錢氏姑氏子孫受公蔭補官者數人仍皆為之婚嫁記聞公治吏事如其為人其聽獄訟雖明敏而審核愈精故屢決疑獄人以為神其簿書出納推析毫髮終日無倦色至為條目必使吏不得為姦而巳及其施於民者則簡而易行始居平遙嘗以吏事適他州而縣民爭訟者皆不肯決以待公歸知乾州未滿歲安撫使察其治行以公權知鳯翔府二邦之民爭於界上一曰此我公也汝奪之一曰今我公也汝何有焉歐陽公撰墓志夏人叛命陜西困於科斂吏緣侵漁調發督迫民至破産不能足往往自經投水以死公在永興語其人曰吾不能免汝然可使汝不勞爾乃為之區處計較量物有無貴賤道里逺近寬其期會使以次輸送由是物不踴貴車牛芻秣宿食來往如平時而吏束手無所施民比他州費省十六七至於繕治城郭器械民皆不知墓志開封治京師常撓於權要有干其法而能不為之屈者世皆以為難至公能使權要不敢有所干凡其為治以聽斷盜訟為能否爾獨公始有餘力省其民事如治他州墓志吏部審官主天下吏貟而居職者類以不久遷去故吏得為姦公始視銓事一日選者三人爭某闕公以問吏吏受丙賕對曰當與甲乙不能爭遂授他闕居數日吏教丙訟甲負某事不當得公悟召乙問之乙謝曰業巳得他闕不願爭公不得巳與丙而笑曰此非吏罪乃吾未知銓法爾因命諸曹各具格式科條以白問曰盡乎曰盡矣明日勑諸吏無得升堂使坐聽行文書而巳由是吏不得與銓事與奪一出於公其在審官有以賂求官者吏謝不受曰我公有賢名不久見用去矣姑少待之墓志慶曆初上厭西兵之久出而民弊亟用冨鄭公韓魏公及范文正公而三人者遂欲盡革衆事以修紀綱而小人權幸皆不恱獨公與相佐佑而公尤抑絶僥幸凡內降與恩澤者一切不與每積至十數則連封而面還之或詰責其人至慙恨涕泣而去上嘗謂諫官歐陽修曰外人知杜衍封還內降邪吾居禁中有求恩澤者每以杜衍不可告之而止者多於所封還也其助我多矣此外人及杜衍皆不知也然公與三人者卒皆以此罷去墓志公多知夲朝故實善決大事初邊將議欲大舉以擊夏人雖韓公亦以為可舉公爭以為不可大臣至有欲以沮軍罪公者然兵後果不得出契丹與夏人爭銀甕族大戰黃河外而鴈門麟府皆警范文正公安撫河東欲以兵從公以為契丹必不來兵不可妄出范公怒至以語侵公公不為恨後契丹卒不來二公皆丗俗指公為朋黨者其論議之際蓋如此及三人者將罷去公獨以為不可遂亦罷墓志杜正獻公為相蔡君謨孫之翰為諫官屢乞出於是蔡除福州之翰安州正獻云諫官無故出終非美事乞且仍舊上可之退書聖語時陳恭公為執政不肯書曰吾初不聞正獻懼遂焚之由此遂罷相議者謂正獻當俟明日審奏不當遽焚其書也正獻言始在西府時上每訪以中書事及為相中書事亦不以訪公因言君臣之間能全始終者蓋難也東坡志林公與丁文簡公俱為河東宣撫時任恭惠公之子上書言事歷詆執政至恭惠曰至於臣父亦出遭逢謂其非德選也進奏院報至公戲文簡曰賢郎亦要牢籠文簡深銜之其後二公同在政府人言蘇子美進奏院祠神事公避嫌不與文簡論以深文子美坐廢為民從坐者數十人皆名士大夫而公亦罷去一言之謔貽禍一時故不可不謹也談叢公為人尤潔廉自尅其為大臣事其上以不欺為忠推於人以行已取信故其動靜纎悉謹而有法至考其大節偉如也墓志公自布衣至為相衣服飲食無所加雖妻子亦有常節家故饒財諸父分産公以所得悉與昆弟之貧者俸祿所入給宗族賙人急難至其歸老無屋以居寓於南京驛舍者久之自少好學工書喜為詩讀書雖老不倦推獎後進今丗知名士多出其門居家見賔客必問時事聞有善喜若已出至有所不可憂見於色或夜不能寐如任其責者凡公所以行之終身者有能履其一君子以為人之所難而公自謂不足以名後丗遺戒子孫無得記述嗚呼豈所謂任重道逺而為善惟不足者歟墓志公嘗謂門生曰凡士君子作事行已當履中道不冝矯飾矯飾過實則近乎偽語録公嘗謂門生曰今之在上者多擲發下位小節是誠不恕也衍知兖州時州縣官有纍重而素貧者以公租所得均給之公租不給即繼以公帑量其小大咸使自足尚有復侵擾者真貪吏也於義可責又曰衍歷知州提轉安撫未嘗壞一箇官貟其間不職者即委以事使之不暇墯不謹者諭以禍福俾之自新從而遷善者甚衆不必繩以法也其有文學政事殊行絶德者雖不識面未嘗不力薦於朝有一善可稱一長可録者亦未嘗不隨所能而薦之語録有門生為縣令公戒之曰子之才器一縣令不足施然切當韜晦無露圭角毀方瓦合求合於中可也不然無益於事徒取禍爾門生曰公平生以直亮忠信取重天下今反誨某以此何也公曰衍歷任多歷年久上為帝王所知次為朝野所信故得以申其志今子為縣令卷舒休戚繫之長吏夫良二千石者固不易得若不奉知子烏得以申其志徒取禍爾豫所以欲子毀方瓦合求合於中也語録公嘗謂門生曰作官第一清畏無求人知苟欲人知同列不謹者衆必譛已為上者又不加明察適足取禍爾但優遊於其間默而行之無愧於心可也語録公一日憂見于色門生曰公今日何以不恱公曰適覩朝報行某事行某事非便所以憂爾又一日喜見于色門生未及問公曰今日見朝報某人進用某人進用社稷之福也公又曰孔子稱不在其位不謀其政第衍荷國恩之深退居以來家事百不關心獨未能忘國爾語録公食于家惟一麵一飯而已或美其儉公曰衍夲一措大爾名位爵祿冠冕服用皆國家者俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵祿國家奪之却為一措大又將何以自奉養耶又嘗戒門生曰天下惟浙人褊急易動柔懦少立衍自在幕府至於監司人尚不信及為三司副使纍於上前執奏不移人始信之反曰杜衍如是莫非兩浙生否其輕吾黨也如此觀子識慮髙逺志尚端慤他日樹立當為鄉曲之顯切勿少枉為時所上下也語録門生嘗從容問公曰公在相位未期年而出使蒼生不盡𬒳公之澤天下甚鬱望公曰衍以非才久妨賢路遽得解去深遂乃心然獨有一恨爾門人曰公之恨何也公曰衍平生聞某人之賢可某任某人之才可某用未能悉薦而去此所以為恨也語録韓魏公言杜祁公公心而樂與人善既知其人無復毫髮疑間始琦為樞密副使論難一二事祁公不樂久之相亮每事問曰諫議看來未諫議曾看便將來押字琦益為之盡心不敢忽以此見祁公存心至公不必以出於已為是賢於人逺矣魏公別録杜祁公免相幹吏具未供秩酒齊以白公祁公曰吾既去位尚敢享其奉乎索其劵焚之家孰記杜祁公享客多用髹器客有面稱嘆者曰公嘗為宰相清貧乃爾耶公命侍人盡取白金燕器陳於前曰衍非乏此雅自不好耳然祁公好施亦卒不畜也張唐公侍讀瓌嘗曰祁公之好施人所能及也其不妄施人之所不能及也家孰記公不殖資産退寓南都凡十年第宅􅋻陋居之𥙿如也出入從者才十許人烏帽皂綈袍革帶親故或言冝為居士服公曰老而謝事尚可竊髙士名耶公致仕居南京上思之及將祀明堂謂文彥博曰舊老之在外者朕欲致之以陪大禮因以示養老尊賢之意乃詔公及太子少師致仕任布陪祀都亭驛錫慶院具供帳几杖以待之後皆以羸老不任就道且表謝不得預觀盛禮為恨上優詔勞之
