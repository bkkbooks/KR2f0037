body:
  text: 九之二内翰王公公名禹偁字元之濟州鉅野人擢進士第解褐成武主簿知長洲縣召試拜右拾遺直史館知制誥貶啇州團練使召還拜左正言再知制誥至道元年入翰林爲學士知審官院兼通進銀臺封駮司出知滁州移揚州眞宗即位召還復知制誥咸平初罷知黄州四年徙蘄州卒年四十八王元之年七八嵗已能文畢文簡公爲郡從事始知之問其家以磨麵爲生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之留於子弟中講學一日太守席上出詩句鸚鵡能言爭似鳯坐客皆未有對文簡冩之屏間元之書其下蜘蛛雖巧不如蚕文簡歎息曰經綸之才也遂加以衣冠呼爲小友至文簡入相元之巳掌書命矣聞見後録王禹偁能屬文太宗方獎抜文士聞其名召拜右拾遺直史館賜緋故事賜緋者給銀帶上特命以文犀帶賜之禹偁獻端拱箴以爲誡尋知制誥上嘗稱之曰王禹偁文章當今天下獨步判大理寺散騎常侍徐鉉爲妖巫道安所誣謫官禹偁上䟽訟之請反坐尼罪由是貶啇州團練副使無禄種𬞞自給徙解州團練副使上思其才復召爲左正言仍命宰相以剛直不容物戒之眞宗初即位召爲翰林學士脩太宗實録執政疑禹偁輕重其間與客言后嘗母儀天下當遵用舊禮罪以謗責知滁州眞宗即位以直言應詔召爲知制誥咸平初脩太祖實録與宰相論不合又以謗責知黃州移蘄州死於官其平生大節如此聞見録王禹偁性剛狷數忤權貴宦官尤惡之上累命執政召至中書戒諭之禹偁終不能改記聞王元之在翰林甞草夏州李繼遷制繼遷送潤筆物數倍於常然用啓頭書送拒而不納蓋惜事體也近時舎人院草制有送潤筆物稍後時者必遣院子詣門催索而當送者徃徃不送相承旣乆今索者送者皆恬然不以爲恠也歸田録太宗時禹偁爲翰林學士嘗草繼遷制送馬五十疋以備濡潤禹偁以狀不如式却之及出守滁州閩人鄭褒徒步謁禹偁愛其儒雅及别爲買一馬或言買馬虧價者太宗曰彼能却繼遷五十馬頋肯此虧價哉禹偁之卒諫議大夫戚綸誄曰事上不回邪居下不謟佞見善若已有嫉惡過仇讎丗以爲知言祥符中眞宗觀書龍圖閣得禹偁章奏嘆美切直因訪其後宰相稱其子嘉言以進士第爲江都尉即召對擢大理評事記聞王禹偁爲諫官上禦戎十䇿大旨以謂外任人内脩德則可以弭之外則合兵勢以重將權罷小臣詗邏邊事行間諜以離其心遣保忠御卿率所部以張掎角下詔感勵邊人取燕薊舊疆蓋弔晉遺民非貪其土地内則省官以寛經費抑文士以激武夫信用大臣以資其謀不貴虚名以戒無益禁㳺惰以厚民力端拱冬旱禹偁上䟽請節用省役薄賦緩刑記聞太宗末王禹偁上言請明數繼遷罪狀募諸胡殺之眞宗即位詔群臣論事禹偁上䟽陳五事一曰謹邊防通盟好因嗣統之慶赦繼遷罪復與夏臺彼必感恩内附且使天下知屈已而爲人也二曰减冗兵併冗吏使山澤之饒稍流於下開寳前諸國未平而財賦足兵威強由所畜之兵銳而不衆所用之將專而不疑設官至簡而事皆舉興國後增損太冗冝皆經制三曰難選舉使入官不濫先朝登第僅萬人冝糾以舊制還舉塲於有司吏部銓擇官亦非帝王躬親之事冝依格敕注擬四曰澄汰僧尼恐其驚駭且罷度人脩寺一二十載容自銷鑠亦救弊之一端五曰親大臣逺小人使忠良蹇諤之士知進而不疑姦憸傾巧之徒知退而有懼其後潘羅支射死繼遷平夏𣢾附卒如禹偁䇿而歲限度僧尼之數及病囚輕繫得養治于家至今行之記聞王禹偁在翰林眞宗初即位暇日召與論文禹偁奏曰夫進賢黜不肖闢諫諍之路彰爲誥命施之四海延利萬丗王者之文也至於彫纎之言豈足以􅎮慮較輕重於瑣瑣之儒哉願棄其小務其大誠宗社之福上顧曰卿愛朕之深者掇遺王元之嘗請宰相於政事堂樞宻於都堂同時見客不許本㕔私接議者以爲是疑大臣以私也遂寢或以元之所請爲當但難其率宰相於政事堂共見耳其後二府乞以朝退聚㕔見客以杜請謁從之卒如元之言澠水燕談王元之出知黃州作三黜賦以見志其卒章曰屈于身而不屈于道兮雖百謫其何虧吾當守正直而佩仁義兮惟終身而行之又奏請令州郡脩城池除械器練軍士上嘉納之禹偁詞學敏贍時所推重鋒氣俊厲極談丗事臧否人物以直躬行道爲己任少所推讓遇事敢言雖履危困封奏無輟嘗云吾若生元和時從事於李絳崔群間斯無愧矣又爲文著書師慕古昔多渉規諷以是頗爲流俗所不容故累登文翰之職尋即罷去交遊多儒雅士後進有詞藝者極意稱揚之如孫何丁謂軰多遊其門下蘇内翰賛公畫像曰傳曰不有君子其能國乎余嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吴張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖累千百緩急豈可望哉故翰林王公元之以雄文直道獨立當丗足以追配此六君子者方是時朝廷清明無大姦慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而居於衆邪之間安危之際則公之所爲必將驚丗絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎余始過蘇州虎丘寺見公之畫像想其遺風餘烈願爲執鞭而不可得其後爲徐州而公之曾孫汾爲兖州以公墓碑示余乃追爲之賛以附其家傳云惟昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山雖死靡憾咸平以來獨爲名臣一時之屈萬丗之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能巳之茫茫九原愛莫起之
