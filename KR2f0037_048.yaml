body:
  text: 九之二內翰王公公名禹稱字元之濟州巨野人擢進士第解褐成武主簿知長洲縣召試拜右拾遺直史館知制誥貶啇州團練使召還拜左正言再知制誥至道元年入翰林為學士知審官院兼通進銀臺封駮司出知滁州移揚州真宗即位召還復知制誥咸平初罷知黃州四年徙蘄州卒年四十八王元之年七八嵗已能文畢文簡公為郡從事始知之問其家以磨麵為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之留於子弟中講學一日太守席上出詩句鸚鵡能言爭似鳯坐客皆未有對文簡寫之屏間元之書其下蜘蛛雖巧不如蠶文簡歎息曰經綸之才也遂加以衣冠呼為小友至文簡入相元之巳掌書命矣聞見後録王禹稱能屬文太宗方獎拔文士聞其名召拜右拾遺直史館賜緋故事賜緋者給銀帶上特命以文犀帶賜之禹稱獻端拱針以為誡尋知制誥上嘗稱之曰王禹稱文章當今天下獨步判大理寺散騎常侍徐鉉為妖巫道安所誣謫官禹稱上疏訟之請反坐尼罪由是貶啇州團練副使無祿種𬞞自給徙解州團練副使上思其才復召為左正言仍命宰相以剛直不容物戒之真宗初即位召為翰林學士修太宗實録執政疑禹稱輕重其間與客言后嘗母儀天下當遵用舊禮罪以謗責知滁州真宗即位以直言應詔召為知制誥咸平初修太祖實録與宰相論不合又以謗責知黃州移蘄州死於官其平生大節如此聞見録王禹稱性剛狷數忤權貴宦官尤惡之上纍命執政召至中書戒諭之禹稱終不能改記聞王元之在翰林嘗草夏州李繼遷制繼遷送潤筆物數倍於常然用啓頭書送拒而不納蓋惜事體也近時舍人院草制有送潤筆物稍後時者必遣院子詣門催索而當送者往往不送相承既久今索者送者皆恬然不以為怪也歸田録太宗時禹稱為翰林學士嘗草繼遷制送馬五十匹以備濡潤禹稱以狀不如式却之及出守滁州閩人鄭褒徒步謁禹稱愛其儒雅及别為買一馬或言買馬虧價者太宗曰彼能却繼遷五十馬顧肯此虧價哉禹稱之卒諫議大夫戚綸誄曰事上不回邪居下不諂佞見善若已有嫉惡過仇讎丗以為知言祥符中真宗觀書龍圖閣得禹稱章奏嘆美切直因訪其後宰相稱其子嘉言以進士第為江都尉即召對擢大理評事記聞王禹稱為諫官上禦戎十䇿大旨以謂外任人內修德則可以弭之外則合兵勢以重將權罷小臣詗邏邊事行間諜以離其心遣保忠御卿率所部以張掎角下詔感勵邊人取燕薊舊疆蓋弔晉遺民非貪其土地內則省官以寬經費抑文士以激武夫信用大臣以資其謀不貴虛名以戒無益禁遊惰以厚民力端拱冬旱禹稱上疏請節用省役薄賦緩刑記聞太宗末王禹稱上言請明數繼遷罪狀募諸胡殺之真宗即位詔群臣論事禹稱上疏陳五事一曰謹邊防通盟好因嗣統之慶赦繼遷罪復與夏臺彼必感恩內附且使天下知屈已而為人也二曰減冗兵併冗吏使山澤之饒稍流於下開寶前諸國未平而財賦足兵威強由所畜之兵鋭而不衆所用之將專而不疑設官至簡而事皆舉興國後增損太冗冝皆經制三曰難選舉使入官不濫先朝登第僅萬人冝糾以舊制還舉場於有司吏部銓擇官亦非帝王躬親之事冝依格敕注擬四曰澄汰僧尼恐其驚駭且罷度人修寺一二十載容自銷鑠亦救弊之一端五曰親大臣逺小人使忠良蹇諤之士知進而不疑姦憸傾巧之徒知退而有懼其後潘羅支射死繼遷平夏𣢾附卒如禹稱䇿而歲限度僧尼之數及病囚輕繫得養治于家至今行之記聞王禹稱在翰林真宗初即位暇日召與論文禹稱奏曰夫進賢黜不肖闢諫諍之路彰為誥命施之四海延利萬丗王者之文也至於雕纎之言豈足以􅎮慮較輕重於瑣瑣之儒哉願棄其小務其大誠宗社之福上顧曰卿愛朕之深者掇遺王元之嘗請宰相於政事堂樞密於都堂同時見客不許本廳私接議者以為是疑大臣以私也遂寢或以元之所請為當但難其率宰相於政事堂共見耳其後二府乞以朝退聚廳見客以杜請謁從之卒如元之言澠水燕談王元之出知黃州作三黜賦以見志其卒章曰屈于身而不屈于道兮雖百謫其何虧吾當守正直而佩仁義兮惟終身而行之又奏請令州郡修城池除械器練軍士上嘉納之禹稱詞學敏贍時所推重鋒氣俊厲極談丗事臧否人物以直躬行道為己任少所推讓遇事敢言雖履危困封奏無輟嘗云吾若生元和時從事於李絳崔群間斯無愧矣又為文著書師慕古昔多涉規諷以是頗為流俗所不容故纍登文翰之職尋即罷去交遊多儒雅士後進有詞藝者極意稱揚之如孫何丁謂輩多遊其門下蘇內翰贊公畫像曰傳曰不有君子其能國乎余嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖纍千百緩急豈可望哉故翰林王公元之以雄文直道獨立當丗足以追配此六君子者方是時朝廷清明無大姦慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而居於衆邪之間安危之際則公之所為必將驚丗絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎余始過蘇州虎丘寺見公之畫像想其遺風餘烈願為執鞭而不可得其後為徐州而公之曾孫汾為兖州以公墓碑示余乃追為之贊以附其家傳云惟昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山雖死靡憾咸平以來獨為名臣一時之屈萬丗之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能巳之茫茫九原愛莫起之
