  text: 三朝名臣言行後録卷第六
  hash: sha256:1e039f9d40724ae14172f76cb0cf0b514393f9df1284376feaf265569cc8dd68
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_001-1a}
body:
  text: 太傅魯國曽宣靖公公名公亮字明仲泉州晉江人中進士第知越州㑹稽縣坐事謫官獻文召試授集賢校理兼天章閣侍講歷史館檢討修起居注翰林學士出知鄭州俄還舊職權知開封府拜參知政事樞密使嘉祐六年拜吏部侍郎同平章事熙寧三年拜司空河陽三城節度使兼侍中集禧觀使五日一朝久之納節以太傳兼侍中致仕薨年八十詔配享英宗廟庭篆其碑首曰兩朝顧命定䇿亞勳之碑知越州㑹稽縣縣有鑑湖溉民田湖溢則反為田病公為即曹娥江堤疏為斗門泄湖水入江田以不病民至今賴之曽內翰撰行狀仁宗一日召執政侍從之臣䇿訪政事時公侍楚國太夫人疾謁告家居亟以手詔就問公條六事以獻其略以謂完堡柵畜兵馬使主兵者久於其任則夷狄不敢窺邊取之得其要任之盡其材則將帥不患無人損冗兵汰冗官則財用省徭役不專在農則耕者勸又陳古者取六郡良家子為宿衛及府兵畨上十六衛之制以明今宿衛之失言狂者似直愛憎似忠以明聽言知人之難而消讒諛之患蓋皆取當世之所先急而便於施行者以為說云行狀異時領省寺者多以貴逹且數遷徙類不省事吏得並緣為姦公周覽詔條考校簿書分别是非可否不為苟簡故所至舉職皆有能名歐陽文忠公不妄許人至三班嘗以不敢易公舊事為言其為世所服如此行狀知鄭州鄭居數路要衝冠蓋旁午州將疲於應接鮮能及民事公獨詢訪閭里為之除害興利轉運使歲多無名率斂而輔郡尤甚公至一切不報有不得巳者使民以常賦代之民以不擾至今思之公為政惠和而尤能鈎考情僞禁戢姦盜郡故多冦攘公至悉竄他境路不拾遺民外戶不閉至號公為曽開門常有使客亡槖中物移文求盜公諭以境內無盜必從者自為也索之果然使客慙服以為神明行狀公在樞府修紀綱除弊事數裁損冗兵又更制圖籍以周知四方兵數登耗三路屯戍衆寡地里逺近及在相位與韓忠獻公戮力一心更唱迭和其所更革廢舉尤多以謂政事以仁民為先故其志尤急於去民所疾苦而𥙷助其窮乏罷㢮茶禁歸之於民籍户絶田收其租為廣惠倉以廪食窮獨其他施設亦多此類公嘗與韓忠獻公力贊仁宗蚤建皇子以為天下萬世之夲前此固有言者未之開納至是感悟儲二乃定行狀公在位久熟於朝廷政事尤矜御名折獄異時四方以獄來上者委成有司二府揔領綱紀而巳公得奏讞必躬自省覽原情議法密州銀發民田中盜往疆取之大理當以疆盜應死執政皆欲從之公獨以謂此禁物也取之雖疆與盜民家物有間固爭不决遂下有司議如公言比劫禁物法盜得不死先是東州地産金銀坐疆取者多抵死繇公一言自是無死者蓋公推析律意不差毫釐而主於平恕類皆如此行狀公嘗以謂夷狄驕於姑息屈於理折契丹縱邊人漁界河邊吏不能禁後又數通􅐭舟益患之或謂與之校且生事公曰不可因循不禁後將為患獨可委之疆臣且言趙滋守雄州其人疆勇有謀可任因諭以風指滋果能明約束設方略絶其􅐭舟而漁者亦皆逺去諜告虜欲遣泛使滋又沮之曰泛使非誓約雖至不敢上聞卒不至契丹賀正使在館故事賜宴紫宸殿時英宗不豫命宰相就館宴之使者以非故事不就席公責以賜宴不赴是不䖍君命也人主不豫必待親臨非體國也使人處之安手遂拜賜夏人犯大順城朝廷憂之公以為彼方荐飢姑絶其歲賜遣使詰問必窘急謝罪或曰得賜尚爾況絶之乎公曰彼雖戎夷固能擇利而處也卒遣使皆如公言羌酋嵬名山舉族來歸且言可率他族內附种諤乘其勢取綏州又欲因其謀招致他族或謂夷狄懷詐未可信且欲棄綏州上以問公公言舉族而來决非詐綏州我故地也既得之何可不信然遂欲招致他族則我素無備非倉卒可為未宜搖動其衆後遣習邊事者計之不能易公說行狀曽魯公自嘉祐秉政至熙寧中尚在中書年雖甚髙而精力不衰故臺諌無非之者惟李復圭以為不可作詩曰老鳯池邊蹲不去饑烏臺上噤無聲魯公亦致仕而去東軒筆録五朝名臣言行録卷第一之一中書令韓國趙忠獻王王名普字則平幽州薊人後徙洛陽周丗宗用兵淮上太祖拔滁州宰相范質奏用王為軍事判官太祖領同州節度辟為推官移領宋州表掌書記太祖受禪以佐命功授右諌議大夫充樞密直學士從平上黨遷樞密副使拜樞密使乾德二年范質王溥魏仁浦同日罷以王為門下侍郎平章事開寶中出為河陽三城節度使太平興國初入朝拜司徒兼侍中八年出為武勝軍節度使雍熙中冊拜太保兼侍中明年出為西京留守兼中書令淳化三年薨年七十一咸平初詔配享太祖廟庭普為滁州判官太祖與語竒之㑹獲盜百餘人將就死普意其有冤啓太祖更訊之所全活十七八范蜀公蒙求太祖既得天下誅李筠李重進召趙普問曰天下自唐季以來數十年間帝王凡易十姓兵革不息蒼生塗地其故何也吾欲息天下之兵為國家建長久之計其道何如普曰陛下之言及此天地人神之福也唐季以來戰鬪不息國家不安者其故非它節鎮太重君弱臣強而已矣今所以治之無它竒巧也惟稍奪其權制其錢穀收其精兵則天下自安矣語未畢上曰卿勿復言吾已諭矣頃之上因晚朝與故人石守信王審琦等飲酒酒酣上屏左右謂曰我非爾曹之力不得至此念汝之德無有窮巳然為天子亦大艱難殊不若為節度使之樂吾今終夕未嘗敢安枕而卧也守信等皆曰何故上曰是不難知居此位者誰不欲為之守信等皆惶恐起頓首言曰陛下何為出此言今天命已定誰敢復有異心上曰不然汝曹雖無心其如汝麾下之人欲冨貴者何一旦以黃𫀆加汝之身汝雖欲不為不可得也皆頓首涕泣曰臣等愚不及此唯陛下哀憐指示以可生之塗上曰人生如白駒之過隙所為好冨貴者不過欲多積金錢厚自娛樂使子孫無貧乏耳汝曹何不釋去兵權擇便好田宅市之為子孫立永久之業多置歌兒舞女日飲酒相歡以終其天年君臣之間兩無猜嫌上下相安不亦善乎皆再拜謝曰陛下念臣及此所謂生死而肉骨也明日皆稱疾請解軍權上許之皆以散官就第所以尉撫賜賚之甚厚與結婚姻更置易制者使主親軍其後又置轉運使通判使主諸道錢穀收選天下精兵以備宿衛而諸功臣亦以善終子孫冨貴迄今不絶嚮非韓王謀慮深長太祖聰明果斷天下何以治平至今戴白之老不覩干戈聖賢之見何其逺哉普為人隂刻當其用事時以睚眦中傷人甚多然其子孫至今享福祿國初大臣鮮能及者得非安天下之謀其功大乎太祖既納韓王之謀數遣使者分詣諸道選擇精兵凡其材力伎藝有過人者皆收𥙷禁軍聚之京師以備宿衛厚其糧賜居常躬自按閲訓練皆一以當百諸鎮皆自知兵力精鋭非京師之敵莫敢有異心者由我太祖能強幹弱支制治於未亂故也涑水記聞又王沂公筆録云太祖在位歷年石守信王審琦等猶分典禁兵相國趙公普屢以為言上不得巳召守信等曲宴道舊甚樂因諭之曰朕與公等昔嘗比肩義同骨肉豈有它哉而言事者進說不已今莫若自擇善地各守外藩優遊卒嵗不亦樂乎朕復有女數人便當約婚守信等咸頓首稱謝由是髙石王魏之族俱蒙選尚尋各歸鎮幾二十年貴盛赫奕始終如一又程氏遺書云趙普除節度使權便是烏重㣧之䇿以兵付逐州刺史太祖初登極杜太后尚康寧常與上議軍國事猶呼趙普為書記嘗撫勞之曰趙書記且為盡心吾兒未更事也太祖寵待韓王如左右手御史中丞雷德驤劾奏普強市人第宅聚斂財賄上怒叱之曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎命左右曵於庭數匝徐使復冠召升殿曰今後不冝爾且赦汝勿令外人知也記聞太祖即位之初數出微行以偵伺人情或過功臣之家不可測趙普每退朝不敢脫衣冠一日大雪向夜普謂帝不復出矣久之聞叩門聲普亟出帝立風雪中普惶懼迎拜帝曰巳約晉王矣已而太宗至共於普堂中設重䄄地坐熾炭燒肉普妻行酒帝以嫂呼之普從容問曰夜久寒甚陛下何以出帝曰吾睡不能著一榻之外皆他人家也故來見卿普曰陛下小天下耶南征北伐今其時也願聞成算所向帝曰吾欲下太原普默然久之曰非臣所知也帝問其故普曰太原當西北二邊使一舉而下則二邊之患我獨當之何不姑留以俟削平諸國則彈丸黑志之地將無所逃帝笑曰吾意正如此特試卿耳遂定下江南之議帝曰王全斌平蜀多殺人吾今思之猶耿耿不可用也普於是薦曹彬為將以潘美副之邵氏聞見録太祖欲使符彥卿典兵趙韓王屢諌以為彥卿名位已盛不可復委以兵柄上不聽宣已出韓王復懷之請見上迎謂之曰豈非以符彥卿事耶對曰非也因別以事奏既罷乃出彥卿宣進之上曰果然宣何以復在卿所韓王曰臣託以處分之語未備者復留之惟陛下深思利害勿為後悔上曰卿苦疑彥卿何也朕待彥卿至厚彥卿能負朕邪韓王曰陛下何以能負周世宗上默然遂中止記聞太祖一日以幽燕地圖示中令問所取幽燕之䇿中令曰圖必出曹翰帝曰然又曰翰可取否中令曰翰可取孰可守帝曰以翰守之中令曰翰死孰可代帝不語久之曰卿可謂逺慮矣帝自此絶口不言伐燕至太宗因平河東乘勝欲搗燕薊時中令鎮鄧州上疏力諌其憂國愛君之深言出乎文章之外雖雜陸宣公論事中不辨也聞見録趙普嘗欲除某人為某官不合太祖意不用明日普復奏之又不用明日又奏之太祖怒取其奏壞裂投地普顔色自若徐拾奏歸補綴明日復進之上乃寤用之其後果稱職得其力記聞又晉公談録云普嘗奏事忤旨上怒就趙手掣奏劄子挼而擲之趙就地拾起以手展開近前復奏上愈怒拂䄂起趙猶奏曰此事合如此容進入取旨其膽量如此太祖時嘗有群臣立功當遷官上素嫌其人不與趙普堅以為請上怒曰朕固不為遷官將若何普曰刑以懲惡賞以酬功古今之通道也且刑賞者天下之刑賞非陛下之刑賞也豈得以喜怒專之上怒甚起普亦隨之上入宫普立於宫門久之不去上寤乃可其奏記聞國初趙普為相於㕔事坐屏後置二大甕凡有人投利害文字皆置中滿即焚於通衢聞見録太祖常與趙普議事不合太祖曰安得宰相如桑維翰者與之謀乎普對曰使維翰在陛下亦不用蓋維翰愛錢太祖曰苟用其長亦當護其短措大眼孔小賜與拾萬貫則塞破屋子矣楊文公談苑太祖豁逹既得天下趙普屢以微時所不足者言之欲潜加害太祖曰不可若塵埃中揔教識天子宰相則人皆去尋也自後普不復敢言談録開寶中趙普猶秉政江南後主以銀五萬兩遺普普白太祖太祖曰此不可不受但以書答謝少賂其來使可也普叩頭辭讓上曰大國之體不可自為寢弱當使之勿測既而後主遣其弟從善入貢常賜外密賚白金如遺普之數江南君臣始震駭上之偉度談苑又記聞云太祖時趙普為相車駕因出忽幸其第時兩浙錢俶方遣使致書及海物十瓶於普置在左廡下㑹車駕至倉卒出迎不及屏也上顧見問何物普以實對上曰此海物必佳即命啓之皆滿貯瓜子金也普皇恐頓首謝曰臣未發書實不知若知之當奏聞而却之上笑曰但取之無慮彼謂國家事皆由汝書生耳因命普謝而受之王始為相太祖命薛居正吕餘慶參知政事以副之不知印不奏事不押班但奉行制書而已事無大小一决於王開寶中盧多遜因對屢攻其短雷有鄰復訟其庇吏受賕上怒下御史府案問抵吏罪詔參知政事更知印押班奏事以分其權王性深沈有岸谷多忌克初以吏道聞寡學術太祖常勸以讀書晚年手不釋卷其為宰相以天下事為己任沈毅果斷當世無與為比昭憲太后聰明有智度嘗與太祖參决大政及疾篤太祖侍藥餌不離左右太后曰汝自知所以得天下乎太祖曰此皆祖考與太后之餘慶也太后笑曰不然正由柴氏使幼兒主天下耳因戒敕太祖曰汝萬歲後當以次傳之二弟則并汝之子亦獲安矣太祖頓首泣曰敢不如母教太后因召趙普於榻前為約誓書普於紙尾自署名云臣普書藏之金匱命謹密宮人掌之及太宗即位普為盧多遜所譛出守河陽日夕憂不測上一旦發金匱得書大寤遂遣使急召之普惶恐為遺書與家人別而後行既至復為相記聞盧多遜貶朱崖諫議大夫李符求見趙普言朱崖雖在海外而水土無它惡春州雖在內地而至者必死望追改前命以外彰寬宥乃置於必死之地普領之後月餘符坐事貶宣州行軍司馬上怒未巳令再貶嶺外普具述其事即以符知春州到郡月餘卒湘山野録太平興國中朝士祖吉典郡姧贓事覺下獄時郊禮將近太宗怒其貪墨諭旨執政特俾郊赦不宥趙普奏曰敗官抵罪冝正刑辟然而國家卜郊肆類所以對越天地告休神明吉夲何人安足以隳改陛下赦令哉上善其對而止沂公筆録彌德超自冗列為諸司使驟被委遇誣奏侍中曹公彬有不軌謀太宗疑之拜德超樞密副使不數月趙普再相因為辨雪上乃大悟即逐德超而待彬如故自是數日上頗不懌從容謂普曰朕以聽斷不明幾誤大事夙夜循省內愧于心普對曰陛下知德超才幹而任用之察曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下之明聖也雖堯舜何以過此哉上於是釋然沂公筆録李繼遷擾邊太宗用趙普計封趙保忠守夏臺故地令滅之保忠反與繼遷合謀大為邊患玉壷清話
