  text: 三朝名臣言行後録卷第七
  hash: sha256:7256a153a485d73f087d64a94c46d1e644c964fdd884e4a3eade1c22e21b9a01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_002-1a}
body:
  text: 丞相温國司馬文正公公名光字君實陜州夏縣人𥘉以父任爲將作監主簿舉進士甲科簽書武成軍判官事入爲國子監直講召試除館閣校勘同知太常禮院從龐莊敏公辟通判并州事擢脩起居注同知諫院除知制誥力辭至八九改授天章閣待制兼侍講仍知諫院神宗𥘉擢爲翰林學士力辭不許爲御史中丞遷翰林侍讀學士拜樞宻副使辭不拜以端明殿學士出知永興軍移知許州不赴乞判西京留司御史臺以歸又提舉崇福宫居洛十五年官制行改太中大夫資政殿學士元豐八年除知陳州詔過闕入見則拜門下侍郎元祐元年拜左僕射兼門下侍郎九月薨年六十八時方祀明堂禮成不賀贈太師温國公哲宗親篆碑額曰清忠粹德之碑紹聖𥘉奪贈謚仆所立碑再貶爲朱崖軍司户叅軍崇寜元年除名入黨籍靖康𥘉詔復贈謚至建炎二年遂詔配饗哲廟云公自成童凛然如成人七歲聞講左氏春秋大愛之退爲家人講即了其大義自是手不釋書至不知飢渇寒暑年十五書無所不通文詞醇深有西漢風蘇内翰撰行狀又冷齋夜話云司馬温公童稚時與群兒戱於庭庭有大瓮一兒登之足跌沒水中群兒皆棄去公則以石擊瓮水因穴而迸兒得不死盖其活人手段巳見齠齓中至今京洛間多爲小兒撃瓮圖又邵氏後録云予見温公親書一帖云光年五六歲弄青胡桃女兄欲爲脫其皮不得女兄去一婢子以湯脫之女兄復來問脫胡桃皮者光曰自脫也先公適見訶之曰小子何得謾語光自是不敢謾語又吕氏家塾記云司馬温公㓜時患記問不若人群居講習衆兄弟旣成誦㳺息矣獨下帷絶編迨能倍諷乃止用力多者収功逺其所精誦乃終身不忘也温公嘗言書不可不成誦或在馬上或中夜不寢時詠其文思其義所得多矣山谷言頃與范内翰純甫同局純甫多能言温公事方公𥘉官時年尚少家人毎毎見其卧齋中忽蹶起着公服執手版危坐乆率以爲常竟莫識其意純甫常從容問之荅曰吾時忽念天下安危事夫人以天下安危爲念豈可不敬耶冷齋夜話知禮院時中官夌允言死詔以允言有軍功特給鹵簿公言孔子不以名器假人今允言近習之臣非有元勲大勞而贈三公給鹵簿其爲繁纓不亦大乎故相夏竦卒詔賜謚文正公言謚之羙者極於文正竦何人可以當此書再上改謚文莊行狀公之召試樞宻副使龐籍之薦也籍爲鄆州徙并州皆辟公通判事公感籍知巳爲盡力時趙元昊始臣河東貧甚官苦貴糴而民疲於逺輸麟州窟野河西多良田皆故漢地公私雜耕天聖中始禁田河西者虜乃得稍蠶食其地俯窺麟州爲河東憂籍請公桉視公爲畫五䇿冝因州中舊兵益禁兵三千廂兵五百築二堡河西可使堡外三十里虜不敢田則州西六十里無虜矣募民有能耕麟州閑田者復其稅役十五年能耕窟野河西者長復之耕者必衆官雖無所得而糴自賤可以漸紓河東之民籍移麟州如公言而兵官郭恩勇且狂夜開城門引千餘人渡河載酒食不爲戰備遇敵死之議者歸罪於籍罷節度使知青州公守闕三上書乞獨坐其事不報籍𥘉不以望公而公深以自咎籍旣沒升堂拜其妻如母撫其子如昆弟時人兩賢之行狀交趾貢異獸謂之麟公言真僞不可知使其真非自至不爲瑞若僞爲逺夷笑願厚賜而還之因奏賦以諷行狀有司奏六月朔日當食公言故事食不滿分或京師不見皆賀臣以爲日食四方見京師不見天意人君爲隂邪所蔽天下皆知而朝廷獨不知其爲災當益甚皆不當賀詔從之後遂以爲常行狀蘇轍舉直言䇿入第四等而考官胡宿以爲不當収公言轍於同科四人中言最切直有愛君憂國之心不可不収時宰相亦以爲當黜仁宗不許曰求直言而以直棄之天下其謂朕何公遂與諫官王陶同上䟽願爲宗廟社禝自重郤罷宴飲安養神氣後宫嬪御進見有度左右小臣賜予有節厚味腊毒無益奉養者皆不冝數御上嘉納之行狀𥘉至和三年仁宗始不豫國嗣未立天下寒心而不敢言惟諫官范鎮首發其議公時爲并州通判聞而繼之上䟽言禮大宗無其子則小宗爲之後者爲之子也願陛下擇宗室賢者使攝儲貳以待皇嗣之生退居藩服不然則典宿衛尹京邑亦足以係天下之望䟽三上其一留中其二付中書公又與鎮書此大事不言則巳言一出豈可復反願公以死争之於是鎮言之益力及公爲諫官復上䟽且靣言臣昔爲并州通判所上三章願陛下果斷而力行之時仁宗簡黙不言雖執政奏事首肯而巳聞公言沈思乆之曰得非欲選宗室爲繼嗣者乎此忠臣之言但人不敢及爾公曰臣言此自謂必死不意陛下開納上曰此何害古今皆有之因令公以所言付中書公曰不可願陛下自以意喻宰相是日公復言江淮塩事詣中書白之宰相韓琦問公今日復何所言公黙計此大事不可不使琦知思所以廣上意者即曰所言宗廟社禝大計也琦喻意不復言後十餘日有旨令公與御史裏行陳洙同詳定行戸利害洙與公屏語曰日者大饗明堂韓公攝太尉洙爲監祭公從容謂洙聞君與司馬君實善君實近建言立嗣事恨不以所言送中書欲發此議無自發之行戸利害非所以煩公也欲洙見公逹此意爾時嘉祐六年閠八月也至九月公復上䟽靣言臣向者進說陛下欣然無難意謂即行矣今寂無所聞此必有小人言陛下春秋鼎盛子孫當千億何遽爲此不祥之事小人無逺慮特欲倉卒之際援立其所厚善者爾唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍豈可勝言哉上大感悟曰送中書公至中書見琦等諸公不及今定議異日夜半禁中出寸紙以某人爲嗣則天下莫敢違琦等皆唯曰敢不盡力後月餘詔英宗判宗正寺固辭不就職明年遂立爲皇子稱疾不入公復上䟽言凢人争絲毫之利至相争奪今皇子辭不貲之冨至三百餘日不受命其賢於人逺矣有識聞之足以知陛下之聖能爲天下得人然臣聞父召無諾君命召不俟駕而禮使者受命不受詞皇子不當避使者不當徒反凢召皇子内臣皆乞責降且以臣子大義責皇子冝必入英宗遂受命行狀兖國公主下嫁李瑋以驕恣聞公上䟽言太宗時姚坦爲兖王翊善有過必諫左右教王詐疾踰月太宗召王乳母入問起居狀乳母曰王無疾以姚坦故欎欎成疾耳太宗怒曰王年少不知爲此汝軰教之杖乳母數十召坦慰勉之齊國獻穆大長公主太宗之子真宗之妺陛下之姑而謙恭率禮天下稱其賢願陛下教子以太宗爲法公主事夫以獻穆爲法巳而公主不安於李氏詔瑋出知衛州公主入居禁中而瑋母楊歸其兄璋散遣其家人公言陛下追念母家使瑋尚主今乃母子離析家事流落陛下獨無雨露之感悽惻之心乎瑋旣責降公主亦不得無罪上感悟詔公主降封沂國待李氏恩禮不衰行狀除知制誥辭至八九乃改天章閣待制兼侍講按文集公有上龐丞相啓云光於屬文性分素薄又懶爲之當應舉時強作科埸文字雖僅能牽合終不甚工頗慕作古文又不能刻意致力闚前脩之藩徒使其言迂僻鄙俚不益丗用雖親舊書啓不免假手於人今知制誥之職掌爲天子作詔文宣布華夷豈可使假手荅書啓者爲之邪若苟貪榮利強顔爲之不惟取一身沒齒之羞亦非所以増朝廷之光華也以是觀之光之不授知制誥出於赤誠非飾讓也但不爲朝廷及丗人所諒耳充媛董氏薨贈淑妃輟朝成服百官奉慰定謚行冊禮葬給鹵簿公言董氏秩夲微病革之日方拜充媛古者婦人無謚近制惟皇后有之鹵簿夲以賞軍功未嘗施於婦人惟唐平陽公主有舉兵佐髙祖定天下之功乃得給至韋庶人始令妃主葬日皆給皷吹非令典不足法時有司新定後宫封贈法皇后與妃皆贈三代公言别嫌明微妃不當與后同袁盎引却御名夫人坐正爲此耳天聖親郊太妃止贈二代而况妃乎行狀仁宗崩英宗以哀毁致疾慈聖光獻太后同聽政公首上䟽言章獻明肅太后保佑先帝進賢退姦有大功於趙氏特以親用外戚小人故負謗天下今太后𥘉攝大政大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者當信用之鄙猥如馬季良䜛謟如羅崇勲者當踈逺之則天下服又上䟽英宗言漢宣帝爲昭帝後終不追尊衛太子史皇孫光武起布衣得天下自以爲景帝後亦不追尊鉅鹿都尉南頓君惟哀安桓靈皆自旁親入繼大統追尊其父祖天下非之願以爲戒行狀公所得仁宗遺賜珠金直百餘萬率同列三上章言國有大憂中外窘乏不可専用乾興故事若遺賜不可辭則冝許侍從以上進金錢佐山陵費不許公乃以所得珠爲諫院公使錢金以遺其舅氏義不藏於家英宗疾旣平皇太后還政公上䟽言治身莫先於孝治國莫先於公其言切至皆母子間人所難言者時有司立法皇太后有所取用有司奏覆得御寳乃供公極論以爲不可當直下合同司移所屬立供如上所取巳乃具數奏太后以防矯僞行狀曹佾除使相兩府皆遷公言佾無功而得使相陛下以慰母心爾今兩府皆遷無名若以還政爲功則宿衛將帥内侍小臣必有覬望巳而都知任守忠等皆遷公復争之因論守忠大姦陛下爲皇子非守忠意沮壞大䇿離間百端頼先帝不聽及陛下嗣位反覆革靣交御名兩宫國之大賊人之巨蠧乞斬於都市以謝天下詔以守忠爲節度副使蘄州安置天下快之行狀時有詔陜西刺民兵號義勇公上䟽極論其害云康定慶暦間籍陜西民爲郷弓手已而刺爲保捷指揮民𬒳其毒兵終不可用遇敵先北正兵隨之毎致崩潰縣官知其坐食無用汰遣歸農而惰㳺之人不能復反南畒彊者爲盗弱者爲之轉徙父老至今流涕也今義勇何以異此章六上不從乞罷諫官不許行狀又龍川志云治平中韓魏公建議於陜西刺義勇凢三丁刺一毎人支買弓箭錢三貫文省共得二十餘萬人深山窮谷無得脫者人情驚撓而民兵紀律踈略終不可用徒費官錢不貲無一人敢言其非者司馬君實時為諫官極言不便持劄子至中堂魏公曰兵貴先聲後實今諒祚方桀驁使聞陜西驟益二十萬兵豈不震慴君實曰兵之用先聲爲無其實也獨可以欺之於一日之間耳少緩則敵知其情不可復用矣今吾雖益二十萬兵然實不可用不過十曰西人知其詳不復懼矣魏公不能荅復曰君但見慶暦間陜西郷兵𥘉刺手背後皆刺靣充正兵憂今復作爾耳今巳降勑牓與民約永不充軍戍邊矣君實曰朝廷屢失信民間皆憂此事未敢以勑牓爲信雖光亦未免疑也魏公曰吾在此君無憂此語之不信君實曰光終不敢奉信非獨光不敢信但恐相公亦不能自信耳魏公怒曰君何相輕甚邪君實曰相公長在此坐可也萬一均逸偃藩它人在此因相公見成之兵遣之運粮戍邊反掌間事耳魏公黙然然竟不爲止其後不十年義勇運粮戍邊率以爲常一如君實之言王廣淵除直集賢院公言廣淵姦邪不可近昔漢景帝爲太子召上左右飲衛綰獨稱疾不行及即位待綰有加周丗宗鎮澶淵張羙掌州之錢糓丗宗私有求假羙悉力應之及即位薄其爲人不用今廣淵當仁宗之丗私自結於陛下豈忠臣哉願黜之以厲天下行狀執政建言濮安懿王德盛位隆冝有尊禮詔太常禮院與兩制議翰林學士王珪等相顧不敢先公獨奮立議曰爲之後者爲之子不敢復顧其私親今日所以崇奉濮安懿王典禮冝一凖先朝封贈期親尊屬故事髙官大爵極其尊榮議成珪即敕吏以公手藁爲桉至今存焉時中外洶洶御史吕誨傳堯俞范純仁吕大防趙鼎趙瞻等皆争之相繼降黜公上䟽乞留之不可則乞與之皆貶行狀𥘉西戎遣使致祭而延州指使髙冝押伴傲其使者侮其國主使者訴於朝公與吕誨乞加冝罪不從明年西戎犯邊殺略吏士趙滋爲雄州専以猛悍治邊公亦論其不可至是契丹之民有捕魚界河伐栁白溝之南者朝廷以知雄州李中祐爲不材選將代之公言國家當戎狄附順時好與之計較末節及其傑驁又從而姑息之近者西戎之禍生於髙冝北狄之隙起於趙滋朝廷方賢此二人故邊臣皆以生事爲能今若選將代中祐則來者必以滋爲法而以中祐爲戒漸不可長冝敕邊吏彊埸細故徐以文檄往反若輕以矢刄相加者坐之行狀神宗即位首擢公爲翰林學士公力辭不許上靣諭公古之君子或學而不文或文而不學惟董仲舒楊雄兼之卿有文學何辭爲公曰臣不能爲四六上曰如兩漢制詔可也公曰夲朝故事不可上曰卿能舉進士取髙等而云不能四六何也公趨出上遣内臣至閤門強公受告拜而不受趨公入謝曰上坐以待公公入至廷中以告置公懷中不得巳乃受行狀除御史中丞王陶論宰相不押常朝班爲不臣宰相不從陶争之力遂罷公旣繼之言宰相不押班細故也陶言之過然愛禮存羊則不可巳自頌宰相權重今陶復以言宰相罷則中丞不可復爲臣願俟宰相押班然後就職上曰可陶旣出知陳州謝章詆宰相不巳執政議再貶陶公言陶誠可罪然陛下欲廣言路屈巳受陶而宰相獨不能容之乃巳行狀公上䟽論脩心之要三曰仁曰明曰武治國之要三曰官人曰信賞曰必罰其說甚備且曰臣昔爲諫官即以此六言獻仁宗其後以獻英宗今以獻陛下平生力學所得盡在是矣行狀公在英宗時與吕誨同論祖宗之制勾當御藥院常用供奉官以下至内殿崇班則出近歲居此位者皆暗理官資食其廩給非祖宗夲意又故事年未五十不得爲押班今除張茂則止四十八不可至是又言之因論髙居簡姦邪乞加逺竄章五上上爲盡罷寄資内臣居簡亦𥙷外未幾復留二人公復争之日録云壬午延和登對言髙居簡不冝在左右因曰先帝𥘉立左右惕息因居簡以謟自入故晚年復張陛下登極中外頌羙首以留此四人爲失上曰祔廟畢自當去曰閨闥小臣何與山陵先後彼知當去而置肘腋尤非冝舜去四㐫不爲不忠仁宗貶丁謂不爲不孝居簡狡猾膳大不惟離間君臣恐令陛下母子兄弟夫婦皆不寜也上命留劄光請以付宻院上從之癸巳崇政登對言臣與居簡勢難兩留乞罷中丞除外任上曰今日巳令出外矣光曰凢左右之臣不湏才智謹朴小心不爲過則可矣又言近者王中正往陜西知涇州劉渙等謟事中正而鄜延鈐轄呉舜臣違失其意巳而渙等進擢舜臣降黜權歸中正謗歸陛下是去一居簡得一居簡上手詔問公所從知公曰臣得之賔客非一人言事之有無惟陛下知之若無臣不敢避妄言之罪萬有一之不可不察行狀壬寅延和登對言張方平叅政姦邪貪猥不叶物望仁宗知之故不用不然方平兩登制科在兩府乆矣上作色曰朝廷毎有除拜衆言輙紛紛非朝廷好事光曰此乃朝廷好事也知人帝堯所難况陛下新即位萬一用姦邪臺諫循嘿不言陛下何從知之此乃非朝廷好事也若其競來論列陛下可以察其是非若所言公當雖制命巳行亦當追寢若挾私非是自可罪言者旣退其暮復以一劄言方平癸夘聞予還翰林兼侍讀滕元發權中丞晦叔封駮言光在臺舉職不冝遽罷甫非光之比十月丙午朔詔閤門召光及甫受命光奏臣論張方平若當方平當罷不當臣當貶不可兩無所問間臣更加羙職心所未安不敢祗受晚際上賜手詔敦喻光上奏謝丁未受勑告日録甲寅余𥘉赴經筵上自製自書資治通鑑序以授光光受讀降再拜讀三家爲諸侯論上頋禹玉等稱羙乆之日録詔用宫邸直省官四人爲閤門祗候公言國𥘉草創天歩尚艱故即位之始必以左右舊人爲腹心耳目謂之隨龍非乎日法也閤門祗候在文臣爲館職豈可使厮役爲之行狀邊吏上言西戎部將嵬名山欲以横山之衆取諒祚以降詔邊臣招納其衆公上䟽極論以爲名山之衆未必能制諒祚幸而勝之㓕一諒祚生一諒祚何利之有若其不勝必引衆歸我不知何以待之臣恐朝廷不獨失信於諒祚又將失信於名山矣若名山餘衆尚多還北不可入南不受窮無所歸必將突據邊城以救其命陛下獨不見侯景之事乎上不聽遣將种諤發兵迎之取綏州費六十萬萬西方用兵蓋自是始矣行狀登州有不成婚婦謀殺其夫傷而不死者吏疑問即承知州事許遵讞之有司當婦絞而詔貸之遵上議凖律因犯殺傷而自首者得免所因之罪婦當减二等不當絞詔公與王安石議之安石是遵議公言謀殺猶故殺也皆一事不可分爲二若謀爲所因與殺爲二則故與殺亦可爲二邪自宰相文彦愽以下皆附公議然卒用安石言至今天下非之行狀百官上尊號公當荅詔上䟽言先帝親郊不受尊號天下莫不稱頌末年有建言者國家與契丹有徃來書信彼有尊號而我獨無以爲深耻於是群臣復以非時上尊號漢文帝時單于自稱天地所生日月所置匈奴大單于不聞文帝復爲大名以加之也願陛下追用先帝夲意不受此名上大恱手詔荅公非卿朕不聞此言善爲荅詞使中外曉然知朕至誠非欺衆邀名者遂終身不復受尊號行狀執政以河朔災傷國用不足乞今歲親郊兩府不賜金帛送學士院取旨公言兩府所賜以匹兩計止二萬未足以救災冝皆减半公與學士王珪王安石同對公言救災節用冝自貴近始可聽兩府辭賜安石曰常衮辭賜饌時議以爲衮自知不能當辭位不當辭禄且國用不足非當今之急務也公曰衮辭禄猶賢於持禄固位者國用不足真急務安石言非是安石曰不足者以未得善理財者故也公曰善理財者不過頭㑹箕歛以盡民財民窮爲盗非國之福安石曰不然善理財者不加賦而上用足公曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏澇則秋旱不加賦而上用足不過設法隂奪民利其害甚於加賦此乃桑羊欺漢武帝之言太史公書之以見武帝之不明耳至其未年盗賊蜂起幾至於亂若武帝不悔禍昭帝未變法則漢幾亡争議不巳王珪進曰救災節用冝自貴近始司馬光言是也然所費無幾恐傷國體王安石言亦是惟明主裁擇上曰朕意與光同然姑以不允荅之㑹安石當制遂引常衮事責兩府兩府亦不復辭行狀桉文集公自記此事甚詳又云明日邇英講讀罷上獨留介父與語兩府不敢先出以俟之至晡後乃出不數日叅知政事日録又云臣非謂今者得兩府郊賚能冨國也欲陛下以此爲裁省之始耳且陛下強裁省之則失體今大臣以河北災傷憂公體國自求省郊賚從其請所以成其羙何傷體之有詔公與張茂則同相視二股河及新堤利害公用都水監丞宋昌言䇿乞於二股之西置圡堤約水東流若東流日深北流日淺薪蒭漸備乃塞其北放出御河胡盧河下流以紓恩冀深瀛以西之患時議者多不同公於上前反覆論難甚苦卒從之後皆如公言賜詔奖諭行狀王安石始爲政創立制置三司條例司建爲青苗助役水利均輸之政置提舉官四十餘貟行其法於天下謂之新法公上䟽逆陳其利害曰後當如是行之十餘年無一不如公言者天下傳誦以公爲真宰相雖田父野老皆號公司馬相公而婦人孺子知其爲君實也邇英進讀蕭何曹叅事公曰叅不變何法得守成之道故孝惠髙后時天下晏然衣食滋殖上曰漢常守蕭何之法不變可乎公曰何獨漢也使三代之君常守禹湯文武之法雖至今存可也武王克啇曰乃反啇政政由舊然則雖周亦用啇政也書曰無作聦明亂舊章漢武帝用張湯言取髙帝法紛更之盗賊半天下元帝改宣帝之政而漢始衰由此言之祖宗之法不可變也後數日吕惠卿進講因言先王之法有一年變者正月始和布法象魏是也有五年一變者廵狩考制度是也有三十年一變者刑罰丗輕丗重是也有百年不變者父慈子孝兄友弟恭是也前日光言非是其意以諷朝廷且譏臣爲條例司官耳上問公惠卿言何如公曰布法象魏布舊法也何名爲變若四孟月朔属民讀法爲時變月變耶諸侯有變禮易樂者王廵狩則誅之王不自變也刑新國用輕典亂國用重典平國用中典是爲丗輕丗重非變也且治天下譬如居室弊則脩之非大壞不更造也大壞而更造非得良匠羙材不成今二者皆無有臣恐風雨之不庇也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜可也不可使兩府侵其事今爲制置三司條例司何也宰相以道佐人主尚安用例苟用例則胥史足矣今爲看詳中書條例司何也惠卿不能對則詆公曰光爲侍從何不言言而不從何不去公作而荅曰是臣之罪也上曰相與論是非耳何至是講畢賜坐户外將出上令徙户内左右皆避去上曰朝廷毎更一事舉朝􅿅􅿅何也王珪曰臣踈賤在闕門之外朝廷之事不能盡知借使聞之道路又不知其虚實也上曰聞則當言之公曰靑苗出息平民爲之尚能以蠶食下户至飢寒流離况縣官法令之威乎惠卿曰青苗法願取則與之不願不強也公曰愚民知取債之利不知還債之害非獨縣官不強冨民亦不強也臣聞作法於凉其弊猶貪作法於貪弊將若之何昔太宗平河東立和糴法時米斗十餘錢草束八錢民樂與官爲市後物貴而和糴不解遂爲河東丗丗患臣恐異日之青苗猶河東之和糴也上曰陜西行之乆矣民不以爲病公曰臣陜西人也見其病不見其利朝廷𥘉不許也而有司尚能以病民况立法許之乎上曰坐倉糴米何如坐者皆起曰不便上巳罷之幸甚上曰未罷也公曰京師有七年之儲而錢常乏若坐倉錢益乏米益陳奈何惠卿曰坐倉得米百萬斛則省東南百萬之漕以其錢供京師何患無錢公曰東南錢荒而米狼戾今不糴米而漕錢棄其有餘取其所無農末皆病矣侍講呉申起曰光言至論也公曰此皆細事不足煩人主但當擇人而任之有功則賞有罪則罰此則陛下職也上曰然文王罔攸兼于庶言庶獄庶御名惟有司之牧夫公趨出上曰卿得無以惠卿之言不樂乎公曰不敢行狀邇英留對是日光讀資治通鑑賈山上䟽言秦皇帝居㓕絶之中不自知事因言從諫之羙拒諫之禍上曰舜堲䜛說殄行若臺諫欺罔爲䜛安得不黜光曰進讀及之耳時事臣不敢論也及退上留光謂曰吕公著言藩鎮欲興晉陽之甲豈非䜛說殄行也光曰公著平居與儕軰言猶三思而發何故上前輕發乃爾外人多疑其不然上曰此所謂靜言庸違者也光曰公著誠有罪不在今日向者朝廷委公著專舉臺官公著乃盡舉條例司之人與條例司㸦相表裏使熾張如此乃始逼於公議復言其非此所可罪也上言安石不好官職及自奉養可謂賢者光曰安石誠賢但性不曉事而愎此其短也又不當信任吕惠卿惠卿真姦邪而爲安石謀主安石爲之力行故天下并指安石爲姦邪也上曰今天下詾詾者孫叔敖所謂國之有是衆之所惡也光曰然陛下當審察其是非然後守之今條例司所爲獨安石韓絳吕惠卿以爲是天下皆以爲非也陛下豈能獨與此三人共爲天下邪遂退日録上問近相陳升之外議云何光對陛下擢用宰相臣愚賤何敢與上曰第言之光曰今巳宣麻誕告中外臣雖言何益上曰雖然試言光曰閩人狡險楚人輕易今二相皆閩人二叅政皆楚人必將援引郷黨之士充塞朝廷天下風俗何以更得淳厚上曰然今中外大臣更無可用者獨升之有才智曉民政邊事它人莫及光曰升之才智誠如聖旨但恐不能臨大節而不可奪耳昔漢髙祖論相以爲王陵少戅陳平可以輔之平智有餘然難獨任真宗用丁謂王欽若亦以馬知節叅之凡才智之士必得忠直之人從旁制之此明主用人之法也上曰然升之朕固已誡之光曰富弼老成有人望其去可惜上曰朕所以留之至矣彼堅欲去光曰彼所以欲去者蓋以所言不用與同列不合故也上曰若有所施爲朕不從而去可也自爲相一無施爲唯知求去彼信于尼之言云雖親國家事亦勿與知故也上又曰王安石何如光曰人言安石姦邪則毁之太過但不曉事又執拗耳此其實也上曰韓琦敢當事賢於富弼但木強耳光曰琦實有忠於國家之心但好遂非此其所短也上因歷問群臣至吕惠卿光曰惠卿憸巧非佳士使安石負謗於中外皆惠卿所爲也近日不次進用大不合衆心上曰惠卿明辨亦似羙才光曰惠卿文學辨慧誠如聖旨然用心不端陛下更徐察之江充李訓若無才何以動人主上因論臺諫天子耳目光曰臺諫天子耳目陛下當自擇人今言執政短長者皆斥逐之盡易以執政之黨臣恐聦明將有所蔽蒙也上曰諌官難得卿更爲擇其人光退而舉陳薦蘇軾王元規趙彦若日録庚申延英進讀通鑑三葉畢上更命讀一葉半讀至蘇秦約六國從事上曰蘇秦張儀掉三寸舌乃能如是乎光對曰秦儀爲從横之術多華少實無益於治臣所以存其事於書者欲見當時風俗専以辨說相髙人君委國而聽之此所以謂利口之覆邦家者也上曰朕聞卿進讀終日忘倦光曰臣空踈無取陛下毎過形奬飾不勝惶懼上曰卿進讀毎存幾諫光對曰非敢然也欲陳著述之本意耳日録吕晦叔曰昨使契丹虜中接伴問副使狄諮曰司馬中丞今爲何官諮曰今爲翰林學士兼侍讀學士虜曰不爲中丞邪聞是人甚忠亮晦叔以著於語録日録上謂晦叔曰司馬光方直其如迂闊何晦叔曰孔子上聖子路猶謂之迂孟軻大賢時人亦謂迂闊况光豈免此名大抵慮事深逺則近於迂矣願陛下更察之日録韓琦上䟽論青苗之害上感悟欲罷其法安石稱疾求去㑹拜公樞宻副使公上章力辭至六七曰上誠能罷制置條例司追還提舉官不行青苗助役等法雖不用臣臣受賜多矣不然終不敢受命上遣人謂公樞宻兵事也官各有職不當以它事爲辭公言臣未受命則猶侍從也於事無不可言者安石起視事青苗法卒不罷公亦卒不受命則以書喻安石三徃反開喻切至猶幸安石之聽而改也且曰巧言令色鮮矣仁彼忠信之士於公當路時雖齟齬可憎後必徐得其力謟䛕之人於今誠有順適之快一旦失勢必有賣公以自售者意謂吕惠卿對賔客輙指言之曰覆王氏者必惠卿也小人夲以利合勢傾利移何所不至其後六年而惠卿叛安石上書告其罪苟可以覆王氏者靡不爲也由是天下服公先知行狀八日垂拱登對乞知許州或西京留司御史臺國子監上曰卿何得出外朕欲申卿前命卿且受之光曰臣舊職且不能供求外𥙷况敢當進用上曰何故光曰臣必不敢留上沉吟乆之曰王安石素與卿善卿何自疑光曰臣與王安石素善但自其執政違忤甚多今忤安石者如蘇軾軰皆毀其素履中以危法臣不敢避削黜只欲苟全素履臣善安石豈如公著安石舉公著云何後毀之云何彼一人之身何前是後非必有不信者矣上曰安石與公著如膠􅃮及其有罪不敢隱其惡乃安石之至公也上曰青苗巳有顯効光曰兹事天下知其非獨安石之黨以爲是爾上曰蘇軾非佳士卿誤知之鮮于侁在逺軾以奏藁傳之韓琦贈銀三百兩而不受乃販私塩及蘇木甆器光曰凢責人當察其情軾販鬻之利豈能及所贈之銀乎安石素惡軾陛下豈不知以姻家謝景温爲鷹犬使攻之臣豈能自保不可不早去也且軾雖不佳豈不勝李定定不服母䘮禽獸之不如安石喜之欲用爲臺官日録公言司馬君實𥘉除樞宻副使竟辭不受時公在魏聞之亟遣人賫書與潞公勉之云主上倚重之厚庻幾行道道或不行然後去之可也似不湏堅讓潞公以書呈君實君實云自古被這般官爵引得壞了名莭爲不少矣後得寛夫書云君實作事今人所不可及湏求之古人韓魏公語録又魏公與公書云伏氶懇辭樞弼必䔬感悟上聽大忠大義充塞天地横絶古今竊與海内有志之士同切傾慕俱有執鞭之願焉老先生嘗謂金陵曰介甫行新法乃引用一副當小人或在清要或爲監司何也介甫曰方法行之𥘉舊時人不肯向前因用一切有才力者候法行巳成即逐之却用老成者守之所謂智者行之仁者守之老先生曰介甫誤矣君子難進易退小人反是若小人得路豈可去也若欲去必成讎敵它日將悔之介甫黙然後果有賣金陵者雖悔之亦無及也元城先生語録出知永興軍朝辭進對猶乞免本路青苗助役宣撫使下令分義勇四畨欲以更戍邊選諸將驍勇募閭里惡少爲竒兵調民爲乾粮麨飯雖内郡不被邊皆脩城池樓櫓如邊郡且遣就粮長安河中邠三輔騷然公上䟽極言方㐫歲公私困弊不可舉事而永興一路城池樓櫓皆不急乾粮麨飯昔常造後無用腐棄之宣撫司令臣皆未敢從若乏軍興臣坐之於是一路獨得免行狀熈寧七年上以天下旱蝗詔求直言公讀詔泣下欲黙不忍乃復陳六事一青苗二免役三市易四邊事五保甲六水利此尤病民者冝先罷又以書責宰相呉充天子仁聖如此而公不言何也行狀神宗既退司馬温公一時正人皆引去獨用王荆公盡變更祖宗法度用兵宣利天下始紛然矣帝一日侍太后同祁王至太皇太后宫時宗祀前數日太皇太后曰天氣晴和行禮日亦如此大慶也帝曰然太皇太后曰吾昔聞民間疾苦必以告仁宗常因赦行之今亦當爾帝曰今無它事太皇太后曰吾聞民間甚苦青苗助役錢宜因赦罷之帝不懌曰以利民非苦之也太皇太后曰王安石誠有才學然怨之者甚衆帝欲愛惜保全不若暫出之於外歲餘復召用可也帝曰群臣中惟安石能横身爲國家當事耳祁王曰太皇太后之言至言也陛下不可不思帝因發怒曰是我敗壞天下耶汝自爲之祁王泣曰何至是也皆不樂而罷温公常私記富韓公之語如此而丗無知者崇寜中蔡京等脩哲宗史爲王安石傳至以安石爲聖人然亦書慈聖光獻后宣仁聖烈后因間見上流涕爲言安石變亂天下巳而安石罷相豈安石之罪雖其黨竟不能文耶抑天欲彰吾夲朝母后之賢自不得而刪也帝退安石十年不用元豐末帝屬疾念可以託聖子也獨曰將以司馬光吕公著爲師傅王安石不預也烏乎聖矣哉聞見録熈寧𥘉朝廷遣大理寺丞蔡天申爲京西察訪妄作威福震動一路河南尹轉運使蚤晚衙之甚恭時司馬温公判留司御史臺因朝謁應天院神御殿天申者獨立一班蓋尹以下不敢相壓也旣報班齊温公呼知班曰引蔡寺丞歸夲班知班引天申立監竹木務官富賛善之下蓋朝儀位著以官爲髙下朝謁應天院留臺職也天申即日行聞見録元豐五年公忽得語澁疾自疑當中風乃豫作遺表大略如六事加詳盡感槩親書緘封置卧内且死當以授所善范純仁范祖禹使上之凢居洛十五年再任留司御史臺四任提舉崇福宫行狀孫和甫曰固在西府親見神宗晚年以事無成功當宁太息欲召司馬君實用之時王禹玉蔡持正並在相位相頋失色禹玉憂不知所出持正宻議欲於西邊深入探虜巢穴以爲此議若行必不復召君實雖召將不至自是西師入討夷夏𬒳害死者無筭蓋自西邊用兵神宗嘗持淺攻之議雖一勝一負猶不至大有殺傷至於西邊將帥習知兵事亦無肯言深入者非禹玉持正不歴外任不習邊事無敢開此議者龍川志元豐五年文潞公與富韓公集洛中公卿大夫年德髙者爲耆英㑹以洛中風俗尚齒不尚官就資聖院建大厦曰耆英堂温公年未七十潞公素重其人用唐狄兼謩故事請入㑹温公辭以晚進不敢班富文二公之後潞公謂温公曰彦愽留守北京遣人入大遼偵事回云見虜主大宴群臣伶人劇戯作衣冠者見物必攫取懷之有從其後以挺扑之者曰司馬端明耶君實清名在夷狄如此温公愧謝聞見録温公判西京留司御史臺遂居洛買園於尊賢坊以獨樂名之始與伯温先君子康節先生游嘗曰光陜人先生衛人今同居洛即郷人也有如先生道學之尊當以年德爲貴官職不足道也公嘗問康節曰光何如人康節曰君實脚踏實地人也公深以爲知言康節又曰君實九分人也其重之如此聞見録司馬温公旣居洛時徃夏縣展墓省其兄郎中公爲其群從郷人說書講學或乗興遊荆華諸山以歸多遊壽安山買甆窰畔爲休息之地嘗同范景仁登嵩頂由輍轅道至龍門渉伊水至香山憇石樓臨八節灘凢所經從多有詩什自作序曰遊山録士大夫争傳之公不喜肩輿山中亦乗馬路險䇿杖以行故嵩山題字曰登山有道徐行則不困措足於平稳之地則不跌御名之哉其旨逺矣聞見録温公知永興軍到官踰月上章曰臣之不才最出群臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇决不如范鎮伏望聖恩裁處其罪若臣罪與范鎮同則乞依范鎮例致仕若罪重於鎮或竄或誅所不敢逃帝必欲用公召知許州令過闕上殿方下詔謂監察御史裏行程顥曰朕召司馬光卿度光來否顥對曰陛下能用其言光必來不能用其言光必不來帝曰未論用其言如光者常在左右人主自可無過公果辭召命帝嘗謂左丞蒲宗孟曰如司馬光未論別事只辭樞宻一節朕自即位以來惟見此一人帝之眷禮於公不衰如此特公以新法不罷義不可起元豐官制成帝曰官制將行欲取新舊人兩用之又曰御史大夫非用司馬光不可蔡確進曰國是方定願少俟之王珪亦助其說至元豐七年秋資治通鑑書成進御時拜公資政殿學士賜帶如二府品數者脩書官皆遷秩召范祖禹及公子康爲館職時帝𥘉微感疾旣安語宰輔曰來春建儲以司馬公吕公著爲師保至來春三月未及建儲而帝升遐神宗知公之深如此聞見録神宗崩公赴闕庭衛士見公入皆以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之公懼㑹放辭謝遂徑歸洛太皇太后聞之詰問主者遣使勞公問所當先者公言近歲士大夫以言爲諱閭閻愁苦於下而上不之知明主憂勤於上而下無所訴此罪在群臣而愚民無知歸怨先帝冝下詔首開言路從之下詔榜朝堂而當時有不欲者於詔語中設六事以禁切言者曰若隂有所懷犯非其分或扇搖機事之重或迎合巳行之令上以觀望朝廷之意以僥倖希進下以眩惑流俗之情以干取虚譽若此者必罸無赦太皇太后封詔草以問公公曰此非求諫乃拒諫也人臣惟不言言則入六事矣時有應詔言事而坐越職贖銅者公具論其情且請改賜詔書行之天下從之於是四方吏民言新法不便者數千人公方草具所當行者而太皇太后巳有旨散遣脩京城役夫罷减皇城内覘者止御前工作出近侍之無狀者三千餘人戒飭中外無敢苛刻暴歛廢導洛司物貨埸及民所養户馬寛保馬限皆從中出大臣不與公上䟽謝當今急務陛下略巳行之矣小臣稽慢罪當萬死行狀拜門下侍郎公力辭不許數賜手詔先帝新棄天下天子冲㓜此何時而君辭位耶公不敢復辭𥘉神宗皇帝以英傑絶人之資勵精求治凛凛乎漢宣帝唐太宗之上矣而宰相王安石用心過當急於功利小人得乗間而入吕惠卿之流以此得志後者慕之争先相髙而天下病矣先帝明聖獨覺其非出安石金陵天下欣然意法必變雖安石亦自悔恨其去而復用也欲稍自改而惠卿之流恐法變身危持之不肯改然先帝終疑之遂退安石八年不復召而惠卿亦再逐不用元豐之末天下多故及二聖嗣位民日夜引領以觀新政而進說者以爲三年無改於父之道欲稍損其甚者毛舉數事以塞人言公慨然争之曰先帝之法其善者雖百丗不可變也若安石惠卿等所建爲天下害非先帝夲意者改之當如救焚拯溺猶恐不及昔漢文帝除肉刑斬右趾者棄市笞五百者多死景帝改之武帝作塩鐵搉酤均輸等法昭帝罷之唐代宗縱宦官公求賂遺德宗罷之德宗爲宫市五坊小兒暴横塩鐵使月進羡餘順宗罷之當時恱服後丗稱頌未有或非之者也况太皇太后以母改子非子改父衆議乃定遂罷保甲團教依義勇法歲一閱保馬不復買見在者還監牧給諸軍廢市易法所儲物皆鬻之不取息而民所欠錢皆除其息京東鑄鐵錢河北江西福建湖南塩及福建茶法皆復其舊獨川峽茶以邊用未即罷遣使相視去其甚者戸部左右曹錢榖皆領之尚書凢昔之三司使事有散隷五曹及寺監者皆歸戸部使尚書周知其數量入以爲出元祐元年正月公始得疾詔公與尚書左丞吕公著朝㑹與執政異班再拜而巳免舞蹈公疾益甚歎曰四患未除吾死不瞑目矣乃力疾上䟽論免役五害乞直降敕罷之率用熈寧以前法有未便州縣監司節級以聞爲一路一州一縣法詔即日行之又論西戎大略以和戎爲便用兵爲失時異議甚衆獨太師文彦愽議與公合衆不能奪遂詔諸將兵皆隷州縣軍政委守令通决之又廢提舉常平司以其事歸之轉運使及提點刑獄罷青苗錢専行常平糶糴法行狀公奏以文學德行吏事武略等爲十科以求天下遺材命文臣升朝以上歲舉經明行脩一人如進士髙選皆從之行狀元祐𥘉司馬温公輔政是歲天下斷死刑凢千人其後二吕繼之歲常數倍此豈智力所能勝耶談叢公曰温公當揆路日蓋知後必有反覆之禍然仁人君子如救焚拯溺何暇論異日事元豐之末京東劇冦欲取掊克吏呉居厚投之鑄冶中頼居厚覺蚤間道遁去不然賊殺一轉運使從官得晏然而巳乎劉先生譚録公欲改新法或謂公曰元豐舊臣如章惇吕惠卿軰皆小人它日有以父子之義聞上則朋黨之禍作矣不可不懼公正色曰天若祚宋必無此事遂改之不疑聞見録公忠信孝友恭儉正直出於天性其好學如飢渇之嗜飲食於財利紛華如惡惡臭誠心自然天下信之退居於洛往來陜洛間皆化其德師其學法其儉有不善曰君實得無知之乎愽學無所不通音樂律歴天文書數皆極其妙晚節尤好禮爲冠婚䘮祭法適古今之冝不喜釋老曰其微言不能出吾書其誕吾不信不事生産買第洛中僅庇風雨有田三頃䘮其夫人質田以葬惡衣菲食以終其身自以遭遇聖明言聽計從欲以身徇天下躬親庻務不舎晝夜賔客或以諸葛孔明事多食少之語戒之公曰死生命也爲之益力病革諄諄不復自覺如夢中語然皆朝廷大事也旣沒其家得遺奏八紙上之皆手札論當丗要務京師民畫其像刻印鬻之家置一夲飲食必祝焉四方皆遣人購之京師時畫工有致冨者行狀温公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒毎食少頃則問曰得無飢乎天少冷則拊其背曰衣得無薄乎范太史集晁無咎言司馬温公有言吾無過人者但平生所爲未嘗有不可對人言者耳東坡集公又云司馬文正對賔客無問賢愚長㓜悉以疑事問之有草簿數枚常致坐間苟有可取隨手記録或對客即書率以爲常其書字皆真謹公見時巳有三十餘簿劉先生譚録東都曹生言范右相旣貴接親舊情禮如故它亦不改丗未有也然體靣肥白㓗澤豈其胷中亦以爲樂邪惟司馬温公枯瘦自如豈非不以富貴動其心邪談叢公𥘉患歷代史繁重學者不能綜況於人主遂約戰國至秦二世如左氏體爲通志八卷以進英宗恱之命公讀其書置局祕閣以其素所賢者劉攽劉恕范祖禹爲屬官神宗尤重其書以爲賢於荀恱親爲製叙賜名資治通鑑詔邇英讀其書賜潁邸舊書二千四百二卷書成拜資政殿學士賜金帛甚盛行狀又邵氏後録云温公脩通鑑成進御丞相王珪蔡確見上問何如上曰當略降出不可乆留又咨歎曰賢於荀恱漢紀逺矣罷朝中使以其書至政事堂每葉縫合以睿思殿寳章睿思殿上觀書之所也遼人夏人遣使入朝與吾使至虜中者虜必問公起居及爲相遼人敕其邊吏曰中國相司馬矣御名毋生事開邊隙神道碑公薨京師之民罷市而往弔鬻衣以致奠巷哭以過車者蓋以千萬數上命户部侍郎趙瞻内侍省押班馮宗道護其䘮歸葬瞻等還言民哭公哀甚如哭其私親四方來㑹葬者蓋數萬人而嶺南封州父老相率致祭且作佛事以薦公者其詞尤哀注香於手頂以送公葬者凢百餘人而畫像以祠公者天下皆是也神道碑先生每與司馬君實說話不曽放過如范堯夫十件事只争得三四件便巳先生曰君實只爲能受盡言儘人忤逆終不怒便是好處程氏遺書伯淳道君實之語自謂如人參甘草病未甚時可用也病甚則非所能及觀其自處必是有以救之之術遺書君實之能忠孝誠實只是天資學則元不知學堯夫之坦夷無思慮紛擾之患亦只是天資自羙爾皆非學之功也遺書又曰或問范祖禹曰或謂夫子有言人有篤學力行而不知道者信乎祖禹曰吾甞聞之夫子有指而言之也或云三代以下宰相學術温公一人而巳公以爲何如公曰學術誠然若宰相之才所以圖回四海者未敢以爲第一蓋當時正人多短於才所謂愛而知其惡也劉先生譚録蘇内翰軾作公神道碑銘曰於皇上帝子惠我民孰堪顧天惟聖與仁聖子受命如堯之𥘉神母詔之匪亟匪徐聖神無心孰左右之民自擇相我興授之其相惟何太師温公公來自西一馬二童萬人環之如渇赴泉孰不見公莫如我先二聖忘巳惟公是式公亦無我惟民是度民曰樂哉旣相司馬爾賈于途我耕于野士曰時哉旣用君實我後子先時不可失公如麟鳯不􅋧不搏羽毛畢朝雄狡卒服爲政一年疾病半之功則多矣百年之思知公于異識公于微匪公之思神考是懷天子萬年四夷來同薦于清廟神考之功范太史祖禹作布衾銘記云温國文正公所服之布衾隷書百有十字曰景仁惠者端明殿學士范蜀公所贈也曰堯夫銘者右僕射髙平公所作也元豐中公在洛蜀公自許往訪之贈以是衾先是髙平公作布衾銘以戒學者公愛其文義取而書於衾之首及寢疾東府治命歛以深衣而覆以是衾公於物澹無所好唯於德義若利欲其清如水而澄之不巳其直如矢而端之不止故其居處必有法動作必有禮其𬒳服如陋巷之士一室蕭然圖書盈几終日静坐泊如也又以圎木爲警枕小睡則枕轉而覺乃起讀書蓋恭儉勤禮岀於天性自以爲適不勉而能與二范公爲心交以直道相與以忠告相益凢皆如此其誠心終始如一將殁而猶不忘祖禹觀公大節與其細行雖不可遽數然夲於至誠無欲天下信之故能奮然有爲超絶古今居洛十五年若將終身焉一起而功被天下内之嬰童婦女外之蠻夷戎狄莫不敬其德服其名唯至誠故也公兄子宏得公手澤紙夲于家屬祖禹序其本末俾後丗師公之儉云范集五朝名臣言行録卷第十之一希夷陳先生穆脩种放李之才魏野林逋附先生名摶字圖南亳州眞源人後唐長興中舉進士不中隱居武當山後徙華山雲臺觀周丗宗召至京師賜號白雲先生太宗朝再召賜號希夷先生端拱二年卒陳摶長興末舉進士不第去隱武當山九室巖辟糓練氣二十餘年後居華山雲臺觀多閉門獨卧至百餘日不起周丗宗召至闕下令於禁中扄戸以試之月餘始開摶熟寐如故甚異之因問以黃白之術摶曰陛下爲天下君當以蒼生爲念豈冝留意於爲金乎丗宗不恱放還山令長吏歲時存問太宗即位再召之留闕下數月多延入宮中與語謂宰相宋琪等曰陳摶獨善其身不干勢利眞方外之士遣中使送至中書琪等問曰先生得玄黙脩飬之道可以授人乎曰摶遁迹山野無用於丗練養之事皆所不知無可傳授然正使白日升天何益於治聖上龍顔秀異有天人之表洞逹今古治亂之㫖眞有道仁聖之主正是君臣合德以治天下之時勤行脩練無以加此琪等表上其言上覽之甚喜未幾放還山談苑摶負經綸之才歷五季亂離㳺行四方志不遂入武當山後隱居華山自晉漢以後每聞一朝革命顰蹙數日人有問者瞪目不荅一日方乗驢遊華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時摶甞見天日之表知太平之有自矣遯跡之初有詩云十年蹤跡走紅塵回首青山入夢頻紫陌縱榮争及睡朱門雖貴不如貧愁聞劒㦸扶危主悶見笙歌聒醉人携取舊書歸舊隱野花啼鳥一般春豈淺丈夫哉邵伯温易學辨惑陳摶周丗宗甞召見太平興國初再召赴闕太宗賜詩云曾向前朝出白雲後來消息杳無聞如今若肯隨徴召揔把三峯乞與君先生服華陽巾草屨垂絛以賔禮見賜坐上方欲征河東先生諫止㑹軍巳興令寢於御園兵還果無功百餘日方起恩禮特異乆之辤歸澠水燕談又辨惑云召至闕求一静室休息乃賜舘於建隆觀扃戸熟寐月餘方起詔以野服見上方欲征河東摶諫止之九年復來朝始陳河東可取曁王師再舉果執劉繼元平并州太宗問摶曰昔在堯舜之爲天下今可致否對曰堯舜土堦三尺茅茨不剪其迹似不可及然能以清静爲治即今之堯舜也上善之辨惑陳摶𬒳詔至闕下間有士大夫詣其所止願聞善言以自規誨陳曰優好之所勿乆戀得志之處勿再徃聞者以謂至言倦逰雜録又辨惑云康節甞誦希夷之語曰得便冝事不可再作得便冝處不可再去又曰落便冝是得便冝故康節詩云珎重至人甞有語落便冝是得便冝蓋可終身行之也後復再召摶辭曰九重仙詔休教丹鳯衘來一片野心已𬒳白雲留住辨惑端拱初摶忽命弟子於張超谷鑿石爲室二年七月室成手書數百言爲表其略曰臣摶大數有終聖朝難戀巳於今月二十二日化形於蓮花峯下張超谷中如期而卒筆録摶好讀易以數學授穆脩伯長脩授李之才挺之之才授康節先生邵雍堯夫以象學授种放放授廬江許堅堅授范諤昌此一枝傳於南方也丗但以爲學神仙術善人倫風鑒而已非知圖南者也辨惑穆脩字伯長汶陽人後居蔡州師事圖南而傳其學脩少豪放性𥚹少合多㳺京洛間人甞書其詩句于禁中壁間眞廟見之深加歎賞問侍臣曰此爲誰詩或以穆脩對上曰有文如是公卿何以不薦丁晉公在側曰此人行不逮文由是上不復問蓋伯長與晉公有布衣舊晉公頃赴夔漕伯長猶未仕相遇漢上晉公意欲伯長先致禮伯長竟不一揖而去晉公銜之由是短於上前後晉公貶朱崖徙道州伯長有詩云却訝有虞刑政失四㓙何事不量移可見其不相善也伯長祥符二年梁固牓登進士第調海州理掾以忤通判遂爲捃拾由是削籍隷池州其集中有秋浦㑹遇詩自叙甚詳後遇赦叙潁州文學叅軍故當時呼之曰穆叅軍老益貧家有唐夲韓柳集乃丐於所親厚者得金募工鏤板印數百帙携入京師相國寺設肆鬻之伯長坐其旁有儒生數輩至其肆輙取閱伯長奪取怒視謂曰先輩能讀一篇不失一句當以一部爲贈自是經年不售時學者方從事聲律未知爲古文伯長首爲之唱其後尹源子漸洙師魯兄弟始從之學古文又傳其春秋學辨惑李之才字挺之青州人倜儻不群師事伯長伯長性嚴急稍不如意或至呵叱挺之左右承順如事父兄畧無倦意登科任孟州司戸挺之坦率不事儀矩時太守范忠獻公以此頗不恱挺之自若也後忠獻建節移鎮延安郡僚多送至境外挺之但別于近郊衆或讓之挺之曰異時送太守至於是且情文貴稱范公實不我知而出疆逺送非情豈敢以不情事范公未幾忠獻責守安陸過洛三城故吏無一人徃者獨挺之㳂檄徃省之忠獻始稱嘆遂受知焉又甞爲衛州共城令時先君康節居祖母䘮築室蘇門山百源之上布衣𬞞食三年躬㸑以養先祖挺之聞先君好學苦志自造其廬問先君曰子何所學先君曰爲科舉進取之學耳挺之曰科舉之外有義理之學子知之乎先君曰未也願受教挺之曰義理之外有物理之學子知之乎先君曰未也願受教挺之曰物理之外有性命之學子知之乎先君曰未也願受教於是先君傳其學挺之後終殿中丞簽書澤州判官㕔公事澤人劉羲叟晚出其門受曆法亦爲名士易學則唯先君得之也辨惑种放字明逸隱居終南山豹林谷聞希夷先生之風徃見之希夷先生一日令洒掃庭除曰當有嘉客至明逸作樵夫拜庭下希夷挽之而上曰君豈樵者二十年後當爲顯官名聲聞天下明逸曰放以道義來官禄非所問也希夷笑曰人之貴賤莫不有命君骨相當爾雖晦迹山林恐竟不能安異日自知之後眞宗朝召爲司諫帝携其手登龍圖閣論天下事辭歸山拜諫議大夫後改工部侍郎希夷又謂明逸曰君不娶可得中壽明逸從之至六十歲卒先是希夷爲明逸卜上丗葬地於豹林谷下不定穴旣葬希夷見之言地固佳安穴稍後丗丗當出名將明逸不娶無子自其姪丗衡至今爲將帥有聲希夷解化明逸立碑叙希夷之學曰明皇帝王伯之道云聞見録希夷先生有髙識甞戒門人种放曰子他日遭逢明主不假進取迹動天闕名馳寰海名者古今之美器造物者深忌之天地間無完名子名將起必有物敗可戒之放至晚節侈飾過度營産滿酆鎬間門人戚屬亦怙勢強併嵗入益厚遂䘮清節王嗣宗守京兆乗醉慢罵條奏於朝㑹赦方止記聞云种放以處士召見拜諫官眞宗待以殊禮名動海内後謁歸終南山恃恩驕倨甚王嗣宗時知長安放至通判以下群拜謁放小俛垂手接之而巳嗣宗内不平放召其姪出拜嗣宗嗣宗坐受之放怒嗣宗曰曏者通判以下拜君君扶之而巳此白丁耳嗣宗狀元及第名位不輕胡爲不得坐受其拜放曰君以手搏得狀元耳何足道也嗣宗怒遂上䟽言放實空踈才識無以踰人專飾詐巧盗虚名陛下尊禮放擢爲顯官臣恐天下竊笑益長澆僞之風且陛下召魏野野閉門避匿而放隂結權貴以自薦逹因抉擿言放隂事數條上雖兩不之問而待放之意寖衰祥符八年一旦山齋晚起服道衣聚諸生列飲取平生文藁悉焚之酒數行而逝亦竒男子也玉壷清話种放別業在終南山後生從之學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊爲幽絶眞宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉上嘆賞之其後甘棠魏野居有幽致帝亦遣人圖之故野有詩云幽居帝畫看澠水燕談處士魏野字仲先陜州人居於東郊架草堂有水竹之勝好彈琴作詩清苦多聞於時前後郡守皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋㤗嶽汾隂俱禮畢這廻好伴赤松遊公覽之喜形於色以酒茗藥物爲荅素編先公遺扎有公自冩此詩數夲王文正公遺事仁宗政要云旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宮使又曰魏野謂冦凖曰自古功名蓋丗少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云又温公集云野子閑亦不仕皇祐中賜號清逸處士林逋字君復居杭州西湖之孤山眞宗聞其名賜號和靖處士詔長吏嵗時勞問逋工筆畫善爲詩如草泥行郭索雲木叫鉤輈頗爲士大夫所稱又梅花詩云踈影橫斜水清淺暗香浮動月黃昏評詩者謂前丗詠梅者多矣未有此句也又其臨終爲句云茂陵他日求遺藁猶喜初無封禪書尤爲人稱誦自逋之卒湖山寂寥未有繼者歸田録又筆談云林逋隱孤山畜兩鶴縱之則飛入雲霄盤旋乆之復入籠中逋常汎小艇遊西湖諸寺有客至逋所居則一童子出應門延客坐爲開籠縱鶴良乆逋必棹小舡而歸蓋常以鶴飛爲驗也又青箱雜記云逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此
