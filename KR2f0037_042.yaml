body:
  text: 九之三内翰蘇文忠公公名軾字子瞻老蘇先生之長子中進士第再中制䇿優等除大理評事簽書鳯翔府判官召試直史館丁父憂服除攝開封府推官通判杭州知宻徐湖三州逮赴詔獄以黄州團練副使安置移汝州哲宗即位復朝奉郎知登州召爲禮部郎中起居舎人元祐二年遷中書舎人翰林學士兼侍讀出知杭州六年召爲翰林承旨出守頴州復以兵部尚書召還兼侍讀尋遷禮部兼端明殿翰林侍讀二學士出知定州紹聖元年以夲官知英州貶寧逺軍節度副使惠州安置又貶瓊州別駕昌化軍安置徙廉州再徙永州復官監成都府玉局觀建中靖國元年卒年六十六公生十年而先君宦學四方太夫人親授以書聞古今成敗輙能語其要太夫人嘗讀東漢史至范滂傳慨然太息公侍側曰某若爲滂夫人亦許之否乎太夫人曰汝能爲滂吾頋不能爲滂母耶弟黄門公撰墓誌嘉祐二年歐陽文忠公考試禮部進士疾時文之詭異思有以救之梅聖俞時與其事得公論刑賞以示文忠文忠驚喜以爲異人欲以冠多士疑曽子固所爲子固文忠門下士也乃寘公第二復以春秋對義居第一以書謝諸公文忠見之以書語聖俞曰老夫當避此人放出一頭地士聞始譁不厭乆乃信伏墓誌東坡言頃試制科中程後英宗皇帝即欲便授知制誥相國韓公曰蘇軾之才逺大之器也他日自當爲天下用要在朝廷培飬之使天下之士莫不畏慕降伏皆欲朝廷進用之然後取而用之則人人無復異辭矣今驟用之則天下之士未必以爲然適足以累之也英宗曰且與脩注如何韓公曰記注與制誥爲隣未可遽授不若且於館閣中擇近上貼職予之它日擢用亦未爲晚乃授直史館東坡聞之曰公可謂愛人以德矣李廌談記王介甫用事多所建立公與介甫議論素異旣還朝寘之官告院四年介甫欲變更科舉上疑焉使兩制三館議之公議上即日召見問何以助朕公辭避乆之乃曰臣竊意陛下求治太急聽言太廣進人太銳願陛下安静以待事來然後應之上竦然曰卿言朕當詳思之介甫之黨皆不恱命攝開封推官意以多事困之公决斷精敏聲聞益逺㑹上元有旨市浙燈公宻䟽舊例無有不冝以玩好示人即有旨罷殿前𥘉䇿進士舉子希合爭言祖宗法制非是公爲考官退擬荅以進深中其病自是論事愈力介甫愈恨墓誌謝景温言范鎮舉蘇軾爲諌官軾向丁憂多占舟舡販私鹽蘇木及服闋入京多占兵士介甫𥘉爲政每賛上以獨斷上專信任之軾爲開封府試官䇿問進士以晉武平呉以獨斷而克符堅伐晉以獨斷而亡齊桓專任管仲而覇燕噲專任子之而敗事同而功異何也介甫見之不恱軾弟轍辭條例司言青苗不便介甫尤怒乃定制䇿登科者不復試館職以軾轍兄弟故也軾有表弟選人素與軾不叶介甫使人召之問軾過失其人言向丁憂販私鹽蘇木等事介甫雖衘之未有以發之軾又數上章言時政得失今春擬進士䇿皆譏刺介甫及詔兩制舉諫官衆論以爲當今冝爲諫官者無若傳堯俞蘇軾故舉堯俞者六士人而景仁舉軾景温恐軾爲諌官攻介甫之短故以榜語力排之介甫下淮南江南東西荆湖北夔州成都六路轉運司體量其狀蓋軾眉州人其入京也適夲州迎新守軾因帶以來耳温公目録通判杭州是時四方行青苗免役市易浙西兼行水利鹽法公於其間常因法以便民民頼以少安髙麗入貢使者凌蔑州郡押伴使臣皆夲路筦庫乗勢驕横至與鈴轄亢禮公使人謂之曰逺夷慕化而來理必恭順今爾暴恣非汝導之不至是也不悛當奏之押伴者懼爲之小戢使者發幣於官吏書稱甲子公却之曰髙麗於本朝稱臣而不禀正朔吾安敢受使者亟易書稱熈寧然後受之時以爲得禮墓誌徙知宻州時方行手實法使民自䟽財産以定户等又使人得告其不實司農寺又下諸路不時施行者以違制論公謂提舉常平官曰違制之坐若自朝廷誰敢不從今出於司農是擅造律也若何使者驚曰公姑徐之未幾朝廷亦知手實之害罷之宻人私以爲幸志言郡甞有盗竊發而未獲安撫轉運司憂之遣三墓使臣領悍卒數十人入境捕之卒凶暴恣行以禁物誣民入其家爭闘至殺人畏罪驚散欲爲亂民訴之公投其書不視曰必不至此潰卒聞之少安徐使人招岀戮之墓誌自宻徙徐是歲河决曹村泛于梁山泊溢于南清河城南兩山環繞吕梁百歩扼之匯于城下漲不時洩城將敗冨民爭出避水公曰冨民若出民心動揺吾誰與守吾在是水决不能敗城驅使復入公履屨杖䇿親入武衛營呼其卒長謂之曰河將害城事急矣雖禁軍冝爲我盡力卒長呼曰太守猶不避塗潦吾儕小人効命之秋也執挺入火伍中率其徒短衣徒跣持畚鍤以出築未南長堤首起戯馬臺尾屬於城堤成水至堤下害不及城民心乃安然雨日夜不止河勢益暴城不沉者三板公廬於城上過家不入使官吏分堵而守卒完城以聞復請調來歲夫増築故城爲木岸以虞水之再至朝廷從之訖事詔褒之徐人至今思焉墓誌徙知湖州以表謝上言事者擲其語以爲謗遣官逮赴御史獄𥘉公旣𥙷外見事有不便於民者不敢言亦不敢黙視也縁詩人之義託事以諷庻幾有𥙷於國言者從而媒蘖之上𥘉薄其過而浸潤不止至是不得巳從其請旣付獄吏欲必寘之死鍛煉乆之不决上終怜之促其獄以黄州團練副使安置公幅巾芒屨與田父野老相從溪谷之間築室於東坡自號東坡居士三年上有意復用而言者沮之上手札徙汝州略曰蘇軾黜居思咎閱歲滋深人材實難不忍終棄未至上書自言有飢寒之憂有田在常願得居之書朝入夕報可士大夫知上之卒喜公也㑹晏駕不果復用墓誌又龜山語録云爲文要有温柔敦厚之氣對人主語言及章䟽文字温柔敦厚尤不可無如子瞻詩多所譏玩殊無惻怛愛君之意荆公在朝論事多不循理惟是争氣而巳何以事君君子之所飬要令暴慢邪僻之氣不設於身躰又曰凡詩必使言之者無罪聞之者足以戒此所以尚譎諌也如東坡詩則言之安得無罪而聞之豈足以戒乎又元城語録云東坡下御史獄張安道致仕在南京上書救之欲附南京逓府官不敢受乃令其子恕至登聞鼓院投進恕徘徊不敢投乆之東坡出獄其後東坡見其副夲因吐舌色動乆之人問其故東坡不荅其後子由亦見之云冝吾兄之吐舌也此事正得張恕力或問其故子由曰獨不見鄭昌之救蓋寛饒乎其䟽有云上無許史之屬下無金張之托此語正是激宣帝之怒爾且寛饒正以犯許史軰有此禍今乃再訐之是益其怒也且東坡何罪獨以名太髙與朝廷争勝耳今安道之䟽乃云其實天下之竒材也獨不激人主之怒乎傼日然則是時救東坡者冝爲何說先生曰但言本朝未甞殺士大夫今乃開端則是殺士大夫自陛下始而後丗子孫因而殺賢士大夫必援陛下以爲例神宗好名而畏義疑可以此止之蘇東坡旣貶黄州神宗殊念之嘗語宰相王珪蔡確曰國史至重可命蘇軾成之珪有難色又曰軾不可姑用曽鞏鞏進太祖緫論不當神宗之意未幾罷去聞見後録王介甫與蘇子瞻𥘉無隙吕惠卿忌子瞻才髙輙間之中丞李定亦介甫客也不服母䘮子瞻以爲不孝作詩詆之定以爲恨劾子瞻作詩謗訕遂下御史獄謪居黄州後移汝州過金陵見介甫甚𣢾子瞻曰軾欲有言於公介甫色動意子瞻辯前日事也子瞻曰軾所言者天下事也介甫色定曰姑言之子瞻曰大兵大獄漢唐滅亡之兆祖宗以仁厚治天下正欲革此今西方用兵連年不解東南數起大獄公獨無一言以救之乎介甫舉手兩指示子瞻曰二事皆惠卿啓之安石在外安敢言子瞻曰固也然在朝則言在外則不言事君之常禮耳上所以待公者非常禮公所以事上者豈可以常禮乎介甫厲聲曰安石湏說又曰出在安石口入在子瞻耳蓋介甫嘗爲惠卿發其無使上知私書尚畏惠卿恐子瞻泄其言也介甫又語子瞻曰人湏是知行一不義殺一不辜得天下弗爲乃可子瞻戯曰今之君子争減半年磨勘雖殺人亦爲之介甫笑而不言聞見録温公議改免役爲差役差役行於祖宗之丗法乆多弊編户充役不習官府又虐使之多以破産而狹郷之民或有不得休息者先帝知其然故爲免役使民以戸髙下岀錢而無執役之苦行法者不循上意於雇役實費之外取錢過多民遂以病若量岀爲入毋多取於民則足矣温公知免役之害而不知其利欲一切以差役代之方差官置局公亦與其選獨以實告而君實不恱嘗見之政事堂條陳不可温公忿然公曰昔韓魏公刺陜西義勇公爲諫官争之甚力魏公不樂公亦不頋軾昔聞公道其詳豈今日作相不許軾盡言耶温公笑而止墓誌除侍讀進讀至治亂盛衰邪正得失之際未嘗不反覆開導覬上有所覺悟上雖恭黙不言聞公所論說輙肯首善之甞侍上讀祖宗寳訓因及時事公歴言今賞罸不明善悪無所勸沮又黄河勢方西流而強之使東夏人冦鎮戎殺掠幾萬人帥臣揜蔽不以聞朝廷亦不問事每如此恐寖成衰亂之漸墓誌諫官言前宰相蔡持正知安州作詩借郝處俊事以譏刺時事大臣議遷之嶺南公宻䟽言朝廷若薄確之罪則於皇帝孝治爲不足若深罪確則於太皇太后仁政爲小累謂冝皇帝降敕置獄逮治而太皇太后内岀手詔赦之則仁孝兩得矣墓誌杭州大旱飢疫並作公請於朝免夲路上供米三之一故米不翔貴復得賜度僧牒百易米以救飢者明年方春即減價糶常平米民遂免大旱之苦公又作饘粥藥劑遣吏挾醫分坊治病活者甚衆公曰杭水陸之㑹因疫病死比它處常多乃裒羡緡得二千復發私槖得黄金五十兩以作病坊稍畜錢粮以待之至于今不廢墓誌杭本江海之地水泉鹹苦唐刺史李泌始引西湖水作六井民足於水及白居易復浚西湖淤水入運河自河入田所漑至千頃然湖水多葑乆廢開治至是積二十五萬餘丈而水無幾矣運河失湖水之利取給於江潮潮濁多淤河行圜闠中三年一淘爲市井大患而六井亦幾廢公始至浚二河以茅山一河受江潮以鹽橋一河受湖水復造堰閘以爲湖水畜洩之限然後潮不入市且以餘力復完六井又取葑田積湖中爲長堤以通南北募人種菱湖中而収其利以備修湖杭人名其堤曰蘇公堤云墓誌頴有宿賊尹遇等數人群黨驚刼殺變主及捕盗吏兵者非一朝廷以名捕不獲𬒳殺者噤不敢言公召汝隂尉李直方謂之曰君能禽此當力言於朝乞行優賞不獲亦以不職奏免君矣直方退緝知群盗所在分命弓手往捕其黨而躬往捕遇直方有母年九十母子泣別而行手㦸刺而獲之然小不應格推賞不及公爲言於朝請以年勞改朝散郎階爲直方賞朝廷不從其後吏部以公當遷以符㑹考公自謂巳許直方卒不報墓誌元祐七年上祀南郊公以兵部尚書爲鹵簿使上因太廟宿齋行禮畢特至青城儀衛甚肅五使乗車至景靈宫東䡼門外忽有赭傘犢車百餘兩衝突而來東坡呼御營廵檢使立於車前曰西來誰何敢爾亂行曰皇后并某國太夫人國婆婆乃上之乳母某國大長公主也東坡曰可以狀來比至青城諭儀仗使御史中丞李端伯之純曰中丞職當肅政不可不聞李以中宫不敢言東坡曰軾當自奏即於青城上䟽劾之明日中使傳命申敕有司嚴整仗衛談記髙麗使請書於朝朝廷以故事盡許之公曰漢東平王請諸子及太史公書猶不肯予今髙麗所請有甚於此其可予乎不聽墓誌知定州定乆不治軍政尤㢮武衛卒驕堕不教軍校蠶食其廩賜故不敢何問公取其貪汙甚者配隷逺惡然後繕脩營房禁止飲博軍中衣食稍足乃部勒以戰法衆皆畏伏然諸校多不自安者有卒史復以贓訴其長公曰此事吾自治則可汝若得告軍中亂矣亦决配之衆乃定㑹春大閱軍禮乆廢將吏不識上下之分公命舉舊典元帥常服主帳中將吏戎服奔走執事副緫管王光祖自謂老將耻之稱疾不岀公召書吏作奏將上光祖震恐而出訖事無敢慢者定人言自韓衛公去不見此禮至今矣北戎乆和邊兵不試臨事有不可用之憂惟㳂邊弓箭社兵與寇爲鄰以戰射自衛猶號精銳故相龐公守邊因其故俗立隊伍將校出入賞罰緩急可使歲乆法弛復爲保甲所撓漸不爲用公奏爲免保甲及兩稅折變科配長吏以時訓勞不報議者惜之墓誌公謫惠州獨以少子過自隨瘴癘所侵蠻蜒所侮胷中泊然無所芥蔕人無賢愚皆得其驩心疾苦者卑之藥殞斃者納之竁又率衆爲天橋以濟病渉者惠人愛敬之后三年大臣以流竄者爲未足也四年復以瓊州別駕安置昌化昌化非人所居食飲不具藥石無有所僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚土運甓以助之爲屋三間人不堪其憂公食芋飲水著書以爲樂時從其父老逰亦無間也墓誌公平生篤於孝友輕財好施伯父太白早亡子孫未立杜氏姑卒未葬先君沒有遺言公旣除䘮即以禮葬姑及官可䕃𥙷復以奏伯父之曽孫彭其於人見善稱之如恐不及見不善斥之如恐不盡見義勇於敢爲而不頋其害用此數困於丗然終不以爲恨孔子謂伯夷叔齊古之賢人曰求仁而得仁又何怨公實有焉墓誌祖父甞云子瞻有盛名於丗而退無自矜之色此爲過人蘇氏談訓八之二樞宻使狄武襄公公名青字漢臣汾州西河人少隷軍籍選爲散直寳元初陜西用兵岀𥙷延州指使以功累遷涇原路副都緫管經略招討副使入爲馬歩軍副都指揮使以彰化軍節度使知延州擢樞宻副使皇祐中儂智髙反以宣徽南院使宣撫荆湖南北路經制廣南盗賊事賊平拜樞宻使以使相岀判陳州薨年五十公風骨竒偉善騎射里閭俠少多從之初㳺京師遂𥙷拱聖籍中寳元之初元昊叛河西兵岀數無功公自散直爲延州指使延帥知公敢行故常使當賊鋒凡數歳間大小二十五戰捕虜萬有餘獲馬牛羊槖駞鎧仗符印車輜器物以數萬計甞破賊金湯城遂略宥州之境燔其積聚數萬廬舎數千收其帳二千三百五口五千七百又城橋子谷築招安豐林新寨大郎堡皆扼賊要害使不能闚邊上欲召見公㑹㓂薄平凉因命圖形以進繇是天下知公名王禹玉撰神道碑又東齋記事云狄青與西賊戰每帶銅面具𬒳髪出入行陣間凢八中箭累功至招討副使而上未識其面遂令圖形以進寳元中党項犯塞時新募萬勝軍未習戰陣遇㓂多北狄青爲將一日盡取萬勝旗付虎翼軍使之出戰虜望其旗易之全軍徑趨爲虎翼所破殆無遺類筆談青在涇原嘗以寡當衆度必以竒勝預戒軍中盡捨弓弩皆執短兵宻令軍中聞鉦一聲則止再聲則嚴陣而陽却鉦聲止則大呼而突之士卒皆如其教纔遇敵未接戰遽聲鉦士卒皆止再聲皆却虜人大笑相謂曰孰謂狄天使勇時虜人謂青爲天使鉦聲止忽前突之虜兵大亂相蹂踐死者不可勝計也筆談狄青戍涇原日嘗與虜戰大勝追奔數里虜忽壅遏山踊知其前必遇險士卒皆欲奮擊青遽鳴鉦止之虜得引去驗其處果臨深澗將佐皆悔不擊青獨曰不然奔亡之虜忽止而拒我安知非謀軍已大勝殘㓂不足利得之無所加重萬一落其術中存亡不可知寜悔不擊不可悔不止筆談廣源州蠻儂智髙以其衆叛乗南方無備連破邕賔等七州至廣州所至殺吏民縱掠東南大駭朝廷遣驍將張忠蔣偕馳驛討之甫至則皆爲智髙所摧䧟又遣楊畋孫沔余靖招撫皆乆之無功仁宗憂之遂遣樞宻副使狄青爲宣撫使率衆擊之翰林學士曽公亮問所以爲方略者青初不肯言公亮固問之青廼曰比者軍制不立又自廣川之敗賞罰不明今當立軍制明賞罰而已然恐賊見青來以謂所遣者官重勢必不得見之公亮又問賊之摽牌殆不可當如何青曰此易耳摽牌歩兵也當騎兵則不能施矣初張忠蔣偕之往率皆自京師六七日馳至廣州未甞拊士卒立行伍一旦見賊則疾驅使戰又偕等所居不知爲營衛故士卒皆望風退走而忠臨陣偕方卧帳中悉爲賊所虜楊畋余靖又所爲紛亂不能自振而孫沔大受請託所與行者廼朱從道鄭紓歐陽乾曜之徒皆險薄無賴欲有所避免邀求沔引之自從逺近莫不嗟異旣至潭州沔遂稱疾觀望不敢進青之受命有因貴近求從青行者青延見謂之曰君欲從青行此青之所求也何必因人之言乎然智髙小㓂至遣青行可以知事急矣從青之士能擊賊有功朝廷有厚賞青不敢不爲之請也若徃而不能擊賊則軍中法重青不敢私也君其思之願行則即奏取君矣非獨君也君之親戚交逰之士幸皆以青此言告之苟欲行者皆青之所求也於是聞者大駭無復敢言求從青行者其所辟取皆青之素所與以爲可用者人望固巳歸矣及行率衆日不過一驛所至州輒休士一日至潭州遂立行伍明約束軍行止皆成行列至於荷鍤贏粮持守禦之備皆有區處軍人有奪逆旅菜一把者斬之以徇於是一軍肅然無敢出聲氣萬餘人行未甞聞聲青毎止郵驛四靣嚴兵毎門皆諸司使二人無一人得妄出入而求見青者無不即時得通其野宿皆成營栅青所居四靣陳兵彀弓弩皆數重所將精銳列布左右守衛甚嚴方青之未至諸將屢敗屢走皆以爲常至是知桂州崇儀使陳某知英州供備庫使蘇緘與賊戰復敗走如常時青至賔州悉召陳與裨校凡三十二人數其罪按軍法斬之唯蘇緘在某所使械繫上聞於是軍中人人奮勵有死戰之心是時智髙還守邕州青懼崑崙關險阨爲所據乃下令賔州具五日糧休士卒賊諜知不爲備是夜大風雨青率衆半夜時度崑崙關旣度喜曰賊不知守此無能爲也彼謂夜半風雨吾不敢來吾來所以出其不意也巳近邕州賊方覺逆戰於歸仁鋪青登髙望之賊據坡上我軍薄之裨將孫節中流矢死青急麾軍進人人皆殊死戰先是青巳縱蕃落馬二千出賊後至是前後合撃賊之標牌軍爲馬軍所衝突皆不能駐軍士又從馬上鐵連枷擊之遂皆披靡相枕籍死賊遂大敗智髙果焚城遁去青先與公亮言立軍制明賞罰賊不可得見標牌不能當騎兵皆如其所料青坐堂户之上論數千里之外辭約而慮明雖古之名將何以加此豈特一時之武人崛起者乎方慶曆中葛懷敏與李元昊戰於廣川懐敏敗死而諸校與士卒旣敗多竄山谷間是時以權冝招納皆許不死自此軍多棄其將不肯死戰故青云自廣川之敗賞罰不行翰林學士蔡襄亦言聞於青者如此南豐雜識初樞宻副使狄青自請擊智髙以青爲宣徽南院使荆湖南北路宣撫使都大提舉經制廣南東西路賊盗事諫官韓絳上言狄青武人不足專任固請以侍從文臣爲之副上以訪執政時龐籍獨爲相對曰屬者王師所以屢敗皆由大將權輕偏裨人人自用遇賊或進或退力不能制也今青起於行伍若以侍從之臣副之彼視青如無青之號令復不得行是循覆車之軌也青素名善戰今以二府將大兵討賊若又不勝不惟嶺南非陛下之有荆湖江南皆可憂矣禍難之興未見其涯不可不畏青昔在鄜延居臣麾下沉勇有智略若專以智髙事委之使青先以威齊衆然後用之必能辦賊幸陛下勿以爲憂也上曰善於是詔嶺南用兵皆受青節度處置民事則與孫沔等議之時余靖軍于賔州聞智髙將至棄其城及芻粮走保邕智髙䧟賔州靖引兵出揚言邀賊留監押守邕州監押亦走智髙復入邕州十一月狄青至湖南諸道兵皆㑹諸將聞宣撫使將至爭先立功余靖遣廣南西路鈐轄陳某將萬人擊智髙爲七寨逗遛不進十二月壬申朔智髙與某戰於金城驛某敗遁歸死者二千餘人棄捐器械輜重甚衆交趾王德政請出兵二萬助収智髙狄青奏官軍自足辦賊無用交趾兵丁未詔交趾母出兵青又請西邊蕃落廣銳近二千騎與俱五年正月青至賔州余靖陳某皆來迎謁時饋運未至青初令備五日糧旣又備十日糧智髙聞之由是懈惰不爲備上元張燈髙㑹先是諸將視其帥如僚寀無所嚴憚毎議事各執所見喧爭不用其命己酉狄青悉集將佐於幕府立陳某於庭下數其敗軍之罪并軍校數十人皆斬之諸將股栗莫敢仰視余靖起拜曰某之失律亦靖節制之罪青曰舎人文臣軍旅之責非所任也於是勒兵而進歩騎二萬或說儂智髙曰騎兵利平地冝遣兵守崑崙關勿使度險俟其兵疲食盡擊之無不勝者智髙驟勝輕官軍不用其言青倍道兼行出崑崙關直趣其城智髙聞之狼狽發兵出戰戊午相遇於歸仁鋪青使步卒居前匿騎兵於後蠻使驍勇者執長槍居前羸弱悉在其後其前鋒孫節戰不利而死將卒畏青令嚴力戰莫敢退者青登髙丘執五色旗麾騎兵爲左右翼出槍之後斷蠻軍爲三旋而擊之槍立如束蠻軍大敗殺獲三千餘人獲其侍郎黃師宓等智髙走還城官軍追之營其城下夜營中驚呼蠻聞之以爲官軍且進攻棄城走明日青入城遣裨將于振追之過田州不及而還智髙奔大理捷書至上喜謂龐籍曰嶺南非卿執議之堅不能平今日皆卿功也狄青還上欲以爲樞宻使同平章事籍曰昔曹彬平江南太祖謂之曰朕欲以卿爲使相然今敵尚多卿爲使相安肯復爲朕盡死力耶賜錢二十萬緍而巳今青雖有功未若彬之大若賞以此官則冨貴極矣異日復有㓂盗青更立功將以何官賞之狄青宣撫廣西時儂智髙守崑崙關青至賔州值上元節令大張燈燭首夜燕將佐次夜燕從軍官三夜饗軍校首夜樂飲徹暁次夜二鼓時青忽稱疾暫起如内乆之使人諭孫元規令暫主席行酒少服藥乃出數使人勸勞座客至曉各未敢退忽有馳報者云是夜三鼓青巳奪崑崙矣筆談又東軒筆録云狄青之征儂智髙也自過桂林即以辨色時先鋒行先鋒旣行青乃出帳受衙罷命諸將坐飲酒一巵小餐然後中軍行率以爲常及頓軍崑崙關下翊日將度關晨起諸將詣帳立甚乆而青尚未坐殆至日髙親吏疑之遽入帳周視則不知青所在諸將方相頋驚愕俄有軍候至曰宣徽傳語諸官請過關喫食方知青巳㣲服同先鋒度關矣此事二書不同未知孰是公入邕州獲金貝巨萬畜數千悉分戯下賊所俘脅皆慰遣之歛積尸爲京觀于城北尸有衣金龍之衣者又得金龍楯於其傍或言智髙巳死亂兵中當亟作奏者公曰安知其非詐寧失智髙敢欺朝廷耶神道碑又筆談云狄青平嶺㓂賊帥儂智髙兵敗奔邕州其下皆欲窮其窟穴青亦不從以謂趨利乗勢入不測之城非大將事智髙因而獲免天下皆罪青不入邕州脫智髙於垂死然青之用兵主勝而已不求竒功故未甞大敗計功最多卒爲名將譬如奕棊已勝敵可止矣然猶攻擊不巳徃徃大敗此青之所戒也臨利而能戒乃青之過人處也狄青爲樞宻使是時予爲諫官人有相語童謡云漢似胡兒胡似漢改頭換面揔一般只在汾河川子畔以爲青汾河人面有刺字不肯㓕去又姓狄爲漢人此歌爲是人作也爲不疑矣欲予言之予應之曰此唐太宗殺李君羡事上安忍爲適以啓君臣疑心耳范蜀公東齋記事公器度深逺今相國韓公故資政殿大學士范文正公之爲西帥也皆隷其節下咸竒之日此國器也文正甞以左氏春秋授公曰熟此可以斷大事將不知古今疋夫之勇不足爲也公於是晚節益喜書史旣明見時事成敗尤好節義其在涇原也起居舎人尹洙與公同經略招討安撫使事洙有文武才略愽通古今常稱公曰古之名將無以過也公於交遊在亡不渝師魯後以貶死公厚䘏其孤如至親焉余襄公撰墓誌其徙眞定道過故郷謁縣先下車趨至令庭遂燕故老於纛下里中榮之公事親孝遭父䘮雖衽金革之事而哀戚過人養母尤篤征南之日懼遺其憂戒内外不以治兵事聞第云奉使江表而已始行至邕㑹瘴霧之氣昏鬱中人或謂賊流毒水中飲者多死忽一夕泉湧于郊汲之甘洌遂濟其衆神道碑公之南征今觀文孫公沔與公偕行其軍中之政公實專之至于南夏經乆之制多讓孫公裁處談者嘉其謙挹墓誌狄青作眞定副帥甞宴公惟劉易先生與焉易性素踈訐時優人以儒爲戯易勃然謂黥卒敢如此詬詈武襄不絶口至擲樽爼以起公是時觀武襄氣殊自若不少動笑語益温次日武襄首造劉易謝公於是時巳知其有量韓魏王别録陜西豪士劉易多遊邊喜談兵寳元康定間韓魏公宣撫五路薦之賜處士號易善作詩魏公爲書石或不可其意則發怒洗去魏公欣然再書不憚尹師魯帥平凉延易府第尊禮之狄武襄代師魯遇之亦厚每燕設易喜食苦馬菜不得之即叫怒無禮廟廷之下入拜夫人甚恭以郎君之禮待其子弟其異於人如此聞見録京師火禁甚嚴將夜分即滅燭故士庶家凡有醮祭者必先關廂吏以其焚楮幣在中夕之後故也至和嘉祐之間狄武襄爲樞宻使一夕夜醮而句當人偶失告報中夕驟有火先探卒馳白廂主又報開封知府到宅則火滅乆矣翊日都下盛傳狄相公家有光恠燭天者時劉敞爲知制誥聞之語權知開封府王素曰昔朱全忠居午溝夜光恠出屋鄰里謂失火而徃救則無之今日之異得無類此乎此語喧於縉紳間狄不自安遽乞陳州遂薨於鎮而夜醮之事竟無人爲辨之者東軒筆録或云青在樞府四年毎出軍士必指以相誇青家甞有犬生角又時彗出紫㣲垣青去而滅云
