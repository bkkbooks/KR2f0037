body:
  text: 三之二叅政趙康靖公公名槩字叔平應天府虞城人中進士第授將作監丞通判海州知漣水軍入爲開封府推官知洪青滁州召修起居注以天章閣待制糾察在京刑獄知制誥岀知蘇州入翰林爲學士復岀知鄆州徙應天府拜御史中丞爲樞宻副使叅知政事神宗即位以觀文殿學士知徐州明年以太子少師致仕後十五年卒年八十六公七歲而孤篤學自力年十七舉進士當時文人劉筠戚綸黄宗旦皆稱其文詞必顯於時而其器識宏逺則皆自以爲不及蘇内翰撰神道碑天聖五年擢進士第三人授將作監丞通判海州歸見父老故人幅巾徒歩人人至其家神道碑出知洪州屬吏有鄭陶饒奭者挾持郡事肆爲不法前守莫能制州有歸化兵皆故盗賊配流巳而選充者奭與郡人胡順之共造飛語以動公曰歸化兵得廩米陳惡有怨言不更給善米且有變公笑不荅㑹歸化卒有自容州戍所逃還犯夜者公即斬以徇収陶下獄得其姦贓具奏徙奭歙州一郡股栗神道碑知青州賦稅未入中限勑縣不得輒催科是嵗夏稅先一月辦神道碑原叔曰趙槩與歐陽脩同在舘及同修起居注槩性重厚寡言脩意輕之及脩除知制誥是時韓范在中書以槩爲不文乃除天章閣待制槩澹不以屑意及韓范出乃復除知制誥㑹脩甥嫁爲脩從子晟妻與人淫亂事覺語連及脩脩時爲龍圗閣直學士河北都轉運使疾韓范者皆欲文致脩罪云與甥亂上怒獄急群臣無敢言者槩乃上書言脩以文學爲近臣不可以閨房曖昧之事輕加汙衊臣與脩蹤跡素踈脩之待臣亦薄所惜者朝廷大體耳書奏上不恱人皆爲之懼槩亦澹然如平日乆之脩終坐降爲知制誥知滁州執政私曉譬槩令求岀迺岀知蘇州遭䘮去官服闋除翰林學士槩復表讓以歐陽脩先進不可超越奏雖不報持論羙之記聞㑹郊祀當進階封且任一子京官公乞以封母郡太君宰相爲公曰方爲學士擬封不乆矣公曰母八十二朝夕不可期願及今以爲榮許之後遂以爲例改知審官院判祕閣與髙若訥同判流内銓若訥言徃甞知貢舉聞母病不得出幾不能生公矍然即請郡以便親宰相謂旦夕爲學士可少待也公不聽遂除蘇州神道碑姦人冷清詐稱皇子遷之江南曰清言不妄不可遷若詐亦不可不誅詔公與包拯雜治之得其實乃誅清神道碑以太子少師致仕居睢陽十五年猶以讀書著文憂國愛君爲事集古今諌諍爲諌林一百二十卷奏之上甚喜賜詔曰士大夫請老而去者皆以聲迹不至朝廷爲髙得卿所奏書知有志愛君之士雖退休山林未甞一日忘也當置坐右以時省閱神道碑公爲人樂易深中恢然偉人也平生與人實無所怨怒非特不形於色而已專務掩惡揚善以德報怨出於至誠非強勉者天下稱之庶幾漢劉寛唐婁師德之徒云始歐陽脩躐公爲知制誥人謂公不能平及修坐累對詔獄人莫敢爲言獨公抗章言脩無罪爲仇人所傷陛下不可以天下法爲仇人報怨上感悟脩以故得全公旣老脩亦退居汝隂公自睢陽徃從之游樂飲旬日蘇舜欽爲進奏院以群飲得罪公言預㑹者皆一時名人若舉而棄之失士大夫望非朝廷福甞舉張浩浩以贓敗竄海上公坐貶六年而憐浩終不衰間使人至海上勞問賙給之代馮浩爲鄆州吏舉桉浩侵用公使錢三十萬當以浩職田租償官公曰浩吾同年也且知其貧不可以已俸償之公所爲大略如此至於敦尚義舊葬死養孤蓋不可勝數神道碑蘇内翰軾銘公之碑曰惟古任人仁義是圗仁近於弱義近於迃課其功利歲計有餘在漢孝文發政之𥘉欲以利口登進嗇夫有臣釋之實矢厥謨丗謂長者絳侯相如皆訥於言有口若無豈効此子喋喋巧䛕帝用感悟老成是親清凈無爲監于暴秦歷祀四百丗載其仁赫赫我宋以聖繼神於穆仁祖如嵗之春招延朴忠屏逺佞人豈獨左右刑於庶民惟時趙公含德不發如圭如璧如金如錫置之不愠用之不懌帝嘉其心長者之傑遂授以政歴佐三葉濟于艱難不疐不䟦公在朝廷靖恭寡言不忮不求孰知其賢望其容皃有恥而悛薄夫以敦鄙夫以寛今其亡矣吾誰與存作此銘詩以詔後昆二之四太尉魏國王文正公公名旦字子明魏州人中進士第知平江縣通判鄭州拜右正言知制誥趙昌言叅知政事公其子壻也表請辭職改集賢殿修撰昌言罷乃復舊職眞宗即位爲翰林學士咸平四年拜工部侍郎叅知政事景德三年遂進拜同平章事從封泰山祀汾隂兼玉清昭應宫使又爲迎奉聖像天書刻玉兖州太極觀奉上寳冊使公素羸多疾至是屢求退拜太尉兼侍中五日一朝視事遇軍國重事不以時入叅决以疾懇辭冊拜太尉玉清昭應宫使是年九月薨年六十一乾興初詔配享眞宗廟庭仁宗篆其碑首曰全德元老之碑且詔史臣歐陽脩銘之王晉公祜事太祖爲知制誥太祖遣使魏州以便冝付之告曰使還與卿王溥官職時溥爲相也蓋魏州節度使符彦卿太宗夫人之父有飛語聞于上祜徃別太宗於晉邸太宗却左右欲與之語祜徑趨出祜至魏得彦卿家僮二人挾勢恣横以便冝决配而巳及還朝太祖問曰汝敢保符彦卿無異意乎祜曰臣與符彦卿家各有百口願以臣之家保符彦卿又曰五代之君多因猜忌殺無辜故享國不長願陛下以爲戒帝怒其語直貶護國軍行軍司馬華州安置七年不召太宗即位以兵部侍郎召不及見而薨𥘉祜赴貶時親賔送於都門外謂祜曰意公作王溥官職矣祜笑曰祜不做兒子二郎必做二郎者文正公旦也祜素知其必貴手植三槐于庭曰吾子孫必有爲三公者巳而果然天下謂之三槐王氏云聞見録文正公通判鄭州建言請天下置常平倉以抑兼并爲人嚴重能任大事避逺權勢不可干以私爲學士時嘗奏事退上目送之曰爲朕致太平者必斯人也錢宣靖公名知人常稱公有宰相器上甞問以羣臣可大用者錢以公對上曰吾固巳知之矣遂以爲叅知政事公扈從在澶淵雍王元份留守得暴疾命公代之公曰願宣㓂凖來臣有所陳凖至公奏曰十日之間未有捷報時當如何上良乆黯然曰立皇太子遺事上在澶淵遣公還守東都旣至直入禁中下令甚嚴使人不得傳播後車駕自河北還公家人及子弟軰皆出迎於郊外忽聞後有呵喝之聲驚而視之乃公也其處事謹宻如此遺事公與人寡言笑其語雖簡而能以理屈人黙然終日莫能窺其際及奏事上前群臣異同公徐一言以定今上爲皇太子太子諭德見公稱太子學書有法公曰諭德之職止於是耶歐公撰神道碑又遺事云張士遜言皇太子學書甚好公曰皇太子不待應舉選學士去不必學書由是文懿日以善道規賛皇太子趙德明言民飢求糧百萬斛大臣皆曰德明新納誓而敢違請以詔書責之眞宗以問公公請勑有司具粟百萬於京師詔德明來取眞宗大喜德明得詔書慙且拜曰朝廷有人神道碑契丹奏請歲給外别假錢幣上以示公公曰東封甚近車駕將出以此探朝廷之意耳上曰何以荅之公曰止當以微物而輕之也乃於歲給三十萬物内各借三萬仍諭次年額内除之契丹得之大慙次年復下有司契丹所借金帛六萬事屬微末仰依常數與之今後永不爲例遺事大中祥符中天下大蝗眞宗使人於野得死蝗以示大臣明日他宰相有䄂死蝗以進者曰蝗實死矣請示於朝率百官賀公獨以爲不可後數日方奏事飛蝗蔽天眞宗顧公曰使百官方賀而蝗如此豈不爲天下笑邪神道碑又遺事所載與此同但云諸公皆謝曰王旦逺識非臣等所及公但歛容退身而巳宦者劉承規以忠謹得幸病且死求爲節度使眞宗以語公曰承規待此以瞑目公執以爲不可曰他日將有求爲樞宻使者奈何至今内臣官不過留後神道碑薛簡肅公天禧𥘉爲江淮發運使辭王文正公王無他語但云東南民力竭矣薛退而謂人曰眞宰相之言也湘山野録張士遜出爲江西轉運使辭公於政事堂且求教公從容曰朝廷搉利至矣士遜起謝後迭更是職思公之言未甞求錐刀之利識者曰此運使最識大體遺事景德中李迪賈邊皆舉進士有名當時及就省試主文咸欲取之旣而二人皆不與取其卷視之迪以賦落韻邊以當仁不讓於師論以師爲衆與注䟽異說乃爲奏具道所以乞特收試時王文正公爲相議曰迪雖犯不考然出於不意其過可恕如邊特立異說將令後生務爲穿鑿漸不可長遂收迪而黜邊國朝事實宫禁火災公馳入對上驚惶語公曰兩朝所積朕不妄費一朝殆盡誠可惜也公對曰陛下冨有天下財帛不足憂所慮者政令賞罰有所不當臣備位宰府天災如此臣當罷免繼上表待罪上乃降詔罪已許中外上封事言朝政得失後有大臣言非天災乃榮王宫失於火禁請置獄出其狀當斬决者數百人公持以歸翌日乞獨對曰初火災陛下降詔罪己臣上表待罪今反歸咎於人何以示信且火雖有迹寧知非天譴邪果欲行法願罪臣以明無狀上欣然聽納減死者幾百輩遺事公在昭應宫齋宿寳符閣役工有墜死者公得報繳奏曰陛下崇奉上靈爲民祈福今反傷民損財豈合天意乞諭有司省工惜費遺事石普知許州不法朝廷議欲就劾公曰普夲武人不明典憲恐恃薄效妄有生事必湏重行乞召歸置獄乃下御史俟普至按之一日而獄具議者以爲不屈國法而保全武臣眞國體也遺事公任事乆人有謗公於上者公輙引咎未甞自辨至人有過失雖人主盛怒可辯者辯之必得而後巳日者上書言宫禁事誅籍其家得朝士所與徃還占問吉凶之說眞宗怒欲付御史問狀公曰此人之常情且語不及朝廷不足罪眞宗怒不解公因自取甞所占問之書進曰臣少賤時不免爲此必以爲罪願并臣付獄眞宗曰此事巳發何可免公曰臣爲宰相執國法豈可自爲之幸於不發而以罪人眞宗意解公至中書悉焚所得書旣而眞宗悔復馳取之公曰臣已焚之矣由是獲免者衆神道碑上出喜雨詩示二府公䄂歸諭同列曰上詩有一字誤冩莫進入改却王欽若曰此亦無害欽若退宻奏之翌日上怒謂公曰昨日詩有誤字何不奏來公再拜謝曰臣昨日得詩未暇再閱有失奏陳不勝惶懼諸公皆再拜獨樞宻馬公知節不拜具以實奏又曰王旦略不辯眞宰相器也上顧公笑遺事中書有事關送宻院事礙詔格冦萊公凖在樞府特以聞上以責公公拜謝引咎堂吏皆遭責罰不踰月宻院有事送中書亦違舊詔堂吏得之欣然呈公公曰却送與宻院吏岀白冦公冦公大慙翌日見公曰同年甚得許大度量公不荅名臣遺事又龜山語録云昔王文正在中書冦萊公在宻院中書偶倒用了印萊公湏勾吏人行遣它日宻院亦倒用了印中書吏人呈覆亦欲行遣文正問吏人汝等且道宻院當𥘉行遣倒用印者是否曰不是文正曰旣是不是不可學他不是更不問王欽若陳堯叟馬知節同在樞府一日上前因事忿争上召公公至則見欽若諠譁不巳馬公流涕曰願與王欽若同下御史府公廼叱欽若曰王欽若對上豈得如此下去上大怒乃命下獄公從容曰欽若等恃陛下顧厚上煩陛下譴訶當行朝典然觀陛下天顔不怡願且還内來日取旨上許之翌日上召公問欽若等事當如何公曰欽若等當黜然未知坐以何罪上曰朕前忿争無禮公曰陛下奄有天下而使大臣坐忿争無禮之罪恐夷狄聞之無以威逺上曰卿意如何公曰願至中書召欽若等宣示陛下􅍭容之意且戒約之俟少間罷之未晚上曰非卿之言朕固難忍後月餘欽若等皆罷遺事是時契丹𥘉請盟趙德明亦納誓約願守河西故二邊兵罷不用眞宗遂欲以無事治天下公以謂宋興三世祖宗之法具在故其爲相務行故事謹所改作進退能否賞罰必當眞宗乆而益信之所言無不聽也雖他宰相大臣有所請必曰王旦以謂如何事無大小非公所言不决公在相位十餘年外無夷狄之虞兵革不用海内冨庶群工百司各得其職故天下至今稱爲賢相神道碑王沂公曾張文節公知白陳彭年叅預政事因白公曰每奏事其間有不經上覽者公但批旨奉行恐人言之以爲不可公遜謝而巳一日奏對公退諸公留身上巳驚曰有何事不與王旦同來諸公以前說對上曰旦在朕左右多年朕察之無毫髮之私自東封後朕諭以小事一靣奉行卿等當謹奉之諸公退而愧謝公曰向蒙諭及不可自言曾得上旨然今後更頼諸公規益名臣遺事公於用人不以名譽必求其實苟賢且才矣必乆其官衆以爲冝某職然後遷其所薦引人未甞知冦凖爲樞宻使當罷使人私公求爲使相公大驚曰將相之任豈可求耶且吾不受私凖深恨之巳而制出除凖武勝軍節度使同中書門下平章事凖入見泣涕曰非陛下知臣何以至此眞宗具道公所以薦凖者凖始媿歎以爲不可及故叅知政事李穆子行簡有賢行以將作監丞居于家眞宗召見慰勞之遷太子中允初遣使者召之不知其所止眞宗命至中書問王旦然後人知行簡公所薦也公自知制誥至爲相薦士尤多其後公薨史官修眞宗實録得内出奏章乃知朝廷之士多公所薦者神道碑眞宗時王文正公爲相賔客雖滿坐無敢以私干之者旣退公察其可與言者及素知名者使吏問其居處數月之後召與語從容乆之詢訪四方利病或使䟽其所言而獻之觀其才之所長宻籍記其名他日其人復來則謝絶不復見也每有差除公先宻䟽三四人姓名請於上上所用者輙以筆點其首同列皆莫之知明日於堂中議其事同列爭欲有所引用公曰當用某人同列爭之莫能得及奏入未甞不獲可同列雖疾之莫能間也丁謂數毀公於上上益親厚之記聞諫議大夫張師德謁向文簡公曰師德兩詣王相公門皆不得見恐爲人輕毀望公從容明之一日方議知制誥公曰可惜張師德向公曰何謂公曰累於上前說張師德名家子有士行不意兩及吾門狀元及第榮進素定但當静以待之耳若復奔競使無階而進者當如何也向公方以師德之意啓之公曰旦處安得有人敢輕毀人但師德後進待我淺也向公固稱師德適有闕望公弗遺公曰第緩之使師德知聊以戒貪進激薄俗也名臣遺事張尚書知成都召還朝議以任中正代之言者以爲不可是時王文正公爲相上責問之對曰非中正不能守詠之規它人徃妄有變更矣上是之言者亦伏王之能用人也湘山野録以病求罷入見滋福殿眞宗曰朕方以大事託卿而卿病如此因命皇太子拜公公言皇太子盛德必任陛下事因薦可爲大臣者十餘人其後不至宰相者李及凌䇿二人而巳然亦皆爲名臣神道碑又政要云眞宗命太子拜旦旦惶恐走避太子隨而拜之仁宗㓜年尊重大臣巳如此公乆疾不愈上命肩輿入禁中使其子雍與直省吏扶之見於延和殿勞勉數四命曰卿今疾亟萬一有不諱使朕以天下事付之誰乎公謝曰知臣莫若君惟明主擇之再三問不對是時張詠馬亮皆爲尚書上曰張詠如何不對又曰馬亮如何不對上曰試以卿意言之公強起舉笏曰以臣之愚莫若㓂凖上憮然有間曰凖性剛𥚹卿更思其次公曰他人臣所不知也臣病困不任乆侍遂辭退公薨歲餘上卒用凖爲相記聞王太尉薦冦萊公爲相萊公數短太尉於上前而太尉專稱其長上一日謂太尉曰卿雖稱其美彼專談卿惡太尉曰理固當然臣在相位乆政事闕失必多凖對陛下無所隱益見其忠直此臣所以重凖也上由是益賢太尉初萊公在藩鎮甞因生日造山棚大宴又服用僣侈爲人所奏上怒甚謂太尉曰冦凖毎事欲效朕可乎太尉徐對曰凖誠賢能無如騃何上意遽解曰然此止是騃耳遂不問記聞又名臣遺事云冦萊公在長安因生日爲㑹有所過當轉運使以聞上怒以狀示公公覽狀笑曰冦凖許大年幾尚騃耶因奏請録付凖使自知過萊公皇恐待罪陳彭年任翰林學士日求對歸詣政府公延見之陳起呈其狀曰科場條貫公投之於地曰内翰做官幾日待隔截天下進士陳惶懼而退時向文簡同在中書一日陳再來公不見曰令到集賢㕔相見旣而向岀陳所留文字公瞑目取紙封之向曰何不一覽公曰不過興建符瑞圖進爾遺事公甞與楊文公評品人物文公曰丁謂乆逺果何如對曰才則才矣語道則未他日在上位使有德者助之庶得終吉若獨當權必爲身累後謂果被流竄遺事上欲命王欽若作相公曰欽若遭逢陛下恩禮巳隆且乞在樞宻院兩府亦均臣見祖宗朝未嘗有南方人當國雖古稱立賢無方然須賢士乃可臣爲宰相不敢沮抑人此亦公議也上遂止後公罷欽若乃相出語人曰爲王公遲却我十年作宰相遺事公爲兖州景靈宫朝修使内臣周懷政同行或乗間請見公必俟從者盡至冠帶以出見於堂隍周乃白事而退後周以事敗方知公逺慮不渉嫌忌之間遺事王文正公或歸私第不去冠帶入静室中黙坐家人惶恐莫敢見者而不知其意後公弟以問趙公安仁趙公曰見議事公不欲行而未决此必憂朝廷矣名臣遺事王文正公晚年官重毎家人出賀立令止之因語其弟曰遭遇如此愈増憂懼何可賀也公每有賜子見家人置於庭下乃瞑目而歎曰生民膏血安用許多名臣遺事公事寡嫂謹與其弟旭友悌尤篤任以家事一無所問而務以儉約率勵子弟使在冨貴不知爲驕侈兄子睦欲舉進士公曰吾嘗以太盛爲懼其可與寒士爭進至其薨也子素猶未官遺表不求恩澤神道碑又韓魏公别録云王文正母弟傲不可訓一日逼冬至祠家廟列百壺於堂前弟皆擊破之家人惶駭文正忽自外入見酒流滿路不可行俱無一言但攝衣歩入堂其後弟忽感悟復爲善終亦不言公每見家人服飾似過即瞑目曰吾門素風一至於此亟令减損故家人或有一衣稍華必於車中易之不敢令公見焉遺事有貨玉帶者公弟以呈公公曰如何弟曰甚佳公命繫之曰還見佳否弟曰繫之安得自見公曰自負重而使觀者稱好無乃勞乎我腰間不稱此物亟還之故平生所服止於賜帶名臣遺事王太尉不置田宅曰子孫當各念自立何必田宅置之徒使爭財爲不義耳温公日録王文正太尉局量寛厚未甞見其怒飲食有不精㓗者但不食而巳家人欲試其量以少埃墨投羮中公惟啖飯而巳家人問其何以不食羮曰我偶不喜肉一日又墨其飯公視之曰吾今日不喜飯可具粥其子弟愬於公曰庖肉爲饔人所私食肉不飽乞治之公曰汝輩人料肉幾何曰一斤今但得半斤食其半爲饔人所廋公曰盡一斤可得飽乎曰盡一斤固當飽曰此後人料一斤半可也其不發人過皆類此甞宅門壤主者徹屋新之暫於廊廡下啓一門岀入公至側門門低據鞍俯伏而過都不問門畢復行正門亦不問有控馬卒歲滿辭公公問汝控馬幾時曰五年矣公曰吾不省有汝旣去復呼回曰汝乃某人乎於是厚贈之乃是逐日控馬但見背未甞視其面因去見其背方省筆談公病危上臨視賜白金五千兩公召楊大年於床前作辭章旣成乃自書四句云己懼多藏况無用處見謀散施以息咎殃是夕公薨文公歎曰精爽不亂如此文公因至上前語及上令内司賔取元草視之後榮國夫人謁章獻太后語曰上見公表泣下乆之遺事王魏公與楊文公大年友善疾篤延大年於卧内託草遺奏言忝爲宰相不可以將盡之言爲宗親求官止叙平生遭遇之意表上眞宗歎惜之遽遣就第取子弟名數録進記聞公端重介直操履堅正明逹治體接物若甚和易而風格峻整當官涖事莊厲不可犯妙於啓奏言簡理順有識略善鎮定大事惜重名器叙進材品必使人得其所士雖咈於己者亦不以私廢公冲澹寡欲奉身至薄所居甚陋眞宗嘗欲爲治之公以先人舊廬懇辭而止𬒳服質素家人欲以繒錦飾氊席拒而不許婚姻不求門閥事寡嫂有禮與弟旭友愛甚篤李文靖公居相位王文正公旦叅預朝政一日便殿論邊事退王文正公歎曰何日邊候徹警使吾軰得爲太平宰輔文靖公不荅至中書獨召文正公語之唯聖人能内外無患自非聖人外寧必有内憂譬人有疾常在目前則知憂而治之沆死子必爲相遽與虜和親一朝疆場無事不有盤㳺之樂必興土木之功矣及祥符間契丹旣脩好兵革不用近習任事之人始建議封泰山祀汾隂築玉清昭應宫崇奉天書耗用寖廣文正公常悒悒不自得然不忍獨善其身以去曰誰爲國家抗群小者乃薦先祖文靖公曁王沂公曾等二十餘人布列于位所以小人卒不能勝而成仁宗持盈之業文正公之勲也吕氏家塾記契丹旣受盟而歸冦公毎有自多之色雖上亦以自得也王欽若深患之一日從容言於上曰此春秋城下之盟也諸侯猶且耻之而陛下以爲功臣竊不取眞宗愀然不樂曰爲之奈何欽若度上厭兵即謬曰陛下以兵取幽燕乃可刷耻上曰河朔生靈始免兵革之禍吾安能爲此可思其次欽若曰唯有封禪太山可以鎮服四海誇示夷狄然自古封禪當得天瑞希丗絶倫之事然後可爲也旣而又曰天瑞安可必得前代蓋有以人力爲之者矣惟人主深信而崇奉之以明示天下則與天瑞無異也上乆之乃可然王旦方爲相上心憚之曰王旦得無不可乎欽若曰臣得以聖意喻旦冝無不可乗間爲旦言之旦黽勉而從然上意猶未决莫適與籌之者它日晚幸袐閣唯杜鎬方直宿上驟問之曰古所謂河岀圖洛岀書果何事耶鎬老儒不測上旨漫應之曰此聖人以神道設教耳其言適與上意㑹上由此意决遂召王旦飲酒於内中歡甚賜以樽酒曰此酒極佳歸與妻孥共之旣歸發之乃珠子也由是天書封禪等事旦不復異議旦爲相才有過人者然至此不能力爭議者少之蓋旦之爲人類馮道皆偉然宰相器也道不幸生於亂丗死生之際不能自立旦事眞宗言聽諫從安於勢位亦不能以正自終其實與道何異祥符之末每有大禮輙奉天書以行旦爲天書使常邑邑不樂旣寢疾欲削髮披緇以歛素善楊大年死後諸子欲從之大年不可乃止雖冨貴終身實不得志也龍川志眞宗臨御歲乆中外無虞與群臣燕語或勸以聲妓自樂王文正公性儉約初無姬侍其家以二直省官治錢上使内東門司呼二人者責限爲相公買妾仍賜銀三千兩二人歸以告公公不樂然難逆上旨遂聽之蓋公自是始衰數歲而捐館舎初沈倫家破其子孫鬻銀器皆錢塘錢氏昔以遺中朝將相者花籃火筩之類非家人所有直省官與沈氏議止以銀易之具白於公公嚬蹙曰吾家安用此其後姬妾旣具乃呼二人問昔沈氏什器尚在可求否二人謝曰向私以銀易之今見在也公喜用之如素有聲色之移人如此龍川志歐陽公撰公神道碑銘曰烈烈魏公相我眞宗眞廟翼翼魏公配食公相眞宗不言以躬時有大事事有大疑匪卜匪筮公爲蓍龜公在相位終日如黙問其夷狄包褁兵革問其卿士百工以職問其庶民耕織衣食相有賞罰功當罪明相所黜升惟否惟能執其權衡萬物之平孰不事君胡能必信孰不爲相其誰有終公薨于位太尉之崇天子孝思來薦清廟侑我聖考惟時元老天子念功報公之隆春秋從享萬祀無窮作爲歌詩以諗廟工五朝名臣言行録卷第二之二
