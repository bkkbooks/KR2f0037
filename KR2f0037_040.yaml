body:
  text: 九之一中書舎人曽公公名鞏字子固建昌軍南豐人中嘉祐二年進士第爲太平州司法叅軍召編校史館書籍歷館閣校勘集賢校理兼判官誥院嘗爲英宗實録院檢討官不踰月罷出通判越州歴知齊襄洪州進直龍圖閣知福州召判太常寺未至改知明州徙亳州又徙滄州入對留判三班院遷史舘脩撰管勾編脩院兼判太常寺元豐五年四月擢試中書舎人九月丁母憂明年四月卒年六十五爲通判歲飢度常平不足仰以賑給而田居野處之人不能皆至城郭至者群聚有疾癘之虞前期喻屬縣召冨人使自實粟數緫得十五萬石視常平價稍増以予民民得從便受粟不出田里而食有餘粟價爲平又岀錢粟五萬貸民爲種粮使隨歳賦入官農事頼以不乏弟文昭公撰行述爲州務去民疾苦急姦強盗賊而寛貧弱曰爲人害者不去則吾民不寧是時州縣未屬民爲保伍公獨行之部中使幾察居人行旅出入經宿皆籍記有盗則鳴鼓相援又設方略明賞購急追捕且開人自言故盗發輙得有葛友者屢剽民家以名捕不獲一日自出告其黨公與𫀆帶酒食假以騎從輦所購金帛隨之徇諸部中盗聞多出自言友智力兼人公外視章顯實欲携貳其徒使之不能復合也齊俗悍強喜攻刼至是豪宗大姓歛手莫敢動冦攘屏迹州郡肅清行述公在齊㑹朝廷變法遣使四出公推行有方民用不擾使者或希望私欲有所爲公亦不聽也河北發民濬河調及它路齊當出夫二萬縣𥘉按籍二丁三丁出夫一公括其隠漏後有至九丁出一夫者省費數倍又損役人以紓民力㢮無名渡錢爲橋以濟往來徙傳舎自長清抵博州以逹于魏視舊省六驛人皆以爲利其餘力比次案牘簿書藏之以十五萬計至它州亦然旣罷州人絶橋閉門遮留夜乗間乃得去行述在洪㑹歲大疫自州至縣鎮亭傳皆儲藥以授病者民若軍士不能自飬者以官舎舎之資其食飲衣衾之具以庫錢佐其費責醫候視記其全失多寡以爲殿最人頼以生安南軍興道江西者詔爲萬人備州縣暴賦急歛芻粟價踴貴百姓不堪公獨不以煩民前期而辦又爲之區處次舎井㸑什器皆有條理兵旣過而市里不知也行述福多佛寺爲僧者利其冨饒争欲爲主守賕請公行公俾其徒自相推擇籍其名以次𥙷之授文據廷中却其私謝以絶左右徼求之敝民出家者三歲一附籍殆萬人闔府徼賂至裒錢數千萬公至不禁而自止廢寺二皆囊槖爲姦者禁婦女毋入寺舎行述公所至岀教事應下縣責其屬度緩急與之期期未盡不復移書督趣期盡不報按其罪期與事不相當聽縣自言別與之期而桉與期者即有所追逮州不遣人至縣縣母遣人呼其門縣𥘉未甚聽公小則罰典吏大則并劾縣官於是莫敢慢事皆先期而集民不知擾所省文移數十陪事在州者督察勾稽皆有程式分任僚屬因能而使公緫攬綱條責成而巳蓋公所領州多號難治及公爲之令行禁止吏莫敢不自盡政巨細畢舉庭無留事囹圄屢空人徒見公朝夕視事數刻而罷若無所用心者不知其所操者約且要而聦明威信足以濟之故不勞而治也吏民𥘉或憚公嚴巳而皆安其政旣去乆而彌思之行述公自爲小官至在朝廷挺立無所附逺迹權貴繇是愛公者少爲編校書籍積九年自求𥙷外轉徙六州更十餘年人皆爲公慊然而公處之自若也公於是時旣與任事者不合而小人乗間又欲擠之一時知名士往往坐刺譏辭語廢逐公於慮患防微絶人逺甚政事㢮張操縱雖出于巳而未嘗廢法自用以其故莫能中傷公亦不爲之動也行述天子察公賢欲用公一日手詔中書門下曰曽鞏以史學見稱士類冝典五朝史事遂以爲脩撰近丗脩國史必衆選文學之士以大臣監緫未有以五朝大典獨付一人如公者公夙夜討論未及屬藁㑹正官名擢中書舎人不俟入謝諭使就職時自三省至百執事選授一新除吏日至數十人人舉其職事以戒辭約義盡論者謂有三代之風上亦數稱其典雅行述公性謹嚴而待物坦然不爲疑阻於朋友喜盡言雖取怨怒不悔也於人有所長獎勵成就之如弗及與人接必盡禮有懷不善之意來者俟之益恭至使其人心恱而去遇僚屬盡其情未甞有所按謫有以過誤抵法者力爲辯理無事而後巳在官有所市易取賈必以厚予賈必以薄於門生故吏以幣交者一無所受福州無職田歳鬻園𬞞収其直自入常三四十萬公曰太守與民争利可乎罷之後至者亦不復取也行𫐠曽子固𥘉爲太平州司户守張伯玉前軰人也歐陽公王荆公諸名士共稱子固文章伯玉殊不頋間語子固吾方作六經閣其爲之記子固凢謄藁六七終不當伯玉之意則謂子固曰吾自爲之其書于紙曰六經閣者諸子百家皆在焉不書尊經也云云子固始大畏服益自勵於學矣聞見後録子曽子𥘉見神宗上問曰卿與王安石布衣之舊安石何如對曰安石文學行義不减楊雄然吝所以不及古人曰安石輕富貴非吝也對曰非此之謂安石勇於有爲吝於改過上頷之談叢曽子固罷檢討以錢醇老代之元素曰曽公知山隂賤市民田數十頃爲人所訟曽易占時在越幕說守倅曰曽宰髙科它日將貴顯用兹事敗之可惜父㑹爲明守衰老冝與謀俾代其子任咎守倅從之㑹由是坐贓追停曽公猶以私坐監當深德易占後易占以信州縣宰坐贓英州編管亡匿於曽公別墅㑹赦自出俾子固訟冤再劾復往英州因死焉子固時不奔喪爲郷議所貶介甫爲作辨曽子以解之子固及第郷人作感皇恩道埸以爲去害也子固好依漕勢以陵州依州陵縣依縣陵民温公日録案曽公父死南都杜祈公爲治其䘮時惟公在側今文集有謝杜公書可見也又荆公作墓誌亦言至南京病卒此云不奔喪者温公傳聞之悞也中書舎人王震序公之文曰南豐先生以文章名天下乆矣異時齒髮壯志氣銳其文章之慓鷙奔放雄渾瓌偉若三軍之朝氣猛獸之抉江湖之波濤煙雲之姿狀一何竒也方是時先生自負要似劉向不知以韓愈爲何如爾中間乆外徙丗頗謂偃蹇不偶一時後生軰鋒出先生泊如也晚還朝廷天下望用其學而屬新官制遂掌書命於是更置百官舊舎人無在者巳試即入院方除目填委占紙肆書𥘉若不經意午漏盡授草院吏上馬去凢除郎御史數十人所以夲法意原職守而爲之訓敕者人人不同咸有新趣而衍𥙿雅重自成一家余時爲尚書郎掌付制吏部一日得盡觀始知先生之學雖老不衰而大手筆自有人也七之三東染院使种公公名丗衡字仲平工部侍郎放之兄子以䕃𥙷將作監主簿歷知涇陽縣通判鳯州坐事流竇州徙汝州監徐州酒簽書同州鄜州判官事遷内殿崇班知青澗城事慶曆三年遷東染院使充環慶路兵馬鈐轄知環州五年卒年六十一君少尚氣節昆弟有欲㭊其家者君推資産與之惟取季父圖書而已范公撰墓誌种丗衡甞知武功縣用刑嚴峻杖人不使執拘之使自凭欄立塼上受杖杖垂畢足或落塼則更從一數之人亦服其威信或有追呼不使人執帖入郷村但以片紙牓縣門云追某人期某日詣縣廷其親識見之驚懼走告之皆如期而至記聞种丗衡知澠池縣葺館舎設什器乃至砧􅍫匕筯無不畢備客至如歸由是聲譽大振縣旁山上有廟丗衡葺之其梁重大衆不能舉丗衡乃令縣幹剪髮如手搏者驅數對於馬前云欲詣廟中教手搏傾城人隨徃觀之旣至而不教謂觀者曰汝曹先爲我致廟梁然後觀手搏衆欣然趨下山共舉之須臾而上其權數皆此類記聞初康定元年春夏戎犯延安我師不利朝廷以堡障衆多有分兵之患其間逺不足守者即命罷之㓂驕而貪益侵吾疆百姓被其毒君時爲大理丞任鄜州從事建言延安東北二百里有故寛州請因其廢壘而興之以當㓂衝左可致河東之粟右可固延安之勢北可圖銀夏之舊有是三利朝廷從之以君董役事君膽勇過人雖俯逼戎落曽不畏憚與兵民暴露數月且戰且城然處險無泉議不可守鑿地百有五十尺始至于石工徒拱手曰是不可井矣君曰過石而下將無泉耶爾其屑而出之凢一畚償爾百金工復致其力過石數重泉果沛發飲甘而不耗萬人歡呼曰神乎雖虜兵重圍吾無困渇之患矣用是復作數井兵民馬牛皆大足自兹西陲堡障患無泉者悉倣此大蒙利焉旣而朝廷署故寛州爲青澗城授君内殿承制知城事墓誌种丗衡初至青澗城逼近虜境守備單弱芻粮俱乏丗衡以官錢貸商旅使致之不問所出入未幾倉廪皆實又教吏民習射雖僧道婦人亦習之以銀爲射的中者輒與之旣而中者益多其銀重輕如故而的漸厚且小矣或爭徭役優重亦使之射射中者得優處或有過失亦使之射射中則釋之由是人人皆能射士卒有病者常使一子視之戒以不愈必笞之撫養羗屬親入其家得歡心爭爲之用㓂至屢破之部落待遇如家人有功者或解所服金帶或撤席上銀器遺之比數年青澗城遂成冨彊於延州諸寨中獨不求益兵運芻粮記聞胡酋蘇慕恩部落最強丗衡皆撫而用之甞夜與恩飲出侍姬以佐酒旣而丗衡起入内潜於壁隙窺之慕恩竊與侍姬戯丗衡遽出掩之慕恩慙懼請罪丗衡笑曰君欲之邪即以遺之由是得其死力諸部有貳者使慕恩討之無不克記聞青澗東北一舎而逺距無定河河之北有虜寨虜常濟河爲患君屢使屬羗撃之徃必破走前後取首級數百牛羊萬計未甞勞士卒也故功多而費寡建營田二千頃歳取其利募商賈使通其貨或先貸之本速其流轉嵗時間其息十倍乃建白城中芻糧錢幣曁軍湏城守之具皆不煩外計一請自給有兀二族受夏戎僞署君遣人招之不聽即使慕恩出兵誅之死者半歸者半盡以其地曁牛羊賞諸有功其僣受僞署如兀二族者百餘帳咸股慄請命納其所得文劵袍帶由是屬羗無復敢貳君戒諸族各置烽火夏戎時來抄掠則舉烽相告衆必介馬而待之破賊者數四墓誌初种丗衡在青澗爲屬吏所訟不法事按驗皆有狀鄜延路經略使龐公奏丗衡披荆棘立青澗城若一一拘以文法則邊將無所措手足詔勿問及徙知環州將行别龐公拜且泣曰丗衡心膓鐵石也今日爲公下淚矣記聞慶曆三年春范文正公廵邊至爲環慶經略使知環州以屬羗多懷貳心宻與元昊通以种丗衡素得屬羗心而青澗城巳完乃奏徙丗衡知環州以鎮撫之有牛奴訛素屈強未甞出見州官聞丗衡至乃來郊迎丗衡與約明日當至其帳慰勞部落是夕雪深三尺左右曰奴訛凶詐難信且道險不可行丗衡曰吾方以信結諸胡可失期邪遂冒雪而往旣至奴訛尚寢丗衡蹴起之奴訛大驚曰吾丗居此山漢官無敢至者公了不疑我邪帥部落羅拜皆感激心服記聞又名臣傳云丗衡佯醉卧其帳中奴訛與其妻環侍不敢離左右旣醒而謂曰我醉卧此爾何不殺我奴訛泣曰是何言耶惟有一死可報吾父爾自是屬羗無不恱服涇原葛懷敏定川之敗戎馬入縱于渭予領慶州蕃漢兵往扼邠城又召君分援涇原即時而赴羗兵從者數千人屬羗爲吾用自此始君曰羗兵旣可用矣乃復教土人習弧矢以佐官軍吏民有謀某事辭某事者君咸使之射從其中否而與奪之坐過失者亦用此得贖吏農工啇無不樂射焉繇是縁邊諸城獨環不求増兵不煩益糧而武力自振夏戎聞屬羗不可誘土人皆善射烽火相望無日不備乃不復以環爲意墓誌環原之間屬羗有明珠滅臧康奴三種最大素號撗猾撫之則驕不可制攻之則險不可入常爲原州患其北有二川通於夏虜二川之間有古細腰城慶曆四年叅知政事范文正公宣撫陜西命丗衡與知原州蔣偕共城之丗衡先遣人說誘夏虜以故未及出兵争之丗衡以錢募戰士晝夜板築旬月而成乃召三種酋長諭以官築此城爲汝禦㓂三種旣出其不意又援路已絶因而服從丗衡在役所得疾明年正月甲子卒屬羗朝夕聚哭其柩者數日青澗環州吏及屬羗皆畫像事之八子古診詠諮諤訢記誼記聞始元昊㓂邊王師屢撓虜之氣熖益張常有并吞關中之意其將剛浪㖫號野利王某號天都王各統精兵于别都天都失其姓名元昊倚以爲腹心凢所以能勝我軍皆二將之䇿也种將軍方城青澗謀有以去之有王嵩者本青澗僧將軍察其堅朴誘令冠帶因出師以賊級予之白於帥府表授三班借職充經略司指使且力爲辦其家事凢居室騎從衣食之具悉出將軍嵩感恩旣深將軍反不禮以奴畜之或掠治械繫數日嵩雖不勝其苦卒無一辭望將軍將軍知可任以事居半年召嵩謂之曰吾將以事使汝吾戒汝所不言其苦雖有甚於此者汝能爲吾卒不言否嵩泣對曰嵩貧賤無狀蒙將軍恩教致身榮顯常誓以死報而未知其所况敢辭捶楚乎將軍乃草遺野利書書辭大抵如丗間問起居之儀惟以數句隱辭如甞有私約而勸其速行之意書於尺素且膏以䗶置衲衣間宻縫之告嵩此非濵死不得泄如泄之當以負恩不能成吾事爲言并以畫龜一幅棗一篰爲信俾遺野利嵩受教至野利所居致將軍命出棗龜投之野利知見侮笑曰吾素竒种將軍今何兒女子見識度嵩别有書索之嵩佯目左右旣而荅以無有野利不敢匿乃封其信上元昊數日元昊召野利與嵩俱西北行數百里至一大城曰興州先詣一官寺曰樞宻院次曰中書有數胡人雜坐野利與焉召嵩廷詰將軍書問所在嵩堅執前對稍稍去巾櫛加執縛至於捶楚極苦嵩終不易其言又數日召入一官寺㕔事廣楹皆垂班竹箔緑衣小竪立其左右嵩意元昊宫室也少頃箔中有人出又以前問責之曰若速言死矣嵩對如前乃命曵出誅之嵩大號且言曰始將軍遣嵩宻遺野利王書戒不得妄泄今不幸空死不了將軍事吾負將軍吾負将軍箔中急使人追問之嵩具以對乃禠衲衣取書以進書入移刻始命嵩就館優待以禮元昊於是疑野利隂遣愛將假爲野利使使于將軍將軍知元昊所遣未即見命屬官日館勞之問虜中山川地形在興州左右言則詳迫野利所部多不能悉適擒生虜數人因令隙中視之生虜能言其姓名果元昊使將軍意决乃見之將軍燕服據案坐屬官皆朝衣抱文籍鳬鴈侍左右於是賔賛引使者出拜使者傳野利語將軍慢罵元昊而稱野利有心内附乃厚遣使者曰爲吾語若王速决無遲留也度使者至嵩即還而野利巳報死矣將軍知謀巳行因欲并間天都又爲置祭境上作文書於版以弔多述野利與天都相結有意本朝悼其垂成而失其文雜紙幣伺有虜至急爇之以歸版字不可遽滅虜人得之以獻元昊天都以此亦得罪元昊旣失二將乆之始悟爲將軍所賣遂定講和之䇿焉西師旣平天子録諸將功元帥蔽將軍不以聞將軍不自辨至于終身嘉祐元年其子古詣匭訴之事下御史府按驗如古狀不誣詔付史官於是士大夫始知將軍之功將軍果决縱撗有城府不測人也舉秦之人皆能道之吕與叔文集後記聞筆談所載與此小異疑當以此爲正初洛苑副使种丗衡在青澗城欲遣僧王嵩入趙元昊境爲間召與之飲謂曰虜若得汝考掠求實汝不勝痛當以實告邪嵩曰誓死不言丗衡曰先試之乃縳嵩於庭而掠之數百嵩不屈丗衡曰汝眞可也時元昊使其妻之兄弟寗令之舅野利旺榮及剛浪㖫分將左右廂兵最用事丗衡使嵩爲民服齎書詣旺榮且遺之棗及畫龜旺榮鎻嵩囚地牢中且半歳所㑹元昊欲復歸中國而先耻自言乃釋嵩囚使旺榮遺邊將書遣教練使李文貴送嵩還曰曏者种洛苑書意欲更求通和邪邊將送文貴及嵩詣延州時龐公爲經略使巳奉朝㫖招納元昊始遣文貴徃來議其事奏嵩除三班借職記聞寳元中党項犯邊有明珠族首領驍悍最爲邊患种丗衡爲將欲以計擒之聞其好擊鼓乃造一馬持戰鼓以銀裹之極華煥宻使諜者陽賣之入明珠族後乃擇驍卒數百人戒之曰凡見負銀鼓自隨者併力擒之一日羗酋負鼓而出遂爲丗衡所擒又元昊之臣野利常爲謀主守天都山號天都大王與元昊乳母白姥有隙嵗除日野利引兵巡邊深渉漢境數宿白姥乗間乃譛其欲叛元昊疑之丗衡甞得蕃酋之子蘇吃曩厚遇之聞元昊甞賜野利寳刀而吃曩之父得幸于野利丗衡因使吃曩竊野利刀許之以縁邊職任錦袍眞金帶吃曩得刀以還丗衡乃唱言野利巳爲白姥譛死設祭境上爲祭文叙嵗除日相見之歡入夜乃火燒紙錢川中盡明虜見火光引騎近邊窺覘乃佯委祭具而銀器千餘兩悉棄之虜人爭取器皿得元昊所賜刀及灰爐中見祭文已燒盡但存數十字元昊得之又識其所賜刀遂賜野利死野利有大功死不以罪自此君臣猜貳以至不能軍平夏之功丗衡計謀㞐多當時人未甚知之丗衡卒乃録其功贈觀察使筆談王荆公言於神宗曰人不堪擾只如今歳一教則何由得精臣以爲唯有修种丗衡之法誘令邊人皆知習兵可使抗敵則兵可省邊備不待勞費而自足要如丗衡有智略能用間精宻則難得若但如丗衡誘邊人習兵中人皆可以爲之上曰教人勇擇才武者入宿衛此亦可以誘邊人習兵但令邊將爲如此事湏寛假之勿拘以文法彼乃可爲對曰誠當寛假察則當詳宻若但寛假而察不能詳宻則小人因縁廢法亂紀更爲邊害不可不謹也凡今責邊將則所急者不過數條其餘則一切可闊略如此則人材易得就最所急者是使邊人自知習兵先王能以中國禮樂兼夷狄所長此所以能勝夷狄使邊人知習兵乃亦所謂兼夷狄之所長也要在舉人之所利者以加之於習兵之人不待令而自勸矣且丗衡獨以一守私爲之尚能如此今又上承朝廷所以利道之者衆則其見効又當倍於丗衡矣王荆公日録五朝名臣言行録卷第七
