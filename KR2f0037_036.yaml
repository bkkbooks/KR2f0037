body:
  text: 十四之五陳無巳一字履常事具文集序今見左方彭城后山居士陳師道無巳苦節厲志自其少時蚤以文謁南豐曾舍人曾一見竒之許其必以文著時人未之知也元祐中侍從合薦于朝起為徐州教授除太學博士言者謂當官嘗私至宋謁眉山蘇公改教授頴州紹聖初以進非科第而罷退居彭城者纍年復教授棣州入袐書省為正字以卒實建中靖國元年也未仕貧無以養寄其拏婦氏當權者或召見之顧非其好不往此豈易衣食者哉在潁賦六一堂詩有向來一瓣香敬為曾南豐之句而太守則蘇公也其罷而歸彭城家益窮空至纍日不炊妻子愠見而不恤諸經皆有訓傳於詩禮尤邃為文至多少不中意則焚之存者財十一也世徒喜誦其詩文乃若奧學至行或莫之聞也謝克家撰文集序頃在廣陵秦觀少遊為僕言彭城陳師道履常者髙士也其文妙絶當世而行義稱焉嘗銘黃樓曽公子固謂如秦刻石傅公欽之𥘉為吏部侍郎聞其遊京師欲與相見先以問觀觀曰師道非持刺字俯顔色伺候乎公卿之門者殆難致也公曰非所望也吾將見之懼其不吾見也子能介於陳君乎公知其貧甚因懷金餽之及覩其貌聽其論議竟不敢以出口二公所以待履常者如此道鄉集陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦挂名其間會朝廷多知履常者故得一官蘇內翰答李豸書後山集答秦少遊書云辱書論以章公降屈年德以禮見招不侫何以得此豈侯嘗欺之耶不下士尚矣乃特見於今而親於其身幸孰大焉愚雖不足以齒士猶當從侯之後順下風以成公之名然先王之制士不傳贄為臣則不見於王公夫相見所以成禮而其弊必至於自鬻故先王謹其始以為之防而為士者世守焉師道於公前有貴賤之嫌後無平生之舊公雖可見禮可去乎且公之見招蓋以能守區區之禮也若昧冒法義聞命走門則失其所以見招公又何取焉雖然有一於此幸公之它日成功謝事幅巾東歸師道當御𣢾假乘下澤候公於上東門外尚未晚也拳拳之懷願因侯以聞焉三朝名臣言行録卷第十四六之五參政韓忠憲公公名億字宗魏其先真定靈壽人徙開封之雍丘舉進士知永城縣通判陳州知洋州改相州入為侍御史開封府判官出為河北轉運使仁宗初為御史知雜事以樞密直學士知益州拜御史中丞景祐三年除工部侍郎同知樞密院事拜參知政事出知應天府改澶亳二州以太子少傅致仕薨忠憲公布衣時與李康靖公同遊止一氈同寢一日分途遂割而分之至汝州太守趙學士請康靖為門客尤敬待公每公至即令設豬肉康靖嘗有簡戲云久思肉味請兄早訪及趙公有女遂與公議親既過省趙公遣人送女來至京城外旅店中一夕病卒公具素服往哭之李康靖為長社每日懸百錢于壁上用盡即巳其貧儉如此莊敏遺事又聞見録云韓參政億李參政若谷未第時皆貧同試京師每出謁更為僕李先登第授許州長社縣主簿赴官自控妻驢韓為負一箱將至長社三十里李謂韓曰恐縣吏來箱中止有錢六百以其半遺韓相持大哭别去次舉韓亦登第後皆至參知政事丗為婚姻不絶忠憲公為河北轉運使王太夫人坐太平車以葦席為棚覆獻肅公乘驢隨車時王文正已貴忠憲公又作一路使者其儉如此今人聞之誠可愧也莊敏遺事億博學能文嘗為開封府判官監分故相向敏中諸子資産宰相丁謂欲市其別業億諭向氏子勿與謂惡之出為河北轉運召為御史知雜剛毅不撓權勢畏之知益州會歲大旱故事發粟六萬石賑民億發十萬石以賑之民免飢饉為治嚴簡而有惠愛召為中丞楊尚二美人以罪斥出後復欲召入億言武后巳斥居感業寺復召入宫終為唐室之禍又奏置裏行四貟以廣言路在樞府請薦武臣以備任使纂兵法以授諸將及廣南募土兵數事景祐中唃嘶囉與趙元昊交兵使來獻捷執政以夷狄相攻中國之福議加唃嘶囉節度使億曰二族俱藩臣當諭使解仇釋憾以安逺人且元昊嘗賜姓今夷狄攻之而反加恩賞恐徒激其怒以生邊患無益也上是其議乃厚賜其使而遣之名臣傳韓忠憲公知洋州日有大校李申以財豪於鄉里誣其兄之子為它姓賂里嫗之貌類者使認之為已子又醉其嫂而嫁之盡奪其奩橐之畜嫂姪訴于州及提轉申賂獄吏嫂姪被笞掠反自誣伏受杖而去積十餘年洎公至又出訴公察其冤因取前後案牘視之皆未嘗引乳醫為證一日盡召其黨立庭下出乳醫示之衆皆伏罪子母復歸如初東軒筆録范文正公知開封府獻百官圖指宰相差除不公而隂薦公可用文正既貶仁宗以諭公公曰若仲淹舉臣以公則臣之拙直陛下所知舉臣以私則臣委質以來未嘗交託於人遂除參知政事公在中書日見諸路職司捃拾官吏小過輒不懌曰今天下太平主上之心雖蟲魚草木皆欲得所况仕者大則望為公卿次亦望為侍從職司二千石其下亦望京朝幕職奈何錮之於聖丗乎名臣傳公性方重治家嚴有法雖燕居未嘗見墯容其親舊之孤藐者多為昏葬之韓忠憲以教子嚴肅不可犯知亳州第二子舍人自西京倅謁告省覲康公與右相及姪柱史宗彥皆中甲科歸公喜置酒召寮屬之親厚者俾諸子坐於隅惟持國多深思知必有義方之訓託疾不赴坐中忽云二郎吾聞西京有疑獄奏讞者其詳云何舍人思之未得已訶之再問未能對遂推案索杖大詬曰汝食朝廷厚祿倅二一府事無巨細皆當究心大辟奏案尚不能記則細務不舉可知吾在千里外無所干預猶能知之爾叨冒廪祿何顔報國必欲撻之衆賔力解方巳諸子股栗纍日不能釋家法之嚴如此所以多賢子孫也蘇氏談訓
