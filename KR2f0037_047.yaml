front:
  text: 五朝名臣言行録卷第九之一
  hash: sha256:302e7fb72ab9cf94be0509996fe264047b5481449badbbe767fd50d3bfd4a17b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_047-1a}
body:
  text: 諫議大夫田公公名錫字表聖嘉州人中進士第太平興國中為右拾遺出為河北路轉運副使徙知相州以論事移睦州入知制誥出知陳州又坐法貶官未幾召還知通進銀臺封駮司出知泰州咸平中詔舉賢良方正之士翰林學士承旨宋白以公應詔召還再掌銀臺遷侍御史知雜事擢左諫議大夫六年卒年六十四公自白衣已有意於風化上書闕下請復鄉飲籍田禮及在朝廷知無不言太宗既取太原范陽未下帝怒不賞平晉之功中外囂然而莫敢言者獨公上書論諫理意深切帝感悟璽書褒答賜內帑錢五十萬僚友謂公冝少晦以逺讒忌公曰事君之誠惟恐不竭矧天殖其性豈一賞而奪耶在河朔纍章論邊事知睦州下車建孔子祠教民興學表請入紙國子學印經籍給諸生詔賜之還其紙聞禁中火拜章極言上嘉之及還眷遇愈隆上書請封禪及在西掖京畿大旱禱祠無應遂抗言切於時政故有宛丘之行咸平初出使秦隴回上三章言陜西數十州苦于靈夏之役朝廷為之戚然出海陵之初以星文示變拜疏請降詔責躬上奉天誡真宗皇帝嘉其意屢召對便殿及行降中使撫安仍加寵賚范文正公撰墓志太宗嘗與侍臣論皇王之道田錫奏曰皇王之道微妙曠闊今師平太原逮兹二載未賞軍功願因郊籍議功酬之乞罷交州戍兵免驅生民為瘴嶺之鬼上嘉納焉趙普當國錫謁之曰公以元勳當國冝事損撿今群臣書奏先經中書既非尊王之體諫官章疏令閣門填狀尤弱臺憲之風皆不便普引咎正容厚謝皆罷之錫將卒自草遺表猶勸上以慈儉納諫為意絶無私請上厚恤之玉壷清話田錫好直諫太宗或時不能堪錫從容奏曰陛下日往月來養成聖性上說益重之聖政録田錫太宗時上言軍國要機者一朝廷大體者四太宗嘗言錫有文行敢言真宗即位屢召對言事嘗請抄略御覽三百六十卷日覽一卷又采經史要言為御屏風十卷以便觀覽及卒真宗謂劉沆曰田錫直臣也何天奪之速朝廷每有小缺失方在思慮錫之章奏已至矣蒙求真宗見田錫色必莊嘗目之曰朕之汲黯也名臣傳田錫疾亟進遺表真宗宣御醫賫上藥馳救之無及矣俄召宰相對䄂出其表示之且曰朕自臨大寶閲是表者多矣非祈澤宗族則希恩子孫未有如錫生死以國家為慮而警于朕者興歎久之命優贈典掇遺上嘗幸龍圗閣閲書指東北隅架一漆函上親署鐍者謂學士陳堯咨曰此田錫章疏也已而愴然久之掇遺公動必以禮言必有法賢不肖咸憚伏之出處二十年未嘗趨權貴之門在貶廢中樂得其正晏如也墓志范文正公銘公之墓曰嗚呼田公天下之正人也言甚危命甚竒盡心而弗疑終身而無違嗚呼賢哉吾不得而見之蘇軾序公奏議曰自太平興國以來至于咸平可謂天下大治千載一時矣而田公之言常若有不測之憂近在朝夕者何哉古之君子必憂治丗而危明主明主有絶人之資而治丗無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子之所甚懼也方漢文時刑措不用兵革不試而賈誼之言曰天下有可長太息者有可流涕者有可痛哭者後丗不以是少漢文亦不以是甚賈誼由此觀之君子之遇治丗而事明主法當如是也公耿介寡合嚴恭好禮居公庭危坐終日未嘗有懈容自幼至老手不釋卷慕魏徴李絳之為人以盡規獻替為已任然性不敏悟治郡無稱云
