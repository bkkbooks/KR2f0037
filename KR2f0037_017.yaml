body:
  text: 十二之二樞密王公公名巖叟字彥霖大名清平人舉明經調真定府欒城縣主簿韓魏公留守北京辟管勾國子監又辟管勾安撫司機冝文字監晉州折博煉鹽務知定州安喜縣哲宗登極除監察御史元祐元年遷左司諌侍御史出知齊州復召為起居舍人四年除中書舍人權吏部侍郎樞密都承旨知開封府六年拜樞密直學士簽書樞密院事以端明殿學士知鄭州徙河陽薨年五十一嘉祐六年仁宗患詞賦浸淫經術不明𥘉置明經科公年十八州舉省試御前皆第一熙寧中韓忠獻公留守北京一見異之辟以為屬張藝叟撰墓志近臣𬒳詔薦御史意屬公而未及識或謂公曰可一往見之公笑曰此所謂呈身御史也卒不見墓志除監察御史時六察尚未得言事公以謂既處言職不得不言入臺之次日即上書論社稷安危之計在從諌用賢不可以小利失民心且言河北榷鹽之法尚行民受其弊下貧不復得食因録大名刻石仁宗詔書以進且言河北天下根夲自祖宗以來推此以為惠願復鹽法如故其後出守齊州復請河北之法行之京東是時方下詔求疾苦四方之人爭以其情赴訴所由憚於省録頗致壅塞公言不問則巳言則必行之不然四方之人必謂陛下以空言説之後有詔令孰肯取信墓志𥙿陵復土使者還朝以定䇿自居公言陛下之立以子繼父百王不易之道太皇太后先定於中而渠敢貪天自言定䇿及論執政有才輕行薄廉隅不修好為俳諧侵侮在位隂相交結共持威福者章十餘上卒皆罷之墓志元祐元年遷左司諌一日並命執政其間有不協士望者公方權給事中即繳録黃并以諌職上疏既而命復下者再遂不由門下省以出公請對言益切退就閣門復上章論之繼降手詔俾速書讀中語甚峻公持之愈急復上疏云臣為諌官既當言承乏給事又當駮非臣好為髙論喜忤大臣且命令斜出尤損紀綱凡八上章命竟寢墓志又言三省胥徒歲纍優秩月饗厚祿朝廷每舉一事則論功計賞不知平日祿賜將焉用之姑息相承以至於此望飭勵大臣杜抑徼幸復講治平巳前條格循用即詔近臣裁為十七條今遵行之墓志九月除侍御史左右正言久闕公上疏國朝倣近古之制諌官置才六人方之先王巳為少今復缺而不輔臣所未喻豈以謂治道已清而無事於言耶人材難稱不若虛其位耶二者皆非臣所望於今日也願詔輔諌臣無今久虛其職墓志公以起居舍人入侍邇英司馬康侍講洪範至乂用三德上曰只此三德為更有德時天子恭默思道敬御名未言公喜聞德音因欲風諌退而上書曰陛下既能審而問之必能體而行之三德者人君之大夲得之則治失之則亂不可須臾去者三數雖少推而擴之足以盡天下之要陛下誠能用以修巳安人則堯舜三代之盛可坐致也臣職備史官敬巳書之於册以示萬丗墓志滕元發自太原易許昌公封還詞頭言進退帥臣理當重御名今以走馬承受一言便易邊帥使後人畏憚不自保此風浸長非委任安邊之福命遂寢墓志館伴大遼賀正旦使使者耶律寬求觀元會儀公曰此非夷狄所冝知止録笏記與之寬不敢求墓志為樞密都承旨湖北諸蠻互出擾邊無有寧歲公請專以疆事委荆南唐義問遂自草檄文喻義問以朝廷方敦尚恩信勿為徼幸功賞之意其後終底緝寧墓志權知開封府舊以推判官分左右廳二人共治一事每有異同或至纍日不決官吏疲於咨稟罪人困於留繫公至首立逐官分治之法人各自伸事以無壅遂著為令墓志公常謂天下積欠多名催免不一公私費擾乞隨等第立多寡為催法朝廷乃立定五年十料之令墓志凡京城偷者所聚謂之大房多在僻逺每區容數十百人囊槖淵藪有不勝究者公密令掩捕毀徹隨情處決遂以無盜居民開户而寢供備庫使曹讀以其物産貿易萬緡市儈稽違逾年止輸其半讀盡力無可賴一日開户外有錢聲償數皆足讀怪念之詢其由乃曰王公今日知府矣公治開封不為精神智力如在無事小郡者而老姦吏自然畏栗至不敢欺六年二月拜樞密直學士簽書樞密院事曲謝延和太皇太后諭曰知卿材望故不次進用公遜謝而進曰陛下聽政以來納諌從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失則宗社千萬丗之福也用人之際望更加審邪正難辨辨之少差治亂所繫繫年録載此語甚詳又云太母曰此事裏靣常説與官家只為官家未苦理會得卿更説與官家因少進而西又少進而西曰陛下今日進聖學者正欲理會邪正兩字正人在朝則朝廷安人君無過舉天下平治邪人一進則朝廷便有不安之象非謂一人便能如此乃其類應之者衆上下蒙蔽人主無由得知不覺養成禍患爾二聖深然之公又進曰或聞有以君子小人參用之説告陛下者不知果有之否此乃欲深誤陛下也自古君子小人無參用之理聖人唯説君子在內小人在外則成泰小人在內君子在外則成否小人既進君子不肯與小人爭進自然稍稍引去君子與小人競進則危亂之基也此際不可不察幸陛下常用心於此邇英進讀仁宗知人事公曰人主常欲虛心平意無所偏係觀事以理則事之是非人之邪正自然可見墓志因侍講筵奏曰陛下退朝無事不知何以消日應曰看文字對曰陛下以讀書為樂天下幸甚大抵聖賢之學非造次可成須在積纍積纍之要在專與勤屏絶它好始可謂之專久而不倦始可謂之勤四字是積學之要願陛下特留聖意應而退繫年録初夏人遣使入貢及為境上之議既定時日復多不至我去彼來數數勞苦公請預戒邊臣一不至則勿復應自爾夏人來者未嘗愆期墓志同進呈熙河延安二捷報子由躐而前曰近日邊奏稍頻西人意在得二堡今盛夏猶如此入秋可虞不若早啇量了當意在與之也微仲曰不可國家歲以二十五萬銀絹賜與在西國當一百萬豈可受侵凌亦須恩威並行余曰形勢之地豈可輕議棄與不知與後保得後來不更要否簾中曰夷狄無厭劉相亦曰無厭余曰不可一向示弱師朴曰看道理如何遂下𥘉蘭州界有質孤勝如兩堡自元祐講和畫界當在我地而西人力爭蓋兼形勢膏腴之利失之則蘭州熙河遂危故以為不可棄獨延帥意在與之子由自執憲主延帥議故進説如此繫年録墓志云二堡乃充國留屯之所六年夏賊數萬冦定西之東通逺之北壞七崖巉堡虜居人轉冦涇原及河外鄜府州衆至十萬熙帥范育偵伺夏人右廂種落大底趣河外三疏請乘此進堡寨築龕谷勝姑相照定西而東徑隴諾城衆議未一或欲以七巉經毀之地皆與之公言甚力以為不可與賊計得行後患未巳且損事體取輕夷狄因請遣官諭熙帥即遣户部貟外郎穆衍行視築定逺以據要害其調發軍馬支費錢糧帥司一切得從便冝不必中覆定逺既成物論為當皆公之力也墓志儲祥宫成太皇太后諭曰先帝以皇嗣難立有此志願今太皇與皇帝出閣中物營之以成先帝之志公進曰陛下不煩官不勞民真盛德之美然自古人君常以土木為戒此宫既成它日願勿復為也宫成將肆赦公曰天禧中祥源成治平中醴泉成皆無赦既對又曰古人至有垂死諌君無赦者此可見赦無益於聖治也墓志時選后久未決一日奏事畢太皇太后諭執政曰今得狄咨女年命似便然為是庶出過房事須評議公進曰按禮經問名篇女家答曰臣女夫婦所生及外氏官諱不識今者狄氏將何辭以進太皇太后深以為然議遂寢既降制定選今皇后太皇太后諭曰皇帝選得賢后有內助之功不是小事公對曰內助雖是后事其如正家須在皇帝聖人言正家而天下定正當御名之於始太皇太后以公言語上曰正家須在皇帝如是者再既退公乃取歷代后事迹可以為法者成書一卷曰中宫懿範上之墓志邇英進讀寶訓至節費公曰凡言節用非謂偶節一事便能有濟要當每事以節儉為意則積久纍日國用自饒墓志公內剛外和志其大而略其細或以不義加已不置念也見欺君害民者雖前有鼎鑊必與之較故立朝廷進説無所回隱不恤已私其人居朝廷執政柄在人望風聽命之不暇公直前犯之雖司馬溫公亦為之言曰吾寒心栗齒憂在不測而公處之自如至于再三或纍十數章必行其言然後已墓志公於學無所不窺詩易春秋皆有傳記漢唐諸史略舉成誦動數百言其為文閎深含暢語省而理該尤深得制誥體然平居未嘗見露文采而矜知聞也墓志彥霖父子皆魏公之客魏公薦彥霖為屬韓康公代魏公欲留彥霖謝曰巖叟魏公之客不願出它門也士君子稱之聞見録五朝名臣言行録卷第三之一丞相向文簡公公名敏中字常之開封人登進士第通判吉州除左司諫知制誥權判大理寺出知廣州召還為樞密直學士未幾拜右諫議大夫同知樞密院事咸平初以兵部侍郎參知政事四年進同平章事出知永興軍為鄜延路緣邊安撫使知河南府封泰山祀汾隂皆為留守五年復拜同平章事天禧三年薨年七十二太宗飛白書張詠向敏中二人名付中書曰二人者名臣為朕記之向公自貟外郎為諫議知樞密院止百餘日咸平四年除平章事後坐事出知永興駕幸澶淵手賜密詔盡付西鄙得便冝從事公得詔藏之視政如常會邦人大儺有告禁卒欲倚儺為亂者密使麾兵𬒳甲衣𫀆伏廡下幕中明日盡召賔僚兵官置酒縱閲無一人預知者命儺入先令馳騁於中門外後召至階公振𬒮一揮伏卒齊出盡擒之果各懷短刃即席誅之勦訖屏尸亟命灰沙掃庭張樂宴飲賔從股栗歸田録真宗時向文簡除右僕射麻下日李昌武為翰林學士當對上謂之曰朕自即位以來未嘗除僕射今日以命敏中此殊命也敏中應甚喜對曰臣今日早候對亦未知宣麻不知敏中何如上曰敏中門下今日賀客必多卿往觀之明日却對來勿言朕意也昌武候丞相歸乃往見丞相方謝客門闌悄然無一人昌武與向親徑入見之徐賀曰今日聞降麻士大夫莫不歡慰朝野相慶公但唯唯又曰自上即位未嘗除端揆此非常之命自非勳德隆重眷倚殊越何以至此公復唯唯終不測其意又歷陳前丗為僕射者勳勞德業之盛禮命之重公亦唯唯卒無一言既退復使人至庖厨中問今日有無親戚賔客飲宴者亦寂無一人明日再對上問昨日見敏中之意何如乃具以所見對上笑曰向敏中大耐官職筆談向相在西京有僧暮過村民家求寄止主人不許僧求寢於門外車箱中許之夜中有盜入其家自墻上扶一婦人并囊衣而出僧適不寐見之自念不為主人所納而強求宿今主人亡其婦及財明日必執我詣縣矣因夜亡去不敢循故道走荒草中忽墮眢井則婦人已為人所殺先在其中矣明日主人搜訪亡財及子婦尸得之井中執以詣縣掠治僧自誣云與子婦姦誘與俱亡恐為人所得因殺之投井中暮夜不覺失足亦墜其中贓在井傍亡失不知何人所取獄成言府府皆不以為疑獨敏中以贓不獲疑之引僧詰問數四僧服罪但言某前生當負此人死無可言者敏中固問之僧乃以實對敏中因密使吏訪其賊吏食於村店店嫗聞其自府中來不知其吏也問之曰僧某者其獄何如吏給之曰昨日已笞死於市矣嫗嘆息曰今若獲賊則何如吏曰府巳誤決此獄矣雖獲賊亦不敢問也嫗曰然則言之無傷矣婦人者乃此村少年某甲所殺也吏曰其人安在嫗指示其舍吏就舍中掩捕獲之案問具服并得其贓一府咸以為神記聞敏中為柴氏所訟罷相出鎮時舊相出鎮者多不以吏事為意冦萊公雖有重名所至之處終日遊宴所愛伶人或付與冨室輒厚有所得然人皆樂之不以為非也張齊賢儻蕩任情獲劫盜或時縱遣之所至尤不治上聞之皆不以為善唯敏中勤於政事所至著稱上曰大臣出臨四方唯向敏中盡心於民事耳於是有復用之意會夏州李繼遷末年兵敗𬒳傷為潘羅支所射傷自度孤危且死屬其子德明小字阿夷必歸朝廷曰一表不聽則再請雖纍百表不得請勿止也繼遷卒德明納欵上亦欲息兵乃自永興徙敏中知延州受其降事畢徙知河南府東封西祀皆以敏中為東京留守西祀還遂復為相薨於位記聞公性端厚明辨遇事敏速曉民政識大體判大理寺時沒入祖吉贓錢分賜法吏公引鍾離意委珠事獨不受知廣州至荆南即市南藥以往在官一無所須以廉清聞在密院時西北用兵道路斥候走集之所罔不周知密靜逺權纍在衡軸門無私謁諸子不令釐務雖當大事若已不預焉審於采拔不妄推薦時以重德目之
