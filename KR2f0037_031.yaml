body:
  text: 五之三御史中丞吕公公名誨字獻可正惠公之孫登進士第歷旌德扶風主簿遷雲陽令知翼城縣簽書定國軍節度判官知大通監召入為殿中侍御史出知江州復召還臺英宗即位同知諌院兼侍御史知雜事出知蘄州徙晉州神宗𥘉召為鹽鐵副使擢天章閣待制復知諌院遷諌議大夫權御史中丞出知鄧州提舉西京崇福宫致仕熙寧四年卒年五十八獻可幼孤自力為學家於洛陽性沉厚不妄交逰洛陽士人往往不之識司馬溫公撰墓志召入為殿中侍御史彈劾無所避兖國公主仁宗之愛女下嫁李瑋薄其夫家嘗因忿恚夜開禁門入訴於上獻可奏宿衛不可不嚴公主夜叩禁門門者不當聽入并劾奏公主閣宦者竄逐之㑹有新除樞密副使者當時人有疑論獻可與其僚直以衆言陳上前謂必不可留章十七上卒與俱罷墓志同知諌院時上有疾太后權同聽政內侍都知任守忠久用事於中上之立非守忠意乘此與其徒間搆兩宫造播惡言中外恟懼獻可連上兩宫書開陳大義辭情切至由是慈孝益篤讒言不得行上疾久未平獻可請蚤建東宫以安人心既而上小瘳謙默未可否事獻可屢乞親萬機攬威福延近臣通下情又請太后間數日一御東殿漸逺庶務自謀安佚㑹小旱因請上親出禱雨使外疑釋然太后既歸政獻可復言於上今雖專聽斷太后輔佐先帝久多閲天下事事之大者猶冝關白咨訪然後行示不敢専以報盛德任守忠謀不售而懼乃更巧為諂諛求自入於上獻可曰是不可使久處左右亟言上數其前後巨惡并其黨史昭錫竄南方因上言大姦已去其餘白日憑恃無禮者冝一切縱捨勿念以安反側墓志執事建言欲如漢氏故事推尊濮安懿王獻可率僚屬極陳其不可且請治執政之罪積十餘章不聽乃求自貶又十餘章懷知雜御史勑告納上前曰臣言不效不敢居其位上重違大臣又嘉臺官敢直言章留中不下還其勑告屢詔令就職獻可與僚屬具録所上奏草納中書稱不敢奉詔固請即罪上不得已聽以本官出知蘄州墓志治平元年余與孫覺皆編校史館書籍直舍相對覺過余言曰聞臺官以數言事不用相約以謂言小事不足決去就當共爭濮王事不聽則決去蓋是時知雜御史吕誨吕大防范純仁等與諌官司馬光數論孫固庸回王廣淵姦邪不當用其言愈切而用之愈堅事如此類者甚衆凡臺諌官入輒以進呈訖寢之時人謂之訖了范純仁言臺吏亦為之沮𧹞每白御史曰某事又訖了也蓋執政方恃權欲一切以阻言者而言者以不能塞聀為慙且憤故相約如此覺語余時正月𥘉五六間也後數日果聞臺官論濮王事甚急至上元後誨等疏已七八上不聽遂皆納勑告求罷去家居不復供職而執政方密啓令禁中自定議尊濮王為皇故誨等云曽公亮趙槩對范純仁等言禁中已自啇量則知大臣隂與計謀蓋謂此也是月二十間天章閣賞小桃因以勸太后太后有酒所卧閣中內臣髙居簡入褰太后寢幃太后驚起坐居簡與御藥蘇利涉從上至太后榻前拜以書一封進太后求一押字太后酒未解不知書所言何事遂從之故誨等疏云蘇涉髙居簡眩惑皇太后蓋謂此也既而書出乃太后命中書尊濮王為皇等事明日遂奉行太后始知京師喧然下至閭巷亦以為不可太后力爭不已二十二日乃下詔罷濮王稱皇等事范純仁等欲起供職吕誨曰稱親猶為吾徒言不用也遂以前後所上九疏乞付中書求去而誨等遂皆絀矣蓋自至和以後仁宗雖嘗屬疾然在位久熟知人情僞與群臣材性之善惡故雖委事大臣而聽用臺諌官廣開言路使耳目無壅蔽大臣有不法者輒去之故任者雖專亦不能自肆治平𥘉英宗新即位多不豫任事益專始欲快意因用王疇為樞密副使知制誥錢公輔封還辭頭遂絀公輔為滁州團練副使知制誥祖無擇亦封還辭頭又罰無擇銅三十斤而制遂行是時凡臺諌官言事一切不聽或盡逐臺官不留一人京師為之語曰絶市無臺官其蔽至於如此然人主猶采物論朝廷正人未盡去公議有所屬故言事者斥逐相望而後來者其言愈厲至濮王之事執政議稱王為考是也遂欲稱王為伯陋矣蓋兩言者各率其私意而不知考據於載籍皆不學之過故各有得失然爭論至於紛紜連年洶洶者蓋由言路不通人情憤惋故至於此者皆執政自用好勝激之使然也南豐雜識吕獻可以追尊濮園事擊歐陽公如曰首開邪議妄引經證以枉道恱人主以近利負先帝者凡十四章具載獻可奏議中司馬文正作序乃首載歐陽公諌臣論以為誠言文正之意以獻可能盡歐陽公所書諌臣之事使歐陽公無得以怨歟抑以歐陽公但能言之獻可實能行之也不然獻可排歐陽公為邪反以歐陽公之論序獻可之奏又以為誠言可乎歐陽公晚著濮議一書専與獻可諸公辨獨歸過獻可為甚矣邵氏後録上素聞其彊直擢為天章閣待制復知諌院遷諌議大夫權御史中丞是時有侍臣棄官家居者朝野稱其材以為古今少倫天子引參大政衆皆喜於得人獻可獨以為不然衆莫不怪之居無何新為政者恃其材棄衆任已厭常為竒多變更祖宗法専汲汲斂民財所愛信引拔時或非其人天下大失望獻可屢爭不能得乃抗章悉條其過失且曰誤天下蒼生必此人如久居廟堂必無安靜之理又曰天下本無事但庸人擾之上遣使諭解獻可執之愈堅乃罷中丞出知鄧州墓志熙寧間王介甫𥘉拜參知政事神考方厲精求治一日紫宸早朝二府奏事頗久日刻既晏例隔登對官於後殿須上更衣復坐以次贊引時吕獻可任御史中丞將對於崇政而司馬溫公為翰林學士侍講邇英閣亦將趨資善堂以俟宣召相遇於路並行而北溫公密問曰今日請對欲言何事獻可舉手曰䄂中彈文乃新參也溫公憚然曰以介甫之文學行義命下之日衆皆喜於得人奈何論之獻可正色曰君實亦為此言耶王安石雖有時名上意所向然好執偏見不通物情輕信難回喜人佞巳聽其言則美施於用則踈若在侍從猶或可容置諸宰府則天下必受其弊矣溫公又諭之曰與公素為心交苟有所懷不敢不盡今日之論未見有不善之迹似傷匆遽或别有章疏願先進呈姑留是事更加籌慮可乎獻可曰上新嗣位冨於春秋朝夕所與謀議者二三執政而已苟非其人將敗國事此乃心腹之疾治之惟恐不及顧可緩邪語未竟閣門吏抗聲追班乃趨而去溫公退自經筵默坐玉堂終日思之不得其說既而縉紳間寖有傳其章疏者往往偶語竊議疑其太過未幾聞中書置三司條例司平日介甫之門躁進諂諛之士悉辟召為僚屬日相與講議於局中以經綸天下為已任始變更祖宗法専務聚斂造出條目頒於四方妄引周官蔽其誅剝之實輔弼大臣異議不可回臺諌從官力爭不能奪州縣監司奉行微忤其意則譴黜隨之於是百姓騷然矣然後前日之議者始愧仰歎服以為不可及而獻可終緣兹事出知鄧州嗚呼行僻而堅言僞而辨學非而博順非而澤唯孔子乃能識之雖子貢之賢有所不知也方介甫自小官以至禁從其學行名聲暴著於天下久矣士大夫識與不識咸想聞其風且曰朝廷不用則已用之則必能推其所學以致太平及參大政中外相賀而獻可獨不以為然衆莫不怪之巳而考其行事卒如所料非明智不惑傑出於丗俗之表何以及此易曰知機其神乎又曰幾者動之微吉之先見者也獻可有焉溫公既辭副樞之命退居洛陽每論當丗人物必曰吕獻可之先見范景仁之勇决皆豫所不及心誠服之故作范景仁傳蓋景仁之勇决得溫公之傳而後明獻可理文雖亦成於公手然止載其平生大節而自相論難之語不欲詳著故獻可之先見天下莫有知者豫嘗從學於溫公親聞其說懼賢者之髙論逺識遂將淪沒無傳於丗乃書蜀公之傳後以貽樂善之君子云劉諫議集又聞見録云神宗天資節儉因得老宫人言祖宗時妃嬪公主月俸至微嘆其不可及王安石獨曰陛下果能理財雖以天下自奉可也帝始有意主靑苗助役之法矣安石之術類如此故吕誨中丞彈章曰外示朴野中懷狡詐獻可雖在外遇朝廷有大得失猶言之不置㑹有疾奏乞間官歸鄉里朝旨未許乃乞致仕墓志𥘉正惠公薨其家日益貧獻可既仕常分俸之半以給宗族之孤婺矛牙者室無餘資所以自奉飬至儉薄其治民主於惠利而疾姦暴大抵槩以公平故所至人安之屢為言職其奏草存可見者几二百八十有九歷觀古人有能得其一二巳可載之列傳垂示後丗在獻可曽何足道前後三逐皆以忤犯大臣所與敵者莫非秉大權天子所信嚮氣勢軋天下獻可視之若無所睹正色直辭指數其非不去不巳旁側為之股栗而獻可處之自如平居容貌語言恂恂和易使之不得位於朝人不過以謹厚長者名之而巳矣及遇事苟義所當為疾趨徑前如救焚溺所不當為畏避逺去如顧陷穽惟恐墜焉晚年病卧洛陽猶旦夕憤嘆以天下事為憂過於在位任其責者曽不念其身之病子孫之貧也嗚呼今之丗愛君憂民發於誠心無所為而為之可巳而不巳始終不變有如獻可者能幾人邪故其沒之日天下識不識皆咨嗟痛惜彼其心豈獨私於獻可哉墓志獻可病自草章乞致仕曰臣無宿疾偶值醫者用術乖方殊不知脉候有虛實隂陽有逆順診察有標夲治療有先後妄投湯劑率任情意差之指下禍延四枝寖成風痺遂艱行步非秪憚􅏓盩之苦又將虞心腹之變勢巳及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂是思納祿以人偷生不俟引年而還政蓋以一身之疾喻朝政之病也溫公康節日就卧內問疾獻可所言皆天下國家之事憂憤不能忘未嘗一語及其私也一日手書託溫公以墓銘溫公亟省之巳瞑目矣溫公呼之曰更有以見屬乎獻可復張目曰天下事尚可為君實勉之溫公志其墓未成河南監牧使劉航仲通自請書石既見其文遲回不敢書仲通之子安丗曰成吾父美可乎代書之仲通又隂祝獻可諸子勿摹本恐非三家之福時用小人蔡天申為京西察訪置司西都天申厚賂鐫工得夲以獻安石天申𥘉欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也獻可忍死謂溫公以天下尚可為當自愛後溫公相天下再致元祐之盛獻可不及見矣天下誦其言而悲之至溫公薨獻可之子由庚作挽詩云地下若逢中執法為言今日再升平記其先人之言也聞見外司馬文正公銘公之墓曰有宋名臣言正惠公之孫以忠直敢言克紹其門位則不究道則不負年則不壽名則不朽嗚呼為人臣為人嗣始終無愧能砥于是可謂備矣五之五參政蔡文忠公公名齊字子思其先洛陽人徙家萊州真宗朝舉進士第一通判兖州直集賢院仁宗初修起居注兼御史知雜事入翰林為學士出知河南府徙密州應天府召為御史中丞擢三司使拜樞密副使參知政事出知頴州薨年五十二公幼依外舅劉氏能自力為學州舉進士第一以書薦其里人史防而居其次祥符八年真宗皇帝采賈誼置器之說試禮部所奏士讀至公賦有安天下意歎曰此宰相器也凡貢士當賜第者考定必召其髙第數人並見又參擇其材質可者然後賜第一及公召見衣冠偉然進對有法天子以為無能過者亟以第一賜之歐公撰行狀又歸田録云真宗好文雖以文辭取士然必視其形神器識或取其所試文辭有理趣者徐奭鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重蔡齊置器賦云安天下於覆盂其功可大皆以為第一蔡文忠公喜酒飲量過人既登第通判濟州日飲醇酎往往至醉是時太夫人年巳髙頗憂之一日山東賈存道先生過濟文忠館之數日先生愛文忠之賢慮其以酒廢學生疾乃為詩示文忠曰聖君恩重龍頭選慈母年髙鶴髮垂君寵母恩俱未報酒如成病悔何追文忠矍然起謝之自是非親客不對酒終身未嘗至醉澠水燕談賈同字希德門人私諡曰存道先生通判兖州太守王臻治政嚴急喜以察盡為明公務為裁損濟之以寬獄訟為之不冤逾年通判濰州民有告某氏刻僞稅印為姦利者巳逾十年蹤跡連蔓至數百人公歎曰盡利於民民無所逃是為政者之過也為緩其獄得減死者十餘人餘皆釋而不問濰人皆曰公德於我使我自新為善人由是風化大行行狀真宗新棄天下天子諒隂不言丁晉公用事專權欲邀致公許以知制誥公拒不往已而冦萊公王文康公皆以不附連黜公歸歎曰吾受先帝之知至於此豈冝為權臣所脅得罪非吾懼也既而晉公敗士嘗為其用者皆恐懼獨公終無所屈行狀太后修景德寺成詔公為記而宦者羅崇勳主營寺事使人隂謂公曰善為記當得參知政事公故遲之頗久使者數趣終不以進崇勳怒讒之太后行狀莊獻明肅皇太后崩議尊楊太妃為太后垂簾聽政議决召百官賀公曰天子明聖奉太后十餘年今始躬親萬事以慰天下之心豈冝女后相繼稱制且自古無有固止不追班太妃卒不預政止稱太后於宫中行狀京師有指荆王為飛語者內侍省得三司小吏鞠之連及數百人上聞之大怒詔公窮治迹其所來無端而上督責愈急有司不知所為京師為之恐動公以謂繆妄之說起於小人不足窮治且無以慰安荆王危疑之心奏疏論之一夕三上上大悟乃可其奏止笞數人而巳中外之情乃安行狀南海蠻酋虐其部人部人欵冝州自歸者八百餘人議者以為不可納冝還其部公獨以為蠻去殘酷而歸有德且以求生冝內之荆湖賜以間田使自營今縱却之必不復還其部苟散入山谷當為後患爭之不能得其後數年蠻果為亂行狀郭皇后廢京師冨人陳氏女有色選入宫為后公爭之以為不可自辰至巳辨論不巳上意稍悟遂還其家河决橫壠改而北流議者以為當塞公曰水性下而河北卑順其所趣以導之可無澶滑壅潰之患而貝博數州得在河南於國家便但理堤護魏州而已從之澶滑果無患契丹祭天於幽州以兵屯界上界上驚搔議者欲發大軍以備邊公獨料其必不動後卒無事公在大位臨事不回無所牽畏而恭謹謙退未嘗自伐天下推之為正人縉紳之士倚以為朝廷重行狀錢惟演作樞密直學士題名記附離丁謂輒去冦凖姓氏云逆凖不書公言於仁宗曰冦凖社稷之臣忠義聞天下豈可為姦黨所誣哉遂令磨去公之卒故吏朱宷至潁潁之吏民見宷泣於馬前指公嘗所更歷施為曰此公之迹也其為政有仁恩所至如此平生喜薦士如楊偕郭勸劉隨龐籍假少連比比為當丗名臣公為人神色明秀須眉如畫精學博問寬大沉默一言之出終身可復行狀仲淹自布素從公遊見公出處語默無一不善門中奉親日視其色諸父昆弟愛之如傷先朝采拔以輔相器之當遺弓之初公懷哀慕不能食者數日家人視其衾衣涕泗霑濕公病汝隂聞拓拔僣稱嘻吁感槩教弟禀言西事甚詳蓋忠孝之性發之天也公於親舊間雖死生不易有孤遺者為之嫁娶又好學無倦尤以名教為急孔子之後丗襲文宣公而宰曲阜乾興中四十九代孫承祐卒遂廢十餘年公聞承祐有母弟在抗章請復其嗣有詔從之其立朝也能清其心髙其行未嘗取於人兩居憲臺方嚴不動百辟畏其風權戚有過則彈劾不隱未嘗求其下也在政府浩然示至公於中外以進賢為樂以天下為憂見佞色則嫉聞善言必謝孜孜論道以致君堯舜為心與大臣居和而不倚正而不訐無親踈之間有方大之量朝廷為之重刑賞為之平范文正公撰墓志五朝名臣言行録卷第五之五
