body:
  text: 十四之四節孝徐先生先生名積字仲車楚州山陽人中進士第神宗朝數召對以耳疾不能至元祐年就除楊州司户參軍楚州教授徽宗即位特改宣德郎纍乞致仕不報崇寧二年特除西京嵩山中嶽廟逾月卒年七十六政和六年賜諡節孝處士先生自兒童不為嬉戲寡言笑莊毅如成人父羅城君卒先生始三嵗晨昏匍匐床下求其父甚哀太夫人一日使讀孝經輒流涕不能止是時太夫人携先生育於陜右外家事母篤孝朝夕冠帶問起居一日幞頭晨省外氏諸婦大笑之翌日復如是笑不巳𬒳笑旬日彌恪自是至老不廢居家必冠帶當暑絺綌必重王資深撰行狀又童蒙訓云先生因具公裳見貴官忽自思云見貴官尚必用公裳豈有朝夕見母而不具公裳者乎遂晨夕具公裳揖其母既冠徒步從安定先生學安定門下踰千人以别室處之遣婢視飲食浣濯盛寒惟一衲裘以米投漿甕中日食數塊而已安定使其徒餽之食不受將還受一飯而行曰先生之命不可終違嘗曰吾於安定之門所得多矣言之在耳一字不違也行狀又童蒙訓云仲車先生初從安定胡先生學潛心力行不復仕進其學以至誠為夲積思六經而喜為文詞老而不衰先生自言𥘉見安定先生退頭容才偏安定厲聲云頭容直積因自思不獨頭容心亦要直也自此不敢有邪心又安定行録云了翁嘗問先生佛氏有悟門儒者有之否先生曰有之問先生之悟門云何曰積昔從安定先生學先生晚畜二侍姬諸弟子莫見一日因延食中堂二女子侍側食巳積請於安定曰門人或問見侍子否何以告之安定曰莫安排積由是有得此積之悟門也二叔父議析居先生涕泣止之不可於是請二叔父先取所欲餘書十篋弊屋數間而巳先生怡然受之二叔父殁家事替先生事叔母如母送死無不備先生事母謹嚴非有大故未嘗去其側日具太夫人所嗜或不獲即奔走闤市若有所亡人或慕其純孝損直以售之親戚故人人致甘毳誠不至禮不恭弗受也所奉饌皆手自調味太夫人飲食時先生率家人在左右為兒嬉或謳歌以説之故太夫人雖在窮巷而奉養與富貴家等無須臾不快也應舉貢禮部不忍一日去其親遂徒步載母西入京師一日借人書册經夕還之人知其必不校乃誣曰册中有金葉先生遜謝賣衣償金聞者皆不平強使歸金先生終不受平居日未嘗事聲律及試有司亦以賦中第同榜第一人許安世率同年數十人拜太夫人於堂上仍以百千為太夫人壽數往返先生終拒之先生年過壯未娶或勉之答曰娶非其人必為母病豫非敢忘嗣固有待也先生以羅城君諱石平生不用石器遇石則避而不踐或謂先生曰天下用石多矣必避之然後為孝歟他日山行奈何先生曰此吾私迹則然吾豈固避之哉吾遇之怵然傷吾心乃思吾親不忍加足其上他日若有君命敢從私乎行狀太夫人既以疾終先生號慟嘔血絶而復蘇哭不輟聲水漿不入口七日廬墓三年卧苫枕塊縗絰不去身至雪夜哀號伏墓呼太夫人問寒否如平生困委僵仆手足皆裂不顧也翰林吕溱嘗造廬下見其飲食聞其號哭垂涕曰想見鬼神中夜聞此聲亦須為公泣所居茅舍不蔽風雨而農夫樵父瞻仰如神有爭訟者必造之先生以義裁決皆恱服而去不復造有司每嵗甘露降於墳域必逾月郡縣吏民無長少日至東郭焚香致恭城中為虛競獻粟帛藥劑悉無所受鄰邑之人環廬擁道移市就之踰月乃止太守迎先生入學嵗四月降甘露於所舍太夫人墳左有杏一本兩枝數年矣一日兩枝之端忽漸相向踰時遂合今尚存也先生居州學教授舍尚設考妣几筵晨昏起居執㸑滌器饋食如生冬以火溫衾席夏揮扇去蚊蚋思母平時所甘日以供祀未嘗一日不奉酒也行狀先生嘗患鄉飲之禮世久不見率郡守舉行其儀閭巷鄉老皆使與飲又著文勸諭其子弟室家是日士民在泮者蓋千人行狀先生平日教學者每以治心養氣四字為先曰修身務學為文之要莫大於此其效甚明其術甚易晚乃著書未成而病嘗曰吾之書大要以正治心以直養氣而巳四方士大夫上謁請見者無虛日先生酬答不倦忘寢與食或問立朝之要則必曰以正輔乎君或問修身之要則必曰以正修其身自逺方寄匣軸請教者乃大書一正字與之諸生有逾年不省侍者以私財遣之使歸行狀先生天文之學尤造其妙門人問之則曰昔有學天文於譙周者周曰天下事可學者甚多何獨天文行狀先生居山陽鄉校幾三十年事先聖如一日籩豆器皿必自盥濯春秋釋菜必數日齊戒諸生無家者每嵗時置酒與之飲其殁於學者皆葬徐氏地中無人奉蒸嘗者數百人設廣坐祭之行狀先生自少戒殺見聚蟻惕然惟恐踐之未嘗誦佛書而每論佛必得其要平日默處一室幾若與世相忘至其論天下事則衮衮不倦有客自廣東奉使歸見先生語邊事先生因論二廣山川險易堡塞踈密畨禺搶手利害口誦手畫若數一二使者歎曰不出戶而知天下者徐公是也行狀先生於前代名將酷慕諸葛武侯以其所學之廣所養之厚也嘗謂兵者實大賢盛德之事非小才小智所能用不獨用之難也言之亦難若其所養不至而易言之鮮不敗事行狀先生自少及老日作一詩為文率用腹藁口占其子書之作大河詩二百餘韻一夕乘興自書不改一字嘗曰文字在胸中出之未暇者不可勝記晚年益好觀書目力視小字不衰自得耳疾不發逺書其欲答者率以小詩報之然詩亦不至京師行狀先生居官得祿奉祭祀外悉付家人未嘗問有無至親舊急難則罄所有赴其急或脫衣衣之率以為常故居州序三十年未嘗一日絶祿而家徒四壁立行狀先生一日升堂訓諸生曰諸君欲為君子而使勞巳之力費巳之財如此而不為猶之可也不勞巳之力不費巳之財何不為君子鄉人賤之父母患之如此而不為猶之可也父母欲之鄉人榮之何不為君子又曰言其所善行其所善思其所善如此而不為君子者未之有也言其不善行其不善思其不善如此而不為小人者未之有也行狀先生以病廢人事惟里閭故舊親戚之喪遣吊祭親治辦如平日滌罌缸貯酒拜而後遣之安定言行録先生病革門人問之先生遽以衣覆首曰不巾不敢延坐又謂其子曰君子命在須臾恍惚之間然而不敢少忘禮義并舉曽子易簀之事因誦檀弓一篇誦畢而化行狀傅尚書墨卿𥘉尉江都往來山陽深為節孝先生所知或問先生所為知墨卿者先生曰方欽聖升遐楚之郡縣官若寓若客皆集服臨郡廷下惟傅尉容稱其服吾是以賢之安定言行録六之三丞相晏元獻公公名殊字同叔撫州臨川人以神童召試擢袐書省正字召試中書纍遷知制誥入翰林為學士遷左庶子仁宗即位拜樞密副使出知應天府召為三司使拜參知政事出知亳陳州復為三司使康定初知樞密院事遂為樞密使進同中書門下平章事慶曆中知頴陳許州以觀文殿大學士知永興軍徙河南府以疾請訪醫藥京師因留侍經筵踰年薨年六十五晏公殊父夲撫州手力節級晏公幼能為文李虛已知滁州一見竒之許妻以女因薦於楊大年大年以聞時年十三真宗靣試詩賦疑其宿成明日再試文采愈美上大竒之即除袐書省正字令於龍圖閣讀書師陳彭年陳彭年亦撫州人有文學而姦邪丁謂薦之置上左右使其譽已溫公日録晏元獻公為童子時張文節薦之於朝廷召至闕下適值御試進士便令公就試公一見試題曰臣十日前巳作此賦有賦草尚在乞別命題上極愛其不隱及為館職時天下無事許臣寮擇勝燕飲當時侍從文館士大夫各為燕集以至市樓酒肆往往皆供帳為遊息之地公是時貧甚不能出獨家居與昆弟講習一日選東宫官忽自中批除晏殊執政莫諭所因次日進覆上諭曰近聞館閣臣寮無不嬉遊燕賞彌日繼夕惟殊杜門與兄弟讀書如此謹厚正可為東宫官公既受命得對上靣諭除授之意公語言質野對曰臣非不樂燕遊者直以貧無可為之具臣若有錢亦須往但無錢不能出耳上益嘉其誠實知事君體眷注日深仁宗時卒至大用筆談公既佐佑東宮真宗所以咨訪多以方寸小紙細書問之由是參與機密凡所對必以其藁進示不泄其後悉閲真宗閣中遺書得公所進藁類為八十卷藏之禁中人莫之見也神道碑真宗遺詔章獻明肅太后權聽軍國事宰相丁謂樞密使曹利用各欲獨見奏事無敢決其議者公建言群臣奏事太后者垂簾聽之皆毋得見議遂定神道碑章聖皇帝判南衙時章獻太后得幸張耆有力焉天聖中太后以耆為樞密使殊言樞密與中書為兩府同任天下大事朝廷雖乏賢亦冝以中材者處之如耆者但冨貴之可也忤太后旨坐以笏擊僕隸出守南京名臣傳公留守南京大興學校以教諸生自五代以來天下學廢興自公始神道碑太后謁太廟有請服衮冕者太后以問公公以周官后服對神道碑章懿之崩李淑護葬晏殊撰志文志言生女一人早卒無子仁宗恨之及親政內出志文以示宰相曰先后誕育朕躬殊為侍從安得不知乃言生一公主又不育此何意也吕文靖曰殊固有罪然宫省事袐臣備位宰相是時雖略知之而不得其詳殊之不審理容有之然方章獻臨御若明言先后實生聖躬事得安否上默然良久命出殊守金陵明日以為逺改守南都及殊作相八大王疾革上親往問疾王曰叔久不見官家不知今誰作相上曰晏殊王曰此人名在圖讖胡為用之上歸閲圖讖得成敗之語并記志文事欲重黜之宋祁為學士當草白麻爭之乃降二官知潁州詞曰廣營産以殖資多役兵而規利以它罪羅織之殊免深譴祁之力也龍川志自公復召用而趙元昊反師出陜西天下弊於兵公數建利害請罷監軍無以陳圖授諸將使得應敵為攻守及制財用為出入之要皆有法天子悉為施行自宫禁先以率天下而財賦之職悉歸有司卒能以謀臣元昊使聽約束乃還其王號神道碑公為人剛簡遇人必以誠雖處冨貴如寒士樽酒相對歡如也得一善稱之如巳出當丗知名之士如范仲淹孔道輔等皆出其門及為相益務進賢材當公居相府時范仲淹韓琦冨弼皆進用至於臺閣多一時之賢天子既厭西兵閔天下困弊奮然有意遂欲因群材以更治數詔大臣條天下事方施行而小人權幸皆不便明年秋會公以事罷而仲淹等相次亦皆去事遂已神道碑公自少篤學至其病亟猶手不釋卷其為政敏而務以簡便其民其於家嚴子弟之見有時事寡姊孝謹未嘗為子弟求恩澤其在陳州上問宰相曰晏殊居外未嘗有所請其亦有所欲邪宰相以告公公自為表問起居而巳故其薨也天子尤哀悼之神道碑公剛峻簡率盜入其第執而榜之既委頓以送官扶至門即死纍典州吏民頗畏其悁急云
