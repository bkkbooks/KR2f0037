body:
  text: 十之二門下侍郎韓公公名維字持國忠憲公之子以蔭輔將作監主簿除國子監主簿知太常禮院為淮陽王府記室參軍修起居注兼侍講知制誥通進銀臺司太子右庶子出知汝州召還修英宗實録兼侍講判司農太常吏部流內銓除翰林學士知開封府繼除御史中丞遷翰林侍讀學士出知襄州復入為翰林學士承旨兼侍讀學士知制誥知通進封駮事出知河陽除資政殿學士提舉崇福宫哲宗即位除兼侍讀提舉中太一宫加大學士元祐元年為門下侍郎二年出知鄧州潁昌府以太子少傅致仕紹聖中責授崇信軍節度副使均州安置諸子乞盡歸其官聽父居鄉里詔從之元符𥘉復左朝議大夫薨年八十二公弱不好弄篤志問學嘗以進士薦禮部父任執政不就廷試乃以父任守將作監主簿丁外艱服除闔門不仕仁宗患搢紳奔競諭近臣曰恬退守道者旌擢則躁求者自當知恥於是宰相文彥博宋庠等言公好古嗜學安於靜退乞加甄録以厚風俗召試學士院辭不赴除國子監主簿行狀歐陽文忠公為史館修撰薦公檢討知太常禮院先是溫成皇后立廟用樂公因祫饗上疏乞詔有司議廟制有不如禮者一切裁去以明陛下不私後宫専奉祖宗之意宰相陳執中薨請諡公立議及上書以謂皇祐之末貴妃張氏薨天子問以以葬祭之禮執中知皇儀治喪非嬪御之禮乃請追册位號建廟用樂此不忠之大者宜諡曰榮靈以應寵祿光大不勤成名之法朝廷賜諡恭公連疏論列以謂責難於君為恭臣之議執中正以不恭遂罷太常禮院行狀神宗封淮陽郡王出就外邸以公為記室參軍神宗遇公尤厚每事咨訪公悉心以對至於拜起進退之容皆陳其節聞見録云神宗邸英宗命韓魏公擇宫寮用王陶韓維等皆名儒厚德之士神宗內朝拜稍急維曰維下拜王當效之一日侍坐近侍以弓樣樣靴進維曰王安用舞靴神宗有愧色亟令毁去神宗嘗與公論天下事語及功名公曰聖人功名因事始見不可有功名心神宗拱手稱善誦書有言逆于汝心必求諸道有言遜于汝志必求諸非道以為聽納之戒公嘗引疾請郡神宗上章乞留將去王府採東平樂善之語為贊以獻慈聖垂簾諭宰臣曰諸王仁孝日聞皆卿等御名擇宫臣所致宜召至中書褒諭時禁中遣使泛至諸臣之家為潁王擇妃公上疏以謂潁王孝友聰明動履法度方嚮經學以觀成德仐合族授室其繫尤重宜歷選勳望之家御名擇淑哲之媛考古納采問名之義以禮成之不宜苟取華色而巳行狀除起居注侍邇英講筵是時英宗方免喪簡默不言公上疏曰邇英閣者陛下燕間之所也侍於側者皆獻納論思之臣陳於前者非聖人之經則歷代之史也御燕間則可以留漏刻之永對大臣則可以極咨訪之博論經史則可以窮仁義之道成敗之源今禮制終畢臣下傾耳以聽玉音語曰時然後言陛下之言此其時也臣雖不敏請秉筆以俟行狀御史吕誨等論濮安懿王稱親得罪公上疏言誨等能審禮守職國之忠臣計其用心不過欲陛下盡如先王之法而止耳士大夫貪困寵利厚賞嚴罰猶恐此風不變而復內牽邪説貶斥正人自此陛下耳目益雍蔽矣又求對極論其失請追還前詔令百官詳議以盡人情復召吕誨等還任舊職以全政體既而誨等降黜敕命不由門下封駮公言罷黜御史事關政體而不使有司預聞紀綱之失無甚於此宜追還敕銀臺使臣得申議論不從遂闔門待罪乞解職有旨舉臺官二人公上章曰吕誨范純仁有巳試之效願復其職以盡招賢納諌之美蘇宷除御史知雜公封還詞頭以謂自濮王稱親逐三御史傅堯俞等復不肯就職仐用蘇宷則堯俞等豈復有可留之理行狀霪雨為災詔求直言言事者衆公請擇近臣委以章奏事有可行行之又請擇郡守及言近制私罪雖輕常為仕進之纍公罪雖大一時𬒳責輒復升進請詔有司議私罪之可恕者稍蠲留礙以通滯才坐公罪之有害者稍加困抑以警慢吏行狀時英宗𥘉政公因便殿奏事論人君好惡當明賞刑以示天下使人知所避就則風俗可移又以為聖賢思慮不能全無過差假如陛下誤有處分改之則足以彰納善從諌之美未幾翰林學士范鎮作批答不稱旨出輔郡公言鎮誠有罪自可明正典刑若其所失止在文字當函容以全近臣體貌陛下前黜錢公輔中外以為太重比連退二近臣而衆莫知其所謂臣恐自此各懷疑懼莫敢為陛下盡忠者行狀神宗踐祚公陳三事以獻一曰從權聽政蓋不得巳者惟大事急務時賜裁決餘當闊略二曰執政皆兩朝顧命大臣宜推誠加禮每事咨訪以盡其心三曰百官執事各有其職惟當責任使盡其能若王者代有司行事最為失體其末又曰天下大事不可猝為人君施設自有先後惟加意御名重及注釋滕丗子問孟子居喪之禮一篇以獻因推及後丗禮文之變以申規諷上皆嘉納行狀御史中丞王陶彈擊宰相韓琦等不押常朝班以為跋扈陶罷御史中丞為翰林學士公言宰相跋扈王法所當誅也御史中丞之言是則宰相安得無罪若其非是中丞安得止罷臺職而已今為翰林學士是遷也陛下既不能辨明大臣使負惡名有不自安之意又使言者無名罷去疑惑逺方願庭對群臣使是非兩判參知政事吳奎論王陶遷官封還御批罷知青州公以為奎素有學問敦篤持重可任以事擢參大政衆謂得人今才數月止因論事之際少失婉順便加斥逐進退大臣不當如是有旨進奎官一級公曰執政罷免則為降黜今復遷官則為褒進理難並行此與王陶罷中丞而加翰林學士何以異賞罰所以為天下之耳目豈可不御名章纍上神宗召奎面諭就職琦等各復其位公援前言力請郡知潁州改汝州行狀𥘉英宗即位祔仁宗主而遷僖祖及神宗即位中書奏夲朝自僖祖以上丗次不可得知則僖祖有廟與稷契等今毀其廟而藏其主夾室非是因復還僖祖而遷順祖公上疏曰昔先王既有天下迹基業之所由起奉以為太祖稷契是也後丗有天下者皆特起無所因故遂為太祖其所從來久矣太祖皇帝戡定大亂子孫遵業萬丗蒙澤為宋太祖無可議者僖祖雖於太祖髙祖也然仰迹功業非有所因上尋丗系不知所始若以所事稷契事之切恐於古雖有考而於仐有所未安宜如故便行狀除御史中丞公以兄康公任樞密副使兼條例司御史中丞於朝廷闕失無所不當言不言則廢公議言之則傷私恩且吕公著論青苗事用此而罷臣代其任自處之地不得無嫌且無以屈士大夫之論又屢面對引義堅切復知開封府始置八廂分決輕刑輦轂清肅時吳充為三司使神宗曰韓維吳充以文學進及任繁劇皆號稱職可謂得人行狀遷翰林侍讀學士差考試賢良方正孔文仲對䇿入等巳而文仲罷歸公言陛下亡以文仲為一賤士爾黜之何損臣恐賢俊由此解體忠良結舌阿諛苟合之人將窺隙而進為禍不細願改賜處分章五上其言益切堅請便郡除端明殿學士翰林侍讀學士知襄州行狀除翰林學士承旨入對延和殿時京師旱神宗曰久不雨朕夙夜焦勞奈何公曰陛下憂旱傷損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事願陛下痛自責巳下詔廣求直言以開雍蔽大發恩令有所蠲免以和人情後數日上疏曰近日畿內縣督索青苗錢甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹此苦夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚鋭至於蠲除租稅寬格逋負以救愁苦之民則遲遲而不肯發望陛下自奮英斷行之過而養人猶愈於過而殺人也因奏對面論神宗感悟有旨根究市易免行利害權住方田編排保甲罷議東西川市易命公草詔求直言其略曰朕之聽納有不得於理歟獄訟非其情歟賦斂失其節歟忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟詔出人情大悅是日大雨又命與知開封府孫永同體問在京諸行利害事未幾令吕嘉問同行體問又令以問到利害送吕嘉問等公上疏曰陛下待臣乃在吕嘉問之下臣雖不才先帝所命以輔陛下於𥘉潛行年六十未嘗有一言稍涉阿倚以希巳利未嘗有一言不盡理道以損聖聰今於此小事處置關防乃不得與新進小臣為比臣復何面目出入禁闥懇求去位優詔答之知熙州王韶赴闕奏事將領景思立敗績韶還任上表待罪奏斬獲首級公草批答曰方其敗時卿適在朝何嫌而上章引咎勉綏新附之衆母以多殺為功讀者竦然公自以言多不用求去益堅會康公入相援故事乞輔外以端明殿學士龍圖閣學士知河陽坐議免行錢不合落端明殿學士踰年復職徙知許州行狀車駕幸舊邸除資政殿學士通議大夫再任而中書舍人曽鞏草制稱公純明亮直練逹古仐先帝所遺以輔朕躬又曰三川之間韓延夀黃霸之迹在焉興禮樂而勸農桑以追參于前烈皆爾素學御批韓維不知事君之義朋俗罔上老不革心非所謂純明亮直姑以藩邸舊恩使守便郡又非可仗以布政宣化今辭命乖戾不中夲情傳播四方甚害好惡可送中書省改辭行下鞏贖銅十斤公請宫觀乃以為提舉西京嵩山崇福宫行狀神宗晏駕公赴臨闕庭太皇太后遣使降手詔勞問公對曰治天下之道不必過求髙逺止在審識人情而已識人情不難以巳之心推人之情則可見矣大凡貧則思富苦則思樂困則思息鬱則思通陛下誠能常以利民為本則民富矣常以憂民為心則民樂矣賦役非人力所堪者去之則勞困息矣法禁非人情所便者蠲之則鬱窒通矣推此而廣之盡誠心而行之則神孫觀陛下之法不待教而自成聖德賢士聞陛下之風不煩諭而爭宣忠力矣遂出榜朝堂詔求直言公應詔言六事一曰青苗蠲嵗散之法二曰免役除寬剩之數三曰坊埸依祖宗法中歲定額不可添長四曰罷市易五曰斂保馬六曰禁錢幣出關又言先帝以夏國主秉常受朝廷爵命而國母擅行囚廢故興兵問罪今國母死秉常復位所為恭順有藩臣禮冝復還其故地以成先帝聖意因陳兵之不可不息者有三地不可不棄者有五行狀邇英讀三朝寶訓至天禧中有二人犯罪法當死真宗皇帝惻然憐之曰此等安知法弒之則不忍捨之則無以勵衆乃使人持去笞而遣之以斬訖奏又祀汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔資政殿學士韓維讀畢因奏言此特真宗皇帝小善爾推其心以及天下則仁不可勝用也真宗自澶淵之役却狄之後十九年不言兵天下富庶其源蓋出於此昔孟子論齊王不忍觳觫之牛以為是心足以王今恩足以及禽獸而不及於百姓豈不能哉蓋不為耳外人皆云皇帝陛下仁孝發於天性每行見昆蟲螻蟻違而過之且勑左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚軾時為右史奏曰臣今月十五日侍邇英閣切見資政殿學士韓維因讀三朝寶訓至真宗皇帝好生惡殺因論皇帝陛下在宫中不忍踐履蟲蟻其言深切可以推明聖德益增福夀臣忝備位右史謹書其事於册又録一夲上進意望陛下采覽無忘此心以廣好生之德臣不任大願東坡集元祐元年為門下侍郎詔臣僚不得言先朝事而臺諌欲有所言乞改詔語公於簾前抗議以為帝王詔令傳信四方豈可鐫改御史張舜民以言事罷王巖叟固爭簡上官均問舜民事如何語泄朝廷下巖叟分析公曰朝廷但論其所言是非若所言是則折簡聚談更相督責乃是相率為善何害於理若所言不善雖杜門不通問訊各執巳見論議非惟國事無輔亦恐人情壅隔行狀𥘉公與王安石雅相厚善安石執政公議國事始多異同至是議者欲廢三經義公以為安石經義宜與先儒之説並行不當廢司馬公光與公平生交俱以耆舊進用至臨事未嘗一語附合務為苟同人服其平行狀時中官梁惟簡除入內內侍省押班范純仁等纍奏未允公於簾前力爭許之其後惟簡遷官蘇轍繳還詞頭公因面奏論內降且言仁宗寬仁每言近習貴戚僥求恩澤宣諭執政卿等但依公執奏可以寢罷臣備位執政自可執奏不問人怨憎惟簡罷遷官行狀公自嘉祐以來為名臣神宗知之尤深屢欲大用會王安石用事變更舊法公言多異及元祐𥘉起為門下侍郎宣仁哲宗眷禮優異公自以四朝舊臣身任天下之重庶幾行其所知而在位不踰年遂去天下惜之行狀先生云韓持國服義最不可得一日頥與持國范夷叟泛舟於潁昌西湖須臾客將云有一官貟上書謁見大資頥將謂有甚急切公事乃是求知巳頥云大資居位却不求人乃使人倒來求巳是甚道理夷叟云只為正叔大執求薦章常事也頥云不然只為曽有不求者不與來求者與之遂致人如此持國便服程氏遺書韓持國罷門下侍郎出帥南陽已出國門程子往見之子時在講筵公驚曰子來見我乎子亦危矣程子曰只知履安地不知其危坐頃之公不言子曰公有不豫色何也公曰在維固無足道所慮者貽兄姊之憂耳子曰領帥南陽兄姊何所憂公悟曰正為定力不固耳程氏遺書十之三泰山孫先生先生名復字明復晉州平陽人舉進士不中退居泰山學春秋著尊王發微十二篇用范仲淹冨弼薦除國子監直講車駕幸太學賜緋衣銀魚召為邇英閣祗候説書坐事貶監虔州稅後通判陵州未行留為直講卒年六十六先生少舉進士不中退居泰山之陽學春秋著尊王發微魯多學者其尤賢而有道者石介自介而下皆以弟子事之先生年逾四十家貧不娶李丞相迪將以其弟之女妻之先生疑焉介與群弟子進曰公卿不下士久矣今丞相不以先生貧賤而欲託以子是髙先生行義也先生冝因以成丞相之賢名於是乃許孔給事道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜則扶之及其往謝也亦然魯人既素髙此二人由是始識師弟子之禮莫不嗟嘆之而李丞相孔給事亦以此見稱於士大夫歐陽公撰墓志又澠水燕談云孫明復先生退居太山之陽枯稿憔悴鬚鬢皓白故相李文定公守兖就見之歎曰先生年五十一室獨居誰事左右不幸風雨飲食生疾奈何吾弟之女甚賢可以奉先生箕帚先生固辭文定曰吾女不妻先生不過一官人妻先生德髙天下幸壻李氏榮貴莫大於此先生曰宰相女不以妻公侯貴戚而固以嫁山谷衰老藜藿不充之人相國之賢古無有也豫不可不成相國之賢遂娶之其女亦甘淡薄事先生盡禮當時士大夫莫不賢之先生治春秋不惑傳注不為曲説以亂經其言簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經之夲義為多召為直講將以為侍講而嫉之者言其説異先儒罷之及病樞密使韓公言於朝選書吏給紙筆命其門人祖無擇就其家得其書十有五篇録之藏于祕閣墓志按論罷孫公者楊安國也先生惡胡瑗之為人在太學常相避瑗治經不如先生而教養諸生過之張堯封從孫明復先生學於南京其女子常執事左右堯封死入禁中為貴妃寵遇第一數遣使致禮于明復明復閉門拒之終身邵氏後録范文正在睢陽掌學有孫秀才者索遊上謁文正贈錢一千明年孫生復道睢陽謁文正又贈十千因問何為汲汲於道路孫生戚然動色曰母老無以養若日得百錢則甘旨足矣文正曰吾觀子辭氣非乞客也二年僕僕所得幾何而廢學多矣吾今補子為學職月可得三千以供養子能安於學乎孫生大喜於是授以春秋而孫生篤學不捨晝夜行復修謹文正甚愛之明年文正去睢陽孫亦辭歸後十年聞泰山下有孫明復先生以春秋教授學者道德髙邁朝廷召至乃昔日索遊孫秀才也東軒筆録
