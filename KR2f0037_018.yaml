body:
  text: 三之三參政吳文肅公公名奎字長文濰州北海人𥘉舉五經後舉賢良方正入等擢太常博士通判陳州入為右司諌改起居舍人同知諌院出知密州還修起居注遷知制誥知壽州入為翰林學士權發遣開封府出守鄆復入翰林拜樞密副使神宗𥘉拜參知政事尋以資政殿大學士知青州薨年五十八始公為少吏晝則治公事夜輒讀書嘗不寐者積二十餘年性既開敏強記不忘作為文章實核有法度繇是中外大臣交口稱薦及遷太子中舍自以朝臣得言事於是上疏論取士法及時政得失九事又欲召見口論事仁宗深器之劉貢父撰墓志公始對䇿極論內降恩澤之為蠧政也及在諌官遂專以禁切左右於是近臣有承用中旨而不言者坐而下遷及群臣有因事僥幸雖巳得官皆禠奪之朝廷為肅然御史有言事非其實者詔詰問從誰受公奏言御史擇於風聞以言事朝廷用之救過失使其擇之不詳朝廷能容容之不能罪之可也若求主名則後莫有以事告御史者矣是自蔽塞其耳目也上立罷不問是時郭承祐以舊恩為宣徽使知應天府事數妄作不中法度又張堯佐以後宫戚屬自三司使為宣徽使公連上疏極諌終之承祐奪宣徽使堯佐出知河陽是後遂不復遷官上又著令后妃之家不得為執政官云其他排擊非義救解過失條舉善政顯用才士巨細疏密苟為有知必言言之不從未嘗但巳也時因天變為上推致休咎而舉人事消復之應上常聽受之墓志奉使契丹虜中群臣為其主加稱號謁公使入賀公自以使事有職賀無預也不為往虜主畏其守義甚重之及還中路與虜使遇虜人衣服以金冠為重而紗冠次之其與漢使接衣服重輕皆有以相當至是虜人紗冠邀漢使盛服公不許亦殺其禮坐是二事出知壽州墓志公明於從政歷兩郡皆著治稱及領京師富人孫氏京師大豪辜榷財利負其息者至評取物産及其婦女公發其宿罪徙之逺方豪猾斂手聲聞赫然墓志𥘉仁宗皇帝春秋髙而皇嗣未立公自為諫官即為上言天下大計願早有所係其後因大水日月蝕之變又以為言及為學士因奏事上留語曰將有所置以維大本公再拜賀因復進勸巳而皇子御名遂定英宗即位再遷禮部侍郎公辭不拜詔報不許曰卿在西掖有儲二之言人乃知公嘗密謀定計也墓志神宗𥘉立以公為參知政事執政言樞密副使陳升之有輔立陛下之功上曰吳奎輔立先帝其功不又大乎未幾御史中丞王陶論宰相韓琦曽公亮不押文德殿班因肆言詆琦以為跋扈琦待罪家居公勸上黜陶上手詔除陶翰苑公復疏陶險躁妄摧辱大臣不冝在朝廷并自劾違詔待罪陶亦上疏詆公附宰相乃出陶知陳州而公亦出守青州神宗問政府地震之變曽公曰隂盛上曰誰為隂曽公曰臣者君之隂子者父之隂婦者夫之隂夷狄者中國之隂皆冝戒之上問長文長文曰但為小人黨盛耳上不懌溫公日録韓魏公嘗云吳長文有識方天下盛推王安石以為必可致太平唯長文獨語所知曰王安石必強性很不可大用其後果如所言魏公別録公𥘉與鄉人王彭年善稱道其能為致名宦彭年客死于京師公使長子主喪事周恤其家嫁其二女焉及它姻族有不能自存者為畢嫁娶又數人以錢二千萬買田北海號曰義莊以賙親戚朋友之貧乏者終之日家無餘財諸子無宅以居烏乎可謂篤義君子矣墓志三之二參政陳晉公公名恕字仲言洪州南昌人少為縣吏俄折節讀書中進士第歷官州郡以吏幹聞入判吏部選事拜鹽鐵使參知政事出知江陵府淳化中復召為鹽鐵使知咸平五年貢舉所取士甚少而以王曾為首時議稱之薨年五十九尚書左丞陳公恕峭直守公性靡阿順惣領計司多歷年所每便殿奏事太宗或未深察必形誚讓公斂板踧縮退至殿壁負牆而立若無所容俟帝意稍解復進慤執前奏終不改易如是或至三四上以其忠亮多從其議故當時言稱職者公為之首王沂公筆録陳恕長於心計為鹽鐵使釐去宿弊大益輿利太宗深器之嘗御筆題殿柱曰真鹽鐵陳恕掇遺陳晉公為三司使將立茶法召茶啇數十人俾各條利害晉公閲之第為三等語副使宋太初曰吾觀上等之説取利太深此可行於啇賈而不可行於朝廷下等固滅裂無取唯中等之説公私皆濟吾裁損之可以經久於是始為三説法行之數年貨財流通公用足而民冨實丗言三司使之才以陳公為稱首後李侍郎咨為使改其法而茶利浸失後雖屢變然非復晉公之舊法也東軒筆録陳晉公自升朝入三司為判官既而為鹽鐵使又為總置使洎罷參政復為三司使首尾十八年精於吏事朝廷藉其才晚年多病乞解利權真宗諭曰卿求一人可代者聽卿去是時冦萊公罷樞密使歸班晉公即薦以自代真宗用萊公為三司使而巳晉公為集賢學士判院事萊公入省檢尋晉公前後改革興立事件類為方册及以所出榜示別用新板題遍躬至其第請晉公判押晉公亦不讓一一與之押字既而萊公拜於庭下而去自是計使無不循其舊貫至李咨為三司使始改茶法而晉公之規模漸革向之榜示亦稍稍除削今則無復存者矣東軒筆録陳恕為三司使真宗命具中外錢穀大數以聞恕諾而不進久之上屢趣之恕終不進上命執政詰之恕曰天子冨於春秋若知府庫之充羡恐生侈心是以不敢進上聞而善之記聞陳恕領春官以王沂公為舉首歲中拔劉子儀于常選自云吾得二俊名丗才也是不愧於知人楊文公以為然謂王揚休山立宗廟器也談叢公精於吏理深刻少恩性公直人不敢干以私頗獵史傳多識典故前後掌利柄十餘年強力幹事胥吏畏服有稱職之譽善談論聽者忘倦素不喜釋氏嘗請廢譯經院辭甚激切真宗曰三教之興其來巳久前代毀之者多矣但存而不論可也張忠定公閲邸報忽再言可惜許門人李畋請問之曰參政陳左丞恕無也斯人難得唯公唯正為國家斂怨於身斯人難得退為詩哭之乖崖語録丗稱陳恕為三司使改茶法歲計幾增十倍豫為三司使時考其藉蓋自景德中北戎入冦之後河北糴便之法蕩盡此後茶利十喪其九恕在任值北虜講解啇人頓復歲課遂增雖云十倍之多考之尚未盈舊額至今稱道蓋不虞之譽也筆談
