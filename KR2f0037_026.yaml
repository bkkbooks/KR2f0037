body:
  text: 四之四集賢學士劉公公名敞字原父吉州臨江人中慶曆六年進士甲科通判蔡州召試直集賢院判登聞鼓院吏部南曹考功知制誥出知楊州徙鄆州召還糾察在京刑獄以翰林侍讀學士出知永興軍嘉祐八年召判三班院太常寺出知汝州改集賢院學士判南京留司御史臺熙寧元年卒年五十直集賢院是時方議定大樂天子使中貴人參其事公諌以謂王事莫重於樂今材學滿朝辨論有餘足以增朝廷之光而顧使若趙談者居間臣恐為袁盎笑也弟舍人攽撰行狀秦州與羌人爭古渭州上以問左右棄之存之孰利公時從三司奏事聞之上奏獨請棄之以謂假令新城足以蔽秦州長無羌胡之虞雖傾國守之可也不然地形便利賊能乘之以擾邊圉雖傾國爭之可也今何所重輕而糜國財困民力捐士卒之命以貪咫尺之地而有棄明信規小利之名於夷狄使其有以窺中國非計也時議者不同竟留之秦州坐是應接多事財用匱竭矣行狀公判考功夏英公薨賜諡文正公曰此吾職也即上疏言諡者有司之事也且竦行不應法今百司各得守其職而陛下侵臣官疏九三上天子嘉其守為更其諡曰文莊公曰姑可以止矣歐陽公撰墓志至和元年正月張貴妃薨追號溫成皇后有獻議求為立忌日禮官請對不許公奏言太祖以來后廟四室猶不立忌奈何以私昵之愛而變古越禮恐祖宗神靈不樂於此上乃止行狀𥘉陳丞相以公不附巳論議不能佑公唯天子察公忠直數得公奏議開納無疑故亟用公知制誥陳丞相以修注未一月為言上不聽曰此豈計官資日月邪公謝日上又面諭曰外間事不便有所聞當一一語朕也無幾何朝廷從禮院有所詢問禮生擅發印狀以報禮官莫知知禮院事吳充謫罰禮生而坐以出官公奏以謂朝廷久安吏習因循百司庶府苟且巳甚稍激厲振職未知如何而使充以此得罪豈不傷事害政也請追止前命巳而修起居注馮京復以言事奪職公因奏事上謂公曰吳充乃是振職馮京意亦無它中書惡其太直不與含容耳公奏言自古唯有人主不能容受直言或致竄謫臣下今則不然上意慈仁好諌而中書不務將順聖德之美排逐言者乃是蔽君之明止君之善必且感動隂陽有風霧日食地震之異居五日地果震鎮戎軍而都下雪後纍日昏霾太陽色黃濁略皆如公言公又密勸上收覽威權無使聰明蔽塞法令不行以消伏災變上深納之行狀兩制諸公多求輔郡者公上疏論邪臣正臣進退之分正臣常難進而易退邪臣常易進而難退願陛下參任觀之吕溱蔡襄歐陽修賈黯韓絳皆有直質無流心論議不阿執政有益當世者誠不冝許其外輔使四方有以窮朝廷啓姦幸之心上悟頗留修等行狀宦者石全彬以勞遷宫苑使領觀察使意不滿退而愠有言居三日正除觀察使公封還辭頭不草制其命遂止墓志奉使契丹公素知虜山川道里虜人道自古北口回曲千餘里至栁河公問曰自松亭趨栁河甚直而近不數日可至中京何不道彼而道此蓋虜人常故迂其路欲以國地險逺誇使者且謂莫習其山川不虞公之問也相與驚顧羞愧即吐其實曰誠如公言時順州山中有異獸如馬而食虎豹虜人不識以問公曰此所謂駮也為言其形狀聲音皆是虜人益歎服墓志𥘉狄靑自南伐歸為樞密使京城小民聞靑驟貴相與推説誦詠其材武青每出入輒聚觀之至壅路不得行上自正月不豫靑益為都人所指目公憂之會將赴楊州辭行見上因言陛下愛靑不如出之以全始終今外説紛紛雖不足信要當使無後憂寧負青無使負國家上頷之曰可語中書公過見三丞相謂曰向者天下有可大憂者又有可大疑者今上體復平大憂去矣而大疑者尚存具以青事告之丞相應對唯唯公既至官拜表又遍遺公卿書曰汲黯之忠不難於淮陽而眷眷於李息朝廷皆知為青發也至八月京師大水青避水徙家相國寺行坐殿上都下喧然執政聞之始懼以熟狀出青判陳州先是有彗星見青去之夕而彗沒自皇祐末有日食之變公嘗獻救日論三篇備言所以防姦禦變之術青見而惡之謂所親曰劉舍人以此洗滌青邪公之建言或以為過計及後乃大服云行狀楊州雷塘即漢江都之雷陂也舊屬民自唐以來耕種其中往數十歲官取蓄水以備漕運舊田主二十六家皆奪業失職官始議以它田償之竟無與也然塘亦破決不修漕運未嘗賴此發運使因以假楊州種稻舊田主三百餘口皆飢寒縣官莫省及公至持大和年契書詣府自訟公即判還之發運使猶以漕運事動朝廷靳留之公用種稻事證明其無用朝廷乃聽公杜公丞相衍致仕居南都聞之喜曰真良太守矣行狀公𥘉治楊前守政苛吏民不安公以寬簡附之而民大和及至鄆鄆比易守政事不治市邑攘􅐁公行不禁訟或至纍月不決公撥遣簿書決平獄訟不數日則巳無事乃更約束明賞罰下吏奔走承命月餘境內正清盜賊屏息使客行夀張道中遺錢一囊人不敢取以告耆長長為守視頃之客還取得之又有暮遺物市中者旦往取故在其所先是西路久旱麥不登鄆州尤多蝗蟲公入境而雨至州數日蝗自出境亡去歲以有年行狀召還朝是時士大夫稍矜虛名每得官輒讓衆亦豫其恬退之稱讓不失始利而得名益髙讓端無窮或四五讓至七八天子嘗優容之下至布衣福州陳烈等𥘉除吏亦讓賜之粟帛亦讓公以為此皆挾偽求名要上迷衆其漸不可長乃建言諸讓官或一讓或再讓或不得讓冝一以故事舊典為準以防未亂行狀是歲天子將親大祫于太廟丞相欲加上尊號公以禮部兼領名表丞相請撰表公説止之曰陛下自寶元以來不受徽號至今且二十年天下之人莫不知天子持盈好謙今復加數字既不足盡聖德而前美並棄誠亦可惜願加深思富丞相不怡曰適已奏聞乃是上意欲爾不可止也公曰諾退謂子弟曰吾備位近臣當獻可替否寧得罪權門豈可使主上受虛名而棄實美耶遂上疏曰陛下尊號既已云體天法道欽文聰武聖神孝德盡善極美矣復加大仁不足增光而曰至治有若自矜今百姓多困倉廪不實風俗未清賢不肖混淆獄訟繁多盜賊群輩水旱繼有四夷雖粗定然本以重賂厚利羈縻之非畏威慕義者也未可謂至治然則讓而不居於聖德彌髙矣臣謂陛下永執至道以當天心必有一謙四益之報增加數字未足發楊光輝而反纍二十年昭升之美又入今歲以來頗有災異日食地震雨雷大雪飛蝗涌水傷害廣逺以禮論之陛下寅畏天命正當深自挹損豈可於此時加上尊號昔伊尹戒商王曰有言逆於汝心必求諸道有言遜于汝志必求諸非道誠望陛下求諸道而已章凡四上天子得公奏顧侍臣曰我意本謂當如此遂斷章表不受公於是忤時相行狀禮官請祔郭皇后於廟自孝章以下四后在别廟者請毋合食事下議議者紛然公之議曰春秋之義不薨于寢不稱夫人而郭氏以廢薨按景祐之詔許復其號而不許其諡與祔謂冝如詔書又曰禮於祫未毁廟之主皆合食而無帝后之限且祖宗以來用之傳曰祭從先祖冝如故於是皆如公言墓志蜀人龍昌期者著書傳經以詭僻眩衆至詆毁周公雜用佛説擁弟子十數人至都文丞相薦諸朝以所著書示兩制公與同列平奏昌期非聖不經請下益州毀棄板本事未行而昌期用薦賜五品服帛百匹中外疑駭公拜疏曰臣按昌期之書違古畔道所謂言偽而辨學非而博是王制之不聽而誅者也陛下哀其衰老未使服少正卯之刑則幸矣又何賞焉昔孔子作孝經曰非聖人者無法而朝廷顧多昌期之毀周公臣所不曉也乞追還詔書毋使有識之士窺朝廷淺深詞極切直昌期亦皇懼不敢受賜行狀公治長安豪猾斂手良民得職大姓范偉積産數巨萬冒武功縣令范祚為其祖持祚為令時黃勑家不徭役者五十年更西事調發下戶困敝而偉自若盜抇祚墓以已祖母合葬之謾云祚繼室也雷簡夫以處士登用能為文詞偉賂簡夫使為墓碑以信其偽偉因此出入公卿間持府縣短長數犯法至徒流輒以贖去長安人皆知偉罔冒畏偉不敢言吏受賕者輒為偉蔽匿公因事發之窮治偉伏罪長安中歡呼稱神明會大赦未斷而公去雍偉因謀及變前狀是後連五獄證逮四五百人展轉二年朝廷以委御史乃不得變而偉亦以更大赦杖之而已長安人恨之行狀徙判太常寺兼禮儀事上𥘉即位有疾皇太后嘗臨朝上疾愈乃歸政適有小人言二宫不歡諌者或訐而過直公以謂當以義理從容感諷不可口舌爭也是時方進讀史記至堯授舜以天下公因陳前説曰舜至側微堯越四嶽禪之以位天地饗之百姓戴之非有它道惟其孝友之德光于上下何謂孝友善父母為孝善兄弟為友辭氣明暢上竦體改容知其以諷諌也左右屬聽者無不嗟喜動色即日傳其語於外慈壽聞之亦大喜行狀公前後拜官未嘗輒讓唯𥘉拜侍讀及除諌議辭之其誠心以謂所不冝處則不欲苟受之非以邀名也行狀公為人磊落明白推誠自信不為防慮至其屢見侵害皆置而不較亦不介于􅎍中居家不問有無喜賙宗族既卒家無餘財與其弟攽友愛尤篤墓志公學問廣博無書不通自浮屠老子以及山經地志隂陽卜筮醫藥天文略皆究知大略求其意義合於聖人者而世人所謂善者亦不廢也嘗與吕溱濟叔同在禮部夜視填星指曰此於法當得土不乃得女居數日使者來因言宫中兩夫人皆當就館吕相視笑數月果生兩公主又嘗齋太一宫與內弟王欽臣夜語曰歲星往來虛危間色甚明盛以吾觀之當有興於齊者歲餘英宗以齊州防禦使入繼大統遂登大位云在長安時得三代時鍾鼎器皿數十皆有篆刻銘識文字竒古公案讀之因以考知前代制度用􅓢敦簠簋與前世學者所説不同其所言齊黃同冕亦書傳所不載也公與人交不求其備得一善則稱道之其推進者甚衆而與江休復鄰幾最善嘗曰鄰幾和而不流柔而不犯當求之古人阮籍陶潛之倫也薦之於朝及鄰幾死歐陽永叔為志墓石公為書之以致意焉梅堯臣聖俞與公親且舊既卒其家不能自存公哀之未有以助也聖俞嘗欲書程丞相神道碑病不果公為成之程氏喜餉白金五百兩公不發封盡以􅉠梅氏公平生未嘗輕為人書銘特此二事以經營二友云行狀四之五丞相王文康公公名曙字晦叔河南人中進士第咸平中舉賢良方正科後以樞密直學士知益州入為給事中兼群牧使冦萊公罷相逺貶公其壻也亦貶郢州團練副使起知襄州徙河南府仁宗召為御史中丞兼理檢使以尚書工部侍郎參知政事以疾出知陜州河陽河南府復入為樞密使拜同中書門下平章事逾月薨王晦叔知益州賊盜贓無輕重一切戮之蜀中股栗不數月賊冦屏竄列郡皆外戶不閉先是張詠守蜀季春糶廪米其價比時估三之一以濟貧民凡十戶為一保一家犯罪一保皆坐不得糴民以此少敢犯法至是獻議者改詠之法窮民無所濟復為冦晦叔奏復之名臣傳王文康治蜀頗以法御下有謗其太苛會劉燁召還為右正言真宗召問凌䇿王曙治蜀孰優曰凌䇿在蜀值歲豐故得以平易治之王曙值歲歉慮民為盜故以法治之使之易地則皆然真宗善其言名臣傳王文康公薛簡肅公俱嘗鎮蜀而皆有名章獻時同為執政一日奏事巳因語蜀事文康曰臣在蜀時有告戍卒反乃執而斬之於營門遂無事簡肅曰臣在蜀時亦有告戍卒反者叱出之亦無事湘山野録玉清昭應宫災守衛者皆坐繫御史獄王文康公上疏曰昔魯桓僖宮災孔子以為桓僖親盡當毀者也遼東髙廟及髙園便殿災董仲舒以為髙廟不當居郡國便殿不當居陵旁故災魏崇華殿災髙堂隆以為天以臺榭宫室為戒冝罷勿治文帝不聽明年復災今所建宫不應經義災變之來若有警者願除其地罷諸禱祠以應天變仁宗與太后感悟遂薄守衛者罪巳而詔以不復繕修諭天下公方嚴簡重有大臣體嘗言人臣患不節儉今居第多踰僣服玩奢侈僕妾無數冝有經制及貴顯深自抑損齋居𬞞食泊如也謝希深歐陽永叔官洛陽時同遊嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至且勞之曰山行良勞當少留龍門賞雪府事簡無遽歸也錢遇諸公之厚類此後錢謫漢東諸公送別至彭婆鎮錢置酒作長短句俾妓歌之甚悲錢泣下諸公皆泣王文康公代為留守御吏如束濕諸公俱不堪其憂日訝其多出遊責曰公等自比冦萊公何如萊公尚坐奢縱取禍貶死况其下者希深而下不敢對永叔取手板起立曰以修論之萊公之禍不在柸酒在老不知退爾時王公年巳髙若為之動卒薦永叔入館然永叔猶不忘錢公或謂錢公易名者三卒得美諡永叔之力云聞見録五朝名臣言行録卷第四
