body:
  text: 十四之二密學陳公公名襄字述古福州候官人中慶曆二年進士第歷建州浦城縣主簿台州仙居令知孟州河陽彭州濛陽縣召試充袐閣校理判尚書祠部出知常州神宗即位召修起居注知諫院管勾國子監未幾罷諫院兼御史知雜事判吏部流內銓知制誥兼直學士院出知陳州徙杭州召還知通進銀臺司除樞密直學士判太常寺兼侍讀卒年六十四公既孤且多病常以先君侍郎之言為念居間益自䇿勵上事繼母以孝下教弟妹以義方求士之賢者親而友之得其鄉士陳烈周希孟鄭穆為之友四人者氣古行髙磨礲鐫切相期以天下之重為巳任時學者方溺於雕篆之文以相髙所謂知天盡性之說皆指以為迂闊而莫之講公與三人者獨以斯道鳴於海隅聞者始皆笑之而驚四人者不為變守之益堅躬行於其家由家達于州閭人卒信而化之父兄皆飭其子弟請從之由是閩中士人宗之謂之四先生雖有誕突盜傲不可率者不敢失禮於其門巳而四先生之名傳之四方從之學者日益衆葉祖洽撰行狀公主建州之浦城簿㑹邑闕令公獨當縣事邑之封疆逺多世族前後令罕能制蔽蒙請託習以為常公夜寐夙興務究其弊訟之難聽而積久者窮極夲源剖决無留有請託者惜其士類不欲遽繩以法每聽訟必使數人環列於前私謁者無所發由是邑人知公之不可干老姦宿贓縮手喪氣民畏且愛爭圗公之像以神事之至今先有詔郡邑興學公遂諭邑之富人出所餘以繕學舍學成使邑之子弟造焉公為入學講說不斁士之自逺方來者至數百人部使者安刑部積始至其縣公即以十事便於民者干之安皆行之人受其賜行狀公為主簿集其士子弟及庶民之好學者教于縣庠使孝于其親順於其昆信於其鄉仁於其民由是為其父兄者更相糾戒不可以非禮干吾簿焉時有禁近大臣扶護親喪還閩衢州以南所過邑皆調民丁七百送其行李至浦城公曰農時方作雖王命尚不可奪之矧以為私耶乃令僦賃以役劉執中撰祠堂記陳述古密直知建州浦城縣日有人失物捕得莫知的為盜者述古乃紿之曰某廟有一鍾能辨盜至靈使人迎置後閣祠之引群囚立鍾前自陳不為盜者摸之則無聲為盜者摸之則有聲述古自率同職禱鍾甚肅祭訖以帷帷之乃隂使人以墨塗良久引囚逐一令引手入帷摸之出乃驗其手皆有墨惟有一囚無墨訊之遂承為盜蓋恐鍾有聲不敢摸也此亦古之法出於小說筆談仙居為縣僻陋民不知教公於正歲因耆老來賀作勸學一篇使門人管師復讀於庭且諭之曰吾秩滿即去爾有子弟亟遣就學於是耆老相與感泣歎嗟從之翕然每過社稷孔子廟必下而趨邑人自是有所矜式學者興起縣有西圃蕪廢弗葺縱民耕種其中然每有興建必為民利故瓦木之資不責於民而樂輸之下至織席之微亦願出所得以助焉及公去也老幼攀車遮道幾不得出境行狀知孟州河陽縣㑹司徒富公亦自鄆移鎮河陽一見公即厚遇之燕逰登臨必與之偕吟詠樽爼更和迭倡富嘗曰陳著作竒才人也縣之西有齊舍俾治新之率邑子弟入學至弛身役以誘之又命其徒張公諤吳道分教之民莫不聳勸俄有謗者謂公誘邑子以資過客富公聞之不能無惑志以問公公對曰自反而縮雖千萬人吾往矣公苟惑謗何以為知已富不能折其親舊聞之有自京師來責公者曰可毀校以塞謗公笑謂曰以一謗者使諸生遂不得聞道其於自任何如卒不毁講說不為少懈然後富公益竒之知其自信之篤行狀公在河陽邑居隘陋盛暑公出家人間或垂簾納凉於廳事既而其櫝失官緡錢二萬守者以為辭公不辨出已俸償之物議喧騰富公亦以為信未幾盜獲於它邑乃守櫝者為之河陽里胥運置酒材破蕩産業者世以為病公命浙東從之學者張公諤以百金僦田兩夫募農師引沃水灌為稻畦種以糯榖比其耕插耘耨收割也必躬涖之而其往來皆用盛樂招集其民俾觀稼穡之法酒材既足民胥效之瘠鹵之地遂為膏腴溫造故迹復生粳稌矣祠堂記判尚書祠部遇權貴人奏乞寺觀名額且度僧人道士公堅執著令不為行因奏言近年以來自宫闈宦官以及要近一例陳乞蓋秉政大臣不為陛下愛惜典刑首為瀆亂所有詔令未敢奉行行狀出知常州郡庠下窄不足以容生師公勤於經始成以不日其規摹氣象遂為諸郡庠序之冠公晨入其中坐授諸生經義旁决郡事由是毗陵學者盛於二浙治平𥘉召還將行委官閲公帑得雜收無名錢數百萬因召積年有官逋未償情可矜而力不足者悉以輸之蓋公淡於宴樂故有餘足以周物行狀常州運渠橫遏震澤積水不得北入于江以為常蘇數邑民田之害者纍世矣公以渠之丈尺對民田之步畒分授以浚深廣有制不月而成遂削望亭古堰而震澤積水乃克北流民害以除而田旱有溉豐穰歲饗矣祠堂記管勾國子監時有詔令兩制臺閣臣僚議學校貢舉之制公因奏曰事得其夲則為之甚易陛下先求賢德使為師長則百度可不勞而成伏見常秩陳烈管師常程頤經行修明宜召為太學官使學者有所師法行狀熙寧二年陳述古學士襄自右史遷臺雜近例左右次𥙷知制誥臺雜乃叙遷三司副使於是特降㫖候知制誥闕與召試襄辭曰陛下以義使臣則臣敢不惟命是聽豈可計較資地以為輕重况義之所在知無不言夫豈知鈇鑕之在前而寵祿之居後哉一有顧利避害之心則依違姑息無所不至身且不正焉能正人乃許追寢前命明年以言青苗事復為右史又歲餘始掌誥命吕氏家孰記方是時朝廷一新天下法度公數上疏論列言多留中嘗言人君先於知道其次在得賢然後務立法度多見嘉納行狀召試知制誥公不就奏曰朝廷比以制置條例司改更常平新法中外之議皆以為擾臣負憂責不得不言未能開悟聖心蚤令寢罷不職之罪不知譴所其有召試臣不敢當旋罷知雜直舍人院兼天章閣侍講復修起居注皆辭以為言事不職不敢承命仍乞外𥙷御批其疏近除知制誥卿以言事未遂懇不受命且求外𥙷朕素慕卿經術行巳深惜逺去故特還舊職庶幾左右經席漸磨道義以適所願聞今覽來奏尚欲固辭豈未悉朕意歟今還卿來章當亟就職遂復修注判銓焉祠堂記杭為都㑹賔旅之衝又屬朝廷相繼遣使公外應接使客內撫循士民州不知其擾杭雖號水鄉而其地斥鹵可食之水常不繼唐相國李長源舊為六井引西湖以飲民井既久廢不修水遂不應民用公命工討其源流泄而甃之井遂可食雖遇旱歲民用沛然行狀陳地勢卑每遇霖雨遂無通溝州民苦之公命修八字溝以泄水城中無泥行之阻州之學舍隘甚自范文正公有意闢之數十年矣公一朝以官舍廣之親入學與諸生講中庸州人始不務學至是踴躍自奮公嘗釋奠學中州人各遣童稚觀禮公一以善言循循誘之莫不感勵行狀熙寧中陳州一日晨起屋瓦盡有冰文作花果鳥獸狀如雲母印著粉𥿄時陳襄侍讀守淮陽有屬請奏祥瑞者公云此事當奏但非瑞奏耳但作奏云有此祥異不敢不奏以竹􅤮盛瓦數十枚奏呈冰文雖消痕跡猶在識者皆以陳公為得體韓莊敏遺事公生平講求萬民利害雖非其職必録于篇㑹其部使可以立事者則以授之利及四方者又不知其數焉凡干朝廷治體州縣養民之事必求其術之可以為法者鰥寡孤獨遺棄幼子災傷水旱凶札疾疫恤窮安富養老勸農治兵牧馬練將守邊積榖生材差役漕運之事莫不夙夜圖營精密曲盡之術而又以詢於賢者明者能者不憚謙遜屢求廣咨博訪既得一善則又稱其得之所自而推以授人此其平生存心凡四十年弗懈也既亡彛檢其手書議及民政講求治道或以相授或以相咨凡餘百夲或纍至十幅盈𥿄細書講論得失則其以天下為巳憂也又如此使之大用豈可量哉祠堂記公將終妻子環泣求所以語後者公索𥿄筆書先聖先師四字付其子而絶行狀公為人寬厚長者而臨事有不可犯之色勇於為義其氣渾然人欲以喜怒探之終莫之得遇利害得喪恬如也其接物誠其與人恭而溫與之逰者不覺鄙咎之失於心也行狀富丞相當國日引陳襄述古為上客述古所以告富公者盡仁義也有不恱富公者造為五鬼之號而襄在其一夫流言待無知者而傳至智者則止矣以富公之賢其門豈無善士以述古之賢而肯為人作鬼乎吕氏家孰記公之平生以道德教育天下英才為巳任故以學業出入其門者無慮千人而齒于仕版輔大政親近侍列臺閣帥邊防者有矣守方州使諸路佐郡邑宰人民者所至多焉莫不知所以仁民為固國之夲也治巳為臨下之範也學古為修身之資也事親為行道之始也官于四方而民受其賜者皆公之所教也不止如是焉自始逹及終身凡聞天下之賢有學行者有吏能者有道德者有忠義者其才可以進之于朝以為民庇及具表則者不必識其人也必書其實以遺其所部使牧守或執政柄者未登其賢而用不巳也因之拔擢致身於亨顯而不知其自於公者衆矣是以其亡四方髦士及公卿大夫識與不識若喪其朋咨嗟靡息焉公之於學志在考古以治其性為夲事君以建其忠為業故雖燕居必持厥志謂暴其氣者不可以入君子之德是以雖家人臧獲平生未始見其不足之色鋭於經綸天下大務尤能受盡言樂聞已過喜於為善度量淵廣長於包荒樂於教民其職精於治體其政先於變俗其仁勤於濟衆其交貴於謙光故其出入中外𥙿𥙿然弗以進退榮辱動其心焉每曰惟大人為能格君心之非吾徒之事也其知諫知雜言出至誠詳審有緒不為激訐故雖譏病大臣𥙷救時政上每嘉納而多留中祠堂記五之四參政薛簡肅公公名奎字宿藝絳州正平人中進士第歷隰州推官知莆田長水縣徙知興州入為殿中侍御史出為陜西轉運使遷江淮制置發運使擢三司户部副使出知延州權知開封府權御史中丞出知并州改秦州加樞密直學士知益州召權三司使遂拜參知政事罷判尚書都省薨年六十八薛簡肅公舉進士時摯謁馮魏公首篇有囊書空自負早晚逹明君之句馮掩卷而謂之曰不知秀才所負何事讀至第三篇春詩云千林如有喜一氣自無私乃曰秀才所負者如此東齊記事契丹使蕭從順來朝是時莊憲明肅太后垂簾聽政從順謂南使至契丹者皆見太后遂亦請見朝議患之未有以决公獨以理折之從順乃止歐陽公撰墓志公在開封以嚴為治肅清京師京師之民至私以俚語目公且相戒曰是不可犯也及居蜀則以惠愛稱民有得僞蜀時中書印者夜以錦囊掛之西門門者以白蜀人隨之者萬計皆恟恟出異語且觀公所為公顧主吏藏之略不取視民乃止老媪告其子不孝者子訴貧不能養公取俸錢與之曰用此為生以養母子遂相慈孝里冨人三女皆孤民或妄爭其産公析其資為三為嫁其女蜀人喜亂而易搖公既鎮以無事又能順其風俗從容宴樂及其臨事破姦發伏無一不中蜀人愛且畏之以比張尚書詠而不苛開封天子之畿益州蜀一都會皆丗號尤難理者而公尤有名其寬猛之政前後異施可謂知其方矣墓志公在成都一日置酒大東門外城中有戍卒作亂既而就擒都監往白公公指揮只於擒獲處令人喫却民間以為神斷不然妄相攀引旬月間未能了得又安其徒黨反側之心也東齊記事王文康公薛簡肅公俱嘗鎮蜀而皆有名章獻時同為執政一日奏事巳因語蜀事文康曰臣在蜀時有告戍卒反乃執而斬之於營門遂無事簡肅曰臣在蜀時亦有告戍卒反者叱出之亦無事東齊記事拜參知政事公入謝上曰先帝嘗言卿可用吾今用卿矣公益感激自勵而素剛毅守節不苟合既與政尤挺立無所牽隨然遂欲繩天下無細大一入於規矩往往不可其意則歸卧於家歎息憂愧輒不食家人笑其何必若此公曰吾慚不及古人而懼後丗譏我也墓志明道二年莊憲明肅太后欲以天子衮冕見太廟臣下依違不决公獨爭之曰太后必若王服見祖宗若何而拜乎太后不能奪為改他服太后崩上見群臣泣曰太后疾不能言而猶數引其衣若有所屬何也公遽曰其在衮冕也然服之豈可見先帝乎上大悟卒以后服葬於是益以公為果可用也墓志又湘山野録云明肅太后欲以衮冕謁太廟諫疏交上宰臣執議俱不之聽薛簡肅公關右人語氣明直不文其談獨於簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無答是夕報罷公性剛不苟合遇事敢言真宗時數燕大臣至有霑醉者公諫曰大臣數被酒無威儀非所以重朝廷也尤善知人范仲淹龐籍明鎬自為吏部選人皆以公輔許之後卒如其言云歸田録云薛簡肅公知開封時明參政鎬為府曹官簡肅待之甚厚直以公輔期之其後公守秦益嘗辟以自隨優禮特異有問於公何以知其必貴者公曰其為人端肅其言簡而理盡凡人簡重則尊嚴此貴臣相也其後果至參知政事以卒
