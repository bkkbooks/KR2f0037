body:
  text: 十四之二宻學陳公公名襄字述古福州候官人中慶曆二年進士第歷建州浦城縣主簿台州仙居令知孟州河陽彭州濛陽縣召試充袐閣校理判尚書祠部出知常州神宗即位召脩起居注知諫院管勾國子監未幾罷諫院兼御史知雜事判吏部流内銓知制誥兼直學士院出知陳州徙杭州召還知通進銀臺司除樞宻直學士判太常寺兼侍讀卒年六十四公旣孤且多病常以先君侍郎之言爲念居間益自䇿勵上事繼母以孝下教弟妺以義方求士之賢者親而友之得其郷士陳烈周希孟鄭穆爲之友四人者氣古行髙磨礲鐫切相期以天下之重爲巳任時學者方溺於彫篆之文以相髙所謂知天盡性之說皆指以爲迂闊而莫之講公與三人者獨以斯道鳴於海隅聞者始皆笑之而驚四人者不爲變守之益堅躬行於其家由家達于州閭人卒信而化之父兄皆飭其子弟請從之由是閩中士人宗之謂之四先生雖有誕突盗傲不可率者不敢失禮於其門巳而四先生之名傳之四方從之學者日益衆葉祖洽撰行狀公主建州之浦城簿㑹邑闕令公獨當縣事邑之封疆逺多世族前後令罕能制蔽蒙請託習以爲常公夜寐夙興務究其弊訟之難聽而積乆者窮極夲源剖决無留有請託者惜其士類不欲遽繩以法每聽訟必使數人環列於前私謁者無所發由是邑人知公之不可干老姦宿贓縮手䘮氣民畏且愛争圗公之像以神事之至今先有詔郡邑興學公遂諭邑之富人出所餘以繕學舎學成使邑之子弟造焉公爲入學講說不斁士之自逺方來者至數百人部使者安刑部積始至其縣公即以十事便於民者干之安皆行之人受其賜行狀公爲主簿集其士子弟及庶民之好學者教于縣庠使孝于其親順於其昆信於其郷仁於其民由是爲其父兄者更相糾戒不可以非禮干吾簿焉時有禁近大臣扶護親䘮還閩衢州以南所過邑皆調民丁七百送其行李至浦城公曰農時方作雖王命尚不可奪之矧以爲私耶乃令僦賃以役劉執中撰祠堂記陳述古宻直知建州浦城縣日有人失物捕得莫知的爲盗者述古乃紿之曰某廟有一鍾能辨盗至靈使人迎置後閤祠之引群囚立鍾前自陳不爲盗者摸之則無聲爲盗者摸之則有聲述古自率同職禱鍾甚肅祭訖以帷帷之乃隂使人以墨塗良乆引囚逐一令引手入帷摸之出乃驗其手皆有墨惟有一囚無墨訊之遂承爲盗蓋恐鍾有聲不敢摸也此亦古之法出於小說筆談仙居爲縣僻陋民不知教公於正歲因耆老來賀作勸學一篇使門人管師復讀於庭且諭之曰吾秩滿即去爾有子弟亟遣就學於是耆老相與感泣歎嗟從之翕然毎過社稷孔子廟必下而趨邑人自是有所矜式學者興起縣有西圃蕪廢弗葺縱民耕種其中然每有興建必爲民利故瓦木之資不責於民而樂輸之下至織席之㣲亦願出所得以助焉及公去也老㓜攀車遮道幾不得出境行狀知孟州河陽縣㑹司徒富公亦自鄆移鎭河陽一見公即厚遇之燕逰登臨必與之偕吟詠樽爼更和迭倡富甞曰陳著作竒才人也縣之西有齋舎俾治新之率邑子弟入學至弛身役以誘之又命其徒張公諤吴道分教之民莫不聳勸俄有謗者謂公誘邑子以資過客富公聞之不能無惑志以問公公對曰自反而縮雖千萬人吾往矣公苟惑謗何以爲知已富不能折其親舊聞之有自京師來責公者曰可毀校以塞謗公笑謂曰以一謗者使諸生遂不得聞道其於自任何如卒不毁講說不爲少懈然後富公益竒之知其自信之篤行狀公在河陽邑居隘陋盛暑公出家人間或垂簾納凉於廳事旣而其櫝失官緡錢二萬守者以爲辤公不辨出已俸償之物議喧騰富公亦以爲信未幾盗獲於它邑乃守櫝者爲之河陽里胥運置酒材破蕩産業者世以爲病公命浙東從之學者張公諤以百金僦田兩夫募農師引沃水灌爲稻畦種以糯榖比其耕挿耘耨收割也必躬涖之而其往來皆用盛樂招集其民俾觀稼穡之法酒材旣足民胥効之瘠鹵之地遂爲膏腴温造故迹復生秔稌矣祠堂記判尚書祠部遇權貴人奏乞寺觀名額且度僧人道士公堅執著令不爲行因奏言近年以來自宫闈宦官以及要近一例陳乞蓋秉政大臣不爲陛下愛惜典刑首爲瀆亂所有詔令未敢奉行行狀岀知常州郡庠下窄不足以容生師公勤於經始成以不日其規摹氣象遂爲諸郡庠序之冠公晨入其中坐授諸生經義旁决郡事由是毗陵學者盛於二浙治平𥘉召還將行委官閱公帑得雜收無名錢數百萬因召積年有官逋未償情可矜而力不足者悉以輸之蓋公淡於宴樂故有餘足以周物行狀常州運渠橫遏震澤積水不得北入于江以爲常蘇數邑民田之害者累世矣公以渠之丈尺對民田之歩畒分授以浚深廣有制不月而成遂削望亭古堰而震澤積水乃克北流民害以除而田旱有漑豐穰歳饗矣祠堂記管勾國子監時有詔令兩制臺閣臣僚議學校貢舉之制公因奏曰事得其夲則爲之甚易陛下先求賢德使爲師長則百度可不勞而成伏見常秩陳烈管師常程頤經行脩明宜召爲太學官使學者有所師法行狀熈寧二年陳述古學士襄自右史遷臺雜近例左右次𥙷知制誥臺雜乃叙遷三司副使於是特降㫖候知制誥闕與召試襄辭曰陛下以義使臣則臣敢不惟命是聽豈可計較資地以爲輕重况義之所在知無不言夫豈知鈇鑕之在前而寵禄之居後哉一有頋利避害之心則依違姑息無所不至身且不正焉能正人乃許追寢前命明年以言青苗事復爲右史又歲餘始掌誥命吕氏家塾記方是時朝廷一新天下法度公數上䟽論列言多留中甞言人君先於知道其次在得賢然後務立法度多見嘉納行狀召試知制誥公不就奏曰朝廷比以制置條例司改更常平新法中外之議皆以爲擾臣負憂責不得不言未能開悟聖心蚤令寢罷不職之罪不知譴所其有召試臣不敢當旋罷知雜直舎人院兼天章閣侍講復脩起居注皆辭以爲言事不職不敢承命仍乞外𥙷御批其䟽近除知制誥卿以言事未遂懇不受命且求外𥙷朕素慕卿經術行巳深惜逺去故特還舊職庶幾左右經席漸磨道義以適所願聞今覽來奏尚欲固辭豈未悉朕意歟今還卿來章當亟就職遂復脩注判銓焉祠堂記杭爲都㑹賔旅之衝又屬朝廷相繼遣使公外應接使客内撫循士民州不知其擾杭雖號水郷而其地斥鹵可食之水常不繼唐相國李長源舊爲六井引西湖以飲民井旣乆廢不脩水遂不應民用公命工討其源流渫而甃之井遂可食雖遇旱歳民用沛然行狀陳地勢卑毎遇霖雨遂無通溝州民苦之公命脩八字溝以渫水城中無泥行之阻州之學舎隘甚自范文正公有意闢之數十年矣公一朝以官舎廣之親入學與諸生講中庸州人始不務學至是踴躍自奮公甞釋奠學中州人各遣童稚觀禮公一以善言循循誘之莫不感勵行狀熈寧中陳州一日晨起屋瓦盡有冰文作花果鳥獸狀如雲母印著粉𥿄時陳襄侍讀守淮陽有属請奏祥瑞者公云此事當奏但非瑞奏耳但作奏云有此祥異不敢不奏以竹􅤮盛瓦數十枚奏呈冰文雖消痕跡猶在識者皆以陳公爲得體韓莊敏遺事公生平講求萬民利害雖非其職必録于篇㑹其部使可以立事者則以授之利及四方者又不知其數焉凢干朝廷治體州縣養民之事必求其術之可以爲法者鰥寡孤獨遺棄㓜子災傷水旱㐫札疾疫恤窮安富養老勸農治兵牧馬練將守邊積榖生材差役漕運之事莫不夙夜圖營精宻曲盡之術而又以詢於賢者明者能者不憚謙遜屢求廣諮博訪旣得一善則又稱其得之所自而推以授人此其平生存心凢四十年弗懈也旣亡彛檢其手書議及民政講求治道或以相授或以相諮凢餘百夲或累至十幅盈𥿄細書講論得失則其以天下爲巳憂也又如此使之大用豈可量哉祠堂記公將終妻子環泣求所以語後者公索𥿄筆書先聖先師四字付其子而絶行狀公爲人寛厚長者而臨事有不可犯之色勇於爲義其氣渾然人欲以喜怒探之終莫之得遇利害得䘮恬如也其接物誠其與人恭而温與之逰者不覺鄙咎之失於心也行狀富丞相當國日引陳襄述古爲上客述古所以告富公者盡仁義也有不恱富公者造爲五鬼之號而襄在其一夫流言待無知者而傳至智者則止矣以富公之賢其門豈無善士以述古之賢而肯爲人作鬼乎吕氏家塾記公之平生以道德教育天下英才爲巳任故以學業出入其門者無慮千人而齒于仕版輔大政親近侍列臺閣帥邊防者有矣守方州使諸路佐郡邑宰人民者所至多焉莫不知所以仁民爲固國之夲也治巳爲臨下之範也學古爲脩身之資也事親爲行道之始也官于四方而民受其賜者皆公之所敎也不止如是焉自始逹及終身凢聞天下之賢有學行者有吏能者有道德者有忠義者其才可以進之于朝以爲民庇及具表則者不必識其人也必書其實以遺其所部使牧守或執政柄者未登其賢而用不巳也因之㧞擢致身於亨顯而不知其自於公者衆矣是以其亡四方髦士及公卿大夫識與不識若䘮其朋咨嗟靡息焉公之於學志在攷古以治其性爲夲事君以建其忠爲業故雖燕居必持厥志謂暴其氣者不可以入君子之德是以雖家人臧獲平生未始見其不足之色銳於經綸天下大務尤能受盡言樂聞已過喜於爲善度量淵廣長於包荒樂於教民其職精於治體其政先於變俗其仁勤於濟衆其交貴於謙光故其出入中外𥙿𥙿然弗以進退榮辱動其心焉每曰惟大人爲能格君心之非吾徒之事也其知諫知雜言出至誠詳審有緒不爲激訐故雖譏病大臣𥙷救時政上每嘉納而多留中祠堂記五之四叅政薛簡肅公公名奎字宿藝絳州正平人中進士第歷隰州推官知莆田長水縣徙知興州入爲殿中侍御史岀爲陜西轉運使遷江淮制置發運使擢三司户部副使岀知延州權知開封府權御史中丞岀知并州改秦州加樞宻直學士知益州召權三司使遂拜叅知政事罷判尚書都省薨年六十八薛簡肅公舉進士時摯謁馮魏公首篇有囊書空自負早晚逹明君之句馮掩卷而謂之曰不知秀才所負何事讀至第三篇春詩云千林如有喜一氣自無私乃曰秀才所負者如此東齋記事契丹使蕭從順來朝是時莊憲明肅太后垂簾聽政從順謂南使至契丹者皆見太后遂亦請見朝議患之未有以决公獨以理折之從順乃止歐陽公撰墓誌公在開封以嚴爲治肅清京師京師之民至私以俚語目公且相戒曰是不可犯也及居蜀則以惠愛稱民有得僞蜀時中書印者夜以錦囊掛之西門門者以白蜀人隨之者萬計皆恟恟岀異語且觀公所爲公顧主吏藏之略不取視民乃止老媪告其子不孝者子訴貧不能養公取俸錢與之曰用此爲生以養母子遂相慈孝里冨人三女皆孤民或妄爭其産公析其貲爲三爲嫁其女蜀人喜亂而易揺公旣鎮以無事又能順其風俗從容宴樂及其臨事破姦發伏無一不中蜀人愛且畏之以比張尚書詠而不苛開封天子之畿益州蜀一都會皆丗號尤難理者而公尤有名其寛猛之政前後異施可謂知其方矣墓誌公在成都一日置酒大東門外城中有戍卒作亂旣而就擒都監徃白公公指揮只於擒獲處令人喫却民間以爲神斷不然妄相攀引旬月間未能了得又安其徒黨反側之心也東齋記事王文康公薛簡肅公俱甞鎮蜀而皆有名章獻時同爲執政一日奏事巳因語蜀事文康曰臣在蜀時有告戍卒反乃執而斬之於營門遂無事簡肅曰臣在蜀時亦有告戍卒反者叱岀之亦無事東齋記事拜叅知政事公入謝上曰先帝甞言卿可用吾今用卿矣公益感激自勵而素剛毅守節不苟合旣與政尤挺立無所牽隨然遂欲繩天下無細大一入於規矩徃徃不可其意則歸卧於家歎息憂愧輙不食家人笑其何必若此公曰吾慚不及古人而懼後丗譏我也墓誌明道二年莊憲明肅太后欲以天子衮冕見太廟臣下依違不决公獨爭之曰太后必若王服見祖宗若何而拜乎太后不能奪爲改他服太后崩上見群臣泣曰太后疾不能言而猶數引其衣若有所屬何也公遽曰其在衮冕也然服之豈可見先帝乎上大悟卒以后服葬於是益以公爲果可用也墓誌又湘山野録云明肅太后欲以衮冕謁太廟諫䟽交上宰臣執議俱不之聽薛簡肅公關右人語氣明直不文其談獨於簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無荅是夕報罷公性剛不苟合遇事敢言眞宗時數燕大臣至有霑醉者公諫曰大臣數被酒無威儀非所以重朝廷也尤善知人范仲淹龐籍明鎬自爲吏部選人皆以公輔許之後卒如其言云歸田録云薛簡肅公知開封時明叅政鎬爲府曹官簡肅待之甚厚直以公輔期之其後公守秦益甞辟以自隨優禮特異有問於公何以知其必貴者公曰其爲人端肅其言簡而理盡凢人簡重則尊嚴此貴臣相也其後果至叅知政事以卒
