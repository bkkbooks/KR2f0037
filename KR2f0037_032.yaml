body:
  text: 十四之三袐書丞劉公公名恕字道原筠州人父渙少有髙志年五十為頴上令不能屈節事上官棄官家廬山之陽歐陽公所為賦廬山髙也公年十八試經義說書皆第一釋褐邢州巨鹿主簿遷晉州和川令司馬公受詔修資治通鑑奏請同編修以親老乞監南康酒詔即其官修書纍官至袐書丞卒年四十七道原少頴悟俊拔讀書過目即成誦年四嵗坐客有言孔子無兄弟者道原應聲曰以其兄之子妻之一坐驚異十二三謁丞相晏公問以事道原反覆詰難公不能對范太史撰墓碣公在巨鹿陳鄘公帥髙陽召至府重禮之使講春秋丞相親帥官屬往聽墓碣皇祐𥘉光為貢院屬官時有詔士能講解經義者聽别奏名應詔者數十人趙周翰為侍講知貢舉問以春秋禮記大義其中一人所對最精詳先具注疏次引先儒異說末以巳意論而斷之凡二十問所對皆然主司驚異擢為第一及發糊名乃進士劉恕年十八矣光以是慕重之司馬公作十國紀年序道原為人重意義急然諾郡守得罪𬒳劾屬吏皆連坐下獄道原獨保證之恤其妻子如己骨肉又面數轉運使以深文峻詆墓碣前世史自太史公所記下至周顯德之末簡䇿極博而於科舉非所急故近歲學者多不讀鮮有能道之者獨道原篤好之為人強記紀傳之外閭里所録私記雜說無所不覽坐聽其談衮衮無窮上下數千載間細大之事如指掌皆有稽據可考驗令人不覺心服十國紀年序英宗皇帝雅好稽古欲遍觀前世行事得失以為龜鑑詔光編次歷代君臣事仍謂光曰卿自擇館閣英才共修之光對曰館閣文學之士誠多至於專精史學臣所得而知者唯和川令劉恕一人而巳上曰善退即奏召之與共修書凡數年史事之紛錯難治者則以諉之光蒙成而巳十國紀年序又墓碣云道原於魏晉以後事尤能精詳考證前史差謬司馬公悉委而取决焉道原為人剛毅一豪不挫於人熙寧中執政有與之故舊者欲引修三司條例道原不肯附之且非其所為執政者寢不恱當是時其權震天下人不敢忤而道原憤憤欲與之校面語侵之至變色悖怒而道原不少屈稠人廣坐抗言其失聞者縮頸而道原意氣自若久之亦不自安以親老告歸南康乞監酒稅以就養墓碣王介甫與道原有舊深愛其才熙寧中介甫參大政欲引道原修三司條例道原固辭以不習金榖之事因言天子方屬公以政事宜恢張堯舜之道以佐明主不應以財用為先介甫雖不能用亦未之怒道原每見之輒盡誠規益及吕獻可得罪知鄧州道原往見介甫曰公所以致人言蓋亦有所未思因為條陳所更法令不合衆心者宜復其舊則議論自息介甫大怒遂與之絶未幾光出知永興軍道原曰我以直道忤執政今官長復去我何以自安且吾親老不可久留京師即奏乞監南康軍酒得之十國紀年序道原嗜學方其讀書家人呼之食至羮炙冷而不顧夜則卧思古今或不寐逹旦在和川嘗以公事適野見劉聰太宰劉雄碑知嘉平二十五年始改建元正舊史之失在洛陽與光偕如萬安山道旁有碑讀之乃五代列將人所不稱道者道原即能言其行事始終歸驗於舊史信然宋次道知亳州家多書道原枉道就借觀之次道日具酒饌為主人禮道原曰此非吾所為來也殊廢吾事願悉撤去獨閉閣晝夜讀且抄留旬日盡其書而去目為之翳十國紀年序方介甫用事呼吸成禍福凡有施置舉天下莫能奪髙論之士始異而終附之靣譽而背毁之口是而心非之者比肩是也道原獨奮厲不顧直指其事是曰是非曰非或靣刺介甫至變色如鐵或稠人廣坐介甫之人滿側道原公議其得失無所隱惡之者側目愛之者寒心至掩耳起避之而道原曾不以為意見質厚者親之如兄弟姦諂者疾之如讎用是困窮而終不悔此誠人之所難也昔申棖以多欲不得為剛微生髙以乞醯不得為直如道原者可以為剛直之士矣十國紀年序道原家貧至無以給旨甘一毫不妄取於人其自洛陽南歸也時巳十月無寒具光以衣襪一二事及舊貂褥賮之固辭強與之行及頴州悉封而返之於光而不受於它人可知矣尤不信浮屠說以為必無是事曰人如居逆旅一物不可乏去則盡棄之矣豈得齎以自隨哉可謂知之明而决之勇矣十國紀年序先公言荆公笑劉道原耽史而不窮經相見必戲之曰道原讀到漢八年未而道原力詆荆公之學士子有談新經義者道原怒形於色曰此人口出妖言靣帶妖氣先公每談此以為笑范太史遺事資治通鑑書成劉袐丞巳卒先公上奏云恕於此書功力最多今編修屬官皆蒙甄録惟恕身亡獨未霑恩伏聞仁宗朝黃鑑預修三朝寶訓梅堯臣為編修唐書官皆未及奏書而卒後特官其一子乞依此例與恕一子推恩又乞以刋成通鑑賜其家朝廷皆從之道原子羲仲有史學能世其家先公待之如子姪范太史遺事五朝名臣言行録卷第六之一丞相許國吕文靖公公名夷簡字坦夫其先萊州人徙壽州進士及第𥙷絳州推官通判通州知濵州擢提點兩浙刑獄入為侍御史知雜事改起居舍人同知通進銀臺知制誥兩川饑為安撫使權知開封府仁宗即位拜參知政事進戶部侍郎同平章事出判陳州歲中復相封申國公出判許州徙天雄軍未幾復入相徙封許國公兼樞密使拜司空平章軍國重事慶曆三年請老以太尉致仕薨年六十五配食仁宗廟庭歲大水濵州河溢冦忠愍公知大名府請擇守臣天子親諭宰相以公行至則究利害固隄防分導水勢卒不為民患濵人至今思之李宗諤撰行狀河北自五代末即算田鎛公嘆曰王道夲於農此何名哉因表除之朝廷推其法它路自是農器無征行狀祥符末王沂公知制誥朝望日重一日至中書見王文正公問君識一吕夷簡否沂公曰不識也退而訪諸人許公時為太常博士通判濵州人多稱其才者它日復見文正復問如初沂公曰公前問及此人退而訪之具所聞以告文正曰此人異日與舍人對秉鈞軸沂公曰公何以知之曰吾亦不識但以其奏請得之沂公曰奏請何事曰如不稅農器等數事時沂公自待巳不淺聞文正之言不信也姑應之曰諾既而許公自濵罷擢提點兩浙刑獄未幾為侍從及丁晉公敗沂公引為執政卒與沂公並相沂公從容道文正語二公皆嗟嘆以為非所及其後張公安道得其事於許公故於許公神道碑略叙一二龍川志祥符中營繕宫館材用所取東南騷動斬材木者或碎首洞胸官嚴期㑹以希上意死者以亡命捕繫妻子公抗疏條白卒緩其役調夫挽送材木盛冬河涸暴露岸次又請一切罷遣行狀嶺南獲賊意以為蜀盜李順者獻闕下王欽若在樞府即稱慶上以屬臺公劾之無實乃守臣利其功煆成之具以聞欽若愧其前慶欲遂致其罪公執平無所變撓上亦從之行狀歲旱蝗公表請飭躬修政略去賡吟小技敕輔相以弭災變行狀冦忠愍公知永興軍府有姦民吏不能制冦公摘其罪竄湖外過京師上變自訴且告冦公有異謀公惡姦人得志傷信任之體請加重刑益逺竄報可公不欲外聞以恩自歸戒吏不泄語外卒無知者行狀時有習妖術者相傳能飛且攫人都下大駭捕工術數者皆考訊傅致其罪公奏請取捕吏使參考以防其枉帝寤遂無冤者行狀祥符中崇奉天書設官置使典司其事儀衛物采甚盛矣真宗崩比將葬文靖公判禮儀院建議納天書於方中而官司儀衛皆罷天慶天祺先天降聖等節但存其名而巳凡公處事皆類此家孰記入內押班雷允恭擅移永定陵皇堂而丁謂芘之朝廷命公與魯肅簡公乘傳按視盡得其迹及允恭等盜沒方中金寶以萬計狀聞乃用按行故地抵允恭罪而罷謂相行狀真廟升祔器服一倣宫中務極隆厚公因論事奏曰皇太后於先帝喪祭之禮曲盡尊奉此雖至誠至孝之道然未足以報先帝惟逺姦邪獎忠直推心待下克巳抑謙愛惜民財拔擢時彥使邊鄙寧靜人物冨庶皇帝德業日茂太后壽樂無憂此乃報先帝之大節也太后又命真廟神主覆以銀罩及供設用鏤器公引祀無豐昵清廟茅屋丹楹刻桶之戒手疏以聞后亦從焉行狀太后初臨朝宣諭兩府深不欲行此禮候皇帝長立別有處分公即日編入時政記後每言事必引及之以感動后意又多稱引前代母后臨政所以致禍之道以勸戒焉行狀天聖郊燔卒事柄臣例進官至是有司援舊以請公倡同列確讓不拜遂著為定式行狀曹利用得罪遣內侍押班江德明圍其第公與王沂公列奏利用雖有罪非至不軌乞從寬宥遂止逺貶行狀玉清宫災太后見大臣泣且曰先帝尊道奉天並建宫宇今忽焦灼何以稱遺意哉公知后旨且復營建因推洪範以明災異之所致請罷不復建因率同列讓去使名止令內臣兼領遂不復葺行狀公以主上方冨春秋冝導之典學擢孫奭等居講席以經義輔導後又增置崇政說書天章閣侍講之職以廣聞見太后親祠大廟衮冕服章欲一用天子之制公帥禮官前請於是冕十斿衣用十章物數之間悉損於上行狀初章懿之誕上也章惠章獻皆以母稱而懿不得名及是章懿崩公聞之方奏事因曰竊聞昨夕有宫嬪亡后聞之不懌不待公盡言曰宰相豈管宫中事遽引帝起頃之后獨出曰卿固欲間吾母子耶公曰太后他日不欲保全劉氏乎后乃命公裁之公請葬如禮司天探后意以隂陽拘忌聞公執議益堅卒輟視朝發哭備宫仗葬西原苑中春㑹太后以君臣宴豫不應罷公固請乃巳行狀又聞見録云李宸妃薨章獻欲以宫人禮治喪於外文靖奏冝從厚章獻遽引帝起頃之獨坐簾下召公問曰一宫人死相公云云何與公曰臣待罪宰相事無內外無不當預章獻怒曰相公欲離間吾母子耶公從容對曰陛下不以劉氏為念臣不敢言尚念劉氏也喪禮冝從厚章獻悟遽曰宫人李宸妃也且奈何文靖乃請治喪皇儀殿太后與帝舉哀後苑百官奉靈輿由西華門以出用一品禮殯洪福寺公又謂入內都知羅崇勳曰宸妃當以后服殮用水銀實棺異時莫道夷簡不曽說來章獻皆從之後章獻上仙燕王謂仁宗言陛下李宸妃所生妃死以非命仁宗號慟毀頓不視朝者纍日下哀痛之詔自責尊宸妃為皇太后諡章懿甫畢章獻殿􅑼幸洪福寺祭告易梓宫帝親哭視之后玉色如生冠服如皇太后者以有水銀沃之故不壞也帝嘆息曰人言其可信哉待劉氏加厚又龍川志云章獻既沒或疑章懿之喪仁皇遣李用和發其葬視之容貌如生使者馳入奏仁皇於章獻神御前焚香泣告曰自今大娘娘平生分明矣公在章獻朝近臣頗以言事去職或勸公冝退公曰先帝待我厚期以宗廟安寧死而不愧於先帝故平勃不去所以安漢仁傑不去所以安唐使吾亦潔虛名而去治亂未可知也故孜孜燮輔知無不為雖禍之未形事之將然必先為之救禦行狀太后嘗欲進荆王為皇太叔公力爭以為不可遂止又以荆王子養於宫中既長而弗出公因對言及以為不可后曰無他欲令與皇帝同讀書耳公言皇帝春秋方盛自當親接儒臣日聞典訓今與童稚處無益乞早令就邸他日又極言后曰何至如此公曰前代母后多利於幼稚試披史籍即可見嫌疑之際不可不謹臣今只在中書聽旨后寤即日遣令出宫行狀大內災宫室略盡比曉朝者盡至日晏宫門不發不得聞上起居兩府請入對不報久之追班上御拱宸門樓有司贊謁百官盡拜樓下公獨立不動上使人問其意對曰宫廷有變群臣願一望天顔上為舉簾俯檻見之乃拜行狀明肅太后臨朝一日問宰相曰福州陳絳贓汚狼籍卿等聞否王沂公對曰亦頗聞之太后曰既聞而不劾何也沂公曰外方之事須夲路監司發擲不然臺諌有言中書方可施行今事自中出萬一傳聞不實即所損又大也太后曰速選有風力更事任一人為福建路轉運使二相禀旨而退至中書沂公曰陳絳滑吏也非王耿不足以擒之立命進熟吕許公俯首曰王耿亦可惜也沂公不諭時耿為侍御史遂以為轉運使耿拜命之次日有福建路衙校拜于馬首云押進奉荔枝到京耿偶問其道路山川風候而其校應對詳明動合意旨耿遂密訪絳所為校輒泣曰福州之人以為終丗不見天日也豈料端公賜問然某尤為絳所苦者也遂條陳數十事皆不法之極耿大喜遂留校於行臺俾之幹事既置詔獄事皆不實而校遂首常納禁器于耿事聞太后大怒下耿吏獄具謫耿淮南副使皆如許公之料也澠水燕談契丹遣使借兵伐髙麗明肅欲與之文靖公堅執不可后云適巳微許其使矣不與恐生怨奈何公曰但以臣不肯拒之既而后語其使曰意非不欲應但吕相公堅不可耳使人無語而去趙元昊反有詔削奪在身官爵募能生擒元昊若斬首者即為節度使仍賜錢萬貫公時在大名府聞之驚曰謀之誤矣立削奏曰前代方鎮叛命如此誥誓則有之矣非所以禦戎狄也萬一反有不遜之言得無損國體乎朝廷方改之巳聞有指斥之詞矣家孰記章獻嘗為大車乘幸浮圗公曰太后既稱制出冝有仗此車無名命有司鎖之不復以進其防微杜漸皆此類行狀章獻明肅之盛文靖公整救防微杜漸者非一未嘗與人言天下亦莫知也仁宗既親政大臣或言當垂簾時有劉渙者嘗上章請歸政得罪于太后帝顧文靖公曰當時樞臣欲黥配嶺南賴卿力言得免若公者苟利國家雖舉丗不知弗與辨也儻非聖主親發德音人誰知之豈比夫賤丈夫急己之毀譽而緩國之休戚哉家孰記章獻崩上始親政事公手疏為治之本以諷于上其目有正朝綱塞邪徑禁貨賂辨姦壬絶女謁逺近習罷力役節冗費條奏甚詳行狀上以章惠有保護之勤因太后遺誥特上尊名公請刋遺誥止於宫中尊奉后不恱上不得巳出公判陳州將行燕見期以半歲召還及期果召行狀韓魏公別録云仁宗欲以楊太妃為太后問於吕申公公曰典故無此事上曰奈巳許之吕曰如此則陛下宫中姑立之可也吕以此意密語公時諫官御史知其非而不敢爭也又龍川志曰章獻崩吕許公以后遺令冊楊太妃為皇太后且復垂簾御史中丞蔡齊將留百官班爭之乃止許公歎曰蔡中丞不知吾心吾豈樂為此哉上方年少禁中事莫主張者其後盛美人等恣橫爭寵無如之何許公之意或在是矣然人主既壯而母后聽政自非國家令興雖或能整齊禁中而垂簾之後外家用事亦何所不至古今母后臨朝如宣仁后專奉帝室不為私計蓋未有也天下學校久廢公請詔州皆立學國朝公族分居邸第無所統一公請置大宗正建睦親宫置教授官悉授諸衛官以別庶姓行狀冦忠愍公以忠義自許邪臣因中以事廢死南荒公辨其枉請加甄叙及賜諡以褒之行狀長秋虛位公抗疏請擇勳德之後有豪民陳氏女已預推擇公以為不可乃止即選納曹氏行狀韓魏公别録云吕申公固多不正以結上然皆有說以勝人人亦不能奪也劉后服未除而勸仁宗立曹后希文進曰又教陛下做一不好事它日申公語公曰此事外人不知上春秋盛郭后尚美人皆以失寵廢以色進者不可勝數巳幾於昏矣不立后無以正之每事自有深意多此類也寶元中御史府久闕中丞一日李淑對仁宗偶問以憲長久虛之故李奏曰此乃吕夷簡欲用蘇紳臣聞夷簡已許紳矣仁宗疑之異時因問許公曰何故久不除中丞許公奏曰中丞者風憲之長自宰相而下皆得彈擊其選用當出聖意臣等豈敢銓量之仁宗頷之東軒筆録初元昊拒命契丹重兵壓境上以伺釁議者請城洛陽為遷都之計公獨謂虜畏壯侮怯易以威制洛邑山川狹隘以壯則不足以威則退縮遂請建都大名示將親征以伐虜謀或曰此為虛聲爾不若增修東都城池以沮契丹之志公曰此子囊城郢計也使虜果南嚮則雖城固無益卒申前議既而契丹求和親割關南之地及劉六符等再至桀驁久留不能遣公奏請於殿外幕次與虜使相見置酒面議以折之上以為然虜使見公畏伏語於館伴使曰觀宰相如此雖留無益遂亟就道前好如初行狀景祐中吕許公執政范文正公以天章閣待制知開封府屢攻吕公之短坐落職知饒州康定元年復舊職知永興軍㑹許公自大名復入相言於仁宗曰仲淹賢者朝廷將用之豈可但除舊職耶即除龍圖閣直學士陜西經略安撫副使上以許公為長者天下亦以許公不念舊惡文正面謝曰嚮以公事忤犯相公不意相公乃爾獎拔許公曰夷簡豈敢復以舊事為念邪及文正知延州移書諭趙元昊以利害元昊復書語極悖慢文正具奏其狀焚其書不以聞時宋庠為參知政事先是許公執政諸公唯諾書紙尾而巳不敢有所預宋公多與之論辨許公不恱一日二人獨在中書許公從容言曰人臣無外交希文乃擅與元昊書得其書又焚去不奏它人敢爾耶宋公以為許公誠深罪范也時朝廷命文正分㭊文正奏臣始聞虜有悔過之意故以書誘諭之㑹任福敗虜勢益振故復書悖慢臣以為使朝廷見之而不能討則辱在朝廷乃對官屬焚之使若朝廷初不知者則辱專在臣矣故不敢以聞也奏上兩府共進呈宋公遽曰范仲淹可斬杜祁公時為樞密副使曰仲淹之志出於忠果欲為朝廷招叛虜耳何可深罪爭之甚力宋公謂許公必有言助已而許公默然終無一語上顧問許公何如許公曰杜衍之言是也止可薄責而已乃降一官知耀州於是論者喧然而宋公不知為許公所賣也尋出知揚州記聞又行狀云范仲淹在延州馳書使諭元昊巳乃奏上上遣中使於界首等截取其報書仲淹知之使人先路取其書去首尾以進上怒出書以示二府同列有抗言乞斬仲淹者公言閫外之事不可中御兵交使在其間仲淹不可加罪上怒遂釋某公惡韓冨范三公欲廢之而不能軍興以韓范為西帥遣冨使北名用仇而實間之又不克軍罷而請老盡用三公及宋莒公夏英公于二府皆其仇也又以其黨賈文元陳恭公間焉猶欲因以傾之譽范冨皆王佐可致太平於是天子再賜手詔又開天章閣而命之坐出紙筆使疏時政所當因革諸公皆推范冨請退而具草使二宦者更往督之且命領西北邊事既而各條上十數事而易監司按群吏罷磨勘減任子衆不利而謗興又使范公日獻二事以困之及請城京師人始笑之初某公每求去以候主意常未厭而去故能三入及老大事猶問西北相攻請出大臣行三邊於是范公使河東陜西冨公使河北初某既廷議乃數出道者院宿焉范公既奉使宿道者院而某在焉賔退使人致問范公往見之某佯曰參政欲求去邪范公以對某曰大臣豈可一日去君側去則不復還矣今萬里奉使故疑求去耳范公私笑之久而覺報緩而請不獲召堂吏而問曰吾為西帥每奏即下而請輒得今以執政奉使而請報不逮何也曰某別置司專行鄜延事故速而必得耳范公始以前言為然乃請守邊矣而冨公亦不還韓又罷去而賈陳相矣及某薨范公自為祭文歸重而自訟云談叢王洙修經武聖略仁宗覽而善之命吕夷簡用洙直龍圖閣夷簡曰此特㑹要中邊防一門耳不足加賞既出乃謂洙曰夷簡以修經武聖略欲用學士直龍圖閣而上謂特㑹要中邊防一門耳不足加賞故不果洙退歸㑹上使中人獎諭具道欲用洙與夷簡以為不可者洙因出紙筆請中人具記上語明日往見夷簡問昨日嘗語洙者夷簡復稱說如昨洙因出中人所記示之夷簡起立索笏曰上萬幾事繁恐不記夷簡語其後洙又修祖宗故事參知政事范仲淹請用洙直龍圖閣上巳許之仲淹又曰乞宣諭出自上意上正色曰當用則用何必出朕意今欲宣諭是不當用也其命遂寢仲淹大慙而退此洙自為孫之翰言之南豐雜識善必收録之杜丞相衍經撫關中薦長安布衣雷簡夫才器可任遽命賜對於便殿簡夫辨給善敷奏條列西事甚詳仁宗嘉之即降旨中書令檢真宗召种放事是時吕許公當國為上言曰臣觀士大夫有口才者未必有實效今遽爵之以美官異時用有不周即難於進退莫若且除一官徐觀其能果可用遷擢未晚仁宗以為然遂除耀州幕官簡夫後纍官至貟外郎三司判官而才實無大過人者東軒筆録慶曆初仁宗服藥久不視朝一日聖體康復思見執政坐便殿促召二府宰相吕許公聞命移刻方赴召比至中使數輩促公同列亦贊公速行公愈緩轡既見上曰久疾方平喜與卿等相見而遲遲其來何也公曰陛下不豫中外頗憂一旦聞急召近臣臣若奔馳以進慮人心驚動耳上以為深得輔臣之體記聞吕相在中書奏令參知政事宋綬編次中書總例謂人曰自吾有此例使一庸夫執之皆可以為相矣記聞文靖夫人因內朝皇后曰上好食糟淮白魚祖宗舊制不得取食味於四方無從可致相公家壽州當有之夫人歸欲以十奩為進公見問之夫人告以故公曰兩奩可耳夫人曰以備玉食何惜也公悵然曰玉食所無之物人臣之家安得有十奩也其智慮過人類此聞見録公感風眩天子憂甚手詔拜司空平章軍國重事三日一入中書公表固辭御府出萬金藥上剪髭以賜公手詔曰古人有言髭可療疾雖無痊驗今朕剪髭合湯藥表豫意也卿久病中書密院臣寮全然不勾當公事住滯卿録可以委任臣寮三五人來卿更調攝副朕眷焉更有西北兩事子細一一奏來公首奏陳西北事機因薦范仲淹韓琦文彥博龐籍梁適曽公亮等數人後皆大用行狀公薨于鄭訃聞上震悼對執政語公輒涕下曰安得憂公忘身理萬事幹四鄙如吕夷簡者行狀上嘗大書方正忠良四字以賜及親篆王曾墓碑額因慨然曰吕夷簡冝賜之遂書懷忠之碑以賜其後大臣家繼有陳請自此始也行狀公於天下事屈伸舒卷動有操術然嘗建募萬勝軍雜市井小人浮脆不任戰鬪用宗室𥙷環衛官驟增俸賜又加遺契丹歲繒金二十萬當時不深計之至于後丗費大而不可止
