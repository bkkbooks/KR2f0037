body:
  text: 九之八待制王公公名質字子野文正公之姪也以䕃𥙷官召試賜進士及第通判蘇州知蔡州徙廬州降監舒州靈仙觀起知泰州徙荆湖北路轉運使權知江陵府同判吏部流内銓擢天章閣待制出知陜州年四十五卒通判蘇州州守黃宗旦負材自喜頗以新進少公議事則曰少年乃與丈人爭事公曰受命佐君事有當爭職也宗旦雖屢屈折而政常得無失稍德公助已爲之加禮宗旦得盗鑄錢百餘人以託公公曰事發無跡何從得之曰吾以術鉤岀之公愀然曰仁者之政以術鉤人寘之死而又喜乎宗旦慚服悉緩岀其獄始大稱公曰君子也歐公撰神道碑知蔡州蔡俗舊祠吳元濟公曰豈有逆醜而廟食耶吾爲州長不能正民之視聽俾民何從哉狄梁公李太尉皆唐之忠烈又德加蔡人胡爲不祠命工徹元濟廟建二公祠率吏民拜祭蔡人從之于今號爲雙廟范文正公撰墓誌徙廬州盗有殺其徒而并其財者獲之寘于法大理駮曰法當原公以謂盗殺其徒而自首者原之所以疑壞其黨而開其自新若殺而不首旣獲而亦原則公行爲盗而第殺一人旣得兼其財又可以贖罪不獲則肆爲盗獲則引以自原如此盗不可止非法意䟽三上不能爭公歎曰吾不勝法吏矣乃上書自劾請不坐佐吏公坐貶監靈仙宫其後議者更定不首之罪卒用公言爲是神道碑遷荆湖北路轉運使當用兵西方急於財用之時獨不進羡餘其賦歛近寛平治以常法故他路不勝其弊而荆湖之人自若神道碑權知荆南府民有訟婚者訴曰貧無貲故後期問其用幾何以俸錢與之使婚獲盗竊人衣者曰迫於飢寒而爲之公爲之哀憐取衣衣之遣去荆人比公爲子産神道碑判吏部流内銓號爲稱職而於選法未甞有所更易人或問之公曰選法具備如權衡在執者不欺其輕重耳何必屢更其法神道碑范仲淹以言事貶饒州方治黨人甚急公獨扶病率子弟餞于東門留連數日大臣有以讓公曰長者亦爲此乎何苦自䧟朋黨公徐對曰范公天下賢者顧質何敢望之然若得爲黨人公之賜質厚矣聞者爲公縮頸其爲待制之明年岀守于陜又明年小人連興大獄坐貶廢者十餘人皆公素所賢者聞之悲憤歎息或終日不食因數劇飲大醉公旣素病益以酒遂卒神道碑公在相門而弗驕弗華以貧爲寳文正作舎人時家甚虚甞貸人金以贍昆弟過期不入輟所乗馬以償之公因閱家藏書而得其劵召家人示之曰此前人清風吾輩當奉而不墜冝袐藏之又得顔魯公爲尚書時乞米于李大夫墨帖刻石以摸之遍遺親友間其雅尚如此故終身不貪所至有氷蘗聲墓誌公充職館殿二十餘年同舎皆顯官公介然不動惟求外補當國者非戚必舊公未甞折顔色屈語論以合其意墓誌公爲數郡皆清心以思治行巳以率下崇學校而風化之人有犯法非害于物者必緩其獄求民之疾雖處幽不遺去民之梗雖負勢不避也墓誌公不治生業畜書萬卷樂稱人之善士大夫非風義髙逺弗與之㳺墓誌
