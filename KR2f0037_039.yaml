front:
  text: 三朝名臣言行録卷第八之一
  hash: sha256:e2d29ddd6904d42dba4ba034863c9a709ec931de291224dceac3e9872abdf30c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_039-1a}
body:
  text: 丞相申國吕正獻公公名公著字晦叔文靖公之子以恩𥙷奉禮郎中進士第召試館職不就皇祐𥘉判吏部南曹同判太常寺召試知制誥亦辭不就除天章閣待制兼侍講治平元年出知蔡州神宗即位召爲翰林學士兼侍講知通進銀臺司熈寧元年知開封府數月還翰林二年拜御史中丞罷知潁州五年召還經筵辭疾差提舉嵩山崇福宫十年起知河陽召還提舉中太一宫元豐元年除翰林學士丞旨改端明殿學士三年拜樞宻副使改同知樞宻院五年出知定州徙楊州哲宗即位召兼侍講提舉中太一宫拜尚書左丞遷門下侍郎拜尚書右僕射元祐三年拜司空同平章軍國事四年薨年七十二詔贈太師申國公御書墓碑之首曰純誠厚德之碑紹聖中追貶建武軍節度副使又貶昌化軍司戸叅軍元符三年復太子太保崇寧元年降授左光禄大夫書名黨籍紹興𥘉乃追復贈謚云公在潁逾年而歐陽公脩爲守𥘉脩以公爲相家令子弟少有時譽待公良厚而未甚重也劉原父敞博學有髙才王深父回好古君子也二人者皆寓潁公日與相從脩等稍稍愛公之學識其後脩入爲翰林學士薦公文學行誼冝在左右因數爲朝廷在位者稱公清静寡欲有古君子之風及脩使北虜虜問中國德行文章之士脩以公及王荆公安石對家傳歐陽公嘗患士大夫少髙退之節乃薦正獻公及張唐公王荆公韓持國欲以激勵風俗又薦王荆公與正獻公作諫官家塾記公旣中第詔叙次所業以進將召試館職公謙避終無所進朝廷知其意不復索所業令徑就試亦不赴故仁宗心重之及領南曹因引選人對便殿奏事畢帝謂公曰知卿恬退有顔氏之節時仁宗臨朝淵黙雖貴近亦罕聞德音公以小官對獨𬒳褒語家傳公爲郡率五鼔起秉燭視案牘邌明岀㕔决民訟退就便坐宴居如齋賔寮至者母拘時以故郡無留事而下情通凢典六郡以爲常後雖年髙貴重不少替單陋邦也公以愷悌爲政不嚴而肅轉運司輦乳香數萬斤配賣郡中公停之郡庫雖符檄督迫竟不爲強配家傳仁宗在位乆天下無事一時英俊多聚於文館日食祕閣下者常數十人是時風俗淳厚士大夫不喜道長短爲風波朝夕講論文義賡唱詩什或設棊酒以相娯同舎有岀任外官者即相率就僧舎爲盛㑹以餞之然際接必以禮平居非着帽垂紳不出廬舎公性安重寡言析理精微尤爲時流所敬間有笑謔踰度者公每以正色裁之皆信服不以爲恨老儒掌禹錫𬒳服不㓗清言動樸野多爲人所玩公獨未嘗以一語戯之禹錫至感泣衆亦以此益稱公之盛德家傳貴妃張氏薨追冊賜謚以后禮葬公當攝事引輴聞有命即歸家稱疾中使挾太醫察視公堅卧不起竟獲免家傳差判登聞鼔院公自單州歸益研精講學無進趍之意嘗與王介甫相對而歎曰今天下雖小康然堯舜之道知不可復行以故求閑局將以遂其志家傳公旣侍經筵時仁宗春秋髙公於經傳同異訓詁得失皆粗陳其略至於治亂安危之要聞之足以戒者乃爲上反復深陳之仁宗嘗詔講官凢經傳所載逆亂事皆直言母諱公因進講言弑逆之事臣子之所不忍言而仲尼書之春秋者所以深戒後丗人君欲其防微杜漸居安而慮危使君臣父子之道素明長㓜嫡庻之分早定則亂臣賊子無所萌其姦心故易曰履霜堅氷至由辯之不早辯也侍讀劉原父常退謂記言官曰當載之史冊以垂後丗家傳先是上清宫火壽星殿獨存因以爲壽星觀至此十有九年詔建神御殿於觀中將自禁中迎真宗繪像奉安公言都城中真宗巳有三神御而營建不巳非祀無豐暱之義不報呂汲公撰神道碑英宗不豫乆中外疑駭或謂朝廷將行永正故事公一日因禀山陵事獨至中書見韓魏公於後閤因宻白曰主上方冨於春秋非素有疾徐當自平審如外人之言恐君臣父子之間人情便不能安唯公静以鎮之則天下幸甚魏公頷曰正與琦意合未幾上疾有瘳家傳詔與司馬光同定學制而光前巳獻議公即獨䟽其事大略欲請錫慶院爲太學増置講堂立管句太學官一貟専治規矩博士八貟分經教授管句官及博士専委祭酒司業舉任専以學術行誼無拘資考始入學者爲外舎滿歲較其經行升于内舎又滿歲長貳學官較内舎之尤異者三五人薦於朝廷覆試而授以官具爲科條上之不果行家傳英宗𥘉親政公言陛下以宗藩選繼大統奉母后當極子道雖居深宫之中不以造次廢禮則中外瞻仰天下幸甚上嘉納之神道碑公每進講多傳經義以進規時上躬猶未全安多不喜進藥㑹講論語至子之所御名齋戰疾公因言有天下者爲天地宗廟社禝之主其於齋戒祭祀必湏致誠盡恭不可不御名古之人君一怒則伏尸流血則於興師動衆不可不御名至於人之疾病常在乎飲食起居之間衆人之所忽聖人之所御名況於人君任大守重固當莭嗜欲逺聲色近醫藥爲宗社自愛不可不御名上欽納其言又講人不知而不愠不亦君子乎公言在下而不見知於上者多矣然在上者亦有未見知於下者也故古之人君政令有所未孚人心或有未服則反身修德而不以愠怒加之如舜之誕敷文德文王之皇自恭德是也上知公意深切每改容鞠躬如在車之式家傳公於講讀尤精衆謂語約而義明可以爲當丗之冠英宗甞對執政稱其善與司馬光同侍經筵光退語人曰每聞晦叔講便覺巳語煩神道碑自仁宗末率以二月開經筵至重午罷八月復開至冬至罷是歲詔以九月五日開經筵至重陽罷公上奏曰臣竊以國家置儒術之官設勸講之制盖將以開廣聦明究古今理亂之要而求正身治天下國家之術非徒以爲縉紳之羙談朝廷之虚文也今陛下始𥘉清明勵精圖治固冝親近儒雅漸以歲月猶恐未盡今若自五日開講至重陽祗是四日朝著聞之頗巳疑惑若傳之四方則爲損不細臣願陛下日御邇英以循先帝故事則天下幸甚詔即從之後講論語將畢公以尚書備二帝三王之道尤切於治術乞候進講論語畢日進講尚書從之家傳公爲祭酒也以太學爲教化之原故究心經理之舊制薦舉學官博士皆嚴其資格限以年齒公數爲論列冀稍寛其科條前後所薦學官如王回呉孜姜潛張載皆一丗大儒王存顧臨爲元祐名臣常秩呉申黄履朱臨盛僑亦顯於丗處士程頥隱居不仕公命衆博士即其家敦請以爲太學正頥固辭公即命駕過之後王陶用孟醇爲學正亦遣博士致請於是諸生始知有聘士禮家傳南郊太僕卿升輅授綏國朝陪乗皆差翰林學士無雜學士者至公始以直學士升輅英宗自太廟赴南郊中途問今之郊與古之郊何如公對曰古之郊貴誠尚質今之郊盛儀衛事物采而巳因言仁宗郊祀徹黄道以登虚小次不入立壇下湏禮成詔祝冊官至御名母興上皆遵用焉家傳執政建議追崇濮安懿王或欲稱皇伯考公曰真宗以太祖爲皇伯考豈可加於濮王耶及詔下稱親公言於仁宗有兩考之嫌班濮王諱於天下公獨以謂當避於上前不當與七廟同諱神道碑御史臺官吕誨等六人以言事罷公言陛下即位以來納諫之風未形於天下而誨等以言事去非所以風示四方爭之不能得乞𥙷外任上曰學士朕所重未可去朝廷公復懇請家居者百餘日上遣内侍敦諭就職曰冝徐徐勸誘勿太迫也公起就職數月又乞𥙷外三年出知蔡州神道碑蔡所統十縣汝陽宰政事修公首薦之以爲十縣最於是屬吏人人爭自飭蔡多水泉因爲釃水以漑民田者數千頃故時軍營皆草舎率數歲一修且多火災人以爲病公至盡變爲瓦舎轉運使惜其財固爭之時公巳𬒳召爲晝夜督吏卒輦材用致役所事集而後去𥘉至孔子廟殿宇圯壞㑹前守度材將以御名㕔事公命輟其材以修之郡人郝戭有孝行方壯歲棄官就飬公薦之於朝詔復起戭竟不起家傳神宗自在藩邸即熟聞公與司馬温公名及即位首召二公爲學士朝論翕然稱上之得人家傳御史中丞司馬光以言事罷公封還其誥曰光以言舉職而賜罷則有責者不得盡其一言陛下雖有欲治之心何從而知安危利害於是内岀光誥付閤門公又言誥不由封駮而岀則封駮之職因臣而廢乞正臣之罪以正紀綱上手批公奏因邇英講獨留公以諭旨公請不已竟罷封駮事神道碑神宗𥘉御經筵公進講尚書至天乃錫王勇智上曰何以獨言勇智公曰仲虺方稱成湯能伐夏救民故以勇智言之然聖人之德當如易所謂聦明睿智神武而不殺者然後可以爲盡善時上方冨於春秋故公以好勇黷武爲戒家傳知開封府時有内侍持龍鳯首飾入内東門􅕡者摘其事詔以付開封少頃復遣使追取仍詔開封母湏覆奏公言法當覆奏而後遣使人立㕔事不肯去公持之益堅不得巳復命於禁中竟覆奏然後遣貴近憚焉家傳夏秋淫雨京師地震公言自昔人君遇災者或恐懼以致福或簡誣以致禍上以至誠待下則下思盡誠以應之上下至誠而變異不消者未之有也夫衆人之言不一而至當之論難見君人者去偏聽獨任之弊而不主先入之語則不爲邪說所亂顔淵問爲邦孔子以逺佞人爲戒蓋佞人唯恐不合於君則其勢易親正人唯恐不合於義則其勢易䟽唯先格王正厥事蓋未有事正而丗不治者唯陛下勉行之而勉終之神道碑禮官欲用唐故事以五月朔御大慶殿受朝遂上尊號公以五月朔㑹朝與人君尊號皆非古典言曰陛下方越漢唐追復三代何必於隂長之月爲非禮之㑹受無益之名上從之遂竟神宗朝不受尊號神道碑拜御史中丞入對上語及西陲事公退而上奏曰臣早來入對陛下論及夏國事冝臣竊以夏國旣不肯全歸二寨故地則朝廷湏至却留綏州向去必是難保誓約或至用兵然臣以事勢料之秉常年㓜國弱雖有黠臣爲之謀主亦未能爲國家深患唯當修嚴武備來則應之以逸待勞保無失利若臨遣大臣張皇武事或議深入或求竒功皆非國家至計仍慮向後或有邊境急奏乞朝廷靜鎮無致驚擾其後公去位未逾年朝廷果遣宰臣臨邊巳而西征無功士卒内潰上爲之責躬肆赦皆如公所料云家傳公薦張載修身講學爲関右士人師表且深知邊境利害上特召對以爲崇文院校書公又言載老矣冝任之以事不報未幾差載就鞠苗振於越州公又言載賢者獄事非所以使之亦不從家傳公同知貢舉在貢院宻上奏曰天子臨軒䇿士而用詩賦非舉賢求治之意且近丗有司考較已專用䇿論今來廷試欲乞出自宸衷唯以詔䇿咨訪治道是歲上臨軒遂以䇿試進士家傳王安石秉政置三司條例以啇天下之財利又置提舉常平官於諸路爲歛散青苗之法以便民其實征利物議沸騰以爲非是公極論其不可曰自古有爲之君未有失人心而能圖治者亦未有脅之以威勝之以辯而能得人心者昔日之所賢者今皆以此舉爲非主議者一切詆爲流俗詖說而助之㑹韓琦論青苗不便用其請罷河北安撫使司農駁琦奏議摹印以下四方言者或謂大臣不可輕詆摩執政反謂公有藩鎮欲除君側之惡之語於上前除翰林侍讀學士知潁州又改其誥以命之衆皆謂安石欲去公而加之罪也公𥘉列館閣與安石友善安石博辯有文同舍莫敢與之亢獨公以精識約言服之安石出守常州求贈言公以四言曰莊守情宻安石至郡寓書於公曰備客京師二年疵吝積於心每不自勝一詣長者即廢然而反夫所謂德人之容使人之意也消吾於晦叔見之矣又謂人晦叔爲相吾輩可以言仕矣後安石秉政公爲中丞安石䔬其助巳公旣以公議極論其過失由此怨公至以險語中傷而公不屈也神道碑又家傳云公自二年十月即奏乞罷制置條例司三年二月公自貢院遂論青苗錢法前後章十數上不見從即王奏乞解憲職再上章待罪然神宗待公素厚𥘉無譴怒意顧公言愈切乃諭執政聽解言職四月五日除翰林學士兼侍講學士寳文閣學士公上奏曰臣之義若既當言責而言不見用又不能避位而去則於廉耻之節全然墮䘮其或朝廷旣不聽其言又不許其去則於進退群臣之禮亦爲差謬况臣巳曽靣陳實爲多病衰耗兼因論列時事乞𥙷外任今有此命决不敢受於是落兩學士除翰林侍讀學士知潁州先是三月十一日諌官孫覺見上論青苗事且言制置條例司取韓琦奏䟽條其踈謬加以嗤毀鏤板班天下非陛下所以待勲舊大臣之意如琦朴忠固無慮設當唐末五代藩鎮強盛時豈不爲國生事耶後二日公入對復極論青苗事而未甞及琦也已而上謂執政曰吕公著孫覺皆極言青苗法不可行且云駮難韓琦非是上因靣咎絳安石不當鏤板𥘉亦無罪覺意也然既以不肯行縣事黜覺執政遂以覺語加公時舎人宋敏求當制執政召敏求靣受意旨使於制中叙韓琦事敏求以爲口語難分明不當載制中曽公亮亦固以爲不可安石即取制草改之有曰比大臣之抗章因便坐之與對乃誣方鎮有除惡之謀深駭予聞乖事理之實者安石與陳升之所易也二十四日忽有旨放朝辭不許入對令便赴夲任公即日行時孫覺尚艤舟成東覺素忠厚乃謂人曰韓公事獨覺嘗言及尔然後人仍知公未甞言琦也宋敏求自以不得其職即因事求罷掌誥從之𥘉趙清獻公抃在中書與曽丞相平居竊語深不恱便張事亦間爲上言之及公力言青苗法二人乃相邀曰湏獨座得罪吾曹當引去公罷五日趙公遂如約再上表凢七日而罷後歲餘希績自瀛州罷官歸過北都見魏公謂希績曰前日紛紛特欲一發兩豝耳又温公日録云介甫與晦叔素親患臺諌多横議故用晦叔爲中丞旣而天下皆患條例司爲民害晦叔乃復言條例不便介甫以晦叔叛巳怨之尤深巳而上語執政吕公著甞言韓琦將興晉陽之甲以除君側之惡介甫因用此爲晦叔罪除知潁川次道當爲告詞介甫使之明著其語次道但云敷奏失實援据非冝介甫怒明日進呈改之晦叔素審謹實無此語咸云莘老甞爲上言今藩鎮大臣如此論列而遭挫折若當唐末五代之際必有興晉陽之甲以除君側之惡者矣上誤記以爲晦叔也又聞見録云王荆公與吕申公素相厚甞曰吕十六不作相天下不太平及薦申公爲中丞其辭以謂有八元八凱之賢末半年所論不同復謂有驩兠恭工之姦荆公之喜怒如此盖孫覺莘老甞爲上言今藩鎮大臣如此論列而遭挫折若當唐末五代之際必有興晉陽之甲以除君側之惡者矣上巳忘其人但記羙鬚誤以為申公也公至潁時部使者皆新進年少輕銳能擊搏争陵鑠舊臣公一不與之較專以庇民爲巳任㑹提舉官朱紘王潁議免役法集郡官置局公宻爲申解因得少寛家傳彗星見詔求直言公䟽曰陛下臨朝願治日巳乆左右前後莫敢正言陛下有欲治之心而無致治之實者何哉此任事之臣負陛下也何以言之盖士之邪正賢不肖盖素定也今則不然前日舉之以爲天下之至賢後日逐之以爲天下之至不肖其於人才旣反覆而不常則於政事亦乖戾而不審矣古之爲政𥘉不信民者有之鄭之子産是也一年而鄭人怨之三年而鄭人歌之陛下垂拱仰成七年于兹矣輿人之誦亦未異於七年之前也陛下獨不察乎神道碑十年二月差知河陽𥘉公罷潁領崇福遷居西都衆人謂公不見用於時當放懷山水爲終焉之計公曰不然吾於國家可謂世臣且主上待吾不薄不幸爲人所間退就閑散豈吾所欲哉及王安石吕惠卿相繼罷去果復起公三月公至河陽時役法巳定類多張虚數以取羡餘孟所統五縣歲取於民者有募監倉庫人等錢三千九百二十七緡而官未甞募人實以軍吏代役又有追償舊牙校重役錢五千五百緡然至是所償巳盡而取於民者遂爲定數歲輸之無巳時公爲括其數以告于朝請一切蠲之以寛下户之輸錢者詔付司農竟不行家傳熈寜四年申公以提舉嵩山崇福宫居洛買宅於白師子巷張文節相宅西隨髙下爲園宅不甚宏壯康節温公申公時相往來申公寡言見康節必從容終日亦不過數言而巳一日對康節長歎曰民不堪命矣時荆公用事推行新法者皆新進險薄之士天下騷然申公所歎也康節曰王介甫者逺人公與君實引薦至此尚何言公作曰公著之罪也十年春公起知河陽河南尹賈公昌衡率温公程伯淳餞於福先寺上東院康節以疾不赴明日伯淳語康節曰君實與晦叔席上各辯論出處不巳顥以詩解之曰二龍閑卧洛波清此日都門獨餞行願得賢人均出處始知深意在蒼生申公鎮河陽歲餘召拜樞宻副使後以資政殿學士知定州又以大學士知楊州哲宗即位拜左丞遷門下侍郎與温公並相元祐如伯淳之詩云聞見録又吕氏雜志云或問二程先生以二公出處爲有優劣先生云正不如此吕公丗臣也不得不歸見上司馬公爭臣也不得不退處盖自熈寜初正人端士相繼屏伏上意常不樂以爲諸賢不肯爲我用故正獻公求在京宫祠以明不然上意始大喜邇英進讀上留公論治道遂及釋老虚寂之旨公問上曰堯舜知此道乎上曰堯舜豈不知公曰堯舜雖知此而常以知人安民爲志上又言唐太宗能以權智遇臣下公曰太宗所以致治者以其能虚巳從諫耳上臨御乆羣臣進說罕能岀上意至聞公言儼然加敬信神道碑澶州曹村埽决河復塞公因進規曰臣伏見昨來澶州曹村埽决潰全河衝注山東聖心惻然即議閉塞奮自獨斷岀於羣疑功未踰時而有成患不閱歲而尋弭雖上下竭力遂濟登兹實由陛下有至誠憂民愛物之心天相神助殆非人力以此見天道聦明日監在下棐忱輔德遄應不遲爲人上者可不欽畏恭惟陛下聖德仁厚出自天性臨下御衆有日月之明天地之量誠非凢庶庸妄所能臆度以至近日數起詔獄逮繫頗衆有司極於鍜練羣下無不震恐比至臨决多從末减昔于公一郡之獄吏耳猶以隂德有報光大子孫况萬乗之尊六合之廣布德施惠固冝受福無疆施及萬丗然臣願陛下雖聖性得之猶復加聖心焉上奉天下接人加精致誠執要行簡道髙百王而謙以自牧學貫六藝而虗以受人雖威肅羣品不得謂下絶欺誣雖智燭輿情不得謂事無壅蔽親賢士拒任人必有忍以濟事功推内恕以及人物于以崇起忠厚保合泰和則易所謂自天祐之吉無不利詩所謂于禄百福子孫千億者蓋將以類而應臣以無狀獲備近列竊慕古人將羙盡規之義惟陛下財幸七月公入對上迎謂公曰覽卿所奏深得近臣盡規之義時獄犴寖蕃而上繼嗣未廣公辭順而意切故上深納焉家傳𥘉公自河陽入朝都人環觀相謂曰此公還朝百姓之幸也至是士民相慶旣受命出殿門武夫衛卒皆歡抃咨嘆慈聖光獻太皇太后聞公進尤喜曰積德之門也中謝日有司供具諸執政皆集内出酒果殽饌豐腆珍異就宴賜之侍史竊視其器皿欵識皆有慶壽宫字然後知賜物乃光獻意也時富韓公司馬温公皆在洛聞公登樞富公寓書爲慶曰公之名德聞于天下然甞以直道迕執政士大夫未敢遽望登進忽報拜命出於事外人甚驚喜此得於輿論非敢佞也司馬温公亦以書遺都下友人曰晦叔進用天下皆喜以爲治表聞其猶力辭光不敢致書君冝勸之早就職家傳公旣就職後數日樞臣奏事畢獨留占謝因奏曰臣老於閑外蒙陛下収之桑榆唯知拳拳納忠以報恩遇自熈寜以來朝廷論議不同端人良士例爲小人排格指爲沮壞法度之人不可復用此非國家之利也願陛下加意省察上曰然當以次収用之家傳上𥘉即位韓絳即建議復肉刑至是復詔執政議公以爲後丗禮教未備而刑獄繁肉辟不可復將有踊貴屨賤之譏呉充議復置圜圡衆以爲難行王珪欲取開封死罪囚試以劓刖公曰刖而不死則肉刑遂行矣議竟得寢家傳詔以程顥同判武學諌官李定以顥常爲御史論新法言而罷之公上䟽曰臣向蒙擢在樞府中謝之日不敢縷陳細故輙論及判别忠邪之道頗蒙開納盖今日公卿士夫嘗於朝廷法令有所同否然其愛君許國之心愈乆而益明者甚多其唱和雷同承迎附㑹而姦言汗行卒爲陛下所照者蓋亦不少然則人固易未知而士亦不可忽也況如顥者陛下早自知之其立身行巳素有夲末講學議論乆益䟽通且其在言路日時有論列皆辭意忠厚不失臣子之體使得復見用於聖丗其奮身報國未必在時輩之後兼所除武學差遣亦未爲仕䆠之要津而小人齗齗必以爲不可者直欲深梗正路廣沮善人其所措意非特一二人而巳臣區區所慮者䜛說殄行之徒日以熾盛則守正向公之士愈難自立矣家傳𥘉公因陳丗儒獄事𬒳誣請嘱或謂公以輔弼掛吏議當隨事自承不冝有所陳公曰不然自古公卿大臣遭枉濫而不能自直者皆不得其時也今吾生治丗事明主近在帷幄之間一旦𬒳誣而不能申理則四方踈逺之人何以自明將恐治獄者狃以自強𬒳罪者望風畏却一罹苛問例自承服致朝廷有濫罰之譏罪乃在吾而不在朝廷也家傳上以慈聖旣升祔大推恩於曹氏凡進官𬒳賞者二百餘人且欲以佾爲中書令公言正中書令自宋興以來未嘗除人況不帶節度使即宰相也非所以寵外戚乃以節度使兼中書令公因言自古亡國亂家不過親小人任䆠官通女謁寵外戚等數事而巳上深以爲然時王中正宋用臣等任事故公假此以諷上旣退薛恭敏公向歎曰公乃敢言如此事使向汗流浹背家傳諜告夏幽其主秉常上對二府議大舉兵以伐之公曰如諜者所告則夏人誠有罪然陛下欲興弔伐之師未審以何人爲元帥未得其人則不如不舉五年四月公以西師無功奏曰外奏皆謂王中正冝正典刑㑹改官制以王珪蔡確爲左右傼射翌日公上奏乞解樞務或謂公曰今官制新行所用爲相者或素岀公下又樞府方以二貟爲制而公與孫公固韓公縝爲三人有溢貟上以是詔未用二貟之制今公遽去得母近於躁乎公曰所謂大臣者病不能以義進退爾遑䘏其他哉章繼上靣請尤切乃除資政殿學士岀爲定州路安撫使及永樂城䧟奏至上特開天章閣對輔臣曰邊民疲弊若此獨吕公著爲朕言之他人未嘗及也家傳又記聞云髙遵𥙿旣罷歸元豐五年李憲請發兵自涇原築寨稍前直抵靈州攻之可以必取詔從之先是朝廷知陜西困於夫役下詔論民更不調夫至是李憲牒都轉運司復調夫以饋粮以和雇爲名日給錢二百仍使人逼之云受宻詔若乏軍興斬都運使以下民間騷然相聚立柵於山澤不受調吏往輙歐之解州枷知縣以督之不能集知州通判自詣縣督之亦不能集命廵檢縣尉逼之則執挺欲闘州縣無如之何士卒前出塞凍餒死者什五六存者皆憚行無闘志倉庫蓄積皆竭羣臣莫敢言獨西京留守文潞公上言師不可再舉天子遜辭謝之樞宻副使吕晦叔亦言其不可上不懌晦叔因請解機務即除知定州㑹内侍押班李舜舉自涇原來爲上泣言必若出師関中必亂上始信之召晦叔尉勞之舜舉詣執政王禹玉迎以好語恱之曰朝廷以邊事属押班及李留後無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邊事属二内臣可乎内臣正冝供禁庭洒掃之職耳豈可當將帥之任邪聞者代禹玉發慙公至定州謝表曰進不敢希功而生事退不敢弛備以曠官人人傳誦以爲摭實云是時朝廷方經武事増修邊備趍時者争獻北伐之䇿公至定武即爲上言中國與契丹通好乆邊境晏然無事塞上屯軍素有節制唯冝静以鎮之保甲法新行𬒳邊皆設教埸日鳴金鼓課人誦戰法聲逹於虜虜檄邊郡以爲生事違誓約上委公處其事公即上奏以爲遣邊人習戰法於境上非管子寓令之意也請一切罷去専以舊弓箭手法從事不聽時以教保甲修城池建大倉中使旁午於道公預戒有司謹勑餼勞然公素静重寡言接對有常禮無假借以是至者多不樂承受陸中𬒳中旨市絲五萬兩供尚方巳而復獻計増市詔以付定州公上言日前所市者皆先期給緡錢故民力猶可辦今巳渉夏民間漸就機織若再行収市人將受害帝悟即詔公寢其事中又受旨専董倉役日使人持挺立城四門民有以車乗輦薪蒸鬻城中者皆疆致之倉所以供陶甓城中幾廢㸑公命擒中所遣卒盡杖之一城歡呼公之未至也中受命經始倉役即壞民居毀僧舎民有丗葬於倉西者中故築垣直界其域中民號泣發其墓持䘮而去其所占地蓋廣矣然不足於素慮者猶三百五十二楹中因請別度地建小倉以足之公曰今二大倉所受巳不貲又益一倉徒費公私無益也奏罷之中旣數𬒳沮六年遂奏定州差驍武卒護送罪人違所降就配法公坐是降正議大夫先是朝廷所欲更張類岀於邀功生事者之言多非公意唯州城興築且四年僅成一靣公曰定河朔衿喉之要莫先於學學有緝熈于光明日新又新以至于大治者學之力也臣待罪講讀謹條上十議以禆聦明一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諌七曰薄歛八曰省刑九曰去奢十曰無逸居月餘除執政遂倚以爲相神道碑又家塾記云今上即位正獻公𥘉自維楊召還經筵至之日上書言十事皆據經直言不爲浮辭虚說其論薄歛之畧曰昔鹿臺之財鉅橋之粟啇紂聚之以喪國周武散之以得民由是觀之人主當務仁義而巳何必曰利又上蔡語録云申公初召還上十事如徐鉉質論初成毎篇數千字後刪改極簡不止可用於當時爲君之道幾無出此十篇可為人君座右銘太皇太后遣使問公所欲言公奏曰先帝即位之𥘉臣爲學士令臣草詔以寛省民力爲先旣而秉政者建議變舊法以侵民爲意其言不便者指以爲沮壞新法一切斥去之故日乆而弊愈深法行而民愈困陛下既深知其弊誠得中正之士使講求天下之利害上下恊力而爲之冝不難矣又曰唐德宗拒諫幾至覆國今兩省諫官未備三院御史主察者不許言事恐未合先帝本意後卒施行神道碑官制三省並建而中書獨爲取旨之地門下尚書奉行而巳公曰三省均輔臣也正如同舟共濟當一心並力以修政事乞事干三省者自今執政同進呈取旨而各行之遂定爲令神道碑初執政三五日一集都堂長官專决同列多不與議及公秉政非有故日聚都堂遂爲故事神道碑公始與司焉光輔政於是共推本先帝之意蓋欲鞭笞四夷以彊中國阜蕃邦財以佐其費有司奉行失其本旨先帝固甞患之矣故欲更而未暇與巳更而未定其詔墨記言具在而可考者有若干事若詰青苗之害則曰常平泉榖以禦水旱而貪散以求利至十之七八國失拯救之備而民之責償𬒳笞箠者衆責興利之弊則曰大傷鄙細有損國體戒用兵之失則曰南安西師兵夫死傷者皆不下二十萬有司失一死罪其責不輕今無罪置數十萬人於死地朝廷不得不任其咎救官制之滯則曰更新官制以覈正吏治至今頒行無緒有以啓寵四方貽譏後丗於是二公與同志者建請以常平舊法改青苗以嘉祐差役參改募役罷保馬以復監牧損保甲教選以便農作除市易之令寛茶塩之禁賜邊砦贖亡民和西戎於是民讙呼鼓舞以爲便而沮議者上則大臣下則用事之小吏蓋不可勝數司馬光既卧疾于家公與數人者同救其弊太皇太后爲去其異議者然後定神道碑又家傳云太皇太后間諭執政曰民間飬保馬甚以爲苦冝早罷之臣民所言新法之不便於民者亦冝以時施行吾於大行母子也大行所立之法苟民間不以爲便當循至公豈可不改又曰爲政莫如至公至公則人無不服又出士庻所上封事數万通付政府公意以爲法之害於民而不合於先帝本指者當以次更之使觀聽不改而實利及民而温公時巳病不能朝自以當二宫大任恐一旦殂謝無以自効於是奏䟽相属力疾入對意切語峻未逾年而更張幾尽温公病中與公簡曰晦叔自結髪志學壯而行之端方忠厚天下仰服垂老乃得秉國政平生所藴不施於今日將何俟乎比日以來物論頗譏晦叔嘿太過若此際復不廷争事蹉跌則入彼朋矣光自病以來悉以身付醫家事付康惟國事未有所付今日属於晦叔矣又曰介甫文章節義過人處甚多但性不曉事而喜遂非致忠直踈逺䜛佞輻輳敗壞百度以至于此今方矯革其弊不幸介甫謝丗反覆之徒必詆毀百端光意以謂朝廷特冝優加厚禮以振起浮薄之風不識晦叔以爲如何公與温公同奏舉河南處士程頥乞特加召命待不以次詔以爲潁州團練推官國子監教授不就又以爲宣德郎秘書省校書郎亦不就已而召對便殿拜通直郎崇政殿說書乃受命議者譏頥辭卑而居尊及在朝廷以天下自任好論說政事褒貶人物俗士好進者嫉之若讎竟不能自容而去家傳公上奏曰臣竊以自古治戎之䇿雖三代之盛亦不過來則禦之去則備之爲備之道莫先於積糓臣甞任定州路安撫使河北㳂邊大約有十年糧蓋令啇旅輸粟塞上而筭請錢貨於京師故能致此豐羡訪聞西陲自兵興後至今所儲軍粮只可支一二年若緩急更添屯軍馬何以供之乞令陜西經畧司與轉運司同共廣作計置使㳂邊皆増及五年之蓄如此攻雖不足守則有餘兵法曰國雖大好戰必亡天下雖平忘戰必危乞賜裁酌施行從之家傳先是司馬温公上䟽論免役法五害乞變從舊法詔付三省施行蔡丞相建言此大事也當與樞宻共之公上奏曰臣竊尋故事朝廷有大論議多選近臣定奪欲望選差三數人詳定聞奏仍擬數人以聞詔以吕大防韓維范純仁詳定専付三省不復令宻院預議𥘉温公議凡役人皆不許雇人以代然東南及兩蜀諸路民有髙貲或子弟業儒皆當爲弓手執賤役旣不許募代甚苦之公聞其弊即令一切聽募雇民情大恱家傳温公在門下省建議天下案牘有不應讞者舊皆放罪無以懲謬妄請悉勘劾温公意欲州郡御名聽獄而官吏苟避譴罰自是雖有疑案皆不上及公爲侍郎乃請官吏案後帖放如舊制迄今遵用焉家傳自官制改盡廢三舘直官校理纔校書郎正字數貟爲職事官至是乃盡復舊制召試學士院唯䇿問古今治亂之要不復用詩賦尚書省六曹遍置郎吏而不計事之繁簡或案牘填委抵暮不得休或終日無一事而俸賜均等公以爲非冝乃省閑曹十九貟定爲三十五貟家傳御史彈奏駕部貟外郎賈種民素無行元豐中任大理官爲蔡確鷹犬専中傷善良詔黜爲通判公靣奏曰方種民爲獄官臣亦與𬒳誣今臣在相位而種民得罪恐所懲者小所損者大非所以示天下乃寢前命門下韓公奏曰種民醜惡衆所共知奈何以公著故屈朝廷公議公復爲請乃除知臨江軍旣而又以臨江僻逺改知通利軍家傳内岀手札云向者朝廷講求法度務以愛民而縉紳之士徃徃不原朝廷夲意速希功賞有誤使令殘民蠹物乆益知弊至使羣言交攻不巳其罪顯者巳行譴逐自餘干渉之人自今更不追劾可倣此意作詔布告中外咸使改過自新各安職業議者或咎公持心太恕今除惡不盡將失有罪爲異日患公曰爲治去其太甚者耳人才實難當使之自新豈冝使之自棄耶家傳𥘉二聖首從公言闢言路自是臺諫官章䟽無虚日常假借納用焉其後言者益自肆上意寖不懌㑹御史張舜民彈劉奉丗語侵太師文彦愽乃罷舜民臺職於是臺諫交章以爲舜民不當罷上不從中丞傳堯俞諫議梁燾侍御史王岩叟司諫朱光庭王覿御史孫升各居家待罪上命執政召言官至都堂諭以舜民言彦博私奉丗而奉丗使夏國非彦博所建舜民難再除御史堯俞等不受命而燾尤喧勃公上奏曰臣伏見陛下自臨政以來開廣言路登用直臣納諫之盛近古未有然臺諫官數人例各供職日乆言事旣多不能盡忠固不可便行罷黜又不可一向包容恐向後愈更紛拏朝廷却不能保全欲乞稍與優遷令解言職更擇有名望學識臣僚使備諫諍如此則陛下於言事之臣可以全其恩意不至駭動物聽自是堯俞等皆以善罷無以言事降黜者家傳御批付中書省門下侍郎韓維甞靣奏范百禄任刑部侍郎所爲不正輔臣奏劾臣僚當形章䟽明論曲直豈但口陳何異姦䜛維爲輔臣不正如此予何頼焉可罷門下侍郎分司南京仍放辭謝公即上䟽曰臣伏思陛下自臨政以來慈仁寛大判別忠邪於輔弼之臣每加優禮故得上下安樂人情恱服若以奏劾臣僚當有章䟽則自來大臣造膝宻論亦未甞湏有章䟽兼維素有人望乆以直言廢棄陛下始𥘉清明方蒙収用忽然峻責罪狀未明慮必有讎嫌中傷以惑聖聽況五六十年來執政大臣不曽有此降黜恐中外驚駭人情不安臣又竊思皇帝陛下春秋方冨正頼太皇太后陛下訓以仁厚之道調平喜怒以復仁祖之政若大臣倉卒𬒳罪則小臣何以自保臣受陛下厚恩與常人不同故今來雖當雷霆之怒不敢愛身以䧟陛下於有過之地伏望少回聖慮乃詔韓維除資政殿大學士知鄧州然猶用前責辭公乃與中書侍郎吕大防同奏曰此大事也更乞訪問太師文彦博時大防繼上奏論之舎人曽肇亦再還辭頭不肯命辭然上意終未回且批大防奏曰近臣若更有營救者必當重行貶竄公又於便殿爲上詳言之乃得旨改辭頭作均勞逸之意家傳右司諫賈易降知懷州自蘇軾以䇿題事爲臺諫官所言而言者多素與程頥善於是頥軾交惡黨與相攻易獨建言請併逐頥軾以靖朝廷而易言侵及太師文彦博同知樞宻院范純仁故太皇太后怒欲峻責易公言易所言頗切直唯詆大臣爲太甚不可復處諫列爾后曰不責易此亦難作宗作切公等自與皇帝議之公曰不先逐臣易責命亦不可行争乆之乃止罷諫職出知懷州旣退公謂諸公曰諫官所論得失未足言顧主上方冨於春秋異時有進導䛕之說以惑上心者當爾之時正頼左右諫諍不可預使人主輕厭言者也於是吕中書大防劉左丞摯王右丞存私相顧而歎曰吕公仁者之勇乃至於此傳家熈河蘭㑹路奏洮東安撫种誼等部領漢蕃人馬於今月十九日午時攻破洮州生擒西蕃大首領鬼章青冝結百官入賀遣近臣告永𥙿陵鬼章者董氊之大將也凶悍敢戰熈寧間甞覆官軍殺大將景思立於河州爲邊患者二十餘年後遂據洮州與夏州合從將入冦邊臣言冝先事討之以伐其謀公與同列議遣軍器監丞游師雄諭旨諸將不逾月果以捷奏至公在上前及與執政㑹議西陲事諸公多欲舉熈寧元豐所得地盡棄之以與夏人不如是則邊境無寧日也公曰先朝所取皆中國舊境而蘭州乃西蕃地非先屬夏人也今天子嗣守先帝境圡豈冝輕以與人况羌戎貪惏無厭與之適足以啓其侵侮之心但嚴守備以待之彼亦安能遽爲患乃以詔賜乾徳其大略以爲前後用兵以來其因而所得城寨彼此各不曽交還今來所請義不可從然朕獨以永樂之師䧟沒者衆每一念此常用測然汝黨能盡以見存漢人送歸中國復修職貢事上益恭仍戢邊酋無犯疆塞則朕必釋然於尺寸之地復何顧惜當議特降指揮據用兵以來所得地圡除元係中國舊寨及順漢西藩上境外餘委邊臣啇量隨冝分畫給賜又詔以永樂將吏兵夫等雖巳詔汝發遣然念城𥘉失守衆即散亡或爲部落所匿藏爲主者所轉鬻汝可子細訪求發遣據送到者每人別賜絹十疋命官以上更加優賜以給所得之家公旣建議制五年之蓄發内帑以濟之又遣省官制置熈蘭財用所省浮費歲數十萬計邊備寖實及鬼章將冦熈河夏人傾國㑹之行半道聞洮州破鬼章就擒而氣索而退以兵圍鎮戎軍由是朝廷甞預戒邊吏冦至堅壁清野以待之無與戰至是夏人頓城下數日無所得而遁其後乾德遂入貢稍還永樂所䧟漢人朝廷纔以四寨還之而西陲竟無他虞家傳上以迩英講論語畢賜執政講讀官左右史御筵於資善堂内出御書唐人詩分賜在坐翌日公上奏曰臣伏思皇帝陛下睿哲之性出於天縱而復内禀慈訓日新典學誠以堯舜三代爲法則四海不勞而治將來論語終帙進講尚書二書皆聖人之格言爲君之要道臣輙於其中及孝經内節要語共一百段進呈聖人之言夲無可去取臣今唯取明白切於治道者庶便於省覧或游意筆硯之間以備揮染亦日就月將之一助也居數日太皇太后宣諭曰吕相所進要語巳令皇帝即依所奏每日書冩看覧甚有益於學問與冩詩篇不同也家傳諫議大夫孔文仲言朱光庭除太常少卿不當公與同列奏辯甚力乃寢其奏光庭竟就職文仲本以伉直稱然憃不曉事數爲浮薄輩所使以害善良自程頥賈易繼去騰說者日益勝於是李常杜純范純禮各求𥙷外公與執政靣奏曰善人懼䜛而不敢自安非朝廷之福也上嘉納焉文仲晚乃自悟爲小人所紿感憤嘔血而卒家傳熈河路檻鬼章以獻二聖御崇政殿受俘遣閤門使靣詰之鬼章請罪詔釋縳貸其死方邊議未定時近臣多進計請盡還西夏地獨公與吕左相大防持不可至是鬼章就擒西賊却退議者耻前說之謬因言鬼章冝優命以官置之秦鳯或言遂放歸以責其來効又言熈河克捷鎮戎守禦之功皆不足賞公曰鬼章爲邊患二十年先帝欲獲之而不可得今二聖待以不死其恩固巳厚矣尚何官之有况可放邪疆埸之功雖不可過賞然有勞不報何以使人上納焉家傳公在上前前後論救災事最詳二宫𥘉聽政四方有以災旱聞者公爲上言唐太宗正觀元年天下霜儉太宗悉心救䘏至四年米斗三文故爲人父母者苟能以䘏民爲心極力賑濟自然感召和氣終至富盛豈以不足爲患哉自後每水早災眚分遣諫官省郎使諸路大發倉粟以濟之又兊郡上供米以繼乏絶或爲饘粥湯藥以救疾紙衣以禦寒民有棄㓜稚於路者皆設法収飬之於是四方之人知二聖以百姓爲心人人愛戴乃愈於無災云家傳郎官何洵直失本部印公曰洵直誠有罪然重譴之則自今猾吏皆有以制主司矣乃薄其罪家傳𥘉公在仁宗朝甞請進士先䇿論神宗𥘉又獻議以經術取士及知熈寧三年貢舉遂宻啓臨軒専用䇿試未幾公以言青苗等事得罪去王安石専政乃盡罷詩賦一用經義獨以春秋爲殘缺不可讀廢其學學者不得以應書安石又與其子雩其徒吕惠卿升卿撰定詩書周禮義模印頒天下凡士子應書者自一語以上非新義不得用於是舉者不復思索經意亦不復誦正經唯誦安石惠卿書精熟者輙得上第有司發䇿問必先稱頌時政對者因大爲䛕辭以應之又多以佛書證六經至全用天笁語以相髙晚尚字學復以字書去取天下士於是學者不復解經而専解字性徃離析字畫說一字至數百言去經意益逺由是中外議者皆咎經義而思詩賦矣元祐𥘉議者争言科舉之弊請復舊制公曰先帝更新法度如造士以經術最爲近古且仲尼六經何負於後丗特安石課試之法爲謬耳安石解經亦未必不善唯其欲人同巳爲大謬耳司馬温公亦以爲詩賦不可復然論者習見經義之弊忿懣不可遏乃定制進士𥘉埸試經義次賦詩論䇿對經義者許引用古今諸儒之說及巳見又詔立春秋科太學置春秋博士二貟禁有司不得於莊老書出題程文不得雜用申韓刑名之學及引釋氏書仍罷試律義至是將廷試執政又以熈寧復䇿之𥘉進士葉祖洽譏議祖宗自後對䇿者皆訕前朝以阿當丗因以爲䇿問可廢當復詩賦論三題公曰天子臨軒發䇿延四方貢士詢以治道豈非近古良法耶至於對者是非邪正則在考官去取耳乃仍舊試䇿其後論科舉者亦未息以至公薨而詩賦益隆期盡廢經義而後巳非公意也家傳中批右諫議大夫王覿論列新除右丞胡宗愈不當落諫議大夫與外任公上奏曰臣與王覿舊不相識在前朝及陛下臨政之𥘉並不曽舉薦但見覿自任言責以來凡所言事最爲穏審今來若止爲論列胡宗愈便行責降必未恊衆情乞與包容更加裁酌又與二相論於簾前上曰胡宗愈有何罪司空與司馬丞相皆親甞薦之公曰宗愈在先朝誠有直聲然自任中執法頗爲浮議所惑所言事多不恊衆望乃除覿直龍圖閣知潤州其後宗愈竟以物論不與不能安位而去家傳宋興以來大臣以三公平章軍國者四人二入出公家草制之夕上御闈殿見學士蘇軾曰吕僕射以疾求去不欲煩以事故以三公留之詔建府第於東府之南啓北扉以便執政㑹議三省樞宻院條其所當關者以爲軍國事一月三至經筵三日一朝非朝日不至都堂其出也不以時蓋異禮也神道碑𥘉判大名府韓絳建議開澶州故道工役浩大議者皆以爲不可行巳而都水使者王令圗給事中桉河使張問議開孫村減水河而論者復不一三年冬乃詔吏部侍郎范百禄給事中趙君錫桉視之百禄君錫還奏見今北流深入地中故道髙仰不當開治而執政未能决公奏行之盖寢疾前一日也家傳公自少講學即以治心飬性爲夲其寡嗜欲薄滋味無疾言遽色無窘歩無惰容凡嬉笑俚近之語未甞出諸口於丗利紛華聲伎遊宴以至于博奕竒玩淡然無所好盖得之天然晚多讀釋氏書益究禪理司馬温公博學有至行而獨不喜佛公毎勸其留意且曰所謂佛學者直貴其心術簡要尔非必事事服習爲方外人也自以服儒衣冠燕居講道未甞爲沙門機警語獨於先佛及祖師之言掇其至要而黙識之大率以正心無念爲宗自屬疾雖子孫滿前親舊遝至𥘉不談及身丗經理後事上顧公甚厚使人問勞日再三至又遣輔臣至第諭意公對之一無欣戀之色及疾加甚精神静定手足安徐聲氣不亂以至於屬纊家傳正獻公簡重清静出於天性冬月不附火夏月不用扇聲色華耀視之漠然也范公内翰淳夫祖禹實公之壻性酷似公後榮陽公長壻趙仲長演嚴重有法亦實似公焉童蒙訓又雜志六正獻公居家夏不排䆫不揮扇冬不附火一日盛夏楊大夫瓌寳字器之將赴鎮戎軍倅來辤器之乃吕氏甥視正獻爲親堂舅正獻於西䆫下烈日中公裳對坐飲酒三盃器之汗流浹背正獻凝然不動正獻退公常坐堂中應婢傼軰皆在堂外不得入堂堂中唯使諸孫每有賜物不問何物但一呈過置之不復問傳宣中使未甞接坐正獻公燕居凝塵滿案澹然弗顧所用硯或十數日不洗滌亦不問也平生每半年許一變饌甞言自吾友王深父而道德性命之學日加益公天性清儉然居處飲食衣服不過爲弊陋從容有常家塾記正獻公爲小官時毎於中庭試馬必具冠帶而後攬轡平生未甞行草書尤不喜人慱曰勝則傷仁負則傷儉家塾記正獻公平生未嘗較曲直聞謗未嘗辯也少時書于座右曰不善加巳直爲受之盖其𥘉自懲艾也如此至和中手書東漢延篤與李文德書于座右又書古人詩好衣不近節士體粱糓似怕腹中書兩句于子舎屏風家塾記正獻公每事持重近厚然去就之際極於介潔其在朝廷小不合便脫然無留意故歴事四朝無一年不自引求去家塾記正獻公爲樞宻副使年六十餘矣常問太傼寺丞呉公傳正安詩巳之所冝脩傳正曰母敝精神於蹇淺滎陽公以爲傳正之對不中正獻之病正獻清静不作爲患於太簡也夲中後思得正獻問傳正時年六十餘矣位爲執政人士皆師尊之傳正公所奬進年纔三十餘而公見之猶相與講究望其切瑳後來所無也滎陽公獨論其問荅當否而不言下問爲正獻公之難盖前輩風俗純一習與性成不以是爲難能也童蒙訓吕晦叔真大臣其言簡而意足孫莘老甞言𥙿陵好問且曰好問則𥙿晦叔曰好問而𥙿不若聽德而聦人有非劉向疆聒而不舎者吕晦叔曰劉向貴戚之卿此語可謂忠厚然向之眷眷於漢室而不忍去則是也至於上變論事亦可謂不知命矣龜山語録公平生以人物爲巳任好徳樂善出於天性士夫有以人物爲意者公必問其所知與其所聞參互考實以待上求神宗嘗謂執政曰吕公著之於人材其言不欺如權衡之於稱物其於用人無逺邇䟽宻一以至公待之雖有舊怨亦不以屑意其論事處物不以徇巳爲恱從衆爲難雖澹於丗利而勇於愛民簡於應接而周於慮丗上前議政事盡誠去飾博取衆人之善至其所當守毅然不可回奪也神道碑皇祐至和間司馬公名猶未甚輝赫正獻公曰若君實者可謂實過其名也後温公隆名盖代士無賢不肖無貴賤皆知畏而愛之而知之衆人未知之前者龐丞相與正獻公二人而巳家塾記正獻公之在侍從也專以薦賢爲務如孫莘老覺李公擇常王正仲存顧子敦臨程伯淳顥張天祺戩等皆爲一時顯人童蒙訓正獻公旣薦常秩後差改節甞對伯淳有悔薦之意伯淳曰願侍郎寧百受人欺不可使好賢之心少替公敬納焉童蒙訓公自爲小官不問生事而夫人亦好施仕寖顯内外姻戚亦益多𥘉爲相受賜所散至十之九三公俸賜率以周九族家無餘積米不足至糴以繼之家傳八之一崇政殿說書滎陽吕公公名希哲字原明正獻公之長子以恩𥙷官元祐中除尚書兵部貟外郎充崇政殿說書兼判登聞檢院紹聖𥘉岀知太平州降官分司南京居和州徽宗即位稍復舊官知單州召爲光禄少卿以直祕閣知曹州尋奪職知相州邢州罷爲宫祠政和中卒年七十八正獻公居家簡重寡黙不以事物經心而申國夫人性嚴有法度雖甚愛公然教公事事循蹈規矩甫十歲祈寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖天甚熱在父母長者之側不得去巾襪縛袴衣服唯謹行歩岀入無得入茶肆酒肆市井里巷之語鄭衛之音未甞一經於耳不正之書非禮之色未甞一接於目正獻公通判潁州歐陽文忠公適知州事焦先生千之伯強客文忠公所嚴毅方正正獻公招延之使教諸子諸生小有過差先生端坐召與相對終日竟夕不與之語諸生恐懼畏伏先生方略降詞色時公方十餘歲内則正獻公與申國夫人教訓如此之嚴外則焦先生化導如此之篤故公德器成就大異衆人公甞言人生内無賢父兄外無嚴師友而能有成者少矣家傳公從安定胡先生瑗於太學與黄公履邢公恕同舎至相友善其後遍從孫先生復石先生介李先生覯講讀辯問又從王公安石學安石以爲凢士未官而事科舉者爲貧也有官矣而復事科舉是僥倖冨貴利逹而巳學者不由也公聞之遽棄科舉一意古學始與程先生頥俱事胡先生居並舎公少程先生一二歲察其學問淵源非它人比首以師禮事之楊公國寳邢公恕皆以公故從程氏學而明道先生顥及横渠張先生載兄弟孫公覺李公常皆與公遊由是知見日益廣大然公亦未甞專主一說不私一門務略去枝葉一意涵飬直截勁捷以造聖人専慕曽子之學盡力乎其内者其讀經書平直簡要不爲辭說以知言爲先自得爲本躬行爲實不尚虚言不爲異行當時學者莫能測其深淺也家傳公熈寧𥘉監陳留稅章樞宻楶方知縣事心甚重公一日與公同坐遽峻詞色折公以事公不爲動章歎曰公誠有德者我聊試公爾汪輔之少有才學名所接士大夫率遭侮慢獨於公敬服張横渠曰於蠻貊之邦行矣於吕原明見之公甞言我少時性夲豪縱亦喜任俠後所以如此者皆痛自矯揉之力公與人交誠盡年稍長者事之少者畜之如子弟平居未甞稱人之短居京師舊第與衆共財一毫不取皆推與衆正獻公常語張耒曰此子不欺闇室守官京師不謁臺諫官遇遷轉即一見執政過此不見也家傳王公安石與正獻公既相推重而公又從之學自嘉祐間内外事多不甚治王公與當丗諸賢務欲變更略倣前代別立法制登進善人修建學校其所施設者公皆預聞之矣然自秉政施設次弟往往與舊說不合又愎諫自信動失衆心寖與公父子不同後欲用其子雩侍講殿中乃欲先引公公固辭乃止家傳公旣不用於時而正獻公亦乆在外前後筦庫者幾十年邢恕和叔旣從宰相蔡確用事略變新法稍用舊人欲進用公公未及行而正獻公召元祐𥘉正獻公廣用當丗善士人之有一善無不用也甞以數幅紙書當丗名士姓名旣而失之後復見此紙則所書人姓名悉用之矣正獻公甞親書遺公曰當丗善士無不用者獨爾以吾故不得用亦命也公夫人張氏有賢行遽取紙視之笑曰是亦未知其子矣家傳公爲說書凢二年日夕勸導人主以修身爲夲修身以正心誠意爲主心正意誠天下自化不假它術身不能修雖左右之人且不能諭况天下乎家傳公旣除諫官累辭未獲蘇公子瞻在邇英戯謂公曰法筵龍象衆當觀第一義公笑而不荅退謂范公淳父曰若辭不獲命必以楊畏爲首時畏方在言路以險詐自任頗爲子瞻所厚公故及之蘇公名重一時在邇英直舎凢冩一字畫一竹石必爲同列争求去雖呉公安詩方嚴猶争取之公獨未甞起觀蘇公亦不樂也家傳滎陽公建中靖國間爲祕書少監時曽布不樂其在朝諷侍御史陳次升言之以爲資淺望輕左遷光禄少卿時豐相之𥘉除禮部尚書大不平之即薦滎公自代薦辭云具官吕希哲心與道潜湛然淵静所居則躁人化聞風則薄夫敦雜志滎陽公爲郡處令公帑多畜鰒魚諸乾物及筍乾蕈乾以待賔客以減鷄鴨等生命也雜志公雖性至樂易然未甞假人詞色恱人以私在邢州日劉公安丗適守潞州邢潞鄰州也公之子疑問甞勸公與劉公書通懃懇公曰吾素與劉往還不熟今豈可先意相結私相附託耶卒不與書家傳公晚居宿州真楊間十餘年衣食不給有至絶糧數日者公處之晏然静坐一室家事一切不問不以毫髮事託州縣其在和州甞作詩云除却借書沽酒外更無一事擾公私閑居日讀易一爻遍考古今諸儒之說黙坐沉思隨事解釋夜則與子孫評論古今啇搉得失乆之方罷家傳滎陽公在淮陽時東萊公爲曹官所居廨舎無几案以縛架上置書冊器皿之屬悉不能具處之甚安其簡儉如此雜志滎陽公晚年習静雖驚恐顛沛未甞少動自歷陽赴單守過山陽渡橋橋壞轎人俱墜浮於水而滎陽公安坐轎上神色不動從者有溺死者時徐仲車先生年幾七十矣作我敬詩贈公曰我敬吕公以其徳齒敬之愛之何時已巳羙哉吕公文在其中見乎外者古人之風惟賢有徳神相其祉何以祝公勿藥有喜雜志公之行巳務自省察校量以自進益晚年甞言十餘年前在楚州橋壞墮在水中時猶覺心動數年前大病巳稍勝前今次疾病全不動矣其自力如此家傳仙源甞言與侍講爲夫婦相處六十年未甞一日有面赤自少至老雖祍席之上未甞戯笑榮陽公處身如此而每歎范内翰以爲不可及雜志公晚年名益重逺近皆師尊之陳公瓘經由楊州見公請公危坐堂上爲公特設六拜請問卑恭如新學小生然見公夫人亦盡敬致拜焉家傳滎陽公與諸人云自少官守處未甞干人舉薦以爲後生之戒仲父舜從守官㑹稽人或譏其不求知者仲父對詞甚好云勤於職事其他不敢不御名乃所以求知也童蒙訓滎陽公爲人處事皆有長乆之計求方便之道只如病中風人口不能言手不能書而飬疾者乃問所欲病者既不能荅適足増苦故公甞教人每事作一牌子如飲食衣裳寒熱之類及常所服藥常所作事常所服藥如理中圎之類常所作事如梳頭洗手之類及作某親等書病者取牌子以示人則可减大半之苦凢公爲人處事每如是也童蒙訓滎陽甞言丗人喜言無好人三字者可謂自賊者也包孝肅尹京時民有自言以白金百兩寄我者死矣予其子其子不肯受願召其子予之尹召其子辭曰亡父未甞以白金委人也兩人相譲乆之公言觀此事而言無好人者亦可以少愧矣人皆可以爲堯舜盖觀於巳而知之童蒙訓公甞言孝子事親湏事事躬親不可委之使令也甞說糓梁言天子親耕以供粢盛王后親𧖟以供祭服國非無良農工女也以爲人之所盡事其祖禰不若以巳所自親者也此說最盡事親之道又說爲人子者聽於無聲視於無形未甞頃刻離親也事親如天頃刻離親則有時而違天天不可得而違雜志滎陽公甞言後生𥘉學且湏理㑹氣象氣象好時百事是當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤壽夭之所由定也雜志又甞說攻其惡無攻人之惡盖自攻其惡日夜且自點檢絲毫不盡即不慊於心矣豈有工夫點檢他人耶雜志或問滎陽公爲小人所詈辱當何以處之公曰上焉者知人與巳夲一何者爲詈何者爲辱自然無忿怒心也下焉者且自思曰我是何等人彼爲何等人若是荅他却與此人等也如此自處忿心亦自消也雜志滎陽公甞言凢與交遊書問其父祖知名於丗者湏避其名諱凢作書湏先思及書之於几然後作書文潞公與故舊欵接一坐未甞犯其父祖名諱雜志七之二叅政范文正公公名仲淹字希文蘇州吴縣人中進士第歷廣德軍司理監㤗州鹽稅以晏元獻公薦爲袐閣校理天聖中通判河中府召爲右司諫岀知睦州徙蘇州就拜天章閣待制權知開封府落職知饒州徙潤州越州復召爲待制知永興軍㑹夏竦爲陜西經略安撫招討使進公龍圖閣直學士以副之兼知延州降知耀州徙慶州環慶路經略安撫縁邊招討使改邠州觀察使辭不拜進樞宻直學士㑹復置陜西四路安撫經略招討使詔公與韓公琦開府涇州元昊請和召拜樞宻副使除叅知政事自請行邊未還以資政殿學士爲陜西四路安撫使知邠州以疾請鄧州徙杭州遷戸部侍郎徙青州㑹病甚請潁州未至而薨年六十四公生二歲而孤母夫人貧無依再適長山朱氏旣長知其丗家感泣去之南都入學舎掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之旨爲文章論說必夲於仁義歐陽公撰神道碑又遺事云公處南都學舎晝夜苦學五年未甞解衣就寢夜或昬怠輒以水沃面徃徃饘粥不充日􅉴始食同舎生或饋珎膳皆拒不受又東軒筆録云公少與劉某同上長白山僧舎脩學惟煑粟米二升作粥一器經宿遂凝刀畫爲四塊早晚取二塊斷虀十數莖汁半盂入少鹽煖而㗖之如此者三年范公少冒朱姓舉學究且甚尫瘠嘗同衆客見諫議大夫姜遵遵素以剛嚴著名與人不𣢾曲衆客退獨留范公引入中堂謂其夫人曰朱學究年雖少竒士也它日不唯爲顯官當立盛名於丗叅坐置酒待之如骨肉人莫測其何以知之也年二十餘始改科舉進士記聞公以進士解褐爲廣德軍司理叅軍日抱具獄與太守争是非守盛怒臨之公不爲屈歸必記其徃復辨論之語于屏上比去至字無所容貧止一馬鬻馬徒歩而歸汪藻撰祠堂記通㤗海州皆濵海舊日潮水皆至城下土田斥鹵不可稼穡范文正公監西溪倉建白於朝請築捍海堤於三州之境長數百里以衛民田朝廷從之以文正爲興化令專掌役事發通㤗楚海四州民夫治之旣成民至今饗其利興化之民徃徃以范爲姓記聞晏丞相殊留守南京范公遭母憂寓居城下晏公請掌府學范公常宿學中訓督學者皆有法度勤勞恭謹以身先之夜課諸生讀書寢食皆立時刻徃徃潜至齋舎詗之見有先寢者詰之其人紿云適疲倦暫就枕耳問未寢之時觀何書其人亦妄對則取書問之其人不能對乃罰之岀題使諸生作賦必先自爲之欲知其難易及所當用意亦使學者凖以爲法由是四方從學者輻湊其後宋人以文學有聲名於埸屋朝廷者多其所教也記聞范公服中上宰相書言朝政得失及民間利病凢萬餘言王曾見而偉之時晏殊亦在京師薦一人爲館職曾謂殊曰公知范仲淹捨不薦而薦斯人乎巳爲公置不行冝更薦仲淹也殊從之遂除館職頃之冬至立仗禮官定議欲媚章獻太后請天子帥百官獻壽於庭范公奏以爲不可晏殊大懼召公責怒之以爲狂公正色抗言曰仲淹受明公誤知常懼不稱爲知己羞不意今日更以正論獲罪於門下也殊慙無以應記聞又神道碑云當太后臨朝時以至日大㑹前殿上將率百官爲壽有司巳具公上䟽言天子無北靣且開後丗弱人主以強母后之漸其事遂巳東坡志林云先君奉詔脩太常因革禮求之故府朝正案牘具在考其始末無諫止之事而有巳行之明驗質之於文忠公公曰范公實諫而卒不從墓碑誤也當以案牘爲正今按涑水記聞亦但云奏以爲不可而不言見從與否則蘇公所記疑若可信但諸書皆云冬至而蘇公獨云朝正則誤也又上書請還政天子不報岀通判河中府及太后崩召拜右司諫時言事者希旨多求太后時事欲深治之公獨以謂太后受託先帝保佑聖躬冝掩其小故以全大德初太后有遺命立楊太妃代爲太后公諫曰太后母號也自古無代立者繇是罷其冊命神道碑是歲大旱蝗詔公奉使安撫江淮還以太平州貧民所食烏昧草進呈乞宣示六宫戚里用抑奢侈澠水燕談郭皇后廢率諫官御史伏閤争不能得貶知睦州又徙蘇州歲餘即拜天章閣待制召還益論時政闕失而大臣權倖多忌惡之居數月以公知開封府素號難治公治有聲事日益簡暇則益取古今治亂安危爲上開說又爲百官圖以獻曰任人各以其材而百職脩堯舜之治不過此也因指其遷進遲速次序曰如此而可以爲公可以爲私亦不可以不察由是吕丞相怒至交論上前公求對辨語切坐落職知饒州神道碑又塵史云公尹京時有内侍怙勢作威傾動中外公抗䟽列其罪䟽欲上家所藏書有言兵者悉焚之仍戒其子曰我上䟽言斥君側霄人必得罪以死我旣死汝軰勿復仕䆠但於墳側敎授爲業䟽奏嘉納爲罷黜内侍云又澠水燕談云公貶饒州謝表云此而爲郡陳優優布政之方必也立朝增蹇蹇匪躬之節天下歎公至誠許國始終不渝不以進退易其守也趙元昊反河西上復召相吕公乃以公爲陜西經略安撫副使遷龍圖閣直學士是時新失大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以謂無事請和難信且書有僣號不可以聞乃自爲書告以逆順成敗之說甚辨坐擅復書奪一官知耀州未逾月徙知慶州旣而四路置帥以公爲環慶路經略安撫招討使公爲將務持重不急近功小利於延州築清澗城墾營田復承平永平廢寨熟羌歸業者數萬户於慶州城大順以據要害奪賊地而耕之又城細腰胡盧於是明珠滅臧等大族皆去賊爲中國用自邊制乆隳至兵與將常不相識公始分延州兵爲六將訓練齊整諸路皆用以爲法公之所在賊不敢犯人或疑公見敵應變爲如何至其城大順也一旦引兵岀諸將不知所向軍至柔逺始號令告其地處使徃築城至於版築之用大小畢具而軍中初不知賊以騎三萬來争公戒諸將戰而賊走追勿過河巳而賊果走追者不渡而河外果有伏賊旣失計乃引去於是諸將皆服公爲不可及公待將吏必使畏法而愛己所得賜賚皆以上意分賜諸將使自爲謝諸蕃質子縱其岀入無一人逃者蕃酋來見召之卧内屏人徹衛與語不疑居邊二歲士勇邊實恩信大洽乃决䇿謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣神道碑又名臣傳云仲淹領延安閱兵選將日夕訓練又請戒諸路養兵畜銳母得輕動夏人聞之相戒曰無以延州爲意今小范老子腹中自有數萬兵甲不比大范老子可欺也戎人呼知州爲老子大范謂雍也在慶州請以种丗衡守環州招屬羌千餘帳乆之王師再敗於定川仲淹晝夜領兵赴援賊遂遁去初關輔人心動揺及仲淹兵出號令嚴明人心遂安上聞定川之敗頗以西方爲憂謂近臣曰得仲淹出援可無慮及聞其岀師甚喜又澠水燕談云范文正公帥邠延涇慶四郡威德著聞夷夏聳服熟户蕃部率稱曰龍圖老子至於元昊亦以此呼之又龍川志云宋公序爲叅知政事欲傾宰相吕申公而未得其要吕公覺之會范公擅焚元昊國書而以私書復之事至朝廷諸公議之申公謬謂大不可公序信之亟於上前乞斬范公申公徐救之公序倉猝失措相次以事罷去范氏子弟至今恨之仁宗時西戍方熾韓魏公爲經略招討副使欲五路進兵以襲平夏時范文正公守慶州堅持不可是時尹洙爲經略判官一日將命至慶州約范公以進兵范公曰我師新敗士卒氣沮當自謹守以觀其變豈可輕兵深入耶以今觀之但見敗形未見勝勢也洙歎曰公於此乃不及韓公也韓公嘗云大凢用兵當先置勝敗於度外今公乃區區過謹此所以不及韓公也范公曰大軍一動萬命所懸而乃置於度外仲淹不見其可洙議不合遽還魏公遂舉兵入界次好水川元昊設覆全師䧟没大將任福死之魏公遽還至半塗而亡者父兄妻子數千人號於馬首皆持故衣紙錢招䰟而哭曰汝昔從招討岀征今招討歸而汝死矣汝之䰟識亦能從招討以歸乎旣而哀慟聲震天地魏公不勝悲憤掩泣駐馬不能前者數刻范公聞而歎曰當是時難置勝敗於度外也東軒筆録仲淹與韓琦叶謀必欲收復靈夏橫山之地邊上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽元昊大懼遂稱臣名臣傳初西人藉爲郷兵者數萬旣而黥以爲軍唯公所部但刺其手公去兵罷獨得復爲民其於兩路旣得熟羌爲用使以守邊因徙屯兵就食内地而紓西人饋輓之勞其所設施去而人德之與守其法不敢變者至今尤多神道碑自公坐吕公貶群士大夫各持二公曲直吕公患之凡直公者皆指爲黨或坐竄逐及吕公復相公亦再起𬒳用於是二公驩然相約勠力平賊天下之士皆以此多二公然朋黨之論遂起而不能止上旣賢公可大用故卒置群議而用之神道碑又邵氏聞見録曰歐陽公作碑如此文正之子堯夫以爲不然從歐陽公辨不可則自削去驩然勠力等語歐陽公殊不樂謂蘇明允云范公碑爲其子弟擅於石夲改動文字令人恨之又龍川志曰范文正公篤於忠亮雖喜功名而不爲朋黨早歲排吕申公勇於立事其徒因之矯厲過直公亦不喜也自饒州還朝岀領西事恐申公不爲之地無以成功乃爲書自咎解仇而去故歐陽公爲文正神道碑言二公晚年歡然相得由此故也後生不知皆咎歐陽公予見張公言之乃信公爲叅知政事每進見上必以太平責之公歎曰上之用我者至矣然事有先後而革弊於乆安非朝夕可也旣而上再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆使䟽于前公惶恐避席始退而條列時所冝先者十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以別能否减任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥倖之人皆不便因相與騰口而嫉公者亦幸外有言喜之爲佐佑㑹邊奏有警公即請行乃以公爲河東陜西宣撫使至則上書願復守邊即拜資政殿學士知邠州兼陜西四路安撫使其知政事纔一歲而罷有司悉奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人巳稱臣公因以疾請鄧州神道碑又龍川志云范公以叅知政事出使吕公巳老居鄭范公徃見之吕公欣然相與語終日問曰何爲亟去朝廷范公言欲經制西事耳吕公曰經制西事莫如在朝廷之爲便范公爲之愕然又東軒筆録亦載此事云吕公問何爲遽出范公曰暫徃經撫兩路事畢即還矣吕公曰叅政此行必蹈危機豈復再入范公遂去未還而有邠州之命慶曆四年四月戊戍上與執政論及朋黨事叅知政事范仲淹對曰方以類聚物以群分自古以來邪正在朝未甞不各爲一黨不可禁也在聖鑒辨之耳誠使君子相朋爲善其於國家何害記聞慶曆中劫盗張海橫行數路將過髙郵知軍晁仲約度不能禦喻軍中冨民岀金帛具牛酒使人迎勞且厚遺之海恱徑去不爲暴事聞朝廷大怒時范文正公在政府冨鄭公在樞府鄭公議欲誅仲約以正法范公欲宥之争於上前冨公曰盗賊公行守臣不能戰又不前守而使民醵錢遺之法所當誅也不誅郡縣無復肯守者矣聞髙郵之民疾之欲食其肉不可釋也范公曰郡縣兵械足以戰守遇賊不禦而又賂之此法所誅也今髙郵無兵與械雖仲約之義當勉力戰守然事有可恕戮之恐非法意也小民之情得醵岀財物而免於殺掠理必喜之而云欲食其肉傳者過也仁宗釋然從之仲約由此免死旣而冨公愠曰方今患法不舉方欲舉法而多方沮之何以整衆范公宻告之曰祖宗以來未甞輕殺臣下此盛德之事柰何欲輕壞之且吾與公在此同僚之間同心者有幾雖上意亦未知所定也而輕導人主以誅戮臣下它日手滑雖吾軰亦未敢自保也冨公終不以爲然及二公迹不安范公出按陜西冨公岀按河北范公因自乞守邊冨公自河北還及國門不許入未測朝廷意比夜徬徨不能寐遶床歎曰范六丈聖人也龍川志又遺事亦載此事但云淮南盗王倫與此不同又載公與冨公争於上前之語曰冦至無備若守臣死之則民盡塗炭今吏雖不死節而民之完者數萬家誠國家實事所存不細乃與有備而縱賊者例行誅罰恐非陛下寧失不經之意退至政事堂昌言曰朝廷異時以四方無事不肯爲郡縣設備吏敢以治城隍閱兵卒爲請者以狂妄坐之一旦事生不虞吾軰不自引咎專以死責外臣誠有愧於青史也公爲叅政與韓冨二樞並命銳意天下之事患諸路監司不才更用杜𣏌張昷之軰公取班簿視不才監司毎見一人姓名一筆勾之以次更易冨公素以丈事公謂公曰十二丈則是一筆焉知一家哭矣公曰一家哭何如一路哭耶遂悉罷之遺事歐陽脩余靖蔡襄王素爲諫官時謂之四諫四人力引石介執政欲從之時范公爲叅知政事獨曰介剛正天下所聞然性亦好異使爲諫官必以難行之事責人君以必行少拂其意則引𥚑折檻叩頭流血無所不爲主上冨春秋無失德朝廷政事亦自脩舉安用如此諫官也諸公伏其言而罷東軒筆録慶曆中議㢮茶鹽之禁及减啇稅范文正以爲不可茶鹽啇稅之入但分减啇賈之利耳行於啇賈未甚有害也今國用未减歲入不可闕旣不取之於山澤及啇賈湏取之於農與其害農孰若取之於啇賈今爲計莫若先省國用國用有餘當先寛賦役然後及啇賈㢮禁非所當先也其議遂寢筆談皇祐二年吴中大飢殍殣枕路是時范文正公領浙西發粟及募民存餉爲術甚備吴人喜競渡好爲佛事公乃縱民競渡太守日岀宴于湖上自春至夏居民空巷岀遊又召諸佛寺主首諭之曰飢歲工價至賤可以大興土木之役於是諸寺工作鼎興又新敖倉吏舎日役千夫監司奏劾杭州不恤荒政嬉遊不節及公私興造傷耗民力公乃自條叙所以宴遊及興造皆欲以發有餘之財以惠貧者貿易飲食工技服力之人仰食於公私者日無慮數萬人荒政之施莫此爲大是歲兩浙惟杭州晏然民不流徙皆公之惠也歳飢發司農之粟募民興利近歳遂著爲令旣巳恤飢因之以成就民利此先王之美澤也筆談范文正公鎮青社㑹河朔艱食青之輿賦博州置場納青民大患輦置之苦公戒民納價每㪷三鍰給抄與之以書與博守遣官輓金詣博坐倉以倍價招之齎巨榜數道介其境則張之且戒曰郡不假廪則寄僧舎可也至則貿者山積不五日遂足而博斛亦衍斛金尚餘數千緡按等差給還之青民因立像祠焉東齋記事韓魏公言章得象在中書時方天下多弊事且有西鄙之患毎與希文彦國以文字至兩府輙閉目不應彦國憤惋欲悖之希文惜大體不許也魏公別録韓魏公言希文嘗與吕申公論人物申公曰吾見人多矣無有節行者希文曰天下固有人但相公不知爾以此意待天下士冝乎節行者之不至也魏公別録范文正言息盗賊誅姦雄浩然無憂乃所以爲身謀若未能如是雖州里不可保七尺之軀無所措於天地間矣胡氏傳家録公言幕府辟客須可爲己師者乃辟之雖朋友亦不可辟蓋爲我敬之爲師則心懷尊奉每事取法於我有益耳遺事范文正公曰吾遇夜就寢即自計一日食飲奉養之費及所爲之事果自奉之費與所爲之事相稱則鼾鼻孰寐或不然則終夕不能安眠明日必求所以稱之者聞見後録公之子純仁娶婦將歸或傳婦以羅爲帷幔者公聞之不恱曰羅綺豈帷幔之物耶吾家素清儉安得亂吾家法敢持至吾家當火於庭遺事公旣貴常以儉約率家人且戒諸子曰吾貧時與汝母養吾親汝母躬執㸑而吾親甘㫖未甞充也今而得厚禄欲以養親親不在矣汝母又巳早丗吾所最恨者忍令若曹饗冨貴之樂也遺事公爲吏部貟外郎岀守時有三婢及官大歷二府以至于薨凢十年不増一人亦未甞易也遺事公在杭州子弟以公有退志乗間請治第洛陽樹園圃以爲逸老之地公曰人苟有道義之樂形骸可外况居室哉吾今年踰六十生且無幾乃謀樹第治圃頋何待而居乎吾之所患在位髙而艱退不患退而無居也且西都士大夫園林相望爲主人者莫得常遊而誰獨障吾遊者豈必有諸已而後爲樂耶俸賜之餘冝以賙宗族若曹遵吾言母以爲慮遺事橫渠張先生言嘗有欲爲公買緑野堂者公不肯在唐如晉公者是可尊也一旦取其物而有之如何得安寧使耕壞及它人有之己則不可取也程氏遺書公語諸子弟曰吾吴中宗族甚衆於吾固有親踈然吾袒宗視之則均是子孫固無親踈也吾安得不恤其飢寒哉且自祖宗來積德百餘年而始發於吾得至大官若獨饗冨貴而不恤宗族異日何以見祖宗地下今亦何顔以入家廟乎故恩例俸賜常均族人并置義田宅云遺事范文正公輕財好施尤厚於族人旣貴於姑蘇近郭買良田數千畒爲義㽵以養群從之貧者擇族人長而賢者一人主其岀納人日食米一升歲衣縑一匹嫁娶䘮葬皆有贍給聚族人僅百口公殁逾四十年子孫賢令至今奉公之法不敢廢弛見澠水燕談范文正公自政府岀歸姑蘇焚黃搜外庫惟有絹三千匹令掌吏録親戚及閭里知舊自大及小散之皆盡曰宗族郷黨見我生長㓜學壯仕爲我助喜我何以報之哉巵史公以朱氏長育有恩常思厚報之及貴用南郊所加恩乞贈朱氏父太常博士曁諸子皆公爲葬之歲別爲饗祭朱氏它子弟以公廕得𥙷官者三人遺事范文正公在睢陽遣堯夫到姑蘇般麥五百斛堯夫時尚少旣還舟次丹陽見石曼卿問寄此乆如曼卿曰兩月矣三䘮在淺土欲葬之而北歸無可與謀者堯夫以所載麥舟付之單騎自長蘆㨗徑而去到家拜起侍立良乆文正曰東吴見故舊乎曰曼卿爲三䘮未舉方留滯丹陽時無郭元振莫可告者文正曰何不以麥舟與之堯夫曰巳付之矣冷齋夜話范文正公守邠州暇日帥僚属登樓置酒未舉觴見衰絰數人營理䘮具者公亟令詢之乃寄居士人卒於邠將岀殯近郊賵歛棺椁皆所未具公憮然即徹宴席厚賙給之使畢其事坐客感歎有泣下者記聞公爲人作銘文未甞受遺後作范忠獻銘其子欲以金帛謝拒之乃獻以所蓄書畫公悉不收獨留道德經而還書戒之曰此先君所藏丗之所寳仲淹切爲宗家惜之母爲人得也晏元獻公判南京范希文以大理寺丞丁憂權掌西監一日晏謂范曰吾一女及笄仗君爲我擇壻范曰監中有二舉子冨臯張爲善皆有文行它日皆至卿輔並可壻也晏曰然則孰優范曰冨脩謹張踈俊晏曰唯即取冨臯爲壻後改名即冨公弼也爲善後亦更名方平云筆録公與南都朱某相善朱且病公視之謂公曰某常遇異人得變水銀爲白金術吾子㓜不足傳今以傳君遂以其方并藥贈公公不納強之乃受未甞啓封後其子宷長公教之義均子弟及宷登第乃以所封藥并其術還之遺事昔錢尚書遹爲洪州職官縁事過鄱陽見彭器資值月朔有衣冠數十軰來見彭公設拜各人進問起居而退錢在書齋中窺見甚訝之因問公此軰何人公曰皆郷里後進子弟也錢曰今它處後進必居於位或與先生並行何以有此公曰昔范希文自京尹謫守是邦其爲政以名教厚俗敦尚風義爲先州人仰慕咸傾嚮之遂以成俗故至今爲尊長者以父兄自處而不辭後進以子弟自任而不敢忽乆之不變也此大賢臨政之效可以爲法見胡氏傳家録公少有大節其於冨貴貧賤毀譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害爲趨捨其有所爲必盡其方曰爲之自我者當如是其成與否有不在我者雖聖賢不能必吾豈苟哉神道碑公爲人外和内剛樂善汎愛䘮其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其爲政所至民多立祠畫像其行已臨事自山林處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆神道碑蘇軾序公文集曰古之君子如伊尹太公管仲樂毅之流其王霸之略皆素定於畎畒中非仕而後學者也淮隂侯見髙帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主論曹操孫權規取劉璋因蜀之資以争天下終身不易其言此豈口傳耳受嘗試爲之而僥倖其或成哉公在天聖中居大夫人憂則巳有憂天下致太平之意故爲萬言書以遺宰相天下傳誦至用爲將擢爲執政攷其平生所爲無岀此書者今其集二十卷其於仁義禮樂忠信孝悌蓋如飢渴之於飲食欲湏臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠争師尊之孔子曰有德者必有言非有言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也張横渠謂范文正才氣老成程氏遺書
