body:
  text: 六之二丞相荆國王文公公名安石字介甫撫州臨川人慶曆二年登進士甲科簽書淮南節度判官廳公事代還例當獻文求試公獨無所獻特召試亦固辭知明州鄞縣通判舒州召為羣牧判官出知常州提點江南東路刑獄入為三司度支判官除直集賢院纍辭不獲命始就職嘉祐五年四月除同修起居注固辭不拜十一月申前命章又五上不許遂除知制誥糾察在京刑獄同知嘉祐八年貢舉丁母憂服除英宗朝纍召不起神宗即位就除知江寧府召為翰林學士未幾除諌議大夫參知政事熙寧三年拜禮部侍郎同平章事七年以旱求避位拜觀文殿大學士知江寧府明年再入為首相以三經義成拜左僕射九年以使相判江寧公懇辭遂復以大觀文領集禧觀使元豐三年改特進封荆國公哲宗即位拜司空明年薨年六十六紹聖𥘉賜諡配享神宗廟庭崇寧三年詔配祀文宣王廟政和三年追封舒王靖康初用諌議大夫楊時言停文宣王廟配享列于從祀建炎中用貟外郎趙鼎言罷配享神宗廟庭王安石舉進士有名於時慶曆二年第五人登科𥘉署楊州判官後知鄞縣好讀書能強記雖後進投贄及程試有美者一讀過輒成誦在口終身不忘其屬文動筆如飛𥘉若不措意文成見者皆服其精妙友愛諸弟俸祿入家數日輒盡為諸弟所費用家道屢空一不問議論髙竒能以辨博濟其說人莫能屈始為小官不急急於仕進皇祐中文潞公為宰相薦安石及張瓌曽公定韓維四人恬退乞朝廷不次進用以激僥競之風有旨皆籍記其名至和中召試館職固辭不就乃除羣牧判官又辭不許乃就職懇求外𥙷得知常州由是名重天下士大夫恨不識其面朝廷常欲授以美官惟患其不肯就也自常州徙提點江南西路刑獄嘉祐中召除館職三司度支判官固辭不許未幾命修起居注辭以新入館館中先進甚多不當超處其右章十餘上有旨令閣門吏賫敕就三司授之安石不受吏隨而拜之安石避之於厠吏置敕於案而去安石使人追而與之朝廷卒不能奪歲餘復申前命安石辭七八章乃受除知制誥自此不復辭官矣溫公瑣語司馬溫公嘗曰昔與王介甫同為羣牧司判官包孝肅公為使時號清嚴一日群牧司牡丹盛開包公置酒賞之公舉酒相勸光素不喜酒亦強飲介甫終席不飲包公不能強也光以此知其不屈聞見録嘉祐末王介甫以知制誥糾察在京刑獄有少年得鬪鶉其同儕觀之因就乞之鶉主不許借者恃與之狎眤遂持去鶉主追及之踢其脅立死開封府捕按其人罪當償死及糾察司録問介甫駁之曰按律公取竊取皆為盜此不與而彼強携以去乃盜也此追而毆之乃捕盜也雖死當勿論府司失入平人為死罪府官不伏事下審刑大理詳定以府斷為是有旨王安石放罪舊制放罪者詣殿門謝介甫自言我無罪不謝御史臺及閣門纍移牒趣之終不肯謝臺司因劾奏之執政以其名重不問介甫亦竟不謝瑣言仁宗朝王安石為知制誥一日賞花釣魚宴內侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也常不樂之後安石自著日録厭薄祖宗仁宗尤甚每謂漢文帝不足取其心薄仁宗也故一時大臣冨弼韓琦文彥博皆為其毀詆云聞見録初韓魏公知楊州介甫以新進士簽書判官事魏公雖重其文學而不以吏事許之介甫數引古義爭公事其言迂闊魏公多不從介甫秩滿去㑹有上韓公書者多用古字韓公笑而謂僚屬曰惜王廷評不在此其人頗識難字介甫聞以韓公為輕巳由是怨之及介甫知制誥言事復多為韓公所沮㑹遭母喪服除時韓公猶當國介甫遂留金陵不朝參曽魯公知介甫怨忌韓公乃力薦介甫於上強起之其意欲以排韓公耳記聞又聞見録云韓魏公知楊州王荆公為簽判每讀書達旦略假寐日巳髙亟上府多不及盥漱魏公見荆公年少意其夜飲放逸一日從容謂荆公曰君少年母廢書不可自棄荆公不答退而言曰韓公非知我者魏公後知荆公之賢欲收之門下荆公終不屈如召館職不就之類是也故荆公熙寧日録中短魏公為多每曰韓公但形相好耳作畫虎圗詩詆之至荆公作相行新法魏公言其不便神宗感悟欲罷其法荆公怒甚取魏公之章送條例司疏駁頒天下又誣吕申公有言藩鎮大臣將興晉陽之師除君側之惡自草申公謫詞明著其事因以搖魏公賴神宗之明眷禮魏公終始不替及魏公薨荆公有挽詩云幕府少年今白髮傷心無路送靈輀猶不忘魏公少年之語也又曰熙寧二年韓魏公自永興移判北京過闕上殿王荆公方用事神宗問曰卿與王安石議論不同何也魏公曰仁宗立先帝為皇嗣時王安石有異議與臣不同故也帝以魏公之語問荆公公曰方仁宗欲立先帝為皇子時春秋未髙萬一有子措先帝於何地臣之論所以與韓琦異也荆公強辨類如此當魏公請冊英宗為皇嗣時仁宗曰少俟後宫有就閣者公曰後宫生子所立嗣退居舊邸可也蓋魏公固有以處之矣又東軒筆録云嘉祐末魏公為相荆公知制誥因論蕭注降官詞頭遂上疏爭舍人院職分其言頗侵執政又為糾察刑獄駮開封府斷爭鵪鶉公事而魏公以開封府為直自是文字還往甚多及荆公秉政又與常平議不合然而荆公每評近代宰相即曰韓公德量才智心期髙逺諸諸公皆莫及也王安石居金陵𥘉除母喪英宗屢召不至安石在仁宗時論立英宗為皇子與韓公不合故不敢入朝安石雖髙科有文學夲逺人未為中朝士大夫所服乃深交韓吕二家兄弟韓吕朝廷之巨室也天下之士不出於韓即出於吕韓氏兄弟絳字子華與安石同年髙科維字持國學術尤髙不出仕用大臣薦入館吕氏公著字晦叔最賢亦與安石為同年進士子華持國晦叔爭揚於朝安石之名始盛安石又結一時名德之士如司馬君實輩皆相善先是治平間神宗為潁王持國翊善每講論經義神宗稱善持國曰非維之說維之友王安石之說至神宗即位乃召安石以至大用治平四年以介甫知江寧府時介甫方乞分司衆謂介甫必不肯起既而詔到即詣府視事溫公日録荆公召為翰林學士𥘉入對神宗問方今治當何先公對曰擇術為先上問唐太宗如何公曰陛下當以堯舜為法太宗所知不逺所為不盡合先王不足道也堯舜之道至簡而不繁至要而不迂至易而不難但末世學者不能通知故常以為髙而不可及耳上曰卿可謂責難於君矣朕自視眇然恐無以副卿意可悉意輔朕庶同濟此道一日侍上語及諸葛亮魏鄭公公對曰陛下誠能為堯舜則必有咎夔稷禼陛下誠能為髙宗則必有傅說魏鄭公諸葛亮皆有道者所羞何足道哉但恐陛下擇術未明推誠未至則雖有咎夔稷禼傅說之賢亦為小人所蔽因卷懷而去耳上曰自古治世豈能使朝廷無小人雖堯舜之時不能無四凶公曰唯能辨四凶而誅之此乃所以為堯舜也若使四凶得肆其讒慝則咎夔稷禼亦安肯苟食其祿以終身乎未幾遂參大政荆公既為參知政事上謂之曰人皆不能知卿以為卿但知經術不曉世務公對曰經術正所以經世務但後世所謂者大抵皆庸人故世俗皆以為經術不可施於世務耳上問然則卿所施設以何為先公曰變風俗立法度最方今所急也於是青苗市易坊埸保甲保馬導洛免役之政相繼並興設制置三司條例司與知樞密院陳升之同領之中丞吕公誨論公十事公力求去位上為出吕公而韓魏公亦上疏論青苗法乞罷諸路提舉官奏至公稱疾求分司上不許公入謝因為上言陛下欲以先王正道變天下流俗故與天下流俗相為輕重流俗權重則天下之人歸流俗陛下權重則天下之人歸陛下權者與物相為輕重雖千鈞之物所加損不過銖兩而移今姦人欲敗先王之正道以沮陛下之所為是於陛下與流俗之權適爭輕重之時加銖兩之力則用力至微而天下之權已歸流俗矣此所以紛紛也上以為然公乃視事王荆公在臺閣侍從時每為人言唐太宗令諌官隨宰相入閣最切於政道後世所當行也及入司政事而孫莘老李公擇在諌職二人者熟荆公此論遂列奏請舉行之荆公不可曰是又益兩參知政事也吕氏家孰記王荆公知制誥吳夫人為買一妾荆公見之曰何物女子曰夫人令執事左右曰汝誰氏曰妾之夫為軍大將部米運失舟家資盡沒猶不足又賣妾以償公愀然曰夫人用錢幾何得汝曰九十萬公呼其夫令為夫婦如初盡以錢賜之司馬溫公從龐潁公辟為太原府通判尚未有子夫人為買一妾公殊不顧夫人疑有所忌也一日教其妾俟我出汝自飾至書院中冀公一顧也妾如其言公訝曰夫人出汝安得至此亟遣之潁公知之對僚屬咨其賢荆公溫公不好聲色不愛官職不殖貨利皆同二公除修注皆辭至六七不獲巳方受溫公除知制誥以不善作辭令屢辭免改待制荆公官浸顯俸祿入門任諸弟取去盡不問溫公通判太原時月給酒饋待賔客外輒不請晚居洛買園宅猶以兄郎中為户故二公平生相善至議新法不合始著書絶交矣聞見録王荆公知明州鄞縣讀書為文章二日一治縣事起堤堰决陂塘為水陸之利貸穀于民立息以償俾新陳相易興學校嚴保伍邑人便之故熙寧初為執政所行之法皆本於此然荆公知行於一邑則可不知行於天下不可也又所遣新法使者多刻薄小人急於功利遂至决河為田壞人墳墓室廬膏腴之地不可勝紀青苗雖取二分之利民請納之費至十之七八又公吏冒民新舊相因其弊益繁保甲保馬尤有害天下騷然不得休息蓋祖宗之法臺變矣獨役法新舊差募二議俱有弊吳蜀之民以雇役為便秦晉之民以差役為便荆公與司馬溫公皆早貴少歷州縣不能周知四方風俗故荆公主雇役溫公主差役蘇內翰范忠宣溫公門下士復以差役為未便章子厚荆公門下士復以雇役為未盡三人雖賢否不同皆聰眀曉吏治兼知南北風俗其所論甚公各不私於所主元祐𥘉溫公復差役改雇役子厚議曰保甲保馬一日不罷有一日害如役法則熙寧𥘉以雇役代差役議之不詳行之太速故後有弊今復以差役代雇役當詳議熟講庶幾可行而限止五日太速後必有弊溫公不以為然子厚對太皇太后簾下與溫公爭辨至言異日難以奉陪喫劒太后怒其不遜子厚罪去蔡京者知開封府用五日限盡改畿縣雇役之法為差役至政事堂白溫公公喜曰使人人如待制何患法之不行紹聖𥘉子厚入相復議以雇役改差役置司講論久不决蔡京兼提舉白子厚曰取熙寧元豐法施行之耳尚何講為子厚信之雇役遂定蔡京前後觀望反復賢如溫公暴如子厚皆足以欺之真小人也聞見録熙寧四年王荆公當國欲以朱柬之監左藏庫柬之辭曰左帑有火禁而年髙宿直非便願易勾當進奏院荆公許諾翊日進擬某人監左藏庫上曰何不用朱東之監左藏庫可也荆公震駭莫測其由上之機神臨下多知外事雖纎微莫可隱也東軒筆録吐蕃在唐最盛至本朝始衰今河湟邈川青唐洮岷以至階利文政綿州威茂黎雅州夷人皆其遺種也獨唃厮囉一族最盛雖西夏亦畏之朝廷封西平王用為藩翰陜西州縣特置驛謂之唃家位歲貢奉不絶未開熙河前關中士人多言其利害雖張橫渠先生之賢少時亦欲結客以取范文正公帥延安招置府第俾修制科至登進士第其志乃巳仁宗皇帝朝韓琦冨弼二公為宰相凡言開邊者皆不納熙寧𥘉王荆公執政始有開邊之議王韶者罷新安縣主簿逰邊得其說遂上開河湟之䇿荆公以為竒謀乃有熙河之役獨岷州白石大潭秦州屬縣有賦稅其餘無㪷粟尺布唯仰陜西州郡朝廷帑藏供給故自開熙河以來陜西民日困朝廷財用益耗𥘉唃厮囉分處諸子於熙河洮岷之地唃厮囉死諸子皆衰弱故韶能取之唃厮囉諸子唯董氊者在湟鄯最盛韶之勢止能取河州韶暫入朝鬼章已舉兵攻河州遂有踏白之敗景思立死之紹聖𥘉章惇作相曽布作樞密董氊巳為強臣阿里骨所篡國人畏之阿里骨死其子瞎征立國人思故主不輔瞎征瞎征懦弱欲為僧國人又欲殺之瞎征遂乞納上歸朝廷時童貫𥘉領邊事乃受之送于朝封官爵遣居熙州建中靖國𥘉韓忠彥為相安燾為樞密遂棄􅙉鄯求唃氏苗裔立之韓忠彥罷蔡京作相復􅙉鄯責安燾與熙河帥姚師雄及凡議棄者邊事復興矣靖康𥘉言者乞求青唐種族以􅙉鄯之地賜之朝廷下熙河帥議以聞無敢任其責者乃巳至金人陷陜之六路兵入熙河即求􅙉鄯舊族盡以其地與之聞見録上以外事問介甫介甫曰陛下從誰得之上曰卿何必問所從來介甫曰陛下與他人為密而獨隱於臣豈君臣推心之道乎上曰得之李評介甫由是惡評竟擠而逐之他日介甫復以密事質於上上問於誰得之介甫不肯對上曰朕無隱於卿卿獨有隱於朕乎介甫不得已曰朱明之為臣言之上由是惡明之眀之介甫妹夫也及介甫出鎮金陵吉甫欲引親䁥置之左右薦明之為侍講上不許曰安石更有妹夫為誰吉甫以直講沈道原對上即以道原為侍講吉甫又引弟升卿為侍講升卿素無學術每進講多捨經而談財穀利害營繕等事上時問以經事升卿不能對輒目道原從旁代對記聞熙寧六年十一月吏有不附新法介甫欲深罪之上不可介甫固爭之曰不然法不行上曰聞民間亦頗苦新法介甫曰祈寒暑雨民猶有怨咨者豈足顧也上曰豈若并祈寒暑雨之咨亦無邪介甫不恱退而屬疾家居數日上遣使尉勞之乃出其黨為之謀曰今不取門下士上所素不喜者暴進用之則權輕將有人窺間隙者矣介甫從之既出即奏擢章惇趙子幾等上喜其出勉強從之由是權益重記聞介甫請并京師行陜西所鑄折二錢既而宗室及諸軍不樂有怨言上聞之以問介甫欲罷之介甫怒曰朝廷每舉一事定為浮言所移如此何事可為退遂移疾卧不出上使人諭之曰朕無間於卿天日可鑒何遽如此乃起記聞王荆公秉政更新天下之務而宿德舊人論議不叶荆公遂選用新進待以不次故一時政事不日皆舉而兩禁臺閣內外要權莫非新進之士也洎三司論市易而吕參政指為沮法荆公信以為然堅乞罷相既出吕嘉問張諤持荆公而泣公慰之曰已薦吕惠卿矣二子收淚及惠卿入參有射羿之意而一時之士見其得君謂可以傾奪荆公矣遂更朋附之既而鄧潤甫枉狀廢王安國而李逢之獄又扶李士寧之事以撼荆公又言熙寧編勑不便乞重編修及令百姓手實供家財簿又欲給田募役以破役法其他寅緣事故非議前宰者甚衆綱紀幾紊天子斷意再召荆公秉政鄧綰懼不自安欲弭前迹遂發張若濟事返攻吕惠卿朝廷俾張諤為兩浙路察訪以驗其事諤猶欲掩覆而鄧綰復觀望意指薦引匪人於是惠卿自知不安乃條列荆公兄弟之失凡數事靣奏意欲上意有二上封惠卿所言以示荆公故荆公表有忠不足以取信故事事欲其自明義不足以勝姧故人人與之立敵蓋謂是也既而惠卿出亳州鄧綰張諤之徒皆以罪去然自是門下之人皆無固志荆公無與共圗事者又復請去而再鎮金陵故詩有紛紛易變浮雲白落落難鍾老柏青者蓋謂是也東軒筆録又云熙寧七年王荆公𥘉罷相薦吕惠卿為參政吕得君怙權慮荆公復進因郊禮薦荆公為使相方進熟上察見其情遽問日王安石去不以罪何故用赦復官吕無以對又曰李士寧者蜀人得導氣養生之術又能言人休咎王荆公與之有舊每延於東府迹甚熟及吕惠卿執政㑹山東告李逢劉育之變事連宗子丗居起獄推治劾者言士寧嘗預此謀敕天下捕之獄具丗居賜死逢育棄市士寧决杖流永州連坐者甚衆吕為此獄引士寧者意欲有所誣衊㑹荆公再入謀遂不行王荆公再秉政既逐吕惠卿門下之人復為諛媚以自安而荆公求退告去尤切有練亨甫者謂中丞鄧綰曰公何不言於上以丞相之子雱為樞密使諸弟皆為兩制壻姪皆館職京師賜第宅田邸則庶幾可留也綰如所戒言之上察知其阿黨亦頷之而已一日荆公復於上前求去上曰卿勉為朕留當一一如卿所欲但未有一穩便第宅耳荆公駭曰臣有何欲且何為而賜第上笑而不答翊日荆公懇請其由上出綰所上章荆公即乞推劾先是綰欲用其黨方揚臺官懼不厭人望乃并彭汝礪薦之其實意在揚也無何上黜汝礪綰遽表言臣素不知汝礪之為人昨所舉鹵莾乞不行前狀即此二事上察見其姦遂落綰中丞以本官知􅉑州亨甫奪校書為漳州推官綰制曰操心頗僻賦性姦回論士薦人不循分守又曰朕之待汝者義形於色汝之事朕者志在於邪蓋謂是也東軒筆録初吕惠卿為荆公所知驟引至執政荆公去惠卿遂背之洎荆公再相於是起華亭詔獄而使徐僖王古蹇周輔三輩按之惠卿情不得練亨甫吕嘉問以鄧綰所條惠卿事交鬪其間復為惠卿所中語連荆公子雱雱時巳病坐此憂憤而卒荆公憂傷益不堪遂再求罷去熙寧庚戌冬荆公拜相百官皆賀荆公以未謝皆不見之獨與余坐西廡之小閣忽顰蹙久之取筆書窗曰霜筠雪竹鍾山寺投老歸歟寄此生放筆揖余入後再罷相歸金陵築第於白門外元豐癸丑春余謁公於第公遽邀余同逰鍾山憩法雲寺偶坐於僧房余因為公道平昔之事及誦書窗之詩公憮然曰有是乎微笑而已東坡筆録元豐七年春公有疾兩日不言少蘇與蔡元度書曰風疾暴作心雖明了口不能言語吳國夫人曰夫婦之情偶合耳不須它念強為善而已執葉濤手曰君聰眀冝博讀佛書御名勿徒勞作丗間言語安石生來多枉費力作間文字深自悔責吳國勉之曰公未宜出此言曰生死無常吾恐時至不能發言故今叙此時至則行何用君勸公疾瘳乃自悔曰雖識盡天下理而定力尚淺或者未死應尚竭力修為陳子聞之而疑曰豈現行無常現身有疾者乎不可疑也荆公語録元豐末創為户馬之說神宗俯首歎曰朕於是乎愧於文彥博矣王圭等請宣德音復曰文彥博頃年爭國馬不勝嘗曰陛下十年必思臣言圭因奏曰罷去祖馬監是王安石堅請行之者夲非陛下意也上復歎曰安石相誤豈獨此一事神宗聞安石之貧命中使甘師顔賜安石金五十兩安石好為詭激矯厲之行即以金施之定林僧舍師顔因不敢受常例回具奏之上諭御藥院牒江寧府於安石家取甘師顔常例安石約吕惠卿無令上知一帖惠卿既與安石分黨乃以其帖上之上問熙河嵗費之實於王韶安石喻韶不必盡數以對韶既畔安石亦以安石言上之朝以道論神廟配享劄子王荆公晚年於鍾山書院多寫福建子三字蓋悔恨於吕惠卿者恨為惠卿所陷悔為惠卿所誤也每山行多恍愡獨言若狂者田畫承君云荆公嘗謂其姪防曰吾昔好交遊甚多皆以國事相絶今居間復欲作書相問防欣然為設紙筆案上公屢欲下筆作書輒長歎而止意若有所愧也公既病和甫以邸吏狀視公適報司馬溫公拜相公悵然曰司馬十二作相矣公所謂日録者命防收之公病甚令防焚去防以他書代之後朝廷用蔡卞請下江寧府王防家取日録以進卞方作史乃假日録減落事實文致姦僞盡改元祐所修神宗正史蓋荆公𥘉相以師臣自居神宗待遇之禮甚厚再相帝滋不恱議論多異同故以後日録下欺哲宗匿之今見於世止七十餘卷陳瑩中所謂尊私史以壓宗廟者也至荆公薨溫公在病告中聞之簡吕申公曰介甫無他但執拗耳贈恤之典冝厚溫公之盛德如此聞見録王荆公改科舉莫年乃覺其失曰夲欲變學究為秀才不謂變秀才為學究也蓋舉子專誦王氏章句而不解義正如學究誦注疏爾談叢王荆公在金陵聞朝廷變其法夷然不以為意及聞罷役法愕然失聲曰亦罷至此乎良久曰此法終不可罷安石與先帝議之二年乃行無不曲盡後果如其言巵史王丞相嘗云自議新法始終言可行者曽布也言不可行者司馬光也餘皆前叛後附或出或入先生與僕論變法之𥘉僕曰神廟必欲變法何也先生曰蓋有說矣天下之法未有無敝者祖宗以來以忠厚仁慈治天下至於嘉祐末年天下之事似乎舒緩委靡不振當時士大夫亦自厭之多有文字論列然其實於天下根夲牢固至神廟即位冨於春秋天資絶人讀書一見便解大旨是時見兩蕃不服及朝廷州縣多舒緩不及漢唐全盛時每與大臣論議有怫然不恱之色當時執政從官中有識者以謂方今天下正如大冨家上下和睦田園開闢屋舍牢壯財用充足但屋宇少設飾器用少精巧僕妾朴魯遲鈍不敢作過但有鄰舍來相凌侮不免嵗時以物贈之其來已久非自家做得如此遂不敢承當上意改革法度獨金陵揣知上意以一身當之以激切奮怒之言以動上意遂以仁廟為不治之朝神廟一旦得之以為千載㑹遇改法之𥘉以天下公論謂之流俗內則太后外則顧命大臣等尚不能回何况臺諌侍從州縣乎祇增其勢爾雖天下之人群起而攻之而金陵不可動者蓋此八箇字吾友宜記之僕曰何等八字先生曰虛名實行強辨堅志當時天下之論以金陵不作執政為屈此虛名也平生行止無一點涴論者雖欲誣之人主信乎此實行也論議人主之前貫穿經史今古不可窮詰故曰強辨前世大臣欲任意行一事或可以生死禍福恐之得回此老實不可以此動故曰堅志因此八字此法所以必行也得君之𥘉與人主若朋友一言不合巳志必靣折之反覆詰難使人主伏弱乃巳及元豐之𥘉人主之德巳成又大臣尊仰將順之不暇天容毅然正君臣之分非與熙寧𥘉比也元城語録問荆公可謂得君乎曰後世謂之得君可也然荆公之智識亦自能知得如表云忠不足以信上故事必待於自明智不足以破姦故人與之為敵也不破姦此則未然若君臣深相知何待事事使之辨明也舉此一事便可見曰荆公勿使上知之語信乎曰須看他當時因甚事說此話且如作此事當如何更須詳審未要令上知之又如說一事未甚切當更須如何啇量體察今且勿令上知若此類不成是欺君也凡事未見始末更切子細反覆推究方可程氏遺書介甫不知事君道理觀他意思只是要樂子之無知如上表言秋水既至因知海若之無窮大明方升豈冝爝火之不息皆是意思常要巳在人主上自古主聖臣賢乃常理何至如此又觀其說魯用天子禮樂云周公有人臣所不能為之功故得用人臣所不得用之禮樂此乃大段不知事君大凡人臣身上豈有過分之事凡有所為皆是臣職所當為之事也介甫平居事親最孝觀其言如此其事親之際想亦洋洋自得以為孝有餘也臣子身上皆無過分事惟是孟子知之說曽子只言事親若曽子可矣不言有餘只言可矣唐子方作一事後無聞焉亦自以為報君足矣當時所為蓋不出誠意嘉仲曰陳瓘亦可謂難得矣先生曰陳瓘却未見其巳程氏遺書王荆公平生養得氣完為他不好做官職作宰相只喫魚羹飯得受用砥不受用緣省便去就自在嘗上殿進一劄子擬除人神宗不允對曰阿除不得又進一劄子擬除人神宗亦不允又曰阿也除不得下殿出來便乞去更留不住平生不屈也竒特上蔡語録論及荆公勝流俗之說人多謂荆公以同巳者為是異巳者為流俗切謂荆公勝流俗之說起於方特立有為之前非解於行新法之後人能用此以行其所學為𥙷不細蕭謂先生有點鐵成金之語人能用之於此何所不可但不知荆公勝之是否爾先生曰俗不善而能勝之也不亦善乎又云荆公却養氣今人都無此上蔡語録因論荆公法云靑苗免役亦是法然非藏於民之道如青苗取息雖不多然嵗散萬緍則奪民二千緍入官既入官則民間不復可得矣免役法取民間錢雇人役於官其得此錢用者蓋皆州縣市井之人不及鄉民惟知輸而不得用故今鄉民多乏於財也青苗二分之息可謂輕矣而不見利於百姓何也今民間舉債其息少者亦須五七分多者或倍而亦不覺其為害曰惟其利輕且官中易得人徒知目前之利而不顧後患是以樂請若民間舉債則利重又百端要勒得之極難故人得巳且巳又靑苗雖名取二分之息其實亦與民間無異蓋小民既有非不得巳而請者又有非不得巳用之且如請錢千或遇親舊於州縣問須有酒食之費不然亦須置小小不急之物只使二百錢巳可比民間四分之息又請納時往來之用與官中門户之賂遺至少亦不下百錢况又有胥吏追呼之煩非貨不行而公家期限又與私間不同而民之畏法者至舉債以輸官往往㳂此遂破蕩産業者固多矣此所以有害而無利也或云官中息輕民得之可以自為經營嵗豈無二分之息乎蓋未之思也若用之啇販則錢散而難集正公家期逼卒收不聚失所指凖其患豈細往年冨家知此患也官中配之請不得已請而藏之比及期出私錢為息輸之官乃無患夫使民如此是無事而侵擾之也何名𥙷助之政乎龜山語録謂與季常言王氏只是以政刑治天下道之以德齊之以禮之事全無他日季常曰細思之實如公言但道以德齊以禮之事於今如何做曰須有㑹做只為而今不用著此等人若是他依本分㑹砥必有道理龜山語録或曰正心於此安得天下便平治曰正心一事自人未常深知之若深知而體之自有其效勸後丗治天下皆未嘗識此然此亦惟聖人力做得徹蓋心有所忿懥恐懼好樂憂患一毫少差即不得其正自非聖人必須有不正處然有意乎此者隨其淺深必有見效但不如聖人之效著耳觀王氏之學蓋未造乎此其治天下專講求法度如彼修身之潔冝足以化民矣然卒不逮王文正吕晦叔司馬君實諸人者以其所為無誠意故也明道常曰有關雎麟趾之意然後可以行周官之法度蓋深達乎此龜山語録荆公在上前爭論或為上所疑則曰臣之素行亦不至無廉耻如何不足信且論事當問事之是非利害如何豈可以素有廉耻劫人使信巳也夫廉耻在常人足道若君子更自矜其廉耻亦淺矣蓋廉耻自君子所當為者如人守官曰我固不受贓不受贓豈分外事乎龜山語録鄭季常作太學博士言養士之道當先善其心今殊失此意未知所以善之之方曰由今之道雖賢者為教官必不能善人心曰使荆公當此職不知如何曰荆公為相其道蓋行乎當年今日學法荆公之法也巳不能善之矣季常良久曰如是如是龜山語録神宗賜金荆公即時送時送蔣山僧寺為常住了翁云嘗見人說以此為曠古所難其實能有多少物人所以難之蓋自其眼孔淺耳曰荆公作此事絶無義理古者人君賜之果尚懷其核懷核所以敬君賜也所賜金義當受則受當辭則辭其可名為受之而施之僧寺乎是賤君賜也金可賤君賜不可賤書曰人不易物唯德其物若於義當受而家巳足不願藏之家則班諸昆弟之貧者則合禮矣龜山語録王荆公天資孝友俸祿入門諸弟輒用之至盡不問其子雱既長專家政則不然矣諸弟亦皆有文學安禮者字和甫嘗為右丞氣豪玩丗在人主前不屈也一日宰執同對上有無人材之歎左丞蒲宗孟對曰人材半為司馬光以邪說壞之上不語正視宗孟久之宗孟懼甚無以為容上復曰蒲宗孟乃不取司馬光耶司馬光者未論別事只辭樞密一節朕自即位以來唯見此一人他人則雖迫之使去亦不肯矣宗孟又因奏書請官屬恩上曰所修書謬甚無恩宗孟又引例書局儀鸞司等當賜帛上以小故未答安禮進曰修書謬儀鸞司者恐不預上為之笑方蘇子瞻下御史獄小人勸上殺之安禮言其不可安國者字平甫尤正直有文一日荆公與吕惠卿論新法平甫吹笛于內荆公遣人諭曰請學士放鄭聲平甫即應曰願相公逺佞人惠卿深銜之後荆公罷竟為惠卿所陷放歸田里卒以窮死雱者字元澤性險惡凡荆公所為不近人情者皆雱所教吕惠卿輩奴事之荆公置條例司𥘉用程皓伯淳為屬伯淳賢士一日盛暑荆公與伯淳對語雱者囚首跣足手携婦人冠以出問荆公曰所言何事荆公曰以新法數為人沮與程君議雱箕踞以坐大言曰梟韓琦冨弼之頭于市則新法行矣荆公遽曰兒誤矣伯淳正色曰方與參政論國事子弟不可預姑退雱不樂去伯淳自此與荆公不合祖宗之制宰相之子無帶職者神宗特命雱為從官然雱巳病不能朝矣雱死荆公罷相哀悼不忘有一日鳯鳥去千年梁木摧之詩蓋以比孔子也荆公在鍾山嘗恍惚見雱荷鐵枷杻如重囚者荆公遂施所居半山園宅為寺以薦其福後荆公病瘡良苦嘗語其姪曰亟焚吾所謂日録者姪給公焚他書代之公乃死或云又有所見也聞見録王安國常非其兄所為為西京國子監教授溺於聲色介甫在相位以書戒之曰宜放鄭聲安國復書曰安國亦願兄逺佞人也官滿至京師上以介甫故召上殿時人以為必除侍講上問以其兄秉政物論如何對曰但恨聚斂太急知人不明耳上默然不恱由是别無恩命久之乃得館職安國嘗力諌其兄以天下恟恟不樂新法皆歸咎於公恐為家禍介甫不聽安國哭於影堂曰吾家滅門矣又嘗責曽布以誤惑丞相更變法令布曰足下人之子弟朝延變法何預足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相由汝之故殺身破家僇及先人發掘丘壟豈得不預我事邪記聞平甫教授西京國子監代還召對上曰卿學問通古今以漢文何主也對曰三代以後賢主未有如文帝者上曰但惜其才不能立法更制爾對曰文帝自代來夜入未央宫於擾攘時定變故於俄頃之際諸將故武夫皆脅息待命恐無才者不及是然能用賈誼言待群臣有節專務以德化民海內興於禮義幾致刑措使一時風俗耻言人過則文帝加有才一等矣上曰王猛佐符堅以蕞爾國而令必行今朕以天下之大而不能使人何也對曰王猛睚眦之忿必報專教符堅以峻刑法殺人為事此必小臣刻薄有以誤陛下者願專以堯舜三代為法理順而勢利則下豈有不從者乎上深然之王安國著序言五十篇上𥘉即位韓絳邵亢為樞密副使同以序言進上御批稱美令召試學士院將不次進用而大臣有不喜之者止得兩使職官從辟為西京國子監教授後中丞吕誨彈奏王荆公猶引以為推恩太重平甫博學工文章通古今逹治道徑直寡合不阿時之好惡雖與荆公論議亦不苟合故異時執政得以中傷而言事者謂非毁其兄遂因事逐之天下人皆以為冤𥘉荆公為參知政事時因閲晏元獻公小詞而笑曰為宰相而作艷詞可乎平父曰亦偶然爾吕惠卿為館職在坐遽曰為政必放鄭聲况自為之乎平父正色曰放鄭聲不若逺佞人也吕大以為譏已自是遂與平父相失云東軒筆録桉鄭聲事三書所載不同未知孰是鄭俠介夫者福州福清人荆公居憂金陵時嘗從學後舉進士調光州司法秩滿至京師㑹荆公秉政俠見之公喻使試刑法俠辭不習公問以所聞俠因為具言青苗免役用兵之害公不答俠退又數以書論之亦不報久之得監在京安上門荆公又使人喻將以為經義局檢討俠又辭之公使人謂之曰凡仕宦須改得一京官然後可以别圗差遣何得介僻如此俠對曰俠罷官而來夲求執經丞相門下耳𥘉不知官有美惡髙下也不意丞相一旦當路發言無非以官爵為先殊非俠所望也且丞相果欲援俠而進之俠之所言行其一二使俠進而無愧不亦善乎時𥘉行免役及收市利錢法京師細民負水拾髮擔粥提茶之類皆有免行錢不輸者毋得販鬻市道門司稅院並行倉法專欄月賦食錢每正稅百錢則收市利十錢以給之逮法之行則正稅不及十錢者有司亦取之其末反重於夲俠又言於荆公得損其尤甚者數事㑹大旱自十一月不雨至于三月河東河北陜西流民大入京師與城外飢民市麻籸麥麩為糜或掘草根采木實以食或身被鎖械而負瓦揭木賣妻鬻子以償官俠畫圗為書勾馬遞以聞曰如行臣之言十日不雨即乞斬臣以正欺罔之罪又自劾擅發馬遞待罪時熙寧年三月二十六日也神宗皇帝覽疏歎息終夕不寐翌日遂詔韓維孫永體量免行錢詔曽布體量市易法又詔司農寺發常平倉放商稅務及諸門稅錢三十文以下市利錢二十文以下青苗免役權罷追索方田保甲並罷凡此類十八事民間歡呼相慶四月一日遂下詔責躬求言越三日大雨十一日早朝賀雨神宗出圗狀示宰執且責之丞相以下皆謝罪是日有旨放俠擅發馬遞之罪荆公遂力求去於是其徒爭言俠罪詔送開封取勘時士庶欲應詔言事者甚衆聞此皆沮縮而姦人託名為書日詣匭獻之乞留荆公守新法而治俠罪㑹熙河小捷群小因得入其言吕惠卿鄧綰之徒至環泣上前巳而荆公卒去位薦惠卿以代巳命下之日京師大風雨土翳席逾寸俠又上書言安石夲為惠卿所誤至此今復相板援以遂前非不復為宗社計昔唐天寶之亂國忠巳誅貴妃未戮人以為賊夲尚在今日之事何以異此又上疏諌用兵語甚切屬熙河奏捷殺戮甚衆上為惻然手詔諭王韶等今後只務招降木征餘黨毋以多殺為功於是惠卿等益惡之亟取開封所勘擅發馬遞事下刑部定合罰銅十斤取旨勒停俠又上書言大臣奏以三路流民皆為南北下各有田名燕子田若北旱則南南荒又北此皆誣罔上聽臣乞勘㑹三路之民自去冬流移至今不巳何人是南方有田者它語譏大臣甚衆并詆臺諌皆如芻靈木偶又言禁中𬒳甲登殿等事奏入執政大怒言於上以為謗訕朝政追毁出身以來文字送汀州編管既行上問惠卿鄭俠小臣禁中密事及大臣奏對之言何自聞之惠卿對曰此皆馮京手録使王安國持示導之使言耳惠卿與京同列議多矛盾又以諂事荆公為安國所疾屢諷其兄不寤故併中之巳而上以惠卿語責京京惶駭對曰臣與鄭俠素不相識上方疑之御史知雜張琥遂以俠事劾京京奏俠行未逺乞追還對辨遂詔付臺推勘遣奉禮郎舒亶追俠及諸太康搜其衣橐得王克臣所贐銀三十兩御史臺知班楊忠信所贈韓范司馬諸公所言新法不便奏藁兩帙遂逮赴詔獄俠對實不識京但每遣門人吳無至詣檢院投匭判院丁諷輒為無至道京稱歎之語及罷局時遇安國於途安國馬上舉鞭相楫曰賢可謂獨立不懼因隨至所居求觀前後奏草俠答以未嘗存留安國言亦見所與家兄書家兄雖安國之言亦不聽而况公乎俠曰不意丞相一旦為小人所誤以至於此安國曰是何為小人所誤家兄自以為人臣子不當避四海九州之怨使四海九州之怨盡歸於巳方是臣子盡忠國家俠曰未聞堯舜在上夔契在下而有四海九州之怨安國以為然忠信者嘗應四月一日詔書言新法不便因謂俠曰御史職在諌爭皆緘默不言公一監門爾乃上書不巳是言責在監門而臺中無人也探懷中書授俠曰以此為正人助京未嘗使安國傳導省中語凡所論乃鄰居內殿崇班楊永芳所告也安國赴對不承俠責之曰凡對制使不當有隱口所言者安得諱之天地鬼神皆在左右學士欲誰欺耶安國乃伏獄成俠改送英州編管忠信無至皆真决編管湖外京罷政諷落職安國追毀告身放歸田里俠徒步赴貶居十年樞密直學士陳襄在經筵日嘗論薦當世之士自司馬公而下三十三人最後言鄭俠小臣愚直敢言如此是亦發於忠義非陛下矜憐其志而使得生還誰復為俠言者尋以哲宗登極恩霈放還用蘇軾孫覺虞大寧等薦除泉州州學教授秩滿諸生借留州奏得再任元符元年再貶英州徽宗登極放還復為泉學教授崇寧𥘉又勒停尋復將仕郎宣和𥘉卒俠性清儉布衣糲食終其身平居進止必以禮法閨門怡然不肅而治喜賔客樂教訓嗇用廣施鄉里敬之中表有應舉不以實年者俠戒之曰方謀入仕巳有欺君之心不可暇日聞子姪誦詩考槃之義曰弗諼者弗忘君之惡弗過者弗過君之朝弗告者弗告君以善碩人之於君有卷卷之不忍也故永矢以絶之公嘆曰是何言與古之人在畎畒不忘其君况於賢者一不見用而忿戾若是哉蓋弗諼者弗忘君也弗過者弗以君為過也弗告者弗以告他人也其存心如此故雖流落頓挫之餘一話一言未嘗不在君父覩政役繁興民物嗷嗷但顰顣而巳鄭介夫言行録錢景諶者忠懿王孫師事康節先生舊與王荆公善後荆公用事論新法不合遂相絶終身為外官其家集有答兖守趙度支書自序甚詳云始僕為進士時彼為太常博士主别頭試取僕於數百人之中是後日逰其門執師弟子之禮授經論文非二帝三王之道孔子孟子之言不言及僕丁家難聞其參大政天下之人無不歡喜鼓舞謂其必能復三代之風一致太平是時僕自許昌以私事來京師因見之於私第方盛夏與僧智緣者並卧於地又與其日最親者一人袒露而坐於傍顧僕脫帽禠服𥘉不及其他卒然見問曰青苗助役如何僕對以利少而害多後日必為平民之患又問曰孰為可用之人則對以居喪不交人事而知人之難尤非淺淺事彼不樂僕私自謂大賢為政於天下必有竒謀逺業出人意表亦不敢必其乖亂及歸許見其變祖宗法度專以聚斂苛刻為政務為新竒謂之新法而天下好進之人紛紛然以利進矣殊非前日之所講而聞者又二三年僕以調官來京師當其作相又往見之彼喜僕之來令先見其弟平甫平甫固故人知我者亦喜曰相君欲以館閣處君而任以事僕戲與平甫相誚以謂百事皆可所不知者新書役法耳平甫雖以僕為太方然擊節賞歎以為知言及見彼首言欲僕治峽路役書又以戎瀘蠻事見委僕以不知峽路民情而戎瀘用兵繫朝廷舉動一路生靈休戚願擇知兵愛人者彼大怒時坐客數十人無不為僕寒心者後僕官繁鄧彼益任政用事而一代成法無一二存者百姓愁苦而郡縣吏惴惴憂懼虞以罪去且不但變其法制而已乃以穿鑿不經入於虛無牽合臆說作為字解者謂之時學而春秋一王之法獨廢而不用又以荒唐誕怪非昔是今無所統紀者謂之時文傾險趨利殘民而無耻者謂之時官驅天下之人務時學以時文邀時官僕既預仕籍而所學者聖賢事業專以春秋為之主皆大中至正三綱五常之道其所為文學六經而為必夲於道德性命而一歸於仁義其施於官者則又忠厚愛人兼善天下之道自顧不合於時而學之又不能方惶惶然無所容其迹而故人張諌議正國辟僕為髙陽帥幕到官已逾一年矣今春邵堯夫先生亦有書招我為洛中之游兼有詩云年光空去也人事轉蕭然止俟貧老之兄生事粗足幼而孤者有分有歸亦西歸洛中守先人墳墓徜徉于有洛之表吾願畢矣聞見録六之六參政程文簡公公名琳字天球中山博野人舉服勤詞學科補泰寧軍節度推官召試直集賢院擢知制誥權三司使御史中丞以樞密直學士知益州還知開封府復為三司使遷戶部侍郎參知政事降光祿卿知潁州復侍郎知青州北京建為留守以武昌節度使知永興軍加宣徽北院使判延州拜同中書門下平章事判大名府更授鎮安軍節赴鎮薨年六十九公嘗館契丹使使者言中國使至契丹坐殿上位次髙而契丹使來坐次下當升語甚切上與大臣皆以為小故不足爭將許之公以謂許其小必啓其大力爭以為不可遂止歐陽公撰墓志公知益州蜀人輕而喜亂公常先制於無事至其臨時如不用意又略其細治其大且甚者不過一二而蜀人安之自寮吏皆不能窺其所為正月俗放燈公先戒吏為火備有失火者使隨救之勿白以動衆既而大宴五門城中火吏救止卒宴民皆不知蓋其他設施多類此軍士見監軍告其軍有變監軍入白公笑遣之惶恐不敢去公曰軍中動靜吾自知之苟有謀者不待告也可使告者來監軍去而告者卒不敢來公亦不問遂止蜀之妖人有自號李氷神子者署官屬吏卒聚徒百餘人公命捕置之法而讒之朝者言公妄殺人蜀人恐且亂矣上遣中貴人馳視之使者入其境居人行旅爭道公善且曰殺一人可使蜀數十年無事使者問其故對曰前亂蜀者非有知謀豪傑之才乃里閭無賴小人惟不制其始遂至於亂耳使者還奏其語於是上益以公為能墓志公知開封府㑹禁中大火延兩宫宦者治獄得縫人火斗巳誣伏而下府命公具獄公立辨其非禁中不得入乃命工圖火所經而後宫人多而居隘其烓竈近版壁歲久燥而焚曰此豈一日火哉乃建言此殆天災也不冝以罪人上為緩其獄卒無死者公在府决事神速一歲中獄常空者四五墓志司天言日食明年正旦請移閏月以避之公以謂天有所譴非移閏可免惟修德政而巳乃止墓志范仲淹以言事忤大臣貶饒州巳而上悔悟欲復用之稍徙知潤州而惡仲淹者復誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹皆指為黨人公獨為上開說明其誣枉上意解而後巳墓志公為三司使不恱苟利不貪近功時議者患民稅多目吏得為姦欲除其名而合為一公以謂合而沒其名一時之便後有興利之臣必復增之是重困民也議者莫能奪其於出入尤謹禁中時有所取未嘗肯豫宦官怒言陛下雖有欲物在程琳何可得公曰臣所以為陛下惜爾天子以為然神道碑又東齊記事云夏秋㳂納之物如鹽麴錢之類名件頗碎慶曆中有司建議併合歸一名程文簡獨以謂沒其舊名異日不知或再敷鹽麴則致重復此亦善慮事也仁宗朝有議東南漕粟兵夫舟船與盜失之費蓋十常三四欲募啇賈令入中以實都下時程文簡公為三司使以為萬一所入不足必邀以增直是商賈得操其柄其議遂寢麈史公在延州夏人數百驅畜産至界上請降言契丹兵至衙頭矣國且亂願自歸公曰契丹兵至元昊帳下當舉國取之豈容有來降者吾聞夏人方捕叛族此其是乎不然誘我也拒而不受巳而夏人果以兵數萬臨界上公戒諸堡寨無得出兵夏人以為有備引去自此不復窺邊神道碑公參預大政王隨陳堯佐為宰相公性剛厲與二人不叶遂俱罷政及李淑作堯佐墓志言尫愎弗咸用是罷去其意謂堯佐王隨尫弱不任事公剛愎不和故陳氏子弟頗銜之名臣傳公罷政貶官起守北京與宦者皇甫繼明爭治行宫事章交上上遣一御史視其曲直御史直公遂罷繼明是時繼明方信用其勢傾動中外自朝廷大臣莫不屈意下之公被中傷方起未復而獨與之爭雖小故不少假也故議者不以公所直為難而以能不為繼明屈為難云墓志趙元昊死子亮祚立方幼三大將共治其國言事者謂可除其諸將皆以為節度使使各有其所部以分弱其勢可遂無西患事下公公以謂幸人之喪非所以示大信撫夷狄且亮祚雖幼然君臣和三將無異志雖欲有為必無功而反生事不如因而撫之上以為然墓志章獻垂箔有方仲弓者上書乞依武氏故事立劉氏廟章獻覽其疏曰吾不作此負祖宗事裂而擲之於地仁宗在側曰此亦出於忠孝冝有以旌之乃以為開封府司録及章獻崩黜為汀州司馬程琳亦嘗有此請而人莫之知也仁宗一日在邇英謂講官曰程琳心行不中在章獻朝嘗請立劉氏廟且獻七廟圖時王洙侍讀聞之然仁宗性寬厚琳竟至宰相蓋無宿怒也龍川志五朝名臣言行録卷第六
