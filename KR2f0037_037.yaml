body:
  text: 六之二丞相荆國王文公公名安石字介甫撫州臨川人慶暦二年登進士甲科簽書淮南節度判官廳公事代還例當獻文求試公獨無所獻特召試亦固辭知明州鄞縣通判舒州召爲羣牧判官出知常州提點江南東路刑獄入爲三司度支判官除直集賢院累辭不獲命始就職嘉祐五年四月除同修起居注固辭不拜十一月申前命章又五上不許遂除知制誥糾察在京刑獄同知嘉祐八年貢舉丁母憂服除英宗朝累召不起神宗即位就除知江寜府召爲翰林學士未幾除諌議大夫叅知政事熈寜三年拜禮部侍郎同平章事七年以旱求避位拜觀文殿大學士知江寜府明年再入爲首相以三經義成拜左僕射九年以使相判江寜公懇辭遂復以大觀文領集禧觀使元豐三年改特進封荆國公哲宗即位拜司空明年薨年六十六紹聖𥘉賜謚配享神宗廟庭崇寜三年詔配祀文宣王廟政和三年追封舒王靖康初用諌議大夫楊時言停文宣王廟配享列于從祀建炎中用貟外郎趙鼎言罷配享神宗廟庭王安石舉進士有名於時慶暦二年第五人登科𥘉署楊州判官後知鄞縣好讀書能強記雖後進投贄及程試有美者一讀過輙成誦在口終身不忘其屬文動筆如飛𥘉若不措意文成見者皆服其精妙友愛諸弟俸禄入家數日輙盡爲諸弟所費用家道屢空一不問議論髙竒能以辨博濟其說人莫能屈始爲小官不急急於仕進皇祐中文潞公爲宰相薦安石及張瓌曽公定韓維四人恬退乞朝廷不次進用以激僥競之風有旨皆籍記其名至和中召試館職固辭不就乃除羣牧判官又辭不許乃就職懇求外𥙷得知常州由是名重天下士大夫恨不識其面朝廷常欲授以美官惟患其不肯就也自常州徙提點江南西路刑獄嘉祐中召除館職三司度支判官固辭不許未幾命修起居注辭以新入館館中先進甚多不當超處其右章十餘上有旨令閤門吏賫敕就三司授之安石不受吏隨而拜之安石避之於厠吏置敕於案而去安石使人追而與之朝廷卒不能奪歲餘復申前命安石辭七八章乃受除知制誥自此不復辭官矣温公瑣語司馬温公甞曰昔與王介甫同爲羣牧司判官包孝肅公爲使時號清嚴一日群牧司牡丹盛開包公置酒賞之公舉酒相勸光素不喜酒亦強飲介甫終席不飲包公不能強也光以此知其不屈聞見録嘉祐末王介甫以知制誥糾察在京刑獄有少年得闘鶉其同儕觀之因就乞之鶉主不許借者恃與之狎眤遂持去鶉主追及之踢其脅立死開封府捕按其人罪當償死及糾察司録問介甫駁之曰按律公取竊取皆爲盗此不與而彼強携以去乃盗也此追而毆之乃捕盗也雖死當勿論府司失入平人爲死罪府官不伏事下審刑大理詳定以府斷爲是有旨王安石放罪舊制放罪者詣殿門謝介甫自言我無罪不謝御史臺及閤門累移牒趣之終不肯謝臺司因劾奏之執政以其名重不問介甫亦竟不謝瑣言仁宗朝王安石爲知制誥一日賞花釣魚宴内侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也常不樂之後安石自著日録厭薄祖宗仁宗尤甚毎謂漢文帝不足取其心薄仁宗也故一時大臣冨弼韓琦文彦愽皆爲其毀詆云聞見録初韓魏公知楊州介甫以新進士簽書判官事魏公雖重其文學而不以吏事許之介甫數引古義爭公事其言迂闊魏公多不從介甫秩滿去㑹有上韓公書者多用古字韓公笑而謂僚屬曰惜王廷評不在此其人頗識難字介甫聞以韓公爲輕巳由是怨之及介甫知制誥言事復多爲韓公所沮㑹遭母䘮服除時韓公猶當國介甫遂留金陵不朝參曽魯公知介甫怨忌韓公乃力薦介甫於上強起之其意欲以排韓公耳記聞又聞見録云韓魏公知楊州王荆公爲簽判毎讀書達旦略假寐日巳髙亟上府多不及盥漱魏公見荆公年少意其夜飲放逸一日從容謂荆公曰君少年母廢書不可自棄荆公不荅退而言曰韓公非知我者魏公後知荆公之賢欲収之門下荆公終不屈如召館職不就之類是也故荆公熈寜日録中短魏公爲多毎曰韓公但形相好耳作畫虎圗詩詆之至荆公作相行新法魏公言其不便神宗感悟欲罷其法荆公怒甚取魏公之章送條例司䟽駁頒天下又誣吕申公有言藩鎭大臣將興晉陽之師除君側之惡自草申公謫詞明著其事因以揺魏公頼神宗之明眷禮魏公終始不替及魏公薨荆公有挽詩云幕府少年今白髪傷心無路送靈輀猶不忘魏公少年之語也又曰熈寜二年韓魏公自永興移判北京過闕上殿王荆公方用事神宗問曰卿與王安石議論不同何也魏公曰仁宗立先帝爲皇嗣時王安石有異議與臣不同故也帝以魏公之語問荆公公曰方仁宗欲立先帝爲皇子時春秋未髙萬一有子措先帝於何地臣之論所以與韓琦異也荆公強辯類如此當魏公請冊英宗爲皇嗣時仁宗曰少俟後宫有就閤者公曰後宫生子所立嗣退居舊邸可也蓋魏公固有以處之矣又東軒筆録云嘉祐末魏公爲相荆公知制誥因論蕭注降官詞頭遂上䟽爭舎人院職分其言頗侵執政又爲糾察刑獄駮開封府斷爭鵪鶉公事而魏公以開封府爲直自是文字還往甚多及荆公秉政又與常平議不合然而荆公毎評近代宰相即曰韓公徳量才智心期髙逺諸諸公皆莫及也王安石居金陵𥘉除母䘮英宗屢召不至安石在仁宗時論立英宗爲皇子與韓公不合故不敢入朝安石雖髙科有文學夲逺人未爲中朝士大夫所服乃深交韓吕二家兄弟韓吕朝廷之巨室也天下之士不出於韓即出於吕韓氏兄弟絳字子華與安石同年髙科維字持國學術尤髙不出仕用大臣薦入館吕氏公著字晦叔最賢亦與安石爲同年進士子華持國晦叔爭揚於朝安石之名始盛安石又結一時名徳之士如司馬君實軰皆相善先是治平間神宗爲潁王持國翊善毎講論經義神宗稱善持國曰非維之說維之友王安石之說至神宗即位乃召安石以至大用治平四年以介甫知江寜府時介甫方乞分司衆謂介甫必不肯起旣而詔到即詣府視事温公日録荆公召爲翰林學士𥘉入對神宗問方今治當何先公對曰擇術爲先上問唐太宗如何公曰陛下當以堯舜爲法太宗所知不逺所爲不盡合先王不足道也堯舜之道至簡而不䌓至要而不迂至易而不難但末世學者不能通知故常以爲髙而不可及耳上曰卿可謂責難於君矣朕自視眇然恐無以副卿意可悉意輔朕庶同濟此道一日侍上語及諸葛亮魏鄭公公對曰陛下誠能爲堯舜則必有咎夔稷禼陛下誠能爲髙宗則必有傅說魏鄭公諸葛亮皆有道者所羞何足道哉但恐陛下擇術未明推誠未至則雖有咎夔稷禼傅說之賢亦爲小人所蔽因卷懷而去耳上曰自古治世豈能使朝廷無小人雖堯舜之時不能無四凶公曰唯能辨四凶而誅之此乃所以爲堯舜也若使四凶得肆其䜛慝則咎夔稷禼亦安肯苟食其禄以終身乎未幾遂叅大政荆公旣爲叅知政事上謂之曰人皆不能知卿以爲卿但知經術不暁世務公對曰經術正所以經世務但後世所謂者大抵皆庸人故世俗皆以爲經術不可施於世務耳上問然則卿所施設以何爲先公曰變風俗立法度最方今所急也於是青苗市易坊埸保甲保馬導洛免役之政相繼並興設制置三司條例司與知樞宻院陳升之同領之中丞吕公誨論公十事公力求去位上爲出吕公而韓魏公亦上䟽論青苗法乞罷諸路提舉官奏至公稱疾求分司上不許公入謝因爲上言陛下欲以先王正道變天下流俗故與天下流俗相爲輕重流俗權重則天下之人歸流俗陛下權重則天下之人歸陛下權者與物相爲輕重雖千鈞之物所加損不過銖兩而移今姦人欲敗先王之正道以沮陛下之所爲是於陛下與流俗之權適争輕重之時加銖兩之力則用力至㣲而天下之權已歸流俗矣此所以紛紛也上以爲然公乃視事王荆公在臺閣侍從時毎爲人言唐太宗令諌官隨宰相入閤最切於政道後世所當行也及入司政事而孫莘老李公擇在諌職二人者熟荆公此論遂列奏請舉行之荆公不可曰是又益兩叅知政事也吕氏家塾記王荆公知制誥吴夫人爲買一妾荆公見之曰何物女子曰夫人令執事左右曰汝誰氏曰妾之夫爲軍大將部米運失舟家資盡沒猶不足又賣妾以償公愀然曰夫人用錢幾何得汝曰九十萬公呼其夫令爲夫婦如初盡以錢賜之司馬温公從龐潁公辟爲太原府通判尚未有子夫人爲買一妾公殊不顧夫人疑有所忌也一日教其妾俟我出汝自飾至書院中冀公一顧也妾如其言公訝曰夫人出汝安得至此亟遣之潁公知之對僚屬咨其賢荆公温公不好聲色不愛官職不殖貨利皆同二公除修注皆辭至六七不獲巳方受温公除知制誥以不善作辭令屢辭免改待制荆公官浸顯俸禄入門任諸弟取去盡不問温公通判太原時月給酒饋待賔客外輙不請晚居洛買園宅猶以兄郎中爲户故二公平生相善至議新法不合始著書絶交矣聞見録王荆公知明州鄞縣讀書爲文章二日一治縣事起堤堰决陂塘爲水陸之利貸糓于民立息以償俾新陳相易興學校嚴保伍邑人便之故熈寜初爲執政所行之法皆本於此然荆公知行於一邑則可不知行於天下不可也又所遣新法使者多刻薄小人急於功利遂至决河爲田壞人墳墓室廬膏腴之地不可勝紀青苗雖取二分之利民請納之費至十之七八又公吏冐民新舊相因其弊益䌓保甲保馬尤有害天下騷然不得休息蓋祖宗之法臺變矣獨役法新舊差募二議俱有弊呉蜀之民以雇役爲便秦晉之民以差役爲便荆公與司馬温公皆早貴少歴州縣不能周知四方風俗故荆公主雇役温公主差役蘇内翰范忠宣温公門下士復以差役爲未便章子厚荆公門下士復以雇役爲未盡三人雖賢否不同皆聦眀暁吏治兼知南北風俗其所論甚公各不私於所主元祐𥘉温公復差役改雇役子厚議曰保甲保馬一日不罷有一日害如役法則熈寜𥘉以雇役代差役議之不詳行之太速故後有弊今復以差役代雇役當詳議熟講庻幾可行而限止五日太速後必有弊温公不以爲然子厚對太皇太后簾下與温公爭辯至言異日難以奉陪喫劒太后怒其不遜子厚罪去蔡京者知開封府用五日限盡改畿縣雇役之法爲差役至政事堂白温公公喜曰使人人如待制何患法之不行紹聖𥘉子厚入相復議以雇役改差役置司講論乆不决蔡京兼提舉白子厚曰取熈寜元豐法施行之耳尚何講爲子厚信之雇役遂定蔡京前後觀望反復賢如温公暴如子厚皆足以欺之眞小人也聞見録熈寜四年王荆公當國欲以朱柬之監左藏庫柬之辭曰左帑有火禁而年髙宿直非便願易勾當進奏院荆公許諾翊日進擬某人監左藏庫上曰何不用朱東之監左藏庫可也荆公震駭莫測其由上之機神臨下多知外事雖纎㣲莫可隱也東軒筆録吐蕃在唐最盛至本朝始衰今河湟邈川青唐洮岷以至階利文政綿州威茂黎雅州夷人皆其遺種也獨唃厮囉一族㝡盛雖西夏亦畏之朝廷封西平王用爲藩翰陜西州縣特置驛謂之唃家位歲貢奉不絶未開熈河前關中士人多言其利害雖張橫渠先生之賢少時亦欲結客以取范文正公帥延安招置府第俾修制科至登進士第其志乃巳仁宗皇帝朝韓琦冨弼二公爲宰相凡言開邊者皆不納熈寕𥘉王荆公執政始有開邊之議王韶者罷新安縣主簿逰邊得其說遂上開河湟之䇿荆公以爲竒謀乃有熈河之役獨岷州白石大潭秦州属縣有賦稅其餘無㪷粟尺布唯仰陜西州郡朝廷帑藏供給故自開熈河以來陜西民日困朝廷財用益耗𥘉唃厮囉分處諸子於熈河洮岷之地唃厮囉死諸子皆衰弱故韶能取之唃厮囉諸子唯董氊者在湟鄯最盛韶之勢止能取河州韶暫入朝鬼章已舉兵攻河州遂有踏白之敗景思立死之紹聖𥘉章惇作相曽布作樞宻董氊巳爲強臣阿里骨所簒國人畏之阿里骨死其子瞎征立國人思故主不輔瞎征瞎征懦弱欲爲僧國人又欲殺之瞎征遂乞納上歸朝廷時童貫𥘉領邊事乃受之送于朝封官爵遣居熈州建中靖國𥘉韓忠彦爲相安燾爲樞宻遂棄􅙉鄯求唃氏苗裔立之韓忠彦罷蔡京作相復􅙉鄯責安燾與熈河帥姚師雄及凢議棄者邊事復興矣靖康𥘉言者乞求青唐種族以􅙉鄯之地賜之朝廷下熈河帥議以聞無敢任其責者乃巳至金人䧟陜之六路兵入熈河即求􅙉鄯舊族盡以其地與之聞見録上以外事問介甫介甫曰陛下從誰得之上曰卿何必問所從來介甫曰陛下與他人爲宻而獨隠於臣豈君臣推心之道乎上曰得之李評介甫由是惡評竟擠而逐之他日介甫復以宻事質於上上問於誰得之介甫不肯對上曰朕無隠於卿卿獨有隠於朕乎介甫不得已曰朱明之爲臣言之上由是惡明之眀之介甫妹夫也及介甫出鎮金陵吉甫欲引親䁥置之左右薦明之爲侍講上不許曰安石更有妹夫爲誰吉甫以直講沈道原對上即以道原爲侍講吉甫又引弟升卿爲侍講升卿素無學術每進講多捨經而談財糓利害營繕等事上時問以經事升卿不能對輙目道原從旁代對記聞熈寧六年十一月吏有不附新法介甫欲深罪之上不可介甫固爭之曰不然法不行上曰聞民間亦頗苦新法介甫曰祈寒暑雨民猶有怨咨者豈足顧也上曰豈若并祈寒暑雨之咨亦無邪介甫不恱退而属疾家居數日上遣使尉勞之乃出其黨爲之謀曰今不取門下士上所素不喜者暴進用之則權輕將有人窺間隙者矣介甫從之旣出即奏擢章惇趙子幾等上喜其出勉強從之由是權益重記聞介甫請并京師行陜西所鑄折二錢旣而宗室及諸軍不樂有怨言上聞之以問介甫欲罷之介甫怒曰朝廷每舉一事定爲浮言所移如此何事可爲退遂移疾卧不出上使人諭之曰朕無間於卿天日可鑒何遽如此乃起記聞王荆公秉政更新天下之務而宿德舊人論議不叶荆公遂選用新進待以不次故一時政事不日皆舉而兩禁臺閣内外要權莫非新進之士也洎三司論市易而吕叅政指爲沮法荆公信以爲然堅乞罷相旣出吕嘉問張諤持荆公而泣公慰之曰已薦吕惠卿矣二子収淚及惠卿入叅有射羿之意而一時之士見其得君謂可以傾奪荆公矣遂更朋附之旣而鄧潤甫枉狀廢王安國而李逢之獄又扶李士寧之事以撼荆公又言熈寧編勑不便乞重編修及令百姓手實供家財簿又欲給田募役以破役法其他寅縁事故非議前宰者甚衆綱紀幾紊天子断意再召荆公秉政鄧綰懼不自安欲弭前迹遂發張若濟事返攻吕惠卿朝廷俾張諤爲兩浙路察訪以驗其事諤猶欲掩覆而鄧綰復觀望意指薦引匪人於是惠卿自知不安乃條列荆公兄弟之失凡數事靣奏意欲上意有貳上封惠卿所言以示荆公故荆公表有忠不足以取信故事事欲其自明義不足以勝姧故人人與之立敵蓋謂是也旣而惠卿出亳州鄧綰張諤之徒皆以罪去然自是門下之人皆無固志荆公無與共圗事者又復請去而再鎮金陵故詩有紛紛易變浮雲白落落難鍾老栢青者蓋謂是也東軒筆録又云熈寧七年王荆公𥘉罷相薦吕惠卿爲叅政吕得君怙權慮荆公復進因郊禮薦荆公爲使相方進熟上察見其情遽問日王安石去不以罪何故用赦復官吕無以對又曰李士寧者蜀人得導氣養生之術又能言人休咎王荆公與之有舊每延於東府迹甚熟及吕惠卿執政㑹山東告李逢劉育之變事連宗子丗居起獄推治劾者言士寕甞預此謀敕天下捕之獄具丗居賜死逢育棄市士寜决杖流永州連坐者甚衆吕爲此獄引士寜者意欲有所誣衊㑹荆公再入謀遂不行王荆公再秉政旣逐吕惠卿門下之人復爲䛕媚以自安而荆公求退告去尤切有練亨甫者謂中丞鄧綰曰公何不言於上以丞相之子雱爲樞宻使諸弟皆爲兩制婿姪皆館職京師賜第宅田邸則庶幾可留也綰如所戒言之上察知其阿黨亦頷之而已一日荆公復於上前求去上曰卿勉爲朕留當一一如卿所欲但未有一穏便第宅耳荆公駭曰臣有何欲且何爲而賜第上笑而不荅翊日荆公懇請其由上出綰所上章荆公即乞推劾先是綰欲用其黨方揚臺官懼不厭人望乃并彭汝礪薦之其實意在揚也無何上黜汝礪綰遽表言臣素不知汝礪之爲人昨所舉鹵莾乞不行前狀即此二事上察見其姦遂落綰中丞以本官知􅉑州亨甫奪校書爲漳州推官綰制曰操心頗僻賦性姦回論士薦人不循分守又曰朕之待汝者義形於色汝之事朕者志在於邪蓋謂是也東軒筆録初吕惠卿爲荆公所知驟引至執政荆公去惠卿遂背之洎荆公再相於是起華亭詔獄而使徐僖王古蹇周輔三輩按之惠卿情不得練亨甫吕嘉問以鄧綰所條惠卿事交闘其間復爲惠卿所中語連荆公子雱雱時巳病坐此憂憤而卒荆公憂傷益不堪遂再求罷去熈寧庚戌冬荆公拜相百官皆賀荆公以未謝皆不見之獨與余坐西廡之小閤忽顰蹙乆之取筆書䆫曰霜筠雪竹鍾山寺投老歸歟寄此生放筆揖余入後再罷相歸金陵築第於白門外元豐癸丑春余謁公於第公遽邀余同逰鍾山憇法雲寺偶坐於僧房余因爲公道平昔之事及誦書䆫之詩公憮然曰有是乎㣲笑而已東坡筆録元豐七年春公有疾兩日不言少蘇與蔡元度書曰風疾暴作心雖明了口不能言語吴國夫人曰夫婦之情偶合耳不湏它念強爲善而已執葉濤手曰君聦眀冝愽讀佛書御名勿徒勞作丗間言語安石生來多枉費力作閑文字深自悔責呉國勉之曰公未宜出此言曰生死無常吾恐時至不能發言故今叙此時至則行何用君勸公疾瘳乃自悔曰雖識盡天下理而定力尚淺或者未死應尚竭力修爲陳子聞之而疑曰豈現行無常現身有疾者乎不可疑也荆公語録元豐末創爲户馬之說神宗俯首歎曰朕於是乎愧於文彦愽矣王珪等請宣德音復曰文彦愽頃年争國馬不勝甞曰陛下十年必思臣言珪因奏曰罷去祖馬監是王安石堅請行之者夲非陛下意也上復歎曰安石相誤豈獨此一事神宗聞安石之貧命中使甘師顔賜安石金五十兩安石好爲詭激矯厲之行即以金施之定林僧舎師顔因不敢受常例回具奏之上諭御藥院牒江寧府於安石家取甘師顔常例安石約吕惠卿無令上知一帖惠卿旣與安石分黨乃以其帖上之上問熈河嵗費之實於王韶安石喻韶不必盡數以對韶旣畔安石亦以安石言上之晁以道論神廟配享劄子王荆公晚年於鍾山書院多寫福建子三字蓋悔恨於吕惠卿者恨爲惠卿所䧟悔爲惠卿所誤也毎山行多恍愡獨言若狂者田畫承君云荆公甞謂其姪防曰吾昔好交㳺甚多皆以國事相絶今居閑復欲作書相問防忻然爲設紙筆案上公屢欲下筆作書輙長歎而止意若有所愧也公旣病和甫以邸吏狀視公適報司馬温公拜相公悵然曰司馬十二作相矣公所謂日録者命防収之公病甚令防焚去防以他書代之後朝廷用蔡卞請下江寧府王防家取日録以進卞方作史乃假日録減落事實文致姦僞盡改元祐所修神宗正史蓋荆公𥘉相以師臣自居神宗待遇之禮甚厚再相帝滋不恱議論多異同故以後日録下欺哲宗匿之今見於世止七十餘卷陳瑩中所謂尊私史以壓宗廟者也至荆公薨温公在病告中聞之簡吕申公曰介甫無他但執拗耳贈䘏之典冝厚温公之盛德如此聞見録王荆公改科舉莫年乃覺其失曰夲欲變學究爲秀才不謂變秀才爲學究也蓋舉子專誦王氏章句而不解義正如學究誦注䟽爾談叢王荆公在金陵聞朝廷變其法夷然不以爲意及聞罷役法愕然失聲曰亦罷至此乎良乆曰此法終不可罷安石與先帝議之二年乃行無不曲盡後果如其言巵史王丞相甞云自議新法始終言可行者曽布也言不可行者司馬光也餘皆前叛後附或出或入先生與僕論變法之𥘉僕曰神廟必欲變法何也先生曰蓋有說矣天下之法未有無敝者祖宗以來以忠厚仁慈治天下至於嘉祐末年天下之事似乎舒緩委靡不振當時士大夫亦自厭之多有文字論列然其實於天下根夲牢固至神廟即位冨於春秋天資絶人讀書一見便解大旨是時見兩蕃不服及朝廷州縣多舒緩不及漢唐全盛時毎與大臣論議有怫然不恱之色當時執政從官中有識者以謂方今天下正如大冨家上下和睦田園開闢屋舎牢壯財用充足但屋宇少設飾器用少精巧僕妾樸魯遟鈍不敢作過但有鄰舍來相凌侮不免嵗時以物贈之其來已乆非自家做得如此遂不敢承當上意改革法度獨金陵揣知上意以一身當之以激切奮怒之言以動上意遂以仁廟爲不治之朝神廟一旦得之以爲千載㑹遇改法之𥘉以天下公論謂之流俗内則太后外則頋命大臣等尚不能回何况臺諌侍從州縣乎祇増其勢爾雖天下之人群起而攻之而金陵不可動者蓋此八箇字吾友宜記之僕曰何等八字先生曰虚名實行強辯堅志當時天下之論以金陵不作執政爲屈此虚名也平生行止無一點涴論者雖欲誣之人主信乎此實行也論議人主之前貫穿經史今古不可窮詰故曰強辯前世大臣欲任意行一事或可以生死禍福恐之得回此老實不可以此動故曰堅志因此八字此法所以必行也得君之𥘉與人主若朋友一言不合巳志必靣折之反覆詰難使人主伏弱乃巳及元豐之𥘉人主之德巳成又大臣尊仰將順之不暇天容毅然正君臣之分非與熈寧𥘉比也元城語録問荆公可謂得君乎曰後世謂之得君可也然荆公之智識亦自能知得如表云忠不足以信上故事必待於自明智不足以破姦故人與之爲敵也不破姦此則未然若君臣深相知何待事事使之辨明也舉此一事便可見曰荆公勿使上知之語信乎曰湏看他當時因甚事說此話且如作此事當如何更湏詳審未要令上知之又如說一事未甚切當更湏如何啇量體察今且勿令上知若此類不成是欺君也凡事未見始末更切子細反覆推究方可程氏遺書介甫不知事君道理觀他意思只是要樂子之無知如上表言秋水旣至因知海若之無窮大明方升豈冝爝火之不息皆是意思常要巳在人主上自古主聖臣賢乃常理何至如此又觀其說魯用天子禮樂云周公有人臣所不能爲之功故得用人臣所不得用之禮樂此乃大段不知事君大凢人臣身上豈有過分之事凡有所爲皆是臣職所當爲之事也介甫平居事親最孝觀其言如此其事親之際想亦洋洋自得以爲孝有餘也臣子身上皆無過分事惟是孟子知之說曽子只言事親若曽子可矣不言有餘只言可矣唐子方作一事後無聞焉亦自以爲報君足矣當時所爲蓋不出誠意嘉仲曰陳瓘亦可謂難得矣先生曰陳瓘却未見其巳程氏遺書王荆公平生養得氣完爲他不好做官職作宰相只喫魚羹飯得受用厎不受用縁省便去就自在甞上殿進一劄子擬除人神宗不允對曰阿除不得又進一劄子擬除人神宗亦不允又曰阿也除不得下殿出來便乞去更留不住平生不屈也竒特上蔡語録論及荆公勝流俗之說人多謂荆公以同巳者爲是異巳者爲流俗切謂荆公勝流俗之說起於方特立有爲之前非解於行新法之後人能用此以行其所學爲𥙷不細蕭謂先生有點鐵成金之語人能用之於此何所不可但不知荆公勝之是否爾先生曰俗不善而能勝之也不亦善乎又云荆公却養氣今人都無此上蔡語録因論荆公法云靑苗免役亦是法然非藏於民之道如青苗取息雖不多然嵗散萬緍則奪民二千緍入官旣入官則民間不復可得矣免役法取民間錢雇人役於官其得此錢用者蓋皆州縣市井之人不及郷民惟知輸而不得用故今郷民多乏於財也青苗二分之息可謂輕矣而不見利於百姓何也今民間舉債其息少者亦湏五七分多者或倍而亦不覺其爲害曰惟其利輕且官中易得人徒知目前之利而不顧後患是以樂請若民間舉債則利重又百端要勒得之極難故人得巳且巳又靑苗雖名取二分之息其實亦與民間無異蓋小民旣有非不得巳而請者又有非不得巳用之且如請錢千或遇親舊於州縣問湏有酒食之費不然亦湏置小小不急之物只使二百錢巳可比民間四分之息又請納時往來之用與官中門户之賂遺至少亦不下百錢况又有胥吏追呼之煩非貨不行而公家期限又與私間不同而民之畏法者至舉債以輸官往往㳂此遂破蕩産業者固多矣此所以有害而無利也或云官中息輕民得之可以自爲經營嵗豈無二分之息乎蓋未之思也若用之啇販則錢散而難集正公家期逼卒収不聚失所指凖其患豈細徃年冨家知此患也官中配之請不得已請而藏之比及期出私錢爲息輸之官乃無患夫使民如此是無事而侵擾之也何名𥙷助之政乎龜山語録謂與季常言王氏只是以政刑治天下道之以德齊之以禮之事全無他日季常曰細思之實如公言但道以德齊以禮之事於今如何做曰湏有㑹做只爲而今不用着此等人若是他依本分㑹厎必有道理龜山語録或曰正心於此安得天下便平治曰正心一事自人未常深知之若深知而體之自有其効勸後丗治天下皆未甞識此然此亦惟聖人力做得徹蓋心有所忿懥恐懼好樂憂患一毫少差即不得其正自非聖人必湏有不正處然有意乎此者隨其淺深必有見効但不如聖人之効著耳觀王氏之學蓋未造乎此其治天下專講求法度如彼脩身之㓗冝足以化民矣然卒不逮王文正吕晦叔司馬君實諸人者以其所爲無誠意故也明道常曰有關雎麟趾之意然後可以行周官之法度蓋深達乎此龜山語録荆公在上前爭論或爲上所疑則曰臣之素行亦不至無廉耻如何不足信且論事當問事之是非利害如何豈可以素有廉耻劫人使信巳也夫廉耻在常人足道若君子更自矜其廉耻亦淺矣蓋廉耻自君子所當爲者如人守官曰我固不受贓不受贓豈分外事乎龜山語録鄭季常作太學愽士言養士之道當先善其心今殊失此意未知所以善之之方曰由今之道雖賢者爲教官必不能善人心曰使荆公當此職不知如何曰荆公爲相其道蓋行乎當年今日學法荆公之法也巳不能善之矣季常良乆曰如是如是龜山語録神宗賜金荆公即時送時送蔣山僧寺爲常住了翁云甞見人說以此爲曠古所難其實能有多少物人所以難之蓋自其眼孔淺耳曰荆公作此事絶無義理古者人君賜之果尚懐其核懐核所以敬君賜也所賜金義當受則受當辭則辭其可名爲受之而施之僧寺乎是賤君賜也金可賤君賜不可賤書曰人不易物唯德其物若於義當受而家巳足不願藏之家則班諸昆弟之貧者則合禮矣龜山語録王荆公天資孝友俸禄入門諸弟輙用之至盡不問其子雱旣長專家政則不然矣諸弟亦皆有文學安禮者字和甫甞爲右丞氣豪玩丗在人主前不屈也一日宰執同對上有無人材之歎左丞蒲宗孟對曰人材半爲司馬光以邪說壞之上不語正視宗孟乆之宗孟懼甚無以爲容上復曰蒲宗孟乃不取司馬光耶司馬光者未論別事只辭樞宻一節朕自即位以來唯見此一人他人則雖迫之使去亦不肯矣宗孟又因奏書請官屬恩上曰所脩書謬甚無恩宗孟又引例書局儀鸞司等當賜帛上以小故未荅安禮進曰修書謬儀鸞司者恐不預上爲之笑方蘇子瞻下御史獄小人勸上殺之安禮言其不可安國者字平甫尤正直有文一日荆公與吕惠卿論新法平甫吹笛于内荆公遣人諭曰請學士放鄭聲平甫即應曰願相公逺佞人惠卿深銜之後荆公罷竟爲惠卿所䧟放歸田里卒以窮死雱者字元澤性險惡凡荆公所爲不近人情者皆雱所教吕惠卿輩奴事之荆公置條例司𥘉用程顥伯淳爲屬伯淳賢士一日盛暑荆公與伯淳對語雱者囚首跣足手携婦人冠以出問荆公曰所言何事荆公曰以新法數爲人沮與程君議雱箕踞以坐大言曰梟韓琦冨弼之頭于市則新法行矣荆公遽曰兒誤矣伯淳正色曰方與叅政論國事子弟不可預姑退雱不樂去伯淳自此與荆公不合祖宗之制宰相之子無帶職者神宗特命雱爲從官然雱巳病不能朝矣雱死荆公罷相哀悼不忘有一日鳯鳥去千年梁木摧之詩蓋以比孔子也荆公在鍾山甞恍惚見雱荷鐵枷杻如重囚者荆公遂施所居半山園宅爲寺以薦其福後荆公病瘡良苦甞語其姪曰亟焚吾所謂日録者姪給公焚他書代之公乃死或云又有所見也聞見録王安國常非其兄所爲爲西京國子監教授溺於聲色介甫在相位以書戒之曰宜放鄭聲安國復書曰安國亦願兄逺佞人也官滿至京師上以介甫故召上殿時人以爲必除侍講上問以其兄秉政物論如何對曰但恨聚歛太急知人不明耳上黙然不恱由是别無恩命乆之乃得館職安國甞力諌其兄以天下恟恟不樂新法皆歸咎於公恐爲家禍介甫不聽安國哭於影堂曰吾家滅門矣又甞責曽布以誤惑丞相更變法令布曰足下人之子弟朝延變法何預足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相由汝之故殺身破家僇及先人發掘丘壟豈得不預我事邪記聞平甫教授西京國子監代還召對上曰卿學問通古今以漢文何主也對曰三代以後賢主未有如文帝者上曰但惜其才不能立法更制爾對曰文帝自代來夜入未央宫於擾攘時定變故於俄頃之際諸將故武夫皆脅息待命恐無才者不及是然能用賈誼言待群臣有節專務以德化民海内興於禮義幾致刑措使一時風俗耻言人過則文帝加有才一等矣上曰王猛佐符堅以蕞爾國而令必行今朕以天下之大而不能使人何也對曰王猛睚眦之忿必報專教符堅以峻刑法殺人爲事此必小臣刻薄有以誤陛下者願專以堯舜三代爲法理順而勢利則下豈有不從者乎上深然之王安國著序言五十篇上𥘉即位韓絳邵亢爲樞宻副使同以序言進上御批稱美令召試學士院將不次進用而大臣有不喜之者止得兩使職官從辟爲西京國子監教授後中丞吕誨彈奏王荆公猶引以爲推恩太重平甫愽學工文章通古今逹治道勁直寡合不阿時之好惡雖與荆公論議亦不苟合故異時執政得以中傷而言事者謂非毁其兄遂因事逐之天下人皆以爲冤𥘉荆公爲叅知政事時因閱晏元獻公小詞而笑曰爲宰相而作艶詞可乎平父曰亦偶然爾吕惠卿爲館職在坐遽曰爲政必放鄭聲况自爲之乎平父正色曰放鄭聲不若逺佞人也吕大以爲譏已自是遂與平父相失云東軒筆録桉鄭聲事三書所載不同未知孰是鄭俠介夫者福州福清人荆公居憂金陵時甞從學後舉進士調光州司法秩滿至京師㑹荆公秉政俠見之公喻使試刑法俠辭不習公問以所聞俠因爲具言青苗免役用兵之害公不荅俠退又數以書論之亦不報乆之得監在京安上門荆公又使人喻將以爲經義局檢討俠又辭之公使人謂之曰凡仕宦湏改得一京官然後可以别圗差遣何得介僻如此俠對曰俠罷官而來夲求執經丞相門下耳𥘉不知官有美惡髙下也不意丞相一旦當路發言無非以官爵爲先殊非俠所望也且丞相果欲援俠而進之俠之所言行其一二使俠進而無愧不亦善乎時𥘉行免役及收市利錢法京師細民負水拾髮擔粥提茶之類皆有免行錢不輸者毋得販鬻市道門司稅院並行倉法專欄月賦食錢毎正稅百錢則收市利十錢以給之逮法之行則正稅不及十錢者有司亦取之其末反重於夲俠又言於荆公得損其尤甚者數事㑹大旱自十一月不雨至于三月河東河北陜西流民大入京師與城外飢民市麻籸麥麩爲糜或掘草根采木實以食或身被鎻械而負瓦揭木賣妻鬻子以償官俠畫圗爲書勾馬遞以聞曰如行臣之言十日不雨即乞斬臣以正欺罔之罪又自劾擅發馬遞待罪時熈寧年三月二十六日也神宗皇帝覽䟽歎息終夕不寐翌日遂詔韓維孫永體量免行錢詔曽布體量市易法又詔司農寺發常平倉放商稅務及諸門稅錢三十文以下市利錢二十文以下青苗免役權罷追索方田保甲並罷凡此類十八事民間讙呼相慶四月一日遂下詔責躬求言越三日大雨十一日早朝賀雨神宗出圗狀示宰執且責之丞相以下皆謝罪是日有旨放俠擅發馬遞之罪荆公遂力求去於是其徒爭言俠罪詔送開封取勘時士庶欲應詔言事者甚衆聞此皆沮縮而姦人託名爲書日詣匭獻之乞留荆公守新法而治俠罪㑹熈河小捷群小因得入其言吕惠卿鄧綰之徒至環泣上前巳而荆公卒去位薦惠卿以代巳命下之日京師大風雨土翳席逾寸俠又上書言安石夲爲惠卿所誤至此今復相板援以遂前非不復爲宗社計昔唐天寳之亂國忠巳誅貴妃未戮人以爲賊夲尚在今日之事何以異此又上䟽諌用兵語甚切屬熈河奏捷殺戮甚衆上爲惻然手詔諭王韶等今後只務招降木征餘黨毋以多殺爲功於是惠卿等益惡之亟取開封所勘擅發馬遞事下刑部定合罸銅十斤取旨勒停俠又上書言大臣奏以三路流民皆爲南北下各有田名鷰子田若北旱則南南荒又北此皆誣罔上聽臣乞勘㑹三路之民自去冬流移至今不巳何人是南方有田者它語譏大臣甚衆并詆臺諌皆如芻靈木偶又言禁中𬒳甲登殿等事奏入執政大怒言於上以爲謗訕朝政追毁出身以來文字送汀州編管旣行上問惠卿鄭俠小臣禁中宻事及大臣奏對之言何自聞之惠卿對曰此皆馮京手録使王安國持示導之使言耳惠卿與京同列議多矛盾又以謟事荆公爲安國所疾屢諷其兄不寤故併中之巳而上以惠卿語責京京惶駭對曰臣與鄭俠素不相識上方疑之御史知雜張琥遂以俠事劾京京奏俠行未逺乞追還對辨遂詔付臺推勘遣奉禮郎舒亶追俠及諸太康搜其衣橐得王克臣所贐銀三十兩御史臺知班楊忠信所贈韓范司馬諸公所言新法不便奏藁兩帙遂逮赴詔獄俠對實不識京但毎遣門人吴無至詣檢院投匭判院丁諷輙爲無至道京稱歎之語及罷局時遇安國於途安國馬上舉鞭相楫曰賢可謂獨立不懼因隨至所居求觀前後奏草俠荅以未甞存留安國言亦見所與家兄書家兄雖安國之言亦不聽而况公乎俠曰不意丞相一旦爲小人所誤以至於此安國曰是何爲小人所誤家兄自以爲人臣子不當避四海九州之怨使四海九州之怨盡歸於巳方是臣子盡忠國家俠曰未聞堯舜在上夔契在下而有四海九州之怨安國以爲然忠信者甞應四月一日詔書言新法不便因謂俠曰御史職在諌爭皆緘黙不言公一監門爾乃上書不巳是言責在監門而臺中無人也探懐中書授俠曰以此爲正人助京未甞使安國傳導省中語凡所論乃鄰居内殿崇班楊永芳所告也安國赴對不承俠責之曰凡對制使不當有隱口所言者安得諱之天地鬼神皆在左右學士欲誰欺耶安國乃伏獄成俠改送英州編管忠信無至皆眞决編管湖外京罷政諷落職安國追毀告身放歸田里俠徒歩赴貶居十年樞宻直學士陳襄在經筵日甞論薦當世之士自司馬公而下三十三人最後言鄭俠小臣愚直敢言如此是亦發於忠義非陛下矜憐其志而使得生還誰復爲俠言者尋以哲宗登極恩霈放還用蘇軾孫覺虞大寧等薦除泉州州學教授秩滿諸生借留州奏得再任元符元年再貶英州徽宗登極放還復爲泉學教授崇寧𥘉又勒停尋復將仕郎宣和𥘉卒俠性清儉布衣糲食終其身平居進止必以禮法閨門怡然不肅而治喜賔客樂教訓嗇用廣施郷里敬之中表有應舉不以實年者俠戒之曰方謀入仕巳有欺君之心不可暇日聞子姪誦詩考槃之義曰弗諼者弗忘君之惡弗過者弗過君之朝弗告者弗告君以善碩人之於君有卷卷之不忍也故永矢以絶之公嘆曰是何言與古之人在畎畒不忘其君况於賢者一不見用而忿戾若是哉蓋弗諼者弗忘君也弗過者弗以君爲過也弗告者弗以告他人也其存心如此故雖流落頓挫之餘一話一言未甞不在君父覩政役繁興民物嗷嗷但顰顣而巳鄭介夫言行録錢景諶者忠懿王孫師事康節先生舊與王荆公善後荆公用事論新法不合遂相絶終身爲外官其家集有荅兖守趙度支書自序甚詳云始僕爲進士時彼爲太常愽士主别頭試取僕於數百人之中是後日逰其門執師弟子之禮授經論文非二帝三王之道孔子孟子之言不言及僕丁家難聞其參大政天下之人無不懽喜皷舞謂其必能復三代之風一致太平是時僕自許昌以私事來京師因見之於私第方盛夏與僧智縁者並卧於地又與其日最親者一人袒露而坐於傍顧僕脫帽禠服𥘉不及其他卒然見問曰青苗助役如何僕對以利少而害多後日必爲平民之患又問曰孰爲可用之人則對以居䘮不交人事而知人之難尤非淺淺事彼不樂僕私自謂大賢爲政於天下必有竒謀逺業出人意表亦不敢必其乖亂及歸許見其變祖宗法度專以聚歛苛刻爲政務爲新竒謂之新法而天下好進之人紛紛然以利進矣殊非前日之所講而聞者又二三年僕以調官來京師當其作相又往見之彼喜僕之來令先見其弟平甫平甫固故人知我者亦喜曰相君欲以館閣處君而任以事僕戯與平甫相誚以謂百事皆可所不知者新書役法耳平甫雖以僕爲太方然擊節賞歎以爲知言及見彼首言欲僕治峽路役書又以戎瀘蠻事見委僕以不知峽路民情而戎瀘用兵繋朝廷舉動一路生靈休戚願擇知兵愛人者彼大怒時坐客數十人無不爲僕寒心者後僕官䌓鄧彼益任政用事而一代成法無一二存者百姓愁苦而郡縣吏惴惴憂懼虞以罪去且不但變其法制而已乃以穿鑿不經入於虚無牽合臆說作爲字解者謂之時學而春秋一王之法獨廢而不用又以荒唐誕怪非昔是今無所統紀者謂之時文傾險趨利殘民而無耻者謂之時官驅天下之人務時學以時文邀時官僕旣預仕籍而所學者聖賢事業專以春秋爲之主皆大中至正三綱五常之道其所爲文學六經而爲必夲於道德性命而一歸於仁義其施於官者則又忠厚愛人兼善天下之道自顧不合於時而學之又不能方惶惶然無所容其迹而故人張諌議正國辟僕爲髙陽帥幙到官已逾一年矣今春邵堯夫先生亦有書招我爲洛中之游兼有詩云年光空去也人事轉蕭然止俟貧老之兄生事粗足㓜而孤者有分有歸亦西歸洛中守先人墳墓徜徉于有洛之表吾願畢矣聞見録六之六叅政程文簡公公名琳字天球中山博野人舉服勤詞學科補泰寧軍節度推官召試直集賢院擢知制誥權三司使御史中丞以樞宻直學士知益州還知開封府復爲三司使遷戸部侍郎叅知政事降光禄卿知潁州復侍郎知青州北京建爲留守以武昌節度使知永興軍加宣徽北院使判延州拜同中書門下平章事判大名府更授鎮安軍節赴鎮薨年六十九公甞館契丹使使者言中國使至契丹坐殿上位次髙而契丹使來坐次下當陞語甚切上與大臣皆以爲小故不足爭將許之公以謂許其小必啓其大力爭以爲不可遂止歐陽公撰墓誌公知益州蜀人輕而喜亂公常先制於無事至其臨時如不用意又略其細治其大且甚者不過一二而蜀人安之自寮吏皆不能窺其所爲正月俗放燈公先戒吏爲火備有失火者使隨救之勿白以動衆旣而大宴五門城中火吏救止卒宴民皆不知蓋其他設施多類此軍士見監軍告其軍有變監軍入白公笑遣之惶恐不敢去公曰軍中動静吾自知之苟有謀者不待告也可使告者來監軍去而告者卒不敢來公亦不問遂止蜀之妖人有自號李氷神子者署官屬吏卒聚徒百餘人公命捕寘之法而讒之朝者言公妄殺人蜀人恐且亂矣上遣中貴人馳視之使者入其境居人行旅爭道公善且曰殺一人可使蜀數十年無事使者問其故對曰前亂蜀者非有知謀豪傑之才乃里閭無賴小人惟不制其始遂至於亂耳使者還奏其語於是上益以公爲能墓誌公知開封府㑹禁中大火延兩宫宦者治獄得縫人火斗巳誣伏而下府命公具獄公立辨其非禁中不得入乃命工圖火所經而後宫人多而居隘其烓竈近版壁歲乆燥而焚曰此豈一日火哉乃建言此殆天災也不冝以罪人上爲緩其獄卒無死者公在府决事神速一歲中獄常空者四五墓誌司天言日食明年正旦請移閏月以避之公以謂天有所譴非移閏可免惟脩德政而巳乃止墓誌范仲淹以言事忤大臣貶饒州巳而上悔悟欲復用之稍徙知潤州而惡仲淹者復誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連岀語及仲淹皆指爲黨人公獨爲上開說明其誣枉上意解而後巳墓誌公爲三司使不恱苟利不貪近功時議者患民稅多目吏得爲姦欲除其名而合爲一公以謂合而没其名一時之便後有興利之臣必復増之是重困民也議者莫能奪其於岀入尤謹禁中時有所取未甞肯予宦官怒言陛下雖有欲物在程琳何可得公曰臣所以爲陛下惜爾天子以爲然神道碑又東齋記事云夏秋㳂納之物如鹽麴錢之類名件頗碎慶曆中有司建議併合歸一名程文簡獨以謂没其舊名異日不知或再敷鹽麴則致重複此亦善慮事也仁宗朝有議東南漕粟兵夫舟船與盗失之費蓋十常三四欲募啇賈令入中以實都下時程文簡公爲三司使以爲萬一所入不足必邀以增直是商賈得操其柄其議遂寢麈史公在延州夏人數百驅畜産至界上請降言契丹兵至衙頭矣國且亂願自歸公曰契丹兵至元昊帳下當舉國取之豈容有來降者吾聞夏人方捕叛族此其是乎不然誘我也拒而不受巳而夏人果以兵數萬臨界上公戒諸堡寨無得岀兵夏人以爲有備引去自此不復窺邊神道碑公叅預大政王隨陳堯佐爲宰相公性剛厲與二人不叶遂俱罷政及李淑作堯佐墓誌言尫愎弗咸用是罷去其意謂堯佐王隨尫弱不任事公剛愎不和故陳氏子弟頗銜之名臣傳公罷政貶官起守北京與宦者皇甫繼明爭治行宫事章交上上遣一御史視其曲直御史直公遂罷繼明是時繼明方信用其勢傾動中外自朝廷大臣莫不屈意下之公被中傷方起未復而獨與之爭雖小故不少假也故議者不以公所直爲難而以能不爲繼明屈爲難云墓誌趙元昊死子亮祚立方㓜三大將共治其國言事者謂可除其諸將皆以爲節度使使各有其所部以分弱其勢可遂無西患事下公公以謂幸人之䘮非所以示大信撫夷狄且亮祚雖㓜然君臣和三將無異志雖欲有爲必無功而反生事不如因而撫之上以爲然墓誌章獻垂箔有方仲弓者上書乞依武氏故事立劉氏廟章獻覽其䟽曰吾不作此負祖宗事裂而擲之於地仁宗在側曰此亦岀於忠孝冝有以旌之乃以爲開封府司録及章獻崩黜爲汀州司馬程琳亦甞有此請而人莫之知也仁宗一日在邇英謂講官曰程琳心行不中在章獻朝甞請立劉氏廟且獻七廟圖時王洙侍讀聞之然仁宗性寛厚琳竟至宰相蓋無宿怒也龍川志五朝名臣言行録卷第六
