body:
  text: 五之四御史中丞彭公公名思永字季長吉州廬陵人中天聖五年進士第歷知南海分寧縣通判睦州知潮州召為侍御史出守宣州為湖北益州路轉運使權知成都府召還為户部副使以天章閣待制充陜西都轉運使知瀛州英宗即位徙知江寧府召權御史中丞神宗𥘉降授給事中知黃州徙太平亳楊三州熙寧三年以户部侍郎致仕卒年七十一南海分寧素號難治前令比以罪去民化公之誠相戒以毋犯法至於無訟既又通判睦州㑹台州大水監司奉詔以公攝守事公悉心救養不憚勞苦至忘寢食盡葬溺死者為文以祭之問疾苦賑飢乏去盜賊撫羸弱民貧不能營葺者命工伐木以助之數月而公私之舍畢復人安其居公視故城􅋻壞曰郡瀕海而無城此水所以為害也程役勸功民忘其勞城成遂為永利移知潮州潮民歲苦修堤之役吏緣為姦貧者尤被其害公為之法役均而費省民大恱明道先生撰行狀召為侍御史極論內降授官賞之弊以謂斜封非公朝之事仁宗深然之皇祐祀明堂前一日有傳赦語百官皆得遷秩者公方從駕宿景靈宫亟上言不冝濫恩以益僥幸既肆赦果然時張堯佐以妃族進王守忠以親侍帷幄𬒳寵參知政事闕貟堯佐朝暮待命守忠亦求為節度使物議歡動公帥同列言之皆曰冝待命行公曰冝以先事得罪命出而不可救則為朝廷失矣遂獨抗疏極言至曰陛下行此覃恩無意孤寒獨為堯佐守忠故取恱衆人耳月言妃族秉政內臣用事皆非國家之福疏入仁宗震怒人皆為公危之公曰苟二人之命不行雖赴鼎鑊無恨於是御史中丞郭勸諌官吳奎皆為上言其忠當蒙聽納不冝加罪仁宗怒解而堯佐守忠之望遂格公猶以泛恩罷臺職行狀公為荆湖北路轉運使至部奏黜守令之殘􅤒疲懦者各一人而八州知勸時大農以利誘諸路使以羡餘為獻公曰裒民取賞吾不忍為遂無所獻行狀成都闕守詔公權領府事有吏盜官錢千緡付獄巳三歲猶縱其出入自若者公命窮治之一日而獄具蜀人以交子貿易皆藏於腰間盜善以小刃取之於稠人中民病苦之公得其狀即捕獲一人使疏其黨類得十餘輩悉黥隸諸軍盜者遂絶二罪而人知畏法蜀乃大治歲有中貴人祠峩嵋常留成都中數十日誅取珍貨竒玩例至數百萬錢一出於民間公命三省其二使者恨怒而去公不之顧行狀河朔謀帥以公鎮髙陽時狃於承平治兵者鮮明紀律而三關為甚公為帥方重嚴正犯者頗以軍法從事驕兵大戢河北舊以桑麻為産籍之髙下民懼不敢藝植故益貧公奏更其法自是絲績之利歲歲增益行狀召權御史中丞時追崇濮園大號復有稱親之議諌官御史以典禮未正相繼論列者六七人皆以罪去公始拜中司力陳其不可且請召還言事者上未之察更為疏極論其事言益切至英宗深加聽納事幾施行而大臣持之甚力故不果公因求解憲職以章言者五進見而面陳者多至不記㑹英宗不豫公憂懼不復言行狀又伊川先生集代彭中丞奏云濮王生陛下而仁宗皇帝以陛下為嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之適子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為姪此天地大義生人大倫如乾坤定位不可得而變易者也固非人意所能推移苟亂大倫人理滅矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更稱濮王為親是有二親則是非之理昭然自明不待辨論而後見也然而聖意必欲稱之者豈非陛下大孝之心義雖出繼情厚本宗以濮王實生聖躬曰伯則無異於諸父稱王則不殊於臣列思有以尊大使絶其等倫如此而巳此豈陛下之私心哉蓋大義所當典禮之正天下之公論而執政大臣不能將順陛下大孝之心不知尊崇之道乃以非禮不正之號上纍濮王致陛下於有過之地失天下之心貽亂倫之咎言事之臣又不能詳據典禮開明大義雖知稱親之非而不知為陛下惟所生之至恩明尊崇之正禮使濮王與諸父夷等無有殊别此陛下之心所以難安而重違也臣以為當以濮王之子襲爵奉祀尊稱濮王為濮國大王如此則敻然殊號絶異等倫凡百禮數必皆稱情請舉一以為率借如既置嗣襲必伸祭告當曰姪嗣皇帝名敢昭告于皇伯父濮國大王自然在濮王極尊崇之道於仁皇無嫌二之失天理人心誠為允合不獨正今日之事可以為万丗之法復恐議者以大字為疑此則不然蓋繫於濮國下自於大統無嫌矣御史蔣之竒奏發大臣隂事欲扳公為助乃曰公嘗言之公亦謂帷箔之私非外人所知誠難究詰然亦有以取之故謗言一興而人以為信且其首為濮園議違典禮以犯衆怒不冝更在政府執政以之竒所論冥昧不可質迫公言其所從來三問而公奏益急且曰風聞者以廣聰明也今必問其所從來因而罪之則後無聞矣寧甘重謫不敢廢國家開言路之法因極陳大臣朋黨専恣非朝廷計翌日降授給事中知黃州行狀公仁厚誠恕出於自然年八九歲時從尚書出官嶽州晨起將就學舍得金叉於門外默坐其處以伺訪者有一吏徘徊久之問故果墜叉者也公詰其狀驗之信即出付之吏謝以數百金公笑不受曰我若欲之取叉不過於數百金耶吏嘆駭而去始就舉時貧無餘資惟持金釧數隻棲於旅舍同舉者過之衆請出釧為玩客有墜其一於䄂間者公視之不言衆莫知也皆驚求之公曰數止此耳非有失也將去䄂釧者揖而舉手釧墜於地衆服公之量居母喪貧甚鄉人爭饋之皆謝去後居顯仕自奉飬不改其素平生無聲色竒巧之玩其氣守髙爽議論清淡而端莊恭謹動必由禮未嘗有墮慢之色戲侮之言見者皆知畏重然襟度夷曠不可澄撓人莫見其喜怒之變遇事明白不事襮飾接人無貴賤髙下一以忠信為政本仁惠吏民愛之如父母惟不喜矯情恱衆揚巳取譽常曰牢籠之事吾所不為居憲府多所論奏未嘗以語人或疵其少言惟謝之終不自辨每謂人曰吾不為它學但幼即學平心以待物耳又常教其子弟曰吾數歲時冬處𬒳中則知思天下之寒者矣其本源如此故仁恕之善見於天下而人推其誠長者至其持守剛徑喜善嫉惡而勇於斷决則不可以勢利誘不可以威武移潮州宅舊傳多怪前後守臣無寧處者公迄去未嘗問其其有無其逹理守正若此凛乎其丈夫也六之二丞相陳文惠公公名堯佐字希元閬州閬中人中進士第纍遷太常丞為開封府推官貶通判潮州還直史館歷知廬壽二州兩浙京西河東河北轉運使入為三司戶部副使天聖初知制誥知通進銀臺司出知河南府徙并州權知開封府為翰林學士拜樞密副使參知政事出知永興軍徙廬州同州拜同中書門下平章事罷以使相判鄭州以太子太師致仕薨年八十二公為人剛毅篤實好古博學嘗以言事貶通判潮州其所言蓋大臣所難言者歐陽公撰神道碑潮之惡溪有鱷魚食人不可近公命捕得鳴鼓于市以文告而戮之鱷患屏息神道碑又澠水燕談云咸平中陳文惠公謫官潮州時潮人張氏子濯于江邊為鱷魚所食公曰昔韓吏部以文投惡溪鱷魚逺徙今乃賊人則不可赦矣乃命吏督漁者網得戮之圖其形為之贊至今人多傳之鰐大者數丈或玄黃或蒼白似龍而無角類蛇而有足睅目利齒見之駭人卵化山谷間大率為鰐者十二三焉餘或為􅷞或為龜也喜食人畜其食必以尾卷去如象之任鼻也知壽州遭歲大飢公自出米為糜以食餓者吏民以公故皆爭出米其活數萬人公曰吾豈以是為私惠邪蓋以令率人不若身先而使其從之樂也神道碑錢塘江堤以竹籠石而潮嚙之不數歲輒壞而復理公嘆曰堤以捍患而反病民乃議易以薪土言者以為非便而丁晉公主之以黜公公爭不巳乃徙公京西而籠石為堤數歲功不就民力大困卒用公議堤乃成神道碑河東地寒而民貧奏除石炭稅減官冶鐵課歲數十萬以便民曰轉運征利之官也利有夲末下有餘則上足吾豈為俗吏哉神道碑太行山當河北河東兩路之界公以謂晉自前丗為險國常先叛而後服者恃此也其在河東鑿澤州路後徙河北鑿懷州路而太行之險通行者得公以為利公曰吾豈為今日利哉神道碑河决壞滑州公躬自暴露晝夜督促創為木龍以巨木駢齒浮水上下殺其暴堤乃成又為長堤以護其外滑人曰不可使後人忘我陳公因號其堤為陳公堤神道碑開封府治京師公以謂治煩之術任威以擊強盡察以防姦譬於激水而欲其澄也故公為政一以誠信每歲正月夜放燈則悉籍惡少年禁錮之公召諭曰尹以惡人待汝汝安得為善吾以善人待汝汝忍為惡耶因盡縱之凡五夜無一人犯法者神道碑太常博士陳詁知祥符縣縣吏惡其明察欲中以事而詁公廉事不可得乃欲以竒動京師自録事以下空一縣皆逃去京師果喧言詁政苛暴是時章獻明肅太后猶聽政怒詁欲加以罪公為樞密副使力爭之以謂罪詁則姦人得計而沮能吏詁由是獲免神道碑公十典大州六為轉運使常以方嚴肅下使人知畏而重犯法至其過失則多保佑之故未嘗按黜一下吏神道碑故事知制誥者先試其文辭天子以公文學天下所知不復命試自國朝以來不試知制誥者唯楊億及公二人而巳神道碑公居官不妄進取為太常丞者十三年不遷為起居郎者七年不遷自議錢塘堤為丁晉公所絀後晉公益用事專威福故人子弟以公久于外多勉以進取公曰唯久然後見吾守如是十五年今天子即位晉公事敗投海外公乃見召用神道碑公初作相以唐劉蕡所對䇿進曰天下治亂自朝廷始朝廷賞罰自近始凡蕡之所究言者皆當今之弊臣所欲言而陛下之所冝行也天子嘉納之神道碑公居家以儉約為法雖巳貴常使其子弟親執賤事曰孔子固多能鄙事臨卒口占數十言自志其墓神道碑吕申公纍乞致仕仁宗問之曰卿果退當何人可代申公曰知臣莫若君陛下當自擇仁宗再三問之申公對曰陛下欲用英俊經綸之才臣所不知必欲圖任老成鎮撫百度周知天下之良苦無如陳堯佐者仁宗深然之遂大拜湘山野録公性儉謹行見動物必戒左右勿殺器服壞隨輒𥙷之曰無使不全以見棄也公父秦國公省華三子長曰堯叟為樞密使同中書門下平章事季曰堯咨為武信軍節度使皆舉進士第一人及第三子巳貴秦公尚無恙每賔客至其家公及伯季侍立左右坐客䠞蹜不安求去秦公笑曰此兒子輩爾故天下皆以秦公教子為法而以陳氏丗家為榮神道碑堯咨精於弧矢常自號小由基為知制誥出守荆南回其母馮氏問之曰汝典名藩有何異政堯咨曰州當孔道過客以堯咨善射無不歎服母曰汝父訓汝以忠孝輔國家今不務仁政善化而專卒伍一夫之伎豈汝先人之意耶以杖擊之金魚墜地名臣傳
