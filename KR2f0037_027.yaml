  text: 三朝名臣言行後録卷第五之一
  hash: sha256:205481193c0f862ef1f6d1aca4cfd4d7a9327c2c8e4f86306f821e67554f506b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0037_SBCK_027-1a}
body:
  text: 參政唐質肅公公名介字子方荆南人舉進士歷官州縣召為監察御史裏行遷殿中侍御史裏行以言事貶英州别駕數月徙監郴州稅通判潭州復召為殿中侍御史除直集賢院權開封府推官出知楊州歷轉運發運使三司度支副使除天章閣待制知諌院出知洪州英宗召為御史中丞出知太原府神宗即位遷權三司使遂參知政事薨年六十公為嶽州沅江令州民李氏以髙資為上下所漁擾或者不厭因告其祠鬼用人守喜擊斷則逮繫其家百口極獄之慘情不得奏専以屬公公考閲實非殺人者守又奏以為未盡詔遣御史方偕移劾澧州卒用公所具獄不能變州吏皆坐罪去偕以活死者得官公終不自言也劉忠肅公撰神道碑知莫州任丘縣縣當國信驛頓往返誅索繁急其下因緣為姦利異時俯首趣事莫敢何辨公為作區畫預居其物每使至親坐驛門給之一以法令從事應復還而毀失者移文取其償故過者皆戢上下便之塘水歲浸邑田十一村而塘實中人主之州縣畏其執不敢拒公募民自髙陽起堤亘十餘里蔽之其患遂息神道碑通判德州轉運使崔嶧以庫帛配民而過估之公即移書安撫司曰河北仍年𬒳水災民困不聊轉運使不為之恤然則為上存民者不在安撫司乎嶧聞怒按其留牒不即下公終不從嶧亦不能果行王禹玉撰墓志為殿中侍御史裏行內侍督作龍鳯車于啓聖院公言此太宗神御所在為後宫輿服故喧瀆其中又飾金玉過制皆非是詔罷之神道碑張堯佐者以進士擢第纍官至屯田貟外郎知開州會其姪女有寵於仁宗為修媛堯佐遂驟遷一日中除宣徽節度景靈群牧四使御史唐介上疏引楊國忠為戒不報又與諌官包拯吳奎等七人論列殿上又白御史中丞留百官班欲以庭爭卒奪堯佐宣徽景靈兩使特加介六品服以旌敢言未幾堯佐復除宣徽使知河陽唐謂同列曰是欲與宣徽而假河陽為名耳我曹豈可中巳耶同列依違不前唐遂獨爭之不能奪仁宗諭曰除擬𥘉出中書介遂極言宰相文彥博知益州日以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彥博而相富弼又言諌官吳奎觀望挾姦語甚切直仁宗怒却其奏不視且言將貶竄介徐讀畢曰臣忠義憤激雖鼎鑊不避也上急召二府以疏示之曰介言它事乃可至謂彥博因貴妃得執政何言也介面質彥博曰彥博冝自省即有之不可隱彥博拜謝不巳樞密副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲衆恐禍出不測是時蔡襄修起居注立殿陛即進曰介誠狂直然納諌容言人主之美德必望全貸遂召當制舍人就殿廬草制貶春州别駕翊日御史中丞王舉正救解之上亦中悔改為英州别駕復取其奏以入又明日罷彥博黜吳奎而遣中使護送介至貶所且戒以必全之無令道死名臣傳及碑志又朝以道云仁宗貶唐介嶺南將行遣中使賜介金又畫其像置之便殿又聞見録曰仁宗一日幸張貴妃閣見定州紅瓷器帝怪問曰安得此物妃以王拱辰所獻為對帝怒曰嘗戒汝勿通臣僚饋遺不聽何也因以所持柱斧碎之妃愧謝久之乃巳妃又嘗侍上元宴於端門服所謂燈籠錦者上亦怪問妃曰文彥博以陛下眷妾故有此獻上終不樂或云燈籠錦者潞公夫人遺張貴妃公不知也公怡然南去絶口不為人道當此之時天下士大夫識與不識聞風歎慕聳然有立志往往作為文章以頌詠其美自是言事官以畏默為恥而大臣亦知所鑒戒云神道碑潭州一巨賈私藏蚌胎為關吏所搜太守而下輕其估悉自售焉唐質肅公時以言事謫潭倅分珠獄發奏方入仁宗謂近侍曰唐介必不肯買案具奏覆覽之果然湘山野録改殿中侍御史知復州未至召充言事御史特遣內侍齎告勑就賜令乘驛赴朝公至不以一語自明帝曰知卿被謫以來未嘗以私書至京師可謂不易所守矣公頓首謝退就職言事無所避如前墓志神道碑出知楊州徙江東轉運使御史吳中復請還公言路時潞國文公再當國亦言唐介頃為御史所言皆中臣病而責太重願如中復言召之神道碑為河東轉運使戎人盜耕河西經略使令築堡限之而麟州守將輕出按視賊奄至與戰而沒朝廷罷易帥臣公攝事即絶其互市盛兵境上戎人懼乃來請議事平多如公册神道碑仁宗至和後御朝淵默公言君臣如天地以交泰為治願時延訪群下發德音可否政事以幸天下又言賞罰不可以貴賤輕重如孫沔吕溱侈縱冝深責必行則衆信矣論宫禁干丐恩澤其命不繇中書此古所謂斜封非盛朝所冝有請裁放後宫冗數罷祈禳之不經者諸路走馬承受使臣凌擾郡縣可罷勿遣以權歸監司天下配軍至死無赦與古律意異冝令有司差其重輕有所縱遣仍著為法又言士節弗立願委大臣進敦朴忠厚之士稍抑聚斂文法吏以銷刻薄浮競之風國朝祖陵在保州自楊懷敏廣塘水稍稍侵近議賜錢改卜公言遷久安之神以其地與水非尊祖之道衮國公主夜開皇城門入禁中請重責守者以嚴官省神道碑嘉祐中仁宗自內閣降密勑近以女謁縱橫無由禁止今後應內降批出事主司未得擅行次日執奏定可否始數日左承天門一寬衣老兵持竹弊器上以敗荷覆之門吏搜之乃金巨辨一枚上綴巨蚌燦然不知其數禁門舊律盡依外門例凡有搜欄更不中覆即送所司時開封方鞠劾次一小璫馳騎急傳旨令放其物仰進呈府尹魏瓘不用執奏法遂放之唐質肅公方在諌垣疏乞再收犯者劾之仍重貶瓘以戒不虔瓘降知越州湘山野録時御史中丞劾宰相未報乃自去官號不出宰相亦待罪公與諌官御史連請辨其曲直於是罷御史中丞公亦求外輔得知荆南而門下封還制書謂公不冝處外乃留復知諌院言新除樞密副使陳升之與內侍通姻不可大任屢疏卒罷之而公亦去知洪州翰林學士胡宿等七人上書懇留不報神道碑治平元年召為御史中丞英宗面諭曰卿在先朝有直聲今出自朕選非繇左右言也公言先帝在位四十餘年天下安樂唯仁治而巳願恢聖度廣恩德則為善繼四海蒙福矣墓志神道碑知太原府河東經略使至則首戒邊將毋生事𥘉代州岢嵐軍虜數擾邊公遣兵撒其所築境上堡柵又移文諭以利害嚴守以待之遂不復敢動其後冦大順城環慶路移檄出兵牽制公曰守邊之䇿莫如自重奈何以小侵故使鄰道勞費非至計也以事上聞詔以諭西帥神道碑公雖居外意未嘗不在朝廷於是濮王園廟之議起言者多得罪公憂形于色密疏請還臺諌官之謫者神道碑召拜三司使有司議增官屋僦直公以謂京師狃于恩不喜擾唐稅間架可以為鑒恐所得不當所損奏卒罷之神道碑拜參知政事公自以進繇直道感槩知遇益致所以事君之義純誠盡公多所獻替用人明言其才否不立恩不避怨與同列論政事反復再三未嘗阿屈於祖宗法有所更近臣有所進退尤極其御名雖在帝前必究切辨析要是非之歸未嘗反顧帝以是益敬信之而天下翕然想望其風采神道碑王荆公與唐質肅公介同為參知政事議論未嘗少合荆公雅愛馮道以其能屈身安人如諸佛菩薩之行一日於上前語及此事介曰道為宰相易四姓事十主此得為純臣乎荆公曰伊尹嘗五就湯五就桀者志在安人而已豈可亦謂之非純臣也質肅曰有伊尹之志則可荆公為之變色其論議不合而多致相侵率如此也東軒筆録唐質肅公一日自政府歸語諸子曰吾備位政府知無不言桃李固未嘗為汝等栽培而荆棘則甚多矣然汝等窮逹莫不有命惟自勉而巳湘山野録熙寧𥘉富鄭公弼曽魯公公亮為相唐質肅公介趙少師抃王荆公安石為參知政事是時荆公方得君鋭意新美天下之政自宰執同列無一人議論稍合而臺諌章疏攻擊者無虛日吕誨范純仁錢顗程皓之論尤極詆訾天下之人皆目為生事是時鄭公以病足魯公以年老皆引去唐質肅屢爭於上前不能勝未幾疽發于背而死趙少師力不勝但終日歎息遇一事更改即聲苦者數十故當時謂中書有生老病死苦言介甫生明仲老彥國病子方死恱道苦也東軒筆録公端徑之質出於天資立朝風格凛然遇事立斷𥘉無留思而邃於學問待人恂恂有禮自奉簡約未嘗問家有無將終屬其子以修身持門户而已神道碑介為人簡伉以敢言見憚每言事官缺衆皆以介冝處之神宗以其有直名故卒大用然居政府遭時有為少所建明聲名減於諌官御史時孫參政抃為御史中丞薦唐介吳中復為御史人或問曰聞君未嘗與二人相識而遽薦之何也孫答曰昔人恥呈身御史今豈求識面臺官也後二人皆以風力稱於天下孫晚年執政嘗嘆曰吾何功以輔政唯薦二臺官為無愧耳東軒筆録五朝名臣言行録卷第五之一丞相沂國王文正公公名曾字孝先青州益都人咸平中由鄉貢試禮部御前皆第一通判濟州代還特召試政事堂直史館三司户部判官知制誥兼史館修撰為翰林學士知通進銀臺司遂以右諫議大夫參知政事時宫觀皆以輔臣為使公當使會靈辭不拜罷知應天府天雄軍復參知政事兼太子賔客仁宗立拜中書侍郎同平章事玉清昭應宫使天聖中宮災出知青州天雄軍河南府景祐元年為樞密使明年復相出判鄆州寶元元年薨年六十一公青州發解及南省庭試皆為首冠中山劉子儀為翰林學士戲語之曰狀元試三場一生喫著不盡沂公正色答曰曾平生之志不在溫飽東軒筆録公自濟州代還當召試學士院宰相寇萊公竒之特召試政事堂景德中朝廷始與北虜通好詔遣使將以北朝呼之王沂公以為太重請止稱契丹夲號可也真宗激賞再三朝論韙之記聞祥符中王沂公奉使契丹館伴邢祥頗肆談辨深自衒鬻且矜新賜鐵劵公曰鐵劵蓋勳臣有功髙不賞之懼賜之以安反側耳何為輒及親賢祥大沮失記聞祥符中公在掖垣時瑞應沓臻公嘗請對上語及之公奏曰斯誠國家承平所感而致然願推而勿居異日或有災沴則免夫輿議退又白於執政及後飛蝗旱暵公乃亟𬒳擢用焉沂公言行録公以建昭應宫上疏陳事之不便者五條以諫請殺其制其餘論事甚衆皆削其藁惟此疏偶存言行録公在閣下纍年時楊文公已居內制楊性詼諧好嘲誚凡僚友無不狎侮至公則曰第四廳舍人不敢奉戲故李翰林昌武尤所歎服常曰若王舍人可謂不可得而親踈也言行録公任審刑日建議違制須親𬒳乃坐未幾外郡有以具獄讞聞章聖俾以違制坐之公奏以制非親𬒳請從違失上曰若卿之言自爾無復有違制之罪公遽曰誠如聖旨自爾亦無復輕議矣上怡然可其奏時佐吏趙廓同侍嘗以語人曰廓始聞王公抗議不覺局蹐自失後隂察王公未嘗語於人亦無自得之色言行録公前在政府日請置諫臣以廣言路後公再出守外藩孔道輔曹修古皆以言事謫去及公肆覲屢以為言恐杜天下之口言行録冦萊公鎮秦民有檛登聞鼓興訟者上以問公公奏曰長安故都民心豪舉若冦凖重官或以訟解則後人何由鎮服矣上意釋然但命降詔以諭之言行録公辭會靈使領真宗疑其自異王欽若從而擠之會公市賀皇后家舊第其家未徙而公使人輦土置其門賀氏入訴禁中公遂罷去章聖不豫劉后諷宰臣丁謂欲臨朝中外洶洶無敢言者時宰相王曾謂后戚錢惟演曰漢之吕后唐之武氏皆非據之位其後子孫誅戮不得保首領公后之肺腑何不入白皇后萬一宫車不諱太子即位太后輔政豈不為劉氏之福乎若欲稱制以取疑於天下非惟為劉氏之禍恐亦延及公矣惟演大懼入白之其議遂止政要又言行録曰章聖久不預莊憲太后欲自臨朝令上居東宮於資善堂決事會公自大名召還再二鈞席語錢惟演曰皇儲沖幼非中宫不可獨立中宮非倚皇儲之重則人心不附矣惟演亟入白之兩宮由是益親人遂無間𥘉章聖上仙外尚未聞中書密院同入問起居召詣寢閣東靣垂帷明肅傳遺命輔立皇太子及皇太后權聽斷軍國大事退而發哀公於殿廬草具遺制丁謂欲去權字加淑妃為皇太妃字公執咨曰皇帝沖年太后臨朝斯巳國家否運稱權猶足示後况言猶在耳何可改也且增減制書有法豈期表則之地先欲亂之耶曷為更載立妃之文必若尊禮當俟事定而議謂勃然曰參政却欲擅改遺制乎公曰曾適來寢殿中實不聞此言若誠有之豈敢改也諸公無相同者遂依違而行然權字遂不敢去故謂之敗公首𬒳爰立之命言行録章獻明肅太后權處分軍國事聽斷儀式久而未定丁謂欲每議大政則皇太后坐後殿朝執政朔望則皇帝坐前殿朝群臣其餘庶務獨令入內押班雷允恭禁中附奏傳命中書樞密院平決之公時判禮儀院乃采用蔡雍獨斷所述東漢故事皇帝在左母后在右同殿垂簾中書樞密院以次奏事如儀人心乃定公嘗於廣坐抗語丁相曰政出幃房斯已國家之否運然推之至公不猶愈於政出群下乎言行録又政要所載與此同但云庶務悉令雷允恭傳奏取旨即下不覆曾獨奏曰天下者太祖太宗先帝之天下也非陛下之天下也奈何使兩宫異位不共天下之政是壅主上之聰明絶下情而不使通况宦人傳政亂之始也餘並同真宗𥘉上仙公與丁謂同在中書公獨入劄子乞於山陵巳前一切內降文字中外並不得施行又乞今後凡兩府行下文字中書候宰臣參政密院樞密使副簽書貟方許中外承受兩宫可其奏謂聞之愕然自失由是深憚公矣東軒筆録丁謂既逐李文定於衡州遣中使齎詔賜之不道所以李聞之欲自裁其子柬之救之得免謂因大行貶竄王欽若丁度等皆投之逺方時王沂公參知政事不平之曰責太重矣謂孰視久之曰居亭主人恐亦未免也沂公踧然而懼因密謀去之內侍雷允恭既有力於謂謂深德之至是允恭為山陵都監司天邢中和為允恭言今山陵上百步法冝子孫類汝州秦王墳允恭曰如此何故不就中和曰恐下有石并水耳允恭曰先帝獨有上無它子若如秦王墳何故不用中和曰山陵事重踏行覆按動經日月恐不及七月之期爾允恭曰第移就上穴我走馬入見太后言之安有不從允恭素貴撗人不敢違即改穿上穴及允恭入白太后太后曰此大事何輕易如此出與山陵使議可否允恭見謂具道所以謂亦知其非而重違允恭無所可否唯唯而已允恭不得謂決語入奏太后曰山陵使亦無異議矣既而上穴果有石石盡水出沂公具得其事以謂擅易陵地意有不善欲奏之而不得間語同列曰曾無子欲令弟子過房來日奏事畢略留奏之謂不以為疑太后聞之大驚即命差官按劾其事而謂不知也比知之於簾前訴之移時有內侍卷簾曰相公誰與語駕起久矣謂知太后意不可回以笏叩頭而退謂既得罪山陵竟就下穴蓋謂所坐夲欲庇雷允恭不忍破其妄作耳然其邪謀深逺得位歲久心不可測雖沂公以計傾之而公議不以為非也龍川志沂公在中書得光州奏祕書監致仕丁謂卒顧謂同列曰斯人平生多智數不可測其在海外由能用智而還若不死數年未必不復用斯人復用則天下之不幸可勝道哉吾非幸其死也東軒筆録曹利用既授南陽之命將入謝莊憲慮其詆訐而未有以却之遣中使江德明問公公亦慮其交惡兩宫遽請傳宣放謝利用泯默而去𥘉利用恃恩恣橫公每加裁抑及其得罪公獨極言其枉太后曰卿常言利用之非今何為佑之公對曰臣所述利用侵官弄權慮壞朝廷綱紀今𬒳以不軌則為枉爾故卒從輕議言行録明肅攝政馬季良聮姻劉氏以非道干進太后欲擢為龍圖閣待制顧公守正難之會公移疾數日喻二政者擢季良且曰王曾在告當亟行之諸公承順匆遽故季良止以太常丞充職蓋三丞未嘗有預內閣清職者中外喧傳而公持正之名益重焉言行録天聖𥘉公嘗詮録古先聖賢事迹凡六十事繪事以獻上嘉納之降詔褒美仍勑鏤板模印均賜近侍因命禁署月繪二十軸以進焉公又建議請擇名儒勸講尋命孫奭馮元更侍經筵及戴禮終帙公率同列獻詩以賀後孫公即丗馮亦外輔公自魏移洛經塗肆覲復以講席為言言行録天聖中陳堯咨尹京自以先朝𥘉榜狀元未大用頗觖望常為誣謗明肅惑焉公奏曰臣等職預弼諧敢不心存公正但讒人罔極不可不察臣請以藥物喻之醫方謂藥有相使相反惡者而甘草為國老以其性能和衆藥故湯劑中不以寒溫多或用之而班貓有毒相反若同用之則致害人此其驗也后即時大悟數日陳有廉車之命出守於外言行録天聖中楊崇勳帥殿衛日詣中書白事屬微雨新霽穿泥鞹直登階公頷之不以常禮延坐楊退劾奏其罪送宣徽院問狀翌日奏請傳詔釋之明肅訝其然公曰崇勳武夫不知朝廷之儀舉奏者柄臣所以振紀綱寬釋者人主所以示恩德如此則仁愛歸於上而威令肅於下矣言行録王欽若再秉大政屢以宫觀欽奉踈簡不若昔時為言明肅依違未能決公一日於簾前奏曰天道逺人道邇天禧中靈文降言先帝聖壽三萬日時欽若率先慶抃曰三萬日八十三歲太后必亦記之後乃無驗然則今日欽奉之禮自不須過當欽若赧然而退自爾不復言言行録韓魏公言希文師魯畏沂公師魯初入館編校四年復欲得一差遣遂至中書援錢延年例沂公徐曰學士自待何為在錢延年等列耶師魯終身以為愧魏公别録韓魏公言王沂公當國門下未嘗見顯拔一人希文乘間輒諷之曰明揚士類宰相之任也公之盛德獨少此爾沂公徐應之曰司諫不思邪恩若巳出怨將誰歸希文惘然嘆曰真宰相也魏公别録又歸田録云王沂公方正持重最為賢相嘗以大臣執政不當收恩避怨曰恩欲歸巳怨使誰當聞者歎服以為名言錢惟演出守河橋詣公為别公酌酒餞之錢曰惟演身列將相不為不重然朝廷每闕輔相議不在中惟公憐之公答曰相公才用閥閲豈曾所敢望然曾忝冠宰府僅巳數年相公尚寄藩屏者何也錢曰惟演才識不茂實假遭逢相公科第文章揚歷中外豈惟演所敢侔哉公曰不然曾之才不及公而猥當柄用乃先於公者蓋以搢紳之士畏公而不畏曾故也公誠能去其可畏之迹使人無所復畏登庸調化必有日矣杜𣏌書公嘗言始參大政屬故太尉王公當國每進用朝士必先望實或曰某人才某人賢則曰誠知此人然歷官尚淺人望未著且俾養望歲久不渝而後擢任則榮塗坦然中外允愜故公執政之日遵行是言而人皆心服言行録公留守洛師屬歲歉里有囷積者飢民聚黨脅取鄰郡以強盜論報死者甚衆公但重笞而釋之逺近聞以為法全活者數千計仍上言國𥘉江浙未下之日嘗命陜雍晉絳歲漕粟以赴京師遂詔給陜粟二十萬儲廪充而民息肩于今賴之言行録公凡更四鎮所至悉興學校輟俸錢以助其費青州仍出家藏書以備習讀言行録公非聖之書未嘗再覽邪誕之事未嘗致毀亦不之信南都府署之內有神祠頗推靈怪日有請禱公下車之始即杜其出入之所惟朔望俾牙校致奠訖無他異時訛言有怪物夜飛下食小兒者逺近相恐未昏則楗户滅燭蔽匿童稚以黃紙薰炷置門用為厭勝公聞之戒徼巡之吏悉令屏去有為先倡者捕而重笞逐出於境民情遂安妖至襄邑而止言行録公再蒞大名代陳堯咨既視事府署毀圯者即舊而葺之無所改作什器之損失者完補之如數政有不便委曲彌縫悉掩其非及移守洛師陳復為代覩之歎曰王公冝其為宰相我之量弗及已蓋陳以昔時之嫌意謂公必返其故發其隱也言行録公再蒞大名治政益信於俗民居軍伍咸畫像以事之時虜使每往復入境皆云此府王公在焉必沐浴潔服而後入言行録公前罷參政日往候故太尉王公王巳疾困辭弗得見既而顧其壻范令孫再言曰王君介然他日勳業德望甚大顧余不得見之耳且曰王君昨以避讓會靈使領咈上意而王君進對詳雅詞直氣和了無所懾且王君始𬒳進用而能若是僕在政府幾二十年每進對忤意即蹙蹜不能自容以是知其偉度矣𥘉公自登朝歷掖垣內署每謁王公必語及闕政公辭以不在其位不敢預聞王曰嘻君他日必當重任期君振舉之耳言行録韓魏公言王沂公德器深厚而寡言當時有得其品題一兩句者人皆以為榮琦為諫官時因納劄子忽云近日頻見章疏甚好只如此可矣向來如髙若訥輩多是擇利范希文亦未免近名要須純意於國家事爾琦聞此言益自信也魏公别録公嘗語曰昔楊文公有言人之操履無若誠實吾每欽佩斯言苟執之不渝夷險可以一致言行録公自奉甚薄待客至厚於滋味無所偏嗜庖人請命未嘗改饌事諸父諸母乳母盡其孝謹葬外氏十餘喪嫁姻族孤女數人言行録王沂公與孫沖同榜沖子京一日往辭沂公相留云喫食了去飭子弟云巳留孫京喫食安排饅頭饅頭時為盛饌也食後合中送數軸簡紙開看皆是他人書簡後截下紙其儉德如此韓莊敏遺事王沂公當國屢薦吕許公夷簡是時明肅太后聽政沂公奏曰臣屢言夷簡才望可當政柄而兩宫終未用以臣度太后之意不欲其班在樞密使張旻之上耳且旻一赤腳健兒豈容妨賢如此太后曰固無此意行且用夷簡矣沂公曰兩宫既巳許臣臣請即令宣召學士草麻太后從之及許公大拜漸與沂公不叶東軒筆録公資質端厚眉目如刻畫盛服屹然入朝進止有常處平居寡言自奉廉約人莫敢干以私楊文公嘗目之曰王君揚休山立宗廟器也胡文定公曰李文靖淡然無欲王沂公儼然不動資稟既如此又濟之以學故是八九分地位也
